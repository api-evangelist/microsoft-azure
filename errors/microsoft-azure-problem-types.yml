method: searched
format: azure-error
source: https://learn.microsoft.com/en-us/rest/api/azure/
docs: https://learn.microsoft.com/en-us/azure/azure-resource-manager/troubleshooting/common-deployment-errors
notes: >-
  Azure REST APIs do NOT use RFC 9457 application/problem+json. They return a
  standard Azure error envelope: a top-level "error" object with machine-readable
  "code", human "message", optional "target", and nested "details[]" /
  "additionalInfo[]". Error codes are strings (e.g. ResourceNotFound,
  InvalidAuthenticationToken). This catalog captures the common HTTP-status →
  Azure error shape mapping shared across resource providers.
envelope:
  wrapper: error
  fields: [code, message, target, details, additionalInfo]
  example: |
    {
      "error": {
        "code": "ResourceNotFound",
        "message": "The Resource 'Microsoft.Compute/virtualMachines/vm1' under resource group 'rg1' was not found.",
        "target": "vm1"
      }
    }
problems:
  - status: 400
    code: InvalidRequestContent
    title: The request body is invalid or malformed.
  - status: 401
    code: InvalidAuthenticationToken
    title: Bearer token missing, expired, or invalid (Entra ID).
  - status: 403
    code: AuthorizationFailed
    title: The token is valid but the principal lacks RBAC permission for the action.
  - status: 404
    code: ResourceNotFound
    title: The requested resource or resource group does not exist.
  - status: 409
    code: Conflict
    title: The resource is in a conflicting state or already exists.
  - status: 412
    code: PreconditionFailed
    title: ETag / If-Match precondition was not met.
  - status: 429
    code: TooManyRequests
    title: Request throttled; retry after the Retry-After interval.
  - status: 500
    code: InternalServerError
    title: An unexpected server error occurred.
  - status: 503
    code: ServiceUnavailable
    title: The service is temporarily unavailable; retry with backoff.
