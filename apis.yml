- type: UseCases
  data:
  - name: Cloud-Native Applications
    description: Build and deploy microservices-based applications using AKS, Container Registry, and Azure API Management.
  - name: Data Modernization
    description: Migrate and modernize databases with Azure SQL, Cosmos DB, and Azure Database Migration Service.
  - name: AI-Powered Applications
    description: Integrate GPT models, computer vision, and speech services into applications via Azure OpenAI and Cognitive
      Services.
  - name: Disaster Recovery
    description: Implement business continuity with Azure Site Recovery, geo-redundant storage, and cross-region replication.
  - name: IoT Solutions
    description: Connect, monitor, and manage IoT devices at scale with Azure IoT Hub, IoT Central, and Digital Twins.
  - name: Enterprise Integration
    description: Connect systems and applications with Azure Logic Apps, Service Bus, API Management, and Event Grid.
- type: Integrations
  data:
  - name: GitHub
    description: Native integration with GitHub Actions, GitHub Codespaces, and GitHub Advanced Security for DevOps workflows.
  - name: Terraform
    description: Official Azure provider for Terraform enabling infrastructure as code for all Azure resources.
  - name: Power BI
    description: Business analytics integration with embedded dashboards, Azure Synapse connectivity, and real-time streaming.
  - name: Microsoft 365
    description: Enterprise productivity integration with Azure AD, Microsoft Graph, and Office 365 services.
  - name: SAP
    description: Certified SAP workload support with Azure Large Instances, SAP HANA, and integration services.
  - name: Kubernetes
    description: Managed Kubernetes with AKS, Azure Arc-enabled Kubernetes, and integration with CNCF ecosystem tools.
  - name: Red Hat
    description: Partnership for Azure Red Hat OpenShift and RHEL-based workloads on Azure infrastructure.
  - name: VMware
    description: Azure VMware Solution for migrating VMware workloads to Azure without re-platforming.
