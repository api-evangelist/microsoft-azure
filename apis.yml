common:
- type: ArazzoWorkflows
  url: arazzo/
  workflows:
  - url: arazzo/microsoft-azure-audit-subscription-resources-workflow.yml
    name: Microsoft Azure Audit Subscription Resources
    summary: Confirm a subscription is enabled, list all its resources, and read its predefined tag names.
  - url: arazzo/microsoft-azure-create-resource-group-and-deploy-from-link-workflow.yml
    name: Microsoft Azure Create Resource Group and Deploy From Template Link
    summary: Create a resource group then deploy an ARM template referenced by URI, polling to completion.
  - url: arazzo/microsoft-azure-create-resource-group-and-verify-workflow.yml
    name: Microsoft Azure Create Resource Group and Verify
    summary: Create a resource group then read it back to confirm it provisioned successfully.
  - url: arazzo/microsoft-azure-deploy-template-to-resource-group-workflow.yml
    name: Microsoft Azure Deploy Template to a New Resource Group
    summary: Create a resource group, start an ARM template deployment, and poll until it succeeds.
  - url: arazzo/microsoft-azure-deploy-then-delete-resource-group-workflow.yml
    name: Microsoft Azure Deploy Then Tear Down a Resource Group
    summary: Create a group, deploy a template, poll to success, then delete the whole group.
  - url: arazzo/microsoft-azure-deployment-status-and-resource-list-workflow.yml
    name: Microsoft Azure Deployment Status and Resulting Resources
    summary: Get a deployment, confirm it succeeded, then list the resources in its resource group.
  - url: arazzo/microsoft-azure-find-resources-by-type-and-inspect-group-workflow.yml
    name: Microsoft Azure Find Resources by Type and Inspect Their Group
    summary: Filter a subscription's resources by type, then get the resource group of the first match.
  - url: arazzo/microsoft-azure-list-providers-and-resources-workflow.yml
    name: Microsoft Azure List Providers and Resources
    summary: Confirm a subscription is enabled, list its resource providers, then list its resources.
  - url: arazzo/microsoft-azure-list-resource-groups-and-inventory-resources-workflow.yml
    name: Microsoft Azure List Resource Groups and Inventory Resources
    summary: List a subscription's resource groups, get the first one, and inventory its resources.
  - url: arazzo/microsoft-azure-redeploy-into-existing-group-workflow.yml
    name: Microsoft Azure Redeploy Into an Existing Resource Group
    summary: Confirm a resource group exists, start a deployment into it, and poll until terminal.
  - url: arazzo/microsoft-azure-relocate-resource-group-deployment-workflow.yml
    name: Microsoft Azure Provision a Region-Specific Deployment
    summary: Read a subscription, create a region-tagged resource group, deploy into it, and poll to completion.
  - url: arazzo/microsoft-azure-resource-group-lifecycle-tag-and-inventory-workflow.yml
    name: Microsoft Azure Resource Group Lifecycle Tag and Inventory
    summary: List resource groups, get the first, patch governance tags onto it, then inventory its resources.
  - url: arazzo/microsoft-azure-select-subscription-and-list-resource-groups-workflow.yml
    name: Microsoft Azure Select Subscription and List Resource Groups
    summary: List tenant subscriptions, get the first one's detail, then list its resource groups.
  - url: arazzo/microsoft-azure-tag-resource-group-workflow.yml
    name: Microsoft Azure Tag an Existing Resource Group
    summary: Read a resource group, apply new tags with a patch, and confirm the tags were written.
