    description: >-
      The Microsoft Azure API Client is a tool that allows developers to easily access
      and integrate Azure services within their applications. This client provides
      a set of libraries and tools that streamline the process of communicating with
      various Azure APIs, enabling developers to interact with services such as virtual
      machines, storage, databases, and more.
  - aid: microsoft-azure:accesscontrolclient
    name: Microsoft Azure Access Control Client
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://learn.microsoft.com/en-us/azure/role-based-access-control/
