  - aid: microsoft-azure-one:anomaly-detector
    name: Microsoft Azure Anomaly Detector
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/
    properties:
      - url: openapi/anomaly-detector-openapi-original.yml
        type: OpenAPI
      - url: https://learn.microsoft.com/en-us/azure/ai-services/anomaly-detector/
        type: Documentation
    description: >-
      The Anomaly Detector API detects anomalies automatically in time series data.
      It supports both a stateless detection mode and a stateful detection mode. In
      stateless mode, there are three functionalities. Entire Detect is for detecting
      the whole series, with the model trained by the time series. Last Detect is
      for detecting the last point, with the model trained by points before. ChangePoint
      Detect is for detecting trend changes in the time series.
  - aid: microsoft-azure-one:anomaly-detector-client
    name: Microsoft Azure Anomaly Detector Client
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    properties:
      - url: openapi/anomaly-detector-client-openapi-original.yml
        type: OpenAPI
    description: >-
      The Anomaly Detector API detects anomalies automatically in time series data.
      It supports two kinds of mode, one is for stateless using, another is for stateful
      using. In stateless mode, there are three functionalities. Entire Detect is
      for detecting the whole series with model trained by the time series, Last Detect
      is detecting last point with model trained by points before. ChangePoint Detect
      is for detecting trend changes in time series.
