        type: OpenAPI
      - url: https://learn.microsoft.com/en-us/azure/role-based-access-control/
        type: Documentation
    description: >-
      Microsoft Azure Access Control Client is a tool that helps users manage and
      control access to their Azure resources. With this client, users can easily
      set up and enforce access policies, monitor user activity, and grant or revoke
      permissions as needed. This helps ensure that only authorized individuals have
      access to critical data and applications, increasing security and improving
      overall compliance with regulatory requirements.
  - aid: microsoft-azure:azure-action-groups-api
    name: Microsoft Azure Action Groups API
    tags: []
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
