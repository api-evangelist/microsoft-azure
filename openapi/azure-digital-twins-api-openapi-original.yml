definitions:
  DigitalTwin:
    description: Digital twin
    type: object
    additionalProperties: {}
  Relationship:
    description: Digital twin relationship
    type: object
    additionalProperties: {}
  Component:
    description: Digital twin component
    type: object
    additionalProperties: {}
  EventRoute:
    description: >-
      A route which directs notification and telemetry events to an endpoint.
      Endpoints are a destination outside of Azure Digital Twins such as an
      EventHub.
    type: object
    required:
      - endpointName
      - filter
    properties:
      id:
        description: The id of the event route.
        type: string
        readOnly: true
      endpointName:
        description: The name of the endpoint this event route is bound to.
        type: string
      filter:
        description: >-
          An expression which describes the events which are routed to the
          endpoint.
        type: string
  EventRouteCollection:
    description: A collection of EventRoute objects.
    type: object
    required:
      - value
    properties:
      value:
        description: The EventRoute objects.
        type: array
        items:
          $ref: '#/definitions/EventRoute'
      nextLink:
        description: A URI to retrieve the next page of results.
        type: string
  NonPagedDigitalTwinsModelDataCollection:
    description: A collection of DigitalTwinsModelData objects.
    type: array
    items:
      $ref: '#/definitions/DigitalTwinsModelData'
  PagedDigitalTwinsModelDataCollection:
    description: A collection of DigitalTwinsModelData objects.
    type: object
    required:
      - value
    properties:
      value:
        description: The DigitalTwinsModelData objects.
        type: array
        items:
          $ref: '#/definitions/DigitalTwinsModelData'
      nextLink:
        description: A URI to retrieve the next page of objects.
        type: string
  DigitalTwinsModelData:
    description: A model definition and metadata for that model.
    required:
      - id
    type: object
    properties:
      displayName:
        description: >-
          A language map that contains the localized display names as specified
          in the model definition.
        type: object
        additionalProperties:
          type: string
      description:
        description: >-
          A language map that contains the localized descriptions as specified
          in the model definition.
        type: object
        additionalProperties:
          type: string
      id:
        description: The id of the model as specified in the model definition.
        type: string
      uploadTime:
        description: The time the model was uploaded to the service.
        format: date-time
        type: string
      decommissioned:
        description: >-
          Indicates if the model is decommissioned. Decommissioned models cannot
          be referenced by newly created digital twins.
        type: boolean
        default: false
      model:
        description: The model definition.
        type: object
  RelationshipCollection:
    description: A collection of relationships which relate digital twins together.
    type: object
    required:
      - value
    properties:
      value:
        description: The relationship objects.
        type: array
        items:
          description: The relationship JSON document.
          type: object
      nextLink:
        description: A URI to retrieve the next page of objects.
        type: string
  IncomingRelationshipCollection:
    description: >-
      A collection of incoming relationships which relate digital twins
      together.
    type: object
    required:
      - value
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/IncomingRelationship'
      nextLink:
        type: string
        description: A URI to retrieve the next page of objects.
  IncomingRelationship:
    type: object
    description: An incoming relationship.
    properties:
      $relationshipId:
        type: string
        description: >-
          A user-provided string representing the id of this relationship,
          unique in the context of the source digital twin, i.e. sourceId +
          relationshipId is unique in the context of the service.
      $sourceId:
        type: string
        description: The id of the source digital twin.
      $relationshipName:
        type: string
        description: The name of the relationship.
      $relationshipLink:
        type: string
        description: Link to the relationship, to be used for deletion.
  QuerySpecification:
    description: >-
      A query specification containing either a query statement or a
      continuation token from a previous query result.
    type: object
    properties:
      query:
        description: >-
          The query to execute. This value is ignored if a continuation token is
          provided.
        type: string
      continuationToken:
        description: >-
          A token which is used to retrieve the next set of results from a
          previous query.
        type: string
  QueryResult:
    description: The results of a query operation and an optional continuation token.
    type: object
    required:
      - value
    properties:
      value:
        description: The query results.
        type: array
        items:
          type: object
      continuationToken:
        description: >-
          A token which can be used to construct a new QuerySpecification to
          retrieve the next set of results.
        type: string
  ImportJob:
    description: >-
      A job which contains a reference to the operations to perform, results,
      and execution metadata.
    type: object
    required:
      - inputBlobUri
      - outputBlobUri
    properties:
      id:
        description: The identifier of the import job.
        type: string
        readOnly: true
      inputBlobUri:
        description: >-
          The path to the input Azure storage blob that contains file(s)
          describing the operations to perform in the job.
        type: string
      outputBlobUri:
        description: >-
          The path to the output Azure storage blob that will contain the errors
          and progress logs of import job.
        type: string
      status:
        description: Status of the job.
        enum:
          - notstarted
          - running
          - failed
          - succeeded
          - cancelling
          - cancelled
        type: string
        readOnly: true
        x-ms-enum:
          name: status
          modelAsExtensible: true
          modelAsString: false
      createdDateTime:
        description: >-
          Start time of the job. The timestamp is in RFC3339 format:
          `yyyy-MM-ddTHH:mm:ssZ`.
        type: string
        format: date-time
        readOnly: true
      lastActionDateTime:
        description: >-
          Last time service performed any action from the job. The timestamp is
          in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.
        type: string
        format: date-time
        readOnly: true
      finishedDateTime:
        description: >-
          End time of the job. The timestamp is in RFC3339 format:
          `yyyy-MM-ddTHH:mm:ssZ`.
        type: string
        format: date-time
        readOnly: true
      purgeDateTime:
        description: >-
          Time at which job will be purged by the service from the system. The
          timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.
        type: string
        format: date-time
        readOnly: true
      error:
        $ref: '#/definitions/Error'
        description: Details of the error(s) that occurred executing the import job.
  ImportJobCollection:
    description: A collection of import job objects.
    type: object
    required:
      - value
    properties:
      value:
        description: The list of import job objects.
        type: array
        items:
          $ref: '#/definitions/ImportJob'
      nextLink:
        description: A URI to retrieve the next page of results.
        type: string
  ErrorResponse:
    description: Error response.
    required:
      - error
    properties:
      error:
        $ref: '#/definitions/Error'
        description: The error details.
  Error:
    description: Error definition.
    properties:
      code:
        description: >-
          Service specific error code which serves as the substatus for the HTTP
          error code.
        type: string
        readOnly: true
      message:
        description: A human-readable representation of the error.
        type: string
        readOnly: true
      details:
        description: Internal error details.
        type: array
        items:
          $ref: '#/definitions/Error'
        readOnly: true
      innererror:
        description: >-
          An object containing more specific information than the current object
          about the error.
        $ref: '#/definitions/InnerError'
  InnerError:
    description: >-
      A more specific error description than was provided by the containing
      error.
    properties:
      code:
        description: A more specific error code than was provided by the containing error.
        type: string
      innererror:
        description: >-
          An object containing more specific information than the current object
          about the error.
        $ref: '#/definitions/InnerError'
