swagger: '2.0'
info:
  version: 2023-02-27-preview
  title: Microsoft Azure Azure Digital Twins API
  description: A service for managing and querying digital twins and digital twin models.
host: digitaltwins-hostname
schemes:
  - https
produces:
  - application/json
consumes:
  - application/json
paths:
  /models:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    post:
      tags:
        - Models
      description: >-
        Uploads one or more models. When any error occurs, no models are
        uploaded.<br>Status codes:<br>* 201 Created<br>* 400 Bad Request<br>  *
        DTDLParserError - The models provided are not valid DTDL.<br>  *
        InvalidArgument - The model id is invalid.<br>  * LimitExceeded - The
        maximum number of model ids allowed in 'dependenciesFor' has been
        reached.<br>  * ModelVersionNotSupported - The version of DTDL used is
        not supported.<br>* 409 Conflict<br>  * ModelAlreadyExists - The model
        provided already exists.
      operationId: microsoftAzureDigitaltwinmodelsAdd
      x-ms-examples:
        Add models:
          $ref: ./examples/ModelAdd.json
      parameters:
        - name: models
          in: body
          description: An array of models to add.
          required: true
          schema:
            type: array
            minItems: 1
            uniqueItems: true
            items:
              type: object
        - $ref: '#/parameters/api-version'
      responses:
        '201':
          description: Success
          schema:
            $ref: '#/definitions/NonPagedDigitalTwinsModelDataCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Models
    get:
      tags:
        - Models
      description: >-
        Retrieves model metadata and, optionally, model definitions.<br>Status
        codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The
        model id is invalid.<br>  * LimitExceeded - The maximum number of model
        ids allowed in 'dependenciesFor' has been reached.<br>* 404 Not
        Found<br>  * ModelNotFound - The model was not found.
      x-ms-pageable:
        nextLinkName: nextLink
      operationId: microsoftAzureDigitaltwinmodelsList
      x-ms-examples:
        List models:
          $ref: ./examples/ModelsGet.json
        List models (include dependencies and definitions):
          $ref: ./examples/ModelsGetWithDependenciesAndIncludeModelDefinition.json
      parameters:
        - name: dependenciesFor
          in: query
          description: >-
            If specified, only return the set of the specified models along with
            their dependencies. If omitted, all models are retrieved.
          required: false
          type: array
          collectionFormat: multi
          items:
            type: string
        - $ref: '#/parameters/includeModelDefinition'
        - $ref: '#/parameters/max-items-per-page'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/PagedDigitalTwinsModelDataCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Models
  /models/{id}:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Models
      description: >-
        Retrieves model metadata and optionally the model definition.<br>Status
        codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The
        model id is invalid.<br>  * MissingArgument - The model id was not
        provided.<br>* 404 Not Found<br>  * ModelNotFound - The model was not
        found.
      operationId: microsoftAzureDigitaltwinmodelsGetbyid
      x-ms-examples:
        Get a model by id:
          $ref: ./examples/ModelGetById.json
        Get a model by id (with definition):
          $ref: ./examples/ModelGetByIdWithIncludeModelDefinition.json
      parameters:
        - $ref: '#/parameters/modelId'
        - $ref: '#/parameters/includeModelDefinition'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DigitalTwinsModelData'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Models Id
    patch:
      tags:
        - Models
      description: >-
        Updates the metadata for a model.<br>Status codes:<br>* 204 No
        Content<br>* 400 Bad Request<br>  * InvalidArgument - The model id is
        invalid.<br>  * JsonPatchInvalid - The JSON Patch provided is
        invalid.<br>  * MissingArgument - The model id was not provided.<br>*
        404 Not Found<br>  * ModelNotFound - The model was not found.<br>* 409
        Conflict<br>  * ModelReferencesNotDecommissioned - The model refers to
        models that are not decommissioned.
      operationId: microsoftAzureDigitaltwinmodelsUpdate
      consumes:
        - application/json-patch+json
      x-ms-examples:
        Decommission a model:
          $ref: ./examples/ModelUpdateDecommissioned.json
      parameters:
        - $ref: '#/parameters/modelId'
        - name: updateModel
          description: >-
            An update specification described by JSON Patch. Only the
            decommissioned property can be replaced.
          in: body
          required: true
          schema:
            type: array
            items:
              type: object
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Patch Models Id
    delete:
      tags:
        - Models
      operationId: microsoftAzureDigitaltwinmodelsDelete
      description: >-
        Deletes a model. A model can only be deleted if no other models
        reference it.<br>Status codes:<br>* 204 No Content<br>* 400 Bad
        Request<br>  * InvalidArgument - The model id is invalid.<br>  *
        MissingArgument - The model id was not provided.<br>* 404 Not Found<br>  * ModelNotFound - The model was not found.<br>* 409 Conflict<br>  *
        ModelReferencesNotDeleted - The model refers to models that are not
        deleted.
      x-ms-examples:
        Delete a model:
          $ref: ./examples/DeleteModel.json
      parameters:
        - $ref: '#/parameters/modelId'
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Delete Models Id
  /query:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    post:
      tags:
        - Query
      operationId: microsoftAzureQueryQuerytwins
      description: >-
        Executes a query that allows traversing relationships and filtering by
        property values.<br>Status codes:<br>* 200 OK<br>* 400 Bad Request<br>  * BadRequest - The continuation token is invalid.<br>  * SqlQueryError -
        The query contains some errors.<br>  * TimeoutError - The query
        execution timed out after 60 seconds. Try simplifying the query or
        adding conditions to reduce the result size.<br> * 429 Too Many
        Requests<br>  * QuotaReachedError - The maximum query rate limit has
        been reached.
      x-ms-examples:
        Query for digital twins:
          $ref: ./examples/QueryFirstPage.json
        Retrieve paged query results:
          $ref: ./examples/QueryNextPage.json
        Query for digital twins through a relationship:
          $ref: ./examples/QueryJoin.json
      parameters:
        - name: querySpecification
          in: body
          description: The query specification to execute.
          required: true
          schema:
            $ref: '#/definitions/QuerySpecification'
        - $ref: '#/parameters/max-items-per-page'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/QueryResult'
          headers:
            query-charge:
              description: The query charge.
              type: number
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Query
  /digitaltwins/{id}:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsGetbyid
      description: >-
        Retrieves a digital twin.<br>Status codes:<br>* 200 OK<br>* 400 Bad
        Request<br>  * InvalidArgument - The digital twin id is invalid.<br>*
        404 Not Found<br>  * DigitalTwinNotFound - The digital twin was not
        found.
      x-ms-examples:
        Get a digital twin by id:
          $ref: ./examples/GetTwin.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DigitalTwin'
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Digitaltwins Id
    put:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsAdd
      description: >-
        Adds or replaces a digital twin.<br>Status codes:<br>* 200 OK<br>* 400
        Bad Request<br>  * InvalidArgument - The digital twin id or payload is
        invalid.<br>  * ModelDecommissioned - The model for the digital twin is
        decommissioned.<br>  * TwinLimitReached - The maximum number of digital
        twins allowed has been reached.<br>  * ValidationFailed - The digital
        twin payload is not valid.<br>* 412 Precondition Failed<br>  *
        PreconditionFailed - The precondition check (If-Match or If-None-Match)
        failed.
      x-ms-examples:
        Add a digital twin:
          $ref: ./examples/PutTwinBasicExample.json
        Add a digital twin (with properties and components):
          $ref: ./examples/PutTwinAdvancedExample.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - name: twin
          description: >-
            The digital twin instance being added. If provided, the $dtId
            property is ignored.
          in: body
          required: true
          schema:
            type: object
        - $ref: '#/parameters/if-none-match-star'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DigitalTwin'
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Put Digitaltwins Id
    delete:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsDelete
      description: >-
        Deletes a digital twin. All relationships referencing the digital twin
        must already be deleted.<br>Status codes:<br>* 204 No Content<br>* 400
        Bad Request<br>  * InvalidArgument - The digital twin id is
        invalid.<br>  * RelationshipsNotDeleted - The digital twin contains
        relationships.<br>* 404 Not Found<br>  * DigitalTwinNotFound - The
        digital twin was not found.<br>* 412 Precondition Failed<br>  *
        PreconditionFailed - The precondition check (If-Match or If-None-Match)
        failed.
      x-ms-examples:
        Delete a digital twin:
          $ref: ./examples/DeleteTwin.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/if-match'
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Delete Digitaltwins Id
    patch:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsUpdate
      description: >-
        Updates a digital twin.<br>Status codes:<br>* 204 No Content<br>* 400
        Bad Request<br>  * InvalidArgument - The digital twin id or payload is
        invalid.<br>  * JsonPatchInvalid - The JSON Patch provided is
        invalid.<br>  * ValidationFailed - Applying the patch results in an
        invalid digital twin.<br>* 404 Not Found<br>  * DigitalTwinNotFound -
        The digital twin was not found.<br>* 412 Precondition Failed<br>  *
        PreconditionFailed - The precondition check (If-Match or If-None-Match)
        failed.
      consumes:
        - application/json-patch+json
      x-ms-examples:
        Update a digital twin:
          $ref: ./examples/PatchTwinBasicExample.json
        Update a digital twin (multiple updates):
          $ref: ./examples/PatchTwinAdvancedExample.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - name: patchDocument
          description: >-
            An update specification described by JSON Patch. Updates to property
            values and $model elements may happen in the same request.
            Operations are limited to add, replace and remove.
          in: body
          required: true
          schema:
            type: array
            items:
              type: object
        - $ref: '#/parameters/if-match'
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Patch Digitaltwins Id
  /digitaltwins/{id}/relationships/{relationshipId}:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsGetrelationshipbyid
      description: >-
        Retrieves a relationship between two digital twins.<br>Status
        codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The
        digital twin id or relationship id is invalid.<br>* 404 Not Found<br>  *
        DigitalTwinNotFound - The digital twin was not found.<br>  *
        RelationshipNotFound - The relationship was not found.
      x-ms-examples:
        Get a relationship by id:
          $ref: ./examples/GetRelationshipById.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/relationshipId'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Relationship'
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Digitaltwins Id Relationships Relationshipid
    put:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsAddrelationship
      description: >-
        Adds a relationship between two digital twins.<br>Status codes:<br>* 200
        OK<br>* 400 Bad Request<br>  * InvalidArgument - The digital twin id,
        relationship id, or payload is invalid.<br>  * InvalidRelationship - The
        relationship is invalid.<br>  * OperationNotAllowed - The relationship
        cannot connect to the same digital twin.<br>  * ValidationFailed - The
        relationship content is invalid.<br>* 404 Not Found<br>  *
        DigitalTwinNotFound - The digital twin was not found.<br>  *
        TargetTwinNotFound - The digital twin target of the relationship was not
        found.<br>* 412 Precondition Failed<br>  * PreconditionFailed - The
        precondition check (If-Match or If-None-Match) failed.
      x-ms-examples:
        Create a relationship:
          $ref: ./examples/CreateRelationshipBasicExample.json
        Create a relationship (with properties):
          $ref: ./examples/CreateRelationshipAdvancedExample.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/relationshipId'
        - name: relationship
          in: body
          description: The data for the relationship.
          required: true
          schema:
            type: object
        - $ref: '#/parameters/if-none-match-star'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Relationship'
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Put Digitaltwins Id Relationships Relationshipid
    delete:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsDeleterelationship
      description: >-
        Deletes a relationship between two digital twins.<br>Status codes:<br>*
        204 No Content<br>* 400 Bad Request<br>  * InvalidArgument - The digital
        twin id or relationship id is invalid.<br>* 404 Not Found<br>  *
        DigitalTwinNotFound - The digital twin was not found.<br>  *
        RelationshipNotFound - The relationship was not found.<br>* 412
        Precondition Failed<br>  * PreconditionFailed - The precondition check
        (If-Match or If-None-Match) failed.
      x-ms-examples:
        Delete a relationship:
          $ref: ./examples/DeleteRelationship.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/relationshipId'
        - $ref: '#/parameters/if-match'
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Delete Digitaltwins Id Relationships Relationshipid
    patch:
      tags:
        - Twins
      consumes:
        - application/json-patch+json
      operationId: microsoftAzureDigitaltwinsUpdaterelationship
      description: >-
        Updates the properties on a relationship between two digital
        twins.<br>Status codes:<br>* 204 No Content<br>* 400 Bad Request<br>  *
        InvalidArgument - The digital twin id or relationship id is
        invalid.<br>  * InvalidRelationship - The relationship is invalid.<br>  * JsonPatchInvalid - The JSON Patch provided is invalid.<br>  *
        ValidationFailed - The relationship content is invalid.<br>* 404 Not
        Found<br>  * DigitalTwinNotFound - The digital twin was not found.<br>  * RelationshipNotFound - The relationship was not found.<br>* 409
        Conflict<br>  * RelationshipAlreadyExists - The relationship already
        exists.<br>* 412 Precondition Failed<br>  * PreconditionFailed - The
        precondition check (If-Match or If-None-Match) failed.
      x-ms-examples:
        Update relationship properties:
          $ref: ./examples/PatchRelationshipBasicExample.json
        Update relationship properties (multiple updates):
          $ref: ./examples/PatchRelationshipAdvancedExample.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/relationshipId'
        - name: patchDocument
          description: JSON Patch description of the update to the relationship properties.
          in: body
          required: true
          schema:
            type: array
            items:
              type: object
        - $ref: '#/parameters/if-match'
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Patch Digitaltwins Id Relationships Relationshipid
  /digitaltwins/{id}/relationships:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsListrelationships
      description: >-
        Retrieves the relationships from a digital twin.<br>Status codes:<br>*
        200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The digital twin id
        is invalid.<br>* 404 Not Found<br>  * DigitalTwinNotFound - The digital
        twin was not found.
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        List relationships:
          $ref: ./examples/GetRelationship.json
        List relationships by name:
          $ref: ./examples/GetRelationshipByRelationshipName.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - name: relationshipName
          description: The name of the relationship.
          in: query
          required: false
          type: string
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/RelationshipCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Digitaltwins Id Relationships
  /digitaltwins/{id}/incomingrelationships:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsListincomingrelationships
      description: >-
        Retrieves all incoming relationship for a digital twin.<br>Status
        codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The
        digital twin id is invalid.<br>* 404 Not Found<br>  *
        DigitalTwinNotFound - The digital twin was not found.
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        List incoming relationships:
          $ref: ./examples/GetIncomingRelationship.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/IncomingRelationshipCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Digitaltwins Id Incomingrelationships
  /digitaltwins/{id}/telemetry:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    post:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsSendtelemetry
      description: >-
        Sends telemetry on behalf of a digital twin.<br>Status codes:<br>* 204
        No Content<br>* 400 Bad Request<br>  * InvalidArgument - The digital
        twin id or message id is invalid.<br>  * ValidationFailed - The
        telemetry content is invalid.<br>* 404 Not Found<br>  *
        DigitalTwinNotFound - The digital twin was not found.
      x-ms-examples:
        Send telemetry:
          $ref: ./examples/SendTelemetry.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - name: telemetry
          in: body
          description: The telemetry measurements to send from the digital twin.
          required: true
          schema:
            type: object
        - name: Message-Id
          in: header
          description: >-
            A unique message identifier (in the scope of the digital twin id)
            that is commonly used for de-duplicating messages.
          required: true
          type: string
        - name: Telemetry-Source-Time
          in: header
          description: >-
            An RFC 3339 timestamp that identifies the time the telemetry was
            measured.
          required: false
          type: string
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Digitaltwins Id Telemetry
  /digitaltwins/{id}/components/{componentPath}/telemetry:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    post:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsSendcomponenttelemetry
      description: >-
        Sends telemetry on behalf of a component in a digital twin.<br>Status
        codes:<br>* 204 No Content<br>* 400 Bad Request<br>  * InvalidArgument -
        The digital twin id, message id, or component path is invalid.<br>  *
        ValidationFailed - The telemetry content is invalid.<br>* 404 Not
        Found<br>  * DigitalTwinNotFound - The digital twin was not found.<br>  * ComponentNotFound - The component path was not found.
      x-ms-examples:
        Send telemetry in a component:
          $ref: ./examples/SendTelemetryFromComponent.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/componentPath'
        - name: telemetry
          in: body
          description: >-
            The telemetry measurements to send from the digital twin's
            component.
          required: true
          schema:
            type: object
        - name: Message-Id
          in: header
          description: >-
            A unique message identifier (in the scope of the digital twin id)
            that is commonly used for de-duplicating messages.
          required: true
          type: string
        - name: Telemetry-Source-Time
          in: header
          description: >-
            An RFC 3339 timestamp that identifies the time the telemetry was
            measured.
          required: false
          type: string
        - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Digitaltwins Id Components Componentpath Telemetry
  /digitaltwins/{id}/components/{componentPath}:
    parameters:
      - $ref: '#/parameters/traceparent'
      - $ref: '#/parameters/tracestate'
    get:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsGetcomponent
      description: >-
        Retrieves a component from a digital twin.<br>Status codes:<br>* 200
        OK<br>* 400 Bad Request<br>  * InvalidArgument - The digital twin id or
        component path is invalid.<br>* 404 Not Found<br>  * DigitalTwinNotFound
        - The digital twin was not found.<br>  * ComponentNotFound - The
        component path was not found.
      x-ms-examples:
        Get a component in a digital twin:
          $ref: ./examples/GetComponent.json
      parameters:
        - $ref: '#/parameters/digitalTwinId'
        - $ref: '#/parameters/componentPath'
        - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Component'
          headers:
            ETag:
              description: Weak Etag.
              type: string
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Digitaltwins Id Components Componentpath
    patch:
      tags:
        - Twins
      operationId: microsoftAzureDigitaltwinsUpdatecomponent
      description: >-
        Updates a component on a digital twin.<br>Status codes:<br>* 204 No
        Content<br>* 400 Bad Request<br>  * InvalidArgument - The digital twin
