openapi: 3.1.0
info:
  title: Azure Cosmos DB REST API
  description: >-
    Azure Cosmos DB is a globally distributed, multi-model database service that
    provides turnkey global distribution, elastic scaling of throughput and
    storage, single-digit millisecond latency at the 99th percentile, and
    guaranteed high availability, all backed by industry-leading SLAs. The REST
    API enables programmatic access to Cosmos DB resources for creating, querying,
    and managing databases, containers, items, stored procedures, triggers, and
    user-defined functions.
  version: '2018-12-31'
  contact:
    name: Microsoft Azure Support
    url: https://azure.microsoft.com/en-us/support/
    email: azuresupport@microsoft.com
  license:
    name: Microsoft API License
    url: https://learn.microsoft.com/en-us/legal/
  x-logo:
    url: https://azure.microsoft.com/svghandler/azure-logo.png
servers:
  - url: https://{accountName}.documents.azure.com
    description: Azure Cosmos DB account endpoint
    variables:
      accountName:
        default: mycosmosaccount
        description: The name of the Azure Cosmos DB account.
security:
  - masterKey: []
  - resourceToken: []
tags:
  - name: Databases
    description: Operations for managing Cosmos DB databases
  - name: Containers
    description: Operations for managing containers (collections)
  - name: Items
    description: Operations for managing items (documents)
  - name: Stored Procedures
    description: Operations for managing stored procedures
  - name: User Defined Functions
    description: Operations for managing user-defined functions
  - name: Triggers
    description: Operations for managing triggers
  - name: Users
    description: Operations for managing users
  - name: Permissions
    description: Operations for managing permissions
paths:
  /dbs:
    get:
      operationId: Databases_List
      summary: List databases
      description: Returns a list of databases under the database account.
      tags:
        - Databases
      parameters:
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/MaxItemCountParameter'
        - $ref: '#/components/parameters/ContinuationParameter'
      responses:
        '200':
          description: Successfully returned the list of databases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseListResult'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: Databases_Create
      summary: Create a database
      description: Creates a new database in the database account.
      tags:
        - Databases
      parameters:
        - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: The unique name that identifies the database.
              required:
                - id
      responses:
        '201':
          description: Successfully created the database.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '409':
          description: The database with the specified ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}:
    get:
      operationId: Databases_Get
      summary: Get a database
      description: Retrieves a database resource by its ID.
      tags:
        - Databases
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully returned the database.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '404':
          description: The database was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: Databases_Delete
      summary: Delete a database
      description: Deletes a database and all child resources (containers, items, etc.).
      tags:
        - Databases
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '204':
          description: Successfully deleted the database.
        '404':
          description: The database was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}/colls:
    get:
      operationId: Containers_List
      summary: List containers
      description: Returns a list of containers under the specified database.
      tags:
        - Containers
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/MaxItemCountParameter'
        - $ref: '#/components/parameters/ContinuationParameter'
      responses:
        '200':
          description: Successfully returned the list of containers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerListResult'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: Containers_Create
      summary: Create a container
      description: Creates a new container under the specified database.
      tags:
        - Containers
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerCreateRequest'
      responses:
        '201':
          description: Successfully created the container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Container'
        '409':
          description: The container with the specified ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}/colls/{containerId}:
    get:
      operationId: Containers_Get
      summary: Get a container
      description: Retrieves a container resource by its ID.
      tags:
        - Containers
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully returned the container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Container'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: Containers_Replace
      summary: Replace a container
      description: Replaces the entire container resource.
      tags:
        - Containers
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerCreateRequest'
      responses:
        '200':
          description: Successfully replaced the container.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Container'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: Containers_Delete
      summary: Delete a container
      description: Deletes a container and all contained items.
      tags:
        - Containers
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '204':
          description: Successfully deleted the container.
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}/colls/{containerId}/docs:
    get:
      operationId: Items_List
      summary: List items
      description: Returns a list of items (documents) under the specified container.
      tags:
        - Items
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/MaxItemCountParameter'
        - $ref: '#/components/parameters/ContinuationParameter'
        - $ref: '#/components/parameters/PartitionKeyParameter'
      responses:
        '200':
          description: Successfully returned the list of items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResult'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: Items_Create
      summary: Create an item
      description: Creates a new item (document) in the specified container.
      tags:
        - Items
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/PartitionKeyParameter'
        - name: x-ms-documentdb-is-upsert
          in: header
          description: If true, the operation will perform an upsert instead of create.
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The JSON document to create.
              properties:
                id:
                  type: string
                  description: The unique identifier of the item.
              required:
                - id
              additionalProperties: true
      responses:
        '201':
          description: Successfully created the item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '409':
          description: An item with the specified ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}/colls/{containerId}/docs/{itemId}:
    get:
      operationId: Items_Get
      summary: Get an item
      description: Retrieves an item (document) by its ID and partition key.
      tags:
        - Items
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - name: itemId
          in: path
          required: true
          description: The ID of the item.
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/PartitionKeyParameter'
      responses:
        '200':
          description: Successfully returned the item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: The item was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: Items_Replace
      summary: Replace an item
      description: Replaces the entire item (document).
      tags:
        - Items
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - name: itemId
          in: path
          required: true
          description: The ID of the item.
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/PartitionKeyParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The replacement JSON document.
              additionalProperties: true
      responses:
        '200':
          description: Successfully replaced the item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: Items_Delete
      summary: Delete an item
      description: Deletes an item (document) from the container.
      tags:
        - Items
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - name: itemId
          in: path
          required: true
          description: The ID of the item.
          schema:
            type: string
        - $ref: '#/components/parameters/ApiVersionParameter'
        - $ref: '#/components/parameters/PartitionKeyParameter'
      responses:
        '204':
          description: Successfully deleted the item.
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /dbs/{databaseId}/colls/{containerId}/sprocs:
    get:
      operationId: StoredProcedures_List
      summary: List stored procedures
      description: Returns a list of stored procedures under the specified container.
      tags:
        - Stored Procedures
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully returned the list of stored procedures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredProcedureListResult'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: StoredProcedures_Create
      summary: Create a stored procedure
      description: Creates a new stored procedure in the specified container.
      tags:
        - Stored Procedures
      parameters:
        - $ref: '#/components/parameters/DatabaseIdParameter'
        - $ref: '#/components/parameters/ContainerIdParameter'
        - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoredProcedureCreateRequest'
      responses:
        '201':
          description: Successfully created the stored procedure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredProcedure'
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    masterKey:
      type: apiKey
      name: Authorization
      in: header
      description: >-
        Cosmos DB master key authorization. The authorization token is a
        hash-based message authentication code (HMAC) constructed from the
        request using the master key.
    resourceToken:
      type: apiKey
      name: Authorization
      in: header
      description: >-
        Cosmos DB resource token for fine-grained access control to specific
        resources.
  parameters:
    ApiVersionParameter:
      name: x-ms-version
      in: header
      required: true
      description: The version of the Cosmos DB REST API.
      schema:
        type: string
        default: '2018-12-31'
    DatabaseIdParameter:
      name: databaseId
      in: path
      required: true
      description: The ID of the database.
      schema:
        type: string
    ContainerIdParameter:
      name: containerId
      in: path
      required: true
      description: The ID of the container (collection).
      schema:
        type: string
    MaxItemCountParameter:
      name: x-ms-max-item-count
      in: header
      description: >-
        The maximum number of items to return per page. Default is 100, maximum is 1000.
      schema:
        type: integer
        default: 100
        maximum: 1000
    ContinuationParameter:
      name: x-ms-continuation
      in: header
      description: A continuation token returned from a previous request for pagination.
      schema:
        type: string
    PartitionKeyParameter:
      name: x-ms-documentdb-partitionkey
      in: header
      description: >-
        The partition key value for the requested item. Must be a JSON array with
        a single value, e.g., ["partitionKeyValue"].
      schema:
        type: string
  schemas:
    Database:
      type: object
      description: A Cosmos DB database resource.
      properties:
        id:
          type: string
          description: The unique name that identifies the database.
        _rid:
          type: string
          readOnly: true
          description: System-generated resource ID.
        _ts:
          type: integer
          readOnly: true
          description: System-generated timestamp (epoch value).
        _self:
          type: string
          readOnly: true
          description: System-generated URI for the resource.
        _etag:
          type: string
          readOnly: true
          description: System-generated resource etag for optimistic concurrency.
        _colls:
          type: string
          readOnly: true
          description: System-generated addressable path for the collections resource.
        _users:
          type: string
          readOnly: true
          description: System-generated addressable path for the users resource.
      required:
        - id
    DatabaseListResult:
      type: object
      description: List of Cosmos DB databases.
      properties:
        _rid:
          type: string
          readOnly: true
          description: The resource ID.
        Databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
          description: List of databases.
        _count:
          type: integer
          readOnly: true
          description: The number of databases returned.
    Container:
      type: object
      description: A Cosmos DB container (collection) resource.
      properties:
        id:
          type: string
          description: The unique name that identifies the container.
        indexingPolicy:
          $ref: '#/components/schemas/IndexingPolicy'
        partitionKey:
          $ref: '#/components/schemas/PartitionKeyDefinition'
        uniqueKeyPolicy:
          $ref: '#/components/schemas/UniqueKeyPolicy'
        conflictResolutionPolicy:
          $ref: '#/components/schemas/ConflictResolutionPolicy'
        defaultTtl:
          type: integer
          description: Default time-to-live in seconds. -1 means items never expire.
        _rid:
          type: string
          readOnly: true
          description: System-generated resource ID.
        _ts:
          type: integer
          readOnly: true
          description: System-generated timestamp.
        _self:
          type: string
          readOnly: true
          description: System-generated URI for the resource.
        _etag:
          type: string
          readOnly: true
          description: System-generated resource etag.
        _docs:
          type: string
          readOnly: true
          description: Addressable path for the documents resource.
        _sprocs:
          type: string
          readOnly: true
          description: Addressable path for the stored procedures resource.
        _triggers:
          type: string
          readOnly: true
          description: Addressable path for the triggers resource.
        _udfs:
          type: string
          readOnly: true
          description: Addressable path for the user-defined functions resource.
      required:
        - id
        - partitionKey
    ContainerCreateRequest:
      type: object
      description: Request body for creating or replacing a container.
      properties:
        id:
          type: string
          description: The unique name that identifies the container.
        indexingPolicy:
          $ref: '#/components/schemas/IndexingPolicy'
        partitionKey:
          $ref: '#/components/schemas/PartitionKeyDefinition'
        uniqueKeyPolicy:
          $ref: '#/components/schemas/UniqueKeyPolicy'
        conflictResolutionPolicy:
          $ref: '#/components/schemas/ConflictResolutionPolicy'
        defaultTtl:
          type: integer
          description: Default time-to-live in seconds.
      required:
        - id
        - partitionKey
    ContainerListResult:
      type: object
      description: List of Cosmos DB containers.
      properties:
        _rid:
          type: string
          readOnly: true
        DocumentCollections:
          type: array
          items:
            $ref: '#/components/schemas/Container'
          description: List of containers.
        _count:
          type: integer
          readOnly: true
    IndexingPolicy:
      type: object
      description: The indexing policy for a container.
      properties:
        automatic:
          type: boolean
          default: true
          description: Whether indexing is automatic.
        indexingMode:
          type: string
          enum:
            - consistent
            - lazy
            - none
          default: consistent
          description: The indexing mode.
        includedPaths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: The path to be indexed.
          description: Paths to include in indexing.
        excludedPaths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: The path to be excluded from indexing.
          description: Paths to exclude from indexing.
        compositeIndexes:
          type: array
          items:
            type: array
            items:
              type: object
              properties:
                path:
                  type: string
                order:
                  type: string
                  enum:
                    - ascending
                    - descending
          description: Composite indexes for the container.
        spatialIndexes:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              types:
                type: array
                items:
                  type: string
                  enum:
                    - Point
                    - Polygon
                    - MultiPolygon
                    - LineString
          description: Spatial indexes for the container.
    PartitionKeyDefinition:
      type: object
      description: The partition key definition.
      properties:
        paths:
          type: array
          items:
            type: string
          description: List of paths using which data within the container can be partitioned.
        kind:
          type: string
          enum:
            - Hash
            - Range
            - MultiHash
          default: Hash
          description: The algorithm used for partitioning.
        version:
          type: integer
          enum:
            - 1
            - 2
          description: The version of the partition key definition.
      required:
        - paths
    UniqueKeyPolicy:
      type: object
      description: The unique key policy configuration.
      properties:
        uniqueKeys:
          type: array
          items:
            type: object
            properties:
              paths:
                type: array
                items:
                  type: string
                description: Paths that must be unique.
          description: List of unique keys for the container.
    ConflictResolutionPolicy:
      type: object
      description: The conflict resolution policy.
      properties:
        mode:
          type: string
          enum:
            - LastWriterWins
            - Custom
          default: LastWriterWins
          description: The conflict resolution mode.
        conflictResolutionPath:
          type: string
          description: The path for the last-writer-wins conflict resolution.
        conflictResolutionProcedure:
          type: string
          description: The stored procedure for custom conflict resolution.
    Item:
      type: object
      description: A Cosmos DB item (document).
      properties:
        id:
          type: string
          description: The unique identifier of the item.
        _rid:
          type: string
          readOnly: true
          description: System-generated resource ID.
        _ts:
          type: integer
          readOnly: true
          description: System-generated timestamp.
        _self:
          type: string
          readOnly: true
          description: System-generated URI for the resource.
        _etag:
          type: string
          readOnly: true
          description: System-generated resource etag.
        _attachments:
          type: string
          readOnly: true
          description: Addressable path for the attachments resource.
      additionalProperties: true
      required:
        - id
    ItemListResult:
      type: object
      description: List of Cosmos DB items.
      properties:
        _rid:
          type: string
          readOnly: true
        Documents:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: List of items.
        _count:
          type: integer
          readOnly: true
    StoredProcedure:
      type: object
      description: A Cosmos DB stored procedure.
      properties:
        id:
          type: string
          description: The unique name of the stored procedure.
        body:
          type: string
          description: The body of the stored procedure (JavaScript function).
        _rid:
          type: string
          readOnly: true
        _ts:
          type: integer
          readOnly: true
        _self:
          type: string
          readOnly: true
        _etag:
          type: string
          readOnly: true
      required:
        - id
        - body
    StoredProcedureCreateRequest:
      type: object
      description: Request body for creating a stored procedure.
      properties:
        id:
          type: string
          description: The unique name of the stored procedure.
        body:
          type: string
          description: The body of the stored procedure (JavaScript function).
      required:
        - id
        - body
    StoredProcedureListResult:
      type: object
      description: List of Cosmos DB stored procedures.
      properties:
        _rid:
          type: string
          readOnly: true
        StoredProcedures:
          type: array
          items:
            $ref: '#/components/schemas/StoredProcedure'
          description: List of stored procedures.
        _count:
          type: integer
          readOnly: true
    ErrorResponse:
      type: object
      description: Error response from Cosmos DB.
      properties:
        code:
          type: string
          description: The error code.
        message:
          type: string
          description: The error message.
      required:
        - code
        - message
