paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.DataBoxEdge/availableSkus:
    get:
      tags:
      - AvailableSkus
      summary: Microsoft Azure List All The Available Skus And Information Related To Them
      operationId: microsoftAzureAvailableskusList
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
