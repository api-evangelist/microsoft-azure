swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector TcbBaseline API
schemes:
- https
tags:
- name: TcbBaseline
paths:
  /tcbbaselines/{attestationType}:
    get:
      tags:
      - TcbBaseline
      summary: Microsoft Azure Retrieves A List Of All Azure Supported Baseline Details For The A Tee Type Along With An Indication Of Which One Is In Enforced For The Attestation Provider
      operationId: microsoftAzureTcbbaselinesGet
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/AttestationType'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/TcbBaselineResult'
        default:
          description: Error response describing why the operation failed
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        Get TcbBaselines:
          $ref: ./examples/Get_TcbBaselines.json
      description: Needs a more full description created.
definitions:
  TcbBaselineResult:
    type: object
    properties:
      tcbBaselines:
        type: array
        description: A list of all Azure supported baseline details for the a TEE type along with an indication of which one is in enforced for the attestation provider
        items:
          $ref: '#/definitions/TcbBaseline'
    description: A list of all Azure supported baseline details for the a TEE type along with an indication of which one is in enforced for the attestation provider
  TcbBaseline:
    type: object
    description: TEE specific Tcb baseline used in attestation, and baseline details including baseline identifier, release date and minimum required software version
    properties:
      tcbIdentifier:
        description: The Tcb baseline Identifier used in attestation policy
        type: string
      tcbEvaluationDataNumber:
        description: A monotonically increasing sequence number changed when Intel updates the content of the TCB evaluation data set. SGX TEE specific property
        type: integer
        format: int32
      tcbReleaseDate:
        description: Date and time when the Tcb is released. SGX TEE specific property
        type: string
        format: date-time
      minimumPswLinuxVersion:
        description: Minimum Linux PSW version required to support the corresponding Tcb baseline. SGX TEE specific property
        type: string
      minimumPswWindowsVersion:
        description: Minimum Windows PSW version required to support the corresponding Tcb baseline. SGX TEE specific property
        type: string
      isSelectedTcb:
        description: The corresponding Tcb baseline is set in attestation policy and is used in attestation request if set to true
        type: boolean
  CloudError:
    x-ms-external: true
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
    description: An error response from Attestation.
  CloudErrorBody:
    x-ms-external: true
    properties:
      code:
        type: string
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
      message:
        type: string
        description: A message describing the error, intended to be suitable for displaying in a user interface.
    description: An error response from Attestation.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client API version. Current version is 2022-09-01-preview
  AttestationType:
    description: Specifies the trusted execution environment to be used to validate the evidence
    name: attestationType
    in: path
    type: string
    required: true
    x-ms-parameter-location: method
    x-ms-enum:
      name: AttestationType
      modelAsString: true
      values:
      - value: SgxEnclave
        description: Intel Software Guard eXtensions
      - value: OpenEnclave
        description: OpenEnclave extensions to SGX
      - value: SevSnpVm
        description: AMD SEV SNP Virtual Machine
      - value: Tpm
        description: Edge TPM Virtualization Based Security
    enum:
    - SgxEnclave
    - OpenEnclave
    - SevSnpVm
    - Tpm
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
