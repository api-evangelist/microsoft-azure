    enum:
    - server_error
    - rate_limit_exceeded
    x-ms-enum:
      name: RunStepErrorCode
      modelAsString: true
      values:
      - name: serverError
        value: server_error
        description: Represents a server error.
      - name: rateLimitExceeded
        value: rate_limit_exceeded
        description: Represents an error indicating configured rate limits were exceeded.
  ChatThreadsItemCollection:
    description: Collection of chat threads.
    required:
    - value
    type: object
    properties:
      value:
        description: Collection of chat threads.
        type: array
        items:
          $ref: '#/definitions/ChatThreadItem'
      nextLink:
        description: If there are more chat threads that can be retrieved, the next link will be populated.
        type: string
        readOnly: true
  RunStepStatus:
    type: string
    description: Possible values for the status of a run step.
    enum:
    - in_progress
    - cancelled
    - failed
    - completed
    - expired
    x-ms-enum:
      name: RunStepStatus
      modelAsString: true
      values:
      - name: inProgress
        value: in_progress
        description: Represents a run step still in progress.
      - name: cancelled
        value: cancelled
        description: Represents a run step that was cancelled.
      - name: failed
        value: failed
        description: Represents a run step that failed.
      - name: completed
        value: completed
        description: Represents a run step that successfully completed.
      - name: expired
        value: expired
        description: Represents a run step that expired before otherwise finishing.
  RunStepError:
    type: object
    description: The error information associated with a failed run step.
    properties:
      code:
        $ref: '#/definitions/RunStepErrorCode'
        description: The error code for this error.
      message:
