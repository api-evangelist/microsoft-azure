      operationId: microsoftAzureChatthreadSendchatreadreceipt
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: chatThreadId
        description: Thread id to send the read receipt event to.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      - in: body
        name: sendReadReceiptRequest
