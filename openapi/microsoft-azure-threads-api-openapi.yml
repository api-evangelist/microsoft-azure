definitions:
  RunError:
    type: object
    description: The details of an error as encountered by an assistant thread run.
    properties:
      code:
        type: string
        description: The status for the error.
      message:
        type: string
        description: The human-readable text associated with the error.
    required:
    - code
    - message
  CommunicationErrorResponse:
    $ref: ../../../Common/stable/2023-11-15/common.json#/definitions/CommunicationErrorResponse
  RunStep:
    type: object
    description: Detailed information about a single step of an assistant thread run.
    properties:
      id:
        type: string
        description: The identifier, which can be referenced in API endpoints.
      object:
        type: string
        description: The object type, which is always 'thread.run.step'.
        enum:
        - thread.run.step
        x-ms-enum:
          modelAsString: false
      type:
        $ref: '#/definitions/RunStepType'
        description: The type of run step, which can be either message_creation or tool_calls.
      assistant_id:
        type: string
        description: The ID of the assistant associated with the run step.
        x-ms-client-name: assistantId
      thread_id:
        type: string
        description: The ID of the thread that was run.
        x-ms-client-name: threadId
      run_id:
        type: string
        description: The ID of the run that this run step is a part of.
        x-ms-client-name: runId
      status:
        $ref: '#/definitions/RunStepStatus'
        description: The status of this run step.
      step_details:
        $ref: '#/definitions/RunStepDetails'
        description: The details for this run step.
        x-ms-client-name: stepDetails
      last_error:
        type: object
        description: If applicable, information about the last error encountered by this run step.
        x-nullable: true
        allOf:
        - $ref: '#/definitions/RunStepError'
        x-ms-client-name: lastError
      created_at:
        type: integer
        format: unixtime
        description: The Unix timestamp, in seconds, representing when this object was created.
        x-ms-client-name: createdAt
      expired_at:
        type: string
        format: date-time
        description: The Unix timestamp, in seconds, representing when this item expired.
        x-nullable: true
        x-ms-client-name: expiredAt
      completed_at:
        type: string
        format: date-time
        description: The Unix timestamp, in seconds, representing when this completed.
        x-nullable: true
        x-ms-client-name: completedAt
      cancelled_at:
        type: string
        format: date-time
        description: The Unix timestamp, in seconds, representing when this was cancelled.
        x-nullable: true
        x-ms-client-name: cancelledAt
      failed_at:
        type: string
        format: date-time
        description: The Unix timestamp, in seconds, representing when this failed.
        x-nullable: true
        x-ms-client-name: failedAt
      metadata:
        type: object
        description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length.
        x-nullable: true
        additionalProperties:
          type: string
    required:
    - id
    - object
    - type
    - assistant_id
    - thread_id
    - run_id
    - status
    - step_details
    - last_error
    - created_at
    - expired_at
    - completed_at
    - cancelled_at
    - failed_at
    - metadata
  ToolDefinition:
    type: object
    description: An abstract representation of an input tool definition that an assistant can use.
    properties:
      type:
        type: string
        description: The object type.
    discriminator: type
    required:
    - type
  MessageRole:
    type: string
    description: The possible values for roles attributed to messages in a thread.
    enum:
    - user
    - assistant
    x-ms-enum:
      name: MessageRole
      modelAsString: true
      values:
      - name: user
        value: user
        description: The role representing the end-user.
      - name: assistant
        value: assistant
        description: The role representing the assistant.
  ChatThreadProperties:
    description: Chat thread.
    required:
    - createdByCommunicationIdentifier
    - createdOn
    - id
    - topic
    type: object
    properties:
      id:
        description: Chat thread id.
        type: string
        example: 19:uni01_uy5ucb66ugp3lrhe7pxso6xx4hsmm3dl6eyjfefv2n6x3rrurpea@thread.v2
      topic:
        description: Chat thread topic.
        type: string
        example: Lunch Chat thread
      createdOn:
        format: date-time
        description: 'The timestamp when the chat thread was created. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
        type: string
        example: '2020-10-30T10:50:50Z'
      createdByCommunicationIdentifier:
        $ref: '#/definitions/CommunicationIdentifierModel'
      deletedOn:
        format: date-time
        description: 'The timestamp when the chat thread was deleted. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
        type: string
        example: '2020-10-30T10:50:50Z'
      metadata:
        description: Contextual metadata for the thread. The metadata consists of name/value pairs. The total size of all metadata pairs can be up to 1KB in size.
        type: object
        additionalProperties:
          type: string
      retentionPolicy:
        $ref: '#/definitions/ChatRetentionPolicy'
  ChatThreadItem:
    description: Summary information of a chat thread.
    required:
    - id
    - topic
    type: object
    properties:
      id:
        description: Chat thread id.
        type: string
        example: 19:uni01_uy5ucb66ugp3lrhe7pxso6xx4hsmm3dl6eyjfefv2n6x3rrurpea@thread.v2
      topic:
        description: Chat thread topic.
        type: string
        example: Lunch Chat thread
      deletedOn:
        format: date-time
        description: 'The timestamp when the chat thread was deleted. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
        type: string
        example: '2020-10-30T10:50:50Z'
      lastMessageReceivedOn:
        format: date-time
        description: 'The timestamp when the last message arrived at the server. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
        type: string
        readOnly: true
        example: '2020-10-30T10:50:50Z'
  ChatParticipant:
    description: A participant of the chat thread.
    required:
    - communicationIdentifier
    type: object
    properties:
      communicationIdentifier:
        $ref: '#/definitions/CommunicationIdentifierModel'
      displayName:
        description: Display name for the chat participant.
        type: string
        example: Bob
      shareHistoryTime:
        format: date-time
        description: 'Time from which the chat history is shared with the participant. The timestamp is in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
        type: string
        example: '2020-10-30T10:50:50Z'
      metadata:
        description: Contextual metadata for the chat participant. The metadata consists of name/value pairs. The total size of all metadata pairs can be up to 1KB in size.
        type: object
        additionalProperties:
          type: string
  RequiredAction:
    type: object
    description: An abstract representation of a required action for an assistant thread run to continue.
    properties:
      type:
        type: string
        description: The object type.
    discriminator: type
    required:
    - type
  AssistantThread:
    type: object
    description: Information about a single thread associated with an assistant.
    properties:
      id:
        type: string
        description: The identifier, which can be referenced in API endpoints.
      object:
        type: string
        description: The object type, which is always 'thread'.
        enum:
        - thread
        x-ms-enum:
          modelAsString: false
      created_at:
        type: integer
        format: unixtime
        description: The Unix timestamp, in seconds, representing when this object was created.
        x-ms-client-name: createdAt
      metadata:
        type: object
        description: A set of up to 16 key/value pairs that can be attached to an object, used for storing additional information about that object in a structured format. Keys may be up to 64 characters in length and values may be up to 512 characters in length.
        x-nullable: true
        additionalProperties:
          type: string
    required:
    - id
    - object
    - created_at
    - metadata
  ThreadDeletionStatus:
    type: object
    description: The status of a thread deletion operation.
    properties:
      id:
        type: string
        description: The ID of the resource specified for deletion.
      deleted:
        type: boolean
        description: A value indicating whether deletion was successful.
      object:
        type: string
        description: The object type, which is always 'thread.deleted'.
        enum:
        - thread.deleted
        x-ms-enum:
          modelAsString: false
    required:
    - id
    - deleted
    - object
  UpdateChatThreadRequest:
    description: Request payload for updating a chat thread.
    type: object
    properties:
      topic:
        description: Chat thread topic.
        type: string
        example: Lunch Thread
      metadata:
        description: Contextual metadata for the thread. The metadata consists of name/value pairs. The total size of all metadata pairs can be up to 1KB in size.
        type: object
        additionalProperties:
          type: string
      retentionPolicy:
        $ref: '#/definitions/ChatRetentionPolicy'
  RunStatus:
    type: string
    description: Possible values for the status of an assistant thread run.
    enum:
    - queued
    - in_progress
    - requires_action
    - cancelling
    - cancelled
    - failed
    - completed
    - expired
    x-ms-enum:
      name: RunStatus
      modelAsString: true
      values:
      - name: queued
        value: queued
        description: Represents a run that is queued to start.
      - name: inProgress
        value: in_progress
        description: Represents a run that is in progress.
      - name: requiresAction
        value: requires_action
        description: Represents a run that needs another operation, such as tool output submission, to continue.
      - name: cancelling
        value: cancelling
        description: Represents a run that is in the process of cancellation.
      - name: cancelled
        value: cancelled
        description: Represents a run that has been cancelled.
      - name: failed
        value: failed
        description: Represents a run that failed.
      - name: completed
        value: completed
        description: Represents a run that successfully completed.
      - name: expired
        value: expired
        description: Represents a run that expired before it could otherwise finish.
  CreateChatThreadResult:
    description: Result of the create chat thread operation.
    type: object
    properties:
      chatThread:
        $ref: '#/definitions/ChatThreadProperties'
      invalidParticipants:
        description: The participants that failed to be added to the chat thread.
        type: array
        items:
          $ref: '#/definitions/CommunicationError'
        readOnly: true
  CommunicationError:
    $ref: ../../../Common/stable/2023-11-15/common.json#/definitions/CommunicationError
  RunStepErrorCode:
    type: string
