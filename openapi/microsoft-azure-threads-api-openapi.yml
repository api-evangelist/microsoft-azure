  RunStepType:
    type: string
    description: The possible types of run steps.
    enum:
    - message_creation
    - tool_calls
    x-ms-enum:
      name: RunStepType
      modelAsString: true
      values:
      - name: messageCreation
        value: message_creation
        description: Represents a run step to create a message.
      - name: toolCalls
        value: tool_calls
        description: Represents a run step that calls tools.
  CommunicationIdentifierModel:
    $ref: ../../../Common/stable/2023-11-15/common.json#/definitions/CommunicationIdentifierModel
  RunStepDetails:
    type: object
