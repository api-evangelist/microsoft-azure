swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Service Health: API'
schemes:
- https
tags:
- name: 'Service Health:'
paths:
  /healthstatus:
    get:
      tags:
      - 'Service Health:'
      summary: Microsoft Azure Returns The Overall Health Of The Service And Optionally Of The Different Subcomponents
      operationId: microsoftAzureGethealthstatus
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ServiceHealth'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Gets the health status:
          $ref: examples/get_healthstatus.json
      description: Needs a more full description created.
