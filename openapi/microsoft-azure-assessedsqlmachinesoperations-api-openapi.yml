        nextLinkName: nextLink
      x-ms-examples:
        AssessedSqlMachinesOperations_ListBySqlAssessmentV2_MaximumSet_Gen:
          $ref: ./examples/AssessedSqlMachinesOperations_ListBySqlAssessmentV2_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Groups Groupname Sqlassessments Assessmentname Assessedsqlmachines
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/groups/{groupName}/sqlAssessments/{assessmentName}/assessedSqlMachines/{assessedSqlMachineName}
  : get:
      operationId: microsoftAzureAssessedsqlmachinesoperationsGet
      tags:
      - AssessedSqlMachinesOperations
      description: Get a AssessedSqlMachine
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: groupName
        in: path
        description: Group ARM name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: assessmentName
        in: path
        description: SQL Assessment arm name.
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: assessedSqlMachineName
        in: path
        description: Sql assessment Assessed Machine ARM name.
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/AssessedSqlMachine'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        AssessedSqlMachinesOperations_Get_MaximumSet_Gen:
