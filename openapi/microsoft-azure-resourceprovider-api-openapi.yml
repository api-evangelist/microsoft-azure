swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ResourceProvider API
schemes:
- https
tags:
- name: ResourceProvider
paths:
  /providers/Microsoft.StorageSync/operations:
    get:
      tags:
      - ResourceProvider
      operationId: microsoftAzureOperationsList
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      description: Lists all of the available Storage Sync Rest API operations.
      x-ms-examples:
        Operations_List:
          $ref: ./examples/Operations_List.json
      responses:
        '200':
          description: Array of operations resources in the Resource Provider
          schema:
            $ref: '#/definitions/OperationEntityListResult'
          headers:
            x-ms-request-id:
              description: request id.
              type: string
            x-ms-correlation-request-id:
              description: correlation request id.
              type: string
        default:
          description: Error message indicating why the operation failed.
          schema:
            $ref: '#/definitions/StorageSyncError'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Providers Microsoft Storagesync Operations
definitions:
  OperationEntity:
    description: The operation supported by storage sync.
    type: object
    properties:
      name:
        description: 'Operation name: {provider}/{resource}/{operation}.'
        type: string
      display:
        $ref: '#/definitions/OperationDisplayInfo'
        description: The operation supported by storage sync.
      origin:
        type: string
        description: The origin.
      properties:
        $ref: '#/definitions/OperationProperties'
        description: Properties of the operations resource.
  OperationProperties:
    type: object
    description: Properties of the operations resource.
    properties:
      serviceSpecification:
        $ref: '#/definitions/OperationResourceServiceSpecification'
        description: Service specification for the operations resource.
  StorageSyncError:
    type: object
    description: Error type
    properties:
      error:
        $ref: '#/definitions/StorageSyncApiError'
        description: Error details of the given entry.
      innererror:
        $ref: '#/definitions/StorageSyncApiError'
        description: Error details of the given entry.
  StorageSyncApiError:
    type: object
    description: Error type
    properties:
      code:
        type: string
        description: Error code of the given entry.
      message:
        type: string
        description: Error message of the given entry.
      target:
        type: string
        description: Target of the given error entry.
      details:
        $ref: '#/definitions/StorageSyncErrorDetails'
        description: Error details of the given entry.
      innererror:
        $ref: '#/definitions/StorageSyncInnerErrorDetails'
        description: Inner error details of the given entry.
  OperationResourceMetricSpecification:
    type: object
    description: Operation Display Resource object.
    properties:
      name:
        type: string
        description: Name of the metric.
      displayName:
        type: string
        description: Display name for the metric.
      displayDescription:
        type: string
        description: Display description for the metric.
      unit:
        type: string
        description: Unit for the metric.
      aggregationType:
        type: string
        description: Aggregation type for the metric.
      supportedAggregationTypes:
        description: Supported aggregation types for the metric.
        type: array
        items:
          type: string
        x-ms-identifiers: []
      fillGapWithZero:
        type: boolean
        description: Fill gaps in the metric with zero.
      lockAggregationType:
        type: string
        description: Lock Aggregation type for the metric.
      dimensions:
        type: array
        items:
          $ref: '#/definitions/OperationResourceMetricSpecificationDimension'
        x-ms-identifiers:
        - name
        description: Dimensions for the metric specification.
  OperationResourceServiceSpecification:
    type: object
    description: Service specification.
    properties:
      metricSpecifications:
        type: array
        items:
          $ref: '#/definitions/OperationResourceMetricSpecification'
        x-ms-identifiers:
        - name
        description: List of metric specifications.
  StorageSyncErrorDetails:
    type: object
    description: Error Details object.
    properties:
      code:
        type: string
        description: Error code of the given entry.
      message:
        type: string
        description: Error message of the given entry.
      target:
        type: string
        description: Target of the given entry.
      requestUri:
        type: string
        description: Request URI of the given entry.
      exceptionType:
        type: string
        description: Exception type of the given entry.
      httpMethod:
        type: string
        description: HTTP method of the given entry.
      hashedMessage:
        type: string
        description: Hashed message of the given entry.
      httpErrorCode:
        type: string
        description: HTTP error code of the given entry.
  StorageSyncInnerErrorDetails:
    type: object
    description: Error Details object.
    properties:
      callStack:
        type: string
        description: Call stack of the error.
      message:
        type: string
        description: Error message of the error.
      innerException:
        type: string
        description: Exception of the inner error.
      innerExceptionCallStack:
        type: string
        description: Call stack of the inner error.
  OperationDisplayInfo:
    description: The operation supported by storage sync.
    type: object
    properties:
      description:
        description: The description of the operation.
        type: string
      operation:
        description: The action that users can perform, based on their permission level.
        type: string
      provider:
        description: 'Service provider: Microsoft StorageSync.'
        type: string
      resource:
        description: Resource on which the operation is performed.
        type: string
  OperationResourceMetricSpecificationDimension:
    type: object
    description: OperationResourceMetricSpecificationDimension object.
    properties:
      name:
        type: string
        description: Name of the dimension.
      displayName:
        type: string
        description: Display name of the dimensions.
      toBeExportedForShoebox:
        type: boolean
        description: Indicates metric should be exported for Shoebox.
  OperationEntityListResult:
    description: The list of storage sync operations.
    type: object
    properties:
      nextLink:
        description: The link used to get the next page of operations.
        type: string
      value:
        description: The list of operations.
        type: array
        items:
          $ref: '#/definitions/OperationEntity'
        x-ms-identifiers:
        - name
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
