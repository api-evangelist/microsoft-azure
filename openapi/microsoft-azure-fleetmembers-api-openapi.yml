        nextLinkName: nextLink
      x-ms-examples:
        Lists the members of a fleet.:
          $ref: ./examples/FleetMembers_List.json
      description: Needs a more full description created.
definitions:
  FleetMemberProperties_2:
    type: object
    description: A member of the Fleet. It contains a reference to an existing Kubernetes cluster on Azure.
    properties:
      clusterResourceId:
        $ref: '#/definitions/ClusterResourceId'
        description: 'The ARM resource id of the cluster that joins the Fleet. Must be a valid Azure resource id. e.g.: ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/managedClusters/{clusterName}''.'
        x-ms-mutability:
        - read
        - create
      group:
        type: string
        description: The group this member belongs to for multi-cluster update management.
        minLength: 1
        maxLength: 50
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      provisioningState:
        $ref: '#/definitions/FleetMemberProvisioningState'
        description: The status of the last operation.
        readOnly: true
    required:
    - clusterResourceId
  FleetMemberProvisioningState:
    type: string
    description: The provisioning state of the last accepted operation.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Joining
    - Leaving
    - Updating
    x-ms-enum:
      name: FleetMemberProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Joining
        value: Joining
        description: The provisioning state of a member joining a fleet.
      - name: Leaving
        value: Leaving
        description: The provisioning state of a member leaving a fleet.
      - name: Updating
        value: Updating
        description: The provisioning state of a member being updated.
    readOnly: true
  FleetMembersListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/FleetMember'
        description: The list of members in a given Fleet.
      nextLink:
        readOnly: true
        type: string
        description: The URL to get the next page of Fleet members.
    description: The response from the List FleetMembers operation.
  FleetMember_2:
    type: object
    description: A member of the Fleet. It contains a reference to an existing Kubernetes cluster on Azure.
    properties:
      properties:
        $ref: '#/definitions/FleetMemberProperties_2'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
      eTag:
        type: string
        description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention.  Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        readOnly: true
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
  FleetMember:
    type: object
    description: A member of the Fleet. It contains a reference to an existing Kubernetes cluster on Azure.
    properties:
      properties:
        description: Properties of a Fleet member.
        $ref: '#/definitions/FleetMemberProperties'
        x-ms-client-flatten: true
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/AzureEntityResource
  FleetMemberProperties:
    description: Properties of a Fleet member.
    type: object
    properties:
      clusterResourceId:
        type: string
        x-ms-mutability:
        - read
        - create
        description: 'The ARM resource id of the cluster that joins the Fleet. Must be a valid Azure resource id. e.g.: ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/managedClusters/{clusterName}''.'
      provisioningState:
        readOnly: true
        type: string
        x-ms-enum:
          name: FleetMemberProvisioningState
          modelAsString: true
        enum:
        - Succeeded
        - Failed
        - Canceled
        - Joining
        - Leaving
        - Updating
        description: The provisioning state of the last accepted operation.
  ClusterResourceId:
    type: string
    format: arm-id
    description: A type definition that refers the id to an Azure Resource Manager resource.
    x-ms-arm-id-details:
      allowedResources:
      - type: Microsoft.ContainerService/managedClusters
  FleetMemberUpdate:
    type: object
    description: The type used for update operations of the FleetMember.
    properties:
      properties:
        $ref: '#/definitions/FleetMemberUpdateProperties'
        x-ms-client-flatten: true
  FleetMemberUpdateProperties:
    type: object
    description: The updatable properties of the FleetMember.
    properties:
      group:
        type: string
        description: The group this member belongs to for multi-cluster update management.
        minLength: 1
        maxLength: 50
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
