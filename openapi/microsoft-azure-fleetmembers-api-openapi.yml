  : put:
      tags:
      - FleetMembers
      operationId: microsoftAzureFleetmembersCreateorupdate
      summary: Microsoft Azure Creates Or Updates A Fleet Member
      description: A member contains a reference to an existing Kubernetes cluster. Creating a member makes the referenced cluster join the Fleet.
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
