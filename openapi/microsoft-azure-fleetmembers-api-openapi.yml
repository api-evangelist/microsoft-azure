      - $ref: '#/parameters/FleetNameParameter'
      - $ref: '#/parameters/FleetMemberNameParameter'
      - $ref: '#/parameters/IfMatchHeader'
      - $ref: '#/parameters/IfNoneMatchHeader'
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/FleetMember'
        description: The Fleet member to create or update.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/FleetMember'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/FleetMember'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: true
      x-ms-examples:
        Create a fleet member resource. Joins an existing cluster to the fleet:
          $ref: ./examples/FleetMembers_Create.json
    get:
      tags:
      - FleetMembers
      operationId: microsoftAzureFleetmembersGet
      summary: Microsoft Azure Gets A Fleet Member
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/FleetNameParameter'
      - $ref: '#/parameters/FleetMemberNameParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/FleetMember'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Gets a fleet member resource.:
          $ref: ./examples/FleetMembers_Get.json
      description: Needs a more full description created.
    delete:
      tags:
      - FleetMembers
      operationId: microsoftAzureFleetmembersDelete
      summary: Microsoft Azure Deletes A Fleet Member
      description: Deleting a Fleet member results in the member cluster leaving fleet. The Member azure resource is deleted upon success. The underlying cluster is not deleted.
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/FleetNameParameter'
      - $ref: '#/parameters/FleetMemberNameParameter'
      - $ref: '#/parameters/IfMatchHeader'
      responses:
        '200':
          description: OK
        '202':
          description: Accepted
        '204':
          description: NoContent
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Deletes a fleet member resource.:
          $ref: ./examples/FleetMembers_Delete.json
    patch:
      operationId: microsoftAzureFleetmembersUpdate
      tags:
      - FleetMembers
      description: Update a FleetMember
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: If-Match
        in: header
        description: The request should only proceed if an entity matches this string.
        required: false
        type: string
        x-ms-client-name: ifMatch
      - name: fleetName
        in: path
        description: The name of the Fleet resource.
        required: true
        type: string
        minLength: 1
        maxLength: 63
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      - name: fleetMemberName
        in: path
        description: The name of the Fleet member resource.
        required: true
        type: string
        minLength: 1
        maxLength: 50
        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
      - name: properties
        in: body
        description: The resource properties to be updated.
        required: true
        schema:
          $ref: '#/definitions/FleetMemberUpdate'
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/FleetMember_2'
        '202':
          description: Resource update request accepted.
          headers:
            Location:
              type: string
              description: The Location header contains the URL where the status of the long running operation can be checked.
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Updates a FleetMember resource synchronously.:
          $ref: ./examples/FleetMembers_Update.json
      x-ms-long-running-operation-options:
        final-state-via: original-uri
      x-ms-long-running-operation: true
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Containerservice Fleets Fleetname Members Fleetmembername
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/fleets/{fleetName}/members
