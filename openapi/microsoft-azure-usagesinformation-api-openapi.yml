        type: string
        readOnly: true
      name:
        description: The resource name.
        type: string
        readOnly: true
      properties:
        description: Usage properties for the specified resource.
        $ref: '#/definitions/UsagesProperties'
  ResourceTypesName:
    description: Resource types. For extensibility, it is a string. Optional field.
    readOnly: false
