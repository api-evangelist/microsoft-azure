swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Proxy API
schemes:
- https
tags:
- name: Proxy
paths:
  /providers/Microsoft.HealthcareApis/operations:
    get:
      tags:
      - Proxy
      description: Lists all of the available Healthcare service REST API operations.
      operationId: microsoftAzureOperationsList
      x-ms-examples:
        OperationsList:
          $ref: ./examples/OperationsList.json
      x-ms-pageable:
        nextLinkName: nextLink
      parameters:
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/OperationListResult'
        default:
          description: DefaultErrorResponse
          schema:
            $ref: '#/definitions/ErrorDetails'
      deprecated: false
      summary: Microsoft Azure Get Providers Microsoft Healthcareapis Operations
  /subscriptions/{subscriptionId}/providers/Microsoft.HealthcareApis/checkNameAvailability:
    post:
      tags:
      - Proxy
      description: Check if a service instance name is available.
      operationId: microsoftAzureServicesChecknameavailability
      x-ms-examples:
        CheckNameAvailabilityPost:
          $ref: ./examples/CheckNameAvailabilityPost.json
      parameters:
      - $ref: '#/parameters/api-version'
      - $ref: '#/parameters/subscriptionId'
      - name: checkNameAvailabilityInputs
        in: body
        description: Set the name parameter in the CheckNameAvailabilityParameters structure to the name of the service instance to check.
        required: true
        schema:
          $ref: '#/definitions/CheckNameAvailabilityParameters'
      responses:
        '200':
          description: This is a synchronous operation. The body contains a JSON-serialized response that specifies whether the service name is available. If the name is not available, the body contains the reason.
          schema:
            $ref: '#/definitions/ServicesNameAvailabilityInfo'
        default:
          description: DefaultErrorResponse
          schema:
            $ref: '#/definitions/ErrorDetails'
      deprecated: false
      summary: Microsoft Azure Post Subscriptions Subscriptionid Providers Microsoft Healthcareapis Checknameavailability
  /subscriptions/{subscriptionId}/providers/Microsoft.MixedReality/remoteRenderingAccounts:
    get:
      operationId: microsoftAzureRemoterenderingaccountsListbysubscription
      tags:
      - Proxy
      description: List Remote Rendering Accounts by Subscription
      x-ms-examples:
        List remote rendering accounts by subscription:
          $ref: ./examples/remote-rendering/GetBySubscription.json
      parameters:
      - $ref: ./common.json#/parameters/subscriptionIdParameter
      - $ref: ./common.json#/parameters/apiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/RemoteRenderingAccountPage'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./common.json#/definitions/CloudError
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Mixedreality Remoterenderingaccounts
definitions:
  OperationProperties:
    description: Operation properties.
    type: object
    properties: {}
  OperationDisplay:
    description: The object that represents the operation.
    type: object
    properties:
      provider:
        readOnly: true
        type: string
        description: 'Service provider: Microsoft.HealthcareApis'
      resource:
        readOnly: true
        type: string
        description: 'Resource Type: Services'
      operation:
        readOnly: true
        type: string
        description: Name of the operation
      description:
        readOnly: true
        type: string
        description: Friendly description for the operation,
  RemoteRenderingAccountPage:
    description: Result of the request to get resource collection. It contains a list of resources and a URL link to get the next set of results.
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/RemoteRenderingAccount'
        description: List of resources supported by the Resource Provider.
      nextLink:
        type: string
        description: URL to get the next set of resource list results if there are any.
  RemoteRenderingAccount:
    allOf:
    - $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/TrackedResource
    description: RemoteRenderingAccount Response.
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        description: Property bag.
        $ref: ./common.json#/definitions/MixedRealityAccountProperties
      identity:
        description: The identity associated with this account
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/Identity
      plan:
        description: The plan associated with this account
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/Identity
      sku:
        description: The sku associated with this account
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/Sku
      kind:
        description: The kind of account, if supported
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/Sku
      systemData:
        description: System metadata for this account
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/systemData
  Operation:
    description: Service REST API operation.
    type: object
    properties:
      name:
        readOnly: true
        type: string
        description: 'Operation name: {provider}/{resource}/{read | write | action | delete}'
      isDataAction:
        description: Gets or sets a value indicating whether the operation is a data action or not
        type: boolean
      origin:
        readOnly: true
        type: string
        description: Default value is 'user,system'.
      display:
        description: The information displayed about the operation.
        $ref: '#/definitions/OperationDisplay'
      properties:
        $ref: '#/definitions/OperationProperties'
        description: Properties of the operation
  ServicesNameAvailabilityInfo:
    description: The properties indicating whether a given service name is available.
    type: object
    properties:
      nameAvailable:
        description: The value which indicates whether the provided name is available.
        type: boolean
        readOnly: true
      reason:
        description: The reason for unavailability.
        enum:
        - Invalid
        - AlreadyExists
        type: string
        readOnly: true
        x-ms-enum:
          name: ServiceNameUnavailabilityReason
          modelAsString: false
      message:
        description: The detailed reason message.
        type: string
  ErrorDetails:
    description: Error details.
    type: object
    properties:
      error:
        description: Object containing error details.
        $ref: '#/definitions/ErrorDetailsInternal'
  OperationListResult:
    description: A list of service operations. It contains a list of operations and a URL link to get the next set of results.
    type: object
    properties:
      nextLink:
        description: The link used to get the next page of service description objects.
        type: string
      value:
        description: A list of service operations supported by the Microsoft.HealthcareApis resource provider.
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/Operation'
  ErrorDetailsInternal:
    description: Error details.
    type: object
    properties:
      code:
        description: The error code.
        type: string
        readOnly: true
      message:
        description: The error message.
        type: string
        readOnly: true
      target:
        description: The target of the particular error.
        type: string
        readOnly: true
  CheckNameAvailabilityParameters:
    description: Input values.
    type: object
    properties:
      name:
        description: The name of the service instance to check.
        type: string
      type:
        description: The fully qualified resource type which includes provider namespace.
        type: string
    required:
    - name
    - type
parameters:
  subscriptionId:
    name: subscriptionId
    in: path
    description: The subscription identifier.
    required: true
    type: string
  api-version:
    name: api-version
    enum:
    - 2018-08-20-preview
    in: query
    description: The version of the API.
    required: true
    type: string
    minLength: 10
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
