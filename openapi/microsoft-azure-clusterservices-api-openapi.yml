definitions:
  ClusterServiceResourceListResult:
    type: object
    description: The response of a ClusterServiceResource list operation.
    properties:
      value:
        type: array
        description: The ClusterServiceResource items on this page
        items:
          $ref: '#/definitions/ClusterServiceResource'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  ComponentDeploymentSecrets:
    type: string
    description: Containerized Network Function (CNF) Component Secrets
  OperationalStatus:
    type: object
    description: Operational Status of the resource
    properties:
      workload:
        type: string
        description: Status of the deployed workload
        readOnly: true
      healthCheck:
        type: string
        description: Health check results
        readOnly: true
  ClusterServiceResource:
    type: object
    description: Azure for Operators 5G Core Cluster Service Resource
    properties:
      properties:
        $ref: '#/definitions/ClusterServiceResourceProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/TrackedResource
  SkuDeploymentType:
    type: string
    description: Deployment Type Definitions
    enum:
    - Production
    - Lab
    x-ms-enum:
      name: SkuDeploymentType
      modelAsString: true
      values:
      - name: Production
        value: Production
        description: Production Deployment
      - name: Lab
        value: Lab
        description: Lab Deployment
  ReleaseVersion:
    type: string
    description: Azure for Operators 5G Core Release Version.
  QualifiedComponentDeploymentParameters:
    type: object
    description: Containerized Network Function (CNF) Qualified Deployment Parameters
    properties:
      type:
        $ref: '#/definitions/ComponentDeploymentType'
        description: Federation Type
      parameters:
        $ref: '#/definitions/ComponentDeploymentParameters'
        description: Deployment Parameters
      secrets:
        $ref: '#/definitions/ComponentDeploymentSecrets'
        format: password
        description: Deployment secrets
        x-ms-secret: true
    required:
    - type
  ProvisioningState:
    type: string
    description: Provisioning state of the resource
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: Resource is getting provisioned
      - name: Updating
        value: Updating
        description: Resource is updating
      - name: Deleting
        value: Deleting
        description: Resource is getting deleted
      - name: Accepted
        value: Accepted
        description: Resource has been accepted
    readOnly: true
  ComponentDeploymentType:
    type: string
    description: Containerized Network Function (CNF) Component Deployment Type
  ClusterType:
    type: string
    description: Cluster Type Definitions
    enum:
    - Aks
    - NexusAks
    x-ms-enum:
      name: ClusterType
      modelAsString: true
      values:
      - name: Aks
        value: Aks
        description: Azure Kubernetes Service
      - name: NexusAks
        value: NexusAks
        description: Azure Operator Nexus Kubernetes Service
  ClusterServiceClusterTypeSpecificData:
    type: object
    description: Cluster Service cluster type specific data.
    properties:
      type:
        $ref: '#/definitions/ClusterType'
        description: Cluster Type
      customLocationId:
        $ref: '#/definitions/CustomLocationIdProperty'
        description: Custom Location resource ID
    discriminator: type
    required:
    - type
    - customLocationId
  ComponentDeploymentParameters:
    type: string
    description: Containerized Network Function (CNF) Component Deployment Parameters
  CustomLocationIdProperty:
    type: string
    format: arm-id
    description: ARM resource ID of a custom location.
    x-ms-arm-id-details:
      allowedResources:
      - type: Microsoft.ExtendedLocation/customLocations
  ClusterServiceResourceTagsUpdate:
    type: object
    description: The type used for updating tags in ClusterServiceResource resources.
    properties:
      tags:
        type: object
        description: Resource tags.
        additionalProperties:
          type: string
  ClusterServiceResourceProperties:
    type: object
    description: Cluster Service Properties.
    properties:
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
        readOnly: true
      deploymentType:
        $ref: '#/definitions/SkuDeploymentType'
        description: Cluster type (Lab or Production)
        x-ms-mutability:
        - read
        - create
      releaseVersion:
        $ref: '#/definitions/ReleaseVersion'
        description: Azure for Operators 5G Core Release Version.  This is applied to all platform as a service (PaaS) components and running workloads in this cluster
      clusterTypeSpecificData:
        $ref: '#/definitions/ClusterServiceClusterTypeSpecificData'
        description: Cluster type specific data.  Contents depend on the cluster type
      componentParameters:
        type: array
        description: Azure for Operators 5G Core Local PaaS component parameters.  One set per component type
        items:
          $ref: '#/definitions/QualifiedComponentDeploymentParameters'
        x-ms-identifiers:
        - type
      operationalStatus:
        $ref: '#/definitions/OperationalStatus'
        description: Operational status
        readOnly: true
    required:
    - deploymentType
    - releaseVersion
    - clusterTypeSpecificData
    - componentParameters
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
