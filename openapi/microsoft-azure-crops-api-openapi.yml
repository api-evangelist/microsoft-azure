swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Crops API
schemes:
- https
tags:
- name: Crops
paths:
  /crops:
    get:
      tags:
      - Crops
      description: Returns a paginated list of crop resources.
      operationId: microsoftAzureCropsList
      produces:
      - application/json
      parameters:
      - in: query
        name: phenotypes
        description: Crop phenotypes of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: breedingMethods
        description: Breeding method of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: ids
        description: Ids of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: names
        description: Names of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: propertyFilters
        description: "Filters on key-value pairs within the Properties object.\r\neg. \"{testKey} eq {testValue}\"."
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: statuses
        description: Statuses of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: minCreatedDateTime
        description: Minimum creation date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxCreatedDateTime
        description: Maximum creation date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: minLastModifiedDateTime
        description: Minimum last modified date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxLastModifiedDateTime
        description: Maximum last modified date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxPageSize
        description: "Maximum number of items needed (inclusive).\r\nMinimum = 10, Maximum = 1000, Default value = 50."
        type: integer
        format: int32
        default: 50
        maximum: 1000
        minimum: 10
      - in: query
        name: skipToken
        description: Skip token for getting next set of results.
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/CropListResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Crops_List:
          $ref: ./examples/Crops_List.json
      summary: Microsoft Azure Get Crops
  /crops/{cropId}:
    get:
      tags:
      - Crops
      description: Gets a specified crop resource.
      operationId: microsoftAzureCropsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: cropId
        description: Id of the crop.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Crop'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Crops_Get:
          $ref: ./examples/Crops_Get.json
      summary: Microsoft Azure Get Crops Cropid
    patch:
      tags:
      - Crops
      description: Creates or updates a crop resource.
      operationId: microsoftAzureCropsCreateorupdate
      consumes:
      - application/merge-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: cropId
        description: Id of the crop resource.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      - in: body
        name: crop
        description: Crop resource payload to create or update.
        required: true
        schema:
          $ref: '#/definitions/Crop'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Crop'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Crop'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Crops_CreateOrUpdate:
          $ref: ./examples/Crops_CreateOrUpdate.json
      summary: Microsoft Azure Patch Crops Cropid
    delete:
      tags:
      - Crops
      description: Deletes Crop for given crop id.
      operationId: microsoftAzureCropsDelete
      produces:
      - application/json
      parameters:
      - in: path
        name: cropId
        description: Id of crop to be deleted.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Crops_Delete:
          $ref: ./examples/Crops_Delete.json
      summary: Microsoft Azure Delete Crops Cropid
definitions:
  ErrorResponse:
    description: An error response from the Azure AgPlatform service. See https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses for ErrorResponse reference document.
    type: object
    properties:
      error:
        $ref: '#/definitions/Error'
      traceId:
        description: Unique trace Id.
        type: string
  Measure:
    description: Schema for storing measurement reading and unit.
    type: object
    properties:
      unit:
        description: Data unit.
        maxLength: 50
        minLength: 1
        type: string
      value:
        format: double
        description: Data value.
        type: number
  Crop:
    description: Schema of crop resource.
    type: object
    properties:
      phenotype:
        description: Crop phenotype.
        maxLength: 100
        minLength: 0
        type: string
      breedingMethod:
        description: Breeding Method.
        enum:
        - VARIETY
        - HYBRID
        - UNKNOWN
        type: string
        x-ms-enum:
          name: BreedingMethod
          modelAsString: true
      measurements:
        description: Measurements.
        type: object
        additionalProperties:
          $ref: '#/definitions/Measure'
        x-ms-mutability:
        - read
        - create
        - update
      id:
        description: Unique resource ID.
        type: string
        readOnly: true
      eTag:
        description: The ETag value to implement optimistic concurrency.
        type: string
        readOnly: true
      status:
        description: Status of the resource.
        maxLength: 100
        minLength: 0
        type: string
      createdDateTime:
        format: date-time
        description: 'Date-time when resource was created, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      modifiedDateTime:
        format: date-time
        description: 'Date-time when resource was last modified, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      source:
        description: Source of the resource.
        maxLength: 100
        minLength: 2
        type: string
      name:
        description: Name to identify resource.
        maxLength: 100
        minLength: 0
        type: string
      description:
        description: Textual description of the resource.
        maxLength: 500
        minLength: 0
        type: string
      createdBy:
        description: Created by user/tenant id.
        type: string
        readOnly: true
      modifiedBy:
        description: Modified by user/tenant id.
        type: string
        readOnly: true
      properties:
        description: "A collection of key value pairs that belongs to the resource.\r\nEach pair must not have a key greater than 50 characters\r\nand must not have a value greater than 150 characters.\r\nNote: A maximum of 25 key value pairs can be provided for a resource and only string,\r\nnumeral and datetime (yyyy-MM-ddTHH:mm:ssZ) values are supported."
        type: object
        additionalProperties: {}
        example:
          key1: value1
          key2: 123.45
  InnerError:
    description: Inner error containing list of errors.See https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#innererror--object for InnerError reference document.
    type: object
    properties:
      code:
        description: Specific error code than was provided by the containing error.
        type: string
      innererror:
        $ref: '#/definitions/InnerError'
  CropListResponse:
    description: Paged response contains list of requested objects and a URL link to get the next set of results.
    required:
    - value
    type: object
    properties:
      value:
        description: List of requested objects.
        type: array
        items:
          $ref: '#/definitions/Crop'
      skipToken:
        description: Token used in retrieving the next page. If null, there are no additional pages.
        type: string
      nextLink:
        description: Continuation link (absolute URI) to the next page of results in the list.
        type: string
  Error:
    description: An error from the Azure AgPlatform service.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: Server-defined set of error codes.
        minLength: 1
        type: string
      message:
        description: Human-readable representation of the error.
        minLength: 1
        type: string
      target:
        description: Target of the error.
        type: string
      details:
        description: Array of details about specific errors that led to this reported error.
        type: array
        items:
          $ref: '#/definitions/Error'
      innererror:
        $ref: '#/definitions/InnerError'
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
