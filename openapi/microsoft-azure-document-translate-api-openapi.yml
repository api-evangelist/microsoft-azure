parameters:
  Azure.Core.ClientRequestIdHeader:
    name: x-ms-client-request-id
    in: header
    description: An opaque, globally-unique, client-generated string identifier for the request.
    required: false
    type: string
    format: uuid
    x-ms-parameter-location: method
    x-ms-client-name: clientRequestId
  DocumentTranslateContent.document:
    name: document
    in: formData
    description: Document to be translated in the form
    required: true
    type: file
    x-ms-parameter-location: method
  DocumentTranslateContent.sourceLanguage:
    name: sourceLanguage
    in: query
    description: 'Specifies source language of the input document.

      If this parameter isn''t specified, automatic language detection is applied to determine the source language.

      For example if the source document is written in English, then use sourceLanguage=en'
    required: false
    type: string
    x-ms-parameter-location: method
  DocumentTranslateContent.allowFallback:
    name: allowFallback
    in: query
    description: "Specifies that the service is allowed to fall back to a general system when a custom system doesn't exist. \n    Possible values are: true (default) or false."
    required: false
    type: boolean
    x-ms-parameter-location: method
  Azure.Core.Foundations.ApiVersionParameter:
    name: api-version
    in: query
    description: The API version to use for this operation.
    required: true
    type: string
    minLength: 1
    x-ms-parameter-location: method
    x-ms-client-name: apiVersion
  DocumentTranslateContent.glossary:
    name: glossary
    in: formData
    description: Glossary / translation memory will be used during translation in the form.
    required: false
    type: array
    items:
      type: string
      format: binary
    x-ms-parameter-location: method
  DocumentTranslateContent.targetLanguage:
    name: targetLanguage
    in: query
    description: 'Specifies the language of the output document.

      The target language must be one of the supported languages included in the translation scope.

      For example if you want to translate the document in German language, then use targetLanguage=de'
    required: true
    type: string
    x-ms-parameter-location: method
  DocumentTranslateContent.category:
    name: category
    in: query
    description: "A string specifying the category (domain) of the translation. This parameter is used to get translations \n    from a customized system built with Custom Translator. Add the Category ID from your Custom Translator \n    project details to this parameter to use your deployed customized system. Default value is: general."
    required: false
    type: string
    default: general
    x-ms-parameter-location: method
