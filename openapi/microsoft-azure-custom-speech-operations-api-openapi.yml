swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Operations: API'
schemes:
- https
tags:
- name: 'Custom Speech Operations:'
paths:
  /operations/models/copy/{id}:
    get:
      tags:
      - 'Custom Speech Operations:'
      summary: Microsoft Azure Gets The Operation Identified By The Given Id
      operationId: microsoftAzureOperationsGetmodelcopy
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the operation.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Operation'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get model copy operation pending:
          $ref: ./examples/get_operation_copy_model_pending.json
        Get model copy operation:
          $ref: ./examples/get_operation_copy_model.json
      description: Needs a more full description created.
