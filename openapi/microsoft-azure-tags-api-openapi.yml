swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Tags API
schemes:
- https
tags:
- name: Tags
paths:
  /v2/{name}/tags/list:
    get:
      tags:
      - Tags
      description: Fetch the tags under the repository identified by name
      x-ms-examples:
        List tags:
          $ref: ./examples/GetTagList.json
      operationId: microsoftAzureGettaglist
      parameters:
      - $ref: '#/parameters/ImageName'
      responses:
        '200':
          description: Gives a list of tags for the names repository.
          headers:
            Link:
              description: next paginated result
              type: string
          schema:
            $ref: '#/definitions/RepositoryTags'
        default:
          description: ACR error response describing why the operation failed.
          schema:
            $ref: '#/definitions/AcrErrors'
      summary: Microsoft Azure Get  Name Tags List
definitions:
  RepositoryTags:
    description: Result of the request to list tags of the image
    properties:
      name:
        type: string
        description: Name of the image
      tags:
        type: array
        description: List of tags
        items:
          type: string
          description: Tag name
    example:
      name: name
      tags:
      - tags
      - tags
  AcrErrors:
    description: Acr error response describing why the operation failed
    properties:
      errors:
        type: array
        description: Array of detailed error
        items:
          $ref: '#/definitions/AcrErrorInfo'
  AcrErrorInfo:
    description: Error information
    properties:
      code:
        description: Error code
        type: string
      message:
        type: string
        description: Error message
      detail:
        type: object
        description: Error details
parameters:
  ImageName:
    name: name
    in: path
    description: Name of the image (including the namespace)
    required: true
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
