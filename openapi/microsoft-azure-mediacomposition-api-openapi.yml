definitions:
  StreamStatus:
    description: State of the composition stream
    enum:
    - notStarted
    - running
    - stopped
    type: string
    x-ms-enum:
      name: StreamStatus
      modelAsString: true
  MediaOutputType:
    description: Kind of media output
    enum:
    - groupCall
    - room
    - teamsMeeting
    - srt
    - rtmp
    type: string
    x-ms-enum:
      name: MediaOutputType
      modelAsString: true
  CompositionStreamState:
    description: Provides the state of the media composition
    type: object
    properties:
      status:
        $ref: '#/definitions/StreamStatus'
  CommunicationErrorResponse:
    $ref: ../../../Common/stable/2022-07-13/common.json#/definitions/CommunicationErrorResponse
  Layout:
    description: Configure a layout
    required:
    - kind
    type: object
    properties:
      kind:
        $ref: '#/definitions/LayoutType'
      resolution:
        $ref: '#/definitions/Resolution'
      placeholderImageUri:
        description: Set global placeholder image
        type: string
      scalingMode:
        $ref: '#/definitions/ScalingMode'
    discriminator: kind
  MediaInputType:
    description: Kind of media input
    enum:
    - participant
    - screenShare
    - dominantSpeaker
    - activePresenter
    - image
    - groupCall
    - room
    - teamsMeeting
    - srt
    - rtmp
    type: string
    x-ms-enum:
      name: MediaInputType
      modelAsString: true
  MediaInput:
    description: Media input to be used in the composition
    required:
    - kind
    type: object
    properties:
      kind:
        $ref: '#/definitions/MediaInputType'
      placeholderImageUri:
        description: Image url to be used if participant has no video stream
        type: string
    discriminator: kind
  MediaComposition:
    description: Body of a media composition
    type: object
    properties:
      id:
        description: Id of the media composition
        type: string
      layout:
        $ref: '#/definitions/Layout'
      inputs:
        description: Inputs used in the composition
        type: object
        additionalProperties:
          $ref: '#/definitions/MediaInput'
      outputs:
        description: Outputs used in the composition
        type: object
        additionalProperties:
          $ref: '#/definitions/MediaOutput'
      streamState:
        $ref: '#/definitions/CompositionStreamState'
  MediaOutput:
    description: Media output to be used in the composition
    required:
    - kind
    type: object
    properties:
      kind:
        $ref: '#/definitions/MediaOutputType'
    discriminator: kind
  LayoutType:
    description: Kind of layout
    enum:
    - custom
    - grid
    - autoGrid
    - presentation
    - presenter
    type: string
    x-ms-enum:
      name: LayoutType
      modelAsString: true
  Resolution:
    description: The dimensions of the scene or objects in the scene
    required:
    - height
    - width
    type: object
    properties:
      width:
        format: int32
        description: Width of the object
        type: integer
      height:
        format: int32
        description: Height of the object
        type: integer
  ScalingMode:
    description: The scaling mode for the view of a video stream in a cell.
    enum:
    - stretch
    - crop
    - fit
    type: string
    x-ms-enum:
      name: ScalingMode
      modelAsString: true
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
