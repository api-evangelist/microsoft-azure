swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Desktop API
schemes:
- https
tags:
- name: Desktop
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DesktopVirtualization/applicationGroups/{applicationGroupName}/desktops/{desktopName}
  : get:
      tags:
      - Desktop
      operationId: microsoftAzureDesktopsGet
      description: Get a desktop.
      x-ms-examples:
        Desktop_Get:
          $ref: ./examples/Desktop_Get.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/ApplicationGroupNameParameter'
      - $ref: '#/parameters/DesktopNameParameter'
      responses:
        '200':
          description: Successfully retrieved desktop.
          schema:
            $ref: '#/definitions/Desktop'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Desktops Desktopname
    patch:
      tags:
      - Desktop
      operationId: microsoftAzureDesktopsUpdate
      description: Update a desktop.
      x-ms-examples:
        Desktop_Update:
          $ref: ./examples/Desktop_Update.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/ApplicationGroupNameParameter'
      - $ref: '#/parameters/DesktopNameParameter'
      - name: desktop
        description: Object containing Desktop definitions.
        in: body
        required: false
        schema:
          $ref: '#/definitions/DesktopPatch'
      responses:
        '200':
          description: Successfully updated desktop.
          schema:
            $ref: '#/definitions/Desktop'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Desktops Desktopname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DesktopVirtualization/applicationGroups/{applicationGroupName}/desktops
  : get:
      tags:
      - Desktop
      operationId: microsoftAzureDesktopsList
      description: List desktops.
      x-ms-examples:
        Desktop_List:
          $ref: ./examples/Desktop_List.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/ApplicationGroupNameParameter'
      - name: pageSize
        in: query
        required: false
        type: integer
        format: int32
        description: Number of items per page.
      - name: isDescending
        in: query
        required: false
        type: boolean
        description: Indicates whether the collection is descending.
      - name: initialSkip
        in: query
        required: false
        type: integer
        format: int32
        description: Initial number of items to skip.
      responses:
        '200':
          description: Successfully retrieved desktops in application group.
          schema:
            $ref: '#/definitions/DesktopList'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Desktops
definitions:
  DesktopProperties:
    description: Schema for Desktop properties.
    type: object
    properties:
      objectId:
        type: string
        description: ObjectId of Desktop. (internal use)
        readOnly: true
      description:
        type: string
        description: Description of Desktop.
      friendlyName:
        type: string
        description: Friendly name of Desktop.
      iconHash:
        readOnly: true
        type: string
        description: Hash of the icon.
      iconContent:
