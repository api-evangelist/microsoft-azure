                    tenantId: '500123'
                    state: Enabled
                    subscriptionPolicies:
                      locationPlacementId: '500123'
                      quotaId: '500123'
                      spendingLimit: 'On'
                    authorizationSource: example_value
                    tags: example_value
        default:
