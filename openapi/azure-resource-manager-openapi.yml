components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            https://management.azure.com/.default: Access Azure Resource Manager
  parameters:
    SubscriptionIdParameter:
      name: subscriptionId
      in: path
      required: true
      description: The ID of the target subscription.
      schema:
        type: string
        format: uuid
    ResourceGroupNameParameter:
      name: resourceGroupName
      in: path
      required: true
      description: The name of the resource group. The name is case insensitive.
      schema:
        type: string
        minLength: 1
        maxLength: 90
    ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: The API version to use for this operation.
      schema:
        type: string
        default: '2024-03-01'
  schemas:
    Subscription:
      type: object
      description: Subscription information.
      properties:
        id:
          type: string
          readOnly: true
          description: The fully qualified ID for the subscription.
          example: abc123
        subscriptionId:
          type: string
          readOnly: true
          description: The subscription ID.
          example: '500123'
        displayName:
          type: string
          readOnly: true
          description: The subscription display name.
          example: example_value
        tenantId:
          type: string
          readOnly: true
          description: The subscription tenant ID.
          example: '500123'
        state:
          type: string
          readOnly: true
          description: The subscription state.
          enum:
          - Enabled
          - Warned
          - PastDue
          - Disabled
          - Deleted
          example: Enabled
        subscriptionPolicies:
          $ref: '#/components/schemas/SubscriptionPolicies'
        authorizationSource:
          type: string
          description: >-
