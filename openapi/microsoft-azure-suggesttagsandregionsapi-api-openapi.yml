swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector SuggestTagsAndRegionsApi API
schemes:
- https
tags:
- name: SuggestTagsAndRegionsApi
paths:
  /projects/{projectId}/tagsandregions/suggestions:
    post:
      tags:
      - SuggestTagsAndRegionsApi
      summary: Microsoft Azure Suggest Tags And Regions For An Array Batch Of Untagged Images Returns Empty Array If No Tags Are Found
      description: This API will get suggested tags and regions for an array/batch of untagged images along with confidences for the tags. It returns an empty array if no tags are found.<br>There is a limit of 64 images in the batch.
      operationId: microsoftAzureSuggesttagsandregions
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: query
        description: IterationId to use for tag and region suggestion.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: imageIds
        in: query
        description: Array of image ids tag suggestion are needed for. Use GetUntaggedImages API to get imageIds.
        required: true
        type: array
        items:
          type: string
          format: uuid
          x-nullable: false
        collectionFormat: csv
        maxItems: 64
        minItems: 0
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/SuggestedTagAndRegion'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful SuggestTagsAndRegions request:
          $ref: ./examples/SuggestTagsAndRegions.json
definitions:
  BoundingBox:
    description: Bounding box that defines a region of an image.
    required:
    - left
    - top
    - width
    - height
    type: object
    properties:
      left:
        format: float
        description: Coordinate of the left boundary.
        type: number
        readOnly: false
        x-nullable: false
      top:
        format: float
        description: Coordinate of the top boundary.
        type: number
        readOnly: false
        x-nullable: false
      width:
        format: float
        description: Width.
        type: number
        readOnly: false
        x-nullable: false
      height:
        format: float
        description: Height.
        type: number
        readOnly: false
        x-nullable: false
  Prediction:
    description: Prediction result.
    type: object
    properties:
      probability:
        format: float
        description: Probability of the tag.
        type: number
        readOnly: true
        x-nullable: false
      tagId:
        format: uuid
        description: Id of the predicted tag.
        type: string
        readOnly: true
        x-nullable: false
      tagName:
        description: Name of the predicted tag.
        type: string
        readOnly: true
        x-nullable: true
      boundingBox:
        $ref: '#/definitions/BoundingBox'
        description: Bounding box of the prediction.
        readOnly: true
        x-nullable: true
      tagType:
        description: Type of the predicted tag.
        enum:
        - Regular
        - Negative
        - GeneralProduct
        type: string
        readOnly: true
        x-nullable: true
        x-ms-enum:
          name: TagType
          modelAsString: true
  SuggestedTagAndRegion:
    description: Result of a suggested tags and regions request.
    type: object
    properties:
      id:
        format: uuid
        description: Prediction Id.
        type: string
        readOnly: true
        x-nullable: false
      project:
        format: uuid
        description: Project Id.
        type: string
        readOnly: true
        x-nullable: false
      iteration:
        format: uuid
        description: Iteration Id.
        type: string
        readOnly: true
        x-nullable: false
      created:
        format: date-time
        description: Date this prediction was created.
        type: string
        readOnly: true
        x-nullable: false
      predictions:
        description: List of predictions.
        type: array
        items:
          $ref: '#/definitions/Prediction'
          x-nullable: false
        readOnly: true
      predictionUncertainty:
        format: double
        description: Uncertainty (entropy) of suggested tags or regions per image.
        type: number
        readOnly: true
        x-nullable: false
