swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector RelationshipLinks API
schemes:
- https
tags:
- name: RelationshipLinks
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/relationshipLinks/{relationshipLinkName}
  : put:
      tags:
      - RelationshipLinks
      operationId: microsoftAzureRelationshiplinksCreateorupdate
      x-ms-examples:
        RelationshipLinks_CreateOrUpdate:
          $ref: ./examples/RelationshipLinksCreateOrUpdate.json
      description: Creates a relationship link or updates an existing relationship link within a hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: relationshipLinkName
        in: path
        required: true
        type: string
        description: The name of the relationship link.
        pattern: ^[a-zA-Z][a-zA-Z0-9_]+$
        minLength: 1
        maxLength: 512
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/RelationshipLinkResourceFormat'
        description: Parameters supplied to the CreateOrUpdate relationship link operation.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully created the relationship link.
          schema:
            $ref: '#/definitions/RelationshipLinkResourceFormat'
        '202':
          description: Accepted. The create relationship operation is accepted.
      x-ms-long-running-operation: true
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Relationshiplinks Relationshiplinkname
    get:
      tags:
      - RelationshipLinks
      operationId: microsoftAzureRelationshiplinksGet
      x-ms-examples:
        RelationshipLinks_Get:
          $ref: ./examples/RelationshipLinksGet.json
      description: Gets information about the specified relationship Link.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: relationshipLinkName
        in: path
        required: true
        type: string
        description: The name of the relationship link.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get the relationship link.
          schema:
            $ref: '#/definitions/RelationshipLinkResourceFormat'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Relationshiplinks Relationshiplinkname
    delete:
      tags:
      - RelationshipLinks
      operationId: microsoftAzureRelationshiplinksDelete
      x-ms-examples:
        RelationshipLinks_Delete:
          $ref: ./examples/RelationshipLinksDelete.json
      description: Deletes a relationship link within a hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: relationshipLinkName
        in: path
        required: true
        type: string
        description: The name of the relationship.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. The relationship link is deleted.
        '202':
          description: Accepted. The delete operation is accepted.
      x-ms-long-running-operation: true
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Relationshiplinks Relationshiplinkname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/relationshipLinks
  : get:
      tags:
      - RelationshipLinks
      operationId: microsoftAzureRelationshiplinksListbyhub
      x-ms-examples:
        RelationshipLinks_ListByHub:
          $ref: ./examples/RelationshipLinksListByHub.json
