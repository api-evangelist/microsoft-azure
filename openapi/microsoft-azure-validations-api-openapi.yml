swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Validations API
schemes:
- https
tags:
- name: Validations
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Confluent/validations/{organizationName}/orgvalidate
  : post:
      tags:
      - Validations
      summary: Microsoft Azure Organization Validate Proxy Resource
      operationId: microsoftAzureValidationsValidateorganization
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupParameter'
      - $ref: '#/parameters/OrganizationResourceNameParameter'
      - in: body
        name: body
        required: true
        description: Organization resource model
        schema:
          $ref: '#/definitions/OrganizationResource'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/OrganizationResource'
        default:
          description: Default error response.
          schema:
            $ref: '#/definitions/ResourceProviderDefaultErrorResponse'
      x-ms-examples:
        Validations_ValidateOrganizations:
          $ref: ./examples/Validations_ValidateOrganizations.json
      description: Needs a more full description created.
definitions:
  OfferDetail:
    description: Confluent Offer detail
    type: object
    required:
    - publisherId
    - id
    - planId
    - planName
    - termUnit
    properties:
      publisherId:
        description: Publisher Id
        maxLength: 50
        type: string
      id:
        description: Offer Id
        maxLength: 50
        type: string
      planId:
        description: Offer Plan Id
        maxLength: 50
        type: string
      planName:
        description: Offer Plan Name
        maxLength: 50
        type: string
      termUnit:
        description: Offer Plan Term unit
        maxLength: 25
        type: string
      status:
        description: SaaS Offer Status
        $ref: '#/definitions/SaaSOfferStatus'
        readOnly: true
  UserDetail:
    description: Subscriber detail
    type: object
    required:
    - emailAddress
    properties:
      firstName:
        description: First name
        maxLength: 50
        type: string
      lastName:
        description: Last name
        maxLength: 50
        type: string
      emailAddress:
        description: Email address
        pattern: ^\S+@\S+\.\S+$
        type: string
  SaaSOfferStatus:
    enum:
    - Started
    - PendingFulfillmentStart
    - InProgress
    - Subscribed
    - Suspended
    - Reinstated
    - Succeeded
    - Failed
    - Unsubscribed
    - Updating
    type: string
    description: SaaS Offer Status for confluent RP
    title: SaaSOfferStatus
    x-ms-enum:
      modelAsString: true
      name: SaaSOfferStatus
  OrganizationResource:
    description: Organization resource.
    type: object
    x-ms-azure-resource: true
    required:
    - properties
    properties:
      id:
        description: The ARM id of the resource.
        type: string
        readOnly: true
      name:
        description: The name of the resource.
        type: string
        readOnly: true
      type:
        description: The type of the resource.
        type: string
        readOnly: true
      systemData:
        description: Metadata pertaining to creation and last modification of the resource
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        readOnly: true
      properties:
        x-ms-client-flatten: true
        description: Organization resource properties
        $ref: '#/definitions/OrganizationResourceProperties'
      tags:
        type: object
        description: Organization resource tags
        additionalProperties:
          type: string
      location:
        description: Location of Organization resource
        type: string
  OrganizationResourceProperties:
    description: Organization resource property
    type: object
    required:
    - offerDetail
    - userDetail
    properties:
      createdTime:
        format: date-time
        description: The creation time of the resource.
        type: string
        readOnly: true
      provisioningState:
        description: Provision states for confluent RP
        $ref: '#/definitions/ProvisioningState'
        readOnly: true
      organizationId:
        description: Id of the Confluent organization.
        type: string
        readOnly: true
      ssoUrl:
        description: SSO url for the Confluent organization.
        type: string
        readOnly: true
      offerDetail:
        description: Confluent offer detail
        $ref: '#/definitions/OfferDetail'
      userDetail:
        description: Subscriber detail
        $ref: '#/definitions/UserDetail'
  ProvisioningState:
    enum:
    - Accepted
    - Creating
    - Updating
    - Deleting
    - Succeeded
    - Failed
    - Canceled
    - Deleted
    - NotSpecified
    type: string
    description: Provision states for confluent RP
    title: ProvisioningState
    x-ms-enum:
      name: ProvisionState
      modelAsString: true
  ResourceProviderDefaultErrorResponse:
    type: object
    description: Default error response for resource provider
    title: ResourceProviderDefaultErrorResponse
    properties:
      error:
        description: Response body of Error
        readOnly: true
        $ref: '#/definitions/ErrorResponseBody'
  ErrorResponseBody:
    description: Response body of Error
    title: ErrorResponseBody
    type: object
    properties:
      code:
        description: Error code
        type: string
        readOnly: true
      message:
        description: Error message
        type: string
        readOnly: true
      target:
        description: Error target
        type: string
        readOnly: true
      details:
        description: Error detail
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/ErrorResponseBody'
        x-ms-identifiers:
        - message
        - target
