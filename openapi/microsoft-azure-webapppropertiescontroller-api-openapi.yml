swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector WebAppPropertiesController API
schemes:
- https
tags:
- name: WebAppPropertiesController
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/masterSites/{siteName}/webAppSites/{webAppSiteName}/updateProperties
  : post:
      operationId: microsoftAzureWebapppropertiescontrollerUpdateproperties
      tags:
      - WebAppPropertiesController
      description: Method to update properties for web applications.<br>            in a site.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webAppSiteName
        in: path
        description: Web app site name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: body
        in: body
        description: The content of the action request
        required: true
        schema:
          $ref: '#/definitions/WebAppPropertiesCollection'
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            type: object
        '202':
          description: Resource operation accepted.
          headers:
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
            Location:
              type: string
              description: The Location header contains the URL where the status of the long running operation can be checked.
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-long-running-operation: true
      x-ms-examples:
        WebAppPropertiesController_UpdateProperties_MaximumSet_Gen:
          $ref: ./examples/WebAppPropertiesController_UpdateProperties_MaximumSet_Gen.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Mastersites Sitename Webappsites Webappsitename Updateproperties
definitions:
  WebAppPropertiesCollection:
    type: object
    description: Collection of web app properties.
    properties:
      webApps:
        type: array
        description: Gets or sets the list of web app properties.
        items:
          $ref: '#/definitions/WebAppProperties'
        x-ms-identifiers: []
  WebAppProperties:
    type: object
    description: Class representing web app properties web model.
    properties:
      webAppArmId:
        type: string
        description: Gets or sets the arm id of the web app.
      tags:
        type: object
        description: Gets or sets Tags.
        additionalProperties:
          type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
