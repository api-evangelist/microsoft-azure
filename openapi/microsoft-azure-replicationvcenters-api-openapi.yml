      - name: vcenterName
        in: path
        description: vcenter name.
        required: true
        type: string
      responses:
        '202':
          description: Accepted
        '204':
          description: NoContent
      x-ms-long-running-operation: true
      x-ms-examples:
        Remove vCenter operation.:
          $ref: ./examples/ReplicationvCenters_Delete.json
    patch:
      tags:
      - ReplicationvCenters
      summary: Microsoft Azure Update Vcenter Operation
      description: The operation to update a registered vCenter.
      operationId: microsoftAzureReplicationvcentersUpdate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
        type: string
      - name: vcenterName
        in: path
        description: vcenter name.
        required: true
        type: string
      - name: updateVCenterRequest
        in: body
        description: The input to the update vCenter operation.
        required: true
        schema:
          $ref: '#/definitions/UpdateVCenterRequest'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/VCenter'
        '202':
          description: Accepted
      x-ms-long-running-operation: true
      x-ms-examples:
        Update vCenter operation.:
          $ref: ./examples/ReplicationvCenters_Update.json
