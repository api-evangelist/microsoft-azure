      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
        type: string
      - name: vcenterName
        in: path
        description: vcenter name.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/VCenter'
      x-ms-examples:
        Gets the details of a vCenter.:
          $ref: ./examples/ReplicationvCenters_Get.json
    put:
      tags:
      - ReplicationvCenters
      summary: Microsoft Azure Add Vcenter
      description: The operation to create a vCenter object..
      operationId: microsoftAzureReplicationvcentersCreate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
        type: string
      - name: vcenterName
        in: path
        description: vcenter name.
        required: true
        type: string
      - name: addVCenterRequest
        in: body
        description: The input to the add vCenter operation.
        required: true
        schema:
          $ref: '#/definitions/AddVCenterRequest'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/VCenter'
        '202':
          description: Accepted
      x-ms-long-running-operation: true
      x-ms-examples:
        Add vCenter.:
          $ref: ./examples/ReplicationvCenters_Create.json
    delete:
      tags:
      - ReplicationvCenters
      summary: Microsoft Azure Remove Vcenter Operation
      description: The operation to remove(unregister) a registered vCenter server from the vault.
      operationId: microsoftAzureReplicationvcentersDelete
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
