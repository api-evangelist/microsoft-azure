swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector TypingNotifications API
schemes:
- https
tags:
- name: TypingNotifications
paths:
  /chat/threads/{chatThreadId}/typing:
    post:
      tags:
      - TypingNotifications
      summary: Microsoft Azure Posts A Typing Event To A Thread, On Behalf Of A User
      operationId: microsoftAzureChatthreadSendtypingnotification
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: chatThreadId
        description: Id of the thread.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      - in: body
        name: sendTypingNotificationRequest
        description: Details of the typing notification request.
        schema:
          $ref: '#/definitions/SendTypingNotificationRequest'
      responses:
        '200':
          description: Request successful.
        '401':
          description: Unauthorized.
          schema:
            $ref: '#/definitions/CommunicationErrorResponse'
          x-ms-error-response: true
        '403':
          description: Forbidden.
          schema:
            $ref: '#/definitions/CommunicationErrorResponse'
          x-ms-error-response: true
        '429':
          description: Too many requests.
          schema:
            $ref: '#/definitions/CommunicationErrorResponse'
          x-ms-error-response: true
        '503':
          description: Service unavailable.
          schema:
            $ref: '#/definitions/CommunicationErrorResponse'
          x-ms-error-response: true
      x-ms-examples:
        Post typing event to a thread:
          $ref: ./examples/Messages_SendTypingNotification.json
      description: Needs a more full description created.
definitions:
  SendTypingNotificationRequest:
    description: Request payload for typing notifications.
    type: object
    properties:
      senderDisplayName:
        description: The display name of the typing notification sender. This property is used to populate sender name for push notifications.
        type: string
        example: Bob Admin
  CommunicationErrorResponse:
    $ref: ../../../Common/stable/2023-11-15/common.json#/definitions/CommunicationErrorResponse
parameters:
  ApiVersionParameter:
    in: query
    name: api-version
    description: Version of API to invoke.
    required: true
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
