swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ProjectApi API
schemes:
- https
tags:
- name: ProjectApi
paths:
  /projects:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get Your Projects
      operationId: microsoftAzureGetprojects
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters: []
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Project'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetProjects request:
          $ref: ./examples/GetProjects.json
      description: Needs a more full description created.
    post:
      tags:
      - ProjectApi
      summary: Microsoft Azure Create A Project
      operationId: microsoftAzureCreateproject
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: name
        in: query
        description: Name of the project.
        required: true
        type: string
      - name: description
        in: query
        description: The description of the project.
        required: false
        type: string
      - name: domainId
        in: query
        description: The id of the domain to use for this project. Defaults to General.
        required: false
        type: string
        format: uuid
      - name: classificationType
        in: query
        description: The type of classifier to create for this project.
        required: false
        type: string
        enum:
        - Multiclass
        - Multilabel
      - name: targetExportPlatforms
        in: query
        description: List of platforms the trained model is intending exporting to.
        required: false
        type: array
        items:
          type: string
          enum:
          - CoreML
          - TensorFlow
          - DockerFile
          - ONNX
          - VAIDK
        collectionFormat: csv
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Project'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful CreateProject request:
          $ref: ./examples/CreateProject.json
      description: Needs a more full description created.
  /projects/{projectId}:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get A Specific Project
      operationId: microsoftAzureGetproject
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The id of the project to get.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Project'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetProject request:
          $ref: ./examples/GetProject.json
      description: Needs a more full description created.
    delete:
      tags:
      - ProjectApi
      summary: Microsoft Azure Delete A Specific Project
      operationId: microsoftAzureDeleteproject
      consumes: []
      produces: []
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '204':
          description: No Content
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful DeleteProject request:
          $ref: ./examples/DeleteProject.json
      description: Needs a more full description created.
    patch:
      tags:
      - ProjectApi
      summary: Microsoft Azure Update A Specific Project
      operationId: microsoftAzureUpdateproject
      consumes:
      - application/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The id of the project to update.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: updatedProject
        in: body
        description: The updated project model.
        required: true
        schema:
          $ref: '#/definitions/Project'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Project'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful UpdateProject request:
          $ref: ./examples/UpdateProject.json
      description: Needs a more full description created.
  /projects/{projectId}/artifacts:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get Artifact Content From Blob Storage, Based On Artifact Relative Path In The Blob
      operationId: microsoftAzureGetartifact
      consumes: []
      produces:
      - application/octet-stream
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: path
        in: query
        description: The relative path for artifact.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            type: file
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetArtifact request:
          $ref: ./examples/GetArtifact.json
      description: Needs a more full description created.
  /projects/{projectId}/export:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Exports A Project
      operationId: microsoftAzureExportproject
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id of the project to export.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ProjectExport'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful ExportProject request:
          $ref: ./examples/ExportProject.json
      description: Needs a more full description created.
  /projects/{projectId}/iterations:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get Iterations For The Project
      operationId: microsoftAzureGetiterations
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Iteration'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetIterations request:
          $ref: ./examples/GetIterations.json
      description: Needs a more full description created.
  /projects/{projectId}/iterations/{iterationId}:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get A Specific Iteration
      operationId: microsoftAzureGetiteration
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The id of the project the iteration belongs to.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The id of the iteration to get.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Iteration'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetIteration request:
          $ref: ./examples/GetIteration.json
      description: Needs a more full description created.
    delete:
      tags:
      - ProjectApi
      summary: Microsoft Azure Delete A Specific Iteration Of A Project
      operationId: microsoftAzureDeleteiteration
      consumes: []
      produces: []
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '204':
          description: No Content
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful DeleteIteration request:
          $ref: ./examples/DeleteIteration.json
      description: Needs a more full description created.
    patch:
      tags:
      - ProjectApi
      summary: Microsoft Azure Update A Specific Iteration
      operationId: microsoftAzureUpdateiteration
      consumes:
      - application/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: Project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: Iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: updatedIteration
        in: body
        description: The updated iteration model.
        required: true
        schema:
          $ref: '#/definitions/Iteration'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Iteration'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful UpdateIteration request:
          $ref: ./examples/UpdateIteration.json
      description: Needs a more full description created.
  /projects/{projectId}/iterations/{iterationId}/export:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get The List Of Exports For A Specific Iteration
      operationId: microsoftAzureGetexports
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Export'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetExports request:
          $ref: ./examples/GetExports.json
      description: Needs a more full description created.
    post:
      tags:
      - ProjectApi
      summary: Microsoft Azure Export A Trained Iteration
      operationId: microsoftAzureExportiteration
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: platform
        in: query
        description: The target platform.
        required: true
        type: string
        enum:
        - CoreML
        - TensorFlow
        - DockerFile
        - ONNX
        - VAIDK
      - name: flavor
        in: query
        description: The flavor of the target platform.
        required: false
        type: string
        enum:
        - Linux
        - Windows
        - ONNX10
        - ONNX12
        - ARM
        - TensorFlowNormal
        - TensorFlowLite
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Export'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful ExportIteration request:
          $ref: ./examples/ExportIteration.json
      description: Needs a more full description created.
  /projects/{projectId}/iterations/{iterationId}/performance:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get Detailed Performance Information About An Iteration
      operationId: microsoftAzureGetiterationperformance
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The id of the project the iteration belongs to.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The id of the iteration to get.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: threshold
        in: query
        description: The threshold used to determine true predictions.
        required: false
        type: number
        format: float
      - name: overlapThreshold
        in: query
        description: If applicable, the bounding box overlap threshold used to determine true predictions.
        required: false
        type: number
        format: float
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/IterationPerformance'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetIterationPerformance request:
          $ref: ./examples/GetIterationPerformance.json
      description: Needs a more full description created.
  /projects/{projectId}/iterations/{iterationId}/performance/images:
    get:
      tags:
      - ProjectApi
      summary: Microsoft Azure Get Image With Its Prediction For A Given Project Iteration
      description: This API supports batching and range selection. By default it will only return first 50 images matching images.<br>Use the {take} and {skip} parameters to control how many images to return in a given batch.<br>The filtering is on an and/or relationship. For example, if the provided tag ids are for the "Dog" and<br>"Cat" tags, then only images tagged with Dog and/or Cat will be returned
      operationId: microsoftAzureGetimageperformances
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id. Defaults to workspace.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: tagIds
        in: query
        description: A list of tags ids to filter the images. Defaults to all tagged images when null. Limited to 20.
        required: false
        type: array
        items:
          type: string
          format: uuid
          x-nullable: false
        collectionFormat: csv
        maxItems: 20
        minItems: 0
      - name: orderBy
        in: query
        description: The ordering. Defaults to newest.
        required: false
        type: string
        enum:
        - Newest
        - Oldest
      - name: take
        in: query
        description: Maximum number of images to return. Defaults to 50, limited to 256.
        required: false
        type: integer
        format: int32
        default: 50
        maximum: 256
        minimum: 0
      - name: skip
        in: query
        description: Number of images to skip before beginning the image batch. Defaults to 0.
        required: false
        type: integer
        format: int32
        default: 0
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/ImagePerformance'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetImagePerformances request:
          $ref: ./examples/GetImagePerformances.json
  /projects/{projectId}/iterations/{iterationId}/performance/images/count:
    get:
      tags:
      - ProjectApi
      summary: "Microsoft Azure Gets The Number Of Images Tagged With The Provided {tagids} That Have Prediction Results From\r\ntraining For The Provided Iteration {iterationid}"
      description: The filtering is on an and/or relationship. For example, if the provided tag ids are for the "Dog" and<br>"Cat" tags, then only images tagged with Dog and/or Cat will be returned
      operationId: microsoftAzureGetimageperformancecount
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id. Defaults to workspace.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: tagIds
        in: query
        description: A list of tags ids to filter the images to count. Defaults to all tags when null.
        required: false
        type: array
        items:
          type: string
          format: uuid
          x-nullable: false
        collectionFormat: csv
      responses:
        '200':
          description: OK
          schema:
            format: int32
            type: integer
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetImagePerformanceCount request:
          $ref: ./examples/GetImagePerformanceCount.json
  /projects/{projectId}/iterations/{iterationId}/publish:
    post:
      tags:
      - ProjectApi
      summary: Microsoft Azure Publish A Specific Iteration
      operationId: microsoftAzurePublishiteration
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: publishName
        in: query
        description: The name to give the published iteration.
        required: true
        type: string
      - name: predictionId
        in: query
        description: The id of the prediction resource to publish to.
        required: true
        type: string
      - name: overwrite
        in: query
        description: 'Whether to overwrite the published model with the given name (default: false).'
        required: false
        type: boolean
      responses:
        '200':
          description: OK
          schema:
            type: boolean
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful PublishIteration request:
          $ref: ./examples/PublishIteration.json
      description: Needs a more full description created.
    delete:
      tags:
      - ProjectApi
      summary: Microsoft Azure Unpublish A Specific Iteration
      operationId: microsoftAzureUnpublishiteration
      consumes: []
      produces: []
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: path
        description: The iteration id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '204':
          description: No Content
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful UnpublishIteration request:
          $ref: ./examples/UnpublishIteration.json
      description: Needs a more full description created.
  /projects/{projectId}/train:
    post:
      tags:
      - ProjectApi
      summary: Microsoft Azure Queues Project For Training
      operationId: microsoftAzureTrainproject
      consumes:
      - application/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: trainingType
        in: query
        description: 'The type of training to use to train the project (default: Regular).'
        required: false
        type: string
        enum:
        - Regular
        - Advanced
      - name: reservedBudgetInHours
        in: query
        description: The number of hours reserved as budget for training (if applicable).
        required: false
        type: integer
        format: int32
        default: 0
      - name: forceTrain
        in: query
        description: 'Whether to force train even if dataset and configuration does not change (default: false).'
        required: false
        type: boolean
        default: false
      - name: notificationEmailAddress
        in: query
        description: 'The email address to send notification to when training finishes (default: null).'
        required: false
        type: string
      - name: trainingParameters
        in: body
        description: Additional training parameters passed in to control how the project is trained.
        required: false
        schema:
          $ref: '#/definitions/TrainingParameters'
        x-nullable: true
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Iteration'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful TrainProject request:
          $ref: ./examples/TrainProject.json
      description: Needs a more full description created.
  /projects/import:
    post:
      tags:
      - ProjectApi
      summary: Microsoft Azure Imports A Project
      operationId: microsoftAzureImportproject
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: token
        in: query
        description: Token generated from the export project call.
        required: true
        type: string
      - name: name
        in: query
        description: Optional, name of the project to use instead of auto-generated name.
        required: false
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Project'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful ImportProject request:
          $ref: ./examples/ImportProject.json
      description: Needs a more full description created.
definitions:
  ImagePerformance:
    description: Image performance model.
    type: object
    properties:
      predictions:
        type: array
        items:
          $ref: '#/definitions/Prediction'
        readOnly: true
        x-nullable: true
      id:
        format: uuid
        type: string
        readOnly: true
        x-nullable: false
      created:
        format: date-time
        type: string
        readOnly: true
        x-nullable: false
      width:
        format: int32
        type: integer
        readOnly: true
        x-nullable: false
      height:
        format: int32
        type: integer
        readOnly: true
        x-nullable: false
      imageUri:
        type: string
        readOnly: true
      thumbnailUri:
        type: string
        readOnly: true
      tags:
        type: array
        items:
          $ref: '#/definitions/ImageTag'
        readOnly: true
        x-nullable: true
      regions:
        type: array
        items:
          $ref: '#/definitions/ImageRegion'
        readOnly: true
        x-nullable: true
  Prediction:
    description: Prediction result.
    type: object
    properties:
      probability:
        format: float
        description: Probability of the tag.
        type: number
        readOnly: true
        x-nullable: false
      tagId:
        format: uuid
        description: Id of the predicted tag.
        type: string
        readOnly: true
        x-nullable: false
      tagName:
        description: Name of the predicted tag.
        type: string
        readOnly: true
        x-nullable: true
      boundingBox:
        $ref: '#/definitions/BoundingBox'
        description: Bounding box of the prediction.
        readOnly: true
        x-nullable: true
      tagType:
        description: Type of the predicted tag.
        enum:
        - Regular
        - Negative
        - GeneralProduct
        type: string
        readOnly: true
        x-nullable: true
        x-ms-enum:
          name: TagType
          modelAsString: true
  ProjectSettings:
    description: Represents settings associated with a project.
    type: object
    properties:
      domainId:
        format: uuid
        description: Gets or sets the id of the Domain to use with this project.
        type: string
        readOnly: false
        x-nullable: false
      classificationType:
        description: Gets or sets the classification type of the project.
        enum:
        - Multiclass
        - Multilabel
        type: string
        readOnly: false
        x-nullable: true
        x-ms-enum:
          name: Classifier
          modelAsString: true
      targetExportPlatforms:
        description: A list of ExportPlatform that the trained model should be able to support.
        type: array
        items:
          enum:
          - CoreML
          - TensorFlow
          - DockerFile
          - ONNX
          - VAIDK
