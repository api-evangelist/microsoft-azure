        description: The status of the last operation.
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: Resource is being Provisioned.
      - name: Updating
        value: Updating
        description: Resource is being Updated.
      - name: Deleting
        value: Deleting
        description: Resource is being Deleted.
      - name: Accepted
        value: Accepted
        description: Resource is being Accepted.
  GroupBodyProperties:
    type: object
    description: Body properties of group update.
    properties:
      operationType:
        $ref: '#/definitions/GroupUpdateOperation'
        description: Whether to add or remove the machines.
      machines:
        type: array
        description: List of machine names that are part of this group.
        items:
          type: string
  GroupUpdateOperation:
    type: string
    enum:
    - Add
    - Remove
    x-ms-enum:
      name: GroupUpdateOperation
      modelAsString: true
  Group:
    type: object
    description: Group resource.
    properties:
      properties:
        $ref: '#/definitions/GroupProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
