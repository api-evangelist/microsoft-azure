    - MachineAssessment
    - AvsAssessment
    - SqlAssessment
    - WebAppAssessment
    x-ms-enum:
      name: AssessmentType
      modelAsString: true
  GroupProperties:
    type: object
    description: Properties of group resource.
    properties:
      groupStatus:
        $ref: '#/definitions/GroupStatus'
        description: Whether the group has been created and is valid.
        readOnly: true
      machineCount:
        type: integer
        format: int32
        description: Number of machines part of this group.
        readOnly: true
      assessments:
        type: array
        description: List of References to Assessments created on this group.
        items:
          type: string
        readOnly: true
      supportedAssessmentTypes:
        type: array
        description: List of assessment types supported on this group.
        items:
          $ref: '#/definitions/AssessmentType'
      areAssessmentsRunning:
        type: boolean
        description: If the assessments are in running state.
        readOnly: true
      createdTimestamp:
        type: string
        format: date-time
        description: Time when this group was created. Date-Time represented in ISO-8601 format.
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: Time when this group was last updated. Date-Time represented in ISO-8601 format.
        readOnly: true
      groupType:
        $ref: '#/definitions/GroupType'
        description: The type of group.
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: '#/definitions/AzureResourceProperties'
