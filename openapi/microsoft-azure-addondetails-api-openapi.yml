swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector AddonDetails API
schemes:
- https
tags:
- name: AddonDetails
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Addons/supportProviders/{providerName}/supportPlanTypes/{planTypeName}:
    get:
      tags:
      - AddonDetails
      operationId: microsoftAzureSupportplantypesGet
      description: Returns whether or not the canonical support plan of type {type} is enabled for the subscription.
      x-ms-examples:
        SupportPlanTypes_Get:
          $ref: ./examples/SupportPlanTypes_Get.json
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/SupportProviderName'
      - $ref: '#/parameters/CanonicalSupportPlanType'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CanonicalSupportPlanResponseEnvelope'
        '404':
          description: Not Found
        default:
          description: '''404'' - ''Not Found''.

            ''400'' - ''Bad Request'''
          schema:
            $ref: '#/definitions/ErrorDefinition'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Addons Supportproviders Providername Supportplantypes Plantypename
    put:
      tags:
      - AddonDetails
      operationId: microsoftAzureSupportplantypesCreateorupdate
      description: Creates or updates the Canonical support plan of type {type} for the subscription.
      x-ms-long-running-operation: true
      x-ms-examples:
        SupportPlanTypes_CreateOrUpdate:
          $ref: ./examples/SupportPlanTypes_CreateOrUpdate.json
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/SupportProviderName'
      - $ref: '#/parameters/CanonicalSupportPlanType'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CanonicalSupportPlanResponseEnvelope'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CanonicalSupportPlanResponseEnvelope'
        '404':
          description: Not Found
        default:
          description: '''404'' - ''Not Found''.

            ''400'' - ''Bad Request'''
          schema:
            $ref: '#/definitions/ErrorDefinition'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Providers Microsoft Addons Supportproviders Providername Supportplantypes Plantypename
definitions:
  ErrorDefinition:
    type: object
    title: Error
    description: Error description and code explaining why an operation failed.
    required:
    - message
    - code
    properties:
      message:
        type: string
        description: Description of the error.
      code:
        type: string
        description: Service specific error code which serves as the substatus for the HTTP error code.
  CanonicalSupportPlanProperties:
    type: object
    description: The properties of the Canonical support plan.
    properties:
      provisioningState:
        type: string
        description: The provisioning state of the resource.
        enum:
        - Succeeded
        - Failed
        - Cancelled
        - Purchasing
        - Downgrading
        - Cancelling
        - Upgrading
        x-ms-enum:
          name: ProvisioningState
          modelAsString: true
  CanonicalSupportPlanResponseEnvelope:
    type: object
    description: The status of the Canonical support plan.
    required:
    - properties
    properties:
      id:
        readOnly: true
        type: string
        description: The id of the ARM resource, e.g. "/subscriptions/{id}/providers/Microsoft.Addons/supportProvider/{supportProviderName}/supportPlanTypes/{planTypeName}".
      name:
        readOnly: true
        type: string
        description: The name of the Canonical support plan, i.e. "essential", "standard" or "advanced".
      type:
        readOnly: true
        type: string
        description: Microsoft.Addons/supportProvider
      properties:
        type: object
        $ref: '#/definitions/CanonicalSupportPlanProperties'
        description: Describes Canonical support plan type and status.
        x-ms-client-flatten: true
    x-ms-azure-resource: true
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client API version.
  CanonicalSupportPlanType:
    name: planTypeName
    in: path
    required: true
    type: string
    description: The Canonical support plan type.
    enum:
    - Essential
    - Standard
    - Advanced
    x-ms-enum:
      name: PlanTypeName
      modelAsString: true
    x-ms-parameter-location: method
  SupportProviderName:
    name: providerName
    in: path
    required: true
    type: string
    description: The support plan type. For now the only valid type is "canonical".
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: Subscription credentials that uniquely identify the Microsoft Azure subscription. The subscription ID forms part of the URI for every service call.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
