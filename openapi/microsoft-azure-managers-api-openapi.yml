definitions:
  ResourceCertificateAndAADDetails:
    description: Resource Certificate And AAD Details from IDM
    required:
    - certificate
    - resourceId
    - aadAuthority
    - aadTenantId
    - servicePrincipalClientId
    - servicePrincipalObjectId
    - azureManagementEndpointAudience
    - subject
    - validFrom
    - validTo
    - thumbprint
    - friendlyName
    - issuer
    type: object
    properties:
      authType:
        description: Specify the Authentication type
        enum:
        - Invalid
        - AccessControlService
        - AzureActiveDirectory
        type: string
        x-ms-enum:
          name: AuthType
          modelAsString: false
      certificate:
        description: Gets or sets the base64 encoded certificate raw data string
        type: string
      resourceId:
        format: int64
        description: Gets or Sets the ResourceId
        type: integer
      aadAuthority:
        description: AAD tenant authority
        type: string
      aadTenantId:
        description: AAD tenant Id
        type: string
      servicePrincipalClientId:
        description: AAD service principal clientId
        type: string
      servicePrincipalObjectId:
        description: AAD service principal ObjectId
        type: string
      azureManagementEndpointAudience:
        description: Azure Management Endpoint Audience
        type: string
      subject:
        description: Certificate Subject Name
        type: string
      validFrom:
        format: date-time
        description: Certificate Validity start Date time
        type: string
      validTo:
        format: date-time
        description: Certificate Validity End Date time
        type: string
      thumbprint:
        description: Certificate thumbprint
        type: string
      friendlyName:
        description: Certificate friendly name
        type: string
      issuer:
        description: Certificate issuer
        type: string
  MetricDefinition:
    description: The monitoring metric definition.
    type: object
    properties:
      name:
        $ref: '#/definitions/MetricName'
        description: The metric name.
      unit:
        description: The metric unit.
        enum:
        - Bytes
        - BytesPerSecond
        - Count
        - CountPerSecond
        - Percent
        - Seconds
        type: string
        x-ms-enum:
          name: MetricUnit
          modelAsString: false
      primaryAggregationType:
        description: The metric aggregation type.
        enum:
        - Average
        - Last
        - Maximum
        - Minimum
        - None
        - Total
        type: string
        x-ms-enum:
          name: MetricAggregationType
          modelAsString: false
      resourceId:
        description: The metric source ID.
        type: string
      metricAvailabilities:
        description: The available metric granularities.
        type: array
        items:
          $ref: '#/definitions/MetricAvailablity'
        x-ms-identifiers:
        - timeGrain
      dimensions:
        description: The available metric dimensions.
        type: array
        items:
          $ref: '#/definitions/MetricDimension'
        x-ms-identifiers:
        - name
      category:
        description: The category of the metric.
        type: string
      type:
        description: The metric definition type.
        type: string
  SymmetricEncryptedSecret_2:
    description: This class can be used as the Type for any secret entity represented as Value, ValueCertificateThumbprint, EncryptionAlgorithm. In this case, "Value" is a secret and the "valueThumbprint" represents the certificate thumbprint of the value. The algorithm field is mainly for future usage to potentially allow different entities encrypted using different algorithms.
    required:
    - value
    - encryptionAlgorithm
    type: object
    properties:
      value:
        description: The value of the secret itself. If the secret is in plaintext or null then EncryptionAlgorithm will be none
        type: string
      valueCertificateThumbprint:
        description: Thumbprint cert that was used to encrypt "Value"
        type: string
      encryptionAlgorithm:
        description: Algorithm used to encrypt "Value"
        enum:
        - None
        - AES256
        - RSAES_PKCS1_v_1_5
        type: string
        x-ms-enum:
          name: EncryptionAlgorithm
          modelAsString: false
  MetricDefinitionList:
    description: The list of metric definitions.
    type: object
    properties:
      value:
        description: The list of metric definitions.
        type: array
        items:
          $ref: '#/definitions/MetricDefinition'
        x-ms-identifiers:
        - unit
        - /name/value
  UploadCertificateRequest:
    description: Upload Certificate Request to IDM
    required:
    - properties
    type: object
    properties:
      properties:
        $ref: '#/definitions/RawCertificateData'
        x-ms-client-flatten: true
      contractVersion:
        description: Gets ContractVersion
        enum:
        - InvalidVersion
        - V2011_09
        - V2012_02
        - V2012_05
        - V2012_12
        - V2013_04
        - V2013_10
        - V2013_11
        - V2014_04
        - V2014_06
        - V2014_07
        - V2014_09
        - V2014_10
        - V2014_12
        - V2015_01
        - V2015_02
        - V2015_04
        - V2015_05
        - V2015_06
        - V2015_07
        - V2015_08
        - V2015_10
        - V2015_12
        - V2016_01
        - V2016_02
        - V2016_04
        - V2016_05
        - V2016_07
        - V2016_08
        type: string
        readOnly: true
        x-ms-enum:
          name: ContractVersions
          modelAsString: false
  Feature:
    description: The feature.
    required:
    - name
    - status
    type: object
    properties:
      name:
        description: The name of the feature.
        type: string
      status:
        description: The feature support status.
        enum:
        - NotAvailable
        - UnsupportedDeviceVersion
        - Supported
        type: string
        x-ms-enum:
          name: FeatureSupportStatus
          modelAsString: false
  ManagerExtendedInfo:
    description: The extended info of the manager.
    type: object
    allOf:
    - $ref: '#/definitions/BaseModel'
    properties:
      properties:
        $ref: '#/definitions/ManagerExtendedInfoProperties'
        description: The extended info properties.
        x-ms-client-flatten: true
      etag:
        description: The etag of the resource.
        type: string
  MetricDimension:
    description: The metric dimension. It indicates the source of the metric.
