swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ledgerIdentity API
schemes:
- https
tags:
- name: ledgerIdentity
paths:
  /ledgerIdentity/{ledgerId}:
    get:
      operationId: microsoftAzureGetledgeridentity
      x-ms-examples:
        GetLedgerIdentity:
          $ref: ./examples/identity/GetLedgerIdentity.json
      summary: Microsoft Azure Gets Identity Information For A Confidential Ledger Instance
      parameters:
      - $ref: common.json#/parameters/ApiVersionParameter
      - in: path
        name: ledgerId
        description: Id of the Confidential Ledger instance to get information for
        type: string
        required: true
      responses:
        '200':
          description: Returns ledger information.
          schema:
            $ref: '#/definitions/LedgerIdentityInformation'
        default:
          description: Error response describing why the operation failed
          schema:
            $ref: common.json#/definitions/ConfidentialLedgerError
      description: Needs a more full description created.
      tags:
      - ledgerIdentity
definitions:
  LedgerIdentityInformation:
    description: Contains the information about a Confidential Ledger.
    required:
    - ledgerTlsCertificate
    properties:
      ledgerId:
        description: Id for the ledger.
        type: string
        readOnly: true
      ledgerTlsCertificate:
        description: PEM-encoded certificate used for TLS by the Confidential Ledger.
        type: string
    type: object
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
