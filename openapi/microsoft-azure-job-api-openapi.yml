      - name: size
        in: query
        description: "Optional param specifying the size of the returned list.\r\n            By default it is 20 and that is the maximum."
        required: false
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobLog'
      summary: Microsoft Azure Get Livy Batches Batchid Log
  /livy/batches/{batchId}/state:
    get:
      tags:
      - Job
      description: Gets a single spark batch state.
      operationId: microsoftAzureJobGetsparkbatchstate
      x-ms-examples:
        Gets a single spark batch state:
          $ref: ./examples/HDI_Job_GetSparkBatchState.json
      produces:
      - application/json
      parameters:
      - name: batchId
        in: path
        description: Identifier for the batch job.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobState'
      summary: Microsoft Azure Get Livy Batches Batchid State
  /livy/sessions:
    get:
      tags:
      - Job
      description: List all spark sessions.
      operationId: microsoftAzureJobListsparksessionjob
      x-ms-examples:
        List all spark sessions:
          $ref: ./examples/HDI_Job_ListSparkSessionJob.json
      produces:
      - application/json
      parameters:
      - name: from
        in: query
        description: Optional param specifying which index the list should begin from.
        required: false
        type: integer
        format: int32
      - name: size
        in: query
        description: "Optional param specifying the size of the returned list.\r\n            By default it is 20 and that is the maximum."
        required: false
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkSessionCollection'
      summary: Microsoft Azure Get Livy Sessions
    post:
      tags:
      - Job
      description: Create a new spark session.
      operationId: microsoftAzureJobSubmitsparksessionjob
      x-ms-examples:
        Create a new spark session:
          $ref: ./examples/HDI_Job_SubmitSparkSessionJob.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: sparkSessionJobRequest
        in: body
        description: Livy compatible session job request payload.
        required: true
        schema:
          $ref: '#/definitions/SparkSessionJobRequest'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/SparkSessionJob'
      summary: Microsoft Azure Post Livy Sessions
  /livy/sessions/{sessionId}:
    get:
      tags:
      - Job
      description: Gets a single spark session.
      operationId: microsoftAzureJobGetsparksessionjob
      x-ms-examples:
        Gets a single spark session:
          $ref: ./examples/HDI_Job_GetSparkSessionJob.json
      produces:
      - application/json
      parameters:
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkSessionJob'
      summary: Microsoft Azure Get Livy Sessions Sessionid
    delete:
      tags:
      - Job
      description: Cancels a running spark session.
      operationId: microsoftAzureJobDeletesparksessionjob
      x-ms-examples:
        Cancels a running spark session:
          $ref: ./examples/HDI_Job_DeleteSparkSessionJob.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobDeletedResult'
      summary: Microsoft Azure Delete Livy Sessions Sessionid
  /livy/sessions/{sessionId}/log:
    get:
      tags:
      - Job
      description: Gets a single spark session job logs.
      operationId: microsoftAzureJobGetsparksessionlog
      x-ms-examples:
        Gets a single spark session job logs:
          $ref: ./examples/HDI_Job_GetSparkSessionLog.json
      produces:
      - application/json
      parameters:
      - name: sessionId
        in: path
        description: Identifier for the session job.
        required: true
        type: integer
        format: int32
      - name: from
        in: query
        description: Optional param specifying which index the list should begin from.
        required: false
        type: integer
        format: int32
      - name: size
        in: query
        description: "Optional param specifying the size of the returned list.\r\n            By default it is 20 and that is the maximum."
        required: false
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobLog'
      summary: Microsoft Azure Get Livy Sessions Sessionid Log
  /livy/sessions/{sessionId}/state:
    get:
      tags:
      - Job
      description: Gets a single spark session job state.
      operationId: microsoftAzureJobGetsparksessionstate
      x-ms-examples:
        Gets a single spark session job state:
          $ref: ./examples/HDI_Job_GetSparkSessionState.json
      produces:
      - application/json
      parameters:
      - name: sessionId
        in: path
        description: Identifier for the session job.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobState'
      summary: Microsoft Azure Get Livy Sessions Sessionid State
  /livy/sessions/{sessionId}/statements:
    get:
      tags:
      - Job
      description: Gets a list of statements within a spark session.
      operationId: microsoftAzureJobListsparkstatementjob
      x-ms-examples:
        Gets a list of statements within a spark session:
          $ref: ./examples/HDI_Job_ListSparkStatementJob.json
      produces:
      - application/json
      parameters:
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkStatementCollection'
      summary: Microsoft Azure Get Livy Sessions Sessionid Statements
    post:
      tags:
      - Job
      description: Create a statement within a spark session.
      operationId: microsoftAzureJobSubmitsparkstatementjob
      x-ms-examples:
        Create a statement within a spark session:
          $ref: ./examples/HDI_Job_SubmitSparkStatementJob.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      - name: sparkStatementRequest
        in: body
        description: Livy compatible batch job request payload.
        required: true
        schema:
          $ref: '#/definitions/SparkStatementRequest'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/SparkStatement'
      summary: Microsoft Azure Post Livy Sessions Sessionid Statements
  /livy/sessions/{sessionId}/statements/{statementId}:
    get:
      tags:
      - Job
      description: Gets a single statement within a spark session.
      operationId: microsoftAzureJobGetsparkstatementjob
      x-ms-examples:
        Gets a single statement within a spark session:
          $ref: ./examples/HDI_Job_GetSparkStatementJob.json
      produces:
      - application/json
      parameters:
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      - name: statementId
        in: path
        description: Identifier for the statement.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkStatement'
      summary: Microsoft Azure Get Livy Sessions Sessionid Statements Statementid
  /livy/sessions/{sessionId}/statements/{statementId}/cancel:
    post:
      tags:
      - Job
      description: Kill a statement within a session.
      operationId: microsoftAzureJobDeletesparkstatementjob
      x-ms-examples:
        Kill a statement within a session:
          $ref: ./examples/HDI_Job_DeleteSparkStatementJob.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: sessionId
        in: path
        description: Identifier for the session.
        required: true
        type: integer
        format: int32
      - name: statementId
        in: path
        description: Identifier for the statement.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkStatementCancellationResult'
      summary: Microsoft Azure Post Livy Sessions Sessionid Statements Statementid Cancel
definitions:
  JobDataPath:
    properties:
      jobId:
        readOnly: true
        type: string
        format: uuid
        description: The ID of the job this data is for.
      command:
        readOnly: true
        type: string
        description: The command that this job data relates to.
      paths:
        readOnly: true
        type: array
        items:
          type: string
        description: The list of paths to all of the job data.
    description: A Data Lake Analytics job data path item.
  SparkJobState:
    type: object
    properties:
      id:
        description: The livy id of the spark job.
        format: int32
        type: integer
      state:
        description: The current state of the spark job
        $ref: '#/definitions/JobState'
  SparkSessionCollection:
    type: object
    properties:
      from:
        description: The start index to fetch spark sessions.
        format: int32
        type: integer
      total:
        description: Number of spark sessions to fetch.
        format: int32
        type: integer
      sessions:
        description: List of spark sessions.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/SparkSessionJob'
  SparkSessionJobRequest:
    type: object
    properties:
      kind:
        description: Spark session job kind.
        $ref: '#/definitions/SessionJobKind'
      proxyUser:
        description: User to impersonate when starting the session.
        type: string
      jars:
        description: Jars to be used in this session.
        uniqueItems: false
        type: array
        items:
          type: string
      pyFiles:
        description: Python files to be used in this session.
        x-ms-client-name: pythonFiles
        uniqueItems: false
        type: array
        items:
          type: string
      files:
        description: Files to be used in this session.
        uniqueItems: false
        type: array
        items:
          type: string
      driverMemory:
        description: Amount of memory to use for the driver process.
        type: string
      driverCores:
        description: Number of cores to use for the driver process.
        format: int32
        type: integer
      executorMemory:
        description: Amount of memory to use per executor process.
        type: string
      executorCores:
        description: Number of cores to use for each executor.
        format: int32
        type: integer
      numExecutors:
        description: Number of executors to launch for this session.
        x-ms-client-name: executorCount
        format: int32
        type: integer
      archives:
        description: Archives to be used in this session.
        uniqueItems: false
        type: array
        items:
          type: string
      queue:
        description: The name of the YARN queue to which submitted.
        type: string
      name:
        description: The name of this session.
        type: string
      conf:
        description: Spark configuration properties.
        x-ms-client-name: configuration
        type: object
        additionalProperties:
          type: string
      heartbeatTimeoutInSecond:
        description: Timeout in second to which session be orphaned.
        format: int32
        type: integer
  SparkStatement:
    type: object
    properties:
      id:
        description: The livy id of the spark statement job.
        format: int32
        type: integer
      code:
        description: The execution code.
        type: string
      state:
        description: The current state of the spark statement.
        $ref: '#/definitions/StatementState'
      output:
        description: The execution output.
        $ref: '#/definitions/SparkStatementOutput'
      progress:
        description: The execution progress.
        type: number
        format: double
  JobState:
    type: string
    x-ms-enum:
      name: JobState
      modelAsString: true
    enum:
    - not_started
    - starting
    - idle
    - running
    - busy
    - shutting_down
    - error
    - dead
    - killed
    - success
    - recovering
  SessionJobKind:
    type: string
    x-ms-enum:
      name: SessionJobKind
      modelAsString: true
    enum:
    - spark
    - pyspark
    - sparkr
    - sql
  SparkBatchJobCollection:
    type: object
    properties:
      from:
        description: The start index to fetch Spark Batch jobs.
        format: int32
        type: integer
      total:
        description: Number of Spark Batch jobs to fetch.
        format: int32
        type: integer
      sessions:
        description: List of spark batch jobs.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/SparkBatchJob'
  JobInformation:
    required:
    - properties
    allOf:
    - $ref: '#/definitions/JobInformationBasic'
