swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Job API
schemes:
- https
tags:
- name: Job
paths:
  /jobs:
    get:
      tags:
      - Job
      operationId: microsoftAzureJobList
      description: Lists the jobs, if any, associated with the specified Data Lake Analytics account. The response includes a link to the next page of results, if any.
      parameters:
      - name: $filter
        in: query
        required: false
        type: string
        description: OData filter. Optional.
      - name: $top
        in: query
        required: false
        type: integer
        format: int32
        minimum: 1
        description: The number of items to return. Optional.
      - name: $skip
        in: query
        required: false
        type: integer
        format: int32
        minimum: 1
        description: The number of items to skip over before returning elements. Optional.
      - name: $select
        in: query
        required: false
        type: string
        description: OData Select statement. Limits the properties on each entry to just those requested, e.g. Categories?$select=CategoryName,Description. Optional.
      - name: $orderby
        in: query
        required: false
        type: string
        description: OrderBy clause. One or more comma-separated expressions with an optional "asc" (the default) or "desc" depending on the order you'd like the values sorted, e.g. Categories?$orderby=CategoryName desc. Optional.
      - name: $count
        in: query
        required: false
        type: boolean
        description: The Boolean value of true or false to request a count of the matching resources included with the resources in the response, e.g. Categories?$count=true. Optional.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved the list of jobs.
          schema:
            $ref: '#/definitions/JobInfoListResult'
      x-ms-examples:
        Lists the jobs, if any, associated with the specified Data Lake Analytics account:
          $ref: ./examples/Job_List.json
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-odata: '#/definitions/JobInformationBasic'
      summary: Microsoft Azure Get Jobs
  /jobs/{jobIdentity}:
    put:
      tags:
      - Job
      operationId: microsoftAzureJobCreate
      description: Submits a job to the specified Data Lake Analytics account.
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job identifier. Uniquely identifies the job across all jobs submitted to the service.
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/CreateJobParameters'
        description: The parameters to submit a job.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully submitted the job.
          schema:
            $ref: '#/definitions/JobInformation'
      x-ms-examples:
        Submits a job to the specified Data Lake Analytics account:
          $ref: ./examples/Job_Create.json
      summary: Microsoft Azure Put Jobs Jobidentity
    get:
      tags:
      - Job
      operationId: microsoftAzureJobGet
      description: Gets the job information for the specified job ID.
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: JobInfo ID.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved details of the specified job.
          schema:
            $ref: '#/definitions/JobInformation'
      x-ms-examples:
        Gets the job information for the specified job ID:
          $ref: ./examples/Job_Get.json
      summary: Microsoft Azure Get Jobs Jobidentity
    patch:
      tags:
      - Job
      operationId: microsoftAzureJobUpdate
      description: Updates the job information for the specified job ID. (Only for use internally with Scope job type.)
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job identifier. Uniquely identifies the job across all jobs submitted to the service.
      - name: parameters
        in: body
        required: false
        schema:
          $ref: '#/definitions/UpdateJobParameters'
        description: The parameters to update a job.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully updated the details of the specified job.
          schema:
            $ref: '#/definitions/JobInformation'
        '201':
          description: Successfully initiated an update of the specified job.
        '202':
          description: Successfully initiated an update of the specified job.
      x-ms-examples:
        Updates the job information for the specified job ID. (Only for use internally with Scope job type.):
          $ref: ./examples/Job_Update.json
      x-ms-long-running-operation: true
      summary: Microsoft Azure Patch Jobs Jobidentity
  /jobs/{jobIdentity}/GetStatistics:
    get:
      tags:
      - Job
      operationId: microsoftAzureJobGetstatistics
      description: Gets statistics of the specified job.
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job Information ID.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved job statistics of the specified job.
          schema:
            $ref: '#/definitions/JobStatistics'
      x-ms-examples:
        Gets statistics of the specified job:
          $ref: ./examples/Job_GetStatistics.json
      summary: Microsoft Azure Get Jobs Jobidentity Getstatistics
  /jobs/{jobIdentity}/GetDebugDataPath:
    get:
      tags:
      - Job
      operationId: microsoftAzureJobGetdebugdatapath
      description: Gets the job debug data information specified by the job ID.
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job identifier. Uniquely identifies the job across all jobs submitted to the service.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved debug data paths of the specified job.
          schema:
            $ref: '#/definitions/JobDataPath'
      x-ms-examples:
        Gets the job debug data information specified by the job ID:
          $ref: ./examples/Job_GetDebugDataPath.json
      summary: Microsoft Azure Get Jobs Jobidentity Getdebugdatapath
  /jobs/{jobIdentity}/CancelJob:
    post:
      tags:
      - Job
      operationId: microsoftAzureJobCancel
      description: Cancels the running job specified by the job ID.
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job identifier. Uniquely identifies the job across all jobs submitted to the service.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully cancelled the job.
        '202':
          description: Successfully initiated the cancellation of the specified job.
        '204':
          description: The specified job was not found.
      x-ms-examples:
        Cancels the running job specified by the job ID:
          $ref: ./examples/Job_Cancel.json
      x-ms-long-running-operation: true
      summary: Microsoft Azure Post Jobs Jobidentity Canceljob
  /jobs/{jobIdentity}/YieldJob:
    post:
      tags:
      - Job
      operationId: microsoftAzureJobYield
      description: Pauses the specified job and places it back in the job queue, behind other jobs of equal or higher importance, based on priority. (Only for use internally with Scope job type.)
      parameters:
      - name: jobIdentity
        in: path
        required: true
        type: string
        format: uuid
        description: Job identifier. Uniquely identifies the job across all jobs submitted to the service.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully yielded the specified job.
        '202':
          description: Successfully initiated the yielding of the specified job.
        '204':
          description: The specified job was not found.
      x-ms-examples:
        ? Pauses the specified job and places it back in the job queue, behind other jobs of equal or higher importance, based on priority. (Only for use internally with Scope job type.)
        : $ref: ./examples/Job_Yield.json
      x-ms-long-running-operation: true
      summary: Microsoft Azure Post Jobs Jobidentity Yieldjob
  /buildJob:
    post:
      tags:
      - Job
      operationId: microsoftAzureJobBuild
      description: Builds (compiles) the specified job in the specified Data Lake Analytics account for job correctness and validation.
      parameters:
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/BuildJobParameters'
        description: The parameters to build a job.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully built the job script.
          schema:
            $ref: '#/definitions/JobInformation'
      x-ms-examples:
        Builds (compiles) the specified job in the specified Data Lake Analytics account for job correctness and validation:
          $ref: ./examples/Job_Build.json
      summary: Microsoft Azure Post Buildjob
  /livy/batches:
    get:
      tags:
      - Job
      description: List all spark batch jobs
      operationId: microsoftAzureJobListsparkbatchjob
      x-ms-examples:
        List all spark batch jobs:
          $ref: ./examples/HDI_Job_ListSparkBatchJob.json
      produces:
      - application/json
      parameters:
      - name: from
        in: query
        description: Optional param specifying which index the list should begin from.
        required: false
        type: integer
        format: int32
      - name: size
        in: query
        description: "Optional param specifying the size of the returned list.\r\n            By default it is 20 and that is the maximum."
        required: false
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkBatchJobCollection'
      summary: Microsoft Azure Get Livy Batches
    post:
      tags:
      - Job
      description: Create a new spark batch job.
      operationId: microsoftAzureJobSubmitsparkbatchjob
      x-ms-examples:
        Create a spark batch job:
          $ref: ./examples/HDI_Job_SubmitSparkBatchJob.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: sparkBatchJobRequest
        in: body
        description: Livy compatible batch job request payload.
        required: true
        schema:
          $ref: '#/definitions/SparkBatchJobRequest'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/SparkBatchJob'
      summary: Microsoft Azure Post Livy Batches
  /livy/batches/{batchId}:
    get:
      tags:
      - Job
      description: Gets a single spark batch job.
      operationId: microsoftAzureJobGetsparkbatchjob
      x-ms-examples:
        Gets a single spark batch job:
          $ref: ./examples/HDI_Job_GetSparkBatchJob.json
      produces:
      - application/json
      parameters:
      - name: batchId
        in: path
        description: Identifier for the batch job.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkBatchJob'
      summary: Microsoft Azure Get Livy Batches Batchid
    delete:
      tags:
      - Job
      description: Cancels a running spark batch job.
      operationId: microsoftAzureJobDeletesparkbatch
      x-ms-examples:
        Cancels a running spark batch job:
          $ref: ./examples/HDI_Job_DeleteSparkBatch.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/requestedByParameter'
      - name: batchId
        in: path
        description: Identifier for the batch job.
        required: true
        type: integer
        format: int32
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SparkJobDeletedResult'
      summary: Microsoft Azure Delete Livy Batches Batchid
  /livy/batches/{batchId}/log:
    get:
      tags:
      - Job
      description: Gets a single spark batch job logs.
      operationId: microsoftAzureJobGetsparkbatchlog
      x-ms-examples:
