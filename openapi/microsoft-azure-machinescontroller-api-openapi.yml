    description: ExchangeServer in the guest virtual machine.
    properties:
      productName:
        type: string
        description: Gets or sets ProductName of the ExchangeServer.
        readOnly: true
      edition:
        type: string
        description: Gets or sets Edition of the ExchangeServer.
        readOnly: true
      roles:
