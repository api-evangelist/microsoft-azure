definitions:
  HealthErrorDetails:
    type: object
    description: Error contract returned when some exception occurs in Rest API.
    properties:
      message:
        type: string
        description: Gets the error message.
        readOnly: true
      messageParameters:
        type: object
        description: Gets the message parameters.
        additionalProperties:
          type: string
        readOnly: true
      applianceName:
        type: string
        description: Gets the appliance name.
        readOnly: true
      id:
        type: integer
        format: int64
        description: Gets the error ID.
        readOnly: true
      code:
        type: string
        description: Gets the error name.
        readOnly: true
      possibleCauses:
        type: string
        description: Gets the possible causes of error.
        readOnly: true
      recommendedAction:
        type: string
        description: Gets the recommended action to resolve error.
        readOnly: true
      severity:
        type: string
        description: Gets the error severity.
        readOnly: true
      summaryMessage:
        type: string
        description: Gets the error summary message.
        readOnly: true
      source:
        $ref: '#/definitions/HealthErrorDetailsSource'
        description: Gets the error source.
        readOnly: true
      updatedTimeStamp:
        type: string
        format: date-time
        description: Gets the time stamp when the error was updated.
        readOnly: true
      runAsAccountId:
        type: string
        description: Gets run as account id used while performing discovery             of entity.
        readOnly: true
      discoveryScope:
        $ref: '#/definitions/HealthErrorDetailsDiscoveryScope'
        description: Gets discovery scope for which             error is encountered.
        readOnly: true
  DependencyMapDiscovery:
    type: object
    description: Contains data related dependency map discovery scope.
    properties:
      discoveryScopeStatus:
        $ref: '#/definitions/DependencyMapDiscoveryScopeStatus'
        description: Gets discovery scope status.
        readOnly: true
      errors:
        type: array
        description: Gets errors for discovery scope.
        items:
          $ref: '#/definitions/HealthErrorDetails'
        readOnly: true
      hydratedRunAsAccountId:
        type: string
        description: "Gets the run as account ID with which feature worked successfully.\n           \nIt is discovered by the agent from the list of credentials."
        readOnly: true
  SharePointServer:
    type: object
    description: SharePointServer in the guest virtual machine.
    properties:
      productName:
        type: string
        description: Gets or sets ProductName of the SharePointServer.
        readOnly: true
      isEnterprise:
        type: boolean
        description: Gets or sets a value indicating whether the SharePointServer is Enterprise.
        readOnly: true
      status:
        type: string
        description: Gets or sets Status of the SharePointServer.
        readOnly: true
      version:
        type: string
        description: Gets or sets Version of the SharePointServer.
        readOnly: true
  Machine:
    description: Machine REST resource.
    type: object
    properties:
      id:
        description: Gets or sets the relative URL to get to this REST resource.
        type: string
      name:
        description: Gets or sets the name of this REST resource.
        type: string
      type:
        description: Gets the type of this REST resource.
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/MachineProperties'
        description: Gets or sets the properties of the machine.
  WebApplicationAppsAndRolesModel:
    type: object
    description: WebApplication in the guest virtual machine.
    properties:
      name:
        type: string
        description: Gets or sets Name of the WebApplication.
        readOnly: true
      status:
        type: string
        description: Gets or sets Status of the WebApplication.
        readOnly: true
      platform:
        type: string
        description: Gets or sets Platform of the WebApplication.
        readOnly: true
      groupName:
        type: string
        description: Gets or sets GroupName of the WebApplication.
        readOnly: true
      webServer:
        type: string
        description: Gets or sets WebServer of the WebApplication.
        readOnly: true
      applicationPool:
        type: string
        description: Gets or sets ApplicationPool of the WebApplication.
        readOnly: true
  SpringBootDiscovery:
    type: object
    description: Data related to a machine's spring boot discovery.
    properties:
      totalInstanceCount:
        type: integer
        format: int64
        description: Gets or sets number of successfully discovered instances.
      totalApplicationCount:
        type: integer
        format: int64
        description: Gets or sets number of successfully discovered applications.
      shallowDiscoveryStatus:
        $ref: '#/definitions/ShallowDiscoveryStatus'
        description: Gets or sets status of partner shallow discovery.
      discoveryScopeStatus:
        $ref: '#/definitions/DiscoveryScopeStatus'
        description: Gets or sets status of partner discovery.
  ApplicationDiscovery:
    type: object
    description: Contains data related application and roles discovery scope.
    properties:
      discoveryScopeStatus:
        $ref: '#/definitions/ApplicationDiscoveryScopeStatus'
        description: Gets discovery scope status.
        readOnly: true
      errors:
        type: array
        description: Gets errors for discovery scope.
        items:
          $ref: '#/definitions/HealthErrorDetails'
        readOnly: true
      hydratedRunAsAccountId:
        type: string
        description: "Gets the run as account ID with which feature worked successfully.\n           \nIt is discovered by the agent from the list of credentials."
        readOnly: true
  VmwareNetworkAdapter:
    type: object
    description: Second level object represented in responses as part of Machine REST resource.
    properties:
      label:
        type: string
        description: Label of the NIC.
        readOnly: true
      adapterType:
        type: string
        description: Gets or sets the adapter type.
        readOnly: true
      nicId:
        type: string
        description: Gets or sets the NIC Id.
      macAddress:
        type: string
        description: Gets or sets Mac address of the NIC.
      ipAddressList:
        type: array
        description: Gets IP addresses for the machine.
        items:
          type: string
        readOnly: true
      networkName:
        type: string
        description: Gets or sets Network Name.
      ipAddressType:
        type: string
        description: Gets or sets Type of the IP address.
  esuStatus:
    type: string
    description: esu Status
    enum:
    - Unknown
    - Active
    - InActive
    x-ms-enum:
      name: esuStatus
      modelAsString: true
      values:
      - name: Unknown
        value: Unknown
        description: Unknown value.
      - name: Active
        value: Active
        description: Active value.
      - name: InActive
        value: InActive
        description: InActive value.
  Feature:
    type: object
    description: Feature in the guest virtual machine.
    properties:
      name:
        type: string
        description: Gets or sets Name of the Feature.
        readOnly: true
      featureType:
        type: string
        description: Gets or sets FeatureType of the Feature.
        readOnly: true
      parent:
        type: string
        description: Gets or sets Parent of the Feature.
        readOnly: true
      status:
        type: string
        description: Gets or sets Status of the Feature.
        readOnly: true
  AppsAndRoles:
    type: object
    description: AppsAndRoles in the guest virtual machine.
    properties:
      applications:
        type: array
        description: Gets or sets Applications of the AppsAndRoles.
        items:
          $ref: '#/definitions/Application'
        readOnly: true
        x-ms-identifiers: []
      webApplications:
        type: array
        description: Gets or sets WebApplications of the AppsAndRoles.
        items:
          $ref: '#/definitions/WebApplicationAppsAndRolesModel'
        readOnly: true
        x-ms-identifiers: []
      features:
        type: array
        description: Gets or sets Features of the AppsAndRoles.
        items:
          $ref: '#/definitions/Feature'
        readOnly: true
        x-ms-identifiers: []
      sqlServers:
        type: array
        description: Gets or sets SQLServers of the AppsAndRoles.
        items:
          $ref: '#/definitions/SqlServerApplication'
        readOnly: true
        x-ms-identifiers: []
      sharePointServers:
        type: array
        description: Gets or sets SharePointServers of the AppsAndRoles.
        items:
          $ref: '#/definitions/SharePointServer'
        readOnly: true
        x-ms-identifiers: []
      systemCenters:
        type: array
        description: Gets or sets SystemCenters of the AppsAndRoles.
        items:
          $ref: '#/definitions/SystemCenter'
        readOnly: true
        x-ms-identifiers: []
      bizTalkServers:
        type: array
        description: Gets or sets BizTalkServers of the AppsAndRoles.
        items:
          $ref: '#/definitions/BizTalkServer'
        readOnly: true
        x-ms-identifiers: []
      exchangeServers:
        type: array
        description: Gets or sets ExchangeServers of the AppsAndRoles.
        items:
          $ref: '#/definitions/ExchangeServer'
        readOnly: true
        x-ms-identifiers: []
      otherDatabases:
        type: array
        description: Gets or sets OtherDatabaseServers of the AppsAndRoles.
        items:
          $ref: '#/definitions/OtherDatabase'
        readOnly: true
        x-ms-identifiers: []
  HealthErrorDetailsSource:
    type: string
    description: HealthError Details Source
    enum:
    - RefreshFabricLayout
    - RefreshFabricLayoutGuest
    - RefreshFabricLayoutDependencyMap
    x-ms-enum:
      name: HealthErrorDetailsSource
      modelAsString: true
      values:
      - name: RefreshFabricLayout
        value: RefreshFabricLayout
        description: RefreshFabricLayout value.
      - name: RefreshFabricLayoutGuest
        value: RefreshFabricLayoutGuest
        description: RefreshFabricLayoutGuest value.
      - name: RefreshFabricLayoutDependencyMap
        value: RefreshFabricLayoutDependencyMap
        description: RefreshFabricLayoutDependencyMap value.
  DiscoveryDetails:
    description: Discovery properties that can be published by various ISVs.
    type: object
    properties:
      id:
        description: Gets the relative URL to get to this DiscoveryDetails resource.
        type: string
      osType:
        description: Gets or sets the OS type.
        type: string
      osName:
        description: Gets or sets the OS name.
        type: string
      osVersion:
        description: Gets or sets the OS version.
        type: string
      enqueueTime:
        description: Gets or sets the time the message was enqueued.
        type: string
      solutionName:
        description: Gets or sets the name of the solution that sent the data.
        type: string
      machineId:
        description: Gets or sets the unique identifier of the machine.
        type: string
      machineManagerId:
        description: Gets or sets the unique identifier of the virtual machine manager(vCenter/VMM).
        type: string
      fabricType:
        description: Gets or sets the fabric type.
        type: string
      lastUpdatedTime:
        format: date-time
        description: Gets or sets the time of the last modification of the machine details.
        type: string
      machineName:
        description: Gets or sets the name of the machine.
        type: string
      ipAddresses:
        description: Gets or sets the list of IP addresses of the machine. IP addresses could be IP V4 or IP V6.
        type: array
        items:
          type: string
      fqdn:
        description: Gets or sets the FQDN of the machine.
        type: string
      biosId:
        description: Gets or sets the BIOS ID of the machine.
        type: string
      macAddresses:
        description: Gets or sets the list of MAC addresses of the machine.
        type: array
        items:
          type: string
      extendedInfo:
        description: Gets or sets the ISV specific extended information.
        type: object
        additionalProperties:
          type: string
