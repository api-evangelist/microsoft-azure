swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Hosts API
schemes:
- https
tags:
- name: Hosts
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ConnectedVMwarevSphere/hosts/{hostName}
  : put:
      tags:
      - Hosts
      operationId: microsoftAzureHostsCreate
      description: Create Or Update host.
      summary: Microsoft Azure Implements Host Put Method
      x-ms-examples:
        CreateHost:
          $ref: ./examples/CreateHost.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: hostName
        required: true
        type: string
        description: Name of the host.
      - $ref: '#/parameters/api-version'
      - in: body
        name: body
        description: Request payload.
        schema:
          $ref: '#/definitions/Host'
      responses:
        '200':
          description: Arm resource update successful.
          schema:
            $ref: '#/definitions/Host'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Host'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
    get:
      tags:
      - Hosts
      operationId: microsoftAzureHostsGet
      summary: Microsoft Azure Gets A Host
      description: Implements host GET method.
      x-ms-examples:
        GetHost:
          $ref: ./examples/GetHost.json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: hostName
        description: Name of the host.
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Host'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
    patch:
      tags:
      - Hosts
      operationId: microsoftAzureHostsUpdate
      summary: Microsoft Azure Updates A Host
      description: API to update certain properties of the host resource.
      x-ms-examples:
        UpdateHost:
          $ref: ./examples/UpdateHost.json
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: hostName
        required: true
        type: string
        description: Name of the host.
      - $ref: '#/parameters/api-version'
      - in: body
        name: body
        description: Resource properties to update.
        schema:
          $ref: '#/definitions/ResourcePatch'
      responses:
        '200':
          description: Arm resource update successful.
          schema:
            $ref: '#/definitions/Host'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
    delete:
      tags:
      - Hosts
      operationId: microsoftAzureHostsDelete
      summary: Microsoft Azure Deletes An Host
      description: Implements host DELETE method.
      x-ms-examples:
        DeleteHost:
          $ref: ./examples/DeleteHost.json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: hostName
        description: Name of the host.
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      - in: query
        name: force
        description: Whether force delete was specified.
        required: false
        type: boolean
      responses:
        '200':
          description: Success
        '202':
          description: Accepted
          headers:
            Location:
              type: string
        '204':
          description: No Content
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: true
  /subscriptions/{subscriptionId}/providers/Microsoft.ConnectedVMwarevSphere/hosts:
    get:
      tags:
      - Hosts
      operationId: microsoftAzureHostsList
      summary: Microsoft Azure Implements Get Hosts In A Subscription
      description: List of hosts in a subscription.
      x-ms-examples:
        ListHosts:
          $ref: ./examples/ListHosts.json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/HostsList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ConnectedVMwarevSphere/hosts:
    get:
      tags:
      - Hosts
      operationId: microsoftAzureHostsListbyresourcegroup
      summary: Microsoft Azure Implements Get Hosts In A Resource Group
      description: List of hosts in a resource group.
      x-ms-examples:
        ListHostsByResourceGroup:
          $ref: ./examples/ListHostsByResourceGroup.json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/HostsList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Datadog/monitors/{monitorName}/listHosts
  : post:
      tags:
      - Hosts
      summary: Microsoft Azure List The Hosts For A Given Monitor Resource
      operationId: microsoftAzureMonitorsListhosts
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/MonitorNameParameter'
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DatadogHostListResponse'
        default:
          description: Default error response.
          schema:
            $ref: '#/definitions/ResourceProviderDefaultErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Monitors_ListHosts:
          $ref: ./examples/Hosts_List.json
      description: Needs a more full description created.
definitions:
  HostProperties:
    description: Describes the properties of a Host.
    type: object
    properties:
      uuid:
        description: Gets or sets a unique identifier for this resource.
        type: string
        readOnly: true
      vCenterId:
        description: Gets or sets the ARM Id of the vCenter resource in which this host resides.
        type: string
      moRefId:
        description: Gets or sets the vCenter MoRef (Managed Object Reference) ID for the host.
        type: string
      inventoryItemId:
        description: Gets or sets the inventory Item ID for the host.
        type: string
      moName:
        description: Gets or sets the vCenter Managed Object name for the host.
        type: string
        readOnly: true
      statuses:
        description: The resource status information.
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/ResourceStatus'
        x-ms-identifiers:
        - type
      customResourceName:
        description: Gets the name of the corresponding resource in Kubernetes.
        type: string
        readOnly: true
      overallMemoryUsageGB:
        format: int64
        description: Gets the used physical memory on the host in GB.
        type: integer
        readOnly: true
      memorySizeGB:
        format: int64
        description: Gets the total amount of physical memory on the host in GB.
        type: integer
        readOnly: true
      overallCpuUsageMHz:
        format: int64
        description: Gets the used CPU usage across all cores in MHz.
        type: integer
        readOnly: true
      cpuMhz:
        format: int64
        description: Gets the max CPU usage across all cores in MHz.
        type: integer
        readOnly: true
      datastoreIds:
        description: Gets the datastore ARM ids.
        type: array
        items:
          type: string
        readOnly: true
      networkIds:
        description: Gets the network ARM ids.
        type: array
        items:
          type: string
        readOnly: true
      provisioningState:
        $ref: '#/definitions/ResourceProvisioningState'
        description: Gets the provisioning state.
        readOnly: true
  ExtendedLocation:
    type: object
    description: The extended location.
    properties:
      type:
        type: string
        description: The extended location type.
      name:
        type: string
        description: The extended location name.
  ResourceProvisioningState:
    type: string
    description: The current deployment state of resource.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    - Created
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
  DatadogInstallMethod:
    type: object
    properties:
      tool:
        description: The tool.
        type: string
      toolVersion:
        description: The tool version.
        type: string
      installerVersion:
        description: The installer version.
        type: string
  DatadogHostListResponse:
    description: Response of a list operation.
    type: object
    properties:
      value:
        description: Results of a list operation.
        type: array
        items:
          $ref: '#/definitions/DatadogHost'
      nextLink:
        description: Link to the next set of results, if any.
        type: string
  ResourceStatus:
    description: The resource status information.
    type: object
    properties:
      type:
        description: The type of the condition.
        type: string
        readOnly: true
      status:
        description: Status of the condition.
        type: string
        readOnly: true
      reason:
        description: The reason for the condition's status.
        type: string
        readOnly: true
      message:
        description: A human readable message indicating details about the status.
        type: string
        readOnly: true
      severity:
        description: Severity with which to treat failures of this type of condition.
        type: string
        readOnly: true
      lastUpdatedAt:
        description: The last update time for this condition.
        type: string
        format: date-time
        readOnly: true
  DatadogHostMetadata:
    type: object
    properties:
      agentVersion:
        description: The agent version.
        type: string
      installMethod:
        $ref: '#/definitions/DatadogInstallMethod'
      logsAgent:
        $ref: '#/definitions/DatadogLogsAgent'
  DatadogLogsAgent:
    type: object
    properties:
      transport:
        description: The transport.
        type: string
  ErrorResponseBody:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      target:
        type: string
      details:
        type: array
        items:
          $ref: '#/definitions/ErrorResponseBody'
  HostsList:
    description: List of Hosts.
    type: object
    properties:
      nextLink:
        description: Url to follow for getting next page of Hosts.
        type: string
      value:
        description: Array of Hosts
        type: array
        items:
          $ref: '#/definitions/Host'
    required:
    - value
  ResourcePatch:
    type: object
    properties:
      tags:
        type: object
        additionalProperties:
          type: string
        description: Resource tags.
    description: Object containing updates for patch operations.
  ResourceProviderDefaultErrorResponse:
    type: object
    properties:
      error:
        $ref: '#/definitions/ErrorResponseBody'
  Host:
    description: Define the host.
    required:
    - location
    - properties
    type: object
    x-ms-azure-resource: true
    properties:
      properties:
        x-ms-client-flatten: true
        description: Resource properties.
        $ref: '#/definitions/HostProperties'
      location:
        description: Gets or sets the location.
        type: string
        x-ms-mutability:
        - read
        - create
      extendedLocation:
        $ref: '#/definitions/ExtendedLocation'
        description: Gets or sets the extended location.
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        description: The system data.
      tags:
        description: Gets or sets the Resource tags.
        type: object
        additionalProperties:
          type: string
      name:
        description: Gets or sets the name.
        type: string
        readOnly: true
      id:
        description: Gets or sets the Id.
        type: string
        readOnly: true
      type:
        description: Gets or sets the type of the resource.
        type: string
        readOnly: true
      kind:
        type: string
        description: Metadata used by portal/tooling/etc to render different UX experiences for resources of the same type; e.g. ApiApps are a kind of Microsoft.Web/sites type.  If supported, the resource provider must validate and persist this value.
  DatadogHost:
    type: object
    properties:
      name:
        description: The name of the host.
        type: string
      aliases:
        description: The aliases for the host.
        type: array
        items:
          type: string
      apps:
        description: The Datadog integrations reporting metrics for the host.
        type: array
        items:
          type: string
      meta:
        $ref: '#/definitions/DatadogHostMetadata'
parameters:
  resourceGroupName:
    in: path
    name: resourceGroupName
    description: The Resource Group Name.
    required: true
    type: string
    x-ms-parameter-location: method
  MonitorNameParameter:
    in: path
    name: monitorName
    description: Monitor resource name
    required: true
    type: string
    x-ms-parameter-location: method
  api-version:
    in: query
    name: api-version
    description: Client Api Version.
    required: true
    type: string
  ResourceGroupNameParameter:
    name: resourceGroupName
    in: path
    description: The name of the resource group to which the Datadog resource belongs.
    required: true
    type: string
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    description: The Microsoft Azure subscription ID.
    required: true
    type: string
  subscriptionId:
    in: path
    name: subscriptionId
    description: The Subscription ID.
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
