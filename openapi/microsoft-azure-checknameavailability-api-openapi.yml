      nameAvailable:
        type: boolean
        description: Indicates whether the resource name is available.
      reason:
        type: string
        description: Reason for name being unavailable.
    description: Represents a resource name availability.
  CheckNameAvailabilityRequest:
    description: Management group name availability check parameters.
    type: object
    properties:
      name:
        type: string
        description: the name to check for availability
      type:
        type: string
        enum:
        - /providers/Microsoft.Management/managementGroups
        x-ms-enum:
          name: Type
          modelAsString: false
          values:
