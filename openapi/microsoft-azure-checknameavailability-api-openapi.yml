        description: fully qualified resource type which includes provider namespace
  NameAvailability:
    properties:
      message:
        type: string
        description: Error Message.
      nameAvailable:
        type: boolean
        description: Indicates whether the resource name is available.
      reason:
        type: string
        description: Reason for name being unavailable.
    description: Represents a resource name availability.
  CheckNameAvailabilityInput:
    description: Input of CheckNameAvailability API.
    type: object
    required:
    - name
    - type
    properties:
      name:
        description: The resource name to validate.
        type: string
      type:
        description: The type of the resource whose name is to be validated.
        $ref: '#/definitions/ResourceType'
  ErrorResponse_2:
    title: Error response
    description: Error response indicates Azure Front Door Standard or Azure Front Door Premium or CDN service is not able to process the incoming request. The reason is provided in the error message.
    type: object
    properties:
      error:
        $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorDetail
  CheckNameAvailabilityResult:
    description: Describes the result of the request to check management group name availability.
    properties:
      nameAvailable:
        description: Required. True indicates name is valid and available. False indicates the name is invalid, unavailable, or both.
        type: boolean
        readOnly: true
      reason:
        description: Required if nameAvailable == false. Invalid indicates the name provided does not match the resource provider's naming requirements (incorrect length, unsupported characters, etc.) AlreadyExists indicates that the name is already in use and is therefore unavailable.
        type: string
        enum:
        - Invalid
        - AlreadyExists
        x-ms-enum:
          name: Reason
          modelAsString: false
          values:
          - value: Invalid
          - value: AlreadyExists
        readOnly: true
      message:
        description: Required if nameAvailable == false. Localized. If reason == invalid, provide the user with the reason why the given name is invalid, and provide the resource naming requirements so that the user can select a valid name. If reason == AlreadyExists, explain that is already in use, and direct them to select a different name.
        type: string
        readOnly: true
  NameAvailabilityRequest_2:
    type: object
    required:
    - name
    properties:
      name:
        type: string
        description: Resource name to verify.
      type:
        type: string
        description: Resource type used for verification.
    description: Request from client to check resource name availability.
  ErrorDefinition:
    description: Error definition.
    properties:
      code:
        description: Service specific error code which serves as the substatus for the HTTP error code.
        type: string
        readOnly: true
      message:
        description: Description of the error.
        type: string
        readOnly: true
      details:
        description: Internal error details.
        type: array
        items:
          $ref: '#/definitions/ErrorDefinition'
        readOnly: true
  CheckNameAvailabilityResponse:
    description: Response for whether the requested resource name is available or not.
    type: object
    properties:
      nameAvailable:
        description: Returns true or false depending on the availability of the name
        type: boolean
      reason:
        description: Reason for why value is not available. This field is returned if nameAvailable is false.
        type: string
      message:
        description: Gets an error message explaining the 'reason' value with more details. This field is returned iif nameAvailable is false.
        type: string
  ErrorResponse:
    description: Error response.
    properties:
      error:
        description: Error description
        $ref: '#/definitions/ErrorDefinition'
  ErrorResponse_3:
    description: The error object.
    properties:
      error:
        title: Error
        $ref: '#/definitions/ErrorDetails'
