      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/MonitorNameParameter'
      - $ref: '#/parameters/SubAccountNameParameter'
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/LogzMonitorResource'
        default:
          description: Default error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-examples:
        SubAccount_Get:
          $ref: ./examples/SubAccount_Get.json
      description: Needs a more full description created.
    delete:
      tags:
      - SubAccount
      summary: Microsoft Azure Delete A Sub Account Resource This Delete Operation Can Take Upto 10 Minutes To Complete
      operationId: microsoftAzureSubaccountDelete
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/MonitorNameParameter'
      - $ref: '#/parameters/SubAccountNameParameter'
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
        '202':
          description: Success
          headers:
            location:
              description: URL to query for status of the operation.
              type: string
        '204':
          description: Success
        default:
          description: Default error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: true
