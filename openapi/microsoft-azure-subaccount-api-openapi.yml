      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Logz/monitors/{monitorName}/accounts/{subAccountName}
  : put:
      tags:
      - SubAccount
      summary: Microsoft Azure Create Sub Account Under A Given Monitor Resource This Create Operation Can Take Upto 10 Minutes To Complete
      operationId: microsoftAzureSubaccountCreate
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/MonitorNameParameter'
      - $ref: '#/parameters/SubAccountNameParameter'
      - in: body
        name: body
        schema:
          $ref: '#/definitions/LogzMonitorResource'
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/LogzMonitorResource'
        '201':
          description: Success
          schema:
            $ref: '#/definitions/LogzMonitorResource'
        default:
          description: Default error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-examples:
        subAccount_Create:
          $ref: ./examples/SubAccount_Create.json
      description: Needs a more full description created.
    get:
      tags:
      - SubAccount
      summary: Microsoft Azure Get A Sub Account Under A Given Monitor Resource
      operationId: microsoftAzureSubaccountGet
      produces:
