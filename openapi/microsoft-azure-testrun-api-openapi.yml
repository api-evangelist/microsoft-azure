        maxLength: 50
        minLength: 2
        pattern: ^[a-z0-9_-]*$
      - in: query
        name: oldTestRunId
        description: Existing testRunId to re run new test
        type: string
      - in: query
        name: api-version
        description: Api version
        required: true
        type: string
      - in: body
        name: body
        description: Load test run model
        required: true
        schema:
          $ref: '#/definitions/TestRunModel'
      responses:
