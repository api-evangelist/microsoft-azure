swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector CloudAppliances API
schemes:
- https
tags:
- name: CloudAppliances
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.StorSimple/managers/{managerName}/cloudApplianceConfigurations
  : get:
      tags:
      - CloudAppliances
      description: Lists supported cloud appliance models and supported configurations.
      operationId: microsoftAzureCloudappliancesListsupportedconfigurations
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/managerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The collection of cloud appliance configuration.
          schema:
            $ref: '#/definitions/CloudApplianceConfigurationList'
      deprecated: false
      x-ms-pageable:
        nextLinkName: null
      x-ms-examples:
        CloudAppliancesListSupportedConfigurations:
          $ref: ./examples/CloudAppliancesListSupportedConfigurations.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storsimple Managers Managername Cloudapplianceconfigurations
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.StorSimple/managers/{managerName}/provisionCloudAppliance
  : post:
      tags:
      - CloudAppliances
      description: Provisions cloud appliance.
      operationId: microsoftAzureCloudappliancesProvision
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: parameters
        in: body
        description: The cloud appliance
        required: true
        schema:
          $ref: '#/definitions/CloudAppliance'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/managerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: Successfully created job for provision cloud appliance.
        '202':
          description: Accepted the request to provision cloud appliance.
      deprecated: false
      x-ms-long-running-operation: true
      x-ms-examples:
        CloudAppliancesProvision:
          $ref: ./examples/CloudAppliancesProvision.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storsimple Managers Managername Provisioncloudappliance
definitions:
  CloudApplianceConfiguration:
    description: The cloud appliance configuration
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/BaseModel'
    properties:
      properties:
        $ref: '#/definitions/CloudApplianceConfigurationProperties'
        description: The properties.
        x-ms-client-flatten: true
  AcsConfiguration:
    description: The ACS configuration.
    required:
    - namespace
    - realm
    - serviceUrl
    type: object
    properties:
      namespace:
        description: The namespace.
        type: string
      realm:
        description: The realm.
        type: string
      serviceUrl:
        description: The service URL.
        type: string
  VmImage:
    description: The virtual machine image.
    required:
    - name
    - version
    - offer
    - publisher
    - sku
    type: object
    properties:
      name:
        description: The name.
        type: string
      version:
        description: The version.
        type: string
      offer:
        description: The offer.
        type: string
      publisher:
        description: The publisher.
        type: string
      sku:
        description: The SKU.
        type: string
  CloudApplianceConfigurationList:
    description: The cloud appliance configuration list
    required:
    - value
    type: object
    properties:
      value:
        description: The value.
        type: array
        items:
          $ref: '#/definitions/CloudApplianceConfiguration'
  CloudAppliance:
    description: The cloud appliance.
    required:
    - name
    - vnetRegion
    type: object
    properties:
      name:
        description: The name.
        type: string
      vnetName:
        description: The name of the virtual network.
        type: string
      vnetRegion:
        description: The virtual network region.
        type: string
      isVnetDnsConfigured:
        description: Indicates whether virtual network used is configured with DNS or not.
        type: boolean
      isVnetExpressConfigured:
        description: Indicates whether virtual network used is configured with express route or not.
        type: boolean
      subnetName:
        description: The name of the subnet.
        type: string
      storageAccountName:
        description: The name of the storage account.
        type: string
      storageAccountType:
        description: The type of the storage account.
        type: string
      vmType:
        description: The type of the virtual machine.
        type: string
      vmImageName:
        description: The name of the virtual machine image.
        type: string
      modelNumber:
        description: The model number.
        type: string
  BaseModel:
    description: Represents the base class for all other ARM object models
    type: object
    properties:
      id:
        description: The path ID that uniquely identifies the object.
        type: string
        readOnly: true
      name:
        description: The name of the object.
        type: string
        readOnly: true
      type:
        description: The hierarchical type of the object.
        type: string
        readOnly: true
      kind:
        description: The Kind of the object. Currently only Series8000 is supported
        enum:
        - Series8000
        type: string
        x-ms-enum:
          name: Kind
          modelAsString: false
  CloudApplianceConfigurationProperties:
    description: The properties of cloud appliance configuration.
    required:
    - modelNumber
    - cloudPlatform
    - acsConfiguration
    - supportedStorageAccountTypes
    - supportedRegions
    - supportedVmTypes
    - supportedVmImages
    type: object
    properties:
      modelNumber:
        description: The model number.
        type: string
      cloudPlatform:
        description: The cloud platform.
        type: string
      acsConfiguration:
        $ref: '#/definitions/AcsConfiguration'
        description: The ACS configuration.
      supportedStorageAccountTypes:
        description: The supported storage account types.
        type: array
        items:
          type: string
      supportedRegions:
        description: The supported regions.
        type: array
        items:
          type: string
      supportedVmTypes:
        description: The supported virtual machine types.
        type: array
        items:
          type: string
      supportedVmImages:
        description: The supported virtual machine images.
        type: array
        items:
          $ref: '#/definitions/VmImage'
        x-ms-identifiers:
        - name
        - offer
        - publisher
        - sku
        - version
