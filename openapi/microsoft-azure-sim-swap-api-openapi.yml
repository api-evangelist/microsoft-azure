swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Sim Swap API
schemes:
- https
tags:
- name: Sim Swap
paths:
  /sim-swap/sim-swap:retrieve:
    post:
      operationId: microsoftAzureSimswapRetrieve
      description: Provides timestamp of latest SIM swap
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      - $ref: '#/parameters/ApcGatewayIdHeader'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/SimSwapRetrievalContent'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/SimSwapRetrievalResult'
          headers:
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
            x-ms-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, server-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        SimSwap_Retrieve:
          $ref: ./examples/SimSwap_Retrieve_MaximumSet_Gen.json
      summary: Microsoft Azure Post Sim Swap Sim Swap:retrieve
      tags:
      - Sim Swap
  /sim-swap/sim-swap:verify:
    post:
      operationId: microsoftAzureSimswapVerify
      description: Verifies if a SIM swap has been performed during a past period (defined in the request with 'maxAgeHours' attribute). Returns 'True' if a SIM swap has occured.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      - $ref: '#/parameters/ApcGatewayIdHeader'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/SimSwapVerificationContent'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/SimSwapVerificationResult'
          headers:
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
            x-ms-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, server-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        SimSwap_Verify:
          $ref: ./examples/SimSwap_Verify_MaximumSet_Gen.json
      summary: Microsoft Azure Post Sim Swap Sim Swap:verify
      tags:
      - Sim Swap
definitions:
  SimSwapVerificationContent:
    type: object
    description: Request to verify SimSwap in period
    properties:
      phoneNumber:
        type: string
        description: Phone number in E.164 format (starting with country code), and optionally prefixed with '+'
        pattern: ^\+?[0-9]{5,15}$
      maxAgeHours:
        type: integer
        format: int32
        description: Maximum lookback for SimSwap verification
        default: 240
        minimum: 1
        maximum: 2400
      networkIdentifier:
        $ref: '#/definitions/NetworkIdentifier'
        description: Identifier for the network to query for this device.
    required:
    - networkIdentifier
  Azure.Core.Foundations.ErrorResponse:
    type: object
    description: A response containing error details.
    properties:
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: The error object.
    required:
    - error
  SimSwapRetrievalResult:
    type: object
    description: Response with SimSwap date
    properties:
      date:
        type: string
        format: date-time
        description: Datetime of most recent swap for SIM
  SimSwapVerificationResult:
    type: object
    description: Response verifying SimSwap in period
    properties:
      verificationResult:
        type: boolean
        description: True if the SIM has swapped in the specified period, False otherwise
    required:
    - verificationResult
  Azure.Core.Foundations.InnerError:
    type: object
    description: An object containing more specific information about the error. As per Microsoft One API guidelines - https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: Inner error.
  NetworkIdentifier:
    type: object
    description: Identifier for the network to be queried
    properties:
      identifierType:
        type: string
        description: 'The type of identifier for the network. one of: ''IPv4'', ''IPv6'', ''NetworkCode'''
      identifier:
        type: string
        description: 'The network identifier, based on the identifierType: an IPv4 address, and IPv6 address, or a Network Code.

          A Network Code may be obtained from APC documentation or from the APC /Network:retrieve endpoint.'
    required:
    - identifierType
    - identifier
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
  SimSwapRetrievalContent:
    type: object
    description: Request to retrieve SimSwap date
    properties:
      phoneNumber:
        type: string
        description: Phone number in E.164 format (starting with country code), and optionally prefixed with '+'
        pattern: ^\+?[0-9]{5,15}$
      networkIdentifier:
        $ref: '#/definitions/NetworkIdentifier'
        description: Network to query for this device
    required:
    - networkIdentifier
parameters:
  Azure.Core.ClientRequestIdHeader:
    name: x-ms-client-request-id
    in: header
    description: An opaque, globally-unique, client-generated string identifier for the request.
    required: false
    type: string
    format: uuid
    x-ms-parameter-location: method
    x-ms-client-name: clientRequestId
  ApcGatewayIdHeader:
    name: apc-gateway-id
    in: header
    description: The identifier of the APC Gateway resource which should handle this request.
    required: true
    type: string
    x-ms-parameter-location: method
    x-ms-client-name: apcGatewayId
  Azure.Core.Foundations.ApiVersionParameter:
    name: api-version
    in: query
    description: The API version to use for this operation.
    required: true
    type: string
    minLength: 1
    x-ms-parameter-location: method
    x-ms-client-name: apiVersion
