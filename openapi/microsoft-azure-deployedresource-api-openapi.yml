swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector DeployedResource API
  description: Deployed resources controller.
schemes:
- https
tags:
- name: DeployedResource
  description: Deployed resources controller.
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/modernizeProjects/{modernizeProjectName}/deployedResources/{deployedResourceName}
  : get:
      tags:
      - DeployedResource
      summary: Microsoft Azure Gets The Deployed Resource
      description: Gets the details of the deployed resource.
      operationId: microsoftAzureDeployedresourceGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: modernizeProjectName
        pattern: ^[a-z][a-z0-9]*$
        description: ModernizeProject name.
        required: true
        type: string
      - in: path
        name: deployedResourceName
        pattern: ^[a-z][a-z0-9]*$
        description: Workload deployment name.
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DeployedResourceModel'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ArmError'
      x-ms-examples:
        DeployedResource_Get_MaximumSet_Gen:
          $ref: ./examples/DeployedResource_Get_MaximumSet_Gen.json
        DeployedResource_Get_MinimumSet_Gen:
          $ref: ./examples/DeployedResource_Get_MinimumSet_Gen.json
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/modernizeProjects/{modernizeProjectName}/deployedResources
  : get:
      tags:
      - DeployedResource
      summary: Microsoft Azure Lists The Deployed Resources
      description: Gets the list of deployed resources in the given modernizeProject.
      operationId: microsoftAzureDeployedresourceList
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - in: path
        name: modernizeProjectName
        pattern: ^[a-z][a-z0-9]*$
        description: ModernizeProject name.
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DeployedResourceModelCollection'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ArmError'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        DeployedResource_List_MaximumSet_Gen:
          $ref: ./examples/DeployedResource_List_MaximumSet_Gen.json
        DeployedResource_List_MinimumSet_Gen:
          $ref: ./examples/DeployedResource_List_MinimumSet_Gen.json
definitions:
  SystemDataModel:
    description: System data required to be defined for Azure resources.
    type: object
    properties:
      createdBy:
        description: Gets or sets identity that created the resource.
        type: string
      createdByType:
        description: "Gets or sets the type of identity that created the resource: user, application,\r\nmanagedIdentity."
        type: string
      createdAt:
        format: date-time
        description: Gets or sets the timestamp of resource creation (UTC).
        type: string
      lastModifiedBy:
        description: Gets or sets the identity that last modified the resource.
        type: string
      lastModifiedByType:
        description: "Gets or sets the type of identity that last modified the resource: user, application,\r\nmanagedIdentity."
        type: string
      lastModifiedAt:
        format: date-time
        description: Gets or sets the timestamp of resource last modification (UTC).
        type: string
  DeployedResourceModelCollection:
    description: DeployedResource model collection.
    type: object
    properties:
      value:
        description: Gets or sets the list of deployedResources.
        type: array
        items:
          $ref: '#/definitions/DeployedResourceModel'
      nextLink:
        description: Gets or sets the value of next link.
        type: string
  DeployedResourceModelProperties:
    description: DeployedResource properties.
    type: object
    properties:
      resourcesDeployed:
        description: Gets or sets the list of resources deployed.
        type: object
        additionalProperties:
          type: string
      workloadDeploymentId:
        description: Gets or sets the workload deployment id.
        type: string
        readOnly: true
      displayName:
        description: Gets or sets the name of deployed resources.
        type: string
        readOnly: true
      deploymentTimestamp:
        format: date-time
        description: Gets or sets the deployment timestamp.
        type: string
        readOnly: true
      targetAzureService:
        description: Gets or sets the deployment target service.
        enum:
        - AzureKubernetesService
        - AzureAppServiceContainer
        - AzureAppServiceNative
        type: string
        readOnly: true
        x-ms-enum:
          name: WorkloadDeploymentTarget
          modelAsString: true
      containerRegistryId:
        description: Gets or sets the container registry ARM Id.
        type: string
        readOnly: true
      imageName:
        description: Gets or sets the image name.
        type: string
        readOnly: true
      imageTag:
        description: Gets or sets the image tag.
        type: string
        readOnly: true
      appIp:
        description: Gets or sets the app ip address.
        type: string
        readOnly: true
      secretStoreId:
        description: Gets or sets the secret store ARM Id.
        type: string
      customProperties:
        description: Gets or sets the custom deployed resource properties.
        type: object
        additionalProperties:
          type: string
  DeployedResourceModel:
    description: DeployedResource model.
    type: object
    properties:
      properties:
        $ref: '#/definitions/DeployedResourceModelProperties'
      id:
        description: Gets or sets the Id of the resource.
        type: string
        readOnly: true
      name:
        description: Gets or sets the name of the resource.
        type: string
        readOnly: true
      type:
        description: Gets or sets the type of the resource.
        type: string
        readOnly: true
      systemData:
        allOf:
        - $ref: '#/definitions/SystemDataModel'
        readOnly: true
      tags:
        description: Gets or sets the resource tags.
        type: object
        additionalProperties:
          type: string
    x-ms-azure-resource: true
  ArmErrorInfo:
    description: Arm error information.
    type: object
    properties:
      code:
        description: Gets or sets the error code returned by the service.
        type: string
      message:
        description: Gets or sets error Message returned by the service.
        type: string
  ArmError:
    description: ARM error.
    type: object
    properties:
      error:
        $ref: '#/definitions/ArmErrorInfo'
parameters:
  resourceGroupName:
    in: path
    name: resourceGroupName
    description: Name of the Azure Resource Group that project is part of.
    required: true
    type: string
    x-ms-parameter-location: method
  subscriptionId:
    in: path
    name: subscriptionId
    description: Azure Subscription Id in which project was created.
    required: true
    type: string
    x-ms-parameter-location: method
  api-version:
    in: query
    name: api-version
    description: Client Api Version.
    required: true
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
