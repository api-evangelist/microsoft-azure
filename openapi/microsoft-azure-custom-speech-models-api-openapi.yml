swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Models: API'
schemes:
- https
tags:
- name: 'Custom Speech Models:'
paths:
  /models/locales:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets A List Of Supported Locales For Model Adaptation
      operationId: microsoftAzureGetsupportedlocalesformodels
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelLocales'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get the supported locales:
          $ref: ./examples/get_supported_model_locales.json
      description: Needs a more full description created.
  /models:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets The List Of Models For The Authenticated Subscription
      operationId: microsoftAzureGetmodels
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Model'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get all models:
          $ref: ./examples/get_models.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Creates A New Model
      operationId: microsoftAzureCreatemodel
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: modelDefinition
        description: The details of the new model.
        required: true
        schema:
          $ref: '#/definitions/SpeechModelDefinition'
      responses:
        '202':
          description: The request was accepted and the response contains the location of the entity.
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
            Location:
              description: The location of the created resource.
              type: string
              format: uri
            Operation-Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Create a model:
          $ref: ./examples/create_model.json
      description: Needs a more full description created.
  /models/{id}:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets The Model Identified By The Given Id
      operationId: microsoftAzureGetmodel
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Model'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get a model:
          $ref: ./examples/get_model.json
      description: Needs a more full description created.
    patch:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Updates The Metadata Of The Model Identified By The Given Id
      operationId: microsoftAzureUpdatemodel
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model.
        required: true
        type: string
        format: uuid
      - in: body
        name: modelUpdate
        description: The updated values for the model.
        required: true
        schema:
          $ref: '#/definitions/ModelUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Model'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update a model:
          $ref: ./examples/update_model.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Deletes The Model Identified By The Given Id
      operationId: microsoftAzureDeletemodel
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The model was successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete a model:
          $ref: ./examples/delete_model.json
      description: Needs a more full description created.
  /models/base:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets The List Of Base Models For The Authenticated Subscription
      operationId: microsoftAzureGetbasemodels
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/skipQueryParameter'
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedModels'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all base models:
          $ref: ./examples/get_base_models.json
      description: Needs a more full description created.
  /models/base/{id}:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets The Base Model Identified By The Given Id
      operationId: microsoftAzureGetbasemodel
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the base model.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Model_2'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get a base model:
          $ref: ./examples/get_base_model.json
      description: Needs a more full description created.
  /models/{id}/copyto:
    post:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Copies A Model From One Subscription To Another
      description: This method can be used to copy a model from one location to another. If the target subscription<br>key belongs to a subscription created for another location, the model will be copied to that location.<br>Only adapted models are allowed to copy to another subscription.
      operationId: microsoftAzureCopymodeltosubscription
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model that will be copied.
        required: true
        type: string
        format: uuid
      - in: body
        name: modelCopy
        description: The body contains the subscription key of the target subscription.
        required: true
        schema:
          $ref: '#/definitions/ModelCopy'
      responses:
        '201':
          description: The response contains information about the entity as payload and its location as header.
          schema:
            $ref: '#/definitions/Model_2'
          headers:
            Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Copy a model:
          $ref: ./examples/copy_model.json
  /models/{id}/manifest:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Returns An Manifest For This Model Which Can Be Used In An On Premise Container
      operationId: microsoftAzureGetmodelmanifest
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The ID of the model to generate a manifest for.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: Successfully generated a model manifest.
          schema:
            $ref: '#/definitions/ModelManifest'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get a model manifest:
          $ref: ./examples/get_model_manifest.json
      description: Needs a more full description created.
  /models/base/{id}/manifest:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Returns An Manifest For This Base Model Which Can Be Used In An On Premise Container
      operationId: microsoftAzureGetbasemodelmanifest
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The ID of the model to generate a manifest for.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: Successfully generated a model manifest.
          schema:
            $ref: '#/definitions/ModelManifest'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get a base model manifest:
          $ref: ./examples/get_base_model_manifest.json
      description: Needs a more full description created.
  /models/{id}:copyto:
    post:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Copies A Model From One Subscription To Another
      description: This method can be used to copy a model from one location to another. If the target subscription<br>key belongs to a subscription created for another location, the model will be copied to that location.<br>Only adapted models are allowed to copy to another subscription.
      operationId: microsoftAzureModelsCopyto
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model that will be copied.
        required: true
        type: string
        format: uuid
      - in: body
        name: modelCopy
        description: The body contains the subscription key of the target subscription.
        required: true
        schema:
          $ref: '#/definitions/ModelCopy_2'
      responses:
        '201':
          description: The response contains information about the entity as payload and its location as header.
          schema:
            $ref: '#/definitions/CustomModel'
          headers:
            Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_3'
      x-ms-examples:
        Copy a model:
          $ref: ./examples/copy_model.json
  /models/{id}/files:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets The Files Of The Model Identified By The Given Id
      operationId: microsoftAzureModelsListfiles
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter_2'
      - $ref: '#/parameters/skipQueryParameter'
      - $ref: '#/parameters/topQueryParameter'
      - in: query
        name: filter
        description: "A filtering expression for selecting a subset of the available files.\r\n            - Supported properties: name, createdDateTime, kind.\r\n            - Operators:\r\n              - eq, ne are supported for all properties.\r\n              - gt, ge, lt, le are supported for createdDateTime.\r\n              - and, or, not are supported.\r\n            - Example:\r\n              filter=name eq 'myaudio.wav' and kind eq 'Audio'"
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedFiles'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_3'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all files:
          $ref: ./examples/get_model_files.json
      description: Needs a more full description created.
  /models/{id}/files/{fileId}:
    get:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Gets One Specific File Identified With Fileid From A Model Identified With Id
      operationId: microsoftAzureModelsGetfile
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model.
        required: true
        type: string
        format: uuid
      - in: path
        name: fileId
        description: The identifier of the file.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/File'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_3'
      x-ms-examples:
        Get a file:
          $ref: ./examples/get_model_file.json
      description: Needs a more full description created.
  /models/{id}:copy:
    post:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Copies A Model From One Subscription To Another
      description: This method can be used to copy a model from this speech resource to a target one.<br>The authorization is obtained on the target speech resource.<br>Only custom models can be copied to another speech resource.
      operationId: microsoftAzureModelsCopy
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the model that will be copied.
        required: true
        type: string
        format: uuid
      - in: body
        name: modelCopyAuthorization
        description: The body contains the authorization to copy to the target speech resource.
        required: true
        schema:
          $ref: '#/definitions/ModelCopyAuthorization'
      responses:
        '202':
          description: The response contains information about the entity as payload and its location as header.
          schema:
            $ref: '#/definitions/Operation'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
              format: int32
            Operation-Location:
              description: The location of the operation to track progress.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_6'
      x-ms-long-running-operation: true
      x-ms-examples:
        Copy a model from source resource to target resource:
          $ref: ./examples/copy_model_with_authorization.json
  /models:authorizecopy:
    post:
      tags:
      - 'Custom Speech Models:'
      summary: Microsoft Azure Allows Another Speech Resource Source To Copy A Model To This Speech Resource Target
      description: This method can be used to allow copying a model from another speech resource.<br>Only custom models can be copied from another speech resource.
      operationId: microsoftAzureModelsAuthorizecopy
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: modelCopyAuthorizationDefinition
        description: The body contains the Azure Resource ID of the source speech resource.
        required: true
        schema:
          $ref: '#/definitions/ModelCopyAuthorizationDefinition'
      responses:
        '200':
          description: The response contains information about the entity as payload and its location as header.
          schema:
            $ref: '#/definitions/ModelCopyAuthorization'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_6'
      x-ms-examples:
        Create a copy model authorization on target resource:
          $ref: ./examples/create_copy_model_authorization.json
definitions:
  ModelFile:
    title: ModelFile
    type: object
    properties:
      name:
        description: The name of this file.
        type: string
        readOnly: true
      contentUrl:
        format: uri
        description: The url to retrieve the content of this file.
        type: string
        readOnly: true
  ErrorDetail:
    title: ErrorDetail
    description: An array of implementations of this interface can be used as details for an error.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: "A service-defined error code that should be human-readable.\r\nThis code serves as a more specific indicator of the error than\r\nthe HTTP error code specified in the response."
        type: string
      message:
        description: "A human-readable representation of the error. It is intended as\r\nan aid to developers and is not suitable for exposure to end users."
        type: string
      target:
        description: The target of the particular error (e.g., the name of the property in error).
        type: string
  EntityError:
    title: EntityError
    type: object
    properties:
      code:
        description: The code of this error.
        type: string
        readOnly: true
      message:
        description: The message for this error.
        type: string
        readOnly: true
  ModelKind:
    title: ModelKind
    description: Type of speech model.
    enum:
    - Acoustic
    - Language
    - AcousticAndLanguage
    type: string
    x-ms-enum:
      name: ModelKind
      modelAsString: false
      values:
      - value: Acoustic
        description: An acoustic model.
      - value: Language
        description: A language model.
      - value: AcousticAndLanguage
        description: An acoustic and language model.
  ModelUpdate:
    title: ModelUpdate
    required:
    - name
    type: object
    properties:
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
  Error_2:
    title: Error
    description: "New format which conforms to the new Cognitive Services API guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow.\r\nThis contains an outer error with error code, message, details, target and an inner error with more descriptive details."
    type: object
    properties:
      code:
        $ref: '#/definitions/ErrorCode'
      details:
        description: Additional supportive details regarding the error and/or expected policies.
        type: array
        items:
          $ref: '#/definitions/Error_2'
      message:
        description: High level error message.
        type: string
      target:
        description: "The source of the error.\r\nFor example it would be \"documents\" or \"document id\" in case of invalid document."
        type: string
      innerError:
        $ref: '#/definitions/InnerError'
  SpeechModelDefinition:
    title: SpeechModelDefinition
    required:
    - locale
    - modelKind
    - name
    type: object
    properties:
      modelKind:
        $ref: '#/definitions/ModelKind'
      text:
        description: The text used to adapt this language model.
        type: string
      baseModel:
        $ref: '#/definitions/ModelIdentity'
      datasets:
        description: Datasets used for adaptation.
        type: array
        items:
          $ref: '#/definitions/DatasetIdentity'
      description:
        description: The description of the object.
        type: string
      locale:
        description: The locale of the contained data.
        type: string
      properties:
        description: "The custom properties of this entity. The maximum allowed key length is 64 characters, the maximum\r\nallowed value length is 256 characters and the count of allowed entries is 10."
        type: object
        additionalProperties:
          type: string
      name:
        description: The name of the object.
        type: string
  File:
    title: File
    type: object
    properties:
      kind:
        $ref: '#/definitions/FileKind'
      links:
        $ref: '#/definitions/FileLinks'
      createdDateTime:
        format: date-time
        description: "The creation time of this file.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/FileProperties'
      name:
        description: The name of this file.
        type: string
        readOnly: true
      self:
        format: uri
        description: The location of this entity.
        type: string
        readOnly: true
  SharedModelFeatures:
    title: SharedModelFeatures
    description: Features supported by the model.
    type: object
    properties:
      supportsTranscriptions:
        description: A value indicating whether batch transcription is supported.
        type: boolean
        readOnly: true
      supportsEndpoints:
        description: A value indicating whether creation of endpoints for live transcription is supported.
        type: boolean
        readOnly: true
      supportsTranscriptionsOnSpeechContainers:
        description: A value indicating whether this model can be used for transcription on speech container. This feature can be added on existing models when it becomes usable on speech container.
        type: boolean
        readOnly: true
  Operation:
    title: Operation
    required:
    - id
    type: object
    properties:
      id:
        format: uuid
        description: The identifier of this Operation.
        type: string
      result:
        $ref: '#/definitions/OperationResult'
      error:
        $ref: '#/definitions/EntityError_3'
      self:
        format: uri
        description: The location of this entity.
        type: string
        readOnly: true
      lastActionDateTime:
        format: date-time
        description: "The time-stamp when the current status was entered.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      status:
        $ref: '#/definitions/Status'
      createdDateTime:
        format: date-time
        description: "The time-stamp when the object was created.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
  PaginatedFiles:
    title: PaginatedFiles
    type: object
    properties:
      values:
        description: "A list of entities limited by either the passed query parameters 'skip' and 'top' or their default values.\r\n            \r\nWhen iterating through a list using pagination and deleting entities in parallel, some entities will be skipped in the results.\r\nIt's recommended to build a list on the client and delete after the fetching of the complete list."
        type: array
        items:
          $ref: '#/definitions/File'
        readOnly: true
      '@nextLink':
        format: uri
        description: A link to the next set of paginated results if there are more entities available; otherwise null.
        type: string
        readOnly: true
  EntityError_3:
    title: EntityError
    type: object
    properties:
      code:
        description: The code of this error.
        type: string
        readOnly: true
      message:
        description: The message for this error.
        type: string
        readOnly: true
    readOnly: true
  ModelCopy_2:
    title: ModelCopy
    required:
    - targetSubscriptionKey
    type: object
    properties:
      targetSubscriptionKey:
        description: The subscription key of the subscription that is the target of the copy operation.
        minLength: 1
        type: string
  Model_2:
    title: Model
    required:
    - displayName
    - locale
    type: object
    properties:
      project:
        $ref: '#/definitions/EntityReference'
      links:
        $ref: '#/definitions/ModelLinks'
      properties:
        $ref: '#/definitions/ModelProperties'
      self:
        format: uri
        description: The location of this entity.
        type: string
        readOnly: true
      displayName:
        description: The display name of the object.
        type: string
      description:
