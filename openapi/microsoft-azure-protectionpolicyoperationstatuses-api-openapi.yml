paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupPolicies/{policyName}/operations/{operationId}
  : get:
      tags:
      - ProtectionPolicyOperationStatuses
      description: Provides the status of the asynchronous operations like backup, restore. The status can be in progress, completed<br>or failed. You can refer to the Operation Status enum for all the possible states of an operation. Some operations<br>create jobs. This method returns the list of jobs associated with operation.
      operationId: microsoftAzureProtectionpolicyoperationstatusesGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/VaultName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: policyName
        in: path
        description: Backup policy name whose operation's status needs to be fetched.
        required: true
        type: string
      - name: operationId
        in: path
        description: Operation ID which represents an operation whose status needs to be fetched.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/OperationStatus'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        Get Protection Policy Operation Status:
          $ref: ./examples/AzureIaasVm/ProtectionPolicyOperationStatuses_Get.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Backuppolicies Policyname Operations Operationid
