definitions:
  RoleInstance:
    description: Describes the cloud service role instance.
    type: object
    properties:
      id:
        description: Resource Id
        type: string
        readOnly: true
      name:
        description: Resource Name.
        type: string
        readOnly: true
      type:
        description: Resource Type.
        type: string
        readOnly: true
      location:
        description: Resource Location.
        type: string
        readOnly: true
      tags:
        description: Resource tags.
        type: object
        additionalProperties:
          type: string
        readOnly: true
      sku:
        $ref: '#/definitions/InstanceSku'
      properties:
        $ref: '#/definitions/RoleInstanceProperties'
  RoleInstanceInstanceView:
    description: The instance view of the role instance.
    type: object
    properties:
      platformUpdateDomain:
        format: int32
        description: The Update Domain.
        type: integer
        readOnly: true
      platformFaultDomain:
        format: int32
        description: The Fault Domain.
        type: integer
        readOnly: true
      privateId:
        description: 'Specifies a unique identifier generated internally for the cloud service associated with this role instance. <br /><br /> NOTE: If you are using Azure Diagnostics extension, this property can be used as ''DeploymentId'' for querying details.'
        type: string
        readOnly: true
      statuses:
        type: array
        items:
          $ref: '#/definitions/ResourceInstanceViewStatus'
        x-ms-identifiers: []
        readOnly: true
  RoleInstanceNetworkProfile:
    description: Describes the network profile for the role instance.
    type: object
    properties:
      networkInterfaces:
        description: Specifies the list of resource Ids for the network interfaces associated with the role instance.
        type: array
        items:
          $ref: ./common.json#/definitions/SubResource
        readOnly: true
  RoleInstanceProperties:
    description: Role instance properties.
    type: object
    properties:
      networkProfile:
        $ref: '#/definitions/RoleInstanceNetworkProfile'
      instanceView:
        $ref: '#/definitions/RoleInstanceInstanceView'
  ResourceInstanceViewStatus:
    description: Instance view status.
    type: object
    properties:
      code:
        description: The status code.
        type: string
        readOnly: true
      displayStatus:
        description: The short localizable label for the status.
        type: string
        readOnly: true
      message:
        description: The detailed status message, including for alerts and error messages.
        type: string
        readOnly: true
      time:
        format: date-time
        description: The time of the status.
        type: string
        readOnly: true
      level:
        description: The level code.
        enum:
        - Info
        - Warning
        - Error
        type: string
        x-ms-enum:
          name: StatusLevelTypes
          modelAsString: false
  RoleInstanceListResult:
    description: The list operation result.
    type: object
    properties:
      value:
        description: The list of resources.
        type: array
        items:
          $ref: '#/definitions/RoleInstance'
      nextLink:
        description: The URI to fetch the next page of resources. Use this to get the next page of resources. Do this till nextLink is null to fetch all the resources.
        type: string
    required:
    - value
  InstanceSku:
    description: The role instance SKU.
    type: object
    properties:
      name:
        description: The sku name.
        type: string
        readOnly: true
      tier:
        description: The tier of the cloud service role instance.
        type: string
        readOnly: true
