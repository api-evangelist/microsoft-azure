swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Token API
schemes:
- https
tags:
- name: Token
paths:
  ? /modelmanagement/v1.0/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.MachineLearningServices/workspaces/{workspace}/services/{id}/token
  : post:
      tags:
      - Token
      summary: Microsoft Azure Generate Service Access Token
      description: Gets access token that can be used for calling service.
      operationId: microsoftAzureServicesGetservicetoken
      consumes: []
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupParameter'
      - $ref: '#/parameters/workspaceParameter'
      - name: id
        in: path
        description: The Service Id.
        required: true
        type: string
      responses:
        '201':
          description: Success
          schema:
            $ref: '#/definitions/AuthToken'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ModelErrorResponse'
  /identities/{id}/:issueAccessToken:
    post:
      tags:
      - Token
      summary: Microsoft Azure Issue A New Token For An Identity
      operationId: microsoftAzureCommunicationidentityIssueaccesstoken
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: Identifier of the identity to issue token for.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      - in: body
        name: body
        description: Requesting scopes for the new token.
        required: true
        schema:
          $ref: '#/definitions/CommunicationIdentityAccessTokenRequest'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/CommunicationIdentityAccessToken'
        default:
          description: Error
          schema:
            $ref: ../../../Common/stable/2021-03-07/common.json#/definitions/CommunicationErrorResponse
      x-ms-examples:
        Issue an access token:
          $ref: ./examples/IssueAccessToken.json
      description: Needs a more full description created.
definitions:
  ModelErrorResponse:
    description: The Model Management Service Error object.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      statusCode:
        format: int32
        description: The HTTP status code.
        type: integer
      message:
        description: The error message.
        type: string
      details:
        description: An array of error detail objects.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/ErrorDetails'
  CommunicationIdentityAccessTokenRequest:
    required:
    - scopes
    type: object
    properties:
      scopes:
        description: List of scopes attached to the token.
        type: array
        items:
          $ref: '#/definitions/CommunicationIdentityTokenScope'
  ErrorDetails:
    description: The error details.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      message:
        description: The error message.
        type: string
      target:
        description: The target of the error (e.g., the name of the property in error).
        type: string
  AuthToken:
    description: Service Token
    type: object
    properties:
      accessToken:
        description: Access token.
        type: string
      tokenType:
        description: Access token type.
        type: string
      expiryOn:
        format: int64
        description: Access token expiry time (UTC).
        type: integer
      refreshAfter:
        format: int64
        description: Refresh access token after time (UTC).
        type: integer
  CommunicationIdentityAccessToken:
    description: An access token.
    required:
    - expiresOn
    - token
    type: object
    properties:
      token:
        description: The access token issued for the identity.
        type: string
      expiresOn:
        format: date-time
        description: The expiry time of the token.
        type: string
  CommunicationIdentityTokenScope:
    description: List of scopes for an access token.
    enum:
    - chat
    - voip
    type: string
    x-ms-enum:
      name: CommunicationIdentityTokenScope
      modelAsString: true
parameters:
  workspaceParameter:
    name: workspace
    in: path
    description: The name of the workspace.
    required: true
    type: string
    x-ms-parameter-location: method
  ApiVersionParameter:
    in: query
    name: api-version
    description: Version of API to invoke.
    required: true
    type: string
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: The Azure Subscription ID.
    required: true
    type: string
    format: uuid
    x-ms-parameter-location: method
  resourceGroupParameter:
    name: resourceGroup
    in: path
    description: The Name of the resource group in which the workspace is located.
    required: true
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
