      tags:
      - Network Settings
      description: Triggers a new health check run. The execution and health check result can be tracked via the network Connection health check details
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: commonDefinitions.json#/parameters/SubscriptionIdParameter
      - $ref: commonDefinitions.json#/parameters/ResourceGroupNameParameter
