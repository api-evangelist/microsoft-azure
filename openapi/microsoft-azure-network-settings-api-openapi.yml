      operationId: microsoftAzureNetworkconnectionsRunhealthchecks
      responses:
        '200':
          description: OK. Successfully initiated health check.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: commonDefinitions.json#/definitions/CloudError
      x-ms-examples:
        NetworkConnections_RunHealthChecks:
          $ref: ./examples/NetworkConnections_RunHealthChecks.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devcenter Networkconnections Networkconnectionname Runhealthchecks
