      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      tags:
      - StorageTargets
      description: Tells the cache to write all dirty data to the Storage Target's backend storage. Client requests to this storage target's namespace will return errors until the flush operation completes.
      operationId: microsoftAzureStoragetargetFlush
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storagecache Caches Cachename Storagetargets Storagetargetname Flush
