      - Associations
      operationId: microsoftAzureAssociationsDelete
      x-ms-long-running-operation: true
      description: Delete an association.
      x-ms-examples:
        Delete an association:
          $ref: examples/deleteAssociation.json
      parameters:
      - name: scope
        in: path
        required: true
        type: string
        description: The scope of the association.
        x-ms-skip-url-encoding: true
      - name: associationName
        in: path
        required: true
        type: string
        description: The name of the association.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK. Association deleted.
        '202':
          description: Accepted. Association delete has been accepted.
        '204':
          description: No Content. Association was not found.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      produces:
      - application/json
      summary: Microsoft Azure Delete Scope Providers Microsoft Customproviders Associations Associationname
