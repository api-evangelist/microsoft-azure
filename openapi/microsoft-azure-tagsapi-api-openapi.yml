  Tag:
    description: Represents a Tag.
    required:
    - name
    - description
    - type
    type: object
    properties:
      id:
        format: uuid
        description: Gets the Tag ID.
        type: string
        readOnly: true
        x-nullable: false
      name:
        description: Gets or sets the name of the tag.
        type: string
        readOnly: false
        x-nullable: false
      description:
        description: Gets or sets the description of the tag.
        type: string
        readOnly: false
        x-nullable: true
      type:
        description: Gets or sets the type of the tag.
        enum:
        - Regular
        - Negative
        - GeneralProduct
        type: string
        readOnly: false
        x-nullable: false
        x-ms-enum:
          name: TagType
          modelAsString: true
      imageCount:
        format: int32
        description: Gets the number of images with this tag.
        type: integer
        readOnly: true
        x-nullable: false
