swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector TagsApi API
schemes:
- https
tags:
- name: TagsApi
paths:
  /projects/{projectId}/tags:
    get:
      tags:
      - TagsApi
      summary: Microsoft Azure Get The Tags For A Given Project And Iteration
      operationId: microsoftAzureGettags
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: query
        description: The iteration id. Defaults to workspace.
        required: false
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Tag'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetTags request:
          $ref: ./examples/GetTags.json
      description: Needs a more full description created.
    post:
      tags:
      - TagsApi
      summary: Microsoft Azure Create A Tag For The Project
      operationId: microsoftAzureCreatetag
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: name
        in: query
        description: The tag name.
        required: true
        type: string
      - name: description
        in: query
        description: Optional description for the tag.
        required: false
        type: string
      - name: type
        in: query
        description: Optional type for the tag.
        required: false
        type: string
        enum:
        - Regular
        - Negative
        - GeneralProduct
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Tag'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful CreateTag request:
          $ref: ./examples/CreateTag.json
      description: Needs a more full description created.
  /projects/{projectId}/tags/{tagId}:
    get:
      tags:
      - TagsApi
      summary: Microsoft Azure Get Information About A Specific Tag
      operationId: microsoftAzureGettag
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project this tag belongs to.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: tagId
        in: path
        description: The tag id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: query
        description: The iteration to retrieve this tag from. Optional, defaults to current training set.
        required: false
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Tag'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful GetTag request:
          $ref: ./examples/GetTag.json
      description: Needs a more full description created.
    delete:
      tags:
      - TagsApi
      summary: Microsoft Azure Delete A Tag From The Project
      operationId: microsoftAzureDeletetag
      consumes: []
      produces: []
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: tagId
        in: path
        description: Id of the tag to be deleted.
        required: true
        type: string
        format: uuid
        x-nullable: false
      responses:
        '204':
          description: No Content
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful DeleteTag request:
          $ref: ./examples/DeleteTag.json
      description: Needs a more full description created.
    patch:
      tags:
      - TagsApi
      summary: Microsoft Azure Update A Tag
      operationId: microsoftAzureUpdatetag
      consumes:
      - application/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: tagId
        in: path
        description: The id of the target tag.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: updatedTag
        in: body
        description: The updated tag model.
        required: true
        schema:
          $ref: '#/definitions/Tag'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Tag'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful UpdateTag request:
          $ref: ./examples/UpdateTag.json
      description: Needs a more full description created.
