      x-ms-examples:
        Get a gallery.:
          $ref: ./examples/GetASharedGalleryImageVersion.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Compute Locations Location Sharedgalleries Galleryuniquename Images Galleryimagename Versions Galleryimageversionname
