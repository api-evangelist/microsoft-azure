definitions:
  StorageAccount:
    type: object
    properties:
      id:
        type: string
        description: Resource ID of storage account
      subscriptionId:
        type: string
        description: Subscription Id
      accountName:
        type: string
        description: Storage account name
    description: Storage Account configurations
  Azure.ResourceManager.UserAssignedIdentity:
    type: object
    properties:
      clientId:
        type: string
        description: The active directory client identifier for this principal.
      principalId:
        type: string
        description: The active directory identifier for this principal.
    description: A managed identity assigned by the user.
  NetworkProfile:
    type: object
    properties:
      vnetConfiguration:
        $ref: '#/definitions/VnetConfiguration'
        description: Vnet configurations
      vwanConfiguration:
        $ref: '#/definitions/VwanConfiguration'
        description: Vwan configurations
      networkType:
        $ref: '#/definitions/NetworkType'
        description: vnet or vwan, cannot be updated
      publicIps:
        type: array
        items:
          $ref: '#/definitions/IPAddress'
        x-ms-identifiers: []
        x-cadl-name: IPAddress[]
        description: List of IPs associated with the Firewall
      enableEgressNat:
        $ref: '#/definitions/EgressNat'
        description: Enable egress NAT, enabled by default
      egressNatIp:
        type: array
        items:
          $ref: '#/definitions/IPAddress'
        x-ms-identifiers: []
        x-cadl-name: IPAddress[]
        description: Egress nat IP to use
      trustedRanges:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: Non-RFC 1918 address
      privateSourceNatRulesDestination:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: Array of ipv4 destination address for which source NAT is to be performed
    description: Network settings for Firewall
    required:
    - networkType
    - publicIps
    - enableEgressNat
  Azure.ResourceManager.ManagedIdentityType:
    type: string
    description: The kind of managed identity assigned to this resource.
    enum:
    - None
    - SystemAssigned
    - UserAssigned
    - SystemAssigned,UserAssigned
    x-ms-enum:
      name: ManagedIdentityType
      modelAsString: true
      values:
      - name: None
        value: None
      - name: SystemAssigned
        value: SystemAssigned
      - name: UserAssigned
        value: UserAssigned
      - name: SystemAndUserAssigned
        value: SystemAssigned,UserAssigned
  NetworkType:
    type: string
    description: NetworkType Enum
    enum:
    - VNET
    - VWAN
    x-ms-enum:
      name: NetworkType
      modelAsString: true
  FirewallResourceUpdateProperties:
    type: object
    properties:
      panEtag:
        type: string
        description: panEtag info
      networkProfile:
        $ref: '#/definitions/NetworkProfile'
        description: Network settings
      isPanoramaManaged:
        $ref: '#/definitions/BooleanEnum'
        description: 'Panorama Managed: Default is False. Default will be CloudSec managed'
      isStrataCloudManaged:
        $ref: '#/definitions/BooleanEnum'
        description: 'Strata Cloud Managed: Default is False. Default will be CloudSec managed'
      panoramaConfig:
        $ref: '#/definitions/PanoramaConfig'
        description: Panorama Configuration
      strataCloudManagerConfig:
        $ref: '#/definitions/StrataCloudManagerConfig'
        description: Strata Cloud Manager Configuration, only applicable if Strata Cloud Manager is selected.
      associatedRulestack:
        $ref: '#/definitions/RulestackDetails'
        description: Associated Rulestack
      dnsSettings:
        $ref: '#/definitions/DNSSettings'
        description: DNS settings for Firewall
      frontEndSettings:
        type: array
        items:
          $ref: '#/definitions/FrontendSetting'
        x-ms-identifiers: []
        x-cadl-name: FrontendSetting[]
        description: Frontend settings for Firewall
      planData:
        $ref: '#/definitions/PlanData'
        description: Billing plan information.
      marketplaceDetails:
        $ref: '#/definitions/MarketplaceDetails'
        description: Marketplace details
    description: The updatable properties of the FirewallResource.
  LogDestination:
    type: object
    properties:
      storageConfigurations:
        $ref: '#/definitions/StorageAccount'
        description: Storage account configurations
      eventHubConfigurations:
        $ref: '#/definitions/EventHub'
        description: Event Hub configurations
      monitorConfigurations:
        $ref: '#/definitions/MonitorLog'
        description: Monitor Log configurations
    description: Log Destination
  ProtocolType:
    type: string
    description: Protocol Enum
    enum:
    - TCP
    - UDP
    x-ms-enum:
      name: ProtocolType
      modelAsString: true
  MarketplaceSubscriptionStatus:
    type: string
    description: Marketplace Subscription Status
    enum:
    - PendingFulfillmentStart
    - Subscribed
    - Suspended
    - Unsubscribed
    - NotStarted
    - FulfillmentRequested
    x-ms-enum:
      name: MarketplaceSubscriptionStatus
      modelAsString: true
  FrontendSetting:
    type: object
    properties:
      name:
        type: string
        description: Settings name
      protocol:
        $ref: '#/definitions/ProtocolType'
        description: Protocol Type
      frontendConfiguration:
        $ref: '#/definitions/EndpointConfiguration'
        description: Frontend configurations
      backendConfiguration:
        $ref: '#/definitions/EndpointConfiguration'
        description: Backend configurations
    description: Frontend setting for Firewall
    required:
    - name
    - protocol
    - frontendConfiguration
    - backendConfiguration
  VwanConfiguration:
    type: object
    properties:
      networkVirtualApplianceId:
        type: string
        description: 'Network Virtual Appliance resource ID '
      vHub:
        $ref: '#/definitions/IPAddressSpace'
        description: vHub Address
      trustSubnet:
        $ref: '#/definitions/IPAddressSpace'
        description: Trust Subnet
      unTrustSubnet:
        $ref: '#/definitions/IPAddressSpace'
        description: Untrust Subnet
      ipOfTrustSubnetForUdr:
        $ref: '#/definitions/IPAddress'
        description: IP of trust subnet for UDR
    description: VwanInfo for Firewall Networking
    required:
    - vHub
  PanoramaConfig:
    type: object
    properties:
      configString:
        type: string
        description: Base64 encoded string representing Panorama parameters to be used by Firewall to connect to Panorama. This string is generated via azure plugin in Panorama
      vmAuthKey:
        type: string
        description: VM auth key for panorama connectivity
        readOnly: true
      panoramaServer:
        type: string
        description: Primary Panorama Server IP address value in dotted format for IPv4
        readOnly: true
      panoramaServer2:
        type: string
        description: Secondary Panorama Server IP address value in dotted format for IPv4
        readOnly: true
      dgName:
        type: string
        description: Panorama Device Group to join
        readOnly: true
      tplName:
        type: string
        description: Panorama Template Stack to join - (Once configured we can not edit the value)
        readOnly: true
      cgName:
        type: string
        description: Panorama Collector Group to join - (Once configured we can not edit the value)
        readOnly: true
      hostName:
        type: string
        description: Resource name(may be unique) for PN admin
        readOnly: true
    description: Panorama Config
    required:
    - configString
  LogType:
    type: string
    description: Possible log types
    enum:
    - TRAFFIC
    - THREAT
    - DECRYPTION
    - WILDFIRE
    - DLP
    - AUDIT
    x-ms-enum:
      name: LogType
      modelAsString: true
  EnabledDNSType:
    type: string
    description: Enabled DNS type values
    enum:
    - CUSTOM
    - AZURE
    x-ms-enum:
      name: EnabledDNSType
      modelAsString: true
  MonitorLog:
    type: object
    properties:
      id:
        type: string
        description: Resource ID of MonitorLog
      subscriptionId:
        type: string
        description: Subscription Id
      workspace:
        type: string
        description: MonitorLog workspace
      primaryKey:
        type: string
        description: Primary Key value for Monitor
      secondaryKey:
        type: string
        description: Secondary Key value for Monitor
    description: MonitorLog configurations
  EgressNat:
    type: string
    description: Egress NAT
    enum:
    - DISABLED
    - ENABLED
    x-ms-enum:
      name: EgressNat
      modelAsString: true
  PlanData:
    type: object
    properties:
      usageType:
        $ref: '#/definitions/UsageType'
        description: different usage type like PAYG/COMMITTED
      billingCycle:
        $ref: '#/definitions/BillingCycle'
        description: different billing cycles like MONTHLY/WEEKLY
      planId:
        type: string
        description: plan id as published by Liftr.PAN
        maxLength: 50
      effectiveDate:
        type: string
        format: date-time
        description: date when plan was applied
        readOnly: true
    description: Billing plan information.
    required:
    - billingCycle
    - planId
  BillingCycle:
    type: string
    description: Billing cycle
    enum:
    - WEEKLY
    - MONTHLY
    x-ms-enum:
      name: BillingCycle
      modelAsString: true
  DNSSettings:
    type: object
    properties:
      enableDnsProxy:
        $ref: '#/definitions/DNSProxy'
        description: Enable DNS proxy, disabled by default
      enabledDnsType:
        $ref: '#/definitions/EnabledDNSType'
        description: Enabled DNS proxy type, disabled by default
      dnsServers:
        type: array
        items:
          $ref: '#/definitions/IPAddress'
        x-ms-identifiers: []
        x-cadl-name: IPAddress[]
        description: List of IPs associated with the Firewall
    description: DNS Proxy settings for Firewall
  StrataCloudManagerConfig:
    type: object
    properties:
      cloudManagerName:
        type: string
        description: Strata Cloud Manager name which is intended to manage the policy for this firewall.
    description: This field is only present if Strata Cloud Manager is managing the policy for this firewall
    required:
    - cloudManagerName
  LogSettings:
    type: object
    properties:
      logType:
        $ref: '#/definitions/LogType'
        description: One of possible log type
      logOption:
        $ref: '#/definitions/LogOption'
        description: Log option SAME/INDIVIDUAL
      applicationInsights:
        $ref: '#/definitions/ApplicationInsights'
        description: Application Insight details
      commonDestination:
        $ref: '#/definitions/LogDestination'
        description: Common destination configurations
      trafficLogDestination:
        $ref: '#/definitions/LogDestination'
        description: Traffic destination configurations
      threatLogDestination:
        $ref: '#/definitions/LogDestination'
        description: Threat destination configurations
      decryptLogDestination:
        $ref: '#/definitions/LogDestination'
        description: Decrypt destination configurations
    description: Log Settings for Firewall
  EventHub:
    type: object
    properties:
      id:
        type: string
        description: Resource ID of EventHub
      subscriptionId:
        type: string
        description: Subscription Id
      name:
        type: string
        description: EventHub name
      nameSpace:
        type: string
        description: EventHub namespace
      policyName:
        type: string
        description: EventHub policy name
    description: EventHub configurations
  FirewallResourceListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/FirewallResource'
        x-cadl-name: FirewallResource[]
        description: The items on this page
      nextLink:
        type: string
        description: The link to the next page of items
    description: The response of a FirewallResource list operation.
    required:
    - value
  FirewallDeploymentProperties:
    type: object
    properties:
      panEtag:
        type: string
        description: panEtag info
      networkProfile:
        $ref: '#/definitions/NetworkProfile'
        description: Network settings
