        Firewalls_Delete_MinimumSet_Gen:
          $ref: ./examples/Firewalls_Delete_MinimumSet_Gen.json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Paloaltonetworks Cloudngfw Firewalls Firewallname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/PaloAltoNetworks.Cloudngfw/firewalls/{firewallName}/getGlobalRulestack
  : post:
      tags:
      - Firewalls
      operationId: microsoftAzureFirewallsGetglobalrulestack
      description: Get Global Rulestack associated with the Firewall
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/FirewallResource.firewallName'
