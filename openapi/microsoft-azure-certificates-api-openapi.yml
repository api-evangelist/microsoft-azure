            items:
              type: string
          pfxBlob:
            format: byte
            description: Pfx blob.
            type: string
          siteName:
            description: App name.
            type: string
            readOnly: true
          selfLink:
            description: Self link.
            type: string
            readOnly: true
          issuer:
            description: Certificate issuer.
            type: string
            readOnly: true
          issueDate:
            format: date-time
            description: Certificate issue Date.
            type: string
            readOnly: true
          expirationDate:
            format: date-time
            description: Certificate expiration date.
            type: string
            readOnly: true
          thumbprint:
            description: Certificate thumbprint.
            type: string
            readOnly: true
          valid:
            description: Is the certificate valid?.
            type: boolean
            readOnly: true
          cerBlob:
            format: byte
            description: Raw bytes of .cer file
            type: string
            readOnly: true
          publicKeyHash:
            description: Public key hash.
            type: string
            readOnly: true
          hostingEnvironmentProfile:
            $ref: ./CommonDefinitions.json#/definitions/HostingEnvironmentProfile
            description: Specification for the App Service Environment to use for the certificate.
            readOnly: true
          keyVaultId:
            description: Key Vault Csm resource Id.
            type: string
          keyVaultSecretName:
            description: Key Vault secret name.
            type: string
          keyVaultSecretStatus:
            description: Status of the Key Vault secret.
            enum:
            - Initialized
            - WaitingOnCertificateOrder
            - Succeeded
            - CertificateOrderFailed
            - OperationNotPermittedOnKeyVault
            - AzureServiceUnauthorizedToAccessKeyVault
            - KeyVaultDoesNotExist
            - KeyVaultSecretDoesNotExist
            - UnknownError
            - ExternalPrivateKey
            - Unknown
            type: string
            readOnly: true
            x-ms-enum:
              name: KeyVaultSecretStatus
              modelAsString: false
          serverFarmId:
            description: 'Resource ID of the associated App Service plan, formatted as: "/subscriptions/{subscriptionID}/resourceGroups/{groupName}/providers/Microsoft.Web/serverfarms/{appServicePlanName}".'
            type: string
          canonicalName:
