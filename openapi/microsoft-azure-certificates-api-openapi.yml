components:
  schemas:
    KeyVaultError:
      type: object
      description: The key vault error exception.
      properties:
        error:
          type: object
          readOnly: true
          description: The key vault server error.
          properties:
            code:
              type: string
              readOnly: true
              description: The error code.
            message:
              type: string
              readOnly: true
              description: The error message.
            innererror:
              type: object
              readOnly: true
              description: Inner error details.
              properties:
                code:
                  type: string
                  readOnly: true
                innererror:
                  type: object
                  readOnly: true
          example: example_value
    CertificatePolicy:
      type: object
      description: Management policy for a certificate.
      properties:
        id:
          type: string
          readOnly: true
          example: abc123
        key_props:
          type: object
          description: Properties of the key pair.
          properties:
            exportable:
              type: boolean
            kty:
              type: string
              enum:
              - RSA
              - RSA-HSM
              - EC
              - EC-HSM
            key_size:
              type: integer
            reuse_key:
              type: boolean
            crv:
              type: string
              enum:
              - P-256
              - P-384
              - P-521
              - P-256K
          example: example_value
        secret_props:
          type: object
          description: Properties of the secret backing a certificate.
          properties:
            contentType:
              type: string
          example: example_value
        x509_props:
          type: object
          description: Properties of the X509 component.
          properties:
            subject:
              type: string
            sans:
              type: object
              properties:
                emails:
                  type: array
                  items:
                    type: string
                dns_names:
                  type: array
                  items:
                    type: string
                upns:
                  type: array
                  items:
                    type: string
            ekus:
              type: array
              items:
                type: string
            key_usage:
              type: array
              items:
                type: string
            validity_months:
              type: integer
          example: example_value
        issuer:
          type: object
          description: Parameters for the issuer of the X509 component.
          properties:
            name:
              type: string
              description: Name of the referenced issuer object or reserved names (Self, Unknown).
            cty:
              type: string
              description: Certificate type as supported by the provider.
          example: example_value
        attributes:
          $ref: '#/components/schemas/CertificateAttributes'
        lifetime_actions:
          type: array
          items:
            type: object
            properties:
              trigger:
                type: object
                properties:
                  lifetime_percentage:
                    type: integer
                  days_before_expiry:
                    type: integer
              action:
                type: object
                properties:
                  action_type:
                    type: string
                    enum:
                    - EmailContacts
                    - AutoRenew
          example: []
    CertificateCreateParameters:
      type: object
      description: The certificate create parameters.
      properties:
        policy:
          $ref: '#/components/schemas/CertificatePolicy'
        attributes:
          $ref: '#/components/schemas/CertificateAttributes'
        tags:
          type: object
          additionalProperties:
            type: string
          example: example_value
    CertificateAttributes:
      type: object
      description: The certificate management attributes.
      properties:
        enabled:
          type: boolean
          example: true
        nbf:
          type: integer
          example: 10
        exp:
          type: integer
          example: 10
        created:
          type: integer
          readOnly: true
          example: 10
        updated:
          type: integer
          readOnly: true
          example: 10
        recoveryLevel:
          type: string
          readOnly: true
          example: example_value
        recoverableDays:
          type: integer
          readOnly: true
          example: 10
    CertificateOperation:
      type: object
      description: A certificate operation is returned in case of asynchronous requests.
      properties:
        id:
          type: string
          readOnly: true
          example: abc123
        issuer:
          type: object
          properties:
            name:
              type: string
          example: example_value
        csr:
          type: string
          description: The certificate signing request (CSR) in base64.
          example: example_value
        cancellation_requested:
          type: boolean
          example: true
        status:
          type: string
          example: example_value
        status_details:
          type: string
          example: example_value
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          example: example_value
        target:
          type: string
          example: example_value
        request_id:
          type: string
          example: '500123'
  parameters:
    ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: Client API version.
      schema:
        type: string
        default: '7.5'
