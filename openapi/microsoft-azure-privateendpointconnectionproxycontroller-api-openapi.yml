definitions:
  PrivateLinkServiceProxy:
    description: Defines Private link service proxy.
    type: object
    properties:
      id:
        type: string
      groupConnectivityInformation:
        type: array
        items:
          $ref: '#/definitions/GroupConnectivityInformation'
      remotePrivateEndpointConnection:
        $ref: '#/definitions/ResourceId'
      remotePrivateLinkServiceConnectionState:
        $ref: '#/definitions/PrivateLinkServiceConnectionState'
  PrivateEndpointConnectionProxyCollection:
    description: Collection of PrivateLink proxy resources.
    type: object
    properties:
      value:
        description: Gets the list of PrivateLink proxy resources.
        type: array
        items:
          $ref: '#/definitions/PrivateEndpointConnectionProxy'
        readOnly: true
      nextLink:
        description: Gets the value of next link.
        type: string
        readOnly: true
  PrivateEndpointConnectionProxy:
    description: Defines Private endpoint proxy resource.
    x-ms-azure-resource: true
    type: object
    properties:
      id:
        type: string
        readOnly: true
      name:
        type: string
        readOnly: true
      type:
        type: string
        readOnly: true
      eTag:
        type: string
      properties:
        $ref: '#/definitions/PrivateEndpointConnectionProxyProperties'
      systemData:
        $ref: ../../../../../../common-types/resource-management/v3/types.json#/definitions/systemData
        readOnly: true
  ResourceId:
    description: Defines resource ID of a private endpoint connection.
    type: object
    properties:
      id:
        type: string
        readOnly: true
  PrivateEndpointConnectionProxyProperties:
    type: object
    description: Properties of a private endpoint connection proxy.
    properties:
      remotePrivateEndpoint:
        $ref: '#/definitions/PrivateEndpointDetails'
        readOnly: true
      status:
        enum:
        - Succeeded
        - Failed
        - Cancelled
        - Running
        x-ms-enum:
          name: PrivateEndpointConnectionProxyProperties_status
          modelAsString: true
        type: string
        readOnly: true
  PrivateLinkServiceConnection:
    description: Defines Private link service connection.
    type: object
    properties:
      id:
        type: string
      name:
        type: string
      groupIds:
        type: array
        items:
          type: string
      requestMessage:
        type: string
  Object:
    description: Defines generic object.
    type: object
    properties: {}
  IpConfiguration:
    description: Defines Private link IP configuration.
    type: object
    properties:
      id:
        type: string
      privateIpAddress:
        type: string
      linkIdentifier:
        type: string
      groupId:
        type: string
      memberName:
        type: string
  GroupConnectivityInformation:
    description: Defines Private link service group connectivity.
    type: object
    properties:
      id:
        type: string
      groupId:
        type: string
      memberName:
        type: string
      customerVisibleFqdns:
        type: array
        items:
          type: string
      internalFqdn:
        type: string
      redirectMapId:
        type: string
      privateLinkServiceArmRegion:
        type: string
  PrivateEndpointDetails:
    description: Defines Private endpoint additional details.
    type: object
    properties:
      id:
        type: string
      manualPrivateLinkServiceConnections:
        type: array
        items:
          $ref: '#/definitions/PrivateLinkServiceConnection'
      privateLinkServiceConnections:
        type: array
        items:
          $ref: '#/definitions/PrivateLinkServiceConnection'
      privateLinkServiceProxies:
        type: array
        items:
          $ref: '#/definitions/PrivateLinkServiceProxy'
      connectionDetails:
        type: array
        items:
          $ref: '#/definitions/IpConfiguration'
  PrivateLinkServiceConnectionState:
    type: object
    description: Private endpoint connection state.
    properties:
      status:
        enum:
        - Approved
        - Pending
        - Rejected
        - Disconnected
        type: string
        description: Private link connection state.
        x-ms-enum:
          name: PrivateLinkServiceConnectionState_status
          modelAsString: true
      description:
        type: string
        description: Description of the object.
      actionsRequired:
        type: string
        description: Action required.
parameters:
  migrateProjectName:
    name: migrateProjectName
    description: Name of the Azure Migrate project.
    type: string
    in: path
    x-ms-parameter-location: method
    required: true
    pattern: ^[a-zA-Z0-9-]{3,24}$
