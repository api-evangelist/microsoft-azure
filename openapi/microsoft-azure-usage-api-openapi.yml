swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Usage API
schemes:
- https
tags:
- name: Usage
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Storage/usages:
    get:
      tags:
      - Usage
      operationId: microsoftAzureUsageList
      description: Gets the current usage count and the limit for the resources under the subscription.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK -- current usage account and limit retrieved and returned successfully.
          schema:
            $ref: '#/definitions/UsageListResult'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Storage Usages
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web.Admin/environments/{environmentName}/usage
  : get:
      tags:
      - Usage
      summary: Microsoft Azure Returns Usage Records For Specified Subscription And Resource Groups
      operationId: microsoftAzureUsageGetusage
      consumes: []
      produces:
      - application/json
      - text/json
      - application/xml
      - text/xml
      parameters:
      - name: resourceGroupName
        in: path
        description: Name of resource group
        required: true
        type: string
      - name: environmentName
        in: path
        description: Environment name
        required: true
        type: string
      - name: lastId
        in: query
        description: Last marker that was returned from the batch
        required: true
        type: string
      - name: batchSize
        in: query
        description: size of the batch to be returned.
        required: true
        type: integer
        format: int32
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Object'
      deprecated: false
      description: Needs a more full description created.
definitions:
  UsageListResult:
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/Usage'
        description: Gets or sets the list of Storage Resource Usages.
    description: The response from the List Usages operation.
  UsageName:
    properties:
      value:
        readOnly: true
        type: string
        description: Gets a string describing the resource name.
      localizedValue:
        readOnly: true
        type: string
        description: Gets a localized string describing the resource name.
    description: The usage names that can be used; currently limited to StorageAccount.
  Usage:
    properties:
      unit:
        readOnly: true
        type: string
        description: Gets the unit of measurement.
        enum:
        - Count
        - Bytes
        - Seconds
        - Percent
        - CountsPerSecond
        - BytesPerSecond
        x-ms-enum:
          name: UsageUnit
          modelAsString: false
      currentValue:
        readOnly: true
        type: integer
        format: int32
        description: Gets the current count of the allocated resources in the subscription.
      limit:
        readOnly: true
        type: integer
        format: int32
        description: Gets the maximum count of the resources that can be allocated in the subscription.
      name:
        $ref: '#/definitions/UsageName'
        readOnly: true
        description: Gets the name of the type of usage.
    description: Describes Storage Resource Usage.
  Object:
    type: object
    properties: {}
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client Api Version.
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Subscription Id
    required: true
    type: string
  apiVersionParameter:
    name: api-version
    in: query
    description: API Version
    required: true
    type: string
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: Gets subscription credentials which uniquely identify the Microsoft Azure subscription. The subscription ID forms part of the URI for every service call.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
