  ScoringFunctionInterpolation:
    type: string
    enum:
    - linear
    - constant
    - quadratic
    - logarithmic
    x-ms-enum:
      name: ScoringFunctionInterpolation
      modelAsString: false
      values:
      - value: linear
        name: Linear
        description: Boosts scores by a linearly decreasing amount. This is the default interpolation for scoring functions.
      - value: constant
