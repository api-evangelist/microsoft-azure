swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Indexes API
schemes:
- https
tags:
- name: Indexes
paths:
  /indexes:
    get:
      operationId: microsoftAzureIndexesListlatest
      description: List the latest version of each index.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.TopQueryParameter'
      - $ref: '#/parameters/Azure.Core.SkipQueryParameter'
      - $ref: '#/parameters/Azure.Core.MaxPageSizeQueryParameter'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/PagedIndex'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_ListLatest - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_ListLatest_MaximumSet_Gen.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Indexes
      tags:
      - Indexes
    post:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesCreate
      x-ms-examples:
        SearchServiceCreateIndex:
          $ref: ./examples/SearchServiceCreateIndex.json
      description: Creates a new search index.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/Create-Index
      parameters:
      - name: index
        in: body
        required: true
        schema:
          $ref: '#/definitions/SearchIndex'
        description: The definition of the index to create.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '201':
          description: ''
          schema:
            $ref: '#/definitions/SearchIndex'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Post Indexes
  /indexes/{name}:
    get:
      operationId: microsoftAzureIndexesGetlatest
      description: Get latest Index.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: name
        in: path
        description: Name of the index.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,254}$
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/Index'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_GetLatest - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_GetLatest_MaximumSet_Gen.json
      summary: Microsoft Azure Get Indexes Name
      tags:
      - Indexes
  /indexes/{name}:getNextVersion:
    post:
      operationId: microsoftAzureIndexesGetnextversion
      description: Get next Index version.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: name
        in: path
        description: Name of the index.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,254}$
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/VersionInfo'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_GetNextVersion - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_GetNextVersion_MaximumSet_Gen.json
      summary: Microsoft Azure Post Indexes Name:getnextversion
      tags:
      - Indexes
  /indexes/{name}/versions:
    get:
      operationId: microsoftAzureIndexesList
      description: The most basic operation.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: name
        in: path
        description: Name of the index.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,254}$
      - name: listViewType
        in: query
        description: View type for including/excluding (for example) archived entities.
        required: true
        type: string
        default: ActiveOnly
      - name: orderBy
        in: query
        description: 'Ordering of list: Please choose OrderBy value from [''createdtime'', ''modifiedtime''].'
        required: false
        type: string
      - name: tags
        in: query
        description: 'Comma-separated list of tag names (and optionally values). Example: tag1,tag2=value2.'
        required: false
        type: string
      - $ref: '#/parameters/Azure.Core.TopQueryParameter'
      - $ref: '#/parameters/Azure.Core.SkipQueryParameter'
      - $ref: '#/parameters/Azure.Core.MaxPageSizeQueryParameter'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/PagedIndex'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_List - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_List_MaximumSet_Gen.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Indexes Name Versions
      tags:
      - Indexes
  /indexes/{name}/versions/{version}:
    get:
      operationId: microsoftAzureIndexesGet
      description: Fetch a IndexVersion by name.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: name
        in: path
        description: Name of the index.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,254}$
      - name: version
        in: path
        description: Version of the index.
        required: true
        type: string
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/Index'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_Get - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Indexes Name Versions Version
      tags:
      - Indexes
    put:
      operationId: microsoftAzureIndexesCreateorupdate
      description: Creates or updates a IndexVersion.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: name
        in: path
        description: Name of the index.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,254}$
      - name: version
        in: path
        description: Version of the index.
        required: true
        type: string
      - name: body
        in: body
        description: Properties of an Index Version.
        required: true
        schema:
          $ref: '#/definitions/Index'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/Index'
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          schema:
            $ref: '#/definitions/Index'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Indexes_CreateOrUpdate - generated by [MaximumSet] rule:
          $ref: ./examples/Indexes_CreateOrUpdate_MaximumSet_Gen.json
      summary: Microsoft Azure Put Indexes Name Versions Version
      tags:
      - Indexes
  /indexes('{indexName}'):
    put:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesCreateorupdate
      x-ms-examples:
        SearchServiceCreateOrUpdateIndex:
          $ref: ./examples/SearchServiceCreateOrUpdateIndex.json
      description: Creates a new search index or updates an index if it already exists.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/Update-Index
      parameters:
      - name: indexName
        in: path
        required: true
        type: string
        description: The definition of the index to create or update.
      - name: index
        in: body
        required: true
        schema:
          $ref: '#/definitions/SearchIndex'
        description: The definition of the index to create or update.
      - name: allowIndexDowntime
        in: query
        required: false
        type: boolean
        description: Allows new analyzers, tokenizers, token filters, or char filters to be added to an index by taking the index offline for at least a few seconds. This temporarily causes indexing and query requests to fail. Performance and write availability of the index can be impaired for several minutes after the index is updated, or longer for very large indexes.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/IfMatchParameter'
      - $ref: '#/parameters/IfNoneMatchParameter'
      - $ref: '#/parameters/PreferHeaderParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/SearchIndex'
        '201':
          description: ''
          schema:
            $ref: '#/definitions/SearchIndex'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Put Indexes Indexname
    delete:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesDelete
      x-ms-examples:
        SearchServiceDeleteIndex:
          $ref: ./examples/SearchServiceDeleteIndex.json
      description: Deletes a search index and all the documents it contains. This operation is permanent, with no recovery option. Make sure you have a master copy of your index definition, data ingestion code, and a backup of the primary data source in case you need to re-build the index.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/Delete-Index
      parameters:
      - name: indexName
        in: path
        required: true
        type: string
        description: The name of the index to delete.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/IfMatchParameter'
      - $ref: '#/parameters/IfNoneMatchParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '204':
          description: ''
        '404':
          description: ''
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Delete Indexes Indexname
    get:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesGet
      x-ms-examples:
        SearchServiceGetIndex:
          $ref: ./examples/SearchServiceGetIndex.json
      description: Retrieves an index definition.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/Get-Index
      parameters:
      - name: indexName
        in: path
        required: true
        type: string
        description: The name of the index to retrieve.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/SearchIndex'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Get Indexes Indexname
  /indexes('{indexName}')/search.stats:
    get:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesGetstatistics
      x-ms-examples:
        SearchServiceGetIndexStatistics:
          $ref: ./examples/SearchServiceGetIndexStatistics.json
      description: Returns statistics for the given index, including a document count and storage usage.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/Get-Index-Statistics
      parameters:
      - name: indexName
        in: path
        required: true
        type: string
        description: The name of the index for which to retrieve statistics.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/GetIndexStatisticsResult'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Get Indexes Indexname  Search Stats
  /indexes('{indexName}')/search.analyze:
    post:
      tags:
      - Indexes
      operationId: microsoftAzureIndexesAnalyze
      x-ms-examples:
        SearchServiceIndexAnalyze:
          $ref: ./examples/SearchServiceIndexAnalyze.json
      description: Shows how an analyzer breaks text into tokens.
      externalDocs:
        url: https://docs.microsoft.com/rest/api/searchservice/test-analyzer
      parameters:
      - name: indexName
        in: path
        required: true
        type: string
        description: The name of the index for which to test an analyzer.
      - name: request
        in: body
        required: true
        schema:
          $ref: '#/definitions/AnalyzeRequest'
        description: The text and analyzer or analysis components to test.
      - $ref: '#/parameters/ClientRequestIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      x-ms-request-id: request-id
      responses:
        '200':
          description: ''
          schema:
            $ref: '#/definitions/AnalyzeResult'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/SearchError'
      summary: Microsoft Azure Post Indexes Indexname  Search Analyze
