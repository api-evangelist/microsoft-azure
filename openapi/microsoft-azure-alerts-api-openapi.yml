        required: true
        type: string
      - name: $filter
        in: query
        description: The alert property filter to apply.
        required: false
        type: string
      - name: state
        in: query
        description: The alert state to query for.
        required: false
        type: string
      - name: from
        in: query
        description: The start date to query for.
        required: false
        type: string
        format: date-time
      - name: to
        in: query
        description: The end date till when to query for.
        required: false
        type: string
        format: date-time
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The list of alerts.
          schema:
            $ref: '#/definitions/Alerts'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Providers Microsoft Adhybridhealthservice Services Servicename Alerts
