        required: true
        type: string
        format: uuid
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - name: $filter
        in: query
        description: The alert property filter to apply.
        required: false
        type: string
      - name: state
        in: query
        description: The alert state to query for.
        required: false
        type: string
      - name: from
        in: query
        description: The start date to query for.
