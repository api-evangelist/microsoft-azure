        AlertsSendTestEmail:
          $ref: ./examples/AlertsSendTestEmail.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storsimple Managers Managername Devices Devicename Sendtestalertemail
