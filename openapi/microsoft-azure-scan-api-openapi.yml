      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Scan'
        '201':
          description: Success
          schema:
            $ref: '#/definitions/Scan'
        default:
          description: An error response received from the Scanning Service
          schema:
            $ref: '#/definitions/ErrorResponseModel'
      x-ms-examples:
        Scans_CreateOrUpdate:
          $ref: ./examples/Scans_CreateOrUpdate.json
