          description: OK -- Operation to check the kusto resource name availability was successful.
          schema:
            $ref: '#/definitions/EventHubConnectionValidationListResult'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Kusto Clusters Clustername Databases Databasename Eventhubconnectionvalidation
