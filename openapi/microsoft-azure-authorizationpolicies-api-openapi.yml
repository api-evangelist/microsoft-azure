swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector AuthorizationPolicies API
schemes:
- https
tags:
- name: AuthorizationPolicies
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/authorizationPolicies/{authorizationPolicyName}
  : put:
      tags:
      - AuthorizationPolicies
      operationId: microsoftAzureAuthorizationpoliciesCreateorupdate
      x-ms-examples:
        AuthorizationPolicies_CreateOrUpdate:
          $ref: ./examples/AuthorizationPoliciesCreateOrUpdate.json
      description: Creates an authorization policy or updates an existing authorization policy.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: authorizationPolicyName
        in: path
        required: true
        type: string
        description: The name of the policy.
        pattern: ^[A-Za-z0-9]$|^[A-Za-z0-9][\w-\.]*[A-Za-z0-9]$
        minLength: 1
        maxLength: 50
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/AuthorizationPolicyResourceFormat'
        description: Parameters supplied to the CreateOrUpdate authorization policy operation.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully update an existing authorization policy.
          schema:
            $ref: '#/definitions/AuthorizationPolicyResourceFormat'
        '201':
          description: Created. A new authorization policy is created.
          schema:
            $ref: '#/definitions/AuthorizationPolicyResourceFormat'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Authorizationpolicies Authorizationpolicyname
    get:
      tags:
      - AuthorizationPolicies
      operationId: microsoftAzureAuthorizationpoliciesGet
      x-ms-examples:
        AuthorizationPolicies_Get:
          $ref: ./examples/AuthorizationPoliciesGet.json
      description: Gets an authorization policy in the hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: authorizationPolicyName
        in: path
        required: true
        type: string
        description: The name of the policy.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get the authorization policy.
          schema:
            $ref: '#/definitions/AuthorizationPolicyResourceFormat'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Authorizationpolicies Authorizationpolicyname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/authorizationPolicies
  : get:
      tags:
      - AuthorizationPolicies
      operationId: microsoftAzureAuthorizationpoliciesListbyhub
      x-ms-examples:
        AuthorizationPolicies_ListByHub:
          $ref: ./examples/AuthorizationPoliciesListByHub.json
      description: Gets all the authorization policies in a specified hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get all the authorization policies in the hub.
          schema:
            $ref: '#/definitions/AuthorizationPolicyListResult'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Authorizationpolicies
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/authorizationPolicies/{authorizationPolicyName}/regeneratePrimaryKey
  : post:
      tags:
      - AuthorizationPolicies
      operationId: microsoftAzureAuthorizationpoliciesRegenerateprimarykey
      x-ms-examples:
        AuthorizationPolicies_RegeneratePrimaryKey:
          $ref: ./examples/AuthorizationPoliciesRegeneratePrimaryKey.json
      description: Regenerates the primary policy key of the specified authorization policy.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: authorizationPolicyName
        in: path
        required: true
        type: string
        description: The name of the policy.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. The primary key of the authorization policy is regenerated.
          schema:
            $ref: '#/definitions/AuthorizationPolicy'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Authorizationpolicies Authorizationpolicyname Regenerateprimarykey
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/authorizationPolicies/{authorizationPolicyName}/regenerateSecondaryKey
  : post:
      tags:
      - AuthorizationPolicies
      operationId: microsoftAzureAuthorizationpoliciesRegeneratesecondarykey
      x-ms-examples:
        AuthorizationPolicies_RegenerateSecondaryKey:
          $ref: ./examples/AuthorizationPoliciesRegenerateSecondaryKey.json
      description: Regenerates the secondary policy key of the specified authorization policy.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: authorizationPolicyName
        in: path
        required: true
        type: string
        description: The name of the policy.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. The secondary key of the authorization policy is regenerated.
          schema:
            $ref: '#/definitions/AuthorizationPolicy'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Authorizationpolicies Authorizationpolicyname Regeneratesecondarykey
definitions:
  AuthorizationPolicyResourceFormat:
    description: The authorization policy resource format.
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/AuthorizationPolicy'
    allOf:
    - $ref: '#/definitions/ProxyResource'
  ProxyResource:
    properties:
      id:
        readOnly: true
        type: string
        description: Resource ID.
      name:
        readOnly: true
        type: string
        description: Resource name.
      type:
        readOnly: true
        type: string
        description: Resource type.
    x-ms-azure-resource: true
    description: Common properties of proxy resource.
  PermissionTypes:
    type: string
    enum:
    - Read
    - Write
    - Manage
    x-ms-enum:
      name: PermissionTypes
      modelAsString: false
    description: Supported permission types.
  AuthorizationPolicy:
    required:
    - permissions
    properties:
      policyName:
        type: string
        readOnly: true
        description: Name of the policy.
      permissions:
        type: array
        uniqueItems: true
        items:
          $ref: '#/definitions/PermissionTypes'
        description: The permissions associated with the policy.
      primaryKey:
        type: string
        description: Primary key associated with the policy.
      secondaryKey:
        type: string
        description: Secondary key associated with the policy.
    description: The authorization policy.
  AuthorizationPolicyListResult:
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/AuthorizationPolicyResourceFormat'
        description: Results of the list operation.
      nextLink:
        type: string
        description: Link to the next set of results.
    description: The response of list authorization policy operation.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client Api Version.
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: Gets subscription credentials which uniquely identify Microsoft Azure subscription. The subscription ID forms part of the URI for every service call.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
