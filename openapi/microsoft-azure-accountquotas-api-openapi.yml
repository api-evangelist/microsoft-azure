swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector AccountQuotas API
schemes:
- https
tags:
- name: AccountQuotas
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.AzurePlaywrightService/accounts/{accountName}/quotas
  : get:
      operationId: microsoftAzureAccountquotasListbyaccount
      tags:
      - AccountQuotas
      description: List quotas for a given account.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: accountName
        in: path
        description: Name of account.
        required: true
        type: string
        minLength: 3
        maxLength: 64
        pattern: ^[a-zA-Z]{1}[a-zA-Z0-9]{2,63}$
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/AccountQuotaListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        AccountQuotas_ListByAccount:
          $ref: ./examples/AccountQuotas_ListByAccount.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azureplaywrightservice Accounts Accountname Quotas
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.AzurePlaywrightService/accounts/{accountName}/quotas/{quotaName}
  : get:
      operationId: microsoftAzureAccountquotasGet
      tags:
      - AccountQuotas
      description: Get quota by name for an account.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: accountName
        in: path
        description: Name of account.
        required: true
        type: string
        minLength: 3
        maxLength: 64
        pattern: ^[a-zA-Z]{1}[a-zA-Z0-9]{2,63}$
      - name: quotaName
        in: path
        description: The Playwright service account quota name.
        required: true
        type: string
        enum:
        - ScalableExecution
        x-ms-enum:
          name: QuotaNames
          modelAsString: true
          values:
          - name: ScalableExecution
            value: ScalableExecution
            description: The quota details for scalable execution feature. When enabled, Playwright client workers can connect to cloud-hosted browsers. This can increase the number of parallel workers for a test run, significantly minimizing test completion durations.
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/AccountQuota'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        AccountQuotas_Get:
          $ref: ./examples/AccountQuotas_Get.json
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azureplaywrightservice Accounts Accountname Quotas Quotaname
definitions:
  AccountQuotaProperties:
    type: object
    description: The Playwright service account quota resource properties.
    properties:
      freeTrial:
        $ref: '#/definitions/AccountFreeTrialProperties'
        description: The Playwright service account quota resource free-trial properties.
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
        readOnly: true
  AccountQuota:
    type: object
    description: A quota resource for a Playwright service account.
    properties:
      properties:
        $ref: '#/definitions/AccountQuotaProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Creating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Creating
        value: Creating
        description: Creation in progress..
      - name: Deleting
        value: Deleting
        description: Deletion in progress..
      - name: Accepted
        value: Accepted
        description: Change accepted for processing..
  AccountFreeTrialProperties:
    type: object
    description: The Playwright service account quota resource free-trial properties.
    properties:
      createdAt:
        type: string
        format: date-time
        description: The free-trial createdAt utcDateTime.
        readOnly: true
      expiryAt:
        type: string
        format: date-time
        description: The free-trial expiryAt utcDateTime.
        readOnly: true
      allocatedValue:
        type: integer
        format: int32
        description: The free-trial allocated limit value eg. allocated free minutes.
        readOnly: true
      usedValue:
        type: integer
        format: int32
        description: The free-trial used value eg. used free minutes.
        readOnly: true
      percentageUsed:
        type: number
        format: float
        description: The free-trial percentage used.
        minimum: 0
        maximum: 100
        readOnly: true
    required:
    - createdAt
    - expiryAt
    - allocatedValue
    - usedValue
    - percentageUsed
  AccountQuotaListResult:
    type: object
    description: The response of a AccountQuota list operation.
    properties:
      value:
        type: array
        description: The AccountQuota items on this page
        items:
          $ref: '#/definitions/AccountQuota'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
