        type: array
        items:
          $ref: '#/definitions/cidrIpAddress'
        x-ms-identifiers:
        - baseIpAddress
      ipv6Addresses:
        description: The list of ip v6 addresses.
        type: array
        items:
          $ref: '#/definitions/cidrIpAddress'
        x-ms-identifiers:
        - baseIpAddress
  ErrorResponse:
