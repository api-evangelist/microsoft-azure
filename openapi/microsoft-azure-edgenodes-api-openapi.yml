swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Edgenodes API
schemes:
- https
tags:
- name: Edgenodes
paths:
  /providers/Microsoft.Cdn/edgenodes:
    get:
      tags:
      - Edgenodes
      description: Edgenodes are the global Point of Presence (POP) locations used to deliver CDN content to end users.
      operationId: microsoftAzureEdgenodesList
      x-ms-examples:
        EdgeNodes_List:
          $ref: ./examples/EdgeNodes_List.json
      parameters:
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/EdgenodeResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Providers Microsoft Cdn Edgenodes
