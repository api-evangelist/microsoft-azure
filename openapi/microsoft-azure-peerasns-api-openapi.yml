swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector PeerAsns API
schemes:
- https
tags:
- name: PeerAsns
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Peering/peerAsns/{peerAsnName}:
    get:
      tags:
      - PeerAsns
      description: Gets the peer ASN with the specified name under the given subscription.
      operationId: microsoftAzurePeerasnsGet
      parameters:
      - name: peerAsnName
        in: path
        description: The peer ASN name.
        required: true
        type: string
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PeerAsn'
        default:
          description: Error response describing why the operation has failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Get a peer ASN:
          $ref: ./examples/GetPeerAsn.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Peering Peerasns Peerasnname
    put:
      tags:
      - PeerAsns
      description: Creates a new peer ASN or updates an existing peer ASN with the specified name under the given subscription.
      operationId: microsoftAzurePeerasnsCreateorupdate
      parameters:
      - name: peerAsnName
        in: path
        description: The peer ASN name.
        required: true
        type: string
      - name: peerAsn
        in: body
        description: The peer ASN.
        required: true
        schema:
          $ref: '#/definitions/PeerAsn'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PeerAsn'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/PeerAsn'
        default:
          description: Error response describing why the operation has failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Create a peer ASN:
          $ref: ./examples/CreatePeerAsn.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Providers Microsoft Peering Peerasns Peerasnname
    delete:
      tags:
      - PeerAsns
      description: Deletes an existing peer ASN with the specified name under the given subscription.
      operationId: microsoftAzurePeerasnsDelete
      parameters:
      - name: peerAsnName
        in: path
        description: The peer ASN name.
        required: true
        type: string
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK
        '204':
          description: No Content
        default:
          description: Error response describing why the operation has failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Delete a peer ASN:
          $ref: ./examples/DeletePeerAsn.json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Providers Microsoft Peering Peerasns Peerasnname
  /subscriptions/{subscriptionId}/providers/Microsoft.Peering/peerAsns:
    get:
      tags:
      - PeerAsns
      description: Lists all of the peer ASNs under the given subscription.
      operationId: microsoftAzurePeerasnsListbysubscription
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PeerAsnListResult'
        default:
          description: Error response describing why the operation has failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        List peer ASNs in a subscription:
          $ref: ./examples/ListPeerAsnsBySubscription.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Peering Peerasns
definitions:
  ErrorResponse:
    description: The error response that indicates why an operation has failed.
    type: object
    properties:
      code:
        description: The error code.
        type: string
        readOnly: true
      message:
        description: The error message.
        type: string
        readOnly: true
  ContactInfo:
    description: The contact information of the peer.
    type: object
    properties:
      emails:
        description: The list of email addresses.
        type: array
        items:
          type: string
      phone:
        description: The list of contact numbers.
        type: array
        items:
          type: string
  PeerAsnListResult:
    description: The paginated list of peer ASNs.
    type: object
    properties:
      value:
        description: The list of peer ASNs.
        type: array
        items:
          $ref: '#/definitions/PeerAsn'
      nextLink:
        description: The link to fetch the next page of peer ASNs.
        type: string
  Resource:
    description: The ARM resource class.
    type: object
    properties:
      name:
        description: The name of the resource.
        type: string
        readOnly: true
      id:
        description: The ID of the resource.
        type: string
        readOnly: true
      type:
        description: The type of the resource.
        type: string
        readOnly: true
    x-ms-azure-resource: true
  PeerAsn:
    description: The essential information related to the peer's ASN.
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        $ref: '#/definitions/PeerAsnProperties'
        description: The properties that define a peer's ASN.
        x-ms-client-flatten: true
  PeerAsnProperties:
    description: The properties that define a peer's ASN.
    type: object
    properties:
      peerAsn:
