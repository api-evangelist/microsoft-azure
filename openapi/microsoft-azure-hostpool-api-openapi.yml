        '200':
          description: Successfully retrieved host pool.
          schema:
            $ref: '#/definitions/HostPool'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Hostpools Hostpoolname
    put:
      tags:
      - HostPool
      operationId: microsoftAzureHostpoolsCreateorupdate
