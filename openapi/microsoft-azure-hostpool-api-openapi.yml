      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/HostPoolNameParameter'
      - name: hostPool
        description: Object containing HostPool definitions.
        in: body
        required: true
        schema:
          $ref: '#/definitions/HostPool'
      responses:
        '200':
          description: Successfully updated host pool.
          schema:
            $ref: '#/definitions/HostPool'
        '201':
          description: Successfully created host pool.
          schema:
            $ref: '#/definitions/HostPool'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Hostpools Hostpoolname
    delete:
      tags:
      - HostPool
      operationId: microsoftAzureHostpoolsDelete
      description: Remove a host pool.
      x-ms-examples:
        HostPool_Delete:
          $ref: ./examples/HostPool_Delete.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/HostPoolNameParameter'
      - name: force
        in: query
        required: false
        type: boolean
        description: Force flag to delete sessionHost.
      responses:
        '200':
          description: Successfully removed host pool.
        '204':
          description: Host pool does not exist.
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Hostpools Hostpoolname
    patch:
      tags:
      - HostPool
      operationId: microsoftAzureHostpoolsUpdate
      description: Update a host pool.
      x-ms-examples:
        HostPool_Update:
          $ref: ./examples/HostPool_Update.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/HostPoolNameParameter'
      - name: hostPool
        description: Object containing HostPool definitions.
        in: body
        required: false
        schema:
          $ref: '#/definitions/HostPoolPatch'
      responses:
        '200':
          description: Successfully updated host pool.
          schema:
            $ref: '#/definitions/HostPool'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Hostpools Hostpoolname
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DesktopVirtualization/hostPools:
