      ssoSecretType:
        enum:
        - SharedKey
        - Certificate
        - SharedKeyInKeyVault
        - CertificateInKeyVault
        x-ms-enum:
          name: SSOSecretType
          modelAsString: true
        type: string
        description: The type of single sign on Secret Type.
      preferredAppGroupType:
        enum:
        - None
        - Desktop
        - RailApplications
        x-ms-enum:
          name: PreferredAppGroupType
          modelAsString: true
        type: string
        description: The type of preferred application group type, default to Desktop Application Group
      startVMOnConnect:
        type: boolean
        description: The flag to turn on/off StartVMOnConnect feature.
      publicNetworkAccess:
        enum:
        - Enabled
        - Disabled
        - EnabledForSessionHostsOnly
        - EnabledForClientsOnly
        x-ms-enum:
