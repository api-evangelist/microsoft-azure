swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector DataServices API
schemes:
- https
tags:
- name: DataServices
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.HybridData/dataManagers/{dataManagerName}/dataServices
  : get:
      tags:
      - DataServices
      description: This method gets all the data services.
      operationId: microsoftAzureDataservicesListbydatamanager
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/dataManagerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The list of data services.
          schema:
            $ref: '#/definitions/DataServiceList'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        DataServices_ListByDataManagerGET51:
          $ref: ./examples/DataServices_ListByDataManager-GET-example-51.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Hybriddata Datamanagers Datamanagername Dataservices
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.HybridData/dataManagers/{dataManagerName}/dataServices/{dataServiceName}
  : get:
      tags:
      - DataServices
      description: Gets the data service that match the data service name given.
      operationId: microsoftAzureDataservicesGet
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: dataServiceName
        in: path
        description: The name of the data service that is being queried.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/dataManagerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The data service that matches the name.
          schema:
            $ref: '#/definitions/DataService'
      x-ms-examples:
        DataServices_GetGET62:
          $ref: ./examples/DataServices_Get-GET-example-62.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Hybriddata Datamanagers Datamanagername Dataservices Dataservicename
definitions:
  DataService:
    description: Data Service.
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/DmsBaseObject'
    properties:
      properties:
        $ref: '#/definitions/DataServiceProperties'
        description: DataService properties.
        x-ms-client-flatten: true
  DataServiceProperties:
    description: Data Service properties.
    required:
    - state
    type: object
    properties:
      state:
        description: State of the data service.
        enum:
        - Disabled
        - Enabled
        - Supported
        type: string
        x-ms-enum:
          name: State
          modelAsString: false
      supportedDataSinkTypes:
        description: Supported data store types which can be used as a sink.
        type: array
        items:
          type: string
      supportedDataSourceTypes:
        description: Supported data store types which can be used as a source.
        type: array
        items:
          type: string
  DataServiceList:
    description: Data Service Collection.
    type: object
    properties:
      value:
        description: List of data services.
        type: array
        items:
          $ref: '#/definitions/DataService'
      nextLink:
        description: Link for the next set of data services.
        type: string
  DmsBaseObject:
    description: Base class for all objects under DataManager Service
    type: object
    properties:
      name:
        description: Name of the object.
        type: string
        readOnly: true
      id:
        description: Id of the object.
        type: string
        readOnly: true
      type:
        description: Type of the object.
        type: string
        readOnly: true
parameters:
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: The Subscription Id
    required: true
    type: string
  apiVersionParameter:
    name: api-version
    in: query
    description: The API Version
    required: true
    type: string
  resourceGroupNameParameter:
    name: resourceGroupName
    in: path
    description: The Resource Group Name
    required: true
    type: string
    x-ms-parameter-location: method
  dataManagerNameParameter:
    name: dataManagerName
    in: path
    description: The name of the DataManager Resource within the specified resource group. DataManager names must be between 3 and 24 characters in length and use any alphanumeric and underscore only
    required: true
    type: string
    maxLength: 24
    minLength: 3
    pattern: ^[-\w\.]+$
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
