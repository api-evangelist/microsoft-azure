definitions:
  SSHKey:
    description: Appliance SSHKey definition.
    type: object
    properties:
      privateKey:
        description: User Private Key.
        type: string
      publicKey:
        description: User Public Key.
        type: string
  appliance:
    description: Appliances definition.
    type: object
    properties:
      identity:
        $ref: '#/definitions/Identity'
        description: Identity for the resource.
      properties:
        $ref: '#/definitions/applianceProperties'
        description: The set of properties specific to an Appliance
        x-ms-client-flatten: true
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        description: Metadata pertaining to creation and last modification of the resource
        readOnly: true
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/TrackedResource
  Appliance:
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ApplianceProperties'
        description: The appliance properties.
      plan:
        $ref: '#/definitions/Plan'
        description: The plan information.
      kind:
        type: string
        description: The kind of the appliance. Allowed values are MarketPlace and ServiceCatalog.
        pattern: ^[-\w\._,\(\)]+$
    allOf:
    - $ref: '#/definitions/GenericResource'
    description: Information about appliance.
  UpgradeGraphProperties:
    description: The Upgrade Graph Properties for appliance.
    type: object
    properties:
      applianceVersion:
        description: The current appliance version
        type: string
        readOnly: true
      supportedVersions:
        description: This contains the current version and supported upgrade versions.
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/SupportedVersion'
        x-ms-identifiers: []
  UpgradeGraph:
    description: The Upgrade Graph for appliance.
    type: object
    properties:
      id:
        description: The appliance resource path
        type: string
        readOnly: true
      name:
        description: The release train name.
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/UpgradeGraphProperties'
        description: The properties of supported version
        type: object
  applianceOperation:
    description: Appliances operation.
    type: object
    properties:
      display:
        $ref: '#/definitions/applianceOperationValueDisplay'
        description: Describes the properties of an Appliances Operation Value Display.
        x-ms-client-flatten: true
      isDataAction:
        description: Is this Operation a data plane operation
        type: boolean
        readOnly: true
      name:
        description: The name of the compute operation.
        type: string
        readOnly: true
      origin:
        description: The origin of the compute operation.
        type: string
        readOnly: true
  Sku:
    properties:
      name:
        type: string
        description: The SKU name.
      tier:
        type: string
        description: The SKU tier.
      size:
        type: string
        description: The SKU size.
      family:
        type: string
        description: The SKU family.
      model:
        type: string
        description: The SKU model.
      capacity:
        type: integer
        format: int32
        description: The SKU capacity.
    required:
    - name
    description: SKU for the resource.
  Plan:
    properties:
      name:
        type: string
        description: The plan name.
      publisher:
        type: string
        description: The publisher ID.
      product:
        type: string
        description: The product code.
      promotionCode:
        type: string
        description: The promotion code.
      version:
        type: string
        description: The plan's version.
    required:
