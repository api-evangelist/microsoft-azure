    - fine-tune
    - file
    - fine-tune-event
    - model
    - deployment
    type: string
    readOnly: true
    x-ms-enum:
      name: TypeDiscriminator
      modelAsString: true
      values:
      - value: list
        description: This object represents a list of other objects.
      - value: fine-tune
