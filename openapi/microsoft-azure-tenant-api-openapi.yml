swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Tenant API
  description: Tenant controller.
schemes:
- https
tags:
- name: Tenant
  description: Tenant controller.
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.DataReplication/locations/{location}/checkNameAvailability:
    post:
      tags:
      - Tenant
      summary: Microsoft Azure Performs The Resource Name Availability Check
      description: Checks the resource name availability.
      operationId: microsoftAzureChecknameavailability
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/LocationParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - in: body
        name: body
        description: Resource details.
        schema:
          $ref: '#/definitions/CheckNameAvailabilityModel'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/CheckNameAvailabilityResponseModel'
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        CheckNameAvailability:
          $ref: ./examples/CheckNameAvailability.json
  /providers/Microsoft.DataReplication/operations:
    get:
      tags:
      - Tenant
      summary: Microsoft Azure Get A List Of Rest Api Operations Supported By Microsoft Datareplication
      description: Gets the operations.
      operationId: microsoftAzureOperationsList
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/OperationListResult
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Operations_List:
          $ref: ./examples/Operations_List.json
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DataReplication/deployments/{deploymentId}/preflight
  : post:
      tags:
      - Tenant
      summary: Microsoft Azure Performs Resource Deployment Validation
      operationId: microsoftAzureDeploymentpreflight
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - in: path
        name: deploymentId
        description: Deployment Id.
        required: true
        type: string
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - in: body
        name: body
        description: Deployment preflight model.
        schema:
          $ref: '#/definitions/DeploymentPreflightModel'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DeploymentPreflightModel'
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        DeploymentPreflight:
          $ref: ./examples/DeploymentPreflight.json
      description: Needs a more full description created.
definitions:
  CheckNameAvailabilityModel:
    description: Check name availability model.
    type: object
    properties:
      name:
        description: Gets or sets the resource name.
        type: string
      type:
        description: Gets or sets the resource type.
        type: string
  DeploymentPreflightResource:
    description: Deployment preflight resource.
    type: object
    properties:
      name:
        description: Gets or sets the resource name.
        type: string
      type:
        description: Gets or sets the resource type.
        type: string
      location:
        description: Gets or sets the location of the resource.
        type: string
        x-ms-mutability:
        - create
        - read
      apiVersion:
        description: Gets or sets the Api version.
        type: string
  DeploymentPreflightModel:
    description: Deployment preflight model.
    type: object
    properties:
      resources:
        description: Gets or sets the list of resources.
        type: array
        items:
          $ref: '#/definitions/DeploymentPreflightResource'
        x-ms-identifiers: []
  CheckNameAvailabilityResponseModel:
    description: Check name availability response model.
    type: object
    properties:
      nameAvailable:
        description: Gets or sets a value indicating whether resource name is available or not.
        type: boolean
      reason:
        description: Gets or sets the reason for resource name unavailability.
        type: string
      message:
        description: Gets or sets the message for resource name unavailability.
        type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
