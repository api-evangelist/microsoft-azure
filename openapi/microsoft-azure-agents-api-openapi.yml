      - name: agent
        in: body
        required: true
        schema:
          $ref: '#/definitions/Agent'
      responses:
        '200':
          description: Successfully PUT Agent resource.
          schema:
            $ref: '#/definitions/Agent'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storagemover Storagemovers Storagemovername Agents Agentname
    patch:
      tags:
      - Agents
      operationId: microsoftAzureAgentsUpdate
      description: Creates or updates an Agent resource.
      x-ms-examples:
        Agents_Update:
          $ref: ./examples/Agents_Update.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/StorageMoverNameParameter'
      - $ref: '#/parameters/AgentNameParameter'
