definitions:
  Agent:
    description: The Agent resource.
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/AgentProperties'
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        description: Resource system metadata.
    required:
    - properties
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ProxyResource
  AgentProperties:
    type: object
    properties:
      description:
        type: string
        description: A description for the Agent.
      agentVersion:
        type: string
        description: The Agent version.
        readOnly: true
      arcResourceId:
        type: string
        description: The fully qualified resource ID of the Hybrid Compute resource for the Agent.
        x-ms-mutability:
        - read
        - create
      arcVmUuid:
        type: string
        description: The VM UUID of the Hybrid Compute resource for the Agent.
        x-ms-mutability:
        - read
        - create
      agentStatus:
        description: The Agent status.
        enum:
        - Registering
        - Offline
        - Online
        - Executing
        - RequiresAttention
        - Unregistering
        type: string
        x-ms-enum:
          name: AgentStatus
          modelAsString: true
        readOnly: true
      lastStatusUpdate:
        type: string
        format: date-time
        description: The last updated time of the Agent status.
        readOnly: true
      localIPAddress:
        type: string
        description: Local IP address reported by the Agent.
        readOnly: true
      memoryInMB:
        type: integer
        format: int64
        description: Available memory reported by the Agent, in MB.
        readOnly: true
      numberOfCores:
        type: integer
        format: int64
        description: Available compute cores reported by the Agent.
        readOnly: true
      uptimeInSeconds:
        type: integer
        format: int64
        description: Uptime of the Agent in seconds.
        readOnly: true
      errorDetails:
        type: object
        properties:
          code:
            type: string
            description: Error code reported by Agent
          message:
            type: string
            description: Expanded description of reported error code
        readOnly: true
      provisioningState:
        description: The provisioning state of this resource.
        enum:
        - Succeeded
        type: string
        x-ms-enum:
          name: ProvisioningState
          modelAsString: true
        readOnly: true
    required:
    - arcResourceId
    - arcVmUuid
  AgentUpdateProperties:
    type: object
    properties:
      description:
        type: string
        description: A description for the Agent.
  AgentList:
    description: List of Agents.
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/Agent'
        readOnly: true
      nextLink:
        type: string
        description: Request URL that can be used to query next page of containers. Returned when total number of requested containers exceed maximum page size.
        readOnly: true
  AgentUpdateParameters:
    description: The Agent resource.
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/AgentUpdateProperties'
parameters:
  AgentNameParameter:
    name: agentName
    in: path
    required: true
    type: string
    description: The name of the Agent resource.
    x-ms-parameter-location: method
  StorageMoverNameParameter:
    name: storageMoverName
    in: path
    required: true
    type: string
    description: The name of the Storage Mover resource.
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
