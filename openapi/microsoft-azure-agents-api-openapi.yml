      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storagemover Storagemovers Storagemovername Agents Agentname
    delete:
      tags:
      - Agents
      operationId: microsoftAzureAgentsDelete
      description: Deletes an Agent resource.
      x-ms-examples:
        Agents_Delete:
