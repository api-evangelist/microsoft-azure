      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: The Agent resource.
          schema:
            $ref: '#/definitions/Agent'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Storagemover Storagemovers Storagemovername Agents Agentname
    put:
      tags:
      - Agents
      operationId: microsoftAzureAgentsCreateorupdate
      description: Creates or updates an Agent resource, which references a hybrid compute machine that can run jobs.
      x-ms-examples:
        Agents_CreateOrUpdate:
          $ref: ./examples/Agents_CreateOrUpdate.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/StorageMoverNameParameter'
      - $ref: '#/parameters/AgentNameParameter'
