swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ProductFamilyMetadata API
schemes:
- https
tags:
- name: ProductFamilyMetadata
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.EdgeOrder/productFamiliesMetadata:
    post:
      tags:
      - ProductFamilyMetadata
      description: List product families metadata for the given subscription.
      operationId: microsoftAzureProductsandconfigurationsListproductfamiliesmetadata
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      - name: $skipToken
        in: query
        description: $skipToken is supported on list of product families metadata, which provides the next page in the list of product families metadata.
        required: false
        type: string
      responses:
        '200':
          description: The list of available product families for the given subscription.
          schema:
            $ref: '#/definitions/ProductFamiliesMetadata'
        default:
          description: Error response describing reason for operation failure.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        ListProductFamiliesMetadata:
          $ref: ./examples/ListProductFamiliesMetadata.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Providers Microsoft Edgeorder Productfamiliesmetadata
definitions:
  Dimensions:
    description: Dimensions of a configuration.
    type: object
    properties:
      length:
        format: double
        description: Length of the device.
        type: number
        readOnly: true
      height:
        format: double
        description: Height of the device.
        type: number
        readOnly: true
      width:
        format: double
        description: Width of the device.
        type: number
        readOnly: true
      lengthHeightUnit:
        description: Unit for the dimensions of length, height and width.
        enum:
        - IN
        - CM
        type: string
        readOnly: true
        x-ms-enum:
          name: LengthHeightUnit
          modelAsString: true
          values:
          - value: IN
            description: Inch, applicable for West US.
          - value: CM
            description: Centimeter.
      weight:
        format: double
        description: Weight of the device.
        type: number
        readOnly: true
      depth:
        format: double
        description: Depth of the device.
        type: number
        readOnly: true
      weightUnit:
        description: Unit for the dimensions of weight.
        enum:
        - LBS
        - KGS
        type: string
        readOnly: true
        x-ms-enum:
          name: WeightMeasurementUnit
          modelAsString: true
          values:
          - value: LBS
            description: Pounds.
          - value: KGS
            description: Kilograms.
  CategoryInformation:
    description: Category related properties of a child configuration.
    type: object
    properties:
      categoryName:
        description: Category name of the child configuration.
        type: string
      categoryDisplayName:
        description: Category display name of the child configuration.
        type: string
      description:
        description: Description text for the category.
        type: string
      links:
        description: Links for the category.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/Link'
        x-ms-identifiers: []
