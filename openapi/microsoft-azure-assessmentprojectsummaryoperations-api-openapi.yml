swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector AssessmentProjectSummaryOperations API
schemes:
- https
tags:
- name: AssessmentProjectSummaryOperations
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/projectSummary
  : get:
      operationId: microsoftAzureAssessmentprojectsummaryoperationsListbyassessmentproject
      tags:
      - AssessmentProjectSummaryOperations
      description: List AssessmentProjectSummary resources by AssessmentProject
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/AssessmentProjectSummaryListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        AssessmentProjectSummaryOperations_ListByAssessmentProject_MaximumSet_Gen:
          $ref: ./examples/AssessmentProjectSummaryOperations_ListByAssessmentProject_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Projectsummary
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/projectSummary/{projectSummaryName}
  : get:
      operationId: microsoftAzureAssessmentprojectsummaryoperationsGet
      tags:
      - AssessmentProjectSummaryOperations
      description: Get a AssessmentProjectSummary
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: projectSummaryName
        in: path
        description: Group ARM name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/AssessmentProjectSummary'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        AssessmentProjectSummaryOperations_Get_MaximumSet_Gen:
          $ref: ./examples/AssessmentProjectSummaryOperations_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Projectsummary Projectsummaryname
definitions:
  AssessmentProjectSummaryListResult:
    type: object
    description: The response of a AssessmentProjectSummary list operation.
    properties:
      value:
        type: array
        description: The AssessmentProjectSummary items on this page
        items:
          $ref: '#/definitions/AssessmentProjectSummary'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  AssessmentProjectSummary:
    type: object
    description: Assessment project summary resource.
    properties:
      properties:
        $ref: '#/definitions/AssessmentProjectSummaryProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  AssessmentProjectSummaryProperties:
    type: object
    description: Assessment project summary properties class.
    properties:
      errorSummaryAffectedEntities:
        type: array
        description: 'Gets the Error summary by feature. Contains number of affected Entities per

          feature.'
        items:
          $ref: '#/definitions/ErrorSummary'
        readOnly: true
        x-ms-identifiers: []
      numberOfPrivateEndpointConnections:
        type: integer
        format: int32
        description: Gets the number of private endpoint connections.
        readOnly: true
      numberOfGroups:
        type: integer
        format: int32
        description: Gets the number of groups created in this project.
        readOnly: true
      numberOfMachines:
        type: integer
        format: int32
        description: Gets the number of machines part of this project.
        readOnly: true
      numberOfImportMachines:
        type: integer
        format: int32
        description: Gets the number of import machines part of this project.
        readOnly: true
      numberOfAssessments:
        type: integer
        format: int32
        description: Gets the number of assessments created in this project.
        readOnly: true
      lastAssessmentTimestamp:
        type: string
        format: date-time
        description: Gets the last assessment timestamp.
        readOnly: true
  ErrorSummary:
    type: object
    description: Error summary containing affected entities for each type of assessment.
    properties:
      assessmentType:
        $ref: '#/definitions/AssessmentType'
        description: Gets the assessment type.
        readOnly: true
      count:
        type: integer
        format: int32
        description: Gets the affected entity count.
        readOnly: true
  AssessmentType:
    type: string
    enum:
    - Unknown
    - MachineAssessment
    - AvsAssessment
    - SqlAssessment
    - WebAppAssessment
    x-ms-enum:
      name: AssessmentType
      modelAsString: true
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
