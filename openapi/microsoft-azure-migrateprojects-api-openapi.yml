info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector MigrateProjects API
schemes:
- https
tags:
- name: MigrateProjects
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/migrateProjects/{migrateProjectName}
  : get:
      tags:
      - MigrateProjects
      summary: Microsoft Azure Method To Get A Migrate Project
      operationId: microsoftAzureMigrateprojectsGetmigrateproject
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/migrateProjectName'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/MigrateProject'
      deprecated: false
      x-ms-examples:
        MigrateProjects_Get:
          $ref: ./examples/MigrateProjects_Get.json
      description: Needs a more full description created.
    put:
      tags:
      - MigrateProjects
      summary: Microsoft Azure Method To Create Or Update A Migrate Project
      operationId: microsoftAzureMigrateprojectsPutmigrateproject
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/migrateProjectName'
      - $ref: '#/parameters/api-version'
      - name: body
        in: body
        description: Body with migrate project details.
        required: true
        schema:
          $ref: '#/definitions/MigrateProject'
      - $ref: '#/parameters/acceptLanguage'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/MigrateProject'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/MigrateProject'
      deprecated: false
      x-ms-examples:
        MigrateProjects_Put:
          $ref: ./examples/MigrateProjects_Put.json
      description: Needs a more full description created.
    patch:
      tags:
      - MigrateProjects
      summary: Microsoft Azure Update Migrate Project
      description: Update a migrate project with specified name. Supports partial updates, for example only tags can be provided.
      operationId: microsoftAzureMigrateprojectsPatchmigrateproject
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/migrateProjectName'
      - $ref: '#/parameters/api-version'
      - name: body
        in: body
        description: Body with migrate project details.
        required: true
        schema:
          $ref: '#/definitions/MigrateProject'
