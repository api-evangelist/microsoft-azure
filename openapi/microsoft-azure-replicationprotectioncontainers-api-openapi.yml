      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
        type: string
      - name: protectionContainerName
        in: path
        description: Protection container name.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ProtectionContainer'
      x-ms-examples:
        Gets the protection container details.:
          $ref: ./examples/ReplicationProtectionContainers_Get.json
    put:
      tags:
      - ReplicationProtectionContainers
      summary: Microsoft Azure Create A Protection Container
      description: Operation to create a protection container.
      operationId: microsoftAzureReplicationprotectioncontainersCreate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
