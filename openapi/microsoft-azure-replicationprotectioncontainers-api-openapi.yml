  : get:
      tags:
      - ReplicationProtectionContainers
      summary: Microsoft Azure Gets The List Of Protection Container For A Fabric
      description: Lists the protection containers in the specified fabric.
      operationId: microsoftAzureReplicationprotectioncontainersListbyreplicationfabrics
      produces:
      - application/json
      parameters:
