    type: string
    required: false
    description: "Partition key. This is required if the partition scheme for the service is Int64Range or Named. \nThis is not the partition ID, but rather, either the integer key value, or the name of the partition ID.\nFor example, if your service is using ranged partitions from 0 to 10, then they PartitionKeyValue would be an\ninteger in that range. Query service description to see the range or name."
  PartitionsHealthStateFilterOptionalQueryParam:
    name: PartitionsHealthStateFilter
    description: 'Allows filtering of the partitions health state objects returned in the result of service health query based on their health state.

      The possible values for this parameter include integer value of one of the following health states.

      Only partitions that match the filter are returned. All partitions are used to evaluate the aggregated health state.

      If not specified, all entries are returned. The state values are flag-based enumeration, so the value could be a combination of these value

      obtained using bitwise ''OR'' operator. For example, if the provided value is 6 then health state of partitions with HealthState value of OK (2) and Warning (4) will be returned.


      - Default - Default value. Matches any HealthState. The value is zero.

      - None - Filter that doesn''t match any HealthState value. Used in order to return no results on a given collection of states. The value is 1.

      - Ok - Filter that matches input with HealthState value Ok. The value is 2.

      - Warning - Filter that matches input with HealthState value Warning. The value is 4.

      - Error - Filter that matches input with HealthState value Error. The value is 8.

      - All - Filter that matches input with any HealthState value. The value is 65535.'
