        readOnly: true
      region:
        type: string
        description: Gets region.
        readOnly: true
      userNodePoolCount:
        type: integer
        format: int32
        description: Gets user node pool count.
        readOnly: true
      userNodeCount:
        type: integer
        format: int32
        description: Gets user node count.
        readOnly: true
      systemNodePoolCount:
        type: integer
        format: int32
        description: Gets system node pool count.
        readOnly: true
      systemNodeCount:
        type: integer
        format: int32
        description: Gets system node count.
        readOnly: true
      podCount:
        type: integer
        format: int32
        description: Gets pod count.
        readOnly: true
      monthlyCost:
        type: number
        format: float
        description: Gets monthly cost.
        readOnly: true
    required:
    - name
    - nodePools
    - region
    - userNodePoolCount
    - userNodeCount
    - systemNodePoolCount
    - systemNodeCount
    - podCount
    - monthlyCost
  AKSCluster:
    type: object
    description: ARM model of AKS Cluster.
    properties:
      properties:
        $ref: '#/definitions/AKSClusterProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
      eTag:
        type: string
        description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention.  Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        readOnly: true
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  NodePool:
    type: object
    description: Data model of Node Pool.
    properties:
      id:
        type: string
        description: Gets id.
        readOnly: true
      name:
        type: string
        description: Gets name.
        readOnly: true
      clusterName:
        type: string
        description: Gets cluster name.
        readOnly: true
      mode:
        $ref: '#/definitions/NodePoolMode'
        description: Gets mode.
        readOnly: true
      osType:
