        description: Gets os type.
        readOnly: true
      armSkuName:
        type: string
        description: Gets arm sku name.
        readOnly: true
      nodeCount:
        type: integer
        format: int32
        description: Gets node count.
        readOnly: true
      podCount:
        type: integer
        format: int32
        description: Gets pod count.
        readOnly: true
      monthlyCost:
        type: number
        format: float
        description: Gets monthly cost.
        readOnly: true
      podApproxMonthlyCost:
        type: number
        format: float
        description: Gets pod approximate monthly cost.
        readOnly: true
