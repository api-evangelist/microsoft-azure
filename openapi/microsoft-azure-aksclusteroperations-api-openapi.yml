definitions:
  AKSClusterListResult:
    type: object
    description: The response of a AKSCluster list operation.
    properties:
      value:
        type: array
        description: The AKSCluster items on this page
        items:
          $ref: '#/definitions/AKSCluster'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  OSType:
    type: string
    description: Operating System Type.
    enum:
    - Linux
    - Windows
    x-ms-enum:
      name: OSType
      modelAsString: true
      values:
      - name: Linux
        value: Linux
        description: Linux OS Type.
      - name: Windows
        value: Windows
        description: Windows OS Type.
  NodePoolMode:
    type: string
    description: Node Pool Mode.
    enum:
    - User
    - System
    x-ms-enum:
      name: NodePoolMode
      modelAsString: true
      values:
      - name: User
        value: User
        description: Indicates User node pool.
      - name: System
        value: System
        description: Indicates System node pool.
  Cluster:
    type: object
    description: Data model of Cluster.
    properties:
      name:
        type: string
        description: Gets name.
        readOnly: true
      nodePools:
        type: array
        description: Gets list of node pools.
        items:
