            type: integer
          serialNumber:
            description: Serial Number
            type: string
          thumbprint:
            description: Thumbprint
            type: string
          subject:
            description: Subject
            type: string
          notBefore:
            format: date-time
            description: Valid from
            type: string
          notAfter:
            format: date-time
            description: Valid to
            type: string
          signatureAlgorithm:
            description: Signature Algorithm
            type: string
          issuer:
            description: Issuer
            type: string
          rawData:
            description: Raw certificate data
            type: string
        x-ms-client-flatten: true
  Object:
    type: object
    properties: {}
  CertificateOrderAction:
    description: Represents a certificate action
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        required:
        - type
        properties:
          type:
