            type: string
          validityInYears:
            format: int32
            description: Duration in years (must be between 1 and 3)
            type: integer
          keySize:
            format: int32
            description: Certificate Key Size
            type: integer
          productType:
            description: Certificate product type
            enum:
            - StandardDomainValidatedSsl
            - StandardDomainValidatedWildCardSsl
            type: string
            x-ms-enum:
              name: CertificateProductType
              modelAsString: false
          autoRenew:
            description: Auto renew
            type: boolean
          provisioningState:
            description: Status of certificate order
            enum:
            - Succeeded
            - Failed
            - Canceled
            - InProgress
            - Deleting
            type: string
            x-ms-enum:
              name: ProvisioningState
              modelAsString: false
          status:
            description: Current order status
            enum:
            - Pendingissuance
            - Issued
            - Revoked
            - Canceled
            - Denied
            - Pendingrevocation
            - PendingRekey
            - Unused
            - Expired
            - NotSubmitted
            type: string
            x-ms-enum:
              name: CertificateOrderStatus
              modelAsString: false
          signedCertificate:
