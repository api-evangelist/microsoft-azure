swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector DataMaskingPolicies API
schemes:
- https
tags:
- name: DataMaskingPolicies
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Sql/servers/{serverName}/databases/{databaseName}/dataMaskingPolicies/{dataMaskingPolicyName}
  : put:
      tags:
      - DataMaskingPolicies
      operationId: microsoftAzureDatamaskingpoliciesCreateorupdate
      description: Creates or updates a database data masking policy
      x-ms-examples:
        Create or update data masking policy max:
          $ref: ./examples/DataMaskingPolicyCreateOrUpdateMax.json
        Create or update data masking policy min:
          $ref: ./examples/DataMaskingPolicyCreateOrUpdateMin.json
      parameters:
      - $ref: ../../../common/v1/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../common/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../common/v1/types.json#/parameters/ResourceGroupParameter
      - $ref: '#/parameters/ServerNameParameter'
      - $ref: '#/parameters/DatabaseNameParameter'
      - $ref: '#/parameters/DataMaskingPolicyNameParameter'
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/DataMaskingPolicy'
        description: Parameters for creating or updating a data masking policy.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/DataMaskingPolicy'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Sql Servers Servername Databases Databasename Datamaskingpolicies Datamaskingpolicyname
    get:
      tags:
      - DataMaskingPolicies
      operationId: microsoftAzureDatamaskingpoliciesGet
      description: Gets a database data masking policy.
      x-ms-examples:
        Get data masking policy:
          $ref: ./examples/DataMaskingPolicyGet.json
      parameters:
      - $ref: ../../../common/v1/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../common/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../common/v1/types.json#/parameters/ResourceGroupParameter
      - $ref: '#/parameters/ServerNameParameter'
      - $ref: '#/parameters/DatabaseNameParameter'
      - $ref: '#/parameters/DataMaskingPolicyNameParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/DataMaskingPolicy'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Sql Servers Servername Databases Databasename Datamaskingpolicies Datamaskingpolicyname
definitions:
  DataMaskingPolicyProperties:
    properties:
      dataMaskingState:
        type: string
        description: The state of the data masking policy.
        enum:
        - Disabled
        - Enabled
        x-ms-enum:
          modelAsString: false
          name: DataMaskingState
      exemptPrincipals:
        type: string
        description: The list of the exempt principals. Specifies the semicolon-separated list of database users for which the data masking policy does not apply. The specified users receive data results without masking for all of the database queries.
      applicationPrincipals:
        type: string
        description: The list of the application principals. This is a legacy parameter and is no longer used.
        readOnly: true
      maskingLevel:
        type: string
        description: The masking level. This is a legacy parameter and is no longer used.
        readOnly: true
    required:
    - dataMaskingState
    description: The properties of a database data masking policy.
  DataMaskingPolicy:
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/DataMaskingPolicyProperties'
        description: The properties of the data masking policy.
      location:
        type: string
        readOnly: true
        description: The location of the data masking policy.
      kind:
        type: string
        readOnly: true
        description: The kind of data masking policy. Metadata, used for Azure portal.
    allOf:
    - $ref: ../../../common/v1/types.json#/definitions/ProxyResource
    description: Represents a database data masking policy.
parameters:
  ServerNameParameter:
    name: serverName
    in: path
    required: true
    type: string
    description: The name of the server.
    x-ms-parameter-location: method
  DatabaseNameParameter:
    name: databaseName
    in: path
    required: true
    type: string
    description: The name of the database.
    x-ms-parameter-location: method
  DataMaskingPolicyNameParameter:
    name: dataMaskingPolicyName
    in: path
    required: true
    type: string
    enum:
    - Default
    x-ms-enum:
      modelAsString: false
      name: DataMaskingPolicyName
    description: The name of the database for which the data masking rule applies.
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
