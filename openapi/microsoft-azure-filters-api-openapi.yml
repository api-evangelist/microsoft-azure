swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Filters API
schemes:
- https
tags:
- name: Filters
paths:
  /datasources/{dataSourceName}/scans/{scanName}/filters/custom:
    get:
      tags:
      - Filters
      description: Get a filter
      operationId: microsoftAzureFiltersGet
      produces:
      - application/json
      parameters:
      - in: path
        name: dataSourceName
        required: true
        type: string
      - in: path
        name: scanName
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Filter'
        default:
          description: An error response received from the Scanning Service
          schema:
            $ref: '#/definitions/ErrorResponseModel'
      x-ms-examples:
        Filters_Get:
          $ref: ./examples/Filters_Get.json
      summary: Microsoft Azure Get Datasources Datasourcename Scans Scanname Filters Custom
    put:
      tags:
      - Filters
      description: Creates or updates a filter
      operationId: microsoftAzureFiltersCreateorupdate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: dataSourceName
        required: true
        type: string
      - in: path
        name: scanName
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      - in: body
        name: body
        schema:
          $ref: '#/definitions/Filter'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Filter'
        '201':
          description: Success
          schema:
            $ref: '#/definitions/Filter'
        default:
          description: An error response received from the Scanning Service
          schema:
            $ref: '#/definitions/ErrorResponseModel'
      x-ms-examples:
        Filters_CreateOrUpdate:
          $ref: ./examples/Filters_CreateOrUpdate.json
      summary: Microsoft Azure Put Datasources Datasourcename Scans Scanname Filters Custom
