        ElasticSans_ListByResourceGroup_MinimumSet_Gen:
          $ref: ./examples/ElasticSans_ListByResourceGroup_MinimumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Elasticsan Elasticsans
