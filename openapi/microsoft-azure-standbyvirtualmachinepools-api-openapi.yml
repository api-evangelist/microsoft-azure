        type: object
        description: Resource tags.
        additionalProperties:
          type: string
      properties:
        $ref: '#/definitions/StandbyVirtualMachinePoolResourceUpdateProperties'
        x-ms-client-flatten: true
  StandbyVirtualMachinePoolResource:
