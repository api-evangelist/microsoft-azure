definitions:
  ErrorResponse:
    description: Describes the format of Error response.
    type: object
    properties:
      code:
        description: Error code
        type: string
      message:
        description: Error message indicating why the operation failed.
        type: string
  JoinRequestDetails:
    description: join requests.
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/Resource
    properties:
      properties:
        $ref: '#/definitions/JoinRequestProperties'
        description: join request properties.
        x-ms-client-flatten: true
  JoinRequestProperties:
    description: Join request properties.
    type: object
    properties:
      firstName:
        type: string
        description: First Name
      lastName:
        type: string
        description: Last Name
      email:
        type: string
        description: join request email
      status:
        type: string
        enum:
        - Pending
        - Denied
        x-ms-enum:
          name: Join request status
          modelAsString: true
        description: Join request status
  RedeemRequest:
    description: redeem request.
    type: object
    required:
    - redeemCode
    - firstName
    - lastName
    properties:
      redeemCode:
        type: string
        description: redeem code
      firstName:
        type: string
        description: first name of requester
      lastName:
        type: string
        description: last name of requester
  JoinRequestList:
    description: list of join requests.
    type: object
    properties:
      value:
        description: The list of requests.
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/JoinRequestDetails'
      nextLink:
        description: the link (url) to the next page of results.
        type: string
        readOnly: true
  ErrorResponseBody:
    description: Error response indicates that the service is not able to process the incoming request. The reason is provided in the error message.
    type: object
    properties:
      error:
        description: The details of the error.
        $ref: '#/definitions/ErrorResponse'
