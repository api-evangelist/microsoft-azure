swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector RoutingConfigurations API
schemes:
- https
tags:
- name: RoutingConfigurations
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/networkManagers/{networkManagerName}/routingConfigurations
  : get:
      tags:
      - RoutingConfigurations
      operationId: microsoftAzureRoutingconfigurationsList
      description: Lists all the network manager routing configurations in a network manager, in a paginated format.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/NetworkManagerNameParameter'
      - $ref: '#/parameters/ListTopParameter'
      - $ref: '#/parameters/ListSkipTokenParameter'
      responses:
        '200':
          description: Get successful. The operation returns all routing configuration resources in the specified network manager, in a paginated format
          schema:
            $ref: '#/definitions/RoutingConfigurationListResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./network.json#/definitions/CloudError
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        List routing configurations in a network manager:
          $ref: ./examples/NetworkManagerRoutingConfigurationList.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Network Networkmanagers Networkmanagername Routingconfigurations
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/networkManagers/{networkManagerName}/routingConfigurations/{configurationName}
  : parameters:
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
    - $ref: '#/parameters/NetworkManagerNameParameter'
    - $ref: '#/parameters/RoutingConfigurationParameter'
    get:
      tags:
      - RoutingConfigurations
      description: Retrieves a network manager routing configuration.
      operationId: microsoftAzureRoutingconfigurationsGet
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/RoutingConfiguration'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./network.json#/definitions/CloudError
      x-ms-examples:
        Get routing configurations:
          $ref: ./examples/NetworkManagerRoutingConfigurationGet.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Network Networkmanagers Networkmanagername Routingconfigurations Configurationname
    put:
      tags:
      - RoutingConfigurations
      description: Creates or updates a network manager routing configuration.
      operationId: microsoftAzureRoutingconfigurationsCreateorupdate
      parameters:
      - name: routingConfiguration
        in: body
        required: true
        schema:
          $ref: '#/definitions/RoutingConfiguration'
        description: The routing configuration to create or update
      responses:
        '200':
          description: Updated Routing Configuration
          schema:
            $ref: '#/definitions/RoutingConfiguration'
        '201':
          description: Created Routing Configuration
          schema:
            $ref: '#/definitions/RoutingConfiguration'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./network.json#/definitions/CloudError
      x-ms-examples:
        Create network manager routing configuration:
          $ref: ./examples/NetworkManagerRoutingConfigurationPut.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Network Networkmanagers Networkmanagername Routingconfigurations Configurationname
    delete:
      tags:
      - RoutingConfigurations
      description: Deletes a network manager routing configuration.
      operationId: microsoftAzureRoutingconfigurationsDelete
      responses:
        '202':
          description: Accepted and will complete asynchronously.
          headers:
            Location:
              description: The URL of the resource used to check the status of the asynchronous operation.
              type: string
        '204':
          description: Request successful. Resource does not exist.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./network.json#/definitions/CloudError
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Delete network manager routing configuration:
          $ref: ./examples/NetworkManagerRoutingConfigurationDelete.json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Network Networkmanagers Networkmanagername Routingconfigurations Configurationname
definitions:
  RoutingConfigurationPropertiesFormat:
    type: object
    properties:
      description:
        type: string
        description: A description of the routing configuration.
      provisioningState:
        readOnly: true
        $ref: ./network.json#/definitions/ProvisioningState
        description: The provisioning state of the resource.
      resourceGuid:
        type: string
        readOnly: true
        description: Unique identifier for this resource.
    description: Defines the routing configuration properties.
  RoutingConfigurationListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/RoutingConfiguration'
        description: Gets a page of routing configurations
      nextLink:
        type: string
        description: Gets the URL to get the next page of results.
    description: A list of network manager routing configurations
  RoutingConfiguration:
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/RoutingConfigurationPropertiesFormat'
        description: Indicates the properties for the network manager routing configuration.
      systemData:
        readOnly: true
        description: The system metadata related to this resource.
        $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/systemData
    allOf:
    - $ref: ./network.json#/definitions/ProxyResource
    description: Defines the routing configuration
parameters:
  RoutingConfigurationParameter:
    name: configurationName
    in: path
    description: The name of the network manager Routing Configuration.
    pattern: ^[a-zA-Z0-9_.-]*$
    required: true
    type: string
    x-ms-parameter-location: method
  NetworkManagerNameParameter:
    name: networkManagerName
    in: path
    required: true
    type: string
    description: The name of the network manager.
    pattern: ^[a-zA-Z0-9_.-]*$
    x-ms-parameter-location: method
  ListTopParameter:
    name: $top
    description: An optional query parameter which specifies the maximum number of records to be returned by the server.
    in: query
    required: false
    type: integer
    format: int32
    minimum: 1
    maximum: 20
    x-ms-parameter-location: method
  ListSkipTokenParameter:
    name: $skipToken
    description: SkipToken is only used if a previous operation returned a partial result. If a previous response contains a nextLink element, the value of the nextLink element will include a skipToken parameter that specifies a starting point to use for subsequent calls.
    in: query
    required: false
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
