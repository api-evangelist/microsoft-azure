  resourceNameParameter:
    name: resourceName
    in: path
    required: true
    type: string
    pattern: ^[a-z][a-z0-9]*$
    minLength: 3
    maxLength: 63
    x-ms-parameter-location: method
    description: The name of the resource. It must be a minimum of 3 characters, and a maximum of 63.
