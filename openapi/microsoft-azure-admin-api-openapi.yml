swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Admin API
schemes:
- https
tags:
- name: Admin
paths:
  /stats/latest:
    get:
      tags:
      - Admin
      summary: Microsoft Azure Get Latest Usage Stats
      operationId: microsoftAzureGetactiveseriescount
      produces:
      - application/json
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/UsageStats'
        default:
          description: Client error or server error (4xx or 5xx)
          schema:
            $ref: '#/definitions/ErrorCode'
      x-ms-examples:
        Get latest usage stats:
          $ref: ./examples/getActiveSeriesCount.json
      description: Needs a more full description created.
definitions:
  ErrorCode:
    type: object
    properties:
      message:
        type: string
      code:
        type: string
  UsageStats:
    type: object
    properties:
      timestamp:
        format: date-time
        description: The timestamp of the stats
        type: string
        readOnly: true
      activeSeriesCount:
        format: int32
        description: The active series count
        type: integer
        readOnly: true
      allSeriesCount:
        format: int32
        description: All series count under non deleted data feed
        type: integer
        readOnly: true
      metricsCount:
        format: int32
        description: The metrics count under non deleted data feed
        type: integer
        readOnly: true
      dataFeedCount:
        format: int32
        description: The count of non deleted data feed
        type: integer
        readOnly: true
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
