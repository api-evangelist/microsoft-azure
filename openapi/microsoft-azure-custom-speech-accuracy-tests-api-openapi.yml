swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Accuracy Tests: API'
schemes:
- https
tags:
- name: 'Custom Speech Accuracy Tests:'
paths:
  /accuracytests:
    get:
      tags:
      - 'Custom Speech Accuracy Tests:'
      summary: Microsoft Azure Gets The List Of Accuracy Tests For The Authenticated Subscription
      operationId: microsoftAzureGetaccuracytests
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Test'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get all accuracy tests:
          $ref: ./examples/get_accuracy_tests.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Accuracy Tests:'
      summary: Microsoft Azure Creates A New Accuracy Test
      operationId: microsoftAzureCreateaccuracytest
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: testDefinition
        description: The details of the new accuracy test.
        required: true
        schema:
          $ref: '#/definitions/TestDefinition'
      responses:
        '202':
          description: The request was accepted and the response contains the location of the entity.
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
            Location:
              description: The location of the created resource.
              type: string
              format: uri
            Operation-Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Create an accuracy test:
          $ref: ./examples/create_accuracy_test.json
      description: Needs a more full description created.
  /accuracytests/{id}:
    get:
      tags:
      - 'Custom Speech Accuracy Tests:'
      summary: Microsoft Azure Gets The Accuracy Test Identified By The Given Id
      operationId: microsoftAzureGetaccuracytest
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the accuracy test.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Test'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get an accuracy test:
          $ref: ./examples/get_accuracy_test.json
      description: Needs a more full description created.
    patch:
      tags:
      - 'Custom Speech Accuracy Tests:'
      summary: Microsoft Azure Updates The Mutable Details Of The Test Identified By Its Id
      operationId: microsoftAzureUpdateaccuracytest
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the accuracy test.
        required: true
        type: string
        format: uuid
      - in: body
        name: testUpdate
        description: The object containing the updated fields of the test.
        required: true
        schema:
          $ref: '#/definitions/TestUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Test'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update an accuracy test:
          $ref: ./examples/update_accuracy_test.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Accuracy Tests:'
      summary: Microsoft Azure Deletes The Accuracy Test Identified By The Given Id
      operationId: microsoftAzureDeleteaccuracytest
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the accuracy test.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The test was successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete an accuracy test:
          $ref: ./examples/delete_accuracy_test.json
      description: Needs a more full description created.
