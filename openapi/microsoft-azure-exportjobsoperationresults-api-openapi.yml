swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ExportJobsOperationResults API
schemes:
- https
tags:
- name: ExportJobsOperationResults
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupJobs/operationResults/{operationId}
  : get:
      tags:
      - ExportJobsOperationResults
      description: Gets the operation result of operation triggered by Export Jobs API. If the operation is successful, then it also<br>contains URL of a Blob and a SAS key to access the same. The blob contains exported jobs in JSON serialized format.
      operationId: microsoftAzureExportjobsoperationresultsGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/VaultName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: operationId
        in: path
        description: OperationID which represents the export job.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/OperationResultInfoBaseResource'
        '202':
          description: Accepted
          schema:
            $ref: '#/definitions/OperationResultInfoBaseResource'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        Export Jobs Operation Results:
          $ref: ./examples/Common/ExportJobsOperationResult.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Backupjobs Operationresults Operationid
