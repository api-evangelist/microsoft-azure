swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Profiles API
schemes:
- https
tags:
- name: Profiles
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Cdn/profiles:
    get:
      tags:
      - Profiles
      description: Lists all of the Azure Front Door Standard, Azure Front Door Premium, and CDN profiles within an Azure subscription.
      operationId: microsoftAzureProfilesList
      x-ms-examples:
        Profiles_List:
          $ref: ./examples/Profiles_List.json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/ProfileListResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Cdn Profiles
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles:
    get:
      tags:
      - Profiles
      description: Lists all of the Azure Front Door Standard, Azure Front Door Premium, and CDN profiles within a resource group.
      operationId: microsoftAzureProfilesListbyresourcegroup
      x-ms-examples:
        Profiles_ListByResourceGroup:
          $ref: ./examples/Profiles_ListByResourceGroup.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/ProfileListResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles/{profileName}:
    get:
      tags:
      - Profiles
      description: Gets an Azure Front Door Standard or Azure Front Door Premium or CDN profile with the specified profile name under the specified subscription and resource group.
      operationId: microsoftAzureProfilesGet
      x-ms-examples:
        Profiles_Get:
          $ref: ./examples/Profiles_Get.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/Profile'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename
    put:
      tags:
      - Profiles
      description: Creates a new Azure Front Door Standard or Azure Front Door Premium or CDN profile with a profile name under the specified subscription and resource group.
      operationId: microsoftAzureProfilesCreate
      x-ms-examples:
        Profiles_Create:
          $ref: ./examples/Profiles_Create.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - description: Profile properties needed to create a new profile.
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/Profile'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/Profile'
        '201':
          description: Created. The request has been fulfilled and a new profile has been created.
          schema:
            $ref: '#/definitions/Profile'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          headers:
            location:
              type: string
          schema:
            $ref: '#/definitions/Profile'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename
    patch:
      tags:
      - Profiles
      description: Updates an existing Azure Front Door Standard or Azure Front Door Premium or CDN profile with the specified profile name under the specified subscription and resource group.
      operationId: microsoftAzureProfilesUpdate
      x-ms-examples:
        Profiles_Update:
          $ref: ./examples/Profiles_Update.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - name: profileUpdateParameters
        in: body
        description: Profile properties needed to update an existing profile.
        required: true
        schema:
          $ref: '#/definitions/ProfileUpdateParameters'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/Profile'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          headers:
            location:
              type: string
          schema:
            $ref: '#/definitions/Profile'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename
    delete:
      tags:
      - Profiles
      description: Deletes an existing  Azure Front Door Standard or Azure Front Door Premium or CDN profile with the specified parameters. Deleting a profile will result in the deletion of all of the sub-resources including endpoints, origins and custom domains.
      operationId: microsoftAzureProfilesDelete
      x-ms-examples:
        Profiles_Delete:
          $ref: ./examples/Profiles_Delete.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          headers:
            location:
              type: string
        '204':
          description: No Content. The request has been accepted but the profile was not found.
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/canMigrate:
    post:
      tags:
      - Profiles
      description: Checks if CDN profile can be migrated to Azure Frontdoor(Standard/Premium) profile.
      operationId: microsoftAzureProfilesCanmigrate
      x-ms-examples:
        Profiles_CanMigrate:
          $ref: ./examples/Profiles_CanMigrate.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      - description: Properties needed to check if cdn profile or classic frontdoor can be migrated.
        in: body
        name: canMigrateParameters
        required: true
        schema:
          $ref: '#/definitions/CanMigrateParameters'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/CanMigrateResult'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          headers:
            location:
              type: string
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Canmigrate
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/migrate:
    post:
      tags:
      - Profiles
      description: Migrate the CDN profile to Azure Frontdoor(Standard/Premium) profile. The change need to be committed after this.
      operationId: microsoftAzureProfilesMigrate
      x-ms-examples:
        Profiles_Migrate:
          $ref: ./examples/Profiles_Migrate.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      - description: Properties needed to migrate the profile.
        in: body
        name: migrationParameters
        required: true
        schema:
          $ref: '#/definitions/MigrationParameters'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/MigrateResult'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          headers:
            location:
              type: string
          schema:
            $ref: '#/definitions/MigrateResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Migrate
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles/{profileName}/migrationCommit
  : post:
      tags:
      - Profiles
      description: Commit the migrated Azure Frontdoor(Standard/Premium) profile.
      operationId: microsoftAzureProfilesMigrationcommit
      x-ms-examples:
        Profiles_MigrationCommit:
          $ref: ./examples/Profiles_MigrationCommit.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
        '202':
          description: Accepted and the operation will complete asynchronously.
          headers:
            location:
              type: string
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename Migrationcommit
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles/{profileName}/generateSsoUri
  : post:
      tags:
      - Profiles
      description: Generates a dynamic SSO URI used to sign in to the CDN supplemental portal. Supplemental portal is used to configure advanced feature capabilities that are not yet available in the Azure portal, such as core reports in a standard profile; rules engine, advanced HTTP reports, and real-time stats and alerts in a premium profile. The SSO URI changes approximately every 10 minutes.
      operationId: microsoftAzureProfilesGeneratessouri
      x-ms-examples:
        Profiles_GenerateSsoUri:
          $ref: ./examples/Profiles_GenerateSsoUri.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/SsoUri'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename Generatessouri
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles/{profileName}/getSupportedOptimizationTypes
  : post:
      tags:
      - Profiles
      description: Gets the supported optimization types for the current profile. A user can create an endpoint with an optimization type from the listed values.
      operationId: microsoftAzureProfilesListsupportedoptimizationtypes
      x-ms-examples:
        Profiles_ListSupportedOptimizationTypes:
          $ref: ./examples/Profiles_ListSupportedOptimizationTypes.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/SupportedOptimizationTypesListResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename Getsupportedoptimizationtypes
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Cdn/profiles/{profileName}/checkResourceUsage
  : post:
      tags:
      - Profiles
      description: Checks the quota and actual usage of endpoints under the given Azure Front Door Standard or Azure Front Door Premium or CDN profile.
      operationId: microsoftAzureProfilesListresourceusage
      x-ms-examples:
        Profiles_ListResourceUsage:
          $ref: ./examples/Profiles_ListResourceUsage.json
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: profileName
        in: path
        description: Name of the Azure Front Door Standard or Azure Front Door Premium or CDN profile which is unique within the resource group.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/ResourceUsageListResult'
        default:
          description: CDN error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Profiles Profilename Checkresourceusage
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/profiles/{profileName}
  : put:
      tags:
      - Profiles
      operationId: microsoftAzureProfilesCreateorupdate
      x-ms-examples:
        Profiles_CreateOrUpdate:
          $ref: ./examples/ProfilesCreateOrUpdate.json
      description: Creates a profile within a Hub, or updates an existing profile.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: profileName
        in: path
        required: true
        type: string
        description: The name of the profile.
        pattern: ^[a-zA-Z][a-zA-Z0-9_]+$
        minLength: 1
        maxLength: 128
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/ProfileResourceFormat'
        description: Parameters supplied to the create/delete Profile type operation
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully created the profile.
          schema:
            $ref: '#/definitions/ProfileResourceFormat'
        '202':
          description: Accepted. The create profile operation is accepted.
      x-ms-long-running-operation: true
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Profiles Profilename
    get:
      tags:
      - Profiles
      operationId: microsoftAzureProfilesGet
      x-ms-examples:
        Profiles_Get:
          $ref: ./examples/ProfilesGet.json
      description: Gets information about the specified profile.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: profileName
        in: path
        required: true
        type: string
        description: The name of the profile.
      - name: locale-code
        in: query
        required: false
        type: string
        default: en-us
        description: Locale of profile to retrieve, default is en-us.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get the profile.
          schema:
            $ref: '#/definitions/ProfileResourceFormat'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Profiles Profilename
    delete:
      tags:
      - Profiles
      operationId: microsoftAzureProfilesDelete
      x-ms-examples:
        Profiles_Delete:
          $ref: ./examples/ProfilesDelete.json
      description: Deletes a profile within a hub
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: profileName
        in: path
        required: true
        type: string
        description: The name of the profile.
      - name: locale-code
        in: query
        required: false
        type: string
        default: en-us
        description: Locale of profile to retrieve, default is en-us.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. The profile is deleted.
        '202':
          description: Accepted. The delete operation is accepted.
        '204':
          description: NoContent. Successfully requested delete operation, but the response is intentionally empty.
      x-ms-long-running-operation: true
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Profiles Profilename
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/profiles
  : get:
      tags:
      - Profiles
      operationId: microsoftAzureProfilesListbyhub
      x-ms-examples:
        Profiles_ListByHub:
          $ref: ./examples/ProfilesListByHub.json
      description: Gets all profile in the hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: locale-code
        in: query
        required: false
        type: string
        default: en-us
        description: Locale of profile to retrieve, default is en-us.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get all the profiles in the hub.
          schema:
            $ref: '#/definitions/ProfileListResult_2'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Profiles
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/profiles/{profileName}/getEnrichingKpis
  : post:
      tags:
      - Profiles
      operationId: microsoftAzureProfilesGetenrichingkpis
      x-ms-examples:
        Profiles_GetEnrichingKpis:
          $ref: ./examples/ProfileGetEnrichingKpis.json
      description: Gets the KPIs that enrich the profile Type identified by the supplied name. Enrichment happens through participants of the Interaction on an Interaction KPI and through Relationships for Profile KPIs.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: profileName
        in: path
        required: true
        type: string
        description: The name of the profile.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get the enriching KPIs.
          schema:
            type: array
            items:
              $ref: '#/definitions/KpiDefinition'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Profiles Profilename Getenrichingkpis
definitions:
  Profile:
    description: A profile is a logical grouping of endpoints that share the same settings.
    type: object
    allOf:
    - $ref: '#/definitions/TrackedResource'
    properties:
      sku:
        description: The pricing tier (defines Azure Front Door Standard or Premium or a CDN provider, feature list and rate) of the profile.
        $ref: '#/definitions/Sku'
      kind:
        readOnly: true
        type: string
        description: Kind of the profile. Used by portal to differentiate traditional CDN profile and new AFD profile.
      identity:
        description: Managed service identity (system assigned and/or user assigned identities).
        type: object
        $ref: ../../../../../common-types/resource-management/v4/managedidentity.json#/definitions/ManagedServiceIdentity
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ProfileProperties'
    required:
    - sku
  ProxyResource:
    properties:
      id:
        readOnly: true
        type: string
        description: Resource ID.
      name:
        readOnly: true
        type: string
        description: Resource name.
      type:
        readOnly: true
        type: string
        description: Resource type.
    x-ms-azure-resource: true
    description: Common properties of proxy resource.
  MetadataDefinitionBase:
    properties:
      attributes:
        type: object
        additionalProperties:
          type: array
          items:
            type: string
        description: The attributes for the Type.
      description:
        type: object
        additionalProperties:
          type: string
        description: Localized descriptions for the property.
      displayName:
        type: object
        additionalProperties:
          type: string
        description: Localized display names for the property.
      localizedAttributes:
        type: object
        additionalProperties:
          type: object
          additionalProperties:
            type: string
        description: Any custom localized attributes for the Type.
      smallImage:
        type: string
        description: Small Image associated with the Property or EntityType.
      mediumImage:
        type: string
        description: Medium Image associated with the Property or EntityType.
      largeImage:
        type: string
        description: Large Image associated with the Property or EntityType.
    description: The Metadata definition base.
  MigrateResultProperties:
    type: object
    properties:
      migratedProfileResourceId:
        readOnly: true
        description: Arm resource id of the migrated profile
        $ref: '#/definitions/ResourceReference'
  Sku:
    description: 'Standard_Verizon = The SKU name for a Standard Verizon CDN profile.

      Premium_Verizon = The SKU name for a Premium Verizon CDN profile.

      Custom_Verizon = The SKU name for a Custom Verizon CDN profile.

      Standard_Akamai = The SKU name for an Akamai CDN profile.

      Standard_ChinaCdn = The SKU name for a China CDN profile for VOD, Web and download scenarios using GB based billing model.

      Standard_Microsoft = The SKU name for a Standard Microsoft CDN profile.

      Standard_AzureFrontDoor =  The SKU name for an Azure Front Door Standard profile.

      Premium_AzureFrontDoor = The SKU name for an Azure Front Door Premium profile.

      Standard_955BandWidth_ChinaCdn = The SKU name for a China CDN profile for VOD, Web and download scenarios using 95-5 peak bandwidth billing model.

      Standard_AvgBandWidth_ChinaCdn = The SKU name for a China CDN profile for VOD, Web and download scenarios using monthly average peak bandwidth billing model.

      StandardPlus_ChinaCdn = The SKU name for a China CDN profile for live-streaming using GB based billing model.

      StandardPlus_955BandWidth_ChinaCdn = The SKU name for a China CDN live-streaming profile using 95-5 peak bandwidth billing model.

      StandardPlus_AvgBandWidth_ChinaCdn = The SKU name for a China CDN live-streaming profile using monthly average peak bandwidth billing model.

      '
    properties:
      name:
        description: Name of the pricing tier.
        enum:
        - Standard_Verizon
        - Premium_Verizon
        - Custom_Verizon
        - Standard_Akamai
        - Standard_ChinaCdn
        - Standard_Microsoft
        - Standard_AzureFrontDoor
        - Premium_AzureFrontDoor
        - Standard_955BandWidth_ChinaCdn
        - Standard_AvgBandWidth_ChinaCdn
        - StandardPlus_ChinaCdn
        - StandardPlus_955BandWidth_ChinaCdn
        - StandardPlus_AvgBandWidth_ChinaCdn
        type: string
        x-ms-enum:
          name: SkuName
          modelAsString: true
    type: object
  ProfileUpdateParameters:
    type: object
    description: Properties required to update a profile.
    properties:
      tags:
        description: Profile tags
        type: object
        additionalProperties:
          type: string
      identity:
        description: Managed service identity (system assigned and/or user assigned identities).
        type: object
        $ref: ../../../../../common-types/resource-management/v4/managedidentity.json#/definitions/ManagedServiceIdentity
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ProfilePropertiesUpdateParameters'
    x-ms-azure-resource: true
  KpiAlias:
    required:
    - aliasName
    - expression
