swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ReplicationNetworks API
schemes:
- https
tags:
- name: ReplicationNetworks
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{resourceName}/replicationFabrics/{fabricName}/replicationNetworks
  : get:
      tags:
      - ReplicationNetworks
      summary: Microsoft Azure Gets The List Of Networks Under A Fabric
      description: Lists the networks available for a fabric.
      operationId: microsoftAzureReplicationnetworksListbyreplicationfabrics
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Fabric name.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/NetworkCollection'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Gets the list of networks under a fabric.:
          $ref: ./examples/ReplicationNetworks_ListByReplicationFabrics.json
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{resourceName}/replicationFabrics/{fabricName}/replicationNetworks/{networkName}
  : get:
      tags:
      - ReplicationNetworks
      summary: Microsoft Azure Gets A Network With Specified Server Id And Network Name
      description: Gets the details of a network.
      operationId: microsoftAzureReplicationnetworksGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: fabricName
        in: path
        description: Server Id.
        required: true
        type: string
      - name: networkName
        in: path
        description: Primary network name.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Network'
      x-ms-examples:
        Gets a network with specified server id and network name.:
          $ref: ./examples/ReplicationNetworks_Get.json
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{resourceName}/replicationNetworks
  : get:
      tags:
      - ReplicationNetworks
      summary: Microsoft Azure Gets The List Of Networks View Only Api
      description: Lists the networks available in a vault.
      operationId: microsoftAzureReplicationnetworksList
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/NetworkCollection'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Gets the list of networks. View-only API.:
          $ref: ./examples/ReplicationNetworks_List.json
