components:
  schemas:
    AgentPoolListResult:
      type: object
      description: The response from the List Agent Pools operation.
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/AgentPool'
          description: The list of agent pools.
          example: []
        nextLink:
          type: string
          readOnly: true
          description: The URL to get the next set of agent pool results.
          example: example_value
    AgentPool:
      type: object
      description: Agent pool resource.
      properties:
        id:
          type: string
          readOnly: true
          description: Resource ID.
          example: abc123
        name:
          type: string
          readOnly: true
          description: Resource name.
          example: Example Title
        type:
          type: string
          readOnly: true
          description: Resource type.
          example: example_value
        properties:
          $ref: '#/components/schemas/ManagedClusterAgentPoolProfile'
    CloudError:
      type: object
      description: An error response from the Container service.
      properties:
        error:
          type: object
          description: Details about the error.
          properties:
            code:
              type: string
              description: An identifier for the error.
            message:
              type: string
              description: A message describing the error.
            target:
              type: string
              description: The target of the particular error.
            details:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  target:
                    type: string
              description: A list of additional details about the error.
          example: example_value
    ManagedClusterAgentPoolProfile:
      type: object
      description: Profile for the container service agent pool.
      properties:
        name:
          type: string
          description: Unique name of the agent pool profile in the context of the subscription and resource group.
          pattern: ^[a-z][a-z0-9]{0,11}$
          example: Example Title
        count:
          type: integer
          description: Number of agents (VMs) to host docker containers.
          example: 10
        vmSize:
          type: string
          description: The size of the agent VMs.
          example: example_value
        osDiskSizeGB:
          type: integer
          minimum: 0
          maximum: 2048
          description: OS disk size in GB for the agent pool VMs.
          example: 10
        osDiskType:
          type: string
          enum:
          - Managed
          - Ephemeral
          description: The OS disk type to be used for machines in the agent pool.
          example: Managed
        osType:
          type: string
          enum:
          - Linux
          - Windows
          default: Linux
          description: The operating system type.
          example: Linux
        osSKU:
          type: string
          enum:
          - Ubuntu
          - AzureLinux
          - CBLMariner
          - Windows2019
          - Windows2022
          description: Specifies the OS SKU.
          example: Ubuntu
        maxPods:
          type: integer
          description: The maximum number of pods that can run on a node.
          example: 10
        mode:
          type: string
          enum:
          - System
          - User
          description: The mode of an agent pool.
          example: System
        type:
          type: string
          enum:
          - VirtualMachineScaleSets
          - AvailabilitySet
          default: VirtualMachineScaleSets
          description: The type of agent pool.
          example: VirtualMachineScaleSets
        availabilityZones:
          type: array
          items:
            type: string
          description: The list of availability zones to use for nodes (e.g., ["1", "2", "3"]).
          example: []
        enableAutoScaling:
          type: boolean
          description: Whether to enable auto-scaler.
          example: true
        minCount:
          type: integer
          description: The minimum number of nodes for auto-scaling.
          example: 10
        maxCount:
          type: integer
          description: The maximum number of nodes for auto-scaling.
          example: 10
        nodeLabels:
          type: object
          additionalProperties:
            type: string
          description: The node labels to be persisted across all nodes in the agent pool.
          example: example_value
        nodeTaints:
          type: array
          items:
            type: string
          description: The taints added to new nodes during node pool create and scale.
          example: []
        upgradeSettings:
          type: object
          description: Settings for upgrading the agentpool.
          properties:
            maxSurge:
              type: string
              description: The maximum number or percentage of nodes that are surged during upgrade (e.g., "1" or "33%").
          example: example_value
      required:
      - name
  parameters:
    ResourceNameParameter:
      name: resourceName
      in: path
      required: true
      description: The name of the managed cluster resource.
      schema:
        type: string
        minLength: 1
        maxLength: 63
        pattern: ^[a-zA-Z0-9]$|^[a-zA-Z0-9][-_a-zA-Z0-9]{0,61}[a-zA-Z0-9]$
    SubscriptionIdParameter:
      name: subscriptionId
      in: path
      required: true
      description: The ID of the target subscription.
      schema:
        type: string
        format: uuid
    ResourceGroupNameParameter:
      name: resourceGroupName
      in: path
      required: true
      description: The name of the resource group.
      schema:
        type: string
        minLength: 1
        maxLength: 90
    ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: Client API version.
      schema:
        type: string
        default: '2024-02-01'
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
