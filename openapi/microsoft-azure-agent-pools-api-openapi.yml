swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Agent Pools API
  description: Operations for managing node pools within a cluster
schemes:
- https
tags:
- name: Agent Pools
  description: Operations for managing node pools within a cluster
