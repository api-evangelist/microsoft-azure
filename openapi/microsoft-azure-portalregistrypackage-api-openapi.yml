swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector PortalRegistryPackage API
schemes:
- https
tags:
- name: PortalRegistryPackage
paths:
  /providers/Microsoft.Solutions/portalRegistryPackage:
    post:
      tags:
      - PortalRegistryPackage
      operationId: microsoftAzurePortalregistrypackage
      description: Generates the registry package links for Managed Applications and Solution Templates.
      x-ms-examples:
        Generates a registry package:
          $ref: ./examples/portalRegistryPackage.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/RegistryPackagePlan'
        description: Request body parameters to get registry packages.
      responses:
        '200':
          description: Returns information about the registry package and generated links.
          schema:
            $ref: '#/definitions/RegistryPackage'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      summary: Microsoft Azure Post Providers Microsoft Solutions Portalregistrypackage
definitions:
  RegistryPackageLinks:
    type: object
    properties:
      createUiDefinitionLink:
        type: string
        description: The create ui definition link.
      deploymentTemplateLink:
        type: string
        description: The deployment template link.
    description: Resource information.
  RegistryPackagePlan:
    type: object
    properties:
      publisher:
        type: string
        description: The publisher ID.
      offer:
        type: string
        description: The offer Id.
      plan:
        type: string
        description: The plan Id.
      version:
        type: string
        description: The plan's version.
    required:
    - offer
    - publisher
    - plan
    description: Plan for the managed application.
  RegistryPackage:
    type: object
    properties:
      publisher:
        type: string
        description: The publisher
      offer:
        type: string
        description: The offer Id
      plan:
        type: string
        description: The plan Id
      version:
        type: string
        description: The version of the plan
      packageLinks:
        $ref: '#/definitions/RegistryPackageLinks'
        description: The registry package links.
    required:
    - offer
    - publisher
    - plan
    - packageLinks
    description: Information about an application definition request.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
