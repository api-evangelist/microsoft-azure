    - monthly
    x-ms-enum:
      name: datagrain
      modelAsString: true
      values:
      - value: daily
        description: Daily grain of data
        name: DailyGrain
      - value: monthly
        description: Monthly grain of data
        name: MonthlyGrain
  apiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Version of the API to be used with the client request. The current version is 2019-04-01-preview.
  reservationIdParameter:
    name: reservationId
    in: path
    description: Id of the reservation
    required: true
    type: string
    x-ms-parameter-location: method
  reservationOrderIdParameter:
    name: reservationOrderId
    in: path
    description: Order Id of the reservation
    required: true
    type: string
    x-ms-parameter-location: method
