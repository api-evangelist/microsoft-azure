swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ValidateOperationResults API
schemes:
- https
tags:
- name: ValidateOperationResults
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupValidateOperationResults/{operationId}
  : get:
      tags:
      - ValidateOperationResults
      description: Fetches the result of a triggered validate operation.
      operationId: microsoftAzureValidateoperationresultsGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/VaultName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: operationId
        in: path
        description: OperationID which represents the operation whose result needs to be fetched.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ValidateOperationsResponse'
        '202':
          description: Accepted
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        Get Operation Results of Validate Operation:
          $ref: ./examples/AzureIaasVm/ValidateOperationResults.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Backupvalidateoperationresults Operationid
