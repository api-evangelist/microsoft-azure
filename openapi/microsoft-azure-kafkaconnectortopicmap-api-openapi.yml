      kafkaConnectorRef:
        type: string
        description: The kafkaConnector CRD it refers to.
      partitionKeyProperty:
        type: string
        description: The partition to use for Kafka.
      partitionStrategy:
        type: string
        description: The partition strategy to use for Kafka.
        default: default
        enum:
        - default
