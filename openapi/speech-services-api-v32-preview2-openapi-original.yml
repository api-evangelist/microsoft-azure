          description: "A filtering expression for selecting a subset of the available hooks.\r\n            Supported properties: displayName, description, createdDateTime, lastActionDateTime, status and webUrl.\r\n            - Operators:\r\n              - eq, ne are supported for all properties.\r\n              - gt, ge, lt, le are supported for createdDateTime and lastActionDateTime.\r\n              - and, or, not are supported.\r\n            - Example:\r\n              filter=displayName eq 'test'"
          type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedWebHooks'
          headers:
            Retry-After:
              description: >-
                The minimum number of seconds to wait for a non terminal
                operation to complete.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all web hooks:
          $ref: ./examples/get_web_hooks.json
        Get all web hooks created in 03/2020 ordered by their name:
          $ref: ./examples/get_web_hooks_from_march_2020.json
      description: Needs a more full description created.
    post:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Creates A New Web Hook'
      description: >-
        If the property secret in the configuration is present and contains a
        non-empty string, it will be used to create a SHA256 hash of the payload
        with<br>the secret as HMAC key. This hash will be set as
        X-MicrosoftSpeechServices-Signature header when calling back into the
        registered URL.<br>            <br>When calling back into the registered
        URL, the request will contain a X-MicrosoftSpeechServices-Event header
        containing one of the registered event<br>types. There will be one
        request per registered event type.<br>            <br>After successfully
        registering the web hook, it will not be usable until a
        challenge/response is completed. To do this, a request with the event
        type<br>challenge will be made with a query parameter called
        validationToken. Respond to the challenge with a 200 OK containing the
        value of the validationToken<br>query parameter as the response body.
        When the challenge/response is successfully completed, the web hook will
        begin receiving events.
      operationId: microsoftAzureWebhooksCreate
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: webHook
          description: The details of the new web hook.
          required: true
          schema:
            $ref: '#/definitions/WebHook'
      responses:
        '201':
          description: >-
            The response contains information about the entity as payload and
            its location as header.
          schema:
            $ref: '#/definitions/WebHook'
          headers:
            Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Create a web hook:
          $ref: ./examples/create_web_hook.json
  /webhooks/{id}:
    get:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Gets The Web Hook Identified By The Given Id'
      operationId: microsoftAzureWebhooksGet
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The identifier of the web hook.
          required: true
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/WebHook'
          headers:
            Retry-After:
              description: >-
                The minimum number of seconds to wait for a non terminal
                operation to complete.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get a web hook:
          $ref: ./examples/get_web_hook.json
      description: Needs a more full description created.
    patch:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Updates The Web Hook Identified By The Given Id'
      description: >-
        If the property secret in the configuration is omitted or contains an
        empty string, future callbacks won't contain
        X-MicrosoftSpeechServices-Signature<br>headers. If the property contains
        a non-empty string, it will be used to create a SHA256 hash of the
        payload with the secret as HMAC key. This hash<br>will be set as
        X-MicrosoftSpeechServices-Signature header when calling back into the
        registered URL.<br>            <br>If the URL changes,  the web hook
        will stop receiving events until a<br>challenge/response is completed.
        To do this, a request with the event type challenge will be made with a
        query parameter called validationToken.<br>Respond to the challenge with
        a 200 OK containing the value of the validationToken query parameter as
        the response body. When the challenge/response<br>is successfully
        completed, the web hook will begin receiving events.
      operationId: microsoftAzureWebhooksUpdate
      consumes:
        - application/json
        - application/merge-patch+json
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The identifier of the web hook.
          required: true
          type: string
          format: uuid
        - in: body
          name: webHookUpdate
          description: The updated values for the web hook.
          required: true
          schema:
            $ref: '#/definitions/WebHookUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/WebHook'
          headers:
            Retry-After:
              description: >-
                The minimum number of seconds to wait for a non terminal
                operation to complete.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update a web hook:
          $ref: ./examples/update_web_hook.json
    delete:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Deletes The Web Hook Identified By The Given Id'
      operationId: microsoftAzureWebhooksDelete
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The identifier of the web hook.
          required: true
          type: string
          format: uuid
      responses:
        '204':
          description: The web hook was successfully deleted.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete a web hook:
          $ref: ./examples/delete_web_hook.json
      description: Needs a more full description created.
  /webhooks/{id}:ping:
    post:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Sends A Ping Event To The Registered Url'
      description: >-
        The request body of the POST request sent to the registered web hook URL
        is of the same shape as in the GET request for a specific hook.<br>The
        Swagger Schema ID of the model is WebHookV3.<br>            <br>The
        request will contain a X-MicrosoftSpeechServices-Event header with the
        value ping. If the web hook was registered with<br>a secret it will
        contain a X-MicrosoftSpeechServices-Signature header with an SHA256 hash
        of the payload with<br>the secret as HMAC key. The hash is base64
        encoded.
      operationId: microsoftAzureWebhooksPing
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The identifier of the web hook to ping.
          required: true
          type: string
          format: uuid
      responses:
        '202':
          description: Started trying to send a ping request to the web hook.
          headers:
            Retry-After:
              description: >-
                The minimum number of seconds to wait before accessing the
                resource created in this operation.
              type: integer
              format: int32
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Ping a web hook:
          $ref: ./examples/ping_web_hook.json
  /webhooks/{id}:test:
    post:
      tags:
        - 'Custom Speech web hooks:'
      summary: 'Microsoft Azure Sends A Request For Each Registered Event Type To The Registered Url'
      description: >-
        The payload will be generated from the last entity that would have
        invoked the web hook. If no entity is present for none of the registered
        event types,<br>the POST will respond with 204. If a test request can be
        made, it will respond with 200.<br>The request will contain a
        X-MicrosoftSpeechServices-Event header with the respective registered
        event type.<br>If the web hook was registered with a secret it will
        contain a X-MicrosoftSpeechServices-Signature header with an SHA256 hash
        of the payload with<br>the secret as HMAC key. The hash is base64
        encoded.
      operationId: microsoftAzureWebhooksTest
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          description: The identifier of the web hook to ping.
          required: true
          type: string
          format: uuid
      responses:
        '202':
          description: >-
            A test request with the last entity is sent to the registered web
            hook.
          headers:
            Retry-After:
              description: >-
                The minimum number of seconds to wait before accessing the
                resource created in this operation.
              type: integer
              format: int32
        '204':
          description: >-
            No entity could be found for any event type, so no test request is
            sent to the registered web hook.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Test a web hook:
          $ref: ./examples/test_web_hook.json
  /healthstatus:
    get:
      tags:
        - 'Service Health:'
      summary: >-
        Microsoft Azure Returns The Overall Health Of The Service And Optionally Of The Different Subcomponents
      operationId: microsoftAzureServicehealthGet
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ServiceHealth'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Gets the health status:
          $ref: examples/get_healthstatus.json
      description: Needs a more full description created.
