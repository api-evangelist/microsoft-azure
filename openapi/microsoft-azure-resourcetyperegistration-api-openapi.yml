        - AddOn
        - Bypass
        - Store
        type: string
      swaggerSpecifications:
        type: array
        items:
          $ref: '#/definitions/SwaggerSpecification'
      allowedUnauthorizedActions:
        type: array
        items:
          type: string
      authorizationActionMappings:
        type: array
        items:
          $ref: '#/definitions/AuthorizationActionMapping'
      linkedAccessChecks:
        type: array
        items:
          $ref: '#/definitions/LinkedAccessCheck'
      defaultApiVersion:
        type: string
      loggingRules:
        type: array
        items:
          $ref: '#/definitions/LoggingRule'
      throttlingRules:
        type: array
        items:
          $ref: '#/definitions/ThrottlingRule'
      requiredFeatures:
        type: array
        items:
          type: string
      featuresRule:
        allOf:
        - $ref: '#/definitions/FeaturesRule'
      enableAsyncOperation:
        type: boolean
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The provisioned state of the resource.
      enableThirdPartyS2S:
        type: boolean
      subscriptionLifecycleNotificationSpecifications:
        allOf:
        - $ref: '#/definitions/SubscriptionLifecycleNotificationSpecifications'
      isPureProxy:
        type: boolean
      identityManagement:
        allOf:
        - $ref: '#/definitions/IdentityManagementProperties'
      checkNameAvailabilitySpecifications:
        allOf:
        - $ref: '#/definitions/CheckNameAvailabilitySpecifications'
      disallowedActionVerbs:
        type: array
        items:
          type: string
      serviceTreeInfos:
        type: array
        items:
          $ref: '#/definitions/ServiceTreeInfo'
      requestHeaderOptions:
        allOf:
        - $ref: '#/definitions/RequestHeaderOptions'
      subscriptionStateRules:
        type: array
        items:
          $ref: '#/definitions/SubscriptionStateRule'
      templateDeploymentOptions:
        allOf:
        - $ref: '#/definitions/TemplateDeploymentOptions'
      extendedLocations:
        type: array
        items:
          $ref: '#/definitions/ExtendedLocationOptions'
      resourceMovePolicy:
        allOf:
        - $ref: '#/definitions/ResourceMovePolicy'
      resourceDeletionPolicy:
        enum:
        - NotSpecified
        - CascadeDeleteAll
        - CascadeDeleteProxyOnlyChildren
        type: string
        x-ms-enum:
          name: ResourceDeletionPolicy
          modelAsString: true
      resourceConcurrencyControlOptions:
        type: object
        additionalProperties:
          $ref: '#/definitions/ResourceConcurrencyControlOption'
      resourceGraphConfiguration:
        allOf:
        - $ref: '#/definitions/ResourceGraphConfiguration'
      management:
        allOf:
        - $ref: '#/definitions/ResourceProviderManagement'
      openApiConfiguration:
        $ref: '#/definitions/OpenApiConfiguration'
  ServiceTreeInfo:
    type: object
    properties:
      serviceId:
        type: string
      componentId:
        type: string
      readiness:
        enum:
        - ClosingDown
        - Deprecated
        - GA
        - InDevelopment
        - InternalOnly
        - PrivatePreview
        - PublicPreview
        - RemovedFromARM
        - Retired
        type: string
        x-ms-enum:
          name: Readiness
          modelAsString: true
  LoggingRule:
    required:
    - action
    - detailLevel
    - direction
    type: object
    properties:
      action:
        type: string
      direction:
        enum:
        - None
        - Request
        - Response
        type: string
        x-ms-enum:
          name: LoggingDirections
          modelAsString: true
      detailLevel:
        enum:
        - None
        - Body
        type: string
        x-ms-enum:
          name: LoggingDetails
          modelAsString: true
      hiddenPropertyPaths:
        allOf:
        - $ref: '#/definitions/LoggingHiddenPropertyPath'
  ResourceMovePolicy:
    type: object
    properties:
      validationRequired:
        type: boolean
      crossResourceGroupMoveEnabled:
        type: boolean
      crossSubscriptionMoveEnabled:
        type: boolean
  AuthorizationActionMapping:
    type: object
    properties:
      original:
        type: string
      desired:
