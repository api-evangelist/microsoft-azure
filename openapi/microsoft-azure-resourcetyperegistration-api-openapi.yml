definitions:
  SubscriptionStateOverrideAction:
    required:
    - action
    - state
    type: object
    properties:
      state:
        enum:
        - Registered
        - Unregistered
        - Warned
        - Suspended
        - Deleted
        - WarnedToRegistered
        - WarnedToSuspended
        - WarnedToDeleted
        - WarnedToUnregistered
        - SuspendedToRegistered
        - SuspendedToWarned
        - SuspendedToDeleted
        - SuspendedToUnregistered
        type: string
        x-ms-enum:
          name: SubscriptionTransitioningState
          modelAsString: true
      action:
        enum:
        - NotDefined
        - DeleteAllResources
        - SoftDeleteAllResources
        - NoOp
        - BillingCancellation
        - UndoSoftDelete
        type: string
        x-ms-enum:
          name: SubscriptionNotificationOperation
          modelAsString: true
  ResourceConcurrencyControlOption:
    type: object
    properties:
      policy:
        enum:
        - NotSpecified
        - SynchronizeBeginExtension
        type: string
        x-ms-enum:
          name: Policy
          modelAsString: true
  ExtendedLocationOptions:
    type: object
    properties:
      type:
        type: string
      supportedPolicy:
        type: string
  ResourceTypeRegistration:
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ProxyResource
    properties:
      properties:
        allOf:
        - $ref: '#/definitions/ResourceTypeRegistrationProperties'
      systemData:
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/systemData
        readOnly: true
    x-ms-azure-resource: true
  ResourceTypeEndpoint:
    type: object
    properties:
      enabled:
        type: boolean
      apiVersions:
        type: array
        items:
          type: string
      locations:
        type: array
        items:
          type: string
      requiredFeatures:
        type: array
        items:
          type: string
      featuresRule:
        allOf:
        - $ref: '#/definitions/FeaturesRule'
      extensions:
        type: array
        items:
          $ref: '#/definitions/ResourceTypeExtension'
      timeout:
        format: duration
        type: string
      endpointType:
        enum:
        - NotSpecified
        - Canary
        - Production
        - TestInProduction
        type: string
        x-ms-enum:
          name: EndpointType
          modelAsString: true
  ThrottlingMetric:
    required:
    - limit
    - type
    type: object
    properties:
      type:
        enum:
        - NotSpecified
        - NumberOfRequests
        - NumberOfResources
        type: string
        x-ms-enum:
          name: ThrottlingMetricType
          modelAsString: true
      limit:
        format: int64
        type: integer
      interval:
        format: duration
        type: string
  ResourceTypeExtension:
    type: object
    properties:
      endpointUri:
        type: string
      extensionCategories:
        type: array
        items:
          enum:
          - NotSpecified
          - ResourceCreationValidate
          - ResourceCreationBegin
          - ResourceCreationCompleted
          - ResourceReadValidate
          - ResourceReadBegin
          - ResourcePatchValidate
          - ResourcePatchCompleted
          - ResourceDeletionValidate
          - ResourceDeletionBegin
          - ResourceDeletionCompleted
          - ResourcePostAction
          - SubscriptionLifecycleNotification
          - ResourcePatchBegin
          - ResourceMoveBegin
          - ResourceMoveCompleted
          type: string
          x-ms-enum:
            name: ExtensionCategory
            modelAsString: true
      timeout:
        format: duration
        type: string
  IdentityManagementProperties:
    type: object
    properties:
      type:
        enum:
        - NotSpecified
        - SystemAssigned
        - UserAssigned
        - Actor
        - DelegatedResourceIdentity
        type: string
        x-ms-enum:
          name: IdentityManagementTypes
          modelAsString: true
      applicationId:
        type: string
  CheckNameAvailabilitySpecifications:
    type: object
    properties:
      enableDefaultValidation:
        type: boolean
      resourceTypesWithCustomValidation:
        type: array
