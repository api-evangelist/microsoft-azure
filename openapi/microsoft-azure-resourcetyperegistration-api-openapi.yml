          $ref: '#/definitions/ThrottlingMetric'
      requiredFeatures:
        type: array
        items:
          type: string
  ExtensionOptions:
    type: object
    properties:
      request:
        type: array
        items:
          enum:
          - NotSpecified
          - DoNotMergeExistingReadOnlyAndSecretProperties
          - IncludeInternalMetadata
          type: string
          x-ms-enum:
            name: ExtensionOptionType
            modelAsString: true
      response:
        type: array
        items:
          enum:
          - NotSpecified
          - DoNotMergeExistingReadOnlyAndSecretProperties
          - IncludeInternalMetadata
          type: string
          x-ms-enum:
            name: ExtensionOptionType
            modelAsString: true
  RequestHeaderOptions:
    type: object
    properties:
      optInHeaders:
        enum:
        - NotSpecified
        - SignedUserToken
        - ClientGroupMembership
        - SignedAuxiliaryTokens
        - UnboundedClientGroupMembership
        type: string
        x-ms-enum:
          name: OptInHeaderType
          modelAsString: true
  ResourceTypeExtensionOptions:
    type: object
    properties:
      resourceCreationBegin:
        allOf:
        - $ref: '#/definitions/ExtensionOptions'
  OpenApiConfiguration:
    type: object
    properties:
      validation:
        $ref: '#/definitions/OpenApiValidation'
  FeaturesRule:
    required:
    - requiredFeaturesPolicy
    type: object
    properties:
      requiredFeaturesPolicy:
        enum:
        - Any
        - All
        type: string
        x-ms-enum:
          name: FeaturesPolicy
          modelAsString: true
  ResourceGraphConfiguration:
    type: object
    properties:
      enabled:
        type: boolean
      apiVersion:
        type: string
  ResourceTypeRegistrationProperties:
    type: object
    properties:
      routingType:
        enum:
        - Default
        - ProxyOnly
        - HostBased
        - Extension
        - Tenant
        - Fanout
        - LocationBased
        - Failover
        - CascadeExtension
        type: string
        x-ms-enum:
          name: RoutingType
          modelAsString: true
      regionality:
        enum:
        - NotSpecified
        - Global
        - Regional
        type: string
        x-ms-enum:
          name: Regionality
          modelAsString: true
      endpoints:
        type: array
        items:
          $ref: '#/definitions/ResourceTypeEndpoint'
      extensionOptions:
        allOf:
