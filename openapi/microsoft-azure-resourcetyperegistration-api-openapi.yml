            modelAsString: true
  LoggingHiddenPropertyPath:
    type: object
    properties:
      hiddenPathsOnRequest:
        type: array
        items:
          type: string
      hiddenPathsOnResponse:
        type: array
        items:
          type: string
  SwaggerSpecification:
    type: object
    properties:
