        '200':
          description: Successfully updated the resource type.
          schema:
            $ref: '#/definitions/ResourceTypeRegistration'
        '201':
          description: Successfully created the resource type.
          schema:
            $ref: '#/definitions/ResourceTypeRegistration'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      summary: Microsoft Azure Put Subscriptions Subscriptionid Providers Microsoft Providerhub Providerregistrations Providernamespace Resourcetyperegistrations Resourcetype
    delete:
