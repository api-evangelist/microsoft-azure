definitions:
  RootCauseAnalysisDataPartition:
    required:
    - data
    - partitionId
    - timestamp
    type: object
    properties:
      partitionId:
        format: uuid
        description: Root cause analysis data partition unique ID
        type: string
      timestamp:
        format: date-time
        description: Root cause analysis date time of the data (UTC)
        type: string
      data:
        description: Root cause data detail, the first few columns should be the dimension value. the last few columns should be the measure values
        type: array
        items:
          type: array
          items:
            type: object
  ErrorDetail:
    type: object
    properties:
      message:
        description: Human-readable error message
        type: string
      code:
        description: Error code
        type: string
  CreateRootCauseAnalysisDataSet:
    required:
    - displayName
    - kind
    type: object
    properties:
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      displayName:
        description: Root cause analysis data set name
        type: string
    discriminator: kind
    example:
      granularity: daily
      customInterval: 1
      dimensionKeys:
      - Region
      - Platform
      aggregatedIdentifier: __AGG__
      measures:
      - displayName: Failure Rate
      - displayName: Error Count
      - displayName: Total Count
      displayName: Sample Multidimensional Root Cause Analysis Dataset Name
      kind: multidimensional
  RootCauseAnalysisDataSet:
    required:
    - dataSetId
    - displayName
    - kind
    type: object
    properties:
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      dataSetId:
        format: uuid
        description: Root cause analysis data set unique ID
        type: string
      displayName:
        description: Root cause analysis data set name
        type: string
    discriminator: kind
  RootCauseAnalysisDataMetaListResponse:
    required:
    - value
    type: object
    properties:
      nextLink:
        description: Link of next page, only provided when there are next pages
        type: string
      value:
        description: Response values
        type: array
        items:
          $ref: '#/definitions/RootCauseAnalysisDataMeta'
  RootCauseAnalysisUploadDataPartitionRequest:
    required:
    - data
    - kind
    type: object
    properties:
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      data:
        description: Root cause data detail, the first few columns should be the dimension value. the last few columns should be the measure values. For the value doesn't exist, use null to define it.
        type: array
        items:
          type: array
          items:
            type: object
    example:
      kind: multidimensional
      data:
      - - West US
        - Win
        - 0.003860125003556626
        - 407
        - 105437
  RootCauseAnalysisDataMeta:
    required:
    - lastModifiedDateTime
    - partitionId
    - rowCount
    - timestamp
    type: object
    properties:
      partitionId:
        format: uuid
        description: Root cause analysis partition ID
        type: string
      rowCount:
        format: int32
        description: Root cause analysis data row count in the partition ID
        type: integer
      timestamp:
        format: date-time
        description: Root cause date time of the data (UTC)
        type: string
      lastModifiedDateTime:
        format: date-time
        description: Root cause data last updated time (UTC)
        type: string
  RootCauseAnalysisDataSetList:
    required:
    - value
    type: object
    properties:
      nextLink:
        description: Link of next page, only provided when there are next pages
        type: string
      value:
        description: Response values
        type: array
        items:
          $ref: '#/definitions/RootCauseAnalysisDataSet'
  RootCauseAnalysisUploadDataBlockRequest:
    required:
    - kind
    - value
    type: object
    properties:
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
