definitions:
  ApnsCredential:
    description: Description of a NotificationHub ApnsCredential.
    required:
    - properties
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ApnsCredentialProperties'
    x-ms-secret: true
  ResourceListKeys:
    description: Response for the POST request that returns Namespace or NotificationHub access keys (connection strings).
    type: object
    properties:
      primaryConnectionString:
        description: Gets or sets primaryConnectionString of the AuthorizationRule.
        type: string
        readOnly: true
        x-ms-secret: true
      secondaryConnectionString:
        description: "Gets or sets secondaryConnectionString of the created\r\nAuthorizationRule"
        type: string
        readOnly: true
        x-ms-secret: true
      primaryKey:
        description: Gets or sets primaryKey of the created AuthorizationRule.
        type: string
        readOnly: true
        x-ms-secret: true
      secondaryKey:
        description: Gets or sets secondaryKey of the created AuthorizationRule
        type: string
        readOnly: true
        x-ms-secret: true
      keyName:
        description: Gets or sets keyName of the created AuthorizationRule
        type: string
        readOnly: true
  Hub:
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/HubPropertiesFormat'
    allOf:
    - $ref: '#/definitions/Resource'
    description: Hub resource.
  HubBillingInfoFormat:
    properties:
      skuName:
        type: string
        description: The sku name.
      minUnits:
        type: integer
        minimum: 1
        maximum: 10
        description: The minimum number of units will be billed. One unit is 10,000 Profiles and 100,000 Interactions.
      maxUnits:
        type: integer
        minimum: 1
        maximum: 10
        description: The maximum number of units can be used.  One unit is 10,000 Profiles and 100,000 Interactions.
    description: Hub billing info.
  PnsCredentials:
    description: Collection of Notification Hub or Notification Hub Namespace PNS credentials.
    type: object
    properties:
      admCredential:
        $ref: '#/definitions/AdmCredential'
      apnsCredential:
        $ref: '#/definitions/ApnsCredential'
      baiduCredential:
        $ref: '#/definitions/BaiduCredential'
      browserCredential:
        $ref: '#/definitions/BrowserCredential'
      gcmCredential:
        $ref: '#/definitions/GcmCredential'
      mpnsCredential:
        $ref: '#/definitions/MpnsCredential'
      wnsCredential:
