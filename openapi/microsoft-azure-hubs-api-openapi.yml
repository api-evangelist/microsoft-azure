          $ref: ./examples/HubsCreateOrUpdate.json
      description: Creates a hub, or updates an existing hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the Hub.
        pattern: ^[a-zA-Z][a-zA-Z0-9]+$
        minLength: 1
        maxLength: 64
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/Hub'
        description: Parameters supplied to the CreateOrUpdate Hub operation.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. An existing hub is updated.
          schema:
            $ref: '#/definitions/Hub'
        '201':
          description: Created. A new hub is created.
          schema:
            $ref: '#/definitions/Hub'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname
    patch:
      tags:
      - Hubs
      operationId: microsoftAzureHubsUpdate
      x-ms-examples:
        Hubs_Update:
          $ref: ./examples/HubsUpdate.json
