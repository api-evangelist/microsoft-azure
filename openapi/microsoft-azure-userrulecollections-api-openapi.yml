        description: The User Rule Collection to create or update
      responses:
        '200':
          description: Updated User Rule Collection
          schema:
            $ref: '#/definitions/UserRuleCollection'
        '201':
          description: Created User Rule Collection
          schema:
            $ref: '#/definitions/UserRuleCollection'
        default:
