definitions:
  DeviceGroupProperties:
    type: object
    description: The properties of deviceGroup
    properties:
      description:
        type: string
        description: Description of the device group.
      osFeedType:
        $ref: '#/definitions/OSFeedType'
        description: Operating system feed type of the device group.
      updatePolicy:
        $ref: '#/definitions/UpdatePolicy'
        description: Update policy of the device group.
      allowCrashDumpsCollection:
        $ref: '#/definitions/AllowCrashDumpCollection'
        description: Flag to define if the user allows for crash dump collection.
      regionalDataBoundary:
        $ref: '#/definitions/RegionalDataBoundary'
        description: Regional data boundary for the device group.
      hasDeployment:
        type: boolean
        description: Deployment status for the device group.
        readOnly: true
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
        readOnly: true
  ErrorDetails:
    description: The detail information of the error.
    type: object
    properties:
      code:
        type: string
        description: Error code.
      message:
        type: string
        description: Error message details.
      requestId:
        type: string
        description: Correlation Id for current request.
      time:
        type: string
        format: date-time-rfc1123
        description: The time that error request failed.
    required:
    - code
    - message
  ClaimDevicesRequest:
    type: object
    description: Request to the action call to bulk claim devices.
    properties:
      deviceIdentifiers:
        type: array
        description: Device identifiers of the devices to be claimed.
        items:
          type: string
    required:
    - deviceIdentifiers
  DeviceGroup:
    description: The device group definition.
    type: object
    properties:
      id:
        description: Unique ID of the device group.
        type: string
        readOnly: true
      displayName:
        description: Display name of the device group.
        type: string
      filter:
        description: Query defining which devices should be in this group, [Query Language Reference](https://aka.ms/iotcquery).
        type: string
      description:
        description: Short summary of device group.
        type: string
      etag:
        description: ETag used to prevent conflict in device group updates.
        type: string
      organizations:
        description: List of organization IDs of the device group, only one organization is supported today, multiple organizations will be supported soon.
        type: array
        items:
          type: string
    required:
    - displayName
    - filter
  DeviceGroupCollection:
    description: The paged results of device groups.
    type: object
    properties:
      value:
        description: The collection of device groups.
        type: array
        items:
          $ref: '#/definitions/DeviceGroup'
      nextLink:
        description: URL to get the next page of device groups.
        type: string
    required:
    - value
  OSFeedType:
    type: string
    description: OS feed type values.
    enum:
    - Retail
    - RetailEval
    x-ms-enum:
      name: OSFeedType
      modelAsString: true
      values:
      - name: Retail
        value: Retail
        description: Retail OS feed type.
      - name: RetailEval
        value: RetailEval
        description: Retail evaluation OS feed type.
  AllowCrashDumpCollection:
    type: string
    description: Allow crash dumps values.
    enum:
    - Enabled
    - Disabled
    x-ms-enum:
      name: AllowCrashDumpCollection
      modelAsString: true
      values:
      - name: Enabled
        value: Enabled
        description: Crash dump collection enabled
      - name: Disabled
        value: Disabled
        description: Crash dump collection disabled
  Device:
    description: The device definition.
    type: object
    properties:
      id:
        description: Unique ID of the device.
        type: string
        readOnly: true
      etag:
        description: ETag used to prevent conflict in device updates.
        type: string
      displayName:
        description: Display name of the device.
        type: string
      template:
        description: The device template definition for the device.
        type: string
      enabled:
        description: Whether the device connection to IoT Central has been enabled.
        type: boolean
      provisioned:
        description: Whether resources have been allocated for the device.
        type: boolean
        readOnly: true
      simulated:
        description: Whether the device is simulated.
        type: boolean
      organizations:
        description: List of organization IDs that the device is a part of, only one organization is supported today, multiple organizations will be supported soon.
        type: array
        items:
          type: string
      type:
        description: The type of the device.
        type: array
        items:
          type: string
          enum:
          - iotEdge
          x-ms-enum:
            name: DeviceType
            modelAsString: true
            values:
            - value: iotEdge
              name: IotEdge
              description: The edge device type
      deploymentManifest:
        description: The deployment manifest assigned to the device.
        $ref: '#/definitions/DeploymentManifest'
  DeploymentManifest:
    description: The deployment manifest used for edge devices.
    type: object
    properties:
      id:
        description: Unique ID of the deployment manifest.
        type: string
        readOnly: true
      displayName:
        description: Display name of the deployment manifest.
        type: string
        minLength: 1
      data:
        description: Content of the the deployment manifest.
        type: object
      etag:
        description: Etag to prevent conflict when updating the deployment manifest.
        type: string
      organizations:
        description: The organization that deployment manifest belongs to. If not present, the deployment manifest is root-level or personal. Only one organization is supported today, multiple organizations will be supported soon.
        type: array
        items:
          type: string
        maxItems: 1
        minItems: 1
    required:
    - data
  Error:
    description: The response error definition.
    type: object
    properties:
      error:
        description: Error details for current request.
        $ref: '#/definitions/ErrorDetails'
    required:
    - error
  RegionalDataBoundary:
    type: string
    description: Regional data boundary values.
    enum:
    - None
    - EU
    x-ms-enum:
      name: RegionalDataBoundary
      modelAsString: true
      values:
