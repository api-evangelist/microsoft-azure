        nextLinkName: nextLink
      x-ms-examples:
        HypervSites_ListByResourceGroup_MaximumSet_Gen:
          $ref: ./examples/HypervSites_ListByResourceGroup_MaximumSet_Gen.json
definitions:
  HypervSiteListResult:
