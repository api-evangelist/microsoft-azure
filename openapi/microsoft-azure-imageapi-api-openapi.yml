  /projects/{projectId}/images/urls:
    post:
      tags:
      - ImageApi
      summary: Microsoft Azure Add The Provided Images Urls To The Set Of Training Images
      description: This API accepts a batch of urls, and optionally tags, to create images. There is a limit of 64 images and 20 tags.<br>If all images are successful created, 200(OK) status code will be returned.<br>Otherwise, 207 (Multi-Status) status code will be returned and detail status for each image will be listed in the response payload.
      operationId: microsoftAzureCreateimagesfromurls
      consumes:
      - application/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: batch
        in: body
        description: Image urls, tag ids, and metadata. Limited to 64 images and 20 tags per batch.
        required: true
        schema:
          $ref: '#/definitions/ImageUrlCreateBatch'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ImageCreateSummary'
        '207':
          description: '207'
          schema:
            $ref: '#/definitions/ImageCreateSummary'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful CreateImagesFromUrls request:
          $ref: ./examples/CreateImagesFromUrls.json
