  /projects/{projectId}/images/untagged/count:
    get:
      tags:
      - ImageApi
      summary: Microsoft Azure Gets The Number Of Untagged Images
      description: This API returns the images which have no tags for a given project and optionally an iteration. If no iteration is specified the<br>current workspace is used.
      operationId: microsoftAzureGetuntaggedimagecount
      consumes: []
      produces:
      - application/json
      - application/xml
      - text/xml
      parameters:
      - name: projectId
        in: path
        description: The project id.
        required: true
        type: string
        format: uuid
        x-nullable: false
      - name: iterationId
        in: query
        description: The iteration id. Defaults to workspace.
        required: false
