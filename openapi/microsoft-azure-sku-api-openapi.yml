swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Sku API
schemes:
- https
tags:
- name: Sku
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Blockchain/skus:
    get:
      tags:
      - Sku
      description: Lists the Skus of the resource type.
      operationId: microsoftAzureSkusList
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ResourceTypeSkuCollection'
      x-ms-examples:
        Skus_List:
          $ref: ./examples/Skus_List.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Blockchain Skus
  /subscriptions/{subscriptionId}/providers/Microsoft.DevOpsInfrastructure/locations/{locationName}/skus:
    get:
      operationId: microsoftAzureSkuListbylocation
      tags:
      - Sku
      description: List ResourceSku resources by subscription ID
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - name: locationName
        in: path
        description: Name of the location.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9-.]*$
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/ResourceSkuListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Sku_ListByLocation:
          $ref: ./examples/Sku_ListByLocation.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Devopsinfrastructure Locations Locationname Skus
definitions:
  ResourceSku:
    type: object
    description: A ResourceSku
    properties:
      properties:
        $ref: '#/definitions/ResourceSkuProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
  ResourceTypeSku:
    description: Resource type Sku.
    type: object
    properties:
      resourceType:
        description: Gets or sets the resource type
        type: string
      skus:
        description: Gets or sets the Skus
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/SkuSetting'
        x-ms-identifiers:
        - name
  ResourceSkuLocationInfo:
    type: object
    description: Describes an available Compute SKU Location Information.
    properties:
      location:
        type: string
        description: Location of the SKU
      zones:
        type: array
        description: List of availability zones where the SKU is supported.
        items:
          type: string
      zoneDetails:
        type: array
        description: Gets details of capabilities available to a SKU in specific zones.
        items:
          $ref: '#/definitions/ResourceSkuZoneDetails'
        x-ms-identifiers: []
    required:
    - location
    - zones
    - zoneDetails
  SkuSetting:
    description: Sku Setting.
    type: object
    properties:
      name:
        description: Gets or sets the Sku name.
        type: string
      tier:
        description: Gets or sets the Sku tier.
        type: string
      locations:
        description: Gets or sets the locations.
        uniqueItems: false
        type: array
        items:
          type: string
      requiredFeatures:
        description: Gets or sets the required features.
        uniqueItems: false
        type: array
        items:
          type: string
  ResourceSkuCapabilities:
    type: object
    description: Describes The SKU capabilities object.
    properties:
      name:
        type: string
        description: The name of the SKU capability.
      value:
        type: string
        description: The value of the SKU capability.
    required:
    - name
    - value
  ResourceSkuRestrictions:
    type: object
    description: The restrictions of the SKU.
    properties:
      type:
        $ref: '#/definitions/ResourceSkuRestrictionsType'
        description: the type of restrictions.
      values:
        type: array
        description: The value of restrictions. If the restriction type is set to location. This would be different locations where the SKU is restricted.
        items:
          type: string
      restrictionInfo:
        $ref: '#/definitions/ResourceSkuRestrictionInfo'
        description: The information about the restriction where the SKU cannot be used.
      reasonCode:
        $ref: '#/definitions/ResourceSkuRestrictionsReasonCode'
        description: the reason for restriction.
    required:
    - values
    - restrictionInfo
  ResourceSkuListResult:
    type: object
    description: The response of a ResourceSku list operation.
    properties:
      value:
        type: array
        description: The ResourceSku items on this page
        items:
          $ref: '#/definitions/ResourceSku'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  ResourceTypeSkuCollection:
    description: Collection of the resource type Sku.
    type: object
    properties:
      value:
        description: Gets or sets the collection of resource type Sku.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/ResourceTypeSku'
        x-ms-identifiers:
        - resourceType
  ResourceSkuRestrictionInfo:
    type: object
    description: Describes an available Compute SKU Restriction Information.
    properties:
      locations:
        type: array
        description: Locations where the SKU is restricted
        items:
          type: string
      zones:
        type: array
        description: List of availability zones where the SKU is restricted.
        items:
          type: string
  ResourceSkuZoneDetails:
    type: object
    description: Describes The zonal capabilities of a SKU.
    properties:
      name:
        type: array
        description: Gets the set of zones that the SKU is available in with the specified capabilities.
        items:
          type: string
      capabilities:
        type: array
        description: A list of capabilities that are available for the SKU in the specified list of zones.
        items:
          $ref: '#/definitions/ResourceSkuCapabilities'
        x-ms-identifiers: []
    required:
    - name
    - capabilities
  ResourceSkuRestrictionsReasonCode:
    type: string
    enum:
    - QuotaId
    - NotAvailableForSubscription
    x-ms-enum:
      name: ResourceSkuRestrictionsReasonCode
      modelAsString: true
  ResourceSkuRestrictionsType:
    type: string
    enum:
    - Location
    - Zone
    x-ms-enum:
      name: ResourceSkuRestrictionsType
      modelAsString: true
  ResourceSkuProperties:
    type: object
    description: Properties of a ResourceSku
    properties:
      resourceType:
        type: string
        description: The type of resource the SKU applies to.
      tier:
        type: string
        description: The tier of virtual machines in a scale set
      size:
        type: string
        description: The size of the SKU.
      family:
        type: string
        description: The family of the SKU.
      locations:
        type: array
        description: The set of locations that the SKU is available.
        items:
          type: string
      locationInfo:
        type: array
        description: A list of locations and availability zones in those locations where the SKU is available
        items:
          $ref: '#/definitions/ResourceSkuLocationInfo'
        x-ms-identifiers: []
      capabilities:
        type: array
        description: Name value pairs to describe the capability.
        items:
          $ref: '#/definitions/ResourceSkuCapabilities'
        x-ms-identifiers: []
      restrictions:
        type: array
        description: The restrictions of the SKU.
        items:
          $ref: '#/definitions/ResourceSkuRestrictions'
        x-ms-identifiers: []
    required:
    - resourceType
    - tier
    - size
    - family
    - locations
    - locationInfo
    - capabilities
    - restrictions
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    description: Client API Version.
    required: true
    type: string
    enum:
    - 2018-06-01-preview
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Gets the subscription Id which uniquely identifies the Microsoft Azure subscription. The subscription ID is part of the URI for every service call.
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
