definitions:
  AvsAssessmentProperties:
    type: object
    description: Properties of the AVS assessment.
    properties:
      assessmentErrorSummary:
        type: object
        description: "Gets the assessment error summary.\n            This is the number of machines\naffected by each type of error in this assessment."
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      failuresToTolerateAndRaidLevel:
        $ref: '#/definitions/FttAndRaidLevel'
        description: Failures to tolerate and RAID level in a common property.
      vcpuOversubscription:
        type: number
        format: float
        description: VCPU over subscription.
      nodeType:
        $ref: '#/definitions/AzureAvsNodeType'
        description: AVS node type.
      reservedInstance:
        $ref: '#/definitions/AzureReservedInstance'
        description: Reserved instance.
      totalMonthlyCost:
        type: number
        format: float
        description: Total monthly cost.
        readOnly: true
      suitability:
        $ref: '#/definitions/CloudSuitability'
        description: Gets or sets the Assessment cloud suitability.
        readOnly: true
      suitabilityExplanation:
        $ref: '#/definitions/AzureAvsSuitabilityExplanation'
        description: Gets or sets the Assessment suitability explanation.
        readOnly: true
      numberOfNodes:
        type: integer
        format: int32
        description: Recommended number of nodes.
        readOnly: true
      cpuUtilization:
        type: number
        format: float
        description: Predicted CPU utilization.
        readOnly: true
      ramUtilization:
        type: number
        format: float
        description: Predicted RAM utilization.
        readOnly: true
      storageUtilization:
        type: number
        format: float
        description: Predicted storage utilization.
        readOnly: true
      totalCpuCores:
        type: number
        format: float
        description: Predicted total CPU cores used.
        readOnly: true
      totalRamInGB:
        type: number
        format: float
        description: Predicted total RAM used in GB.
        readOnly: true
      totalStorageInGB:
        type: number
        format: float
        description: Predicted total Storage used in GB.
        readOnly: true
      numberOfMachines:
        type: integer
        format: int32
        description: Number of machines part of the assessment.
        readOnly: true
      suitabilitySummary:
        type: object
        description: Cloud suitability summary for all the machines in the assessment.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      memOvercommit:
        type: number
        format: float
        description: Memory overcommit.
      dedupeCompression:
        type: number
        format: float
        description: De-duplication compression.
      limitingFactor:
        type: string
        description: Limiting factor.
        readOnly: true
      isStretchClusterEnabled:
        type: boolean
        description: Is Stretch Cluster Enabled.
      groupType:
        $ref: '#/definitions/GroupType'
        description: Gets the group type for the assessment.
        readOnly: true
      assessmentType:
        $ref: '#/definitions/AssessmentType'
        description: Assessment type of the assessment.
        readOnly: true
      azureLocation:
        $ref: '#/definitions/AzureLocation'
        description: Azure Location or Azure region where to which the machines will be migrated.
      azureOfferCode:
        $ref: '#/definitions/AzureOfferCode'
        description: Azure Offer code according to which cost estimation is done.
      currency:
        $ref: '#/definitions/AzureCurrency'
        description: Currency in which prices should be reported.
      scalingFactor:
        type: number
        format: float
        description: 'Percentage of buffer that user wants on performance metrics when recommending

          Azure sizes.'
      percentile:
        $ref: '#/definitions/Percentile'
        description: 'Percentile of the utilization data values to be considered while assessing

          machines.'
      timeRange:
        $ref: '#/definitions/TimeRange'
        description: 'Time Range for which the historic utilization data should be considered for

          assessment.'
      perfDataStartTime:
        type: string
        format: date-time
        description: Gets or sets the start time to consider performance data for assessment.
      perfDataEndTime:
        type: string
        format: date-time
        description: Gets or sets the end time to consider performance data for assessment.
      stage:
        $ref: '#/definitions/AssessmentStage'
        description: User configurable setting to display the Stage of Assessment.
        readOnly: true
      discountPercentage:
        type: number
        format: float
        description: Custom discount percentage.
      sizingCriterion:
        $ref: '#/definitions/AssessmentSizingCriterion'
        description: Assessment sizing criterion.
      confidenceRatingInPercentage:
        type: number
        format: float
        description: Confidence Rating in Percentage.
        readOnly: true
      pricesTimestamp:
        type: string
        format: date-time
        description: 'Time when the Azure Prices were queried. Date-Time represented in ISO-8601

          format.'
        readOnly: true
      createdTimestamp:
        type: string
        format: date-time
        description: Date and Time when assessment was created.
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: Date and Time when assessment was last updated.
        readOnly: true
      status:
        $ref: '#/definitions/AssessmentStatus'
        description: Whether assessment is in valid state and all machines have been assessed.
        readOnly: true
      schemaVersion:
        type: string
        description: Schema version.
        readOnly: true
    allOf:
    - $ref: '#/definitions/AzureResourceProperties'
  AzureAvsNodeType:
