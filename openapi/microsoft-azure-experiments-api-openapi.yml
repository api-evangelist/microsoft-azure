swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Experiments API
  description: The configuration of the Network Experiment experiments
schemes:
- https
tags:
- name: Experiments
  description: The configuration of the Network Experiment experiments
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/NetworkExperimentProfiles/{profileName}/Experiments
  : get:
      tags:
      - Experiments
      summary: Microsoft Azure Gets A List Of Experiments
      operationId: microsoftAzureExperimentsListbyprofile
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/ExperimentList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Gets a list of Experiments:
          $ref: ./examples/NetworkExperimentListExperiments.json
      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/NetworkExperimentProfiles/{profileName}/Experiments/{experimentName}
  : get:
      tags:
      - Experiments
      summary: Microsoft Azure Gets An Experiment By Experimentname
      operationId: microsoftAzureExperimentsGet
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/Experiment'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Gets an Experiment by ExperimentName:
          $ref: ./examples/NetworkExperimentGetExperiment.json
      description: Needs a more full description created.
    put:
      tags:
      - Experiments
      summary: Microsoft Azure Creates Or Updates An Experiment
      operationId: microsoftAzureExperimentsCreateorupdate
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      - description: The Experiment resource
        in: body
        name: parameters
        required: true
        schema:
          $ref: '#/definitions/Experiment'
      responses:
        '200':
          description: OK. The request has succeeded.
          schema:
            $ref: '#/definitions/Experiment'
        '201':
          description: Created. The request has been fulfilled and a new experiment has been created.
          schema:
            $ref: '#/definitions/Experiment'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          schema:
            $ref: '#/definitions/Experiment'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-examples:
        Creates an Experiment:
          $ref: ./examples/NetworkExperimentCreateExperiment.json
      description: Needs a more full description created.
    patch:
      tags:
      - Experiments
      description: Updates an Experiment
      summary: Microsoft Azure Updates An Experiment By Experiment Id
      operationId: microsoftAzureExperimentsUpdate
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      - in: body
        name: parameters
        description: The Experiment Update Model
        required: true
        schema:
          $ref: '#/definitions/ExperimentUpdateModel'
      responses:
        '200':
          description: OK. successful operation
          schema:
            $ref: '#/definitions/Experiment'
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
          schema:
            $ref: '#/definitions/Experiment'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-examples:
        Updates an Experiment:
          $ref: ./examples/NetworkExperimentUpdateExperiment.json
    delete:
      tags:
      - Experiments
      summary: Microsoft Azure Deletes An Experiment
      operationId: microsoftAzureExperimentsDelete
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      responses:
        '200':
          description: Delete successful.
        '202':
          description: Accepted. The request has been accepted for processing and the operation will complete asynchronously.
        '204':
          description: No Content. The request has been accepted but the policy was not found.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-long-running-operation: true
      x-ms-examples:
        Deletes an Experiment:
          $ref: ./examples/NetworkExperimentDeleteExperiment.json
      description: Needs a more full description created.
  ? /history/v1.0/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/experiments/{experimentName}
  : get:
      tags:
      - Experiments
      summary: Microsoft Azure Get Details Of An Experiment
      description: Get details of an Experiment with specific Experiment name.
      operationId: microsoftAzureExperimentsGet
      consumes: []
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: experimentName
        in: path
        description: The experiment name.
        required: true
        type: string
      responses:
        '200':
          description: The details of the Experiment are returned successfully.
          schema:
            $ref: '#/definitions/Experiment_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
    post:
      tags:
      - Experiments
      summary: Microsoft Azure Create An Experiment
      description: Create a new Experiment.
      operationId: microsoftAzureExperimentsCreate
      consumes: []
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: experimentName
        in: path
        description: The experiment name.
        required: true
        type: string
      responses:
        '200':
          description: The Experiment is created successfully.
          schema:
            $ref: '#/definitions/Experiment_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
  ? /history/v1.0/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/experimentids/{experimentId}
  : get:
      tags:
      - Experiments
      summary: Microsoft Azure Get Details Of An Experiment
      description: Get details of an Experiment with specific Experiment Id.
      operationId: microsoftAzureExperimentsGetbyid
      consumes: []
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: experimentId
        in: path
        description: The identifier of the experiment.
        required: true
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Experiment_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
    patch:
      tags:
      - Experiments
      summary: Microsoft Azure Update Details Of An Experiment
      description: Update details of an Experiment with specific Experiment Id.
      operationId: microsoftAzureExperimentsUpdate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: experimentId
        in: path
        description: The identifier of the experiment.
        required: true
        type: string
      - name: modifyExperimentDto
        in: body
        description: Experiment details which needs to be updated.
        required: false
        schema:
          $ref: '#/definitions/ModifyExperiment'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Experiment_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
  ? /history/v1.0/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/experiments:query
  : post:
      tags:
      - Experiments
      summary: Microsoft Azure Get All Experiments In A Specific Workspace
      description: Get all experiments in a specific workspace with the specified query filters.
      operationId: microsoftAzureExperimentsGetbyquery
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: queryParams
        in: body
        description: Query parameters for data sorting and filtering.
        required: false
        schema:
          $ref: '#/definitions/QueryParams'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/PaginatedExperimentList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
      x-ms-pageable:
        nextLinkName: nextLink
  ? /history/v1.0/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/experimentids/{experimentId}/tags
  : delete:
      tags:
      - Experiments
      summary: Microsoft Azure Delete List Of Tags In An Experiment
      description: Delete list of Tags from a specific Experiment Id.
      operationId: microsoftAzureExperimentsDeletetags
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/workspaceNameParameter'
      - name: experimentId
        in: path
        description: The identifier of the experiment.
        required: true
        type: string
      - name: tags
        in: body
        description: The requested tags list to be deleted.
        required: false
        schema:
          $ref: '#/definitions/DeleteTagsCommand'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Experiment_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
definitions:
