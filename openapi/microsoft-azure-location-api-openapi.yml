swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Location API
schemes:
- https
tags:
- name: Location
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Batch/locations/{locationName}/quotas:
    get:
      tags:
      - Location
      operationId: microsoftAzureLocationGetquotas
      x-ms-examples:
        LocationGetQuotas:
          $ref: ./examples/LocationGetQuotas.json
      description: Gets the Batch service quotas for the specified subscription at the given location.
      parameters:
      - name: locationName
        in: path
        required: true
        type: string
        description: The region for which to retrieve Batch service quotas.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: The operation was successful. The response contains the Batch service quotas for the subscription in the specified location.
          schema:
            $ref: '#/definitions/BatchLocationQuota'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Batch Locations Locationname Quotas
  /subscriptions/{subscriptionId}/providers/Microsoft.Batch/locations/{locationName}/virtualMachineSkus:
    get:
      tags:
      - Location
      operationId: microsoftAzureLocationListsupportedvirtualmachineskus
      x-ms-examples:
        LocationListVirtualMachineSkus:
          $ref: ./examples/LocationListVirtualMachineSkus.json
      description: Gets the list of Batch supported Virtual Machine VM sizes available at the given location.
      parameters:
      - name: locationName
        in: path
        required: true
        type: string
        description: The region for which to retrieve Batch service supported SKUs.
      - name: maxresults
        in: query
        required: false
        type: integer
        format: int32
        description: The maximum number of items to return in the response.
      - name: $filter
        in: query
        required: false
        type: string
        description: OData filter expression. Valid properties for filtering are "familyName".
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: The operation was successful. The response contains the Batch service supported virtual machine vm sizes for the subscription in the specified location.
          schema:
            $ref: '#/definitions/SupportedSkusResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError_2'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Batch Locations Locationname Virtualmachineskus
  /subscriptions/{subscriptionId}/providers/Microsoft.Batch/locations/{locationName}/cloudServiceSkus:
    get:
      tags:
      - Location
      operationId: microsoftAzureLocationListsupportedcloudserviceskus
      x-ms-examples:
        LocationListCloudServiceSkus:
          $ref: ./examples/LocationListCloudServiceSkus.json
      description: Gets the list of Batch supported Cloud Service VM sizes available at the given location.
      parameters:
      - name: locationName
        in: path
        required: true
        type: string
        description: The region for which to retrieve Batch service supported SKUs.
      - name: maxresults
        in: query
        required: false
        type: integer
        format: int32
        description: The maximum number of items to return in the response.
      - name: $filter
        in: query
        required: false
        type: string
        description: OData filter expression. Valid properties for filtering are "familyName".
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: The operation was successful. The response contains the Batch service supported Cloud Service VM sizes for the subscription in the specified location.
          schema:
            $ref: '#/definitions/SupportedSkusResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError_2'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Batch Locations Locationname Cloudserviceskus
  /subscriptions/{subscriptionId}/providers/Microsoft.Blockchain/locations/{locationName}/checkNameAvailability:
    post:
      tags:
      - Location
      description: To check whether a resource name is available.
      operationId: microsoftAzureLocationsChecknameavailability
      parameters:
      - name: locationName
        in: path
        description: Location Name.
        required: true
        type: string
      - name: nameAvailabilityRequest
        in: body
        description: Name availability request payload.
        required: false
        schema:
          $ref: '#/definitions/NameAvailabilityRequest'
      - $ref: '#/parameters/ApiVersionParameter_2'
      - $ref: '#/parameters/SubscriptionIdParameter_2'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/NameAvailability'
      x-ms-examples:
        Locations_CheckNameAvailability:
          $ref: ./examples/Locations_CheckNameAvailability.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Providers Microsoft Blockchain Locations Locationname Checknameavailability
  /subscriptions/{subscriptionId}/providers/Microsoft.Blockchain/locations/{locationName}/listConsortiums:
    post:
      tags:
      - Location
      description: Lists the available consortiums for a subscription.
      operationId: microsoftAzureLocationsListconsortiums
      parameters:
      - name: locationName
        in: path
        description: Location Name.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter_2'
      - $ref: '#/parameters/SubscriptionIdParameter_2'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ConsortiumCollection'
      x-ms-examples:
        Locations_ListConsortiums:
          $ref: ./examples/Locations_ListConsortiums.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Providers Microsoft Blockchain Locations Locationname Listconsortiums
definitions:
  NameAvailabilityRequest:
    description: Name availability request payload which is exposed in the request of the resource provider.
    type: object
    properties:
      name:
        description: Gets or sets the name to check.
        type: string
      type:
        description: Gets or sets the type of the resource to check.
        type: string
  ConsortiumCollection:
    description: Collection of the consortium payload.
    type: object
    properties:
      value:
        description: Gets or sets the collection of consortiums.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/Consortium'
        x-ms-identifiers:
        - name
  SupportedSku:
    type: object
    properties:
      name:
        readOnly: true
        type: string
        description: The name of the SKU.
      familyName:
        readOnly: true
        type: string
        description: The family name of the SKU.
      capabilities:
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/SkuCapability'
        x-ms-identifiers:
        - name
        description: A collection of capabilities which this SKU supports.
      batchSupportEndOfLife:
        type: string
        readOnly: true
        format: date-time
        description: The time when Azure Batch service will retire this SKU.
    description: Describes a Batch supported SKU.
  NameAvailability:
    description: Name availability payload which is exposed in the response of the resource provider.
    type: object
    properties:
      nameAvailable:
        description: Gets or sets the value indicating whether the name is available.
        type: boolean
      message:
        description: Gets or sets the message.
        type: string
      reason:
        description: Gets or sets the name availability reason.
        enum:
        - NotSpecified
        - AlreadyExists
        - Invalid
        type: string
        x-ms-enum:
          name: NameAvailabilityReason
          modelAsString: true
  CloudError:
    x-ms-external: true
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
    description: An error response from the Batch service.
  CloudError_2:
    type: object
    x-ms-external: true
    properties:
      error:
        description: The body of the error response.
        $ref: '#/definitions/CloudErrorBody_2'
    description: An error response from the Batch service.
  CloudErrorBody_2:
    type: object
    x-ms-external: true
    properties:
      code:
        type: string
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
      message:
        type: string
        description: A message describing the error, intended to be suitable for display in a user interface.
      target:
        type: string
        description: The target of the particular error. For example, the name of the property in error.
      details:
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody_2'
        x-ms-identifiers:
        - message
        - target
        description: A list of additional details about the error.
    description: An error response from the Batch service.
  SupportedSkusResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/SupportedSku'
        x-ms-identifiers:
        - name
        description: The list of SKUs available for the Batch service in the location.
      nextLink:
        readOnly: true
        type: string
        description: The URL to use for getting the next set of results.
    required:
    - value
    description: The Batch List supported SKUs operation response.
  SkuCapability:
    type: object
    properties:
      name:
        type: string
        readOnly: true
        description: The name of the feature.
      value:
        type: string
        readOnly: true
        description: The value of the feature.
    description: A SKU capability, such as the number of cores.
  CloudErrorBody:
    x-ms-external: true
    properties:
      code:
        type: string
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
      message:
        type: string
        description: A message describing the error, intended to be suitable for display in a user interface.
      target:
        type: string
        description: The target of the particular error. For example, the name of the property in error.
      details:
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
        description: A list of additional details about the error.
    description: An error response from the Batch service.
  Consortium:
    description: Consortium payload
    type: object
    properties:
      name:
        description: Gets or sets the blockchain member name.
        type: string
      protocol:
        description: Gets or sets the protocol for the consortium.
        enum:
        - NotSpecified
        - Parity
        - Quorum
        - Corda
        type: string
        x-ms-enum:
          name: BlockchainProtocol
          modelAsString: true
  BatchLocationQuota:
    properties:
      accountQuota:
        type: integer
        format: int32
        readOnly: true
        description: The number of Batch accounts that may be created under the subscription in the specified region.
    description: Quotas associated with a Batch region for a particular subscription.
parameters:
  SubscriptionIdParameter_2:
    name: subscriptionId
    in: path
    description: Gets the subscription Id which uniquely identifies the Microsoft Azure subscription. The subscription ID is part of the URI for every service call.
    required: true
    type: string
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: The API version to be used with the HTTP request.
  ApiVersionParameter_2:
    name: api-version
    in: query
    description: Client API Version.
    required: true
    type: string
    enum:
    - 2018-06-01-preview
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: The Azure subscription ID. This is a GUID-formatted string (e.g. 00000000-0000-0000-0000-000000000000)
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
