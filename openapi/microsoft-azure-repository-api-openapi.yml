swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Repository API
  description: Everything about repository
schemes:
- https
tags:
- name: Repository
  description: Everything about repository
paths:
  /v2/_catalog:
    get:
      tags:
      - Repository
      description: List repositories
      operationId: microsoftAzureGetrepositories
      x-ms-examples:
        Get repositories in a registry:
          $ref: ./examples/GetRepositories.json
      parameters:
      - $ref: '#/parameters/QueryLast'
      - $ref: '#/parameters/QueryNum'
      responses:
        '200':
          description: Returns a list of repositories
          headers:
            Link:
              description: next paginated result
              type: string
          schema:
            $ref: '#/definitions/Repositories'
        default:
          description: ACR error response describing why the operation failed.
          schema:
            $ref: '#/definitions/AcrErrors'
      summary: Microsoft Azure Get  Catalog
definitions:
  Repositories:
    description: List of repositories
    properties:
      repositories:
        type: array
        x-ms-client-name: Names
        description: Repository names
        items:
          type: string
    example:
      repositories:
      - production/alpine
      - testing/alpine
  AcrErrors:
    description: Acr error response describing why the operation failed
    properties:
      errors:
        type: array
        description: Array of detailed error
        items:
          $ref: '#/definitions/AcrErrorInfo'
  AcrErrorInfo:
    description: Error information
    properties:
      code:
        description: Error code
        type: string
      message:
        type: string
        description: Error message
      detail:
        type: object
        description: Error details
parameters:
  QueryLast:
    name: last
    in: query
    description: Query parameter for the last item in previous query. Result set will include values lexically after last.
    required: false
    type: string
    x-ms-parameter-location: method
  QueryNum:
    name: n
    in: query
    description: query parameter for max number of items
    required: false
    type: integer
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
