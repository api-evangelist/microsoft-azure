  ProtectedItem:
    description: Base class for backup items.
    required:
    - protectedItemType
    type: object
    properties:
      protectedItemType:
        description: backup item type.
        type: string
      backupManagementType:
        description: Type of backup management for the backed up item.
        enum:
        - Invalid
        - AzureIaasVM
        - MAB
        - DPM
        - AzureBackupServer
        - AzureSql
        - AzureStorage
        - AzureWorkload
        - DefaultBackup
        type: string
        x-ms-enum:
          name: BackupManagementType
          modelAsString: true
        readOnly: true
      workloadType:
        description: Type of workload this item represents.
        enum:
        - Invalid
        - VM
        - FileFolder
        - AzureSqlDb
        - SQLDB
        - Exchange
        - Sharepoint
        - VMwareVM
        - SystemState
        - Client
        - GenericDataSource
        - SQLDataBase
        - AzureFileShare
        - SAPHanaDatabase
        - SAPAseDatabase
        - SAPHanaDBInstance
