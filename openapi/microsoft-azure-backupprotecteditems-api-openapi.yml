info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector BackupProtectedItems API
schemes:
- https
tags:
- name: BackupProtectedItems
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupProtectedItems
  : get:
      tags:
      - BackupProtectedItems
      description: Provides a pageable list of all items that are backed up within a vault.
      operationId: microsoftAzureBackupprotecteditemsList
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/VaultName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: $filter
        in: query
        description: OData filter options.
        required: false
        type: string
      - name: $skipToken
        in: query
        description: skipToken Filter.
        required: false
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ProtectedItemResourceList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-odata: '#/definitions/ProtectedItemQueryObject'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        List protected items with backupManagementType filter as AzureIaasVm:
          $ref: ./examples/AzureIaasVm/BackupProtectedItems_List.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Backupprotecteditems
