swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Number Verification API
schemes:
- https
tags:
- name: Number Verification
paths:
  /number-verification/number:verify:
    post:
      operationId: microsoftAzureNumberverificationVerifywithoutcode
      description: Verifies the phone number (MSISDN) associated with a device. As part of the frontend authorization flow, the device is redirected to the operator network to authenticate directly.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      - $ref: '#/parameters/ApcGatewayIdHeader'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/NumberVerificationWithoutCodeContent'
      responses:
        '302':
          description: Redirection
          headers:
            location:
              type: string
              format: uri
              description: The URI of the network's authorization endpoint, which should be followed by the front-end application.
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
            x-ms-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, server-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        NumberVerification_VerifyWithoutCode:
          $ref: ./examples/NumberVerification_VerifyWithoutCode_MaximumSet_Gen.json
      summary: Microsoft Azure Post Number Verification Number:verify
      tags:
      - Number Verification
definitions:
  Azure.Core.Foundations.ErrorResponse:
    type: object
    description: A response containing error details.
    properties:
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: The error object.
    required:
    - error
  Azure.Core.Foundations.InnerError:
    type: object
    description: An object containing more specific information about the error. As per Microsoft One API guidelines - https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: Inner error.
  NumberVerificationWithoutCodeContent:
    type: object
    description: Request to verify number of device - first call
    properties:
      networkIdentifier:
        $ref: '#/definitions/NetworkIdentifier'
        description: Identifier for the network to query for this device.
      phoneNumber:
        type: string
        description: Phone number in E.164 format (starting with country code), and optionally prefixed with '+'
        pattern: ^\+?[0-9]{5,15}$
      hashedPhoneNumber:
        type: string
        description: Hashed phone number. SHA-256 (in hexadecimal representation) of the mobile phone number in **E.164 format (starting with country code)**. Optionally prefixed with '+'.
      redirectUri:
        type: string
        format: uri
        description: Redirect URI to backend application.
    required:
    - networkIdentifier
    - redirectUri
  NetworkIdentifier:
    type: object
    description: Identifier for the network to be queried
    properties:
      identifierType:
        type: string
        description: 'The type of identifier for the network. one of: ''IPv4'', ''IPv6'', ''NetworkCode'''
      identifier:
        type: string
        description: 'The network identifier, based on the identifierType: an IPv4 address, and IPv6 address, or a Network Code.

          A Network Code may be obtained from APC documentation or from the APC /Network:retrieve endpoint.'
    required:
    - identifierType
    - identifier
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
