        description: The update time of the record.
      updatedBy:
        type: string
        description: The user who updated the record.
      version:
        type: integer
        format: int64
        description: The version of the record.
      lastModifiedTS:
        type: string
        description: ETag for concurrency control.
      attributeDefs:
