    type: string
    description: Cardinality
    enum:
    - SINGLE
    - LIST
    - SET
    x-ms-enum:
      name: CardinalityValue
      modelAsString: true
      values:
      - name: Single
        value: SINGLE
        description: single
      - name: List
        value: LIST
        description: list
      - name: Set
        value: SET
        description: set
  RelationshipCategory:
    type: string
    title: RelationshipCategory
    description: 'The Relationship category determines the style of relationship around containment and lifecycle.

      UML terminology is used for the values.

      <p>

      ASSOCIATION is a relationship with no containment. <br>

      COMPOSITION and AGGREGATION are containment relationships.

      <p>

      The difference being in the lifecycles of the container and its children. In the COMPOSITION case,

      the children cannot exist without the container. For AGGREGATION, the life cycles

      of the container and children are totally independent.'
    enum:
    - ASSOCIATION
    - AGGREGATION
    - COMPOSITION
