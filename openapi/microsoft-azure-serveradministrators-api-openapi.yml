swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ServerAdministrators API
schemes:
- https
tags:
- name: ServerAdministrators
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Sql/servers/{serverName}/administrators/{administratorName}
  : put:
      tags:
      - ServerAdministrators
      operationId: microsoftAzureServerazureadadministratorsCreateorupdate
      description: Creates a new Server Active Directory Administrator or updates an existing server Active Directory Administrator.
      x-ms-examples:
        Create/Update a server administrator:
          $ref: ./examples/ServerAdminCreateUpdate.json
      parameters:
      - $ref: ../../../common/v1/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../common/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../common/v1/types.json#/parameters/ResourceGroupParameter
      - $ref: '#/parameters/ServerNameParameter'
      - $ref: '#/parameters/AdministratorNameParameter'
      - name: properties
        in: body
        required: true
        schema:
          $ref: '#/definitions/ServerAzureADAdministrator'
        description: The required parameters for creating or updating an Active Directory Administrator.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ServerAzureADAdministrator'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/ServerAzureADAdministrator'
        '202':
          description: Accepted
          schema:
            $ref: '#/definitions/ServerAzureADAdministrator'
      x-ms-long-running-operation: true
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Sql Servers Servername Administrators Administratorname
    delete:
