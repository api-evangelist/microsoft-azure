      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/moveCollectionName'
      - $ref: '#/parameters/moveResourceName'
      - $ref: '#/parameters/api-version'
      - in: body
        name: body
        schema:
          $ref: '#/definitions/MoveResource'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/MoveResource'
        '202':
          description: Accepted
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        MoveResources_Create:
          $ref: ./examples/MoveResources_Create.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Movecollections Movecollectionname Moveresources Moveresourcename
    delete:
      tags:
      - MoveResources
      operationId: microsoftAzureMoveresourcesDelete
      description: Deletes a Move Resource from the move collection.
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - $ref: '#/parameters/moveCollectionName'
      - $ref: '#/parameters/moveResourceName'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/OperationStatus'
        '202':
          description: Accepted
        '204':
          description: NoContent
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        MoveResources_Delete:
          $ref: ./examples/MoveResources_Delete.json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Movecollections Movecollectionname Moveresources Moveresourcename
    get:
