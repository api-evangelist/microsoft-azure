paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/aksAssessments/{assessmentName}/assessedWebApps
  : get:
      operationId: microsoftAzureAssessedwebapplicationoperationsListbyaksassessment
      tags:
      - AssessedWebApplicationOperations
      description: List AssessedWebApplication resources by AKSAssessment
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: continuationToken
        in: query
        description: Continuation Token Query Parameter.
        required: false
        type: string
      - name: $top
        in: query
        description: Page Size Query Parameter.
        required: false
        type: integer
        format: int32
      - name: $filter
        in: query
        description: Filter Query Parameter.
        required: false
        type: string
      - name: totalRecordCount
        in: query
        description: Total Record Count Query Parameter.
        required: false
        type: integer
        format: int32
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: assessmentName
        in: path
        description: AKS Assessment Name.
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/AssessedWebApplicationListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        AssessedWebApplicationOperations_ListByAksAssessment_MaximumSet_Gen:
          $ref: ./examples/AssessedWebApplicationOperations_ListByAksAssessment_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Aksassessments Assessmentname Assessedwebapps
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/aksAssessments/{assessmentName}/assessedWebApps/{assessedWorkload}
  : get:
      operationId: microsoftAzureAssessedwebapplicationoperationsGet
      tags:
      - AssessedWebApplicationOperations
      description: Get a AssessedWebApplication
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: assessmentName
        in: path
        description: AKS Assessment Name.
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: assessedWorkload
        in: path
        description: Assessed Web Application Name.
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/AssessedWebApplication'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        AssessedWebApplicationOperations_Get_MaximumSet_Gen:
          $ref: ./examples/AssessedWebApplicationOperations_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Aksassessments Assessmentname Assessedwebapps Assessedworkload
definitions:
  ComputeResource:
    type: object
    description: Data model of Cores and Memory Compute Resource.
    properties:
      cores:
        type: number
        format: float
        description: Gets cores.
        readOnly: true
      memory:
        type: number
        format: float
        description: Gets memory.
        readOnly: true
    required:
    - cores
    - memory
  AssessedWebApplication:
    type: object
    description: ARM model of Assessed Web Application.
    properties:
      properties:
        $ref: '#/definitions/AssessedWebApplicationProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
      eTag:
        type: string
        description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention.  Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        readOnly: true
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  SuitabilityResult:
    type: object
    description: Data model of Suitability Result.
    properties:
      readiness:
        $ref: '#/definitions/Readiness'
        description: Gets readiness.
        readOnly: true
      suitability:
        $ref: '#/definitions/Suitability'
        description: Gets suitability.
        readOnly: true
      failedChecks:
        type: array
        description: Gets list of failed Checks.
        items:
          $ref: '#/definitions/Check'
        readOnly: true
        x-ms-identifiers:
        - name
      suggestedMigrationTool:
        $ref: '#/definitions/SuggestedMigrationTool'
        description: Gets suggested migration tool.
        readOnly: true
    required:
    - readiness
    - suitability
    - failedChecks
    - suggestedMigrationTool
  Check:
    type: object
    description: Data model of Check or Rule for Suitability Analysis.
    properties:
      name:
        type: string
        description: Gets name.
        readOnly: true
      behavior:
        $ref: '#/definitions/CheckResult'
        description: Gets behavior or check result.
        readOnly: true
      description:
        type: string
        description: Gets description.
        readOnly: true
      cause:
        type: string
        description: Gets cause.
        readOnly: true
      recommendation:
        type: string
        description: Gets recommendation.
        readOnly: true
      moreInfo:
        $ref: '#/definitions/MoreInfo'
        description: Gets more information about check or rule.
        readOnly: true
    required:
    - name
    - behavior
    - description
    - cause
    - recommendation
    - moreInfo
  Readiness:
    type: string
    description: Readiness for Azure.
    enum:
    - Unknown
    - NotReady
    - ReadyWithConditions
    - Ready
    x-ms-enum:
      name: Readiness
      modelAsString: true
      values:
      - name: Unknown
        value: Unknown
        description: Unknown Readiness.
      - name: NotReady
        value: NotReady
        description: Not Ready.
      - name: ReadyWithConditions
        value: ReadyWithConditions
        description: Ready with conditions.
      - name: Ready
        value: Ready
        description: Ready for migration.
  OSType:
    type: string
    description: Operating System Type.
    enum:
    - Linux
    - Windows
    x-ms-enum:
      name: OSType
      modelAsString: true
      values:
      - name: Linux
        value: Linux
        description: Linux OS Type.
      - name: Windows
        value: Windows
        description: Windows OS Type.
  MoreInfo:
    type: object
    description: Data model of More information about check or rule.
    properties:
      title:
        type: string
        description: Gets title.
        readOnly: true
      url:
        type: string
        description: Gets url.
        readOnly: true
    required:
    - title
    - url
  AssessedWebApp:
    type: object
    description: Data model of Assessed Web App.
    properties:
      suitabilityResult:
        $ref: '#/definitions/SuitabilityResult'
        description: Gets suitability result.
        readOnly: true
      recommendationResult:
        $ref: '#/definitions/RecommendationResult'
        description: Gets recommendation result.
        readOnly: true
    allOf:
    - $ref: '#/definitions/WebApp'
  WebAppType:
    type: string
    description: Web App Type.
    enum:
    - Unknown
    - IIS
    - Tomcat
    x-ms-enum:
      name: WebAppType
      modelAsString: true
      values:
      - name: Unknown
        value: Unknown
        description: Unknown. Indicates Missing Data.
      - name: IIS
        value: IIS
        description: ASP.NET Web App.
      - name: Tomcat
        value: Tomcat
        description: Java Web App.
  RecommendationResult:
    type: object
    description: Data model of Recommendation Result.
    properties:
      request:
        $ref: '#/definitions/ComputeResource'
        description: Gets cores and memory request.
        readOnly: true
      limit:
        $ref: '#/definitions/ComputeResource'
        description: Gets cores and memory limit.
        readOnly: true
      osType:
        $ref: '#/definitions/OSType'
        description: Gets os type.
        readOnly: true
      clusterName:
        type: string
        description: Gets cluster name.
        readOnly: true
      nodePoolId:
        type: string
        description: Gets node pool id.
        readOnly: true
      nodePoolName:
        type: string
        description: Gets node pool name.
        readOnly: true
      nodePoolArmSkuName:
        type: string
        description: Gets node pool arm sku name.
        readOnly: true
      approxMonthlyCost:
        type: number
        format: float
        description: Gets approximate monthly cost.
        readOnly: true
    required:
    - request
    - limit
    - osType
    - clusterName
    - nodePoolId
    - nodePoolName
    - nodePoolArmSkuName
    - approxMonthlyCost
  AssessedWebApplicationProperties:
    type: object
    description: ARM model of Assessed Web Application Properties.
    allOf:
    - $ref: '#/definitions/AssessedWebApp'
  CheckResult:
    type: string
    description: Suitability Check or Rule Result.
    enum:
    - Unknown
    - Issue
    - Warn
    - Pass
    x-ms-enum:
      name: CheckResult
      modelAsString: true
      values:
      - name: Unknown
        value: Unknown
        description: Indicates missing value.
      - name: Issue
        value: Issue
        description: Indicates Migration Issue.
      - name: Warn
        value: Warn
        description: Indicates Migration Warning.
      - name: Pass
        value: Pass
        description: Indicates check is passed.
  Suitability:
    type: string
    description: Suitability for Azure.
    enum:
    - NotSuitable
    - Suitable
    x-ms-enum:
      name: Suitability
      modelAsString: true
      values:
      - name: NotSuitable
        value: NotSuitable
        description: Not Suitable for Azure.
      - name: Suitable
        value: Suitable
        description: Suitable for Azure.
  SuggestedMigrationTool:
    type: string
    description: Suggested Migration Tool for Azure.
    enum:
    - None
    - WebAppMigration
    - ServerMigration
    x-ms-enum:
      name: SuggestedMigrationTool
      modelAsString: true
      values:
      - name: None
        value: None
        description: No Migration Tool is suggested.
      - name: WebAppMigration
        value: WebAppMigration
        description: Web App Migration.
      - name: ServerMigration
        value: ServerMigration
        description: Server Migration.
  WebApp:
    type: object
    description: Data model of Web App.
    properties:
      discoveryArmId:
        type: string
        description: Gets discovery arm id.
        readOnly: true
      displayName:
        type: string
        description: Gets display name.
        readOnly: true
      webServerArmId:
        type: string
        description: Gets web server arm id.
        readOnly: true
      webServerDisplayName:
        type: string
        description: Gets web server display name.
        readOnly: true
      machineArmId:
        type: string
        description: Gets machine arm id.
        readOnly: true
      machineDisplayName:
        type: string
        description: Gets machine display name.
        readOnly: true
      webAppType:
        $ref: '#/definitions/WebAppType'
        description: Gets web app type.
        readOnly: true
    required:
    - discoveryArmId
    - displayName
    - webServerArmId
    - webServerDisplayName
    - machineArmId
    - machineDisplayName
    - webAppType
  AssessedWebApplicationListResult:
    type: object
    description: The response of a AssessedWebApplication list operation.
    properties:
      value:
        type: array
        description: The AssessedWebApplication items on this page
        items:
          $ref: '#/definitions/AssessedWebApplication'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
