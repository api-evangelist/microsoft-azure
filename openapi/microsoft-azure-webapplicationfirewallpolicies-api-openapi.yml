          $ref: ./examples/WafPolicyDelete.json
      x-ms-long-running-operation: false
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cdn Cdnwebapplicationfirewallpolicies Policyname
