definitions:
  ManagedRuleSet:
    type: object
    description: Defines a managed rule set.
    required:
    - ruleSetType
    - ruleSetVersion
    properties:
      ruleSetType:
        description: Defines the rule set type to use.
        type: string
      ruleSetVersion:
        description: Defines the version of the rule set to use.
        type: string
      anomalyScore:
        description: 'Verizon only : If the rule set supports anomaly detection mode, this describes the threshold for blocking requests.'
        type: integer
        format: int32
        maximum: 20
        exclusiveMaximum: false
        minimum: 0
        exclusiveMinimum: false
      ruleGroupOverrides:
        description: Defines the rule overrides to apply to the rule set.
        type: array
        items:
          $ref: '#/definitions/ManagedRuleGroupOverride'
        x-ms-identifiers:
        - ruleGroupName
  CdnWebApplicationFirewallPolicyList:
    description: Defines a list of WebApplicationFirewallPolicies for Azure CDN. It contains a list of WebApplicationFirewallPolicy objects and a URL link to get the next set of results.
    properties:
      value:
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/CdnWebApplicationFirewallPolicy'
        description: List of Azure CDN WebApplicationFirewallPolicies within a resource group.
      nextLink:
        type: string
        description: URL to get the next set of WebApplicationFirewallPolicy objects if there are any.
  ExclusionManagedRuleGroup:
    type: object
    description: Defines a managed rule group to use for exclusion.
    required:
    - ruleGroupName
    properties:
      ruleGroupName:
        description: The managed rule group for exclusion.
        type: string
      rules:
        description: List of rules that will be excluded. If none specified, all rules in the group will be excluded.
        type: array
        items:
          $ref: '#/definitions/ExclusionManagedRule'
  WebApplicationFirewallCustomRule:
    description: Defines contents of a web application rule.
    required:
    - priority
    - ruleType
    - matchConditions
    - action
    properties:
      name:
        type: string
        description: The name of the resource that is unique within a policy. This name can be used to access the resource.
        maxLength: 128
      etag:
        type: string
        readOnly: true
        description: A unique read-only string that changes whenever the resource is updated.
      priority:
        description: Priority of the rule. Rules with a lower value will be evaluated before rules with a higher value.
        type: integer
      state:
        description: Describes if the custom rule is in enabled or disabled state. Defaults to Enabled if not specified.
        type: string
        enum:
        - Disabled
        - Enabled
        x-ms-enum:
          name: WebApplicationFirewallState
          modelAsString: true
      rateLimitDuration:
        type: string
        description: Duration over which Rate Limit policy will be applied. Applies only when ruleType is RateLimitRule.
        enum:
        - OneMin
        - FiveMins
        x-ms-enum:
          name: ApplicationGatewayFirewallRateLimitDuration
          modelAsString: true
      rateLimitThreshold:
        description: Rate Limit threshold to apply in case ruleType is RateLimitRule. Must be greater than or equal to 1
        type: integer
        format: int32
      ruleType:
        description: The rule type.
        type: string
        enum:
        - MatchRule
        - RateLimitRule
        - Invalid
        x-ms-enum:
          name: WebApplicationFirewallRuleType
          modelAsString: true
      matchConditions:
        description: List of match conditions.
        type: array
        items:
          $ref: '#/definitions/MatchCondition_2'
      groupByUserSession:
        description: List of user session identifier group by clauses.
        type: array
        x-ms-identifiers: []
        items:
          $ref: '#/definitions/GroupByUserSession'
      action:
        description: Type of Actions.
        type: string
        enum:
        - Allow
        - Block
        - Log
        - JSChallenge
        x-ms-enum:
          name: WebApplicationFirewallAction
          modelAsString: true
  MatchCondition_2:
    description: Define match conditions.
    required:
    - matchVariables
    - operator
    - matchValues
    properties:
      matchVariables:
        description: List of match variables.
        type: array
        items:
          $ref: '#/definitions/MatchVariable'
      operator:
        description: The operator to be matched.
        type: string
        enum:
        - IPMatch
        - Equal
        - Contains
        - LessThan
        - GreaterThan
        - LessThanOrEqual
        - GreaterThanOrEqual
        - BeginsWith
        - EndsWith
        - Regex
        - GeoMatch
        - Any
        x-ms-enum:
          name: WebApplicationFirewallOperator
          modelAsString: true
      negationConditon:
        description: Whether this is negate condition or not.
        type: boolean
      matchValues:
        description: Match value.
        type: array
        items:
          type: string
      transforms:
        description: List of transforms.
        type: array
        items:
          $ref: '#/definitions/Transform'
  ManagedRuleOverride:
    description: Defines a managed rule group override setting.
    required:
    - ruleId
    properties:
      ruleId:
        description: Identifier for the managed rule.
        type: string
      enabledState:
        description: Describes if the managed rule is in enabled or disabled state. Defaults to Disabled if not specified.
        type: string
        enum:
        - Disabled
        - Enabled
        x-ms-enum:
          name: ManagedRuleEnabledState
          modelAsString: true
      action:
        description: Describes the override action to be applied when rule matches.
        $ref: '#/definitions/ActionType'
  ManagedRuleSetList:
    description: Defines the list of managed rule sets for the policy.
    properties:
      managedRuleSets:
        description: List of rule sets.
        type: array
        items:
          $ref: '#/definitions/ManagedRuleSet'
        x-ms-identifiers:
        - ruleSetType
        - ruleSetVersion
  RateLimitRule:
    description: Defines a rate limiting rule that can be included in a waf policy
    type: object
    required:
    - rateLimitThreshold
    - rateLimitDurationInMinutes
    properties:
      rateLimitThreshold:
        description: Defines rate limit threshold.
        type: integer
        format: int32
        minimum: 0
        exclusiveMinimum: false
      rateLimitDurationInMinutes:
        description: Defines rate limit duration. Default is 1 minute.
        type: integer
        format: int32
        maximum: 60
        exclusiveMaximum: false
        minimum: 0
        exclusiveMinimum: false
    allOf:
    - $ref: '#/definitions/CustomRule'
  PolicySettings:
    description: Defines contents of a web application firewall global configuration.
    properties:
      state:
        description: The state of the policy.
        type: string
        enum:
        - Disabled
        - Enabled
        x-ms-enum:
          name: WebApplicationFirewallEnabledState
          modelAsString: true
      mode:
        description: The mode of the policy.
        type: string
        enum:
        - Prevention
        - Detection
        x-ms-enum:
          name: WebApplicationFirewallMode
          modelAsString: true
      requestBodyCheck:
        type: boolean
        description: Whether to allow WAF to check request Body.
      requestBodyInspectLimitInKB:
        type: integer
        format: int32
        description: Max inspection limit in KB for request body inspection for WAF.
      requestBodyEnforcement:
        type: boolean
        default: true
        description: Whether allow WAF to enforce request body limits.
      maxRequestBodySizeInKb:
        type: integer
        format: int32
        minimum: 8
        exclusiveMinimum: false
        description: Maximum request body size in Kb for WAF.
      fileUploadEnforcement:
        type: boolean
        default: true
        description: Whether allow WAF to enforce file upload limits.
      fileUploadLimitInMb:
        type: integer
        format: int32
        minimum: 0
        exclusiveMinimum: false
        description: Maximum file upload size in Mb for WAF.
      customBlockResponseStatusCode:
        description: If the action type is block, customer can override the response status code.
        type: integer
        format: int32
        minimum: 0
      customBlockResponseBody:
        description: If the action type is block, customer can override the response body. The body must be specified in base64 encoding.
        type: string
        pattern: ^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{4})$
        maxLength: 32768
      logScrubbing:
        description: To scrub sensitive log fields
        type: object
        properties:
          state:
            type: string
            description: State of the log scrubbing config. Default value is Enabled.
            enum:
            - Disabled
            - Enabled
            x-ms-enum:
              name: WebApplicationFirewallScrubbingState
              modelAsString: true
          scrubbingRules:
            type: array
            items:
              $ref: '#/definitions/WebApplicationFirewallScrubbingRules'
            x-ms-identifiers: []
            description: The rules that are applied to the logs for scrubbing.
      jsChallengeCookieExpirationInMins:
        description: Web Application Firewall JavaScript Challenge Cookie Expiration time in minutes.
        type: integer
        format: int32
        minimum: 5
        maximum: 1440
  CdnEndpoint:
    description: Defines the ARM Resource ID for the linked endpoints
    type: object
    readOnly: true
    properties:
      id:
        type: string
        description: ARM Resource ID string.
  WebApplicationFirewallPolicyListResult:
    description: Result of the request to list WebApplicationFirewallPolicies. It contains a list of WebApplicationFirewallPolicy objects and a URL link to get the next set of results.
    properties:
      value:
        type: array
        readOnly: true
        items:
          $ref: '#/definitions/WebApplicationFirewallPolicy'
        description: List of WebApplicationFirewallPolicies within a resource group.
      nextLink:
        readOnly: true
        type: string
        description: URL to get the next set of WebApplicationFirewallPolicy objects if there are any.
  ManagedRuleSet_2:
    type: object
    description: Defines a managed rule set.
    required:
    - ruleSetType
    - ruleSetVersion
    properties:
      ruleSetType:
        description: Defines the rule set type to use.
        type: string
      ruleSetVersion:
        description: Defines the version of the rule set to use.
        type: string
      ruleGroupOverrides:
        description: Defines the rule group overrides to apply to the rule set.
        type: array
        items:
          $ref: '#/definitions/ManagedRuleGroupOverride_2'
  CustomRuleList:
    description: Defines contents of custom rules
    properties:
      rules:
        description: List of rules
        type: array
        items:
          $ref: '#/definitions/CustomRule'
        x-ms-identifiers:
        - name
  OwaspCrsExclusionEntry:
    required:
    - matchVariable
    - selectorMatchOperator
    - selector
    description: Allow to exclude some variable satisfy the condition for the WAF check.
    properties:
      matchVariable:
        type: string
        enum:
        - RequestHeaderNames
        - RequestCookieNames
        - RequestArgNames
        - RequestHeaderKeys
        - RequestHeaderValues
        - RequestCookieKeys
        - RequestCookieValues
        - RequestArgKeys
        - RequestArgValues
        description: The variable to be excluded.
        x-ms-enum:
          name: OwaspCrsExclusionEntryMatchVariable
          modelAsString: true
      selectorMatchOperator:
        type: string
        enum:
        - Equals
        - Contains
        - StartsWith
        - EndsWith
        - EqualsAny
        description: When matchVariable is a collection, operate on the selector to specify which elements in the collection this exclusion applies to.
        x-ms-enum:
          name: OwaspCrsExclusionEntrySelectorMatchOperator
          modelAsString: true
      selector:
        type: string
        description: When matchVariable is a collection, operator used to specify which elements in the collection this exclusion applies to.
      exclusionManagedRuleSets:
        type: array
        items:
          $ref: '#/definitions/ExclusionManagedRuleSet'
        description: The managed rule sets that are associated with the exclusion.
  ActionType_2:
    description: Defines the action to take on rule match.
    type: string
    enum:
    - AnomalyScoring
    - Allow
    - Block
    - Log
    - JSChallenge
    x-ms-enum:
      name: ActionType
      modelAsString: true
  ManagedRulesDefinition:
    description: Allow to exclude some variable satisfy the condition for the WAF check.
    required:
    - managedRuleSets
    properties:
      exclusions:
        type: array
        items:
          $ref: '#/definitions/OwaspCrsExclusionEntry'
        description: The Exclusions that are applied on the policy.
      managedRuleSets:
        type: array
        items:
          $ref: '#/definitions/ManagedRuleSet_2'
        description: The managed rule sets that are associated with the policy.
  ActionType:
    description: Defines the action to take on rule match.
    type: string
    enum:
    - Allow
    - Block
    - Log
    - Redirect
    x-ms-enum:
      name: ActionType
      modelAsString: true
  ManagedRuleGroupOverride_2:
    type: object
    description: Defines a managed rule group override setting.
    required:
    - ruleGroupName
    properties:
      ruleGroupName:
        description: The managed rule group to override.
        type: string
      rules:
        description: List of rules that will be disabled. If none specified, all rules in the group will be disabled.
        type: array
        items:
          $ref: '#/definitions/ManagedRuleOverride_2'
  CustomRule:
    description: Defines the common attributes for a custom rule that can be included in a waf policy
    type: object
    required:
    - name
    - priority
    - matchConditions
    - action
    properties:
      name:
        description: Defines the name of the custom rule
        type: string
      enabledState:
        description: Describes if the custom rule is in enabled or disabled state. Defaults to Enabled if not specified.
        type: string
        enum:
        - Disabled
        - Enabled
        x-ms-enum:
          name: CustomRuleEnabledState
          modelAsString: true
      priority:
        description: Defines in what order this rule be evaluated in the overall list of custom rules
        type: integer
        format: int32
        maximum: 1000
        exclusiveMaximum: false
        minimum: 0
        exclusiveMinimum: false
      matchConditions:
        description: List of match conditions.
        type: array
        items:
          $ref: '#/definitions/MatchCondition'
        x-ms-identifiers: []
      action:
        description: Describes what action to be applied when rule matches
        $ref: '#/definitions/ActionType'
  MatchCondition:
    description: Define match conditions
    required:
    - matchVariable
    - operator
    - matchValue
    properties:
