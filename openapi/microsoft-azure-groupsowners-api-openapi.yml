swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector GroupsOwners API
schemes:
- https
tags:
- name: GroupsOwners
paths:
  /{tenantID}/groups/{objectId}/$links/owners:
    post:
      tags:
      - GroupsOwners
      operationId: microsoftAzureGroupsAddowner
      description: Add an owner to a group.
      parameters:
      - name: objectId
        in: path
        required: true
        type: string
        description: The object ID of the application to which to add the owner.
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/AddOwnerParameters'
        description: The URL of the owner object, such as https://graph.windows.net/0b1f9851-1bf0-433f-aec3-cb9272f093dc/directoryObjects/f260bbc4-c254-447b-94cf-293b5ec434dd.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '204':
          description: No Content. Indicates success. No response body is returned.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Post Tenantid Groups Objectid $links Owners
  /{tenantID}/groups/{objectId}/$links/owners/{ownerObjectId}:
    delete:
      tags:
      - GroupsOwners
      operationId: microsoftAzureGroupsRemoveowner
      description: Remove a member from owners.
      parameters:
      - name: objectId
        in: path
        required: true
        type: string
        description: The object ID of the group from which to remove the owner.
      - name: ownerObjectId
        in: path
        required: true
        type: string
        description: Owner object id
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '204':
          description: No Content. Indicates success. No response body is returned.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Delete Tenantid Groups Objectid $links Owners Ownerobjectid
definitions:
  ErrorMessage:
    type: object
    properties:
      value:
        type: string
        x-ms-client-name: message
        description: Error message value.
    description: Active Directory error message.
  GraphError:
    type: object
    properties:
      odata.error:
        type: object
        x-ms-client-flatten: true
        $ref: '#/definitions/OdataError'
        description: A Graph API error.
    description: Active Directory error information.
  AddOwnerParameters:
    type: object
    properties:
      url:
        type: string
        description: A owner object URL, such as "https://graph.windows.net/0b1f9851-1bf0-433f-aec3-cb9272f093dc/directoryObjects/f260bbc4-c254-447b-94cf-293b5ec434dd", where "0b1f9851-1bf0-433f-aec3-cb9272f093dc" is the tenantId and "f260bbc4-c254-447b-94cf-293b5ec434dd" is the objectId of the owner (user, application, servicePrincipal, group) to be added.
    required:
    - url
    additionalProperties:
      type: object
    description: Request parameters for adding a owner to an application.
  OdataError:
    type: object
    properties:
      code:
        type: string
        description: Error code.
      message:
        type: object
        x-ms-client-flatten: true
        $ref: '#/definitions/ErrorMessage'
        description: Error Message.
    description: Active Directory OData error information.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client API version.
  tenantIDInPath:
    name: tenantID
    in: path
    required: true
    type: string
    description: The tenant ID.
    x-ms-parameter-location: client
