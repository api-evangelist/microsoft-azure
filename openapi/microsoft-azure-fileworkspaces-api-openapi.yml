swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector FileWorkspaces API
schemes:
- https
tags:
- name: FileWorkspaces
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Support/fileWorkspaces/{fileWorkspaceName}:
    get:
      tags:
      - FileWorkspaces
      description: Gets details for a specific file workspace in an Azure subscription.
      operationId: microsoftAzureFileworkspacesGet
      parameters:
      - name: fileWorkspaceName
        in: path
        description: File Workspace Name
        required: true
        type: string
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved file workspace.
          schema:
            $ref: '#/definitions/FileWorkspaceDetails'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Get details of a subscription file workspace:
          $ref: ./examples/GetFileWorkspaceDetailsForSubscription.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Support Fileworkspaces Fileworkspacename
    put:
      tags:
      - FileWorkspaces
      description: Creates a new file workspace for the specified subscription.
      operationId: microsoftAzureFileworkspacesCreate
      parameters:
      - name: fileWorkspaceName
        in: path
        description: File workspace name.
        required: true
        type: string
        pattern: ^[0-9a-zA-Z_\-. ]+$
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '201':
          description: Created - File workspace created successfully
          schema:
            $ref: '#/definitions/FileWorkspaceDetails'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Create a file workspace:
          $ref: ./examples/CreateFileWorkspaceForSubscription.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Providers Microsoft Support Fileworkspaces Fileworkspacename
  /providers/Microsoft.Support/fileWorkspaces/{fileWorkspaceName}:
    get:
      tags:
      - FileWorkspaces
      description: Gets details for a specific file workspace.
      operationId: microsoftAzureFileworkspacesnosubscriptionGet
      parameters:
      - name: fileWorkspaceName
        in: path
        description: File Workspace Name
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
