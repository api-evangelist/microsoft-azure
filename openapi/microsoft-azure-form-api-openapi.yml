swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Form API
schemes:
- https
tags:
- name: Form
paths:
  /custom/models/compose:
    post:
      tags:
      - Form
      summary: Microsoft Azure Compose Trained With Labels Models Into One Composed Model
      description: Compose request would include list of models ids.<br>It would validate what all models either trained with labels model or composed model.<br>It would validate limit of models put together.
      operationId: microsoftAzureComposecustommodelsasync
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - name: composeRequest
        in: body
        description: Compose models
        required: true
        schema:
          $ref: '#/definitions/ComposeRequest'
      responses:
        '201':
          description: Request is queued successfully.
          headers:
            Location:
              type: string
              description: Location and ID of the composed model. The status of composed model is specified in the status property at the model location.
        default:
          description: Response entity accompanying non-successful responses containing additional details about the error.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Compose custom models:
          $ref: ./examples/ComposeModels.json
      x-ms-long-running-operation: true
definitions:
  ErrorInformation:
    type: object
    required:
    - code
    - message
    properties:
      code:
        type: string
      message:
        type: string
  ErrorResponse:
    type: object
    required:
    - error
    properties:
      error:
        $ref: '#/definitions/ErrorInformation'
  ComposeRequest:
    description: Request contract for compose operation.
    required:
    - modelIds
    type: object
    properties:
      modelIds:
        description: List of model ids to compose.
        uniqueItems: false
        type: array
        items:
          type: string
          format: uuid
      modelName:
        $ref: '#/definitions/ModelName'
  ModelName:
    description: 'Optional user defined model name (max length: 1024).'
    type: string
    x-nullable: false
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
