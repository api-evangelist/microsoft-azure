swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector LogFiles API
schemes:
- https
tags:
- name: LogFiles
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DBforMariaDB/servers/{serverName}/logFiles
  : get:
      tags:
      - LogFiles
      operationId: microsoftAzureLogfilesListbyserver
      x-ms-examples:
        LogFileList:
          $ref: ./examples/LogFileListByServer.json
      description: List all the log files in a given server.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupParameter'
      - $ref: '#/parameters/ServerNameParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/LogFileListResult'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Dbformariadb Servers Servername Logfiles
definitions:
  LogFile:
    properties:
      name:
        type: string
        description: The name of the log file.
      properties:
        $ref: '#/definitions/LogFileProperties'
        x-ms-client-flatten: true
        description: The properties of the log file.
    allOf:
    - $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/ProxyResource
    description: Represents a log file.
  LogFileProperties:
    properties:
      sizeInKB:
        type: integer
        format: int64
        description: Size of the log file.
      createdTime:
        type: string
        readOnly: true
        format: date-time
        description: Creation timestamp of the log file.
      lastModifiedTime:
        type: string
        readOnly: true
        format: date-time
        description: Last modified timestamp of the log file.
      type:
        type: string
        description: Type of the log file.
      url:
        type: string
        readOnly: true
        description: The url to download the log file from.
    description: The properties of a log file.
  LogFileListResult:
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/LogFile'
        description: The list of log files.
    description: A list of log files.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: The API version to use for the request.
  ServerNameParameter:
    name: serverName
    in: path
    required: true
    type: string
    description: The name of the server.
    x-ms-parameter-location: method
  ResourceGroupParameter:
    name: resourceGroupName
    in: path
    required: true
    type: string
    description: The name of the resource group that contains the resource. You can obtain this value from the Azure Resource Manager API or the portal.
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: The subscription ID that identifies an Azure subscription.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
