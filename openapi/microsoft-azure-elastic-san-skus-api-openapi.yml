swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Elastic San Skus API
schemes:
- https
tags:
- name: Elastic San Skus
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.ElasticSan/skus:
    get:
      tags:
      - Elastic San Skus
      summary: Microsoft Azure List All The Available Skus In The Region And Information Related To Them
      operationId: microsoftAzureSkusList
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      - name: $filter
        in: query
        description: Specify $filter='location eq <location>' to filter on location.
        required: false
        type: string
      responses:
        '200':
          description: Lists the available SKUs supported by Microsoft.ElasticSan for given subscription.
          schema:
            $ref: '#/definitions/SkuInformationList'
        default:
          description: Error from the ElasticSan Resource Provider.
          schema:
            $ref: '#/definitions/Error'
      x-ms-pageable:
        nextLinkName: null
      x-ms-examples:
        Skus_List_MaximumSet_Gen:
          $ref: ./examples/Skus_List_MaximumSet_Gen.json
        Skus_List_MinimumSet_Gen:
          $ref: ./examples/Skus_List_MinimumSet_Gen.json
      description: Needs a more full description created.
definitions:
  SkuInformation:
    description: ElasticSAN SKU and its properties
    type: object
    required:
    - name
    properties:
      name:
        type: string
        description: Sku Name
        $ref: '#/definitions/SkuName'
      tier:
        type: string
        description: Sku Tier
        $ref: '#/definitions/SkuTier'
      resourceType:
        readOnly: true
        type: string
        description: The type of the resource.
      locations:
        readOnly: true
        type: array
        items:
          type: string
        description: The set of locations that the SKU is available. This will be supported and registered Azure Geo Regions (e.g. West US, East US, Southeast Asia, etc.).
      locationInfo:
        description: Availability of the SKU for the location/zone
        type: array
        items:
          $ref: '#/definitions/SkuLocationInfo'
        x-ms-identifiers: []
        readOnly: true
      capabilities:
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/SKUCapability'
        x-ms-identifiers: []
        description: The capability information in the specified SKU.
  ErrorResponse:
    type: object
    properties:
      code:
        readOnly: true
        type: string
        description: The error code.
      message:
        readOnly: true
        type: string
        description: The error message.
      target:
        readOnly: true
        type: string
        description: The error target.
      details:
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/ErrorResponse'
        x-ms-identifiers: []
        description: The error details.
      additionalInfo:
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/ErrorAdditionalInfo'
        x-ms-identifiers: []
        description: The error additional info.
    description: The resource management error response.
  SkuTier:
    type: string
    enum:
    - Premium
    x-ms-enum:
      name: SkuTier
      modelAsString: true
      values:
      - value: Premium
        description: Premium Tier
    description: The sku tier.
  SkuLocationInfo:
    description: The location info.
    type: object
    properties:
      location:
        description: The location.
        type: string
        readOnly: true
      zones:
        description: The zones.
        type: array
        items:
          type: string
        readOnly: true
  SKUCapability:
    properties:
      name:
        readOnly: true
        type: string
        description: The name of capability.
      value:
        readOnly: true
        type: string
        description: A string value to indicate states of given capability.
    description: The capability information in the specified SKU.
    type: object
  SkuName:
    type: string
    enum:
    - Premium_LRS
    - Premium_ZRS
    x-ms-enum:
      name: SkuName
      modelAsString: true
      values:
      - value: Premium_LRS
        description: Premium locally redundant storage
      - value: Premium_ZRS
        description: Premium zone redundant storage
    description: The sku name.
  SkuInformationList:
    description: List of SKU Information objects
    type: object
    properties:
      value:
        description: List of ResourceType Sku
        type: array
        items:
          $ref: '#/definitions/SkuInformation'
        x-ms-identifiers: []
        readOnly: true
  Error:
    type: object
    description: The resource management error response.
    properties:
      error:
        description: RP error response.
        $ref: '#/definitions/ErrorResponse'
  ErrorAdditionalInfo:
    description: The resource management error additional info.
    type: object
    x-ms-identifiers: []
    properties:
      type:
        readOnly: true
        type: string
        description: The additional info type.
      info:
        readOnly: true
        type: object
        description: The additional info.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
