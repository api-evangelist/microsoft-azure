        required: false
        type: string
      responses:
        '200':
          description: List all the triggers configured in the device
          schema:
            $ref: '#/definitions/TriggerList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-pageable:
        nextLinkName: nextLink
