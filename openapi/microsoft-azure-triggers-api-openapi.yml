definitions:
  ProxyResource:
    type: object
    properties:
      id:
        type: string
        readOnly: true
      name:
        type: string
        readOnly: true
  ARMBaseModel:
    description: Represents the base class for all object models.
    type: object
    properties:
      id:
        description: The path ID that uniquely identifies the object.
        type: string
        readOnly: true
      name:
        description: The object name.
        type: string
        readOnly: true
      type:
        description: The hierarchical type of the object.
        type: string
        readOnly: true
    x-ms-azure-resource: true
  Trigger:
    description: Trigger details.
    required:
    - kind
    type: object
    allOf:
    - $ref: '#/definitions/ARMBaseModel'
    properties:
      kind:
        description: Trigger Kind.
        enum:
        - FileEvent
        - PeriodicTimerEvent
        type: string
        x-ms-enum:
          name: TriggerEventType
          modelAsString: true
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        description: Metadata pertaining to creation and last modification of Trigger
        readOnly: true
    discriminator: kind
  TriggerRecurrence:
    type: object
    properties:
      frequency:
        enum:
        - Week
        - Month
        - Day
        - Hour
        type: string
        x-ms-enum:
          name: TriggerFrequency
          modelAsString: true
      interval:
        format: int32
        type: integer
      startTime:
        format: date-time
        type: string
      endTime:
        format: date-time
        type: string
      schedule:
        allOf:
        - $ref: '#/definitions/RecurrenceSchedule'
      timeZone:
        type: string
  RecurrenceScheduleOccurrence:
    type: object
    properties:
      additionalProperties:
        type: object
        additionalProperties:
          type: object
      day:
        enum:
        - Sunday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        type: string
        x-ms-enum:
          name: DayOfWeek
          modelAsString: true
      occurrence:
        format: int32
        type: integer
  ErrorResponseModel:
    type: object
    properties:
      error:
        allOf:
        - $ref: '#/definitions/ErrorModel'
  ErrorModel:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      target:
        type: string
      details:
        type: array
        items:
          $ref: '#/definitions/ErrorModel'
  CloudError:
    description: An error response from the service.
    type: object
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
        description: The error details.
    x-ms-external: true
  Trigger_2:
    type: object
    allOf:
    - $ref: '#/definitions/ProxyResource'
    properties:
      properties:
        allOf:
        - $ref: '#/definitions/TriggerProperties'
  CloudErrorBody:
    description: An error response from the service.
    type: object
    properties:
      code:
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
        type: string
      message:
        description: A message describing the error, intended to be suitable for display in a user interface.
        type: string
      details:
        description: A list of additional details about the error.
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
        x-ms-identifiers: []
    x-ms-external: true
  TriggerList:
    description: Collection of all trigger on the data box edge device.
    type: object
    properties:
      value:
        description: The list of triggers.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/Trigger'
        readOnly: true
        x-ms-identifiers: []
      nextLink:
        description: Link to the next set of results.
        type: string
        readOnly: true
  RecurrenceSchedule:
    type: object
    properties:
      additionalProperties:
        type: object
        additionalProperties:
          type: object
      minutes:
        type: array
        items:
          format: int32
          type: integer
      hours:
        type: array
        items:
          format: int32
          type: integer
      weekDays:
        type: array
        items:
          enum:
          - Sunday
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          type: string
          x-ms-enum:
            name: DaysOfWeek
            modelAsString: true
      monthDays:
        type: array
        items:
          format: int32
          type: integer
      monthlyOccurrences:
        type: array
        items:
          $ref: '#/definitions/RecurrenceScheduleOccurrence'
  TriggerProperties:
    type: object
    properties:
      recurrence:
        allOf:
        - $ref: '#/definitions/TriggerRecurrence'
      recurrenceInterval:
        type: string
      createdAt:
        format: date-time
        type: string
        readOnly: true
      lastModifiedAt:
        format: date-time
        type: string
        readOnly: true
      lastScheduled:
        format: date-time
        type: string
        readOnly: true
      scanLevel:
        enum:
        - Full
        - Incremental
        type: string
        x-ms-enum:
          name: ScanLevelType
          modelAsString: true
      incrementalScanStartTime:
        format: date-time
        type: string
