      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Support Supporttickets Supportticketname Communications Communicationname
    put:
      tags:
      - Communications
      description: Adds a new customer communication to an Azure support ticket.
      operationId: microsoftAzureCommunicationsCreate
      parameters:
