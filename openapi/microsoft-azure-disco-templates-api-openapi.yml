      code:
        description: This is a more specific error code than was provided by the containing error..
        type: string
    type: object
  AssetId:
    description: The list of excludes used for the disco group runs, aka assets to exclude from the discovery algorithm.
    properties:
      displayName:
        type: string
      id:
        type: string
      kind:
        enum:
        - as
        - contact
        - domain
        - host
        - ipAddress
        - ipBlock
        - page
        - sslCert
        type: string
        x-ms-enum:
          modelAsString: true
          name: assetIdKind
      name:
        type: string
    type: object
