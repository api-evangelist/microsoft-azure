swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Summaries API
schemes:
- https
tags:
- name: Summaries
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzureSpringBoot/springbootsites/{siteName}/summaries/{summaryName}
  : get:
      tags:
      - Summaries
      operationId: microsoftAzureSummariesGet
      summary: Microsoft Azure Implements Summaries Get Method
      description: Gets the Summaries resource.
      x-ms-examples:
        Summaries_Get_MaximumSet_Gen:
          $ref: ./examples/Summaries_Get_MaximumSet_Gen.json
        Summaries_Get_MinimumSet_Gen:
          $ref: ./examples/Summaries_Get_MinimumSet_Gen.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/SiteNameParameter'
      - $ref: '#/parameters/summaryNameParameter'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Retrieves the Summaries resource.
          schema:
            $ref: '#/definitions/Summary'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzureSpringBoot/springbootsites/{siteName}/summaries
  : get:
      tags:
      - Summaries
      operationId: microsoftAzureSummariesListbysite
      summary: Microsoft Azure Implements Summaries Get Method
      description: Lists the Summaries resource in springbootsites.
      x-ms-examples:
        Summaries_ListBySite_MaximumSet_Gen:
          $ref: ./examples/Summaries_ListBySite_MaximumSet_Gen.json
        Summaries_ListBySite_MinimumSet_Gen:
          $ref: ./examples/Summaries_ListBySite_MinimumSet_Gen.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/SiteNameParameter'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Retrieves the Summaries resource.
          schema:
            $ref: '#/definitions/SummaryList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OperationalInsights/workspaces/{workspaceName}/features/serviceMap/summaries/machines
  : get:
      tags:
      - Summaries
      operationId: microsoftAzureSummariesGetmachines
      x-ms-examples:
        SMSummariesGetMachinesGet:
          $ref: ./examples/Summaries/SMSummariesGetMachinesGet.json
      description: Returns summary information about the machines in the workspace.
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/WorkspaceNameParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      - name: startTime
        in: query
        required: false
        type: string
        format: date-time
        description: UTC date and time specifying the start time of an interval. When not specified the service uses DateTime.UtcNow - 10m
      - name: endTime
        in: query
        required: false
        type: string
        format: date-time
        description: UTC date and time specifying the end time of an interval. When not specified the service uses DateTime.UtcNow
      responses:
        '200':
          description: The operation completed successfully.
          schema:
            $ref: '#/definitions/MachinesSummary'
        default:
          description: An error occurred while processing the request. See the error.code parameter to identify the specific error.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Operationalinsights Workspaces Workspacename Features Servicemap Summaries Machines
definitions:
  ErrorResponse:
    type: object
    description: An error response from the API.
    properties:
      error:
        $ref: '#/definitions/Error_2'
        description: Error information.
    required:
    - error
  Resource:
    description: Resource model definition.
    properties:
      id:
        type: string
        description: Resource identifier.
        readOnly: true
      type:
        type: string
        description: Resource type.
        readOnly: true
      name:
        type: string
        description: Resource name.
        readOnly: true
    x-ms-azure-resource: true
  MachinesSummaryProperties:
    type: object
    allOf:
    - $ref: '#/definitions/SummaryProperties'
    description: Summarizes machines in the workspace.
    properties:
      total:
        type: integer
        format: int32
        description: Total number of machines.
      live:
        type: integer
        format: int32
        description: Number of live machines.
      os:
        $ref: '#/definitions/MachineCountsByOperatingSystem'
        description: Machine counts by operating system.
    required:
    - total
    - live
    - os
  SummaryProperties:
    type: object
    description: Base for all summaries.
    properties:
      startTime:
        type: string
        format: date-time
        description: Summary interval start time.
      endTime:
        type: string
        format: date-time
        description: Summary interval end time.
    required:
    - startTime
    - endTime
  MachinesSummary:
    description: A summary of the machines in the workspace.
    allOf:
    - $ref: '#/definitions/Summary_2'
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/MachinesSummaryProperties'
  MachineCountsByOperatingSystem:
    type: object
    description: Machines by operating system.
    properties:
      windows:
        type: integer
        format: int32
        description: Number of live Windows machines.
      linux:
        type: integer
        format: int32
        description: Number of live Linux machines.
    required:
    - windows
    - linux
  Summary_2:
    allOf:
    - $ref: '#/definitions/Resource'
    description: Base for all resource summaries.
  SummaryList:
    type: object
    description: List of Sites.
    properties:
      value:
        type: array
        description: List of Sites.
        items:
          $ref: '#/definitions/Summary'
      nextLink:
        type: string
        description: Url to follow for getting next page of resources.
  Error_2:
    type: object
    description: Error details.
    properties:
      code:
        type: string
        description: Error code identifying the specific error.
      message:
        type: string
        description: Error message in the caller's locale.
    required:
    - code
  SummariesProperties:
    type: object
    description: Summaries properties
    properties:
      discoveredServers:
        type: integer
        description: The of number discovered spring boot servers.
        format: int64
      discoveredApps:
        type: integer
        description: The of number discovered spring boot apps.
        format: int64
      errors:
        description: The list of errors.
        type: array
        items:
          description: The error
          $ref: '#/definitions/Error'
      provisioningState:
        type: string
        description: The resource provisioning state.
        enum:
        - Unknown
        - Succeeded
        - Failed
        - Canceled
        - Accepted
        - Provisioning
        - Deleting
        x-ms-enum:
          name: ProvisioningState
          modelAsString: true
  Summary:
    type: object
    x-ms-azure-resource: true
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
    properties:
      properties:
        description: Resource properties.
        $ref: '#/definitions/SummariesProperties'
      tags:
        type: object
        additionalProperties:
          type: string
        description: Resource tags
    description: The summary resource definition.
  Error:
    type: object
    description: Defines the error.
    properties:
      id:
        description: The error ID.
        type: integer
        format: int64
      code:
        description: The error code.
        type: string
      summaryMessage:
        description: The summarized error message.
        type: string
      runAsAccountId:
        description: The account ID used to login.
        type: string
      message:
        description: The detailed error message.
        type: string
      possibleCauses:
        description: The error possible causes.
        type: string
      recommendedAction:
        description: The error recommended action
        type: string
      severity:
        description: The error severity
        type: string
      updatedTimeStamp:
        description: Time when this error was last updated.
        type: string
        format: date-time
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: API version.
  summaryNameParameter:
    x-ms-parameter-location: method
    name: summaryName
    in: path
    required: true
    type: string
    pattern: ^[A-Za-z][A-Za-z0-9]*$
    minLength: 3
    maxLength: 63
    description: The name of summary
  SiteNameParameter:
    x-ms-parameter-location: method
    name: siteName
    in: path
    required: true
    type: string
    pattern: ^[a-z][a-z0-9-]*$
    maxLength: 64
    minLength: 3
    description: The springbootsites name.
  WorkspaceNameParameter:
    name: workspaceName
    in: path
    x-ms-parameter-location: method
    required: true
    type: string
    description: OMS workspace containing the resources of interest.
    minLength: 3
    maxLength: 63
    pattern: '[a-zA-Z0-9_][a-zA-Z0-9_-]+[a-zA-Z0-9_]'
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: Azure subscription identifier.
  ResourceGroupNameParameter:
    name: resourceGroupName
    in: path
    x-ms-parameter-location: method
    required: true
    type: string
    description: Resource group name within the specified subscriptionId.
    maxLength: 64
    minLength: 1
    pattern: '[a-zA-Z0-9_-]+'
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
