definitions:
  DataPlaneAccountUpdateParameters:
    description: The account properties that can be updated through data plane.
    type: object
    properties:
      friendlyName:
        description: The friendly name for the azure resource.
        type: string
  ProxyResource:
    description: Proxy Azure Resource
    type: object
    properties:
      id:
        description: Gets or sets the identifier.
        type: string
        readOnly: true
      name:
        description: Gets or sets the name.
        type: string
        readOnly: true
      type:
        description: Gets or sets the type.
        type: string
        readOnly: true
    x-ms-azure-resource: true
  TeamsDrConfig:
    additionalProperties: false
    properties:
      callScreening:
        type: boolean
        description: Enables/disables caller ID screening for the account. Caller ID screening is enabled by default.
      subdomain:
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 10
        type: string
        description: Customer-specific domain name label. Can only contain letters, numbers, underscores and dashes. Can be up to 10 characters in length.
      subdomainTokens:
        $ref: '#/definitions/TeamsDrSubdomainTokens'
    required:
    - callScreening
    - subdomain
    - subdomainTokens
    type: object
    description: Account configuration relating to Microsoft Teams Direct Routing.
  ErrorDetail:
    title: The code and message for an error.
    type: object
    properties:
      code:
        description: A machine readable error code.
        type: string
      message:
        description: A human readable representation of the error.
        type: string
      details:
        description: An array of details about specific errors that led to this error.
        type: array
        items:
          $ref: '#/definitions/ErrorDetail'
      innererror:
        description: An object containing more specific information about the error.
        $ref: '#/definitions/InnerError'
      additionalProperties:
        description: Additional properties that can be provided about the error.
    required:
    - code
    - message
  PrivateEndpoint:
    description: A private endpoint class.
    type: object
    properties:
      id:
        description: The private endpoint identifier.
        type: string
  ErrorModel:
    description: Default error model
    type: object
    properties:
      code:
        description: Gets or sets the code.
        type: string
        readOnly: true
      details:
        description: Gets or sets the details.
        type: array
        items:
          $ref: '#/definitions/ErrorModel'
        readOnly: true
      message:
        description: Gets or sets the messages.
        type: string
        readOnly: true
      target:
        description: Gets or sets the target.
        type: string
        readOnly: true
  AccountMergeInfo:
    description: The public Account Merge Info model.
    type: object
    properties:
      accountLocation:
        description: The account location of the *other* account in the merge operation.
        type: string
        readOnly: true
      accountName:
        description: The account name of the *other* account in the merge operation.
        type: string
        readOnly: true
      accountResourceGroupName:
        description: The resource group name of the *other* account in the merge operation.
        type: string
        readOnly: true
      accountSubscriptionId:
        description: The subscription id of the *other* account in the merge operation.
        type: string
        readOnly: true
      mergeStatus:
        description: The status of the merge operation.
        enum:
        - Succeeded
        - Failed
        - InProgress
        type: string
        readOnly: true
        x-ms-enum:
          name: MergeStatus
          modelAsString: true
      typeOfAccount:
        description: The type of account this account is for the merge operation.
        enum:
        - Primary
        - Secondary
        type: string
        readOnly: true
        x-ms-enum:
          name: MergeAccountType
          modelAsString: true
  AccountsList:
    additionalProperties: false
    properties:
      value:
        items:
          $ref: '#/definitions/AccountResponse'
        type: array
        description: List of account records.
      nextLink:
        type: string
        format: uri
        description: Link to the next page of results.
    required:
    - value
    type: object
    description: Paginated list of records for an account.
  TeamsDrSubdomainTokens:
    additionalProperties: false
    properties:
      region1Token:
        pattern: ^([A-Za-z0-9=_-]+)$
        minLength: 1
        maxLength: 100
        type: string
        description: DNS TXT value for the first region, as provided by the customer from their Microsoft 365 Admin Center. Can only contain letters, numbers, underscores and dashes. Can be up to 100 characters in length.
      region2Token:
        pattern: ^([A-Za-z0-9=_-]+)$
        minLength: 1
        maxLength: 100
        type: string
        description: DNS TXT value for the first region, as provided by the customer from their Microsoft 365 Admin Center. Can only contain letters, numbers, underscores and dashes. Can be up to 100 characters in length.
    required:
    - region1Token
    - region2Token
    type: object
    description: DNS TXT values (tokens) for the account.
  AccountProperties_2:
    description: Account property bag.
    type: object
    properties:
      createdAt:
        format: date-time
        description: Time at which the account was created.
        type: string
        readOnly: true
      provisioningState:
        description: Provisioning state of the Account
        enum:
