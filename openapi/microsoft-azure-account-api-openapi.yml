      description: Gets the details of the specified account. An account represents a customer.
      summary: Microsoft Azure Get Accounts Accountname
    put:
      operationId: microsoftAzureAccountCreateorreplace
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: accountName
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 100
