      - in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/AccountDetails'
        description: New details of the account to create or replace.
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/AccountResponse'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/AccountResponse'
        default:
          description: An error response object.
          headers:
            x-ms-error-code:
              type: string
              description: Error code for specific error that occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Put new information about an account:
          $ref: ./examples/PutAccount.json
      tags:
      - Account
      description: Creates or replaces the specified account, representing a customer. In the body of the request, include additional service-specific configuration. For example, for Microsoft Teams Direct Routing, specify the customer-specific subdomain label and DNS TXT values from the customer's Microsoft 365 configuration.
      summary: Microsoft Azure Put Accounts Accountname
