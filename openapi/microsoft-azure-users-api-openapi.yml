definitions:
  UserIdentity:
    description: Identity attributes of a lab user.
    type: object
    properties:
      principalName:
        description: Set to the principal name / UPN of the client JWT making the request.
        type: string
      principalId:
        description: Set to the principal Id of the client JWT making the request. Service principal will not have the principal Id.
        type: string
      tenantId:
        description: Set to the tenant ID of the client JWT making the request.
        type: string
      objectId:
        description: Set to the object Id of the client JWT making the request. Not all users have object Id. For CSP (reseller) scenarios for example, object Id is not available.
        type: string
      appId:
        description: Set to the app Id of the client JWT making the request.
        type: string
  LatestOperationResult:
    description: Details of the status of an operation.
    type: object
    properties:
      status:
        description: The current status of the operation.
        type: string
        readOnly: true
      errorCode:
        description: Error code on failure.
        type: string
        readOnly: true
      errorMessage:
        description: The error message.
        type: string
        readOnly: true
      requestUri:
        description: Request URI of the operation.
        type: string
        readOnly: true
      httpMethod:
        description: The HttpMethod - PUT/POST/DELETE for the operation.
        type: string
        readOnly: true
      operationUrl:
        description: The URL to use to check long-running operation status
        type: string
        readOnly: true
  ErrorDetails:
    description: The detail information of the error.
    type: object
    properties:
      code:
        type: string
        description: Error code.
      message:
        type: string
        description: Error message details.
      requestId:
        type: string
        description: Correlation Id for current request.
      time:
        type: string
        format: date-time-rfc1123
        description: The time that error request failed.
    required:
    - code
    - message
  UpdateResource:
    description: Represents an update resource
    type: object
    properties:
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
  CloudErrorBody:
    description: An error response from the service.
    type: object
    properties:
      code:
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
        type: string
      message:
        description: A message describing the error, intended to be suitable for display in a user interface.
        type: string
      details:
        description: A list of additional details about the error.
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
        x-ms-identifiers: []
    x-ms-external: true
  User_4:
    description: The User registered to a lab
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        $ref: '#/definitions/UserProperties_3'
        description: These are the properties for the user registered under a lab.
        x-ms-client-flatten: true
  UserProperties:
    description: The user properties.
    required:
    - userType
    type: object
    properties:
      encryptedPassword:
        $ref: '#/definitions/AsymmetricEncryptedSecret'
        description: The password details.
      shareAccessRights:
        description: List of shares that the user has rights on. This field should not be specified during user creation.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/ShareAccessRight'
        x-ms-identifiers:
        - shareId
        readOnly: true
      userType:
        description: Type of the user.
        enum:
        - Share
        - LocalManagement
        - ARM
        type: string
        x-ms-enum:
          name: UserType
          modelAsString: true
  UserCollection:
    description: The paged results of users.
    type: object
    properties:
      value:
        description: The collection of users.
        type: array
        items:
          $ref: '#/definitions/User'
      nextLink:
        description: URL to get the next page of users.
        type: string
    required:
