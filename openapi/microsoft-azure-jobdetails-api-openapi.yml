info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector JobDetails API
schemes:
- https
tags:
- name: JobDetails
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupJobs/{jobName}
  : get:
      tags:
      - JobDetails
      description: Gets extended information associated with the job.
      operationId: microsoftAzureJobdetailsGet
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/VaultName'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/SubscriptionId'
      - name: jobName
        in: path
        description: Name of the job whose details are to be fetched.
        required: true
        type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/JobResource'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        Get Job Details:
          $ref: ./examples/Common/GetJobDetails.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Backupjobs Jobname
