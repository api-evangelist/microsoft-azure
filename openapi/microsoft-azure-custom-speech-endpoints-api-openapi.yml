swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Endpoints: API'
schemes:
- https
tags:
- name: 'Custom Speech Endpoints:'
paths:
  /endpoints/locales:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets A List Of Supported Locales For Endpoint Creations
      operationId: microsoftAzureGetsupportedlocalesforendpoints
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              type: string
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get the supported locales:
          $ref: ./examples/get_supported_endpoint_locales.json
      description: Needs a more full description created.
  /endpoints:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The List Of Endpoints For The Authenticated Subscription
      operationId: microsoftAzureGetendpoints
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Endpoint'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get all endpoints:
          $ref: ./examples/get_endpoints.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Creates A New Endpoint
      operationId: microsoftAzureCreateendpoint
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: endpointDefinition
        description: The details of the endpoint.
        required: true
        schema:
          $ref: '#/definitions/SpeechEndpointDefinition'
      responses:
        '202':
          description: The request was accepted and the response contains the location of the entity.
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
            Location:
              description: The location of the created resource.
              type: string
              format: uri
            Operation-Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Create an endpoint:
          $ref: ./examples/create_endpoint.json
      description: Needs a more full description created.
  /endpoints/{id}:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The Endpoint Identified By The Given Id
      operationId: microsoftAzureGetendpoint
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Endpoint'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get an endpoint:
          $ref: ./examples/get_endpoint.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes The Endpoint Identified By The Given Id
      operationId: microsoftAzureDeleteendpoint
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The model endpoint was successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete an endpoint:
          $ref: ./examples/delete_endpoint.json
      description: Needs a more full description created.
    patch:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Updates The Metadata Of The Endpoint Identified By The Given Id
      operationId: microsoftAzureUpdateendpoint
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: body
        name: endpointUpdate
        description: The updated values for the endpoint.
        required: true
        schema:
          $ref: '#/definitions/EndpointMetadataUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Endpoint'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update an endpoint:
          $ref: ./examples/update_endpoint.json
      description: Needs a more full description created.
  /endpoints/{endpointId}/data:
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes The Transcriptions And Captured Audio Files Associated With The Endpoint Identified By The Given Id
      description: Deletion will happen in the background and can take up to a day.
      operationId: microsoftAzureDeleteendpointdata
      produces:
      - application/json
      parameters:
      - in: path
        name: endpointId
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The endpoint data export tasks were successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete the data for an endpoint:
          $ref: ./examples/delete_endpoint_data.json
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The List Of Endpoint Data Export Tasks For The Authenticated User
      operationId: microsoftAzureGetendpointdataexports
      produces:
      - application/json
      parameters:
      - in: path
        name: endpointId
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/EndpointData'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get all endpoint data exports:
          $ref: ./examples/get_endpoint_data_exports.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Create A New Endpoint Data Export Task
      operationId: microsoftAzureCreateendpointdataexport
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: endpointId
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: body
        name: endpointDataDefinition
        description: The details of the new endpoint data export.
        required: true
        schema:
          $ref: '#/definitions/EndpointDataDefinition'
      responses:
        '202':
          description: The response contains the id of the endpoint data export task in the header.
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
            Location:
              description: The location of the created resource.
              type: string
              format: uri
            Operation-Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Create an endpoint data exports:
          $ref: ./examples/create_endpoint_data_exports.json
      description: Needs a more full description created.
  /endpoints/{endpointId}/data/{id}:
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes The Endpoint Data Export Task Identified By The Given Id
      operationId: microsoftAzureDeleteendpointdataexport
      produces:
      - application/json
      parameters:
      - in: path
        name: endpointId
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: path
        name: id
        description: The identifier of the endpoint data export.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The endpoint data export task was successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete a data export for an endpoint:
          $ref: ./examples/delete_endpoint_data_export.json
      description: Needs a more full description created.
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The Specified Endpoint Data Export Task For The Authenticated User
      operationId: microsoftAzureGetendpointdataexport
      produces:
      - application/json
      parameters:
      - in: path
        name: endpointId
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: path
        name: id
        description: The identifier of the data export.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/EndpointData'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get an endpoint data export:
          $ref: ./examples/get_endpoint_data_export.json
      description: Needs a more full description created.
  /endpoints/{id}/files/logs:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The List Of Audio And Transcription Logs That Have Been Stored For A Given Endpoint
      operationId: microsoftAzureGetendpointlogs
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      - in: query
        name: skipToken
        description: Token to skip logs that were already retrieved in previous requests. Pagination starts from beginning when not defined.
        type: string
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedFiles'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all endpoint logs:
          $ref: ./examples/get_endpoint_logs.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes The Specified Audio And Transcription Logs That Have Been Stored For A Given Endpoint It Deletes All Logs Before And Including A Specific Day
      description: The deletion process is done asynchronously and can take up to one day depending on the amount of log files.
      operationId: microsoftAzureDeleteendpointlogs
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: query
        name: endDate
        description: "The end date of the audio logs deletion (specific day, UTC).\r\n            Expected format: \"yyyy-mm-dd\". For instance, \"2019-09-20\" results in deleting all logs on September 20h, 2019 and before.\r\n            Deletes all existing logs when date is not specified."
        type: string
      responses:
        '202':
          description: The logs will be deleted.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Delete all endpoint logs:
          $ref: ./examples/delete_endpoint_logs.json
  /endpoints/{id}/files/logs/{logId}:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets A Specific Audio Or Transcription Log For A Given Endpoint
      operationId: microsoftAzureGetendpointlog
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: path
        name: logId
        description: The identifier of the log.
        required: true
        type: string
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/File'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get an endpoint log:
          $ref: ./examples/get_endpoint_log.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes One Audio Or Transcription Log That Have Been Stored For A Given Endpoint
      operationId: microsoftAzureDeleteendpointlog
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the endpoint.
        required: true
        type: string
        format: uuid
      - in: path
        name: logId
        description: The identifier of the log.
        required: true
        type: string
      responses:
        '204':
          description: The log was successfully deleted.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Delete an endpoint log:
          $ref: ./examples/delete_endpoint_log.json
      description: Needs a more full description created.
  /endpoints/base/{locale}/files/logs:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets The List Of Audio And Transcription Logs That Have Been Stored When Using The Default Base Model Of A Given Language
      operationId: microsoftAzureGetbasemodellogs
      produces:
      - application/json
      parameters:
      - in: path
        name: locale
        description: The language used to select the default base model.
        required: true
        type: string
      - $ref: '#/parameters/sasValidityQueryParameter'
      - in: query
        name: skipToken
        description: Token to skip logs that were already retrieved in previous requests. Pagination starts from beginning when not defined.
        type: string
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedFiles'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all base model logs:
          $ref: ./examples/get_base_model_logs.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes The Specified Audio And Transcription Logs That Have Been Stored When Using The Default Base Model Of A Given Language It Deletes All Logs Before And Including A Specific Day
      description: Deletion process is done asynchronously and can take up to one day depending on the amount of log files.
      operationId: microsoftAzureDeletebasemodellogs
      produces:
      - application/json
      parameters:
      - in: path
        name: locale
        description: The language used to select the default base model.
        required: true
        type: string
      - in: query
        name: endDate
        description: "The end date of the audio logs deletion (specific day, UTC).\r\n            Expected format: \"yyyy-mm-dd\". For instance, \"2019-09-20\" results in deleting all logs on September 20h, 2019 and before.\r\n            Deletes all existing logs when date is not specified."
        type: string
      responses:
        '202':
          description: The logs will be deleted.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Delete all base model logs:
          $ref: ./examples/delete_base_model_logs.json
  /endpoints/base/{locale}/files/logs/{logId}:
    get:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Gets A Specific Audio Or Transcription Log For The Default Base Model In A Given Language
      operationId: microsoftAzureGetbasemodellog
      produces:
      - application/json
      parameters:
      - in: path
        name: locale
        description: The language used to select the default base model.
        required: true
        type: string
      - in: path
        name: logId
        description: The identifier of the log.
        required: true
        type: string
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/File'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get a base model log:
          $ref: ./examples/get_base_model_log.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Endpoints:'
      summary: Microsoft Azure Deletes One Audio Or Transcription Log That Have Been Stored When Using The Default Base Model Of A Given Language
      operationId: microsoftAzureDeletebasemodellog
      produces:
      - application/json
      parameters:
      - in: path
        name: locale
        description: The language used to select the default base model.
        required: true
        type: string
      - in: path
        name: logId
        description: The identifier of the log.
        required: true
        type: string
      responses:
        '204':
          description: The log was successfully deleted.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Delete a base model log:
          $ref: ./examples/delete_base_model_log.json
      description: Needs a more full description created.
definitions:
  ErrorDetail:
    title: ErrorDetail
    description: An array of implementations of this interface can be used as details for an error.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: "A service-defined error code that should be human-readable.\r\nThis code serves as a more specific indicator of the error than\r\nthe HTTP error code specified in the response."
        type: string
      message:
        description: "A human-readable representation of the error. It is intended as\r\nan aid to developers and is not suitable for exposure to end users."
        type: string
      target:
        description: The target of the particular error (e.g., the name of the property in error).
        type: string
  ModelKind:
    title: ModelKind
    description: Type of speech model.
    enum:
    - Acoustic
    - Language
    - AcousticAndLanguage
    type: string
    x-ms-enum:
      name: ModelKind
      modelAsString: false
      values:
      - value: Acoustic
        description: An acoustic model.
      - value: Language
        description: A language model.
      - value: AcousticAndLanguage
        description: An acoustic and language model.
  Error_2:
    title: Error
    description: "New format which conforms to the new Cognitive Services API guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow.\r\nThis contains an outer error with error code, message, details, target and an inner error with more descriptive details."
    type: object
    properties:
      code:
        $ref: '#/definitions/ErrorCode'
      details:
        description: Additional supportive details regarding the error and/or expected policies.
        type: array
        items:
          $ref: '#/definitions/Error_2'
      message:
        description: High level error message.
        type: string
      target:
        description: "The source of the error.\r\nFor example it would be \"documents\" or \"document id\" in case of invalid document."
        type: string
      innerError:
        $ref: '#/definitions/InnerError'
  File:
    title: File
    type: object
    properties:
      kind:
        $ref: '#/definitions/FileKind'
      links:
        $ref: '#/definitions/FileLinks'
      createdDateTime:
        format: date-time
        description: "The creation time of this file.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/FileProperties'
      name:
        description: The name of this file.
        type: string
        readOnly: true
      self:
        format: uri
        description: The location of this entity.
        type: string
        readOnly: true
  PaginatedFiles:
    title: PaginatedFiles
    type: object
    properties:
      values:
        description: "A list of entities limited by either the passed query parameters 'skip' and 'top' or their default values.\r\n            \r\nWhen iterating through a list using pagination and deleting entities in parallel, some entities will be skipped in the results.\r\nIt's recommended to build a list on the client and delete after the fetching of the complete list."
        type: array
        items:
          $ref: '#/definitions/File'
        readOnly: true
      '@nextLink':
        format: uri
        description: A link to the next set of paginated results if there are more entities available; otherwise null.
        type: string
        readOnly: true
  Model:
    title: Model
    required:
    - id
    - locale
    - modelKind
    - name
    type: object
    properties:
      id:
        format: uuid
        description: The identifier of this entity.
        type: string
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
      modelKind:
        $ref: '#/definitions/ModelKind'
      text:
        description: The text used to adapt this language model.
        type: string
      baseModel:
        $ref: '#/definitions/Model'
      datasets:
        description: Datasets used for adaptation.
        type: array
