definitions:
  SqlVmTroubleshooting:
    description: Details required for SQL VM troubleshooting
    type: object
    properties:
      startTimeUtc:
        format: date-time
        description: Start time in UTC timezone.
        type: string
      endTimeUtc:
        format: date-time
        description: End time in UTC timezone.
        type: string
      troubleshootingScenario:
        description: SQL VM troubleshooting scenario.
        default: UnhealthyReplica
        enum:
        - UnhealthyReplica
        type: string
        x-ms-enum:
          name: TroubleshootingScenario
          modelAsString: true
      properties:
        $ref: '#/definitions/TroubleshootingAdditionalProperties'
        description: Troubleshooting properties
      virtualMachineResourceId:
        description: Virtual machine resource id for response.
        type: string
        readOnly: true
  UnhealthyReplicaInfo:
    description: SQL VM Troubleshoot UnhealthyReplica scenario information.
    type: object
    properties:
      availabilityGroupName:
        description: The name of the availability group
        type: string
  TroubleshootingAdditionalProperties:
    description: SQL VM Troubleshooting additional properties.
    type: object
    properties:
      unhealthyReplicaInfo:
        $ref: '#/definitions/UnhealthyReplicaInfo'
        description: The unhealthy replica information
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    description: API version to use for the request.
    required: true
    type: string
    x-ms-parameter-location: client
  SqlVirtualMachineNameParameter:
    name: sqlVirtualMachineName
    in: path
    description: Name of the SQL virtual machine.
    required: true
    type: string
    maxLength: 64
    minLength: 1
    pattern: ^((?!_)[^\\/"'\[\]:|<>+=;,?*@&]{1,64}(?<![.-]))$
    x-ms-parameter-location: method
  ResourceGroupParameter:
    name: resourceGroupName
    in: path
    description: Name of the resource group that contains the resource. You can obtain this value from the Azure Resource Manager API or the portal.
    required: true
    type: string
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Subscription ID that identifies an Azure subscription.
    required: true
    type: string
    x-ms-parameter-location: client
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
