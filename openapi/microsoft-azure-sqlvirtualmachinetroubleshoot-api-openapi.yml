paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.SqlVirtualMachine/sqlVirtualMachines/{sqlVirtualMachineName}/troubleshoot
  : post:
      tags:
      - SqlVirtualMachineTroubleshoot
      description: Starts SQL virtual machine troubleshooting.
      operationId: microsoftAzureSqlvirtualmachinetroubleshootTroubleshoot
