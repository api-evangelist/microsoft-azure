swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector NameAvailability API
schemes:
- https
tags:
- name: NameAvailability
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.EngagementFabric/checkNameAvailability
  : post:
      tags:
      - NameAvailability
      summary: Microsoft Azure Check Availability Of Engagementfabric Resource
      operationId: microsoftAzureChecknameavailability
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - name: parameters
        in: body
        description: Parameter describing the name to be checked
        required: true
        schema:
          $ref: '#/definitions/CheckNameAvailabilityParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CheckNameAvailabilityResult'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        CheckNameAvailabilityExample:
          $ref: ./examples/CheckNameAvailabilityExample.json
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.VideoIndexer/checkNameAvailability:
    post:
      tags:
      - NameAvailability
      operationId: microsoftAzureAccountsChecknameavailability
      description: Checks that the Video Indexer account name is valid and is not already in use.
      x-ms-examples:
        Check free account name availability:
          $ref: ./examples/ViAccountCheckNameAvailabilityFree.json
        Check taken account name availability:
          $ref: ./examples/ViAccountCheckNameAvailabilityTaken.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ApiVersionParameter
      - name: checkNameAvailabilityParameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/AccountCheckNameAvailabilityParameters'
        description: The name of the Video Indexer account. Name must be unique globally
      responses:
        '200':
          description: OK - Operation to check the Video Indexer account name availability was successful. Ok does not indicate the name is available, the body of the response does.
          schema:
            $ref: '#/definitions/CheckNameAvailabilityResult_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Subscriptions Subscriptionid Providers Microsoft Videoindexer Checknameavailability
