  AccountCheckNameAvailabilityParameters:
    type: object
    properties:
      name:
        type: string
        description: The VideoIndexer account name.
      type:
        type: string
        enum:
        - Microsoft.VideoIndexer/accounts
        x-ms-enum:
          name: Type
          modelAsString: true
        description: The type of resource, Microsoft.VideoIndexer/accounts
    required:
    - name
    - type
    description: The parameters used to check the availability of the Video Indexer account name.
  CheckNameAvailabilityParameter:
    description: The parameter for name availability check
    required:
    - name
    - type
    type: object
    properties:
      name:
        description: The name to be checked
        type: string
      type:
        description: The fully qualified resource type for the name to be checked
        type: string
  CheckNameAvailabilityResult_2:
    type: object
    properties:
      nameAvailable:
        readOnly: true
        type: boolean
        description: Gets a boolean value that indicates whether the name is available for you to use. If true, the name is available. If false, the name has already been taken.
      reason:
        readOnly: true
        type: string
        description: Gets the reason that a Video Indexer account name could not be used. The Reason element is only returned if NameAvailable is false.
        enum:
        - AlreadyExists
        x-ms-enum:
          name: Reason
          modelAsString: true
      message:
        readOnly: true
        type: string
        description: Gets an error message explaining the Reason value in more detail.
    description: The CheckNameAvailability operation response.
  CheckNameUnavailableReason:
    description: The reason of name availability result
    enum:
    - Invalid
    - AlreadyExists
    type: string
    x-ms-enum:
      name: CheckNameUnavailableReason
      modelAsString: true
