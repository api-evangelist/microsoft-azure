        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        StorageAccountListPrivateEndpointConnections:
          $ref: ./examples/PrivateEndpointConnection/list.json
      x-ms-pageable:
