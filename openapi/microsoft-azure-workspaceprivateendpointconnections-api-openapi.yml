      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/WorkspaceNameParameter'
      - $ref: '#/parameters/PrivateEndpointConnectionName'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: The request was successful; the request was well-formed and received properly.
          schema:
            $ref: '#/definitions/PrivateEndpointConnection'
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        WorkspaceGetPrivateEndpointConnection:
          $ref: ./examples/PrivateEndpointConnection/get.json
      description: Needs a more full description created.
    put:
      tags:
      - WorkspacePrivateEndpointConnections
      summary: "Microsoft Azure Called By End Users To Approve Or Reject A Pe Connection \r\nthis Method Must Validate And Forward The Call To Nrp"
      operationId: microsoftAzurePrivateendpointconnectionsCreateorupdate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
