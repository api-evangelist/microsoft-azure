definitions:
  RootCauseAnalysisTrainingResponse:
    required:
    - createdDateTime
    - displayName
    - instanceId
    - kind
    - lastModifiedDateTime
    - modelId
    - status
    - taskId
    type: object
    properties:
      taskId:
        format: uuid
        description: Training task unique id for root cause analysis
        type: string
      instanceId:
        format: uuid
        description: Instance unique id for root cause analysis
        type: string
      modelId:
        format: uuid
        description: Model unique id for root cause analysis
        type: string
      displayName:
        description: Model name for root cause analysis
        type: string
      kind:
        description: kind of root cause analysis
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      status:
        description: Training task status for root cause analysis
        enum:
        - scheduled
        - running
        - succeeded
        - failed
        - canceled
        type: string
        x-ms-enum:
          name: RootCauseAnalysisTrainingStatus
          modelAsString: true
      createdDateTime:
        format: date-time
        description: Training task created date time (UTC)
        type: string
      lastModifiedDateTime:
        format: date-time
        description: Training task state modified date time (UTC)
        type: string
      error:
        $ref: '#/definitions/ErrorDetail'
      taskInfo:
        description: Training task information, if status is failed, this failed will not be shown
      parameter:
        description: Root cause analysis training parameter
  RootCauseAnalysisTrainingRequest:
    required:
    - displayName
    - kind
    - parameter
    type: object
    properties:
      displayName:
        description: Model display name
        type: string
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      parameter:
        description: Parameter for training
    example:
      displayName: Sample Root Cause Analysis Model Name
      kind: multidimensional
      parameter:
        startDateTime: '2021-05-01T00:00:00Z'
        endDateTime: '2021-09-01T00:00:00Z'
  ErrorDetail:
    type: object
    properties:
      message:
        description: Human-readable error message
        type: string
      code:
        description: Error code
        type: string
  RootCauseAnalysisTrainingResponseList:
    required:
    - value
    type: object
    properties:
      nextLink:
        description: Link of next page, only provided when there are next pages
        type: string
      value:
        description: Response values
        type: array
        items:
          $ref: '#/definitions/RootCauseAnalysisTrainingResponse'
  RootCauseAnalysisInferenceResponse:
    required:
    - createdDateTime
    - inferenceId
    - instanceId
    - kind
    - lastModifiedDateTime
    - modelId
    - status
    type: object
    properties:
      inferenceId:
        format: uuid
        description: Inference unique id for root cause analysis
        type: string
      instanceId:
        format: uuid
        description: Instance unique id for root cause analysis
        type: string
      modelId:
        format: uuid
        description: Model unique id for root cause analysis
        type: string
      kind:
        description: Kind of root cause analysis
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      status:
        description: Inference task status for root cause analysis
        enum:
        - scheduled
        - running
        - succeeded
        - failed
        - canceled
        type: string
        x-ms-enum:
          name: RootCauseAnalysisInferenceStatus
          modelAsString: true
      createdDateTime:
        format: date-time
        description: Inference task created date time (UTC)
        type: string
      lastModifiedDateTime:
        format: date-time
        description: Inference task state last modified date time (UTC)
        type: string
      error:
        $ref: '#/definitions/ErrorDetail'
      result:
        description: Root cause analysis inference result, if status is failed, this field wil not be shown
      parameter:
        description: Root cause analysis inference parameter
  RootCauseAnalysisInferenceRequest:
    required:
    - kind
    - parameter
    type: object
    properties:
      kind:
        description: Root cause analysis kind
        enum:
        - multidimensional
        type: string
        x-ms-enum:
          name: RootCauseAnalysisType
          modelAsString: true
      parameter:
        description: Parameter for inference
    example:
      kind: multidimensional
      parameter:
        timestamp: '2021-06-04T00:00:00Z'
        dimensionScope: {}
