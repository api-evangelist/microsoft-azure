swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector VaultUsages API
schemes:
- https
tags:
- name: VaultUsages
paths:
  ? /Subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/usages
  : get:
      tags:
      - VaultUsages
      description: Fetches the usages of the vault.
      operationId: microsoftAzureUsagesListbyvaults
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/SubscriptionId'
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ResourceGroupName'
      - $ref: '#/parameters/VaultName'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/VaultUsageList'
      deprecated: false
      x-ms-pageable:
        nextLinkName: null
      x-ms-examples:
        Gets vault usages:
          $ref: ./examples/ListUsages.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Recoveryservices Vaults Vaultname Usages
definitions:
  VaultUsageList:
    description: Usage for vault.
    type: object
    properties:
      value:
        description: The list of usages for the given vault.
        type: array
        items:
          $ref: '#/definitions/VaultUsage'
        x-ms-identifiers:
        - name
  VaultUsage:
    description: Usages of a vault.
    type: object
    properties:
      unit:
        description: Unit of the usage.
        enum:
        - Count
        - Bytes
        - Seconds
        - Percent
        - CountPerSecond
        - BytesPerSecond
        type: string
        x-ms-enum:
          name: UsagesUnit
          modelAsString: true
      quotaPeriod:
        description: Quota period of usage.
        type: string
      nextResetTime:
        format: date-time
        description: Next reset time of usage.
        type: string
      currentValue:
        format: int64
        description: Current value of usage.
        type: integer
      limit:
        format: int64
        description: Limit of usage.
        type: integer
      name:
        $ref: '#/definitions/NameInfo'
        description: Name of usage.
  NameInfo:
    description: The name of usage.
    type: object
    properties:
      value:
        description: Value of usage.
        type: string
      localizedValue:
        description: Localized value of usage.
        type: string
parameters:
  ResourceGroupName:
    name: resourceGroupName
    in: path
    description: The name of the resource group where the recovery services vault is present.
    required: true
    x-ms-parameter-location: method
    type: string
  VaultName:
    name: vaultName
    in: path
    description: The name of the recovery services vault.
    required: true
    x-ms-parameter-location: method
    type: string
  ApiVersion:
    name: api-version
    in: query
    description: Client Api Version.
    required: true
    type: string
  SubscriptionId:
    name: subscriptionId
    in: path
    description: The subscription Id.
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
