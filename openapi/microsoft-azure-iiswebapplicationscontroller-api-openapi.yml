swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector IisWebApplicationsController API
schemes:
- https
tags:
- name: IisWebApplicationsController
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/masterSites/{siteName}/webAppSites/{webAppSiteName}/iisWebApplications
  : get:
      operationId: microsoftAzureIiswebapplicationscontrollerListbywebappsite
      tags:
      - IisWebApplicationsController
      description: Method to get all IIS web application.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - name: filter
        in: query
        description: filter query
        required: false
        type: string
      - name: top
        in: query
        description: page size  query
        required: false
        type: string
      - name: continuationToken
        in: query
        description: Optional parameter for continuation token.
        required: false
        type: string
      - name: totalRecordCount
        in: query
        description: Total count of machines in the given site.
        required: false
        type: integer
        format: int32
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webAppSiteName
        in: path
        description: Web app site name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/IisWebApplicationsListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        IisWebApplicationsController_ListByWebAppSite_MaximumSet_Gen:
          $ref: ./examples/IisWebApplicationsController_ListByWebAppSite_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Mastersites Sitename Webappsites Webappsitename Iiswebapplications
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/masterSites/{siteName}/webAppSites/{webAppSiteName}/iisWebApplications/{webApplicationName}
  : get:
      operationId: microsoftAzureIiswebapplicationscontrollerGet
      tags:
      - IisWebApplicationsController
      description: Method to get an IIS web application.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webAppSiteName
        in: path
        description: Web app site name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webApplicationName
        in: path
        description: Web application name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/IisWebApplications'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        IisWebApplicationsController_Get_MaximumSet_Gen:
          $ref: ./examples/IisWebApplicationsController_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Mastersites Sitename Webappsites Webappsitename Iiswebapplications Webapplicationname
    patch:
      operationId: microsoftAzureIiswebapplicationscontrollerUpdate
      tags:
      - IisWebApplicationsController
      description: Method to update tags on IIS web application.
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webAppSiteName
        in: path
        description: Web app site name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: webApplicationName
        in: path
        description: Web application name.
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: body
        in: body
        description: The resource properties to be updated.
        required: true
        schema:
          $ref: '#/definitions/IisWebApplicationsUpdate'
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/IisWebApplications'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        IisWebApplicationsController_Update_MaximumSet_Gen:
          $ref: ./examples/IisWebApplicationsController_Update_MaximumSet_Gen.json
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Mastersites Sitename Webappsites Webappsitename Iiswebapplications Webapplicationname
definitions:
  HealthErrorDetails:
    type: object
    description: Error contract returned when some exception occurs in Rest API.
    properties:
      message:
        type: string
        description: Gets the error message.
        readOnly: true
      messageParameters:
        type: object
        description: Gets the message parameters.
        additionalProperties:
          type: string
        readOnly: true
      applianceName:
        type: string
        description: Gets the appliance name.
        readOnly: true
      id:
        type: integer
        format: int64
        description: Gets the error ID.
        readOnly: true
      code:
        type: string
        description: Gets the error name.
        readOnly: true
      possibleCauses:
        type: string
        description: Gets the possible causes of error.
        readOnly: true
      recommendedAction:
        type: string
        description: Gets the recommended action to resolve error.
        readOnly: true
      severity:
        type: string
        description: Gets the error severity.
        readOnly: true
      summaryMessage:
        type: string
        description: Gets the error summary message.
        readOnly: true
      source:
        $ref: '#/definitions/HealthErrorDetailsSource'
        description: Gets the error source.
        readOnly: true
      updatedTimeStamp:
        type: string
        format: date-time
        description: Gets the time stamp when the error was updated.
        readOnly: true
      runAsAccountId:
        type: string
        description: Gets run as account id used while performing discovery             of entity.
        readOnly: true
      discoveryScope:
        $ref: '#/definitions/HealthErrorDetailsDiscoveryScope'
        description: Gets discovery scope for which             error is encountered.
        readOnly: true
  IisWebApplicationsListResult:
    type: object
    description: The response of a IisWebApplications list operation.
    properties:
      value:
        type: array
        description: The IisWebApplications items on this page
        items:
          $ref: '#/definitions/IisWebApplications'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  WebApplicationConfigurationUnit:
    type: object
    description: Web Application configuration unit.
    properties:
      name:
        type: string
        description: Gets or sets the configuration name.
      filePath:
        type: string
        description: Gets or sets the configuration file path.
      localFilePath:
        type: string
        description: Gets or sets the configuration local file path.
      targetFilePath:
        type: string
        description: Gets or sets the configuration target file path.
      section:
        type: string
        description: Gets or sets the configuration section in the file.
      type:
        type: string
        description: Gets or sets the configuration type.
      isDeploymentTimeEditable:
        type: boolean
        description: 'Gets or sets a value indicating whether the configuration is edited or not by

          the user.'
      identifier:
        type: string
        description: Gets or sets the identifier for the configuration.
  WebApplicationFramework:
    type: object
    description: Framework specific data for a web application.
    properties:
      name:
        type: string
        description: Gets or sets Name of the framework.
      version:
        type: string
        description: Gets or sets Version of the framework.
  DirectoryPath:
    type: object
    description: Second level entity for virtual directories.
    properties:
      virtual:
        type: string
        description: Gets or sets the virtual path for the directory.
      physical:
        type: string
        description: Gets or sets the physical path of the directory on the web server.
  IisWebApplicationProperties:
    type: object
    description: Class for web application properties.
    properties:
      applications:
        type: array
        description: Gets the list of application units for the web site.
        items:
          $ref: '#/definitions/IisApplicationUnit'
        readOnly: true
        x-ms-identifiers: []
      virtualApplications:
        type: array
        description: Gets the list of application units for the web site.
        items:
          $ref: '#/definitions/IisVirtualApplicationUnit'
        readOnly: true
        x-ms-identifiers: []
      webServerId:
        type: string
        description: Gets the web server id.
        readOnly: true
      webServerName:
        type: string
        description: Gets the web server name.
        readOnly: true
      machineArmIds:
        type: array
        description: Gets the list of machine ARM Ids on which the SQL server is deployed.
        items:
          type: string
        readOnly: true
      virtualPath:
        type: string
        description: Gets the virtual path of the application.
        readOnly: true
      physicalPath:
        type: string
        description: Gets the physical path of the application.
        readOnly: true
      bindings:
        type: array
        description: Gets the front end bindings for the application.
        items:
          $ref: '#/definitions/FrontEndBinding'
        readOnly: true
        x-ms-identifiers: []
      frameworks:
        type: array
        description: Gets the Error details.
        items:
          $ref: '#/definitions/WebApplicationFramework'
        readOnly: true
        x-ms-identifiers: []
      configurations:
        type: array
        description: Gets the configuration.
        items:
          $ref: '#/definitions/WebApplicationConfigurationUnit'
        readOnly: true
        x-ms-identifiers: []
      directories:
        type: array
        description: Gets the directories.
        items:
          $ref: '#/definitions/WebApplicationDirectoryUnit'
        readOnly: true
        x-ms-identifiers: []
      displayName:
        type: string
        description: Gets the display name.
        readOnly: true
      tags:
        type: object
        description: Gets or sets tags on the resource.
        additionalProperties:
          type: string
      staticFolders:
        type: array
        description: Static folders.
        items:
          type: string
        readOnly: true
      machineDisplayName:
        type: string
        description: Machine display name
        readOnly: true
      isDeleted:
        type: boolean
        description: Gets a value indicating whether application is deleted.
        readOnly: true
      createdTimestamp:
        type: string
        description: Gets the timestamp marking creation of the entity.
        readOnly: true
      updatedTimestamp:
        type: string
        description: Gets the timestamp marking last update operation.
        readOnly: true
      serverType:
        type: string
        description: Gets the server type.
        readOnly: true
      errors:
        type: array
        description: Gets the Error details.
        items:
          $ref: '#/definitions/HealthErrorDetails'
        readOnly: true
      applianceNames:
        type: array
        description: Gets the appliance names.
        items:
          type: string
        readOnly: true
      hasErrors:
        type: boolean
        description: Gets a value indicating whether the WebApp has errors or not.
        readOnly: true
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: provisioning state enum
        readOnly: true
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Created
    - Updated
    - Running
    - Completed
    - Failed
    - Succeeded
    - Canceled
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Created
        value: Created
        description: Created value.
      - name: Updated
        value: Updated
        description: Updated value.
      - name: Running
        value: Running
        description: Running value.
      - name: Completed
        value: Completed
        description: Completed value.
      - name: Failed
        value: Failed
        description: Failed value.
      - name: Succeeded
        value: Succeeded
        description: Succeeded value.
      - name: Canceled
        value: Canceled
        description: Canceled value.
  HealthErrorDetailsDiscoveryScope:
    type: string
    description: Gets discovery scope for which             error is encountered.
    enum:
    - AppsAndRoles
    - DependencyMap
    - StaticData
    - SQLServerConnectionInfo
    - DiscoveryTargets
    x-ms-enum:
      name: HealthErrorDetailsDiscoveryScope
      modelAsString: true
      values:
      - name: AppsAndRoles
        value: AppsAndRoles
        description: AppsAndRoles value.
      - name: DependencyMap
        value: DependencyMap
        description: DependencyMap value.
      - name: StaticData
        value: StaticData
        description: StaticData value.
      - name: SQLServerConnectionInfo
        value: SQLServerConnectionInfo
        description: SQLServerConnectionInfo value.
      - name: DiscoveryTargets
        value: DiscoveryTargets
        description: DiscoveryTargets value.
  WebApplicationDirectoryUnit:
    type: object
    description: Web Application directory unit.
    properties:
      id:
        type: string
        description: Gets or sets the unique id corresponding to the application directory.
      isEditable:
        type: boolean
        description: "Gets or sets a value indicating whether the directory object is editable.\n     \n      True when the directory is added as an optional directory, false when\ndiscovery is done\n            manually."
      sourcePaths:
        type: array
        description: Gets or sets the paths of the directory on the source machine.
        items:
          type: string
      localScratchPath:
        type: string
        description: Gets or sets the local scratch path at which the directories has been copied.
      mountPath:
        type: string
        description: Gets or sets the mount path of the application directory.
      sourceSize:
        type: string
        description: Gets or sets the size of the directory on the source machine.
  FrontEndBinding:
    type: object
    description: Frontend bindings for a web application.
    properties:
      protocol:
        type: string
        description: Gets or sets the Binding protocol.
      hostName:
        type: string
        description: Gets or sets the Host name.
      port:
        type: string
        description: Gets or sets the Port number.
      ipAddress:
        type: string
        description: Gets or sets the IP Address.
  IisApplicationUnit:
    type: object
    description: 'Second-level object for identification of application units in a web site

      hosted on IIS.'
    properties:
      applicationPoolName:
        type: string
        description: Gets or sets the path of the directory.
      managedPipelineMode:
        type: string
        description: Gets or sets the managed pipeline mode.
      runtimeVersion:
        type: string
        description: Gets or sets the runtime version.
      enable32BitApiOnWin64:
        type: boolean
        description: 'Gets or sets a value indicating whether 32 bit applications are allowed to run

          on 64 bit.'
      path:
        $ref: '#/definitions/DirectoryPath'
        description: Gets or sets the path of the directory.
      directories:
        type: array
        description: Gets or sets the list of directories.
        items:
          $ref: '#/definitions/DirectoryPath'
        x-ms-identifiers: []
  IisWebApplicationsUpdate:
    type: object
    description: The type used for update operations of the IisWebApplications.
    properties:
      properties:
        $ref: '#/definitions/IisWebApplicationsUpdateProperties'
        x-ms-client-flatten: true
  IisVirtualApplicationUnit:
    type: object
    description: 'Second-level object for identification of virtual applications in a web site

      hosted on IIS.'
    properties:
      isVirtualDirectory:
        type: boolean
        description: Gets a value indicating whether the application corresponds to a directory.
        readOnly: true
      path:
        $ref: '#/definitions/DirectoryPath'
        description: Gets or sets the path of the directory.
      directories:
        type: array
        description: Gets or sets the list of directories.
        items:
          $ref: '#/definitions/DirectoryPath'
        x-ms-identifiers: []
  IisWebApplicationsUpdateProperties:
    type: object
    description: The updatable properties of the IisWebApplications.
    properties:
      tags:
        type: object
        description: Gets or sets tags on the resource.
        additionalProperties:
          type: string
  HealthErrorDetailsSource:
    type: string
    description: HealthError Details Source
    enum:
    - RefreshFabricLayout
    - RefreshFabricLayoutGuest
    - RefreshFabricLayoutDependencyMap
    x-ms-enum:
      name: HealthErrorDetailsSource
      modelAsString: true
      values:
      - name: RefreshFabricLayout
        value: RefreshFabricLayout
        description: RefreshFabricLayout value.
      - name: RefreshFabricLayoutGuest
        value: RefreshFabricLayoutGuest
        description: RefreshFabricLayoutGuest value.
      - name: RefreshFabricLayoutDependencyMap
        value: RefreshFabricLayoutDependencyMap
        description: RefreshFabricLayoutDependencyMap value.
  IisWebApplications:
    type: object
    description: Web application REST Resource.
    properties:
      properties:
        $ref: '#/definitions/IisWebApplicationProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
