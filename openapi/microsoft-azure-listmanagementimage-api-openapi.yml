swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ListManagementImage API
schemes:
- https
tags:
- name: ListManagementImage
paths:
  /contentmoderator/lists/v1.0/imagelists/{listId}/images:
    post:
      tags:
      - ListManagementImage
      operationId: microsoftAzureListmanagementimageAddimage
      description: Add an image to the list with listId equal to the passed list ID.
      parameters:
      - $ref: '#/parameters/listId'
      - $ref: '#/parameters/tag'
      - $ref: '#/parameters/label'
      consumes:
      - application/json
      - image/gif
      - image/jpeg
      - image/png
      - image/bmp
      - image/tiff
      responses:
        '200':
          description: OK.
          schema:
            $ref: '#/definitions/Image'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/APIError'
      x-ms-examples:
        Add Image request:
          $ref: ./examples/AddImageResource.JSON
      produces:
      - application/json
      summary: Microsoft Azure Post Contentmoderator Lists 0 Imagelists Listid Images
    delete:
      tags:
      - ListManagementImage
      operationId: microsoftAzureListmanagementimageDeleteallimages
      description: Deletes all images from the list with listId equal to the passed list ID.
      parameters:
      - $ref: '#/parameters/listId'
      responses:
        '200':
          description: OK.
          schema:
            type: string
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/APIError'
      x-ms-examples:
        Delete All Images request:
          $ref: ../v1.0/examples/DeleteAllImagesResource.JSON
      produces:
      - application/json
      summary: Microsoft Azure Delete Contentmoderator Lists 0 Imagelists Listid Images
    get:
      tags:
      - ListManagementImage
      operationId: microsoftAzureListmanagementimageGetallimageids
      description: Gets all image IDs from the list with listId equal to the passed list ID.
      parameters:
      - $ref: '#/parameters/listId'
      responses:
        '200':
          description: OK.
          schema:
            $ref: '#/definitions/ImageIds'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/APIError'
      x-ms-examples:
        Get All Image Ids request:
          $ref: ../v1.0/examples/GetAllImageIdsResource.JSON
      produces:
      - application/json
      summary: Microsoft Azure Get Contentmoderator Lists 0 Imagelists Listid Images
  /contentmoderator/lists/v1.0/imagelists/{listId}/images/{ImageId}:
    delete:
      tags:
      - ListManagementImage
      operationId: microsoftAzureListmanagementimageDeleteimage
      description: Deletes an image from the list with the passed list ID and image ID.
      parameters:
      - $ref: '#/parameters/listId'
      - $ref: '#/parameters/ImageId'
      responses:
        '200':
          description: OK.
          schema:
            type: string
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/APIError'
      x-ms-examples:
        Delete Image request:
          $ref: ../v1.0/examples/DeleteImageResource.JSON
      produces:
      - application/json
      summary: Microsoft Azure Delete Contentmoderator Lists 0 Imagelists Listid Images Imageid
definitions:
  Image:
    description: Image properties.
    properties:
      ContentId:
        description: Content ID.
        type: string
      AdditionalInfo:
        description: Advanced info list.
        type: array
        items:
          type: object
          properties:
            Key:
              description: Key parameter.
              type: string
            Value:
              description: Value parameter.
              type: string
      Status:
        description: Status details.
        $ref: '#/definitions/Status'
      TrackingId:
        description: Tracking ID.
        type: string
  ImageIds:
    description: Image ID properties.
    properties:
      ContentSource:
        description: Source of the content.
        type: string
      ContentIds:
        description: ID of the content.
        type: array
        items:
          type: integer
      Status:
        description: Get Image status.
        type: object
        $ref: '#/definitions/Status'
      TrackingId:
        description: Tracking ID.
        type: string
  APIError:
    type: object
    description: Error information that the API returns.
    properties:
      Error:
        $ref: '#/definitions/Error'
  Status:
    description: Status properties.
    properties:
      Code:
        description: Status code.
        type: integer
      Description:
        description: Status description.
        type: string
      Exception:
        description: Exception status.
        type: string
  Error:
    type: object
    description: Error body.
    properties:
      Code:
        type: string
      Message:
        type: string
parameters:
  label:
    name: label
    in: query
    description: Image label.
    type: string
    required: false
    x-ms-parameter-location: method
  tag:
    name: tag
    in: query
    description: Tag for the image.
    type: integer
    required: false
    x-ms-parameter-location: method
  listId:
    name: listId
    in: path
    description: List ID of the image list.
    required: true
    type: string
    x-ms-parameter-location: method
  ImageId:
    name: ImageId
    in: path
    description: Image ID.
    required: true
    type: string
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
