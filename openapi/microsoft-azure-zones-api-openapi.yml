definitions:
  ZoneMetaData:
    description: Api Model for Zone object.
    type: object
    properties:
      partyId:
        description: Party Id associated with the Zone.
        type: string
        readOnly: true
      type:
        description: Type of the Zone.
        maxLength: 100
        minLength: 0
        type: string
      managementZoneId:
        description: Management Zone Id associated with the Zone.
        type: string
      id:
        description: Unique resource ID.
        type: string
        readOnly: true
      eTag:
        description: The ETag value to implement optimistic concurrency.
        type: string
        readOnly: true
      status:
        description: Status of the resource.
        maxLength: 100
        minLength: 0
        type: string
      createdDateTime:
        format: date-time
        description: 'Date-time when resource was created, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      modifiedDateTime:
        format: date-time
        description: 'Date-time when resource was last modified, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      source:
        description: Source of the resource.
        maxLength: 100
        minLength: 2
        type: string
      name:
        description: Name to identify resource.
        maxLength: 100
        minLength: 0
        type: string
      description:
        description: Textual description of the resource.
        maxLength: 500
        minLength: 0
        type: string
      createdBy:
        description: Created by user/tenant id.
        type: string
        readOnly: true
      modifiedBy:
        description: Modified by user/tenant id.
        type: string
        readOnly: true
      properties:
        description: "A collection of key value pairs that belongs to the resource.\r\nEach pair must not have a key greater than 50 characters\r\nand must not have a value greater than 150 characters.\r\nNote: A maximum of 25 key value pairs can be provided for a resource and only string,\r\nnumeral and datetime (yyyy-MM-ddTHH:mm:ssZ) values are supported."
        type: object
        additionalProperties: {}
        example:
          key1: value1
          key2: 123.45
  ZoneProperties:
    type: object
    properties:
      maxNumberOfRecordSets:
        type: integer
        format: int64
        description: The maximum number of record sets that can be created in this DNS zone.  This is a read-only property and any attempt to set this value will be ignored.
        readOnly: true
      maxNumberOfRecordsPerRecordSet:
        type: integer
        format: int64
        description: The maximum number of records per record set that can be created in this DNS zone.  This is a read-only property and any attempt to set this value will be ignored.
        readOnly: true
      numberOfRecordSets:
        type: integer
        format: int64
        description: The current number of record sets in this DNS zone.  This is a read-only property and any attempt to set this value will be ignored.
        readOnly: true
      nameServers:
        type: array
        x-ms-identifiers: []
        items:
          type: string
        description: The name servers for this DNS zone. This is a read-only property and any attempt to set this value will be ignored.
        readOnly: true
      zoneType:
        type: string
        enum:
        - Public
        - Private
        x-ms-enum:
          name: ZoneType
          modelAsString: false
        default: Public
        description: The type of this DNS zone (Public or Private).
      registrationVirtualNetworks:
        type: array
        x-ms-identifiers: []
        items:
          $ref: '#/definitions/SubResource'
        description: A list of references to virtual networks that register hostnames in this DNS zone. This is a only when ZoneType is Private.
      resolutionVirtualNetworks:
        type: array
        x-ms-identifiers: []
        items:
          $ref: '#/definitions/SubResource'
        description: A list of references to virtual networks that resolve records in this DNS zone. This is a only when ZoneType is Private.
      signingKeys:
        type: array
        x-ms-identifiers: []
        items:
          $ref: '#/definitions/SigningKey'
        description: The list of signing keys.
        readOnly: true
    description: Represents the properties of the zone.
  CloudErrorBody:
    type: object
    x-ms-external: true
    properties:
      code:
        type: string
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
