swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Images API
schemes:
- https
tags:
- name: Images
paths:
  /chat/threads/{chatThreadId}/images:
    post:
      tags:
      - Images
      summary: Microsoft Azure Upload An Image In A Thread, On Behalf Of A User
      operationId: microsoftAzureChatthreadUploadchatimage
      consumes:
      - application/octet-stream
      produces:
      - application/json
      parameters:
      - in: header
        name: image-filename
        description: The file name of the image.
        required: false
        type: string
      - in: path
        name: chatThreadId
        description: Thread id where the uploaded image belongs to. (Teams meeting only)
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      - in: body
        name: chatImageFile
        description: 'Image binary data, allowed image formats: jpeg, png, gif, heic, webp'
        required: true
        schema:
          $ref: '#/definitions/ChatImageFile'
      responses:
        '201':
          description: Uploaded successfully, the `Location` header contains the URL for the newly uploaded image.
          schema:
            $ref: '#/definitions/UploadChatImageResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Upload Image:
          $ref: ./examples/Images_UploadChatImage.json
      description: Needs a more full description created.
  /chat/threads/{chatThreadId}/images/{imageId}/view/{imageViewType}:
    get:
      tags:
      - Images
      summary: Microsoft Azure Get An Image By View Type
      operationId: microsoftAzureChatthreadGetchatimage
      produces:
      - application/json
      - image/gif
      - image/jpeg
      - image/png
      - image/bmp
      - image/tiff
      parameters:
      - in: path
        name: chatThreadId
        description: The thread id to which the message was sent.
        required: true
        type: string
      - in: path
        name: imageId
        description: The image id.
        required: true
        type: string
      - in: path
        name: imageViewType
        description: The view type of image.
        required: true
        enum:
        - original
        - small
        type: string
        x-ms-enum:
          name: ImageViewType
          modelAsString: true
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Image binary data
          schema:
            $ref: '#/definitions/ChatImageFile'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Delete message:
          $ref: ./examples/Images_GetChatImage.json
      description: Needs a more full description created.
  /chat/threads/{chatThreadId}/images/{imageId}:
    delete:
      tags:
      - Images
      summary: Microsoft Azure Deletes A Image
      operationId: microsoftAzureChatthreadDeletechatimage
      produces:
      - application/json
      parameters:
      - in: path
        name: chatThreadId
        description: The thread id to which the message was sent.
        required: true
        type: string
      - in: path
        name: imageId
        description: The image id.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '204':
          description: Request successful.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Delete message:
          $ref: ./examples/Images_DeleteChatImage.json
      description: Needs a more full description created.
  /images/generations:submit:
    post:
      summary: Microsoft Azure Generates A Batch Of Images From A Text Caption
      operationId: microsoftAzureImagesGenerate
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/apiVersionQueryParameter'
      - in: header
        name: Operation-Id
        description: ID of the status monitor for the operation. If the Operation-Id header matches an existing operation and the request is not identical to the prior request, it will fail with a 400 Bad Request.
        type: string
        format: uuid
      - in: body
        name: body
        description: The specification of the images that should be generated.
        required: true
        schema:
          $ref: '#/definitions/GenerateImagesCreation'
      responses:
        '202':
          description: Accepted
          headers:
            operation-location:
              type: string
              format: url
              description: URL to poll for the operation result.
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
          schema:
            $ref: '#/definitions/GenerateImagesResponse'
        default:
          description: An error occurred.
          headers:
            x-ms-error-code:
              type: string
              description: The error code indicating what went wrong.
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
      x-ms-long-running-operation: true
      x-ms-examples:
        Creating an image generation operation.:
          $ref: ./examples/post_images_generate.json
      description: Needs a more full description created.
      tags:
      - Images
  /operations/images/{operation-id}:
    get:
      summary: Microsoft Azure Returns The Status Of The Images Operation
      operationId: microsoftAzureOperationsimagesGet
      tags:
      - Images
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/apiVersionQueryParameter_4'
      - in: path
        name: operation-id
        required: true
        type: string
        format: uuid
        description: The id of the operation
      responses:
        '200':
          description: OK
          headers:
            retry-after:
              type: integer
              format: int32
              description: Indicates the number of seconds that the client should wait before executing another GET request if the operation did not terminate yet.
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
          schema:
            $ref: '#/definitions/OperationResponse'
        default:
          description: An error occurred.
          headers:
            x-ms-error-code:
              type: string
              description: The error code indicating what went wrong.
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
          schema:
            $ref: '#/definitions/ErrorResponse_5'
      x-ms-examples:
        Getting the result of a specific operation.:
          $ref: ./examples/get_images_operation.json
      description: Needs a more full description created.
    delete:
      summary: Microsoft Azure Deletes An Operation If In Terminal State And All Generated And User Provided Images Associated With The Operation
      operationId: microsoftAzureOperationsimagesDelete
      tags:
      - Images
      parameters:
      - $ref: '#/parameters/apiVersionQueryParameter_4'
      - in: path
        name: operation-id
        required: true
        type: string
        format: uuid
        description: The id of the operation
      responses:
        '204':
          description: NoContent
          headers:
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
        default:
          description: An error occurred.
          headers:
            x-ms-error-code:
              type: string
              description: The error code indicating what went wrong.
            x-ms-request-id:
              type: string
              format: uuid
              description: Service generated correlation id identifying the request, in the form of a GUID.
          schema:
            $ref: '#/definitions/ErrorResponse_5'
      x-ms-examples:
        Deleting a specific operation.:
          $ref: ./examples/delete_images_operation.json
      description: Needs a more full description created.
  /deployments/{deployment-id}/images/generations:
    post:
      operationId: ImageGenerations_Create
      summary: Microsoft Azure Create Image Generations
      description: Creates an image given a prompt using DALL-E models.
      tags:
      - Images
      parameters:
      - $ref: '#/components/parameters/DeploymentIdParameter'
      - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
            examples:
              ImagegenerationsCreateRequestExample:
                summary: Default ImageGenerations_Create request
                x-microcks-default: true
                value:
                  prompt: example_value
                  n: 10
                  size: 256x256
                  quality: standard
                  style: natural
                  response_format: url
                  user: example_value
      responses:
        '200':
          description: Successfully created image generations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationsResponse'
              examples:
                ImagegenerationsCreate200Example:
                  summary: Default ImageGenerations_Create 200 response
                  x-microcks-default: true
                  value:
                    created: 10
                    data:
                    - url: https://www.example.com
                      b64_json: example_value
                      revised_prompt: example_value
        default:
          description: An error occurred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ImagegenerationsCreatedefaultExample:
                  summary: Default ImageGenerations_Create default response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      param: example_value
                      type: example_value
                      inner_error:
                        code: example_value
                        content_filter_result: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.AzureSphere/catalogs/{catalogName}/images
  : get:
      operationId: microsoftAzureImagesListbycatalog
      tags:
      - Images
      description: List Image resources by Catalog
      parameters:
      - $ref: '#/parameters/CustomFilterQueryParameter'
      - $ref: '#/parameters/CustomTopQueryParameter'
      - $ref: '#/parameters/CustomSkipQueryParameter'
      - $ref: '#/parameters/CustomMaxPageSizeQueryParameter'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: catalogName
        in: path
        description: Name of catalog
        required: true
        type: string
        pattern: ^[A-Za-z0-9_-]{1,50}$
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/ImageListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Images_ListByCatalog:
          $ref: ./examples/GetImages.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azuresphere Catalogs Catalogname Images
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.AzureSphere/catalogs/{catalogName}/images/{imageName}
  : get:
      operationId: microsoftAzureImagesGet
      tags:
      - Images
      description: Get a Image
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: catalogName
        in: path
        description: Name of catalog
        required: true
        type: string
        pattern: ^[A-Za-z0-9_-]{1,50}$
      - name: imageName
        in: path
        description: Image name. Use an image GUID for GA versions of the API.
        required: true
        type: string
      responses:
        '200':
          description: Azure operation completed successfully.
          schema:
            $ref: '#/definitions/Image'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Images_Get:
          $ref: ./examples/GetImage.json
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azuresphere Catalogs Catalogname Images Imagename
    put:
      operationId: microsoftAzureImagesCreateorupdate
      tags:
      - Images
      description: Create a Image
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: catalogName
        in: path
        description: Name of catalog
        required: true
        type: string
        pattern: ^[A-Za-z0-9_-]{1,50}$
      - name: imageName
        in: path
        description: Image name. Use an image GUID for GA versions of the API.
        required: true
        type: string
      - name: resource
        in: body
        description: Resource create parameters.
        required: true
        schema:
          $ref: '#/definitions/Image'
      responses:
        '200':
          description: Resource 'Image' update operation succeeded
          schema:
            $ref: '#/definitions/Image'
        '201':
          description: Resource 'Image' create operation succeeded
          schema:
            $ref: '#/definitions/Image'
          headers:
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Image_CreateOrUpdate:
          $ref: ./examples/PutImage.json
      x-ms-long-running-operation-options:
        final-state-via: azure-async-operation
      x-ms-long-running-operation: true
      summary: Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azuresphere Catalogs Catalogname Images Imagename
    delete:
      operationId: microsoftAzureImagesDelete
      tags:
      - Images
      description: Delete a Image
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: catalogName
        in: path
        description: Name of catalog
        required: true
        type: string
        pattern: ^[A-Za-z0-9_-]{1,50}$
      - name: imageName
        in: path
        description: Image name. Use an image GUID for GA versions of the API.
        required: true
        type: string
      responses:
        '200':
          description: Resource deleted successfully.
        '202':
          description: Resource deletion accepted.
          headers:
            Location:
              type: string
              description: The Location header contains the URL where the status of the long running operation can be checked.
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
        '204':
          description: Resource does not exist.
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        Images_Delete:
          $ref: ./examples/DeleteImage.json
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-long-running-operation: true
      summary: Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Azuresphere Catalogs Catalogname Images Imagename
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/images/getEntityTypeImageUploadUrl
  : post:
      tags:
