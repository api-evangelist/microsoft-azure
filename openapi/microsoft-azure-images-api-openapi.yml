components:
  parameters:
    DeploymentIdParameter:
      name: deployment-id
      in: path
      required: true
      description: The deployment ID of the model to use for this request.
      schema:
        type: string
    ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: The API version to use for this operation.
      schema:
        type: string
        default: '2024-06-01'
  schemas:
    ImageGenerationsResponse:
      type: object
      description: Response from the image generations API.
      properties:
        created:
          type: integer
          description: The Unix timestamp of when the images were created.
          example: 10
        data:
          type: array
          description: The list of generated images.
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
                description: The URL of the generated image.
              b64_json:
                type: string
                description: The base64-encoded JSON of the generated image.
              revised_prompt:
                type: string
                description: The revised prompt that was used to generate the image.
          example: []
      required:
      - created
      - data
    CreateImageRequest:
      type: object
      description: Request body for creating image generations.
      properties:
        prompt:
          type: string
          description: A text description of the desired image(s).
          maxLength: 4000
          example: example_value
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
          description: The number of images to generate.
          example: 10
        size:
          type: string
          enum:
          - 256x256
          - 512x512
          - 1024x1024
          - 1792x1024
          - 1024x1792
          default: 1024x1024
          description: The size of the generated images.
          example: 256x256
        quality:
          type: string
          enum:
          - standard
          - hd
          default: standard
          description: The quality of the image that will be generated.
          example: standard
        style:
          type: string
          enum:
          - natural
          - vivid
          default: vivid
          description: The style of the generated images.
          example: natural
        response_format:
          type: string
          enum:
          - url
          - b64_json
          default: url
          description: The format in which the generated images are returned.
          example: url
        user:
          type: string
          description: A unique identifier representing your end-user.
          example: example_value
      required:
      - prompt
    ErrorResponse:
      type: object
      description: Error response.
      properties:
        error:
          type: object
          description: The error object.
          properties:
            code:
              type: string
              description: The error code.
            message:
              type: string
              description: The error message.
            param:
              type: string
              description: The parameter that caused the error.
            type:
              type: string
              description: The error type.
            inner_error:
              type: object
              description: Inner error details.
              properties:
                code:
                  type: string
                  description: The inner error code.
                content_filter_result:
                  type: object
                  description: Content filter results, if applicable.
          required:
          - code
          - message
          example: example_value
definitions:
  ImageDefinition:
    properties:
      imageExists:
        type: boolean
        description: Whether image exists already.
      contentUrl:
        type: string
        description: Content URL for the image blob.
      relativePath:
        type: string
        description: Relative path of the image.
    description: The image definition.
  ErrorDetail:
    type: object
    description: Error detail information.
    properties:
      code:
        type: string
        description: Error code.
      message:
        type: string
        description: Error message.
    required:
    - code
    - message
  UploadChatImageResult:
    description: Result payload for uploading an image.
    required:
    - id
    type: object
    properties:
      id:
        description: A server-generated image id.
        type: string
        example: 0-eus-d2-fb42e272282ebb6ef76a3aedd1974433
