        default:
          description: Unexpected error
          schema:
            $ref: '#/definitions/ErrorDefinition'
      summary: Microsoft Azure Get Providers Microsoft Authorization Accessreviewscheduledefinitions Scheduledefinitionid Instances Id Decisions Decisionid
