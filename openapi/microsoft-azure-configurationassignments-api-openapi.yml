          modelAsString: false
  Resource:
    description: Definition of a Resource
    type: object
    properties:
      id:
        description: Fully qualified identifier of the resource
        type: string
        readOnly: true
      name:
        description: Name of the resource
        type: string
        readOnly: true
      type:
        description: Type of the resource
        type: string
        readOnly: true
      systemData:
        readOnly: true
        type: object
