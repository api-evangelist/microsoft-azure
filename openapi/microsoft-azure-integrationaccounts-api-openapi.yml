definitions:
  TrackEventsOperationOptions:
    type: string
    enum:
    - None
    - DisableSourceInfoEnrich
    x-ms-enum:
      name: TrackEventsOperationOptions
      modelAsString: true
    description: The track events operation options.
  IntegrationAccountSku:
    type: object
    required:
    - name
    properties:
      name:
        $ref: '#/definitions/IntegrationAccountSkuName'
        description: The sku name.
    description: The integration account sku.
  ListKeyVaultKeysDefinition:
    type: object
    description: The list key vault keys definition.
    additionalProperties: false
    required:
    - keyVault
    properties:
      keyVault:
        $ref: '#/definitions/KeyVaultReference'
        description: The key vault reference.
      skipToken:
        type: string
        description: The skip token.
  GetCallbackUrlParameters:
    type: object
    properties:
      notAfter:
        type: string
        format: date-time
        description: The expiry time.
      keyType:
        $ref: '#/definitions/KeyType'
        description: The key type.
    description: The callback url parameters.
  TrackingEvent:
    type: object
    additionalProperties: false
    required:
    - eventLevel
    - eventTime
    - recordType
    properties:
      eventLevel:
        $ref: '#/definitions/EventLevel'
      eventTime:
        type: string
        format: date-time
      recordType:
        $ref: '#/definitions/TrackingRecordType'
      error:
        $ref: '#/definitions/TrackingEventErrorInfo'
  Resource:
    properties:
      id:
        type: string
        readOnly: true
        description: The resource id.
      name:
        type: string
        readOnly: true
        description: Gets the resource name.
      type:
        type: string
        readOnly: true
        description: Gets the resource type.
      location:
        type: string
        description: The resource location.
      tags:
        type: object
        additionalProperties:
          type: string
        description: The resource tags.
    x-ms-azure-resource: true
    description: The base resource type.
  KeyVaultKey:
    type: object
    description: The key vault key.
    properties:
      kid:
        type: string
        description: The key id.
      attributes:
        type: object
        description: The key attributes.
        properties:
          enabled:
            type: boolean
            description: Whether the key is enabled or not.
          created:
            type: integer
            format: int64
            description: When the key was created.
          updated:
            type: integer
            format: int64
            description: When the key was updated.
  KeyVaultReference:
    type: object
    description: The key vault reference.
    additionalProperties: false
    properties:
      name:
        type: string
        description: The key vault name.
    allOf:
    - $ref: '#/definitions/ResourceReference'
  IntegrationAccountSkuName:
    type: string
    enum:
    - NotSpecified
    - Free
    - Basic
    - Standard
    x-ms-enum:
      name: IntegrationAccountSkuName
      modelAsString: true
  IntegrationAccountListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/IntegrationAccount'
        description: The list of integration accounts.
      nextLink:
        type: string
        description: The URL to get the next set of results.
    description: The list of integration accounts.
  IntegrationAccountProperties:
    type: object
    properties: {}
  RegenerateActionParameter:
    type: object
    properties:
      keyType:
        $ref: '#/definitions/KeyType'
        description: The key type.
    description: The access key regenerate action content.
  TrackingEventsDefinition:
    type: object
    additionalProperties: false
    required:
    - sourceType
    - events
    properties:
      sourceType:
        type: string
      trackEventsOptions:
        $ref: '#/definitions/TrackEventsOperationOptions'
      events:
        type: array
        items:
          $ref: '#/definitions/TrackingEvent'
  KeyVaultKeyCollection:
    type: object
    description: Collection of key vault keys.
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/KeyVaultKey'
        description: The key vault keys.
      skipToken:
        type: string
        description: The skip token.
  ResourceReference:
    type: object
    properties:
      id:
        type: string
        description: The resource id.
      name:
        type: string
        readOnly: true
        description: Gets the resource name.
      type:
        type: string
        readOnly: true
        description: Gets the resource type.
    description: The resource reference.
  TrackingRecordType:
    type: string
    enum:
    - NotSpecified
    - Custom
    - AS2Message
    - AS2MDN
    - X12Interchange
    - X12FunctionalGroup
    - X12TransactionSet
    - X12InterchangeAcknowledgment
    - X12FunctionalGroupAcknowledgment
    - X12TransactionSetAcknowledgment
    - EdifactInterchange
    - EdifactFunctionalGroup
    - EdifactTransactionSet
    - EdifactInterchangeAcknowledgment
    - EdifactFunctionalGroupAcknowledgment
    - EdifactTransactionSetAcknowledgment
    x-ms-enum:
      name: TrackingRecordType
      modelAsString: true
    description: The tracking record type.
  TrackingEventErrorInfo:
    type: object
    additionalProperties: false
    properties:
      message:
        type: string
      code:
        type: string
  KeyType:
    type: string
    enum:
    - NotSpecified
    - Primary
    - Secondary
    x-ms-enum:
      name: KeyType
      modelAsString: true
  CallbackUrl:
    type: object
    properties:
      value:
        type: string
        description: The URL value.
    description: The callback url.
  EventLevel:
    type: string
    enum:
    - LogAlways
    - Critical
    - Error
    - Warning
    - Informational
    - Verbose
    x-ms-enum:
      name: EventLevel
      modelAsString: false
    description: The event level.
  IntegrationAccount:
    type: object
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/IntegrationAccountProperties'
        description: The integration account properties.
      sku:
        $ref: '#/definitions/IntegrationAccountSku'
        description: The sku.
    description: The integration account.
    allOf:
    - $ref: '#/definitions/Resource'
parameters:
  api-version:
    name: api-version
    description: The API version.
    in: query
    required: true
    type: string
  subscriptionId:
    name: subscriptionId
    description: The subscription id.
    in: path
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
