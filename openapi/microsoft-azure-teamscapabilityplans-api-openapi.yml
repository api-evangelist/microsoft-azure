swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector TeamsCapabilityPlans API
schemes:
- https
tags:
- name: TeamsCapabilityPlans
paths:
  /accounts/{accountName}:getTeamsCapabilityPlans:
    post:
      operationId: microsoftAzureAccountsGetteamscapabilityplans
      tags:
      - TeamsCapabilityPlans
      summary: Microsoft Azure Get Teams Usages
      description: Get a list of Teams capability plans on the specified account.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: accountName
        in: path
        description: Name of the account.
        required: true
        type: string
        minLength: 1
        maxLength: 100
        pattern: ^([A-Za-z0-9_-]+)$
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityRequestId'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityFirstSent'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/TeamsCapabilityPlans'
          headers:
            Repeatability-Result:
              type: string
              description: Indicates whether the repeatable request was accepted or rejected.
              enum:
              - accepted
              - rejected
              x-ms-enum:
                name: RepeatabilityResult
                modelAsString: false
                values:
                - name: accepted
                  value: accepted
                  description: If the request was accepted and the server guarantees that the server state reflects a single execution of the operation.
                - name: rejected
                  value: rejected
                  description: 'If the request was rejected because the combination of Repeatability-First-Sent and Repeatability-Request-ID were invalid

                    or because the Repeatability-First-Sent value was outside the range of values held by the server.'
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Get the list of capability plans available to this account.:
          $ref: ./examples/PostGetAccountTeamsCapabilityPlans.json
definitions:
  Azure.Core.Foundations.ErrorResponse:
    type: object
    description: A response containing error details.
    properties:
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: The error object.
    required:
    - error
  Azure.Core.Foundations.InnerError:
    type: object
    description: An object containing more specific information about the error. As per Microsoft One API guidelines - https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: Inner error.
  TeamsCapabilityPlans:
    type: object
    description: The Teams telephone number upload usages for this account.
    properties:
      capabilityPlans:
        type: array
        description: A list of telephone number upload usages.
        items:
          $ref: '#/definitions/TeamsCapabilityPlan'
        readOnly: true
        x-ms-identifiers: []
    required:
    - capabilityPlans
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
  TeamsCapabilityPlan:
    type: object
    description: A teams capability plan for a given usage.
    properties:
      name:
        type: string
        description: The capability plan name.
        readOnly: true
      offerTypes:
        type: array
        description: The offer types available.
        items:
          type: string
        readOnly: true
      usage:
        type: string
        description: The telephone number usage.
        readOnly: true
      mandatoryCapabilities:
        type: array
        description: Mandatory capabilities for telephone numbers.
        items:
          type: string
        readOnly: true
      choosableCapabilities:
        type: array
        description: Choosable capabilities for telephone numbers.
        items:
          type: string
        readOnly: true
      supportsTollFree:
        type: boolean
        description: Boolean indicating if Toll free is supported.
        readOnly: true
    required:
    - name
    - usage
    - supportsTollFree
