        '202':
          description: The request is accepted and is being processed. To check the status for this request, use the value for the quota request ID **id** obtained in the response of a [Quota Request Status](https://docs.microsoft.com/en-us/rest/api/reserved-vm-instances/quotarequeststatus/get) GET operation.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ExceptionResponse'
      summary: Microsoft Azure Put Scope Providers Microsoft Quota Quotas Resourcename
    patch:
      tags:
      - QuotaInformation
      description: Update the quota limit for a specific resource to the specified value:<br>1. Use the Usages-GET and Quota-GET operations to determine the remaining quota for the specific resource and to calculate the new quota limit. These steps are detailed in [this example](https://techcommunity.microsoft.com/t5/azure-governance-and-management/using-the-new-quota-rest-api/ba-p/2183670).<br>2. Use this PUT operation to update the quota limit. Please check the URI in location header for the detailed status of the request.
      operationId: microsoftAzureQuotaUpdate
      x-ms-examples:
