          $ref: ./examples/getComputeOneSkuQuotaLimit.json
      parameters:
      - $ref: '#/parameters/ResourceNameInParameters'
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/ScopeInPath'
      responses:
        '200':
          description: OK. The quota information will be returned in the response with pagination.
          schema:
            $ref: '#/definitions/CurrentQuotaLimitBase'
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ExceptionResponse'
      summary: Microsoft Azure Get Scope Providers Microsoft Quota Quotas Resourcename
    put:
      tags:
      - QuotaInformation
      description: Create or update the quota limit for the specified resource with the requested value. To update the quota, follow these steps:<br>1. Use the GET operation for quotas and usages to determine how much quota remains for the specific resource and to calculate the new quota limit. These steps are detailed in [this example](https://techcommunity.microsoft.com/t5/azure-governance-and-management/using-the-new-quota-rest-api/ba-p/2183670).<br>2. Use this PUT operation to update the quota limit. Please check the URI in location header for the detailed status of the request.
      operationId: microsoftAzureQuotaCreateorupdate
      x-ms-examples:
        Quotas_PutRequest_ForNetwork:
          $ref: ./examples/putNetworkOneSkuQuotaRequest.json
        Quotas_Put_Request_ForCompute:
          $ref: ./examples/putComputeOneSkuQuotaRequest.json
        Quotas_Request_ForMachineLearningServices_LowPriorityResource:
          $ref: ./examples/putMachineLearningServicesQuotaRequestLowPriority.json
        Quotas_PutRequest_ForNetwork_StandardSkuPublicIpAddressesResource:
          $ref: ./examples/putNetworkOneSkuQuotaRequestStandardSkuPublicIpAddresses.json
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: original-uri
      parameters:
      - $ref: '#/parameters/ResourceNameInParameters'
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/ScopeInPath'
