        Update a simple gallery Application Version.:
          $ref: ./examples/UpdateASimpleGalleryApplicationVersion.json
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Compute Galleries Galleryname Applications Galleryapplicationname Versions Galleryapplicationversionname
    get:
      tags:
      - GalleryApplicationVersions
      operationId: microsoftAzureGalleryapplicationversionsGet
      description: Retrieves information about a gallery Application Version.
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - name: galleryName
        in: path
