swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ImportMachinesController API
schemes:
- https
tags:
- name: ImportMachinesController
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/importSites/{siteName}/machines
  : get:
      operationId: microsoftAzureImportmachinescontrollerListbyimportsite
      tags:
      - ImportMachinesController
      description: List ImportMachine resources by ImportSite
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - name: filter
        in: query
        description: filter query
        required: false
        type: string
      - name: top
        in: query
        description: page size  query
        required: false
        type: string
      - name: continuationToken
        in: query
        description: Optional parameter for continuation token.
        required: false
        type: string
      - name: totalRecordCount
        in: query
        description: Total count of machines in the given site.
        required: false
        type: integer
        format: int32
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/ImportMachineListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        ImportMachinesController_ListByImportSite_MaximumSet_Gen:
          $ref: ./examples/ImportMachinesController_ListByImportSite_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Importsites Sitename Machines
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/importSites/{siteName}/machines/{machineName}
  : get:
      operationId: microsoftAzureImportmachinescontrollerGet
      tags:
      - ImportMachinesController
      description: Get a ImportMachine
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: machineName
        in: path
        description: Machine name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/ImportMachine'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        ImportMachinesController_Get_MaximumSet_Gen:
          $ref: ./examples/ImportMachinesController_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Importsites Sitename Machines Machinename
    delete:
      operationId: microsoftAzureImportmachinescontrollerDelete
      tags:
      - ImportMachinesController
      description: Delete a ImportMachine
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: siteName
        in: path
        description: Site name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      - name: machineName
        in: path
        description: Machine name
        required: true
        type: string
        pattern: ^[a-zA-Z0-9-]{3,24}$
      responses:
        '200':
          description: Resource deleted successfully.
        '204':
          description: Resource deleted successfully.
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        ImportMachinesController_Delete_MaximumSet_Gen:
          $ref: ./examples/ImportMachinesController_Delete_MaximumSet_Gen.json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Offazure Importsites Sitename Machines Machinename
definitions:
  ImportMachine:
    type: object
    description: An machine resource belonging to a site resource.
    properties:
      properties:
        $ref: '#/definitions/ImportMachineProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
  ImportMachineProperties:
    type: object
    description: Class for machine properties.
    properties:
      firmware:
        type: string
        description: Firmware of the machine.
        readOnly: true
      percentageCpuUtilization:
        type: number
        format: float
        description: CPU utilization.
        readOnly: true
      percentageMemoryUtilization:
        type: number
        format: float
        description: Memory utilization.
        readOnly: true
      numberOfDisks:
        type: integer
        format: int32
        description: Number of disks.
        readOnly: true
      totalDiskReadOperationsPerSecond:
        type: number
        format: float
        description: Total disk read operations per second.
        readOnly: true
      totalDiskWriteOperationsPerSecond:
        type: number
        format: float
        description: Total disk write operations per second.
        readOnly: true
      totalDiskWriteThroughput:
        type: number
        format: float
        description: Total disk write throughput.
        readOnly: true
      totalDiskReadThroughput:
        type: number
        format: float
        description: Total disk read throughput.
        readOnly: true
      macAddress:
        type: string
        description: MAC Address.
        readOnly: true
      ipAddresses:
        type: array
        description: IP Addresses.
        items:
          type: string
        readOnly: true
      machineId:
        type: string
        description: Machine ID.
        readOnly: true
      machineManagerId:
        type: string
        description: Machine manager ID.
        readOnly: true
      numberOfNetworkAdapters:
        type: integer
        format: int32
        description: Number of network adapters.
        readOnly: true
      networkInThroughput:
        type: number
        format: float
        description: Network in throughput.
        readOnly: true
      networkOutThroughput:
        type: number
        format: float
        description: Network out throughput.
        readOnly: true
      serverType:
        type: string
        description: Server type.
        readOnly: true
      hypervisor:
        type: string
        description: Fabric type.
        readOnly: true
      hypervisorVersionNumber:
        type: string
        description: Hypervisor version number.
        readOnly: true
      disks:
        type: array
        description: Disks attached to the machine.
        items:
          $ref: '#/definitions/WebRoleImportDisk'
        readOnly: true
        x-ms-identifiers:
        - name
      vmFqdn:
        type: string
        description: Server FQDN.
        readOnly: true
      storageInUseGb:
        type: number
        format: float
        description: Total storage in use.
        readOnly: true
      numberOfProcessorCore:
        type: integer
        format: int32
        description: "Gets or sets the Number of Processor Cores \n            allocated for the\nmachine."
      allocatedMemoryInMb:
        type: number
        format: double
        description: Gets or sets the allocated Memory in MB.
      operatingSystemDetails:
        $ref: '#/definitions/WebRoleOperatingSystem'
        description: Gets or sets the Operating System Details installed on the machine.
      biosSerialNumber:
        type: string
        description: Gets or sets the Machine BIOS serial number.
      biosGuid:
        type: string
        description: Gets or sets the BIOS GUID.
      displayName:
        type: string
        description: Gets the Display name of the machine.
        readOnly: true
      isDeleted:
        type: boolean
        description: Value indicating whether VM is deleted.
        readOnly: true
      createdTimestamp:
        type: string
        description: Gets the marking machine creation.
        readOnly: true
      updatedTimestamp:
        type: string
        description: Gets the timestamp marking last updated on the machine.
        readOnly: true
      tags:
        type: object
        description: machine tags
        additionalProperties:
          type: string
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
    required:
    - tags
  WebRoleImportDisk:
    type: object
    description: Class representing the imported machine web model.
    properties:
      megabytesPerSecondOfRead:
        type: number
        format: float
        description: Disk read throughput.
        readOnly: true
      megabytesPerSecondOfWrite:
        type: number
        format: float
        description: Disk write throughput.
        readOnly: true
      numberOfReadOperationsPerSecond:
        type: number
        format: float
        description: Disk read IOPS.
        readOnly: true
      numberOfWriteOperationsPerSecond:
        type: number
        format: float
        description: Disk write IOPS.
        readOnly: true
      maxSizeInBytes:
        type: integer
        format: int64
        description: Gets or sets Bytes allocated for the disk.
      name:
        type: string
        description: Gets or sets Name of the disk.
      diskType:
        type: string
        description: Gets or sets Type of the disk.
      lun:
        type: integer
        format: int32
        description: Gets or sets LUN of the disk.
      path:
        type: string
        description: Gets or sets Path of the disk.
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Created
    - Updated
    - Running
    - Completed
    - Failed
    - Succeeded
    - Canceled
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Created
        value: Created
        description: Created value.
      - name: Updated
        value: Updated
        description: Updated value.
      - name: Running
        value: Running
        description: Running value.
      - name: Completed
        value: Completed
        description: Completed value.
      - name: Failed
        value: Failed
        description: Failed value.
      - name: Succeeded
        value: Succeeded
        description: Succeeded value.
      - name: Canceled
        value: Canceled
        description: Canceled value.
  ImportMachineListResult:
    type: object
    description: The response of a ImportMachine list operation.
    properties:
      value:
        type: array
        description: The ImportMachine items on this page
        items:
          $ref: '#/definitions/ImportMachine'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  WebRoleOperatingSystem:
    type: object
    description: Second level object returned as part of Machine REST resource.
    properties:
      osType:
        type: string
        description: Gets or sets the type of the operating system.
      osName:
        type: string
        description: Gets or sets the Name of the operating system.
      osVersion:
        type: string
        description: Gets or sets the Version of the operating system.
      osArchitecture:
        type: string
        description: Gets or sets the Architecture of the operating system.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
