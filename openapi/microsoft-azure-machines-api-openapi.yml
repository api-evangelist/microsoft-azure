definitions:
  ConnectionCollection:
    type: object
    description: Collection of Connection resources.
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/Connection'
        description: Collection of Connection resources.
      nextLink:
        type: string
        description: The URL to the next set of resources.
  Machine:
    description: Machine REST resource.
    type: object
    properties:
      id:
        description: Gets or sets the relative URL to get to this REST resource.
        type: string
      name:
        description: Gets or sets the name of this REST resource.
        type: string
      type:
        description: Gets the type of this REST resource.
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/MachineProperties'
        description: Gets or sets the properties of the machine.
  Ipv4NetworkInterface:
    description: Describes an IPv4 network interface.
    properties:
      ipAddress:
        type: string
        description: IPv4 address.
      subnetMask:
        type: string
        default: 255.255.255.255
        description: IPv4 subnet mask.
    required:
    - ipAddress
  HypervisorConfiguration:
    description: Describes the hypervisor configuration of a machine.
    properties:
      hypervisorType:
        $ref: '#/definitions/HypervisorType'
        description: Specifies the virtualization technology used by the hypervisor (hyperv, vmware, etc.)
      nativeHostMachineId:
        type: string
        description: The unique identifier of the hypervisor machine as reported by the underlying virtualization system.
  Bitness:
    description: Specifies the bitness of a machine or process.
    type: string
    enum:
    - 32bit
    - 64bit
    x-ms-enum:
      name: Bitness
      modelAsString: false
  Timezone:
    description: Describes a timezone.
    properties:
      fullName:
        type: string
        description: Timezone full name.
  DiscoveryDetails:
    description: Discovery properties that can be published by various ISVs.
    type: object
    properties:
      osType:
        description: Gets or sets the OS type.
        type: string
      osName:
        description: Gets or sets the OS name.
        type: string
      osVersion:
        description: Gets or sets the OS version.
        type: string
      enqueueTime:
        description: Gets or sets the time the message was enqueued.
        type: string
      solutionName:
        description: Gets or sets the name of the solution that sent the data.
        type: string
      machineId:
        description: Gets or sets the unique identifier of the machine.
        type: string
      machineManagerId:
        description: Gets or sets the unique identifier of the virtual machine manager(vCenter/VMM).
        type: string
      fabricType:
        description: Gets or sets the fabric type.
        type: string
      lastUpdatedTime:
        format: date-time
        description: Gets or sets the time of the last modification of the machine details.
        type: string
      machineName:
        description: Gets or sets the name of the machine.
        type: string
      ipAddresses:
        description: Gets or sets the list of IP addresses of the machine. IP addresses could be IP V4 or IP V6.
        type: array
        items:
          type: string
      fqdn:
        description: Gets or sets the FQDN of the machine.
        type: string
      biosId:
        description: Gets or sets the BIOS ID of the machine.
        type: string
      macAddresses:
        description: Gets or sets the list of MAC addresses of the machine.
        type: array
        items:
          type: string
      extendedInfo:
        description: Gets or sets the ISV specific extended information.
        type: object
        additionalProperties:
          type: string
  MachineCollection_2:
    type: object
    description: Collection of Machine resources.
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/Machine_2'
        description: Collection of Machine resources.
      nextLink:
        type: string
        description: The URL to the next set of resources.
  Resource:
    description: Resource model definition.
    properties:
      id:
        type: string
        description: Resource identifier.
        readOnly: true
      type:
        type: string
        description: Resource type.
        readOnly: true
      name:
        type: string
        description: Resource name.
        readOnly: true
    x-ms-azure-resource: true
  Relationship:
    description: A typed relationship between two entities.
    allOf:
    - $ref: '#/definitions/Resource'
    discriminator: kind
    properties:
      kind:
        type: string
        description: Additional resource type qualifier.
        enum:
        - rel:connection
        - rel:acceptor
    required:
    - kind
  VirtualizationState:
    description: Specifies if the machine is physical, virtual, hypervisor, or unknown.
    type: string
    enum:
    - unknown
    - physical
    - virtual
    - hypervisor
    x-ms-enum:
      name: VirtualizationState
      modelAsString: false
  ProcessDetails:
    description: Describes process metadata.
    properties:
      persistentKey:
        type: string
        description: A unique identifier for a process, generally resilient to process restart, computed by Service Map.
      poolId:
        type: integer
        format: int32
        description: Represents the identity of the process pool assigned to the process by Dependency Agent.
      firstPid:
        type: integer
        format: int32
        description: The Operating System Process Identifier (PID) of the first process in this process pool.
      description:
        type: string
        description: Process description.
      companyName:
        type: string
        description: Name of company that created the process executable.
      internalName:
        type: string
        description: Internal process name.
      productName:
        type: string
        description: Product name.
      productVersion:
        type: string
        description: Product version.
      fileVersion:
        type: string
        description: File version.
      commandLine:
        type: string
        description: Process command line.
      executablePath:
        type: string
        description: Process executable path.
      workingDirectory:
        type: string
        description: Process workingDirectory.
      services:
        type: array
        items:
          $ref: '#/definitions/ProcessHostedService'
        x-ms-identifiers: []
        description: Collection of services hosted by this Process (Windows only).
      zoneName:
        type: string
        description: Process zone name (Linux only).
  MachineGroupCollection:
    type: object
    description: Collection of Machine Group resources.
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/MachineGroup'
        description: Collection of Machine Group resources.
      nextLink:
        type: string
        description: The URL to the next set of resources.
  MachineReference:
    description: Reference to a machine.
    allOf:
    - $ref: '#/definitions/ResourceReference'
    x-ms-discriminator-value: ref:machine
  Connection:
    description: A network connection.
    allOf:
