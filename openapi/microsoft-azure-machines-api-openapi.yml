    x-ms-discriminator-value: rel:connection
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ConnectionProperties'
  ConnectionFailureState:
    description: "Connection failure state:\n * ```ok``` indicates no failures\n * ```failed``` indicates only failures\n * ```mixed``` indicates both failures and successes"
    type: string
    enum:
    - ok
    - failed
    - mixed
    x-ms-enum:
      name: ConnectionFailureState
      modelAsString: false
  OperatingSystemFamily:
    description: Specifies the operating system family, e.g., Linux, Windows, etc.
    type: string
    enum:
    - unknown
    - windows
    - linux
    - solaris
    - aix
    x-ms-enum:
      name: OperatingSystemFamily
      modelAsString: false
  MigrationDetails:
    description: Migration properties that can be shared by various publishers.
    type: object
    properties:
      migrationPhase:
        description: Gets or sets the phase of migration of the machine.
        type: string
      migrationTested:
        description: Gets or sets a value indicating whether migration was tested on the machine.
        type: boolean
      replicationProgressPercentage:
        format: int32
        description: Gets or sets the progress percentage of migration on the machine.
        type: integer
      targetVMArmId:
        description: Gets or sets the ARM id the migrated VM.
        type: string
      enqueueTime:
        description: Gets or sets the time the message was enqueued.
        type: string
      solutionName:
        description: Gets or sets the name of the solution that sent the data.
        type: string
      machineId:
        description: Gets or sets the unique identifier of the machine.
        type: string
      machineManagerId:
        description: Gets or sets the unique identifier of the virtual machine manager(vCenter/VMM).
        type: string
      fabricType:
        description: Gets or sets the fabric type.
        type: string
      lastUpdatedTime:
        format: date-time
        description: Gets or sets the time of the last modification of the machine details.
        type: string
      machineName:
        description: Gets or sets the name of the machine.
        type: string
      ipAddresses:
        description: Gets or sets the list of IP addresses of the machine. IP addresses could be IP V4 or IP V6.
        type: array
        items:
          type: string
      fqdn:
        description: Gets or sets the FQDN of the machine.
        type: string
      biosId:
        description: Gets or sets the BIOS ID of the machine.
        type: string
      macAddresses:
        description: Gets or sets the list of MAC addresses of the machine.
        type: array
        items:
          type: string
      extendedInfo:
        description: Gets or sets the ISV specific extended information.
        type: object
        additionalProperties:
          type: string
  Port:
    description: A port resource represents a server port on a machine. The port may be actively *monitored*, i.e., a Dependency Agent is running on its machine, or *discovered*, i.e., its existence was inferred by observing the data stream from monitored machines. A port is live during an interval of time, if that port had associated activity during (parts) of that interval.
    allOf:
    - $ref: '#/definitions/CoreResource'
    x-ms-discriminator-value: port
    properties:
      properties:
        x-ms-client-flatten: true
        type: object
        description: Resource properties.
        properties:
          monitoringState:
            $ref: '#/definitions/MonitoringState'
            description: Specifies whether the port is actively monitored or discovered.
          machine:
            $ref: '#/definitions/ResourceReference'
            description: Machine hosting this port.
          displayName:
            type: string
            description: Name to use for display purposes.
          ipAddress:
            type: string
            description: IP address associated with the port. At present only IPv4 addresses are supported.
          portNumber:
            type: integer
            format: int32
            description: Port number.
  MachineResourcesConfiguration:
    description: Describes the resources of a machine.
    properties:
      physicalMemory:
        type: integer
        format: int32
        description: Physical memory in megabytes (MB).
      cpus:
        type: integer
        format: int32
        description: Number of CPUs.
      cpuSpeed:
        type: integer
        format: int32
        description: CPU speed in megahertz (Mhz).
      cpuSpeedAccuracy:
        $ref: '#/definitions/Accuracy'
        description: Describes the accuracy of the cpuSpeed field.
  MachineProperties:
    description: Properties of the machine resource.
    type: object
    properties:
      discoveryData:
        description: Gets or sets the discovery details of the machine published by various sources.
        type: array
        items:
          $ref: '#/definitions/DiscoveryDetails'
        x-ms-identifiers:
        - machineId
      assessmentData:
        description: Gets or sets the assessment details of the machine published by various sources.
        type: array
        items:
          $ref: '#/definitions/AssessmentDetails'
        x-ms-identifiers:
        - assessmentId
      migrationData:
        description: Gets or sets the migration details of the machine published by various sources.
        type: array
        items:
          $ref: '#/definitions/MigrationDetails'
        x-ms-identifiers: []
      lastUpdatedTime:
        format: date-time
        description: Gets or sets the time of the last modification of the machine.
