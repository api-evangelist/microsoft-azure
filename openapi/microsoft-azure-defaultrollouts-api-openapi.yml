        - Deleted
        - WarnedToRegistered
        - WarnedToSuspended
        - WarnedToDeleted
        - WarnedToUnregistered
        - SuspendedToRegistered
        - SuspendedToWarned
        - SuspendedToDeleted
        - SuspendedToUnregistered
        type: string
        x-ms-enum:
          name: SubscriptionTransitioningState
          modelAsString: true
      action:
        enum:
        - NotDefined
        - DeleteAllResources
        - SoftDeleteAllResources
        - NoOp
        - BillingCancellation
        - UndoSoftDelete
        type: string
        x-ms-enum:
          name: SubscriptionNotificationOperation
          modelAsString: true
  DefaultRolloutProperties:
