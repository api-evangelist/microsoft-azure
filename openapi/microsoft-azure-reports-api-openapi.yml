swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Reports API
schemes:
- https
tags:
- name: Reports
paths:
  /providers/Microsoft.ADHybridHealthService/services/{serviceName}/reports/badpassword/details/user:
    get:
      tags:
      - Reports
      description: Gets the bad password login attempt report for an user
      x-ms-examples:
        services_listUserBadPasswordReport:
          $ref: ./examples/BadPasswordDetails.json
      operationId: microsoftAzureServicesListuserbadpasswordreport
      parameters:
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - name: dataSource
        in: query
        description: The source of data, if its test data or customer data.
        required: false
        type: string
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The list of bad password login attempts.
          schema:
            $ref: '#/definitions/ErrorReportUsersEntries'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Get Providers Microsoft Adhybridhealthservice Services Servicename Reports Badpassword Details User
  /providers/Microsoft.ADHybridHealthService/services/{serviceName}/reports/riskyIp/blobUris:
    get:
      tags:
      - Reports
      description: Gets all Risky IP report URIs for the last 7 days.
      x-ms-examples:
        services_listAllRiskyIpDownloadReport:
          $ref: ./examples/RiskyIpDownload.json
      operationId: microsoftAzureServicesListallriskyipdownloadreport
      parameters:
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: Risky IP report URIs for the last 7 days.
          schema:
            $ref: '#/definitions/RiskyIPBlobUris'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Get Providers Microsoft Adhybridhealthservice Services Servicename Reports Riskyip Bloburis
  /providers/Microsoft.ADHybridHealthService/services/{serviceName}/reports/riskyIp/generateBlobUri:
    post:
      tags:
      - Reports
      description: Initiate the generation of a new Risky IP report. Returns the URI for the new one.
      x-ms-examples:
        services_listCurrentRiskyIpDownloadReport:
          $ref: ./examples/RiskyIpDownload.json
      operationId: microsoftAzureServicesListcurrentriskyipdownloadreport
      parameters:
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The URI of the Risky IP report that was requested.
          schema:
            $ref: '#/definitions/RiskyIPBlobUris'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Post Providers Microsoft Adhybridhealthservice Services Servicename Reports Riskyip Generatebloburi
  /providers/Microsoft.ADHybridHealthService/services/{serviceName}/ipAddressAggregates:
    get:
      tags:
      - Reports
      description: Gets the IP address aggregates for a given service.
      x-ms-examples:
        list_IPAddressAggregatesByService:
          $ref: ./examples/IpAddressAggregates.json
      operationId: microsoftAzureListIpaddressaggregatesbyservice
      parameters:
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - name: skiptoken
        in: query
        description: A continuationtoken value returned in paginated result to load different pages.
        required: false
        type: string
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The list of IP addresses.
          schema:
            $ref: '#/definitions/IPAddressAggregates'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Providers Microsoft Adhybridhealthservice Services Servicename Ipaddressaggregates
  /providers/Microsoft.ADHybridHealthService/services/{serviceName}/ipAddressAggregateSettings:
    get:
      tags:
      - Reports
      description: Gets the IP address aggregate settings.
      x-ms-examples:
        list_IPAddressAggregateSettings:
          $ref: ./examples/IpAddressAggregateSettings.json
      operationId: microsoftAzureListIpaddressaggregatesettings
      parameters:
      - name: serviceName
        in: path
        description: The name of the service.
        required: true
        type: string
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: IP address aggregate settings.
          schema:
            $ref: '#/definitions/IPAddressAggregateSetting'
      summary: Microsoft Azure Get Providers Microsoft Adhybridhealthservice Services Servicename Ipaddressaggregatesettings
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/virtualMachines/{vmName}/providers/Microsoft.Automanage/configurationProfileAssignments/{configurationProfileAssignmentName}/reports/{reportName}
  : get:
      tags:
      - Reports
      operationId: microsoftAzureReportsGet
      description: Get information about a report associated with a configuration profile assignment run
      x-ms-examples:
        Get a report for a configuration profile assignment:
          $ref: ./examples/getReport.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - name: configurationProfileAssignmentName
        in: path
        required: true
        type: string
        description: The configuration profile assignment name.
      - name: reportName
        in: path
        required: true
        type: string
        description: The report name.
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: '#/parameters/VmNameParameter'
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK. The report was returned successfully.
          schema:
            $ref: '#/definitions/Report'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Compute Virtualmachines Vmname Providers Microsoft Automanage Configurationprofileassignments Configurationprofileassignmentname Reports Reportname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/virtualMachines/{vmName}/providers/Microsoft.Automanage/configurationProfileAssignments/{configurationProfileAssignmentName}/reports
  : get:
      tags:
      - Reports
      operationId: microsoftAzureReportsListbyconfigurationprofileassignments
      description: Retrieve a list of reports within a given configuration profile assignment
      x-ms-examples:
        List reports by configuration profiles assignment:
          $ref: ./examples/listReportsByconfigurationProfileAssignment.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - name: configurationProfileAssignmentName
        in: path
        required: true
        type: string
        description: The configuration profile assignment name.
      - $ref: '#/parameters/VmNameParameter'
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK. List of reports.
          schema:
            $ref: '#/definitions/ReportList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: null
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Compute Virtualmachines Vmname Providers Microsoft Automanage Configurationprofileassignments Configurationprofileassignmentname Reports
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/workspaces/{workspaceName}/reports/assets:snapshot:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/WorkspaceNameParameter'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ReportAssetSnapshotRequest'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ReportAssetSnapshotResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      tags:
      - Reports
      operationId: microsoftAzureReportsSnapshot
      summary: Microsoft Azure Retrieve The Most Recent Snapshot Of Asset Summary Values For The Snapshot Request
      x-ms-examples:
        Reports:
          $ref: ./examples/Reports_Snapshot.json
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/workspaces/{workspaceName}/reports/assets:summarize:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/WorkspaceNameParameter'
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/ReportAssetSummaryRequest'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ReportAssetSummaryResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      tags:
      - Reports
      operationId: microsoftAzureReportsSummarize
      summary: Microsoft Azure Retrieve Asset Summary Details For The Summary Request
      x-ms-examples:
        Reports:
          $ref: ./examples/Reports_Summarize.json
      description: Needs a more full description created.
  /reports/assets:getBillable:
    post:
      operationId: microsoftAzureReportsGetbillable
      tags:
      - Reports
      description: Get billable assets summary for the workspace.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/ReportBillableAssetSummaryResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Reports_GetBillable:
          $ref: ./examples/Reports_GetBillable_MaximumSet_Gen.json
      summary: Microsoft Azure Post Reports Assets:getbillable
  /reports/assets:getSnapshot:
    post:
      operationId: microsoftAzureReportsGetsnapshot
      tags:
      - Reports
      description: Get the most recent snapshot of asset summary values for the snapshot request.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/ReportAssetSnapshotRequest_2'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/ReportAssetSnapshotResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Reports_GetSnapshot:
          $ref: ./examples/Reports_GetSnapshot_MaximumSet_Gen.json
      summary: Microsoft Azure Post Reports Assets:getsnapshot
  /reports/assets:getSummary:
    post:
      operationId: microsoftAzureReportsGetsummary
      tags:
      - Reports
      description: Get asset summary details for the summary request.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/ReportAssetSummaryRequest_2'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/ReportAssetSummaryResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Reports_GetSummary:
          $ref: ./examples/Reports_GetSummary_MaximumSet_Gen.json
      summary: Microsoft Azure Post Reports Assets:getsummary
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/NetworkExperimentProfiles/{profileName}/Experiments/{experimentName}/LatencyScorecard
  : get:
      tags:
      - Reports
      summary: Microsoft Azure Gets A Latency Scorecard For A Given Experiment
      operationId: microsoftAzureReportsGetlatencyscorecards
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      - in: query
        name: endDateTimeUTC
        type: string
        description: The end DateTime of the Latency Scorecard in UTC
        required: false
      - in: query
        name: country
        type: string
        description: The country associated with the Latency Scorecard. Values are country ISO codes as specified here- https://www.iso.org/iso-3166-country-codes.html
        required: false
      - in: query
        name: aggregationInterval
        type: string
        description: The aggregation interval of the Latency Scorecard
        enum:
        - Daily
        - Weekly
        - Monthly
        x-ms-enum:
          name: latencyScorecardAggregationInterval
          modelAsString: true
        required: true
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/LatencyScorecard'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
      x-ms-examples:
        Gets a Latency Scorecard for a given Experiment:
          $ref: ./examples/NetworkExperimentGetLatencyScorecard.json
      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/NetworkExperimentProfiles/{profileName}/Experiments/{experimentName}/Timeseries
  : get:
      tags:
      - Reports
      summary: Microsoft Azure Gets A Timeseries For A Given Experiment
      operationId: microsoftAzureReportsGettimeseries
      produces:
      - application/json
      parameters:
      - $ref: ./network.json#/parameters/SubscriptionIdParameter
      - $ref: ./network.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - $ref: '#/parameters/ProfileNameParameter'
      - $ref: '#/parameters/ExperimentNameParameter'
      - in: query
        name: startDateTimeUTC
        type: string
        format: date-time
        description: The start DateTime of the Timeseries in UTC
        required: true
      - in: query
        name: endDateTimeUTC
        type: string
        format: date-time
        description: The end DateTime of the Timeseries in UTC
        required: true
      - in: query
        name: aggregationInterval
        type: string
        description: The aggregation interval of the Timeseries
        enum:
        - Hourly
        - Daily
        x-ms-enum:
          name: timeseriesAggregationInterval
          modelAsString: true
        required: true
      - in: query
        name: timeseriesType
        type: string
        description: The type of Timeseries
        enum:
        - MeasurementCounts
        - LatencyP50
        - LatencyP75
        - LatencyP95
        x-ms-enum:
          name: timeseriesType
          modelAsString: true
        required: true
      - in: query
        name: endpoint
        type: string
        description: The specific endpoint
        required: false
      - in: query
        name: country
        type: string
        description: The country associated with the Timeseries. Values are country ISO codes as specified here- https://www.iso.org/iso-3166-country-codes.html
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/Timeseries'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
      x-ms-examples:
        Gets a Timeseries for a given Experiment:
          $ref: ./examples/NetworkExperimentGetTimeseries.json
      description: Needs a more full description created.
definitions:
  Azure.Core.uuid:
    type: string
    format: uuid
    description: Universally Unique Identifier
  AssetState:
    type: string
    description: The state of assets
    enum:
    - candidate
    - confirmed
    - dismissed
    - candidateInvestigate
    - associatedPartner
    - associatedThirdparty
    - archived
    x-ms-enum:
      name: AssetState
      modelAsString: true
  ErrorReportUsersEntries:
    description: The list of bad password log in attempt entries.
    type: object
    properties:
      value:
        description: The value returned by the operation.
        type: array
        items:
          $ref: '#/definitions/ErrorReportUsersEntry'
  AssetPageResult:
    type: object
    description: The page of assets that match the provided metric.
    properties:
      totalElements:
        type: integer
        format: int64
        description: The total number of items available in the full result set.
      mark:
        type: string
        description: The cursor mark to be used on the next request.  Not set if using paging.
      nextLink:
        type: string
        description: The link to access the next page of results.  Not set if at the end of the result set.
      value:
        type: array
        description: The items in the current page of results.
        items:
          $ref: '#/definitions/AssetResource'
  ReportAssetSummaryRequest:
    properties:
      filters:
        items:
          type: string
        type: array
      groupBy:
        type: string
      labelName:
        type: string
      metricCategories:
        items:
          type: string
        type: array
      metrics:
        items:
          type: string
        type: array
      segmentBy:
        type: string
    type: object
  ErrorDetail:
    description: This is the top-level error object whose code matches the x-ms-error-code response header
    properties:
      code:
        description: This is one of a server-defined set of error codes.
        type: string
      details:
        description: This is an array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/ErrorDetail'
        type: array
      innererror:
        $ref: '#/definitions/InnerError'
      message:
        description: This is a human-readable representation of the error.
        type: string
      target:
        description: This is the error target.
        type: string
    required:
    - code
    - message
    type: object
  LabelResource:
    properties:
      color:
        type: string
      displayName:
        type: string
      id:
        type: string
      name:
        type: string
      type:
        type: string
      uuid:
        type: string
    type: object
  Report:
    description: Definition of the report.
    type: object
    properties:
      properties:
        title: Properties
        x-ms-client-flatten: true
        $ref: '#/definitions/AssignmentReportProperties'
        description: The properties for the report.
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        readOnly: true
        description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ProxyResource
  RiskyIPBlobUri:
    description: The blob uri pointing to Risky IP Report.
    type: object
    properties:
      tenantId:
        description: The tenant id for whom the report belongs to.
        type: string
      serviceId:
        description: The service id for whom the report belongs to.
        type: string
      resultSasUri:
        description: The blob uri for the report.
        type: string
      blobCreateDateTime:
        description: Time at which the new Risky IP report was requested.
        type: string
        format: date-time
      jobCompletionTime:
        description: Time at which the blob creation job for the new Risky IP report was completed.
        type: string
        format: date-time
      status:
        description: Status of the Risky IP report generation.
        type: string
  AssetSummaryResponse:
    properties:
      count:
        format: int64
        type: integer
      description:
        type: string
      displayName:
        type: string
      filter:
        type: string
      labelName:
        type: string
      link:
        type: string
      metric:
        type: string
      metricCategory:
        type: string
      updatedAt:
        format: date-time
        type: string
    type: object
  AssetPageResponse:
    properties:
      content:
        items:
          $ref: '#/definitions/AssetResponse'
        type: array
      first:
        type: boolean
      last:
        type: boolean
      mark:
        type: string
      nextLink:
        type: string
      number:
        format: int32
        type: integer
      numberOfElements:
        format: int32
        type: integer
      size:
        format: int32
        type: integer
      totalElements:
        format: int64
        type: integer
      totalPages:
        format: int32
        type: integer
    type: object
  ReportBillableAssetBreakdownKind:
    type: string
    description: The kind of billable asset.
    enum:
    - domain
    - host
    - ipAddress
    x-ms-enum:
      name: ReportBillableAssetBreakdownKind
      modelAsString: true
  ReportAssetSummaryRequest_2:
    type: object
    description: 'A request body used to retrieve summary asset information. One and only one collection of summary identifiers must be provided: filters, metrics, or metricCategories.'
    properties:
      metricCategories:
        type: array
        description: Categories to retrieve risk reporting data for.
        items:
          type: string
      metrics:
        type: array
        description: Metrics to retrieve risk reporting data for.
        items:
          type: string
      filters:
        type: array
        description: Query filters to apply to the asset summary.
        items:
          type: string
      groupBy:
        type: string
        description: A parameter to group the assets by (first level facet field), only used when the chosen summary identifier is filters.
      segmentBy:
        type: string
        description: A parameter to segment the assets by (second level facet field), only used when the chosen summary identifier is filters.
      labelName:
        type: string
        description: Currently unused.
  AuditTrailItem:
    properties:
      displayName:
        type: string
      id:
        type: string
      kind:
        enum:
        - as
        - contact
        - domain
        - host
        - ipAddress
        - ipBlock
        - page
        - sslCert
        type: string
        x-ms-enum:
          modelAsString: true
          name: auditTrailItemKind
      name:
        type: string
      reason:
        type: string
    type: object
  AssetResource:
    type: object
    description: The items in the current page of results.
    properties:
      kind:
        type: string
        description: Discriminator property for AssetResource.
      id:
        type: string
        description: The system generated unique id for the resource.
        readOnly: true
      name:
        type: string
        description: The caller provided unique name for the resource.
      displayName:
        type: string
        description: The name that can be used for display purposes.
      uuid:
        $ref: '#/definitions/Azure.Core.uuid'
        description: Global UUID for the asset.
      createdDate:
        type: string
        format: date-time
        description: The date this asset was first added to this workspace.
      updatedDate:
        type: string
        format: date-time
        description: The date this asset was last updated for this workspace.
      state:
        $ref: '#/definitions/AssetState'
      externalId:
        type: string
        description: An optional customer provided identifier for this asset.
      labels:
        type: array
        description: Customer labels assigned to this asset.
        items:
          type: string
      wildcard:
        type: boolean
        description: An indicator of whether this asset represents a wildcard rollup of assets on this domain.
      discoGroupName:
        type: string
        description: The name of the DiscoGroup that brought added this asset to the workspace.
      auditTrail:
        type: array
        description: The history of how this asset was pulled into the workspace through the discovery process.
        items:
          $ref: '#/definitions/AuditTrailItem_2'
      reason:
        type: string
    discriminator: kind
    required:
    - kind
    - id
  LatencyScorecard:
    description: Defines the LatencyScorecard
    properties:
      properties:
        description: The properties of a latency scorecard
        $ref: '#/definitions/LatencyScorecardProperties'
        x-ms-client-flatten: true
    allOf:
    - $ref: ./network.json#/definitions/Resource
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
  ReportResource:
    description: Details about the resource processed by the configuration profile assignment
    type: object
    properties:
      name:
        type: string
        readOnly: true
        description: Name of the resource.
      id:
        type: string
        readOnly: true
        description: ARM id of the resource.
      type:
