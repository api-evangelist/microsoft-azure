      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Object'
      deprecated: false
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/ishostingenvironmentnameavailable:
    get:
      tags:
      - Global
      summary: Microsoft Azure Whether Hosting Environment Name Is Available
      operationId: microsoftAzureGlobalIshostingenvironmentnameavailable
      consumes: []
      produces:
      - application/json
