swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Global API
schemes:
- https
tags:
- name: Global
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/deletedSites/{deletedSiteId}:
    get:
      tags:
      - Global
      summary: Microsoft Azure Get Deleted App For A Subscription
      description: Description for Get deleted app for a subscription.
      operationId: microsoftAzureGlobalGetdeletedwebapp
      parameters:
      - name: deletedSiteId
        in: path
        description: The numeric ID of the deleted app, e.g. 12345
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: ./CommonDefinitions.json#/definitions/DeletedSite
        default:
          description: App Service error response.
          schema:
            $ref: ./CommonDefinitions.json#/definitions/DefaultErrorResponse
      x-ms-examples:
        Get Deleted Web App:
          $ref: ./examples/GetDeletedWebApp.json
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/deletedSites/{deletedSiteId}/snapshots:
    get:
      tags:
      - Global
      summary: Microsoft Azure Get All Deleted Apps For A Subscription
      description: Description for Get all deleted apps for a subscription.
      operationId: microsoftAzureGlobalGetdeletedwebappsnapshots
      parameters:
      - name: deletedSiteId
        in: path
        description: The numeric ID of the deleted app, e.g. 12345
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: ./CommonDefinitions.json#/definitions/Snapshot
        default:
          description: App Service error response.
          schema:
            $ref: ./CommonDefinitions.json#/definitions/DefaultErrorResponse
      x-ms-examples:
        Get Deleted Web App Snapshots:
          $ref: ./examples/GetDeletedWebAppSnapshots.json
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/locations/{location}/operations/{operationId}:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets An Operation In A Subscription And Given Region
      description: Description for Gets an operation in a subscription and given region
      operationId: microsoftAzureGlobalGetsubscriptionoperationwithasyncresponse
      parameters:
      - name: location
        in: path
        description: Location name
        required: true
        type: string
      - name: operationId
        in: path
        description: Operation Id
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '204':
          description: No Content
        default:
          description: App Service error response.
          schema:
            $ref: ./CommonDefinitions.json#/definitions/DefaultErrorResponse
      x-ms-examples:
        Gets an operation in a subscription and given region:
          $ref: ./examples/GetSubscriptionOperationWithAsyncResponse.json
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/publishingCredentials:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets Publishing Credentials For The Subscription Owner
      operationId: microsoftAzureGlobalGetsubscriptionpublishingcredentials
      consumes: []
      produces:
      - application/json
      - text/json
      - application/xml
      - text/xml
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/User'
      deprecated: false
      description: Needs a more full description created.
    put:
      tags:
      - Global
      summary: Microsoft Azure Updates Publishing Credentials For The Subscription Owner
      operationId: microsoftAzureGlobalUpdatesubscriptionpublishingcredentials
      consumes:
      - application/json
      - text/json
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - text/json
      - application/xml
      - text/xml
      parameters:
      - name: requestMessage
        in: body
        description: requestMessage with new publishing credentials
        required: true
        schema:
          $ref: '#/definitions/User'
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/User'
      deprecated: false
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/geoRegions:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets List Of Available Geo Regions
      operationId: microsoftAzureGlobalGetsubscriptiongeoregions
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - name: sku
        in: query
        description: Filter only to regions that support this sku
        type: string
      - name: linuxWorkersEnabled
        in: query
        description: Filter only to regions that support linux workers
        type: boolean
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/GeoRegionCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/certificates:
    get:
      tags:
      - Global
      summary: Microsoft Azure Get All Certificates For A Subscription
      operationId: microsoftAzureGlobalGetallcertificates
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CertificateCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/serverfarms:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets All App Service Plans For A Subscription
      operationId: microsoftAzureGlobalGetallserverfarms
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - name: detailed
        in: query
        description: "False to return a subset of App Service Plan properties, true to return all of the properties.\r\n            Retrieval of all properties may increase the API latency."
        type: boolean
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ServerFarmCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/sites:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets All Web Apps For A Subscription
      operationId: microsoftAzureGlobalGetallsites
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/SiteCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/hostingEnvironments:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets All Hostingenvironments App Service Environment For A Subscription
      operationId: microsoftAzureGlobalGetallhostingenvironments
      consumes: []
