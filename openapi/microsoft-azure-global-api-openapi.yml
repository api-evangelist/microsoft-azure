            $ref: '#/definitions/HostingEnvironmentCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/managedHostingEnvironments:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets All Managed Hosting Environments For A Subscription
      operationId: microsoftAzureGlobalGetallmanagedhostingenvironments
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ManagedHostingEnvironmentCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/classicMobileServices:
    get:
      tags:
      - Global
      summary: Microsoft Azure Gets All Mobile Services For A Subscription
      operationId: microsoftAzureGlobalGetallclassicmobileservices
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter_2'
      - $ref: '#/parameters/apiVersionParameter_2'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ClassicMobileServiceCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.Web/premieraddonoffers:
    get:
      tags:
      - Global
      summary: Microsoft Azure List Premier Add On Offers
      operationId: microsoftAzureGlobalListpremieraddonoffers
      consumes: []
      produces:
      - application/json
      - text/json
      - application/xml
