  /subscriptions/{subscriptionId}/providers/Nginx.NginxPlus/nginxDeployments:
    get:
      tags:
      - NginxDeployment
      summary: Microsoft Azure List The Nginx Deployments Resources
      operationId: microsoftAzureDeploymentsList
      produces:
