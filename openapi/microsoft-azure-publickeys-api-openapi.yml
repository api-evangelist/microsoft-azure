swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector PublicKeys API
schemes:
- https
tags:
- name: PublicKeys
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.HybridData/dataManagers/{dataManagerName}/publicKeys
  : get:
      tags:
      - PublicKeys
      description: This method gets the list view of public keys, however it will only have one element.
      operationId: microsoftAzurePublickeysListbydatamanager
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/dataManagerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The list of public keys.
          schema:
            $ref: '#/definitions/PublicKeyList'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        PublicKeys_ListByDataManagerGET211:
          $ref: ./examples/PublicKeys_ListByDataManager-GET-example-211.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Hybriddata Datamanagers Datamanagername Publickeys
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.HybridData/dataManagers/{dataManagerName}/publicKeys/{publicKeyName}
  : get:
      tags:
      - PublicKeys
      description: This method gets the public keys.
      operationId: microsoftAzurePublickeysGet
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: publicKeyName
        in: path
        description: Name of the public key.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/resourceGroupNameParameter'
      - $ref: '#/parameters/dataManagerNameParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: The public keys.
          schema:
            $ref: '#/definitions/PublicKey'
      x-ms-examples:
        PublicKeys_GetGET222:
          $ref: ./examples/PublicKeys_Get-GET-example-222.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Hybriddata Datamanagers Datamanagername Publickeys Publickeyname
definitions:
  Key:
    description: Encryption Key.
    required:
    - keyModulus
    - keyExponent
    - encryptionChunkSizeInBytes
    type: object
    properties:
      keyModulus:
        description: Modulus of the encryption key.
        type: string
      keyExponent:
        description: Exponent of the encryption key.
        type: string
      encryptionChunkSizeInBytes:
        format: int32
        description: 'The maximum byte size that can be encrypted by the key. For a key size larger than the size, break into chunks and encrypt each chunk, append each encrypted chunk with : to mark the end of the chunk.'
        type: integer
  DmsBaseObject:
    description: Base class for all objects under DataManager Service
    type: object
    properties:
      name:
        description: Name of the object.
        type: string
        readOnly: true
      id:
        description: Id of the object.
        type: string
        readOnly: true
      type:
        description: Type of the object.
        type: string
        readOnly: true
  PublicKeyList:
    description: PublicKey Collection
    type: object
    properties:
      value:
        description: List of public keys.
        type: array
        items:
          $ref: '#/definitions/PublicKey'
      nextLink:
        description: Link for the next set of public keys.
        type: string
  PublicKey:
    description: Public key
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/DmsBaseObject'
    properties:
      properties:
        $ref: '#/definitions/PublicKeyProperties'
        description: Public key property.
        x-ms-client-flatten: true
  PublicKeyProperties:
    description: PublicKey Properties
    required:
    - dataServiceLevel1Key
    - dataServiceLevel2Key
    type: object
    properties:
      dataServiceLevel1Key:
        $ref: '#/definitions/Key'
        description: Level one public key for encryption
      dataServiceLevel2Key:
        $ref: '#/definitions/Key'
        description: Level two public key for encryption
parameters:
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: The Subscription Id
    required: true
    type: string
  apiVersionParameter:
    name: api-version
    in: query
    description: The API Version
    required: true
    type: string
  resourceGroupNameParameter:
    name: resourceGroupName
    in: path
    description: The Resource Group Name
    required: true
    type: string
    x-ms-parameter-location: method
  dataManagerNameParameter:
    name: dataManagerName
    in: path
    description: The name of the DataManager Resource within the specified resource group. DataManager names must be between 3 and 24 characters in length and use any alphanumeric and underscore only
    required: true
    type: string
    maxLength: 24
    minLength: 3
    pattern: ^[-\w\.]+$
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
