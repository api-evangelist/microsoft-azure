  /collections/{collection}/entity:
    post:
      tags:
      - Collection
      description: 'Creates or updates an entity to a collection.<br>Existing entity is matched using its unique guid if supplied or by its unique attributes eg: qualifiedName.<br>Map and array of collections are not well supported. E.g., array>, array>.'
