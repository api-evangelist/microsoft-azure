        type: array
        items:
          $ref: '#/definitions/PrivateLinkServicesForSCCPowershellDescription'
  AtlasEntityHeader:
    type: object
    title: AtlasEntityHeader
    allOf:
    - $ref: '#/definitions/AtlasStruct'
    - properties:
        classificationNames:
          type: array
          description: An array of classification names.
          items:
            type: string
        classifications:
          type: array
          description: An array of classifications.
          items:
