  CollectionReference:
    description: Reference to a Collection.
    type: object
    properties:
      referenceName:
        description: Gets or sets the reference name.
        type: string
      type:
        description: Gets or sets the reference type property.
        type: string
  CollectionNameResponseList:
    description: Paged list of collections.
    required:
    - value
