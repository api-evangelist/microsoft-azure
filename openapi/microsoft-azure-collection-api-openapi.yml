  Resource:
    description: The common properties of a service.
    properties:
      id:
        readOnly: true
        type: string
        description: The resource identifier.
      name:
        readOnly: true
        type: string
        description: The resource name.
        pattern: ^[a-z0-9][a-z0-9-]{1,21}[a-z0-9]$
      type:
        readOnly: true
        type: string
        description: The resource type.
      kind:
        readOnly: false
        type: string
        description: 'The kind of the service. Valid values are: fhir, fhir-Stu3 and fhir-R4.'
        enum:
        - fhir
        - fhir-Stu3
        - fhir-R4
        x-ms-enum:
          name: kind
          modelAsString: false
      location:
        type: string
        description: The resource location.
        x-ms-mutability:
        - create
        - read
      tags:
        type: object
        additionalProperties:
          type: string
        description: The resource tags.
      etag:
        description: An etag associated with the resource, used for optimistic concurrency when editing it.
        type: string
      identity:
        type: object
        description: Setting indicating whether the service has a managed identity associated with it.
        properties:
          principalId:
            readOnly: true
            type: string
            description: The principal ID of the resource identity.
          tenantId:
            readOnly: true
            type: string
            description: The tenant ID of the resource.
          type:
            description: Type of identity being specified, currently SystemAssigned and None are allowed.
            type: string
            enum:
            - SystemAssigned
            - None
            x-ms-enum:
              name: ManagedServiceIdentityType
              modelAsString: true
    x-ms-azure-resource: true
    required:
    - location
    - kind
  AtlasEntitiesWithExtInfo:
    type: object
    title: AtlasEntitiesWithExtInfo
    allOf:
