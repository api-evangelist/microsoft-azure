definitions:
  RecordOfInt:
    type: object
    description: Data Model for Dictionary<string, int>.
    additionalProperties:
      format: int32
      type: integer
  SummaryPropertiesBase:
    type: object
    description: Base ARM model of Assessment Summary ARM properties.
    properties:
      assessmentName:
        type: string
        description: Gets the assessment name.
        readOnly: true
      summaryName:
        type: string
        description: Gets the summary name.
        readOnly: true
      suitabilityPerTarget:
        type: object
        description: Gets the cloud suitability summary for all entities in the assessment per target.
        additionalProperties:
          $ref: '#/definitions/RecordOfInt'
        readOnly: true
      monthlyComputeCost:
        type: number
        format: float
        description: Gets the monthly compute cost.
        readOnly: true
      monthlyStorageCost:
        type: number
        format: float
        description: Gets the monthly storage cost.
        readOnly: true
      confidenceScore:
        type: number
        format: float
        description: Gets the confidence score.
        readOnly: true
    required:
    - assessmentName
    - summaryName
    - suitabilityPerTarget
    - monthlyComputeCost
    - monthlyStorageCost
    - confidenceScore
  AKSSummary:
    type: object
    description: ARM model of AKS Summary.
    properties:
      properties:
        $ref: '#/definitions/AKSSummaryProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
      eTag:
        type: string
        description: If eTag is provided in the response body, it may also be provided as a header per the normal etag convention.  Entity tags are used for comparing two or more entities from the same requested resource. HTTP/1.1 uses entity tags in the etag (section 14.19), If-Match (section 14.24), If-None-Match (section 14.26), and If-Range (section 14.27) header fields.
        readOnly: true
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  AKSAssessmentSummary:
    type: object
    description: Data model of AKS Assessment Summary.
    properties:
      skuSummary:
        type: object
        description: Gets SKU summary.
        additionalProperties:
          $ref: '#/definitions/SummaryDetails'
        readOnly: true
      webAppSummary:
        type: object
        description: Gets web app summary.
        additionalProperties:
          $ref: '#/definitions/SummaryDetails'
        readOnly: true
      webServerSummary:
        type: object
        description: Gets web server summary.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      webAppCount:
        type: integer
        format: int32
        description: Gets the number of web apps.
        readOnly: true
      webServerCount:
        type: integer
        format: int32
        description: Gets the number of web servers.
        readOnly: true
      machineCount:
        type: integer
        format: int32
        description: Gets the number of machines.
        readOnly: true
      totalMonthlyCost:
        type: number
        format: float
        description: Gets the total monthly cost.
        readOnly: true
    required:
    - skuSummary
    - webAppSummary
    - webServerSummary
    - webAppCount
    - webServerCount
    - machineCount
    - totalMonthlyCost
  AKSSummaryListResult:
    type: object
    description: The response of a AKSSummary list operation.
    properties:
      value:
        type: array
        description: The AKSSummary items on this page
        items:
          $ref: '#/definitions/AKSSummary'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  AKSSummaryProperties:
    type: object
    description: ARM model of AKS Summary Properties.
    properties:
      aksAssessmentSummary:
        $ref: '#/definitions/AKSAssessmentSummary'
        description: Gets AKS assessment summary.
        readOnly: true
    required:
    - aksAssessmentSummary
    allOf:
    - $ref: '#/definitions/SummaryPropertiesBase'
  SummaryDetails:
    type: object
    description: Data model of Summary Details.
    properties:
      count:
        type: integer
        format: int32
        description: Gets count.
        readOnly: true
      monthlyCost:
        type: number
        format: float
        description: Gets monthly cost.
        readOnly: true
    required:
    - count
    - monthlyCost
