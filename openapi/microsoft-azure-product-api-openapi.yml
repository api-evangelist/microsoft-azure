swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Product API
schemes:
- https
tags:
- name: Product
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ApiManagement/service/{serviceName}/workspaces/{workspaceId}/products
  : get:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductListbyservice
      description: Lists a collection of products in the specified workspace in a service instance.
      x-ms-examples:
        ApiManagementListWorkspaceProducts:
          $ref: ./examples/ApiManagementListWorkspaceProducts.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - name: $filter
        in: query
        required: false
        type: string
        description: '|     Field     |     Usage     |     Supported operators     |     Supported functions     |</br>|-------------|-------------|-------------|-------------|</br>| name | filter | ge, le, eq, ne, gt, lt | substringof, contains, startswith, endswith |</br>| displayName | filter | ge, le, eq, ne, gt, lt | substringof, contains, startswith, endswith |</br>| description | filter | ge, le, eq, ne, gt, lt | substringof, contains, startswith, endswith |</br>| terms | filter | ge, le, eq, ne, gt, lt | substringof, contains, startswith, endswith |</br>| state | filter | eq |     |</br>| groups | expand |     |     |</br>'
      - $ref: ./apimanagement.json#/parameters/TopQueryParameter
      - $ref: ./apimanagement.json#/parameters/SkipQueryParameter
      - name: expandGroups
        in: query
        required: false
        type: boolean
        description: When set to true, the response contains an array of groups that have visibility to the product. The default is false.
      - name: tags
        in: query
        required: false
        type: string
        description: Products which are part of a specific tag.
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: A Collection of the Product entities for the specified workspace in an API Management service instance.
          schema:
            $ref: ./definitions.json#/definitions/ProductCollection
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-odata: ./definitions.json#/definitions/ProductContract
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ApiManagement/service/{serviceName}/workspaces/{workspaceId}/products/{productId}
  : head:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductGetentitytag
      description: Gets the entity state (Etag) version of the product specified by its identifier.
      x-ms-examples:
        ApiManagementHeadWorkspaceProduct:
          $ref: ./examples/ApiManagementHeadWorkspaceProduct.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - $ref: ./apimanagement.json#/parameters/ProductIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: Specified Product entity exists and current entity state version is present in the ETag header.
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      summary: Microsoft Azure Head Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products Productid
    get:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductGet
      description: Gets the details of the product specified by its identifier.
      x-ms-examples:
        ApiManagementGetWorkspaceProduct:
          $ref: ./examples/ApiManagementGetWorkspaceProduct.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - $ref: ./apimanagement.json#/parameters/ProductIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: The response body contains the specified Product entity.
          schema:
            $ref: ./definitions.json#/definitions/ProductContract
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products Productid
    put:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductCreateorupdate
      description: Creates or Updates a product.
      x-ms-examples:
        ApiManagementCreateWorkspaceProduct:
          $ref: ./examples/ApiManagementCreateWorkspaceProduct.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - $ref: ./apimanagement.json#/parameters/ProductIdParameter
      - name: parameters
        in: body
        required: true
        schema:
          $ref: ./definitions.json#/definitions/ProductContract
        description: Create or update parameters.
      - $ref: ./apimanagement.json#/parameters/IfMatchOptionalParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: Product was successfully updated.
          schema:
            $ref: ./definitions.json#/definitions/ProductContract
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        '201':
          description: Product was successfully created.
          schema:
            $ref: ./definitions.json#/definitions/ProductContract
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products Productid
    patch:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductUpdate
      description: Update existing product details.
      x-ms-examples:
        ApiManagementUpdateWorkspaceProduct:
          $ref: ./examples/ApiManagementUpdateWorkspaceProduct.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - $ref: ./apimanagement.json#/parameters/ProductIdParameter
      - name: parameters
        in: body
        required: true
        schema:
          $ref: ./definitions.json#/definitions/ProductUpdateParameters
        description: Update parameters.
      - $ref: ./apimanagement.json#/parameters/IfMatchRequiredParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: Product was successfully updated.
          schema:
            $ref: ./definitions.json#/definitions/ProductContract
          headers:
            ETag:
              description: Current entity state version. Should be treated as opaque and used to make conditional HTTP requests.
              type: string
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products Productid
    delete:
      tags:
      - Product
      operationId: microsoftAzureWorkspaceproductDelete
      description: Delete product.
      x-ms-examples:
        ApiManagementDeleteWorkspaceProduct:
          $ref: ./examples/ApiManagementDeleteWorkspaceProduct.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ./apimanagement.json#/parameters/ServiceNameParameter
      - $ref: ./apimanagement.json#/parameters/WorkspaceIdParameter
      - $ref: ./apimanagement.json#/parameters/ProductIdParameter
      - $ref: ./apimanagement.json#/parameters/IfMatchRequiredParameter
      - name: deleteSubscriptions
        in: query
        required: false
        type: boolean
        description: Delete existing subscriptions associated with the product or not.
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      responses:
        '200':
          description: Product was successfully removed.
        '204':
          description: Product was successfully removed by previous request or does not exist.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ./apimanagement.json#/definitions/ErrorResponse
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Apimanagement Service Servicename Workspaces Workspaceid Products Productid
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products
  : get:
      x-ms-examples:
        Returns a list of products.:
          $ref: examples/Product/List.json
      tags:
      - Product
      description: Returns a list of products.
      operationId: microsoftAzureProductsList
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ProductList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: AzureStack.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroup Providers Microsoft Azurestack Registrations Registrationname Products
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products/{productName}
  : get:
      x-ms-examples:
        Returns the specified product.:
          $ref: examples/Product/Get.json
      tags:
      - Product
      description: Returns the specified product.
      operationId: microsoftAzureProductsGet
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: '#/parameters/ProductNameParameter'
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Product'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: AzureStack.json#/definitions/ErrorResponse
      summary: Get Subscriptions Subscriptionid Resourcegroups Resourcegroup Providers Microsoft Azurestack Registrations Registrationname Products Productname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products/{productName}/listDetails
  : post:
      x-ms-examples:
        Returns the extended properties of a product.:
          $ref: examples/Product/Post.json
      tags:
      - Product
      description: Returns the extended properties of a product.
      operationId: microsoftAzureProductsListdetails
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: '#/parameters/ProductNameParameter'
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ExtendedProduct'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: AzureStack.json#/definitions/ErrorResponse
      summary: Post Subscriptions Subscriptionid Resourcegroups Resourcegroup Providers Microsoft Azurestack Registrations Registrationname Products Productname Listdetails
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products/{productName}/getProducts
  : post:
      x-ms-examples:
        Returns a list of products.:
          $ref: examples/Product/ListPost.json
      tags:
      - Product
      description: Returns a list of products.
      operationId: microsoftAzureProductsGetproducts
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: '#/parameters/ProductNameParameter'
      - $ref: '#/parameters/DeviceConfigurationParameter'
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ProductList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: AzureStack.json#/definitions/ErrorResponse
      summary: Post Subscriptions Subscriptionid Resourcegroups Resourcegroup Providers Microsoft Azurestack Registrations Registrationname Products Productname Getproducts
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products/{productName}/getProduct
  : post:
      x-ms-examples:
        Returns the specified product.:
          $ref: examples/Product/GetPost.json
      tags:
      - Product
      description: Returns the specified product.
      operationId: microsoftAzureProductsGetproduct
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: '#/parameters/ProductNameParameter'
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
      - $ref: '#/parameters/DeviceConfigurationParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Product'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: AzureStack.json#/definitions/ErrorResponse
      summary: Post Subscriptions Subscriptionid Resourcegroups Resourcegroup Providers Microsoft Azurestack Registrations Registrationname Products Productname Getproduct
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.AzureStack/registrations/{registrationName}/products/{productName}/uploadProductLog
  : post:
      x-ms-examples:
        Returns the specified product.:
          $ref: examples/Product/UploadLog.json
      tags:
      - Product
      description: Returns the specified product.
      operationId: microsoftAzureProductsUploadlog
      parameters:
      - $ref: AzureStack.json#/parameters/SubscriptionIdParameter
      - $ref: AzureStack.json#/parameters/ResourceGroupNameParameter
      - $ref: AzureStack.json#/parameters/RegistrationNameParameter
      - $ref: '#/parameters/ProductNameParameter'
      - $ref: AzureStack.json#/parameters/ApiVersionParameter
