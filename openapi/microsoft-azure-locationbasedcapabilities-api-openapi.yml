swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector LocationBasedCapabilities API
schemes:
- https
tags:
- name: LocationBasedCapabilities
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.DBforMySQL/locations/{locationName}/capabilities:
    get:
      tags:
      - LocationBasedCapabilities
      operationId: microsoftAzureLocationbasedcapabilitiesList
      x-ms-examples:
        CapabilitiesList:
          $ref: ./examples/CapabilitiesByLocationList.json
      description: Get capabilities at specified location in a given subscription.
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../common-types/v1/common-types.json#/parameters/LocationNameParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CapabilitiesListResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Dbformysql Locations Locationname Capabilities
definitions:
  CapabilitiesListResult:
    type: object
    properties:
      value:
        description: A list of supported capabilities.
        type: array
        items:
          $ref: '#/definitions/CapabilityProperties'
        x-ms-identifiers: []
        readOnly: true
      nextLink:
        description: Link to retrieve next page of results.
        type: string
        readOnly: true
    description: location capability
  ServerEditionCapability:
    type: object
    properties:
      name:
        type: string
        description: Server edition name
        readOnly: true
      supportedStorageEditions:
        description: A list of supported storage editions
        type: array
        items:
          $ref: '#/definitions/StorageEditionCapability'
        x-ms-identifiers: []
        readOnly: true
      supportedServerVersions:
        description: A list of supported server versions.
        type: array
        items:
          $ref: '#/definitions/ServerVersionCapability'
        x-ms-identifiers: []
        readOnly: true
    description: Server edition capabilities.
  ServerVersionCapability:
    type: object
    properties:
      name:
        type: string
        description: server version
        readOnly: true
      supportedSkus:
        description: A list of supported Skus
        type: array
        items:
          $ref: '#/definitions/SkuCapability'
        x-ms-identifiers: []
        readOnly: true
    description: Server version capabilities.
  StorageEditionCapability:
    type: object
    properties:
      name:
        type: string
        description: storage edition name
        readOnly: true
      minStorageSize:
        type: integer
        format: int64
        description: The minimal supported storage size.
        readOnly: true
      maxStorageSize:
        type: integer
        format: int64
        description: The maximum supported storage size.
        readOnly: true
      minBackupRetentionDays:
        type: integer
        format: int64
        description: Minimal backup retention days
        readOnly: true
      maxBackupRetentionDays:
        type: integer
        format: int64
        description: Maximum backup retention days
        readOnly: true
    description: storage edition capability
  SkuCapability:
    type: object
    properties:
      name:
        type: string
        description: vCore name
        readOnly: true
      vCores:
        type: integer
        format: int64
        description: supported vCores
        readOnly: true
      supportedIops:
        type: integer
        format: int64
        description: supported IOPS
        readOnly: true
      supportedMemoryPerVCoreMB:
        type: integer
        format: int64
        description: supported memory per vCore in MB
        readOnly: true
    description: Sku capability
  CapabilityProperties:
    type: object
    properties:
      zone:
        type: string
        description: zone name
        readOnly: true
      supportedHAMode:
        type: array
        items:
          type: string
        description: Supported high availability mode
        readOnly: true
      supportedGeoBackupRegions:
        type: array
        items:
          type: string
        description: supported geo backup regions
        readOnly: true
      supportedFlexibleServerEditions:
        description: A list of supported flexible server editions.
        type: array
        items:
          $ref: '#/definitions/ServerEditionCapability'
        x-ms-identifiers: []
        readOnly: true
    description: Location capabilities.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
