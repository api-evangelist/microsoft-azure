swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Seasons API
schemes:
- https
tags:
- name: Seasons
paths:
  /seasons:
    get:
      tags:
      - Seasons
      description: Returns a paginated list of season resources.
      operationId: microsoftAzureSeasonsList
      produces:
      - application/json
      parameters:
      - in: query
        name: minStartDateTime
        description: 'Minimum season start datetime, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        format: date-time
      - in: query
        name: maxStartDateTime
        description: 'Maximum season start datetime, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        format: date-time
      - in: query
        name: minEndDateTime
        description: 'Minimum season end datetime, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        format: date-time
      - in: query
        name: maxEndDateTime
        description: 'Maximum season end datetime, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        format: date-time
      - in: query
        name: years
        description: Years of the resource.
        type: array
        items:
          format: int32
          type: integer
        collectionFormat: multi
      - in: query
        name: ids
        description: Ids of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: names
        description: Names of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: propertyFilters
        description: "Filters on key-value pairs within the Properties object.\r\neg. \"{testKey} eq {testValue}\"."
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: statuses
        description: Statuses of the resource.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: minCreatedDateTime
        description: Minimum creation date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxCreatedDateTime
        description: Maximum creation date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: minLastModifiedDateTime
        description: Minimum last modified date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxLastModifiedDateTime
        description: Maximum last modified date of resource (inclusive).
        type: string
        format: date-time
      - in: query
        name: maxPageSize
        description: "Maximum number of items needed (inclusive).\r\nMinimum = 10, Maximum = 1000, Default value = 50."
        type: integer
        format: int32
        default: 50
        maximum: 1000
        minimum: 10
      - in: query
        name: skipToken
        description: Skip token for getting next set of results.
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/SeasonListResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Seasons_List:
          $ref: ./examples/Seasons_List.json
      summary: Microsoft Azure Get Seasons
  /seasons/{seasonId}:
    get:
      tags:
      - Seasons
      description: Gets a specified season resource.
      operationId: microsoftAzureSeasonsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: seasonId
        description: Id of the season.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Season'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Seasons_Get:
          $ref: ./examples/Seasons_Get.json
      summary: Microsoft Azure Get Seasons Seasonid
    patch:
      tags:
      - Seasons
      description: Creates or updates a season resource.
      operationId: microsoftAzureSeasonsCreateorupdate
      consumes:
      - application/merge-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: seasonId
        description: Id of the season resource.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      - in: body
        name: season
        description: Season resource payload to create or update.
        required: true
        schema:
          $ref: '#/definitions/Season'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Season'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Season'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Seasons_CreateOrUpdate:
          $ref: ./examples/Seasons_CreateOrUpdate.json
      summary: Microsoft Azure Patch Seasons Seasonid
    delete:
      tags:
      - Seasons
      description: Deletes a specified season resource.
      operationId: microsoftAzureSeasonsDelete
      produces:
      - application/json
      parameters:
      - in: path
        name: seasonId
        description: Id of the season.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
