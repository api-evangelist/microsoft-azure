          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Get Registration Definition:
          $ref: ./examples/GetRegistrationDefinition.json
      summary: Microsoft Azure Get Scope Providers Microsoft Managedservices Registrationdefinitions Registrationdefinitionid
    delete:
