swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector LocationUsage API
schemes:
- https
tags:
- name: LocationUsage
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.DataLakeStore/locations/{location}/usages:
    get:
      tags:
      - LocationUsage
      operationId: microsoftAzureLocationsGetusage
      description: Gets the current usage count and the limit for the resources of the location under the subscription.
      x-ms-examples:
        UsageList:
          $ref: ./examples/Locations_GetUsage.json
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - name: location
        in: path
        required: true
        type: string
        description: The resource location without whitespace.
      responses:
        '200':
          description: OK -- current usage count and limit retrieved and returned successfully.
          schema:
            $ref: '#/definitions/UsageListResult'
      x-ms-pageable:
        nextLinkName: null
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Datalakestore Locations Location Usages
definitions:
  UsageListResult:
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/Usage'
        description: Gets or sets the list of Storage Resource Usages.
    description: The response from the List Usages operation.
  UsageName:
    properties:
      value:
        readOnly: true
        type: string
        description: Gets a string describing the resource name.
      localizedValue:
        readOnly: true
        type: string
        description: Gets a localized string describing the resource name.
    description: The usage names that can be used.
  Usage:
    properties:
      unit:
        readOnly: true
        type: string
        description: Gets the unit of measurement.
        enum:
        - Count
        - Bytes
        - Seconds
        - Percent
        - CountsPerSecond
        - BytesPerSecond
        x-ms-enum:
          name: UsageUnit
          modelAsString: false
      id:
        readOnly: true
        type: string
        description: Resource identifier.
      currentValue:
        readOnly: true
        type: integer
        format: int32
        description: Gets the current count of the allocated resources in the subscription.
      limit:
        readOnly: true
        type: integer
        format: int32
        description: Gets the maximum count of the resources that can be allocated in the subscription.
      name:
        $ref: '#/definitions/UsageName'
        readOnly: true
        description: Gets the name of the type of usage.
    description: Describes the Resource Usage.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client Api Version.
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: Gets subscription credentials which uniquely identify Microsoft Azure subscription. The subscription ID forms part of the URI for every service call.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
