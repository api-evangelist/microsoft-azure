            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        List Workspace Keys:
          $ref: ./examples/Workspace/listKeys.json
      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/listNotebookAccessToken
  : post:
      tags:
      - ProxyOperations
      summary: Microsoft Azure Get Azure Machine Learning Workspace Notebook Access Token
      operationId: microsoftAzureWorkspacesListnotebookaccesstoken
      produces:
      - application/json
      parameters:
