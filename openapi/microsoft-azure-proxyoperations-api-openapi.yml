definitions:
  DiagnoseWorkspaceParameters:
    description: Parameters to diagnose a workspace
    type: object
    properties:
      value:
        $ref: '#/definitions/DiagnoseRequestProperties'
  NotebookAccessTokenResult:
    type: object
    properties:
      accessToken:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
      expiresIn:
        format: int32
        type: integer
        readOnly: true
        x-ms-mutability:
        - read
      hostName:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      notebookResourceId:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      publicDns:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      refreshToken:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
      scope:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      tokenType:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
  Password:
    type: object
    properties:
      name:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
      value:
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
  NotebookPreparationError:
    type: object
    properties:
      errorMessage:
        type: string
      statusCode:
        format: int32
        type: integer
  RegistryListCredentialsResult:
    type: object
    properties:
      location:
        description: The location of the workspace ACR
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      passwords:
        type: array
        items:
          $ref: '#/definitions/Password'
        x-ms-identifiers:
        - name
      username:
        description: The username of the workspace ACR
        type: string
        readOnly: true
        x-ms-mutability:
        - read
  ListWorkspaceKeysResult:
    type: object
    properties:
      appInsightsInstrumentationKey:
        description: The access key of the workspace app insights
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
      containerRegistryCredentials:
        $ref: '#/definitions/RegistryListCredentialsResult'
      notebookAccessKeys:
        $ref: '#/definitions/ListNotebookKeysResult'
      userStorageArmId:
        description: The arm Id key of the workspace storage
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      userStorageKey:
        description: The access key of the workspace storage
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
  NotebookResourceInfo:
    type: object
    properties:
      fqdn:
        type: string
      isPrivateLinkEnabled:
        type: boolean
      notebookPreparationError:
        description: The error that occurs when preparing notebook.
        $ref: '#/definitions/NotebookPreparationError'
      resourceId:
        description: the data plane resourceId that used to initialize notebook component
        type: string
  ListStorageAccountKeysResult:
    type: object
    properties:
      userStorageKey:
        description: The access key of the storage
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
  DiagnoseResultLevel:
    description: Level of workspace setup error
    enum:
    - Warning
    - Error
    - Information
    type: string
    x-ms-enum:
      name: DiagnoseResultLevel
      modelAsString: true
  DiagnoseRequestProperties:
    type: object
    properties:
      applicationInsights:
        description: Setting for diagnosing dependent application insights
        type: object
        additionalProperties: {}
      containerRegistry:
        description: Setting for diagnosing dependent container registry
        type: object
        additionalProperties: {}
      dnsResolution:
        description: Setting for diagnosing dns resolution
        type: object
        additionalProperties: {}
      keyVault:
        description: Setting for diagnosing dependent key vault
        type: object
        additionalProperties: {}
      nsg:
        description: Setting for diagnosing network security group
        type: object
        additionalProperties: {}
      others:
        description: Setting for diagnosing unclassified category of problems
        type: object
        additionalProperties: {}
      requiredResourceProviders:
        description: Setting for diagnosing the presence of required resource providers in the workspace.
        type: object
        additionalProperties: {}
      resourceLock:
        description: Setting for diagnosing resource lock
        type: object
        additionalProperties: {}
      storageAccount:
        description: Setting for diagnosing dependent storage account
        type: object
        additionalProperties: {}
      udr:
        description: Setting for diagnosing user defined routing
        type: object
        additionalProperties: {}
  DiagnoseResponseResult:
    type: object
    properties:
      value:
        type: object
        properties:
          userDefinedRouteResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          networkSecurityRuleResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          resourceLockResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          dnsResolutionResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          storageAccountResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          keyVaultResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          containerRegistryResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          applicationInsightsResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
          otherResults:
            type: array
            items:
              $ref: '#/definitions/DiagnoseResult'
            x-ms-identifiers:
            - message
  DiagnoseResult:
    description: Result of Diagnose
    type: object
    properties:
      code:
        description: Code for workspace setup error
        type: string
        readOnly: true
        x-ms-mutability:
        - read
      level:
        description: Level of workspace setup error
        $ref: '#/definitions/DiagnoseResultLevel'
        readOnly: true
        x-ms-mutability:
        - read
      message:
        description: Message of workspace setup error
        type: string
        readOnly: true
        x-ms-mutability:
        - read
  ListNotebookKeysResult:
    type: object
    properties:
      primaryAccessKey:
        description: The primary access key of the Notebook
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
      secondaryAccessKey:
        description: The secondary access key of the Notebook
        type: string
        readOnly: true
        x-ms-mutability:
        - read
        x-ms-secret: true
parameters:
  WorkspaceNameParameter:
    in: path
    name: workspaceName
    description: Azure Machine Learning Workspace Name
    required: true
    type: string
    x-ms-parameter-location: method
    pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{2,32}$
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
