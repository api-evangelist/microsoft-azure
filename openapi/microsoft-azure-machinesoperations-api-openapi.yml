swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector MachinesOperations API
schemes:
- https
tags:
- name: MachinesOperations
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/machines
  : get:
      operationId: microsoftAzureMachinesoperationsListbyassessmentproject
      tags:
      - MachinesOperations
      description: List Machine resources by AssessmentProject
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: $filter
        in: query
        description: Filter query.
        required: false
        type: string
      - name: pageSize
        in: query
        description: Optional parameter for page size.
        required: false
        type: integer
        format: int32
      - name: continuationToken
        in: query
        description: Optional parameter for continuation token.
        required: false
        type: string
      - name: totalRecordCount
        in: query
        description: Total record count.
        required: false
        type: integer
        format: int32
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/MachineListResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        MachinesOperations_ListByAssessmentProject_MaximumSet_Gen:
          $ref: ./examples/MachinesOperations_ListByAssessmentProject_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Machines
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Migrate/assessmentProjects/{projectName}/machines/{machineName}
  : get:
      operationId: microsoftAzureMachinesoperationsGet
      tags:
      - MachinesOperations
      description: Get a Machine
      parameters:
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: projectName
        in: path
        description: Assessment Project Name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      - name: machineName
        in: path
        description: Assessible Machine ARM name
        required: true
        type: string
        pattern: ^[^<>&:\?/#]{1,260}$
      responses:
        '200':
          description: ARM operation completed successfully.
          schema:
            $ref: '#/definitions/Machine'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-examples:
        MachinesOperations_Get_MaximumSet_Gen:
          $ref: ./examples/MachinesOperations_Get_MaximumSet_Gen.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Migrate Assessmentprojects Projectname Machines Machinename
definitions:
  Machine:
    type: object
    description: Machine resource.
    properties:
      properties:
        $ref: '#/definitions/MachineProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  WorkloadSummary:
    type: object
    description: Workload summary.
    properties:
      oracleInstances:
        type: integer
        format: int32
        description: Gets or sets oracle databases.
      springApps:
        type: integer
        format: int32
        description: Gets or sets oracle databases.
  ProductSupportStatus:
    type: object
    description: Class to represent the Product Support Status.
    properties:
      currentVersion:
        type: string
        description: Gets or sets current version of ServicePack.
        readOnly: true
      servicePackStatus:
        type: string
        description: Gets or sets ServicePack of the product.
        readOnly: true
      esuStatus:
        type: string
        description: Gets or sets the Extended Security Update ESU status.
        readOnly: true
      supportStatus:
        type: string
        description: Gets or sets the support status of the product.
        readOnly: true
      eta:
        type: integer
        format: int32
        description: Gets or sets the ETA.
        readOnly: true
      currentEsuYear:
        type: string
        description: Gets or sets the current ESU support year.
        readOnly: true
      mainstreamEndDate:
        type: string
        format: date-time
        description: Gets or sets the main stream end date of the product.
        readOnly: true
      extendedSupportEndDate:
        type: string
        format: date-time
        description: Gets or sets the extended support end date of the product.
        readOnly: true
      extendedSecurityUpdateYear1EndDate:
        type: string
        format: date-time
        description: Gets or sets the extended security update year 1 end date of the product.
        readOnly: true
      extendedSecurityUpdateYear2EndDate:
        type: string
        format: date-time
        description: Gets or sets the extended security update year 2 end date of the product.
        readOnly: true
      extendedSecurityUpdateYear3EndDate:
        type: string
        format: date-time
        description: Gets or sets the extended security update year 3 end date of the product.
        readOnly: true
  MachineBootType:
    type: string
    enum:
    - Unknown
    - EFI
    - BIOS
    - NotSpecified
    x-ms-enum:
      name: MachineBootType
      modelAsString: true
      values:
      - name: Unknown
        value: Unknown
      - name: EFI
        value: EFI
      - name: Bios
        value: BIOS
      - name: NotSpecified
        value: NotSpecified
  ProcessorInfo:
    type: object
    description: Represents a information \ details of a processor.
    properties:
      name:
        type: string
        description: Gets or sets the name \ model of a processor.
      numberOfSockets:
        type: integer
        format: int32
        description: Gets or sets the number of sockets.
      numberOfCoresPerSocket:
        type: integer
        format: int32
        description: Gets or sets the number of cores in a socket.
  Disk:
    type: object
    description: A disk discovered on a machine.
    properties:
      gigabytesAllocated:
        type: number
        format: float
        description: Gigabytes of storage provisioned for this disk.
        readOnly: true
      displayName:
        type: string
        description: User friendly name of the disk.
        readOnly: true
  MachineListResult:
    type: object
    description: The response of a Machine list operation.
    properties:
      value:
        type: array
        description: The Machine items on this page
        items:
          $ref: '#/definitions/Machine'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  NetworkAdapter:
    type: object
    description: A network adapter discovered on a machine.
    properties:
      macAddress:
        type: string
        description: MAC Address of the network adapter.
        readOnly: true
      ipAddresses:
        type: array
        description: List of IP Addresses on the network adapter.
        items:
          type: string
        readOnly: true
      displayName:
        type: string
        description: User friendly name of the network adapter.
        readOnly: true
  Error:
    type: object
    description: Error web model class.
    properties:
      id:
        type: integer
        format: int32
        description: Gets the error ID.
        readOnly: true
      code:
        type: string
        description: Gets the error code.
        readOnly: true
      runAsAccountId:
        type: string
        description: Gets the Run as account ID.
        readOnly: true
      applianceName:
        type: string
        description: Gets the Appliance name.
        readOnly: true
      message:
        type: string
        description: Gets the error message.
        readOnly: true
      summaryMessage:
        type: string
        description: Gets the error summary message.
        readOnly: true
      agentScenario:
        type: string
        description: Gets the agent scenario where this error occurred.
        readOnly: true
      possibleCauses:
        type: string
        description: Gets the error possible causes.
        readOnly: true
      recommendedAction:
        type: string
        description: Gets the recommended action for the error.
        readOnly: true
      severity:
        type: string
        description: Gets the error severity.
        readOnly: true
      messageParameters:
        type: object
        description: Gets the error message parameters.
        additionalProperties:
          type: string
        readOnly: true
      updatedTimeStamp:
        type: string
        format: date-time
        description: Gets the time stamp when the error was updated.
        readOnly: true
      impactedAssessmentType:
        type: string
        description: Gets the type of assessment impacted by this error.
        readOnly: true
  MachineProperties:
    type: object
    description: Properties of a machine.
    properties:
      workloadSummary:
        $ref: '#/definitions/WorkloadSummary'
        description: Gets or sets workload summary.
        readOnly: true
      errors:
        type: array
        description: List of errors for this machine.
        items:
          $ref: '#/definitions/Error'
        readOnly: true
        x-ms-identifiers: []
      hostProcessor:
        $ref: '#/definitions/ProcessorInfo'
        description: Gets Processor details of the host.
        readOnly: true
      productSupportStatus:
        $ref: '#/definitions/ProductSupportStatus'
        description: Gets the product support status related details.
        readOnly: true
      discoveryMachineArmId:
        type: string
        description: Site id of machine discovered in private data center.
        readOnly: true
      datacenterManagementServerArmId:
        type: string
        description: The data center management server ARM Id for the machine.
        readOnly: true
      datacenterManagementServerName:
        type: string
        description: The data center management server name for the machine.
        readOnly: true
      bootType:
        $ref: '#/definitions/MachineBootType'
        description: Boot type of machine discovered in private data center.
        readOnly: true
      displayName:
        type: string
        description: Display Name of the Machine.
        readOnly: true
      megabytesOfMemory:
        type: number
        format: float
        description: Megabytes of memory found allocated for the machine in private data center.
        readOnly: true
      numberOfCores:
        type: integer
        format: int32
        description: Number of CPU cores found on the machine.
        readOnly: true
      operatingSystemType:
        type: string
        description: Operating system as reported by datacenter management solution.
        readOnly: true
      operatingSystemName:
        type: string
        description: Operating system as reported by datacenter management solution.
        readOnly: true
      operatingSystemVersion:
        type: string
        description: Operating system version as reported by datacenter management solution.
        readOnly: true
      description:
        type: string
        description: Description for the machine.
        readOnly: true
      createdTimestamp:
        type: string
        format: date-time
        description: When was machine first created.
        readOnly: true
      disks:
        type: object
        description: Disks attached to the machine discovered in private data center.
        additionalProperties:
          $ref: '#/definitions/Disk'
        readOnly: true
      groups:
        type: array
        description: Gets the References to the groups that this machine is member of.
        items:
          type: string
        readOnly: true
      networkAdapters:
        type: object
        description: Network adapters attached to the machine discovered in private data center.
        additionalProperties:
          $ref: '#/definitions/NetworkAdapter'
        readOnly: true
      sqlInstances:
        type: array
        description: SQL instances discovered on the machine.
        items:
          type: string
        readOnly: true
      webApplications:
        type: array
        description: Web applications discovered on the machine.
        items:
          type: string
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: When was machine last updated.
        readOnly: true
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
