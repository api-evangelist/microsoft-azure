swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ServerSecurityAlertPolicies API
schemes:
- https
tags:
- name: ServerSecurityAlertPolicies
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DBforMariaDB/servers/{serverName}/securityAlertPolicies/{securityAlertPolicyName}
  : get:
      tags:
      - ServerSecurityAlertPolicies
      description: Get a server's security alert policy.
      operationId: microsoftAzureServersecurityalertpoliciesGet
      parameters:
      - $ref: '#/parameters/ResourceGroupParameter'
      - $ref: '#/parameters/ServerNameParameter'
      - name: securityAlertPolicyName
        in: path
        description: The name of the security alert policy.
        required: true
        type: string
        enum:
        - Default
        x-ms-enum:
          name: SecurityAlertPolicyName
          modelAsString: true
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully retrieved the server threat detection policy.
          schema:
            $ref: '#/definitions/ServerSecurityAlertPolicy'
        default:
          description: Error response describing why the operation of getting security alert policies failed.
      x-ms-examples:
        Get a server's threat detection policy:
          $ref: ./examples/ServerSecurityAlertsGet.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Dbformariadb Servers Servername Securityalertpolicies Securityalertpolicyname
    put:
      tags:
      - ServerSecurityAlertPolicies
      description: Creates or updates a threat detection policy.
      operationId: microsoftAzureServersecurityalertpoliciesCreateorupdate
      parameters:
      - $ref: '#/parameters/ResourceGroupParameter'
      - $ref: '#/parameters/ServerNameParameter'
      - name: securityAlertPolicyName
        in: path
        description: The name of the threat detection policy.
        required: true
        type: string
        enum:
        - Default
        x-ms-enum:
          name: SecurityAlertPolicyName
          modelAsString: true
      - name: parameters
        in: body
        description: The server security alert policy.
        required: true
        schema:
          $ref: '#/definitions/ServerSecurityAlertPolicy'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully updated the threat detection policy.
          schema:
            $ref: '#/definitions/ServerSecurityAlertPolicy'
        '202':
          description: Created request to set the server threat detection policy.
        default:
          description: Error response describing why the operation of setting security alert policies failed.
      x-ms-long-running-operation: true
      x-ms-examples:
        Update a server's threat detection policy with all parameters:
          $ref: ./examples/ServerSecurityAlertsCreateMax.json
        Update a server's threat detection policy with minimal parameters:
          $ref: ./examples/ServerSecurityAlertsCreateMin.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Dbformariadb Servers Servername Securityalertpolicies Securityalertpolicyname
definitions:
  SecurityAlertPolicyProperties:
    description: Properties of a security alert policy.
    required:
    - state
    type: object
    properties:
      state:
        description: Specifies the state of the policy, whether it is enabled or disabled.
        enum:
        - Enabled
        - Disabled
        type: string
        x-ms-enum:
          name: ServerSecurityAlertPolicyState
          modelAsString: false
      disabledAlerts:
        description: 'Specifies an array of alerts that are disabled. Allowed values are: Sql_Injection, Sql_Injection_Vulnerability, Access_Anomaly'
        type: array
        items:
          type: string
      emailAddresses:
        description: Specifies an array of e-mail addresses to which the alert is sent.
        type: array
        items:
          type: string
      emailAccountAdmins:
        description: Specifies that the alert is sent to the account administrators.
        type: boolean
      storageEndpoint:
        description: Specifies the blob storage endpoint (e.g. https://MyAccount.blob.core.windows.net). This blob storage will hold all Threat Detection audit logs.
        type: string
      storageAccountAccessKey:
        description: Specifies the identifier key of the Threat Detection audit storage account.
        type: string
      retentionDays:
        format: int32
        description: Specifies the number of days to keep in the Threat Detection audit logs.
        type: integer
  ServerSecurityAlertPolicy:
    description: A server security alert policy.
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/ProxyResource
    properties:
      properties:
        $ref: '#/definitions/SecurityAlertPolicyProperties'
        description: Resource properties.
        x-ms-client-flatten: true
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: The API version to use for the request.
  ServerNameParameter:
    name: serverName
    in: path
    required: true
    type: string
    description: The name of the server.
    x-ms-parameter-location: method
  ResourceGroupParameter:
    name: resourceGroupName
    in: path
    required: true
    type: string
    description: The name of the resource group that contains the resource. You can obtain this value from the Azure Resource Manager API or the portal.
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    required: true
    type: string
    description: The subscription ID that identifies an Azure subscription.
