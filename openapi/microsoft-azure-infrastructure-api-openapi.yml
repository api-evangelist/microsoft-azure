swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Infrastructure API
schemes:
- https
tags:
- name: Infrastructure
paths:
  /$/InvokeInfrastructureCommand:
    post:
      operationId: microsoftAzureInvokeinfrastructurecommand
      summary: Microsoft Azure Invokes An Administrative Command On The Given Infrastructure Service Instance
      description: For clusters that have one or more instances of the Infrastructure Service configured,<br>this API provides a way to send infrastructure-specific commands to a particular<br>instance of the Infrastructure Service.<br><br>Available commands and their corresponding response formats vary depending upon<br>the infrastructure on which the cluster is running.<br><br>This API supports the Service Fabric platform; it is not meant to be used directly from your code.
      parameters:
      - $ref: '#/parameters/ApiVersion_6-0_RequiredQueryParam'
      - $ref: '#/parameters/InfrastructureCommandRequiredQueryParam'
      - $ref: '#/parameters/InfrastructureServiceIdOptionalQueryParam'
      - $ref: '#/parameters/TimeoutOptionalQueryParam'
      tags:
      - Infrastructure
      responses:
        '200':
          description: 'The response from the infrastructure service. The response format is a JSON stream.

            The contents of the response depend on which command was issued.'
          schema:
            $ref: '#/definitions/InfrastructureServiceResponse'
        default:
          description: The detailed error response.
          schema:
            $ref: '#/definitions/FabricError'
  /$/InvokeInfrastructureQuery:
    get:
      operationId: microsoftAzureInvokeinfrastructurequery
      summary: Microsoft Azure Invokes A Read Only Query On The Given Infrastructure Service Instance
      description: For clusters that have one or more instances of the Infrastructure Service configured,<br>this API provides a way to send infrastructure-specific queries to a particular<br>instance of the Infrastructure Service.<br><br>Available commands and their corresponding response formats vary depending upon<br>the infrastructure on which the cluster is running.<br><br>This API supports the Service Fabric platform; it is not meant to be used directly from your code.
      parameters:
      - $ref: '#/parameters/ApiVersion_6-0_RequiredQueryParam'
      - $ref: '#/parameters/InfrastructureCommandRequiredQueryParam'
      - $ref: '#/parameters/InfrastructureServiceIdOptionalQueryParam'
      - $ref: '#/parameters/TimeoutOptionalQueryParam'
      tags:
      - Infrastructure
      responses:
        '200':
          description: 'The response from the infrastructure service. The response format is a JSON stream.

            The contents of the response depend on which command was issued.'
          schema:
            $ref: '#/definitions/InfrastructureServiceResponse'
        default:
          description: The detailed error response.
          schema:
            $ref: '#/definitions/FabricError'
definitions:
  FabricErrorCodes:
    type: string
