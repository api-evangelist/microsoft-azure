  MachineAssessmentProperties:
    type: object
    description: Properties of an assessment.
    properties:
      assessmentErrorSummary:
        type: object
        description: "Gets or sets the assessment error summary.\n            This is the number of\nmachines affected by each type of error in this assessment."
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      monthlyUltraStorageCost:
        type: number
        format: float
        description: 'Gets or sets the aggregate ultra storage cost for all machines in the

          assessment.'
        readOnly: true
      costComponents:
        type: array
        description: Gets the collection of cost components.
        items:
          $ref: '#/definitions/CostComponent'
        readOnly: true
        x-ms-identifiers: []
      eaSubscriptionId:
        type: string
        description: Gets or sets enterprise agreement subscription id.
      azurePricingTier:
        $ref: '#/definitions/AzurePricingTier'
        description: Gets or sets Azure Pricing Tier - Free, Basic, etc.
      azureStorageRedundancy:
        $ref: '#/definitions/AzureStorageRedundancy'
        description: 'Gets or sets the Azure Storage Redundancy. Example: Locally Redundant Storage.'
      reservedInstance:
        $ref: '#/definitions/AzureReservedInstance'
        description: Gets or sets the Azure Reserved Instance - 1-Year, 3-Year.
      azureHybridUseBenefit:
        $ref: '#/definitions/AzureHybridUseBenefit'
        description: 'Gets or sets the user configurable setting to display the azure hybrid use

          benefit.'
      linuxAzureHybridUseBenefit:
        $ref: '#/definitions/AzureHybridUseBenefit'
        description: 'Gets or sets the user configurable setting to display the linux azure hybrid use

          benefit.'
      azureDiskTypes:
        type: array
        description: Gets or sets the azure storage type. Premium, Standard etc.
        items:
          $ref: '#/definitions/AzureDiskType'
      azureVmFamilies:
        type: array
        description: Gets or sets the Azure VM families.
        items:
          $ref: '#/definitions/AzureVmFamily'
      distributionBySupportStatus:
        type: object
        description: Gets the distribution of sqlInstances by support status.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      distributionByServicePackInsight:
        type: object
        description: Gets the distribution distribution of sqlInstances by service pack insight.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      distributionByOsName:
        type: object
        description: Gets the distribution by os name.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      monthlyComputeCost:
        type: number
        format: float
        description: Gets or sets the aggregate Compute Cost for all machines in the assessment.
        readOnly: true
      monthlyBandwidthCost:
        type: number
        format: float
        description: Gets or sets the aggregate Bandwidth Cost for all machines in the assessment.
        readOnly: true
      monthlyStorageCost:
        type: number
        format: float
        description: Gets or sets the aggregate Storage Cost for all machines in the assessment.
        readOnly: true
      monthlyPremiumStorageCost:
        type: number
        format: float
        description: 'Gets or sets the aggregate premium storage cost for all machines in the

          assessment.'
        readOnly: true
      monthlyStandardSsdStorageCost:
        type: number
        format: float
        description: 'Gets or sets the aggregate standard SSD storage cost for all the machines in

          the assessment.'
        readOnly: true
      suitabilitySummary:
        type: object
        description: 'Gets or sets the Cloud suitability summary for all the machines in the

          assessment.'
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
      numberOfMachines:
        type: integer
        format: int32
        description: Gets or sets the Number of machines part of the assessment.
        readOnly: true
      vmUptime:
        $ref: '#/definitions/VmUptime'
        description: 'Gets or sets the duration for which the VMs are up in the on-premises

          environment.'
      groupType:
        $ref: '#/definitions/GroupType'
        description: Gets the group type for the assessment.
        readOnly: true
      assessmentType:
        $ref: '#/definitions/AssessmentType'
        description: Assessment type of the assessment.
        readOnly: true
      azureLocation:
        type: string
        description: Azure Location or Azure region where to which the machines will be migrated.
      azureOfferCode:
        $ref: '#/definitions/AzureOfferCode'
        description: Azure Offer Code.
      currency:
        $ref: '#/definitions/AzureCurrency'
        description: Currency in which prices should be reported.
      scalingFactor:
        type: number
        format: float
        description: 'Percentage of buffer that user wants on performance metrics when recommending

          Azure sizes.'
      percentile:
        $ref: '#/definitions/Percentile'
        description: 'Percentile of the utilization data values to be considered while assessing

          machines.'
      timeRange:
        $ref: '#/definitions/TimeRange'
        description: 'Time Range for which the historic utilization data should be considered for

          assessment.'
      perfDataStartTime:
        type: string
        format: date-time
        description: Gets or sets the start time to consider performance data for assessment.
      perfDataEndTime:
        type: string
        format: date-time
        description: Gets or sets the end time to consider performance data for assessment.
      stage:
        $ref: '#/definitions/AssessmentStage'
        description: User configurable setting to display the Stage of Assessment.
        readOnly: true
      discountPercentage:
        type: number
        format: float
        description: Custom discount percentage.
      sizingCriterion:
        $ref: '#/definitions/AssessmentSizingCriterion'
        description: Assessment sizing criterion.
      confidenceRatingInPercentage:
        type: number
        format: float
        description: Confidence Rating in Percentage.
        readOnly: true
      pricesTimestamp:
        type: string
        format: date-time
        description: Last time when rates were queried.
        readOnly: true
      createdTimestamp:
        type: string
        format: date-time
        description: Date and Time when assessment was created.
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: Date and Time when assessment was last updated.
        readOnly: true
      status:
        $ref: '#/definitions/AssessmentStatus'
        description: Whether assessment is in valid state and all machines have been assessed.
        readOnly: true
      schemaVersion:
        type: string
        description: Schema version.
        readOnly: true
    allOf:
    - $ref: '#/definitions/AzureResourceProperties'
  TimeRange:
    type: string
    description: Time Range for Performance Data.
    enum:
    - Day
    - Week
    - Month
    - Custom
    x-ms-enum:
      name: TimeRange
      modelAsString: true
      values:
      - name: Day
        value: Day
        description: Daily.
      - name: Week
        value: Week
        description: Weekly.
      - name: Month
        value: Month
        description: Monthly.
      - name: Custom
        value: Custom
        description: Custom Time Range.
  Assessment:
    type: object
    description: Machine assessment resource.
    properties:
      properties:
        $ref: '#/definitions/MachineAssessmentProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  CostComponentName:
    type: string
    description: Enum to represent component name.
    enum:
    - Unknown
    - MonthlyAzureHybridCostSavings
    - MonthlySecurityCost
    - MonthlyPremiumV2StorageCost
    - MonthlyLinuxAzureHybridCostSavings
    x-ms-enum:
      name: CostComponentName
      modelAsString: true
  GroupType:
    type: string
    enum:
    - Default
    - Import
    x-ms-enum:
      name: GroupType
      modelAsString: true
  AzureResourceProperties:
    type: object
    description: Common properties for all azure tracked and proxy resources.
    properties:
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  AzureCurrency:
    type: string
    description: Currency for Azure.
    enum:
    - Unknown
    - USD
    - DKK
    - CAD
    - IDR
    - JPY
    - KRW
    - NZD
    - NOK
    - RUB
    - SAR
    - ZAR
    - SEK
    - TRY
    - GBP
    - MXN
    - MYR
    - INR
    - HKD
    - BRL
    - TWD
    - EUR
    - CHF
    - ARS
    - AUD
    - CNY
    x-ms-enum:
      name: AzureCurrency
      modelAsString: true
  AssessmentType:
    type: string
    enum:
    - Unknown
    - MachineAssessment
    - AvsAssessment
    - SqlAssessment
    - WebAppAssessment
    x-ms-enum:
      name: AssessmentType
      modelAsString: true
  AzureStorageRedundancy:
    type: string
    enum:
    - Unknown
    - LocallyRedundant
    - ZoneRedundant
    - GeoRedundant
    - ReadAccessGeoRedundant
    x-ms-enum:
      name: AzureStorageRedundancy
      modelAsString: true
  CostComponent:
    type: object
    description: Class to represent the component of the cost.
    properties:
      name:
        $ref: '#/definitions/CostComponentName'
        description: Gets the name of the component.
        readOnly: true
      value:
        type: number
        format: float
        description: The value of the component.
      description:
        type: string
        description: The textual description of the component.
  AssessmentListResult:
    type: object
    description: The response of a Assessment list operation.
    properties:
      value:
        type: array
        description: The Assessment items on this page
        items:
          $ref: '#/definitions/Assessment'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  DownloadUrl:
    type: object
    description: Data model of Download URL for assessment report.
    properties:
      assessmentReportUrl:
        type: string
        description: Hyperlink to download report.
        readOnly: true
      expirationTime:
        type: string
        format: date-time
        description: Expiry date of download url.
        readOnly: true
    required:
    - assessmentReportUrl
    - expirationTime
