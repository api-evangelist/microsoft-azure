swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ScheduledEvents API
schemes:
- https
tags:
- name: ScheduledEvents
paths:
  ? /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.Compute/{resourceType}/{resourceName}/providers/Microsoft.Maintenance/scheduledevents/{scheduledEventId}/acknowledge
  : post:
      tags:
      - ScheduledEvents
      summary: Microsoft Azure Post Scheduled Event Acknowledgement
      operationId: microsoftAzureScheduledeventAcknowledge
      consumes: []
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - name: resourceType
        in: path
        description: Resource type
        required: true
        type: string
      - name: resourceName
        in: path
        description: Resource Name
        required: true
        type: string
      - name: scheduledEventId
        in: path
        description: Scheduled Event Id. This is a GUID-formatted string (e.g. 00000000-0000-0000-0000-000000000000)
        required: true
        type: string
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Response of scheduled event acknowledge
          schema:
            $ref: '#/definitions/ScheduledEventApproveResponse'
        default:
          description: Error
          schema:
            $ref: '#/definitions/MaintenanceError'
      x-ms-examples:
        ScheduledEvents_Acknowledge:
          $ref: ./examples/ScheduledEvents_Acknowledge.json
      description: Needs a more full description created.
definitions:
  ScheduledEventApproveResponse:
    description: Response of scheduled event acknowledge
    type: object
    properties:
      value:
        description: Successfully Approved
        type: string
  MaintenanceError:
    description: An error response received from the Azure Maintenance service.
    type: object
    properties:
      error:
        $ref: '#/definitions/ErrorDetails'
        description: Details of the error
  ErrorDetails:
    description: An error response details received from the Azure Maintenance service.
    type: object
    properties:
      code:
        description: Service-defined error code. This code serves as a sub-status for the HTTP error code specified in the response.
        type: string
      message:
        description: Human-readable representation of the error.
        type: string
