swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector CustomImages API
schemes:
- https
tags:
- name: CustomImages
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DevTestLab/labs/{labName}/customimages
  : get:
      tags:
      - CustomImages
      description: List custom images in a given lab.
      operationId: microsoftAzureCustomimagesList
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: $expand
        in: query
        description: 'Specify the $expand query. Example: ''properties($select=vm)'''
        type: string
      - name: $filter
        in: query
        description: 'The filter to apply to the operation. Example: ''$filter=contains(name,''myName'')'
        type: string
      - name: $top
        in: query
        description: 'The maximum number of resources to return from the operation. Example: ''$top=10'''
        type: integer
        format: int32
      - name: $orderby
        in: query
        description: 'The ordering expression for the results, using OData notation. Example: ''$orderby=name desc'''
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CustomImageList'
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-odata: '#/definitions/CustomImage'
      x-ms-examples:
        CustomImages_List:
          $ref: ./examples/CustomImages_List.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Customimages
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DevTestLab/labs/{labName}/customimages/{name}
  : get:
      tags:
      - CustomImages
      description: Get custom image.
      operationId: microsoftAzureCustomimagesGet
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: name
        in: path
        description: The name of the custom image.
        required: true
        type: string
      - name: $expand
        in: query
        description: 'Specify the $expand query. Example: ''properties($select=vm)'''
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CustomImage'
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        CustomImages_Get:
          $ref: ./examples/CustomImages_Get.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Customimages Name
    put:
      tags:
      - CustomImages
      description: Create or replace an existing custom image. This operation can take a while to complete.
      operationId: microsoftAzureCustomimagesCreateorupdate
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: name
        in: path
        description: The name of the custom image.
        required: true
        type: string
      - name: customImage
        in: body
        description: A custom image.
        required: true
        schema:
          $ref: '#/definitions/CustomImage'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CustomImage'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CustomImage'
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        CustomImages_CreateOrUpdate:
          $ref: ./examples/CustomImages_CreateOrUpdate.json
      x-ms-long-running-operation: true
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Customimages Name
    delete:
      tags:
      - CustomImages
      description: Delete custom image. This operation can take a while to complete.
      operationId: microsoftAzureCustomimagesDelete
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: name
        in: path
        description: The name of the custom image.
        required: true
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
        '202':
          description: Accepted
        '204':
          description: No Content
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        CustomImages_Delete:
          $ref: ./examples/CustomImages_Delete.json
      x-ms-long-running-operation: true
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Customimages Name
    patch:
      tags:
      - CustomImages
      description: Allows modifying tags of custom images. All other properties will be ignored.
      operationId: microsoftAzureCustomimagesUpdate
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: name
        in: path
        description: The name of the custom image.
        required: true
        type: string
      - name: customImage
        in: body
        description: A custom image.
        required: true
        schema:
          $ref: '#/definitions/CustomImageFragment'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CustomImage'
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        CustomImages_Update:
          $ref: ./examples/CustomImages_Update.json
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Customimages Name
definitions:
  LinuxOsInfo:
    description: Information about a Linux OS.
    type: object
    properties:
      linuxOsState:
        description: The state of the Linux OS (i.e. NonDeprovisioned, DeprovisionRequested, DeprovisionApplied).
        enum:
        - NonDeprovisioned
        - DeprovisionRequested
        - DeprovisionApplied
        type: string
        x-ms-enum:
          name: LinuxOsState
          modelAsString: true
  WindowsOsInfo:
    description: Information about a Windows OS.
    type: object
    properties:
      windowsOsState:
        description: The state of the Windows OS (i.e. NonSysprepped, SysprepRequested, SysprepApplied).
        enum:
        - NonSysprepped
        - SysprepRequested
        - SysprepApplied
        type: string
        x-ms-enum:
          name: WindowsOsState
          modelAsString: true
  CustomImagePropertiesFromPlan:
    description: Properties for plan on a custom image.
    type: object
    properties:
      id:
        description: The id of the plan, equivalent to name of the plan
        type: string
      publisher:
        description: The publisher for the plan from the marketplace image the custom image is derived from
        type: string
      offer:
        description: The offer for the plan from the marketplace image the custom image is derived from
        type: string
  Resource:
    description: An Azure resource.
    type: object
    properties:
      id:
        description: The identifier of the resource.
        type: string
        readOnly: true
      name:
        description: The name of the resource.
        type: string
        readOnly: true
      type:
        description: The type of the resource.
        type: string
        readOnly: true
      location:
        description: The location of the resource.
        type: string
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
    x-ms-azure-resource: true
  DataDiskStorageTypeInfo:
    description: Storage information about the data disks present in the custom image
    type: object
    properties:
      lun:
        description: Disk Lun
        type: string
      storageType:
        description: Disk Storage Type
        enum:
        - Standard
        - Premium
        - StandardSSD
        type: string
        x-ms-enum:
          name: StorageType
          modelAsString: true
  CustomImage:
    description: A custom image.
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        $ref: '#/definitions/CustomImageProperties'
        description: The properties of the resource.
        x-ms-client-flatten: true
  CloudError:
    description: Error from a REST request.
    type: object
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
        description: The cloud error that occurred
    x-ms-external: true
  CustomImageProperties:
    description: Properties of a custom image.
    type: object
    properties:
      vm:
        $ref: '#/definitions/CustomImagePropertiesFromVm'
        description: The virtual machine from which the image is to be created.
      vhd:
        $ref: '#/definitions/CustomImagePropertiesCustom'
        description: The VHD from which the image is to be created.
      description:
        description: The description of the custom image.
        type: string
      author:
        description: The author of the custom image.
        type: string
      creationDate:
        format: date-time
        description: The creation date of the custom image.
        type: string
        readOnly: true
      managedImageId:
        description: The Managed Image Id backing the custom image.
        type: string
      managedSnapshotId:
        description: The Managed Snapshot Id backing the custom image.
        type: string
      dataDiskStorageInfo:
        description: Storage information about the data disks present in the custom image
        type: array
        items:
          $ref: '#/definitions/DataDiskStorageTypeInfo'
      customImagePlan:
        $ref: '#/definitions/CustomImagePropertiesFromPlan'
        description: Storage information about the plan related to this custom image
      isPlanAuthorized:
        description: Whether or not the custom images underlying offer/plan has been enabled for programmatic deployment
        type: boolean
      provisioningState:
        description: The provisioning status of the resource.
        type: string
        readOnly: true
      uniqueIdentifier:
        description: The unique immutable identifier of a resource (Guid).
        type: string
        readOnly: true
  CustomImagePropertiesFromVm:
    description: Properties for creating a custom image from a virtual machine.
    type: object
    properties:
      sourceVmId:
        description: The source vm identifier.
        type: string
      windowsOsInfo:
        $ref: '#/definitions/WindowsOsInfo'
        description: The Windows OS information of the VM.
      linuxOsInfo:
        $ref: '#/definitions/LinuxOsInfo'
        description: The Linux OS information of the VM.
  CustomImageList:
    description: The response of a list operation.
    type: object
    properties:
      value:
        description: Results of the list operation.
        type: array
        items:
          $ref: '#/definitions/CustomImage'
      nextLink:
        description: Link for next set of results.
        type: string
  CloudErrorBody:
    description: Body of an error from a REST request.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      message:
        description: The error message.
        type: string
      target:
        description: The error target.
        type: string
      details:
        description: Inner errors.
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
    x-ms-external: true
  UpdateResource:
    description: Represents an update resource
    type: object
    properties:
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
  CustomImageFragment:
    description: A custom image.
    type: object
    allOf:
    - $ref: '#/definitions/UpdateResource'
    properties: {}
  CustomImagePropertiesCustom:
    description: Properties for creating a custom image from a VHD.
    required:
    - osType
    type: object
    properties:
      imageName:
        description: The image name.
        type: string
      sysPrep:
        description: Indicates whether sysprep has been run on the VHD.
        type: boolean
      osType:
        description: The OS type of the custom image (i.e. Windows, Linux)
        enum:
        - Windows
        - Linux
        - None
        type: string
        x-ms-enum:
          name: CustomImageOsType
          modelAsString: true
