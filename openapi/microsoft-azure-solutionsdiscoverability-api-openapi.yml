swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector SolutionsDiscoverability API
schemes:
- https
tags:
- name: SolutionsDiscoverability
paths:
  /providers/Microsoft.AgFoodPlatform/farmBeatsSolutionDefinitions:
    get:
      tags:
      - SolutionsDiscoverability
      description: Get list of Data Manager For Agriculture solutions.
      operationId: microsoftAzureSolutionsdiscoverabilityList
      produces:
      - application/json
      parameters:
      - in: query
        name: farmBeatsSolutionIds
        description: Ids of Data Manager For Agriculture Solutions which the customer requests to fetch.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: farmBeatsSolutionNames
        description: Names of Data Manager For Agriculture Solutions which the customer requests to fetch.
        type: array
        items:
          type: string
        collectionFormat: multi
      - in: query
        name: $maxPageSize
        description: "Maximum number of items needed (inclusive).\r\nMinimum = 10, Maximum = 1000, Default value = 50."
        type: integer
        format: int32
        default: 50
        maximum: 1000
        minimum: 10
      - $ref: ../../../../../common-types/resource-management/v4/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DataManagerForAgricultureSolutionListResponse'
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v4/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        SolutionsDiscoverability_List:
          $ref: ./examples/SolutionsDiscoverability_List.json
      summary: Microsoft Azure Get Providers Microsoft Agfoodplatform Farmbeatssolutiondefinitions
  /providers/Microsoft.AgFoodPlatform/farmBeatsSolutionDefinitions/{dataManagerForAgricultureSolutionId}:
    get:
      tags:
      - SolutionsDiscoverability
      description: Get Data Manager For Agriculture solution by id.
      operationId: microsoftAzureSolutionsdiscoverabilityGet
      produces:
      - application/json
      parameters:
      - in: path
        name: dataManagerForAgricultureSolutionId
        description: dataManagerForAgricultureSolutionId to be queried.
        required: true
        type: string
        pattern: ^[a-zA-Z]{3,50}[.][a-zA-Z]{3,100}$
      - $ref: ../../../../../common-types/resource-management/v4/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DataManagerForAgricultureSolution'
        default:
          description: Error
          schema:
            $ref: ../../../../../common-types/resource-management/v4/types.json#/definitions/ErrorResponse
      x-ms-examples:
        SolutionsDiscoverability_Get:
          $ref: ./examples/SolutionsDiscoverability_Get.json
      summary: Microsoft Azure Get Providers Microsoft Agfoodplatform Farmbeatssolutiondefinitions Datamanagerforagriculturesolutionid
