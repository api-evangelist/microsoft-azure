definitions:
  BackupScheduleList:
    description: The backup schedule list.
    required:
    - value
    type: object
    properties:
      value:
        description: The value.
        type: array
        items:
          $ref: '#/definitions/BackupSchedule'
  ScheduleRecurrence:
    description: The schedule recurrence.
    required:
    - recurrenceType
    - recurrenceValue
    type: object
    properties:
      recurrenceType:
        description: The recurrence type.
        enum:
        - Minutes
        - Hourly
        - Daily
        - Weekly
        type: string
        x-ms-enum:
          name: RecurrenceType
          modelAsString: false
      recurrenceValue:
        format: int32
        description: The recurrence value.
        type: integer
      weeklyDaysList:
        description: The week days list. Applicable only for schedules of recurrence type 'weekly'.
        type: array
        items:
          enum:
          - Sunday
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          type: string
          x-ms-enum:
            name: DayOfWeek
            modelAsString: false
  BaseModel:
    description: Represents the base class for all other ARM object models
    type: object
    properties:
      id:
        description: The path ID that uniquely identifies the object.
        type: string
        readOnly: true
      name:
        description: The name of the object.
        type: string
        readOnly: true
      type:
        description: The hierarchical type of the object.
        type: string
        readOnly: true
      kind:
        description: The Kind of the object. Currently only Series8000 is supported
        enum:
        - Series8000
        type: string
        x-ms-enum:
          name: Kind
          modelAsString: false
  BackupScheduleProperties:
    description: The properties of the backup schedule.
    required:
    - scheduleRecurrence
    - backupType
    - retentionCount
    - startTime
    - scheduleStatus
    type: object
    properties:
      scheduleRecurrence:
        $ref: '#/definitions/ScheduleRecurrence'
        description: The schedule recurrence.
      backupType:
        description: The type of backup which needs to be taken.
        enum:
        - LocalSnapshot
        - CloudSnapshot
        type: string
        x-ms-enum:
          name: BackupType
          modelAsString: false
      retentionCount:
        format: int64
        description: The number of backups to be retained.
        type: integer
      startTime:
        format: date-time
        description: The start time of the schedule.
        type: string
      scheduleStatus:
        description: The schedule status.
        enum:
        - Enabled
        - Disabled
        type: string
        x-ms-enum:
          name: ScheduleStatus
          modelAsString: false
      lastSuccessfulRun:
        format: date-time
        description: The last successful backup run which was triggered for the schedule.
        type: string
        readOnly: true
  BackupSchedule:
    description: The backup schedule.
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/BaseModel'
    properties:
      properties:
        $ref: '#/definitions/BackupScheduleProperties'
        description: The properties of the backup schedule.
        x-ms-client-flatten: true
parameters:
