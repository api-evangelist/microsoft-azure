swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector PolicySets API
schemes:
- https
tags:
- name: PolicySets
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DevTestLab/labs/{labName}/policysets/{name}/evaluatePolicies
  : post:
      tags:
      - PolicySets
      description: Evaluates lab policy.
      operationId: microsoftAzurePolicysetsEvaluatepolicies
      parameters:
      - $ref: '#/parameters/subscriptionId'
      - $ref: '#/parameters/resourceGroupName'
      - name: labName
        in: path
        description: The name of the lab.
        required: true
        type: string
      - name: name
        in: path
        description: The name of the policy set.
        required: true
        type: string
      - name: evaluatePoliciesRequest
        in: body
        description: Request body for evaluating a policy set.
        required: true
        schema:
          $ref: '#/definitions/EvaluatePoliciesRequest'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/EvaluatePoliciesResponse'
        default:
          description: BadRequest
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-examples:
        PolicySets_EvaluatePolicies:
          $ref: ./examples/PolicySets_EvaluatePolicies.json
      summary: Microsoft Azure Post Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Devtestlab Labs Labname Policysets Name Evaluatepolicies
definitions:
  EvaluatePoliciesRequest:
    description: Request body for evaluating a policy set.
    type: object
    properties:
      policies:
        description: Policies to evaluate.
        type: array
        items:
          $ref: '#/definitions/EvaluatePoliciesProperties'
  PolicySetResult:
    description: Result of a policy set evaluation.
    type: object
    properties:
      hasError:
        description: A value indicating whether this policy set evaluation has discovered violations.
        type: boolean
      policyViolations:
        description: The list of policy violations.
        type: array
        items:
          $ref: '#/definitions/PolicyViolation'
  PolicyViolation:
    description: Policy violation.
    type: object
    properties:
      code:
        description: The code of the policy violation.
        type: string
      message:
        description: The message of the policy violation.
        type: string
  CloudError:
    description: Error from a REST request.
    type: object
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
        description: The cloud error that occurred
    x-ms-external: true
  EvaluatePoliciesResponse:
    description: Response body for evaluating a policy set.
    type: object
    properties:
      results:
        description: Results of evaluating a policy set.
        type: array
        items:
          $ref: '#/definitions/PolicySetResult'
  CloudErrorBody:
    description: Body of an error from a REST request.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      message:
        description: The error message.
        type: string
      target:
        description: The error target.
        type: string
      details:
        description: Inner errors.
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
    x-ms-external: true
  EvaluatePoliciesProperties:
    description: Properties for evaluating a policy set.
    type: object
    properties:
      factName:
        description: The fact name.
        type: string
      factData:
        description: The fact data.
        type: string
      valueOffset:
        description: The value offset.
        type: string
      userObjectId:
        description: The user for which policies will be evaluated
        type: string
parameters:
  resourceGroupName:
    name: resourceGroupName
    in: path
    description: The name of the resource group.
    required: true
    type: string
    x-ms-parameter-location: method
  subscriptionId:
    name: subscriptionId
    in: path
    description: The subscription ID.
    required: true
    type: string
  api-version:
    name: api-version
    in: query
    description: Client API version.
    required: true
    type: string
    default: '2018-09-15'
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
