components:
  schemas:
    runStepDetailsToolCallsCodeObject:
      title: Code interpreter tool call
      type: object
      description: Details of the Code Interpreter tool call the run step was involved in.
      properties:
        id:
          type: string
          description: The ID of the tool call.
        type:
          type: string
          description: The type of tool call. This is always going to be `code_interpreter` for this type of tool call.
          enum:
          - code_interpreter
          x-ms-enum:
            name: RunStepDetailsToolCallsCodeObjectType
            modelAsString: true
            values:
            - value: code_interpreter
        code_interpreter:
          type: object
          description: The Code Interpreter tool call definition.
          required:
          - input
          - outputs
          properties:
            input:
              type: string
              description: The input to the Code Interpreter tool call.
            outputs:
              type: array
              description: The outputs from the Code Interpreter tool call. Code Interpreter can output one or more items, including text (`logs`) or images (`image`). Each of these are represented by a different object type.
              items:
                type: object
                oneOf:
                - $ref: '#/components/schemas/runStepDetailsToolCallsCodeOutputLogsObject'
                - $ref: '#/components/schemas/runStepDetailsToolCallsCodeOutputImageObject'
      required:
      - id
      - type
      - code_interpreter
    messageContentTextAnnotationsFileCitationObject:
      title: File citation
      type: object
      description: A citation within the message that points to a specific quote from a specific File associated with the assistant or the message. Generated when the assistant uses the "retrieval" tool to search files.
      properties:
        type:
          description: Always `file_citation`.
          type: string
          enum:
          - file_citation
          x-ms-enum:
            name: FileCitationObjectType
            modelAsString: true
            values:
            - value: file_citation
              description: The file citation object type
        text:
          description: The text in the message content that needs to be replaced.
          type: string
        file_citation:
          type: object
          properties:
            file_id:
              description: The ID of the specific File the citation is from.
              type: string
            quote:
              description: The specific quote in the file.
              type: string
          required:
          - file_id
          - quote
        start_index:
          type: integer
          minimum: 0
        end_index:
          type: integer
          minimum: 0
      required:
      - type
      - text
      - file_citation
      - start_index
      - end_index
    threadObject:
      type: object
      title: Thread
      description: Represents a thread that contains [messages](/docs/api-reference/messages).
      properties:
        id:
          description: The identifier, which can be referenced in API endpoints.
          type: string
        object:
          description: The object type, which is always `thread`.
          type: string
          enum:
          - thread
          x-ms-enum:
            name: ThreadObjectType
            modelAsString: true
            values:
            - value: thread
              description: The type of thread object which is always `thread`
        created_at:
          description: The Unix timestamp (in seconds) for when the thread was created.
          type: integer
        metadata:
          description: 'Set of 16 key-value pairs that can be attached to an object. This can be useful for storing additional information about the object in a structured format. Keys can be a maximum of 64 characters long and values can be a maximum of 512 characters long.

            '
          type: object
          nullable: true
      required:
      - id
      - object
      - created_at
      - metadata
    listAssistantFilesResponse:
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/assistantFileObject'
        first_id:
          type: string
          example: file-hLBK7PXBv5Lr2NQT7KLY0ag1
        last_id:
          type: string
          example: file-QLoItBbqwyAJEzlTy4y9kOMM
        has_more:
          type: boolean
          example: false
      required:
      - object
      - data
      - items
      - first_id
      - last_id
      - has_more
    assistantToolsRetrieval:
      type: object
      title: Retrieval tool
      properties:
        type:
          type: string
          description: 'The type of tool being defined: `retrieval`'
          enum:
          - retrieval
          x-ms-enum:
            name: assistantToolsRetrievalType
            modelAsString: true
            values:
            - value: retrieval
              description: retrieval as type of tool being defined
      required:
      - type
    runStepDetailsToolCallsCodeOutputImageObject:
      title: Code interpreter image output
      type: object
      properties:
        type:
          description: Always `image`.
          type: string
          enum:
          - image
          x-ms-enum:
            name: RunStepDetailsToolCallsCodeOutputImageObjectType
            modelAsString: true
            values:
            - value: image
        image:
          type: object
          properties:
            file_id:
              description: The [file](/docs/api-reference/files) ID of the image.
              type: string
          required:
          - file_id
      required:
      - type
      - image
    messageFileObject:
      type: object
      title: Message files
      description: A list of files attached to a `message`.
      properties:
        id:
          description: The identifier, which can be referenced in API endpoints.
          type: string
        object:
          description: The object type, which is always `thread.message.file`.
          type: string
          enum:
          - thread.message.file
          x-ms-enum:
            name: MessageFileObjectType
            modelAsString: true
            values:
            - value: thread.message.file
        created_at:
          description: The Unix timestamp (in seconds) for when the message file was created.
          type: integer
        message_id:
          description: The ID of the [message](/docs/api-reference/messages) that the [File](/docs/api-reference/files) is attached to.
          type: string
      required:
      - id
      - object
      - created_at
      - message_id
    listRunStepsResponse:
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          items:
            $ref: '#/components/schemas/runStepObject'
        first_id:
          type: string
          example: step_hLBK7PXBv5Lr2NQT7KLY0ag1
        last_id:
          type: string
          example: step_QLoItBbqwyAJEzlTy4y9kOMM
        has_more:
          type: boolean
          example: false
      required:
      - object
      - data
      - first_id
      - last_id
      - has_more
    runStepObject:
      type: object
      title: Run steps
      description: 'Represents a step in execution of a run.

        '
      properties:
        id:
          description: The identifier of the run step, which can be referenced in API endpoints.
          type: string
        object:
          description: The object type, which is always `assistant.run.step``.
          type: string
          enum:
          - assistant.run.step
          x-ms-enum:
            name: RunStepObjectType
            modelAsString: true
            values:
            - value: assistant.run.step
              description: The object type, which is always `assistant.run.step`
        created_at:
          description: The Unix timestamp (in seconds) for when the run step was created.
          type: integer
        assistant_id:
          description: The ID of the [assistant](/docs/api-reference/assistants) associated with the run step.
          type: string
        thread_id:
          description: The ID of the [thread](/docs/api-reference/threads) that was run.
          type: string
        run_id:
          description: The ID of the [run](/docs/api-reference/runs) that this run step is a part of.
          type: string
        type:
          description: The type of run step, which can be either `message_creation` or `tool_calls`.
          type: string
          enum:
          - message_creation
          - tool_calls
          x-ms-enum:
            name: RunStepObjectType
            modelAsString: true
            values:
            - value: message_creation
              description: The message_creation run step
            - value: tool_calls
              description: The tool_calls run step
        status:
          description: The status of the run, which can be either `in_progress`, `cancelled`, `failed`, `completed`, or `expired`.
          type: string
          enum:
          - in_progress
          - cancelled
          - failed
          - completed
          - expired
          x-ms-enum:
            name: RunStepObjectStatus
            modelAsString: true
            values:
            - value: in_progress
              description: The in_progress run status
            - value: cancelled
              description: The cancelled run status
            - value: failed
              description: The cancelled run status
            - value: completed
              description: The cancelled run status
            - value: expired
              description: The cancelled run status
        step_details:
          type: object
          description: The details of the run step.
          oneOf:
          - $ref: '#/components/schemas/runStepDetailsMessageCreationObject'
          - $ref: '#/components/schemas/runStepDetailsToolCallsObject'
        last_error:
          type: object
          description: The last error associated with this run step. Will be `null` if there are no errors.
          nullable: true
          properties:
            code:
              type: string
              description: One of `server_error` or `rate_limit_exceeded`.
              enum:
              - server_error
              - rate_limit_exceeded
              x-ms-enum:
                name: LastErrorCode
                modelAsString: true
                values:
                - value: server_error
                  description: The server_error
                - value: rate_limit_exceeded
                  description: The rate_limit_exceeded status
            message:
              type: string
              description: A human-readable description of the error.
          required:
          - code
          - message
        expired_at:
          description: The Unix timestamp (in seconds) for when the run step expired. A step is considered expired if the parent run is expired.
          type: integer
          nullable: true
        cancelled_at:
          description: The Unix timestamp (in seconds) for when the run step was cancelled.
          type: integer
          nullable: true
        failed_at:
          description: The Unix timestamp (in seconds) for when the run step failed.
          type: integer
          nullable: true
        completed_at:
          description: The Unix timestamp (in seconds) for when the run step completed.
          type: integer
          nullable: true
        metadata:
          description: 'Set of 16 key-value pairs that can be attached to an object. This can be useful for storing additional information about the object in a structured format. Keys can be a maximum of 64 characters long and values can be a maximum of 512 characters long.

            '
          type: object
          nullable: true
      required:
      - id
      - object
      - created_at
      - assistant_id
      - thread_id
      - run_id
      - type
      - status
      - step_details
      - last_error
      - expired_at
      - cancelled_at
      - failed_at
      - completed_at
      - metadata
