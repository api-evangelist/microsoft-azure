swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector PolicyElements API
schemes:
- https
tags:
- name: PolicyElements
paths:
  /policy-elements:
    get:
      tags:
      - PolicyElements
      description: Get policies for given scope.
      operationId: microsoftAzurePolicyelementsList
      produces:
      - application/json
      parameters:
      - in: query
        name: scope
        description: Id for any resource managed by Purview.
        required: true
        type: string
      - in: query
        name: filter
        description: Filter supporting full OData syntax.
        type: string
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/PolicyResponseUpdated'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponseModel'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        PolicyElements_List:
          $ref: ./examples/PolicyElements_List.json
      summary: Microsoft Azure Get Policy Elements
definitions:
  ErrorResponseModel:
    description: Default error response model.
    required:
    - error
    type: object
    properties:
      error:
        $ref: '#/definitions/ErrorModel'
  PolicyElementKind:
    description: Represents the kind of policy element.
    enum:
    - Policy
    - PolicySet
    - AttributeRule
    type: string
    x-ms-enum:
      name: PolicyElementKind
      modelAsString: true
  ErrorModel:
    description: Default error model.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: Error code.
        minLength: 1
        type: string
      message:
        description: Error message.
        minLength: 1
        type: string
      target:
        description: Error description.
        type: string
      details:
        description: Error details.
        type: array
        items:
          $ref: '#/definitions/ErrorModel'
  PolicyElementUpdated:
    description: Represents a policy, policy set or attribute rule.
    required:
    - id
    - kind
    - updatedAt
    - version
    type: object
    properties:
      id:
        description: Id of the policy element.
        minLength: 1
        type: string
      scopes:
        description: List of scopes included in this policy.
        type: array
        items:
          type: string
      version:
        format: int64
        description: Current version of policy element. This is auto incremented with each change. Starts with 1.
        type: integer
      elementJson:
        description: Policy element serialized json payload.
        type: string
      kind:
        $ref: '#/definitions/PolicyElementKind'
      updatedAt:
        format: date-time
        description: Time at which this policy element was last updated.
        type: string
  PolicyResponseUpdated:
    description: Response model for policy bulk fetch API.
    type: object
    properties:
      syncToken:
        description: This sync token represents the latest checkpoint for policies. Client need to pass this value while fetching subsequent delta changes using policy-events API.
        type: string
      nextLink:
        description: Link to fetch next set of policy elements.
        type: string
      value:
        description: List of policy elements.
        type: array
        items:
          $ref: '#/definitions/PolicyElementUpdated'
parameters:
  api-version:
    in: query
    name: api-version
    description: The api-version of the service.
    required: true
    type: string
    x-ms-parameter-location: client
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
