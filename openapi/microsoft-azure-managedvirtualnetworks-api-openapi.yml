definitions:
  ManagedVirtualNetworkProperties:
    type: object
    properties:
      vNetId:
        type: string
        readOnly: true
      alias:
        type: string
        readOnly: true
  ManagedPrivateEndpointProperties:
    type: object
    properties:
      connectionState:
        allOf:
        - $ref: '#/definitions/ConnectionStateProperties'
      fqdns:
        type: array
        items:
          type: string
      groupId:
        type: string
      privateLinkResourceId:
        type: string
      provisioningState:
        type: string
  ManagedVirtualNetwork:
    type: object
    allOf:
    - $ref: '#/definitions/ProxyResource'
    properties:
      properties:
        allOf:
        - $ref: '#/definitions/ManagedVirtualNetworkProperties'
  ProxyResource:
    type: object
    properties:
      id:
        type: string
        readOnly: true
      name:
        type: string
        readOnly: true
  ErrorResponseModel:
    type: object
    properties:
      error:
        allOf:
        - $ref: '#/definitions/ErrorModel'
  ErrorModel:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      target:
        type: string
      details:
        type: array
        items:
          $ref: '#/definitions/ErrorModel'
  ManagedPrivateEndpoint:
    type: object
    allOf:
    - $ref: '#/definitions/ProxyResource'
    properties:
      properties:
        allOf:
        - $ref: '#/definitions/ManagedPrivateEndpointProperties'
  ManagedVirtualNetworkList:
    required:
    - value
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/ManagedVirtualNetwork'
      nextLink:
        type: string
      count:
        format: int64
        type: integer
  ManagedPrivateEndpointList:
    required:
    - value
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/ManagedPrivateEndpoint'
      nextLink:
        type: string
      count:
        format: int64
        type: integer
  IActionResult:
    type: object
  ConnectionStateProperties:
    type: object
    properties:
      actionsRequired:
        type: string
        readOnly: true
      description:
        type: string
        readOnly: true
      status:
        type: string
        readOnly: true
parameters:
  managedPrivateEndpointName:
    in: path
    name: managedPrivateEndpointName
    description: The Managed PrivateEndpoint name.
    required: true
    type: string
    minLength: 1
    maxLength: 127
    pattern: ^([_A-Za-z0-9]|([_A-Za-z0-9][-_A-Za-z0-9]{0,125}[_A-Za-z0-9]))$
    x-ms-parameter-location: client
  managedVirtualNetworkName:
    in: path
    name: managedVirtualNetworkName
    description: The Managed VirtualNetwork name. It is restricted to the value 'default' for now.
    required: true
    type: string
    enum:
    - default
    x-ms-enum:
      name: ManagedVirtualNetworkName
      modelAsString: true
    x-ms-parameter-location: client
  api-version:
    in: query
    name: api-version
    description: The api version to use.
    required: true
    type: string
    x-ms-client-name: ApiVersion
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
