        type: array
        items:
          $ref: '#/definitions/MessageProperties'
        x-ms-identifiers: []
      startTime:
        format: date-time
        description: Time in UTC (ISO 8601 format) when the chat began.
        type: string
        readOnly: true
  MessageProperties:
    description: Describes the properties of a Message Details resource.
    required:
    - body
    type: object
    properties:
      contentType:
        description: Content type.
        type: string
        x-ms-enum:
          name: TranscriptContentType
          modelAsString: true
        readOnly: true
      communicationDirection:
        description: Direction of communication.
        enum:
        - inbound
        - outbound
        type: string
        x-ms-enum:
          name: CommunicationDirection
          modelAsString: true
        readOnly: true
      sender:
        description: Name of the sender.
        type: string
      body:
        description: Body of the communication.
        type: string
      createdDate:
        format: date-time
        description: Time in UTC (ISO 8601 format) when the communication was created.
        type: string
        readOnly: true
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: API version.
  SubscriptionIdParameter:
