      tags:
      - ConnectedResources
      summary: Microsoft Azure List Of All Active Deployments That Are Associated With The Marketplace Subscription Linked To The Given Monitor
      operationId: microsoftAzureConnectedpartnerresourcesList
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/MonitorNameParameter'
      responses:
        '200':
          description: Success
