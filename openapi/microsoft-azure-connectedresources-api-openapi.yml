        default:
          description: Default error response.
          schema:
            $ref: '#/definitions/ResourceProviderDefaultErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        ConnectedPartnerResources_List:
          $ref: ./examples/ConnectedPartnerResources_List.json
      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/NewRelic.Observability/monitors/{monitorName}/getBillingInfo
  : post:
      tags:
      - ConnectedResources
      summary: Microsoft Azure Get Marketplace Info Mapped To The Given Monitor
      operationId: microsoftAzureBillinginfoGet
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: monitorName
        in: path
        required: true
        description: Name of the Monitors resource
        pattern: ^.*$
        type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/BillingInfoResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-examples:
        BillingInfo_Get:
          $ref: ./examples/BillingInfo_Get.json
      description: Needs a more full description created.
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/NewRelic.Observability/monitors/{monitorName}/listConnectedPartnerResources
  : post:
      tags:
      - ConnectedResources
      summary: Microsoft Azure List Of All Active Deployments That Are Associated With The Marketplace Subscription Linked To The Given Monitor
      operationId: microsoftAzureConnectedpartnerresourcesList
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
      - name: monitorName
        in: path
        required: true
        description: Name of the Monitors resource
        pattern: ^.*$
        type: string
      - in: body
        name: body
        description: Email Id of the user
        schema:
          $ref: '#/definitions/email'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ConnectedPartnerResourcesListResponse_2'
        default:
          description: An unexpected error response.
          schema:
            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        ConnectedPartnerResources_List:
