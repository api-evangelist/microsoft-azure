            $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        MasterSitesController_ListBySubscription_MaximumSet_Gen:
          $ref: ./examples/MasterSitesController_ListBySubscription_MaximumSet_Gen.json
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.OffAzure/masterSites:
    get:
      operationId: microsoftAzureMastersitescontrollerListbyresourcegroup
      tags:
      - MasterSitesController
      summary: Microsoft Azure Get All Sites
      description: Get all the sites in the resource group.
