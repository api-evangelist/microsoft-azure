swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Template API
schemes:
- https
tags:
- name: Template
paths:
  /messages/channels/{channelId}/templates:
    get:
      operationId: microsoftAzureTemplateoperationsListtemplates
      tags:
      - Template
      description: List all templates for given Azure Communication Services channel
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: channelId
        in: path
        description: The registration ID of the channel.
        required: true
        type: string
        format: uuid
      - name: maxpagesize
        in: query
        description: Number of objects to return per page.
        required: false
        type: integer
        format: int32
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/PagedMessageTemplateItem'
          headers:
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Gets a list of templates:
          $ref: ./examples/Template_ListTemplates.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Messages Channels Channelid Templates
definitions:
  Azure.Core.Foundations.ErrorResponse:
    type: object
    description: A response containing error details.
    properties:
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: The error object.
    required:
    - error
  CommunicationMessagesChannel:
    type: string
    description: The type of the communication messages channel.
    enum:
    - whatsApp
    x-ms-enum:
      name: CommunicationMessagesChannel
      modelAsString: true
      values:
      - name: whatsApp
        value: whatsApp
        description: The WhatsApp communication messages channel type.
  MessageTemplateItem:
    type: object
    description: The message template as returned from the service.
    properties:
      name:
        type: string
        description: The template's name.
        readOnly: true
      language:
        type: string
        description: The template's language, in the ISO 639 format, consist of a two-letter language code followed by an optional two-letter country code, e.g., 'en' or 'en_US'.
      status:
        $ref: '#/definitions/MessageTemplateStatus'
        description: The aggregated template status.
      kind:
        $ref: '#/definitions/CommunicationMessagesChannel'
        description: The type discriminator describing a template type.
    discriminator: kind
    required:
    - name
    - language
    - status
    - kind
  Azure.Core.Foundations.InnerError:
    type: object
    description: An object containing more specific information about the error. As per Microsoft One API guidelines - https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: Inner error.
  MessageTemplateStatus:
    type: string
    description: The aggregated template status.
    enum:
    - approved
    - rejected
    - pending
    - paused
    x-ms-enum:
      name: MessageTemplateStatus
      modelAsString: true
      values:
      - name: approved
        value: approved
        description: Message template is approved.
      - name: rejected
        value: rejected
        description: Message template is rejected.
      - name: pending
        value: pending
        description: Message template is pending.
      - name: paused
        value: paused
        description: Message template is paused.
  PagedMessageTemplateItem:
    type: object
    description: Paged collection of MessageTemplateItem items
    properties:
      value:
        type: array
        description: The MessageTemplateItem items on this page
        items:
          $ref: '#/definitions/MessageTemplateItem'
        x-ms-identifiers: []
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
parameters:
  Azure.Core.ClientRequestIdHeader:
    name: x-ms-client-request-id
    in: header
    description: An opaque, globally-unique, client-generated string identifier for the request.
    required: false
    type: string
    format: uuid
    x-ms-parameter-location: method
    x-ms-client-name: clientRequestId
  Azure.Core.Foundations.ApiVersionParameter:
    name: api-version
    in: query
    description: The API version to use for this operation.
    required: true
    type: string
    minLength: 1
    x-ms-parameter-location: method
    x-ms-client-name: apiVersion
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
