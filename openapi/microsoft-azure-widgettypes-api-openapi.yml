paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/widgetTypes
  : get:
      tags:
      - WidgetTypes
      operationId: microsoftAzureWidgettypesListbyhub
      x-ms-examples:
        WidgetTypes_ListByHub:
          $ref: ./examples/WidgetTypesListByHub.json
      description: Gets all available widget types in the specified hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get all the widget types in the hub.
          schema:
            $ref: '#/definitions/WidgetTypeListResult'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Widgettypes
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/widgetTypes/{widgetTypeName}
  : get:
      tags:
      - WidgetTypes
      operationId: microsoftAzureWidgettypesGet
      x-ms-examples:
        WidgetTypes_Get:
          $ref: ./examples/WidgetTypesGet.json
      description: Gets a widget type in the specified hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: widgetTypeName
        in: path
        required: true
        type: string
        description: The name of the widget type.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully get the widget type.
          schema:
            $ref: '#/definitions/WidgetTypeResourceFormat'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Widgettypes Widgettypename
