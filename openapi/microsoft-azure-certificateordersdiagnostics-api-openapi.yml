swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector CertificateOrdersDiagnostics API
schemes:
- https
tags:
- name: CertificateOrdersDiagnostics
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CertificateRegistration/certificateOrders/{certificateOrderName}/detectors
  : get:
      tags:
      - CertificateOrdersDiagnostics
      summary: Microsoft Azure Microsoft Certificateregistration To Get The List Of Detectors For This Rp
      description: Description for Microsoft.CertificateRegistration to get the list of detectors for this RP.
      operationId: microsoftAzureCertificateordersdiagnosticsListappservicecertificateorderdetectorresponse
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: certificateOrderName
        in: path
        description: The certificate order name for which the response is needed.
        required: true
        type: string
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: ../../../Microsoft.Web/stable/2023-01-01/CommonDefinitions.json#/definitions/DetectorResponseCollection
        default:
          description: App Service error response.
          schema:
            $ref: ../../../Microsoft.Web/stable/2023-01-01/CommonDefinitions.json#/definitions/DefaultErrorResponse
      x-ms-examples:
        List app service certificate detector response:
          $ref: ./examples/Diagnostics_ListAppServiceCertificateOrderDetectorResponse.json
      x-ms-pageable:
        nextLinkName: nextLink
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CertificateRegistration/certificateOrders/{certificateOrderName}/detectors/{detectorName}
  : get:
      tags:
      - CertificateOrdersDiagnostics
      summary: Microsoft Azure Microsoft Certificateregistration Call To Get A Detector Response From App Lens
      description: Description for Microsoft.CertificateRegistration call to get a detector response from App Lens.
      operationId: microsoftAzureCertificateordersdiagnosticsGetappservicecertificateorderdetectorresponse
      parameters:
      - $ref: '#/parameters/resourceGroupNameParameter'
      - name: certificateOrderName
        in: path
        description: The certificate order name for which the response is needed.
        required: true
        type: string
      - name: detectorName
        in: path
        description: The detector name which needs to be run.
        required: true
        type: string
      - name: startTime
        in: query
        description: The start time for detector response.
        type: string
        format: date-time
      - name: endTime
        in: query
        description: The end time for the detector response.
        type: string
        format: date-time
      - name: timeGrain
        in: query
        description: The time grain for the detector response.
        type: string
        pattern: PT[1-9][0-9]+[SMH]
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: ../../../Microsoft.Web/stable/2023-01-01/CommonDefinitions.json#/definitions/DetectorResponse
        default:
          description: App Service error response.
          schema:
            $ref: ../../../Microsoft.Web/stable/2023-01-01/CommonDefinitions.json#/definitions/DefaultErrorResponse
      x-ms-examples:
        Get app service certificate order detector response:
          $ref: ./examples/Diagnostics_GetAppServiceCertificateOrderDetectorResponse.json
parameters:
  resourceGroupNameParameter:
    name: resourceGroupName
    in: path
    description: Name of the resource group to which the resource belongs.
    required: true
    type: string
    maxLength: 90
    minLength: 1
    pattern: ^[-\w\._\(\)]+[^\.]$
    x-ms-parameter-location: method
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Your Azure subscription ID. This is a GUID-formatted string (e.g. 00000000-0000-0000-0000-000000000000).
    required: true
    type: string
  apiVersionParameter:
    name: api-version
    in: query
    description: API Version
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
