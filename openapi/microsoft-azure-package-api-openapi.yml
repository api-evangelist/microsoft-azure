swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Package API
schemes:
- https
tags:
- name: Package
paths:
  /package/{appId}/slot/{slotName}/gzip:
    get:
      description: Packages a published LUIS application as a GZip file to be used in the LUIS container.
      operationId: microsoftAzureAppsPackagepublishedapplicationasgzip
      summary: Microsoft Azure Package  Gets Published Luis Application Package In Binary Stream Gzip Format
      parameters:
      - $ref: '#/parameters/AppIdInPath'
      - $ref: '#/parameters/SlotNameInPath'
      responses:
        '200':
          description: The GZip binary stream of the published application package.
          schema:
            type: file
        default:
          description: Error Response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      produces:
      - application/octet-stream
      - application/json
      x-ms-examples:
        Successful Get published application package request:
          $ref: ./examples/package/SuccessfulGetTrainedApplicationPackageRequest.json
      tags:
      - Package
  /package/{appId}/versions/{versionId}/gzip:
    get:
      description: Packages trained LUIS application as GZip file to be used in the LUIS container.
      operationId: microsoftAzureAppsPackagetrainedapplicationasgzip
      summary: Microsoft Azure Package  Gets Trained Luis Application Package In Binary Stream Gzip Format
      parameters:
      - $ref: '#/parameters/AppIdInPath'
      - $ref: '#/parameters/VersionIdInPath'
      responses:
        '200':
          description: The GZip binary stream of the trained application package.
          schema:
            type: file
        default:
          description: Error Response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      produces:
      - application/octet-stream
      - application/json
      x-ms-examples:
        Successful Get published application package request:
          $ref: ./examples/package/SuccessfulGetPublishedApplicationPackageRequest.json
      tags:
      - Package
definitions:
  ErrorResponse:
    description: Error response when invoking an operation on the API.
    type: object
    properties:
      errorType:
        type: string
    additionalProperties:
      type: object
parameters:
  VersionIdInPath:
    name: versionId
    in: path
    description: The version ID.
    required: true
    type: string
    x-ms-parameter-location: method
  SlotNameInPath:
    name: slotName
    in: path
    description: The publishing slot name.
    required: true
    type: string
    x-ms-parameter-location: method
  AppIdInPath:
    name: appId
    in: path
    required: true
    type: string
    format: uuid
    description: The application ID.
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
