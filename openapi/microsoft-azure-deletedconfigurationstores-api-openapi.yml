paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.AppConfiguration/deletedConfigurationStores:
    get:
      tags:
      - DeletedConfigurationStores
      operationId: microsoftAzureConfigurationstoresListdeleted
      description: Gets information about the deleted configuration stores in a subscription.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: Retrieved information about all deleted configuration stores in a subscription.
          schema:
            $ref: '#/definitions/DeletedConfigurationStoreListResult'
        default:
          description: Error response describing why the operation failed
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        DeletedConfigurationStores_List:
          $ref: ./examples/DeletedConfigurationStoresList.json
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Appconfiguration Deletedconfigurationstores
  ? /subscriptions/{subscriptionId}/providers/Microsoft.AppConfiguration/locations/{location}/deletedConfigurationStores/{configStoreName}
  : get:
      tags:
      - DeletedConfigurationStores
      operationId: microsoftAzureConfigurationstoresGetdeleted
      description: Gets a deleted Azure app configuration store.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/LocationParameter'
      - $ref: '#/parameters/ConfigStoreNameParameter'
      responses:
        '200':
          description: Retrieved information about the deleted configuration store.
          schema:
            $ref: '#/definitions/DeletedConfigurationStore'
        default:
          description: Error response describing why the operation failed
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        DeletedConfigurationStores_Get:
          $ref: ./examples/DeletedConfigurationStoresGet.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Appconfiguration Locations Location Deletedconfigurationstores Configstorename
  ? /subscriptions/{subscriptionId}/providers/Microsoft.AppConfiguration/locations/{location}/deletedConfigurationStores/{configStoreName}/purge
  : post:
      tags:
      - DeletedConfigurationStores
      operationId: microsoftAzureConfigurationstoresPurgedeleted
      x-ms-long-running-operation: true
      description: Permanently deletes the specified configuration store.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/LocationParameter'
      - $ref: '#/parameters/ConfigStoreNameParameter'
      responses:
        '200':
          description: The request was successful; the request was well-formed and received properly.
        '202':
          description: The request was successful; the operation will complete asynchronously.
        '204':
          description: No Content - the specified resource was not found.
        default:
