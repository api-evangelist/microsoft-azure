swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector OncoPhenotype API
schemes:
- https
tags:
- name: OncoPhenotype
paths:
  /onco-phenotype/jobs:
    post:
      operationId: microsoftAzureOncophenotypeCreatejob
      tags:
      - OncoPhenotype
      summary: Microsoft Azure Create Onco Phenotype Job
      description: Creates an Onco Phenotype job with the given request body.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityRequestId'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityFirstSent'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/OncoPhenotypeData'
      responses:
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          schema:
            type: object
            description: Provides status details for long running operations.
            properties:
              id:
                $ref: '#/definitions/Azure.Core.uuid'
                description: The unique ID of the operation.
                readOnly: true
              status:
                $ref: '#/definitions/JobStatus'
                description: The status of the operation
                readOnly: true
              createdDateTime:
                type: string
                format: date-time
                description: The date and time when the processing job was created.
                readOnly: true
              expirationDateTime:
                type: string
                format: date-time
                description: The date and time when the processing job is set to expire.
                readOnly: true
              lastUpdateDateTime:
                type: string
                format: date-time
                description: The date and time when the processing job was last updated.
                readOnly: true
              error:
                $ref: '#/definitions/Azure.Core.Foundations.Error'
                description: Error object that describes the error when status is "Failed".
              result:
                $ref: '#/definitions/OncoPhenotypeInferenceResult'
                description: The result of the operation.
            required:
            - id
            - status
          headers:
            Operation-Location:
              type: string
              format: uri
              description: The location for monitoring the operation state.
            Repeatability-Result:
              type: string
              description: Indicates whether the repeatable request was accepted or rejected.
              enum:
              - accepted
              - rejected
              x-ms-enum:
                name: RepeatabilityResult
                modelAsString: false
                values:
                - name: accepted
                  value: accepted
                  description: If the request was accepted and the server guarantees that the server state reflects a single execution of the operation.
                - name: rejected
                  value: rejected
                  description: 'If the request was rejected because the combination of Repeatability-First-Sent and Repeatability-Request-ID were invalid

                    or because the Repeatability-First-Sent value was outside the range of values held by the server.'
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Creates an Onco Phenotype job with the given request body.:
          $ref: ./examples/SuccessfulOncoPhenotypeRequest.json
      x-ms-long-running-operation: true
  /onco-phenotype/jobs/{id}:
    get:
      operationId: microsoftAzureOncophenotypeGetjob
      tags:
      - OncoPhenotype
      summary: Microsoft Azure Get Onco Phenotype Job Details
      description: Gets the status and details of the Onco Phenotype job.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: id
        in: path
        description: A processing job identifier.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/OncoPhenotypeResult'
          headers:
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Gets the status and details of the Onco Phenotype job.:
          $ref: ./examples/SuccessfulOncoPhenotypeResponse.json
  /oncophenotype/jobs:
    post:
      operationId: microsoftAzureOncophenotypeCreatejob
      tags:
      - OncoPhenotype
      summary: Microsoft Azure Create Onco Phenotype Job
      description: Creates an Onco Phenotype job with the given request body.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityRequestId'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityFirstSent'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/OncoPhenotypeData'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/OncoPhenotypeResult_2'
        '202':
          description: The request has been accepted for processing, but processing has not yet completed.
          headers:
            Operation-Location:
              type: string
              format: uri
              description: The location for monitoring the operation state.
            Retry-After:
              type: integer
              format: int32
              description: The Retry-After header can indicate how long the client should wait before polling the operation status.
            Repeatability-Result:
              type: string
              description: Indicates whether the repeatable request was accepted or rejected.
              enum:
              - accepted
              - rejected
              x-ms-enum:
                name: RepeatabilityResult
                modelAsString: false
                values:
                - name: accepted
                  value: accepted
                  description: If the request was accepted and the server guarantees that the server state reflects a single execution of the operation.
                - name: rejected
                  value: rejected
                  description: 'If the request was rejected because the combination of Repeatability-First-Sent and Repeatability-Request-ID were invalid

                    or because the Repeatability-First-Sent value was outside the range of values held by the server.'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Creates an Onco Phenotype job with the given request body.:
          $ref: ./examples/SuccessfulOncoPhenotypeRequest.json
      x-ms-long-running-operation: true
  /oncophenotype/jobs/{jobId}:
    get:
      operationId: microsoftAzureOncophenotypeGetjob
      tags:
      - OncoPhenotype
      summary: Microsoft Azure Get Onco Phenotype Job Details
      description: Gets the status and details of the Onco Phenotype job.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: jobId
        in: path
        description: A processing job identifier.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/OncoPhenotypeResult_2'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Gets the status and details of the Onco Phenotype job.:
          $ref: ./examples/SuccessfulOncoPhenotypeResponse.json
definitions:
  Azure.Core.uuid:
    type: string
    format: uuid
    description: Universally Unique Identifier
  Fhir.R4.Quantity:
    type: object
    description: 'A measured or measurable amount

      Based on [FHIR Quantity](https://www.hl7.org/fhir/R4/datatypes.html#Quantity)'
    properties:
      value:
        type: number
        format: double
        description: Numerical value (with implicit precision)
      comparator:
        type: string
        description: < | <= | >= | > - how to understand the value
      unit:
        type: string
        description: Unit representation
      system:
        $ref: '#/definitions/Fhir.R4.fhirUri'
        description: System that defines coded unit form
      code:
        type: string
        description: Coded form of the unit
    allOf:
    - $ref: '#/definitions/Fhir.R4.Element'
  Fhir.R4.Range:
    type: object
    description: 'A set of ordered Quantities defined by a low and high limit

      Based on [FHIR Range](https://www.hl7.org/fhir/R4/datatypes.html#Range)'
    properties:
      low:
        $ref: '#/definitions/Fhir.R4.Quantity'
        description: Low limit
      high:
        $ref: '#/definitions/Fhir.R4.Quantity'
        description: High limit
    allOf:
    - $ref: '#/definitions/Fhir.R4.Element'
  TimePeriod:
    type: object
    description: A duration of time during which an event is happening
    properties:
      start:
        type: string
        format: date-time
        description: Starting time with inclusive boundary
      end:
        type: string
        format: date-time
        description: End time with inclusive boundary, if not ongoing
  Fhir.R4.Resource:
    type: object
    description: 'Resource is the ancestor of DomainResource from which most resources are derived. Bundle, Parameters, and Binary extend Resource directly.

      Based on [FHIR Resource](https://www.hl7.org/fhir/r4/resource.html'
    properties:
      resourceType:
        type: string
        description: The type of resource
      id:
        type: string
        description: Resource Id
      meta:
        $ref: '#/definitions/Fhir.R4.Meta'
        description: Metadata about the resource
      implicitRules:
        $ref: '#/definitions/Fhir.R4.fhirUri'
        description: A set of rules under which this content was created
      language:
        type: string
        description: Language of the resource content
    required:
    - resourceType
    additionalProperties: {}
  Fhir.R4.fhirDateTime:
    type: string
    pattern: ([0-9]([0-9]([0-9][1-9]|[1-9]0)|[1-9]00)|[1-9]000)(-(0[1-9]|1[0-2])(-(0[1-9]|[1-2][0-9]|3[0-1])(T([01][0-9]|2[0-3]):[0-5][0-9]:([0-5][0-9]|60)(\.[0-9]{1,9})?)?)?(Z|(\+|-)((0[0-9]|1[0-3]):[0-5][0-9]|14:00)?)?)?
  DocumentContent:
    type: object
    description: The content of the patient document.
    properties:
      sourceType:
        $ref: '#/definitions/DocumentContentSourceType'
        description: 'The type of the content''s source.

          In case the source type is ''inline'', the content is given as a string (for instance, text).

          In case the source type is ''reference'', the content is given as a URI.'
      value:
        type: string
        description: The content of the document, given either inline (as a string) or as a reference (URI).
    required:
    - sourceType
    - value
  DocumentContentSourceType:
    type: string
    description: 'The type of the content''s source.

      In case the source type is ''inline'', the content is given as a string (for instance, text).

      In case the source type is ''reference'', the content is given as a URI.'
    enum:
    - inline
    - reference
    x-ms-enum:
      name: DocumentContentSourceType
      modelAsString: true
      values:
      - name: Inline
        value: inline
        description: The content is given as a string (for instance, text).
      - name: Reference
        value: reference
        description: The content is given as a URI.
  OncoPhenotypeInferenceType:
    type: string
    description: The type of the Onco Phenotype inference.
    enum:
    - tumorSite
    - histology
    - clinicalStageT
    - clinicalStageN
    - clinicalStageM
    - pathologicStageT
    - pathologicStageN
    - pathologicStageM
    - diagnosisDate
    x-ms-enum:
      name: OncoPhenotypeInferenceType
      modelAsString: true
      values:
      - name: TumorSite
        value: tumorSite
      - name: Histology
        value: histology
      - name: ClinicalStageT
        value: clinicalStageT
      - name: ClinicalStageN
        value: clinicalStageN
      - name: ClinicalStageM
        value: clinicalStageM
      - name: PathologicStageT
        value: pathologicStageT
      - name: PathologicStageN
        value: pathologicStageN
      - name: PathologicStageM
        value: pathologicStageM
      - name: DiagnosisDate
        value: diagnosisDate
  Fhir.R4.fhirInstant:
    type: string
    pattern: ([0-9]([0-9]([0-9][1-9]|[1-9]0)|[1-9]00)|[1-9]000)-(0[1-9]|1[0-2])-(0[1-9]|[1-2][0-9]|3[0-1])T([01][0-9]|2[0-3]):[0-5][0-9]:([0-5][0-9]|60)(\.[0-9]{1,9})?(Z|(\+|-)((0[0-9]|1[0-3]):[0-5][0-9]|14:00))
  Azure.Core.Foundations.Error:
    type: object
    description: The error object.
    properties:
      code:
        type: string
        description: One of a server-defined set of error codes.
      message:
        type: string
        description: A human-readable representation of the error.
      target:
        type: string
        description: The target of the error.
      details:
        type: array
        description: An array of details about specific errors that led to this reported error.
        items:
          $ref: '#/definitions/Azure.Core.Foundations.Error'
        x-ms-identifiers: []
      innererror:
        $ref: '#/definitions/Azure.Core.Foundations.InnerError'
        description: An object containing more specific information than the current object about the error.
    required:
    - code
    - message
  ClinicalDocumentType:
    type: string
    description: The type of the clinical document.
    enum:
    - consultation
    - dischargeSummary
    - historyAndPhysical
    - radiologyReport
    - procedure
    - progress
    - laboratory
    - pathologyReport
    x-ms-enum:
      name: ClinicalDocumentType
      modelAsString: true
      values:
      - name: Consultation
        value: consultation
      - name: DischargeSummary
        value: dischargeSummary
      - name: HistoryAndPhysical
        value: historyAndPhysical
      - name: RadiologyReport
        value: radiologyReport
      - name: Procedure
        value: procedure
      - name: Progress
        value: progress
      - name: Laboratory
        value: laboratory
      - name: PathologyReport
        value: pathologyReport
  PatientInfoSex:
    type: string
    description: The patient's sex.
    enum:
    - female
    - male
    - unspecified
    x-ms-enum:
      name: PatientInfoSex
      modelAsString: true
      values:
      - name: Female
        value: female
      - name: Male
        value: male
      - name: Unspecified
        value: unspecified
  Fhir.R4.Coding:
    type: object
    description: 'A Coding is a representation of a defined concept using a symbol from a defined "code system".

      Based on [FHIR Coding](https://www.hl7.org/fhir/R4/datatypes.html#Coding)'
    properties:
      system:
        $ref: '#/definitions/Fhir.R4.fhirUri'
        description: Identity of the terminology system
      version:
        type: string
        description: Version of the system - if relevant
      code:
        type: string
        description: Symbol in syntax defined by the system
      display:
        type: string
        description: Representation defined by the system
    allOf:
    - $ref: '#/definitions/Fhir.R4.Element'
  Azure.Core.Foundations.ErrorResponse:
    type: object
    description: A response containing error details.
    properties:
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: The error object.
    required:
    - error
  OncoPhenotypeModelConfiguration:
    type: object
    description: Configuration affecting the Onco Phenotype model's inference.
    properties:
      verbose:
        type: boolean
        description: An indication whether the model should produce verbose output.
        default: false
      includeEvidence:
        type: boolean
        description: An indication whether the model's output should include evidence for the inferences.
        default: true
      inferenceTypes:
        type: array
        description: 'A list of inference types to be inferred for the current request.

          This could be used if only part of the Onco Phenotype inferences are required.

          If this list is omitted or empty, the model will return all the inference types.'
        items:
          $ref: '#/definitions/OncoPhenotypeInferenceType'
      checkForCancerCase:
        type: boolean
        description: An indication whether to perform a preliminary step on the patient's documents to determine whether they relate to a Cancer case.
        default: false
  PatientRecord:
    type: object
    description: A patient record, including their clinical information and data.
    properties:
      id:
        type: string
        description: A given identifier for the patient. Has to be unique across all patients in a single request.
        minLength: 1
      info:
        $ref: '#/definitions/PatientInfo'
        description: Patient structured information, including demographics and known structured clinical information.
      encounters:
        type: array
        description: Patient encounters/visits.
        items:
          $ref: '#/definitions/Encounter'
      patientDocuments:
        type: array
        description: Patient unstructured clinical data, given as documents.
        items:
          $ref: '#/definitions/PatientDocument'
    required:
    - id
  Fhir.R4.Period:
    type: object
    description: 'A time period defined by a start and end date and optionally time

      Based on [FHIR Period](https://www.hl7.org/fhir/R4/datatypes.html#Period)'
    properties:
      start:
        $ref: '#/definitions/Fhir.R4.fhirDateTime'
        description: Starting time with inclusive boundary
      end:
        $ref: '#/definitions/Fhir.R4.fhirDateTime'
        description: End time with inclusive boundary, if not ongoing
    allOf:
    - $ref: '#/definitions/Fhir.R4.Element'
  PatientInfo:
    type: object
    description: Patient structured information, including demographics and known structured clinical information.
    properties:
      sex:
        $ref: '#/definitions/PatientInfoSex'
        description: The patient's sex.
      birthDate:
        type: string
        format: date
        description: The patient's date of birth.
      clinicalInfo:
        type: array
        description: Known clinical information for the patient, structured.
        items:
          $ref: '#/definitions/Fhir.R4.Resource'
  ClinicalCodedElement:
    type: object
    description: A piece of clinical information, expressed as a code in a clinical coding system.
    properties:
      system:
        type: string
        description: The clinical coding system, e.g. ICD-10, SNOMED-CT, UMLS.
      code:
        type: string
        description: The code within the given clinical coding system.
      name:
        type: string
        description: The name of this coded concept in the coding system.
      value:
        type: string
        description: A value associated with the code within the given clinical coding system.
    required:
    - system
    - code
  OncoPhenotypeData:
    type: object
    description: The body of the Onco Phenotype request.
    properties:
      patients:
        type: array
        description: The list of patients, including their clinical information and data.
        items:
          $ref: '#/definitions/PatientRecord'
      configuration:
        $ref: '#/definitions/OncoPhenotypeModelConfiguration'
        description: Configuration affecting the Onco Phenotype model's inference.
    required:
    - patients
  OncoPhenotypeResult:
    type: object
    description: The response for the Onco Phenotype request.
    properties:
      id:
        $ref: '#/definitions/Azure.Core.uuid'
        description: The unique ID of the operation.
        readOnly: true
      status:
        $ref: '#/definitions/JobStatus'
        description: The status of the operation
        readOnly: true
      createdDateTime:
        type: string
        format: date-time
        description: The date and time when the processing job was created.
        readOnly: true
      expirationDateTime:
        type: string
        format: date-time
        description: The date and time when the processing job is set to expire.
        readOnly: true
      lastUpdateDateTime:
        type: string
        format: date-time
        description: The date and time when the processing job was last updated.
        readOnly: true
      error:
        $ref: '#/definitions/Azure.Core.Foundations.Error'
        description: Error object that describes the error when status is "Failed".
      result:
        $ref: '#/definitions/OncoPhenotypeInferenceResult'
        description: The result of the operation.
    required:
    - id
    - status
  Fhir.R4.Element:
    type: object
    description: 'The base definition for all elements contained inside a resource.

      Based on [FHIR Element](https://www.hl7.org/fhir/R4/element.html)'
    properties:
      id:
        type: string
        description: Unique id for inter-element referencing
      extension:
        type: array
        description: Additional Content defined by implementations
        items:
          $ref: '#/definitions/Fhir.R4.Extension'
  OncoPhenotypePatientResult_2:
    type: object
    description: The results of the model's work for a single patient.
    properties:
      id:
        type: string
        description: The identifier given for the patient in the request.
      inferences:
        type: array
        description: The model's inferences for the given patient.
        items:
          $ref: '#/definitions/OncoPhenotypeInference'
        x-ms-identifiers: []
    required:
    - id
    - inferences
  DocumentAdministrativeMetadata:
    type: object
    description: Document administrative metadata
    properties:
      orderedProcedures:
        type: array
        description: List of procedure information associated with the document.
        minItems: 1
        items:
          $ref: '#/definitions/OrderedProcedure'
        x-ms-identifiers: []
      encounterId:
        type: string
        description: Reference to the encounter associated with the document.
  OncoPhenotypePatientResult:
    type: object
    description: The results of the model's work for a single patient.
    properties:
      patientId:
        type: string
        description: The identifier given for the patient in the request.
      inferences:
        type: array
        description: The model's inferences for the given patient.
        items:
          $ref: '#/definitions/OncoPhenotypeInference'
        x-ms-identifiers: []
    required:
    - patientId
    - inferences
  OncoPhenotypeResults:
    type: object
    description: The inference results for the Onco Phenotype request.
    properties:
      patients:
        type: array
        description: Results for the patients given in the request.
        items:
          $ref: '#/definitions/OncoPhenotypePatientResult_2'
      modelVersion:
        $ref: '#/definitions/ModelVersion'
        description: The version of the model used for inference, expressed as the model date.
    required:
    - patients
    - modelVersion
  Fhir.R4.Identifier:
    type: object
    description: 'An identifier intended for computation

      Based on [FHIR Identifier](https://www.hl7.org/fhir/R4/identifier.html)'
    properties:
      use:
        type: string
        description: usual | official | temp | secondary | old (If known)
      type:
        $ref: '#/definitions/Fhir.R4.CodeableConcept'
        description: Description of identifier
      system:
        $ref: '#/definitions/Fhir.R4.fhirUri'
        description: The namespace for the identifier value
      value:
        type: string
        description: The value that is unique
      period:
        $ref: '#/definitions/Fhir.R4.Period'
        description: Time period when id is/was valid for use
      assigner:
        $ref: '#/definitions/Fhir.R4.Reference'
        description: Organization that issued id (may be just text)
    allOf:
    - $ref: '#/definitions/Fhir.R4.Element'
  ClinicalNoteEvidence:
    type: object
    description: A piece of evidence from a clinical note (text document).
    properties:
      id:
        type: string
        description: The identifier of the document containing the evidence.
      text:
        type: string
        description: The actual text span which is evidence for the inference.
      offset:
        type: integer
        format: int32
        description: The start index of the evidence text span in the document (0 based).
        minimum: 0
      length:
        type: integer
        format: int32
        description: The length of the evidence text span.
        minimum: 1
    required:
    - id
    - offset
    - length
  ModelVersion:
    type: string
    description: The version of the model used for inference, expressed as the model date.
  DocumentAuthor:
    type: object
    description: Document author
    properties:
      id:
        type: string
        description: author id
      fullName:
        type: string
        description: Text representation of the full name
  Fhir.R4.Meta:
    type: object
    description: 'Metadata about a resource

      Based on [FHIR Meta](https://www.hl7.org/fhir/R4/resource.html#Meta)'
    properties:
      versionId:
        type: string
        description: The version specific identifier, as it appears in the version portion of the URL. This value changes when the resource is created, updated, or deleted.
      lastUpdated:
        $ref: '#/definitions/Fhir.R4.fhirInstant'
        description: When the resource last changed - e.g. when the version changed.
      source:
        $ref: '#/definitions/Fhir.R4.fhirUri'
        description: A uri that identifies the source system of the resource. This provides a minimal amount of Provenance information that can be used to track or differentiate the source of information in the resource. The source may identify another FHIR server, document, message, database, etc.
      profile:
        type: array
        description: A list of profiles (references to [StructureDefinition](https://www.hl7.org/fhir/structuredefinition.html) resources) that this resource claims to conform to. The URL is a reference to [StructureDefinition.url](https://www.hl7.org/fhir/structuredefinition-definitions.html#StructureDefinition.url).
        items:
          $ref: '#/definitions/Fhir.R4.fhirUri'
      security:
        type: array
        description: Security labels applied to this resource. These tags connect specific resources to the overall security policy and infrastructure.
        items:
          $ref: '#/definitions/Fhir.R4.Coding'
