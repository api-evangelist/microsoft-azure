swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ServicePrincipalOwners API
schemes:
- https
tags:
- name: ServicePrincipalOwners
paths:
  /{tenantID}/servicePrincipals/{objectId}/owners:
    get:
      tags:
      - ServicePrincipalOwners
      operationId: microsoftAzureServiceprincipalsListowners
      summary: Microsoft Azure Directory Objects That Are Owners Of This Service Principal
      description: The owners are a set of non-admin users who are allowed to modify this object.
      parameters:
      - name: objectId
        in: path
        required: true
        type: string
        description: The object ID of the service principal for which to get owners.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '200':
          description: OK. The operation was successful.
          schema:
            $ref: '#/definitions/DirectoryObjectListResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      x-ms-pageable:
        nextLinkName: odata.nextLink
  /{tenantID}/servicePrincipals/{objectId}/$links/owners:
    post:
      tags:
      - ServicePrincipalOwners
      operationId: microsoftAzureServiceprincipalsAddowner
      description: Add an owner to a service principal.
      parameters:
      - name: objectId
        in: path
        required: true
        type: string
        description: The object ID of the service principal to which to add the owner.
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/AddOwnerParameters'
        description: The URL of the owner object, such as https://graph.windows.net/0b1f9851-1bf0-433f-aec3-cb9272f093dc/directoryObjects/f260bbc4-c254-447b-94cf-293b5ec434dd.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '204':
          description: No Content. Indicates success. No response body is returned.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Post Tenantid Serviceprincipals Objectid $links Owners
  /{tenantID}/servicePrincipals/{objectId}/$links/owners/{ownerObjectId}:
    delete:
      tags:
      - ServicePrincipalOwners
      operationId: microsoftAzureServiceprincipalsRemoveowner
      description: Remove a member from owners.
      parameters:
      - name: objectId
        in: path
        required: true
        type: string
        description: The object ID of the service principal from which to remove the owner.
      - name: ownerObjectId
        in: path
        required: true
        type: string
        description: Owner object id
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '204':
          description: No Content. Indicates success. No response body is returned.
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Delete Tenantid Serviceprincipals Objectid $links Owners Ownerobjectid
definitions:
  ErrorMessage:
    type: object
    properties:
      value:
        type: string
        x-ms-client-name: message
        description: Error message value.
    description: Active Directory error message.
  GraphError:
    type: object
    properties:
      odata.error:
        type: object
        x-ms-client-flatten: true
        $ref: '#/definitions/OdataError'
        description: A Graph API error.
    description: Active Directory error information.
  DirectoryObject:
    type: object
    discriminator: objectType
    properties:
      objectId:
        type: string
        description: The object ID.
        readOnly: true
      objectType:
        type: string
        description: The object type.
      deletionTimestamp:
        type: string
        format: date-time
        description: The time at which the directory object was deleted.
        readOnly: true
        x-nullable: true
    required:
    - objectType
    additionalProperties:
      type: object
    description: Represents an Azure Active Directory object.
  AddOwnerParameters:
    type: object
    properties:
      url:
        type: string
        description: A owner object URL, such as "https://graph.windows.net/0b1f9851-1bf0-433f-aec3-cb9272f093dc/directoryObjects/f260bbc4-c254-447b-94cf-293b5ec434dd", where "0b1f9851-1bf0-433f-aec3-cb9272f093dc" is the tenantId and "f260bbc4-c254-447b-94cf-293b5ec434dd" is the objectId of the owner (user, application, servicePrincipal, group) to be added.
    required:
    - url
    additionalProperties:
      type: object
    description: Request parameters for adding a owner to an application.
  OdataError:
    type: object
    properties:
      code:
        type: string
        description: Error code.
      message:
        type: object
        x-ms-client-flatten: true
        $ref: '#/definitions/ErrorMessage'
        description: Error Message.
    description: Active Directory OData error information.
  DirectoryObjectListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/DirectoryObject'
        description: A collection of DirectoryObject.
      odata.nextLink:
        type: string
        description: The URL to get the next set of results.
    description: DirectoryObject list operation result.
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Client API version.
  tenantIDInPath:
    name: tenantID
    in: path
    required: true
    type: string
    description: The tenant ID.
    x-ms-parameter-location: client
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
