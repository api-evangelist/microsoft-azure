swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Restore API
schemes:
- https
tags:
- name: Restore
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.NetApp/netAppAccounts/{accountName}/capacityPools/{poolName}/volumes/{volumeName}/latestRestoreStatus/current
  : get:
      tags:
      - Restore
      summary: Microsoft Azure Get The Latest Restore Status Of A Volume
      description: Get the latest status of the restore for a volume
      operationId: microsoftAzureBackupsGetvolumelatestrestorestatus
      parameters:
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/AccountName'
      - $ref: '#/parameters/PoolName'
      - $ref: '#/parameters/VolumeName'
      - $ref: ../../../../../common-types/resource-management/v5/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/restoreStatus'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: null
      x-ms-examples:
        Volumes_RestoreStatus:
          $ref: examples/Volumes_LatestRestoreStatus.json
definitions:
  restoreStatus:
    description: Restore status
    type: object
    properties:
      healthy:
        type: boolean
        readOnly: true
        description: Restore health status
      relationshipStatus:
        type: string
        readOnly: true
        description: Status of the restore SnapMirror relationship
        enum:
        - Idle
        - Transferring
        - Failed
        - Unknown
        x-ms-enum:
          name: RelationshipStatus
          modelAsString: true
      mirrorState:
        type: string
        readOnly: true
        description: The status of the restore
        enum:
        - Uninitialized
        - Mirrored
        - Broken
        x-ms-enum:
          name: MirrorState
          modelAsString: true
      unhealthyReason:
        type: string
        readOnly: true
        description: Reason for the unhealthy restore relationship
      errorMessage:
        type: string
        readOnly: true
        description: Displays error message if the restore is in an error state
      totalTransferBytes:
        type: integer
        format: int64
        readOnly: true
        description: Displays the total bytes transferred
parameters:
  PoolName:
    name: poolName
    type: string
    in: path
    required: true
    pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]{0,63}$
    minLength: 1
    maxLength: 64
    description: The name of the capacity pool
    x-ms-parameter-location: method
  VolumeName:
    name: volumeName
    type: string
    in: path
    required: true
    pattern: ^[a-zA-Z][a-zA-Z0-9\-_]{0,63}$
    minLength: 1
    maxLength: 64
    description: The name of the volume
    x-ms-parameter-location: method
  AccountName:
    name: accountName
    type: string
    pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]{0,127}$
    in: path
    required: true
    description: The name of the NetApp account
    x-ms-parameter-location: method
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
