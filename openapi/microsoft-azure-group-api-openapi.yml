  /group:
    post:
      description: Divide candidate faces into groups based on face similarity.<br>* The output is one or more disjointed face groups and a messyGroup. A face group contains faces that have similar looking, often of the same person. Face groups are ranked by group size, i.e. number of faces. Notice that faces belonging to a same person might be split into several groups in the result.<br>* MessyGroup is a special face group containing faces that cannot find any similar counterpart face from original faces. The messyGroup will not appear in the result if all faces found their counterparts.<br>* Group API needs at least 2 candidate faces and 1000 at most. We suggest to try [Face - Verify](https://docs.microsoft.com/rest/api/faceapi/face/verifyfacetoface) when you only have 2 candidate faces.<br>* The 'recognitionModel' associated with the query faces' faceIds should be the same.<br>
      operationId: microsoftAzureFaceGroup
      parameters:
      - name: body
        description: Request body for grouping.
        in: body
        required: true
        x-ms-client-flatten: true
        schema:
          $ref: '#/definitions/GroupRequest'
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        '200':
          description: A successful call returns one or more groups of similar faces (rank by group size) and a messyGroup.
          schema:
            $ref: '#/definitions/GroupResult'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/APIError'
      x-ms-examples:
        Group example:
          $ref: ./examples/Group.json
      summary: Microsoft Azure Post Group
      tags:
      - Group
  /{tenantID}/isMemberOf:
    post:
      tags:
      - Group
      operationId: microsoftAzureGroupsIsmemberof
      description: Checks whether the specified user, group, contact, or service principal is a direct or transitive member of the specified group.
      parameters:
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/CheckGroupMembershipParameters'
        description: The check group membership parameters.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '200':
          description: OK. Indicates success. Returns true if the user, contact, group, or service principal is a direct or a transitive member of the specified group; otherwise, false.
          schema:
            $ref: '#/definitions/CheckGroupMembershipResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Post Tenantid Ismemberof
