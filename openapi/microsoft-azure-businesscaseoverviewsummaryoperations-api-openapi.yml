        description: OS Support Status Distribution.
        readOnly: true
      sqlSupportStatusDistribution:
        $ref: '#/definitions/SupportStatusDistribution'
        description: Sql Support Status Distribution.
        readOnly: true
      paasDistribution:
        $ref: '#/definitions/PaasDistribution'
        description: Shows the distribution of platforms.
        readOnly: true
  OverviewSummary:
    type: object
    description: Overview summary REST resource.
    properties:
      properties:
        $ref: '#/definitions/OverviewSummaryProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  OverviewSummaryListResult:
    type: object
    description: The response of a OverviewSummary list operation.
    properties:
      value:
        type: array
        description: The OverviewSummary items on this page
        items:
          $ref: '#/definitions/OverviewSummary'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  UtilizationData:
