          format: float
          type: number
        readOnly: true
      paybackPeriod:
        type: integer
        format: int32
        description: Payback period.
        readOnly: true
  IaasOsDistribution:
    type: object
    description: Shows the infrastructure as a service machine OS distribution.
    properties:
      windows:
        type: integer
        format: int32
        description: Number of Windows servers.
        readOnly: true
      linux:
        type: integer
        format: int32
        description: Number of Linux servers.
        readOnly: true
      other:
        type: integer
        format: int32
        description: Number of servers neither Windows or Linux.
        readOnly: true
  PaasDistribution:
    type: object
    description: Shows the distribution of platforms.
    properties:
      sqlServers:
        type: integer
        format: int32
        description: Number of SQL Server machines.
        readOnly: true
      iisWebServers:
        type: integer
        format: int32
        description: Number of IIS Web servers.
        readOnly: true
      webAppDistribution:
        type: object
        description: Distribution of webapps for each target type.
        additionalProperties:
          format: int32
          type: integer
        readOnly: true
