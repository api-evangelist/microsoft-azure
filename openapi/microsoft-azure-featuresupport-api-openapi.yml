swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector FeatureSupport API
schemes:
- https
tags:
- name: FeatureSupport
paths:
  /Subscriptions/{subscriptionId}/providers/Microsoft.RecoveryServices/locations/{azureRegion}/backupValidateFeatures:
    post:
      tags:
      - FeatureSupport
      summary: Microsoft Azure It Will Validate If Given Feature With Resource Properties Is Supported In Service
      operationId: microsoftAzureFeaturesupportValidate
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/AzureRegion'
      - $ref: '#/parameters/SubscriptionId'
      - name: parameters
        in: body
        description: Feature support request object
        required: true
        schema:
          $ref: '#/definitions/FeatureSupportRequest'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/AzureVMResourceFeatureSupportResponse'
      x-ms-examples:
        Check Azure Vm Backup Feature Support:
          $ref: ./examples/AzureIaasVm/BackupFeature_Validate.json
      description: Needs a more full description created.
definitions:
  AzureVMResourceFeatureSupportResponse:
    description: Response for feature support requests for Azure IaasVm
    type: object
    properties:
      supportStatus:
        description: Support status of feature
        enum:
        - Invalid
        - Supported
        - DefaultOFF
        - DefaultON
        - NotSupported
        type: string
        x-ms-enum:
          name: SupportStatus
          modelAsString: true
  FeatureSupportRequest:
    description: Base class for feature request
    required:
    - featureType
    type: object
    properties:
      featureType:
        description: backup support feature type.
        type: string
    discriminator: featureType
parameters:
  AzureRegion:
    name: azureRegion
    in: path
    description: Azure region to hit Api
    required: true
    type: string
    x-ms-parameter-location: method
  ApiVersion:
    name: api-version
    in: query
    description: Client Api Version.
    required: true
    type: string
  SubscriptionId:
    name: subscriptionId
    in: path
    description: The subscription Id.
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
