swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Model Evaluations: API'
schemes:
- https
tags:
- name: 'Custom Speech Model Evaluations:'
paths:
  /evaluations/locales:
    get:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Gets A List Of Supported Locales For Evaluations
      operationId: microsoftAzureGetsupportedlocalesforevaluations
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get the supported locales:
          $ref: ./examples/get_supported_evaluations_locales.json
      description: Needs a more full description created.
  /evaluations:
    get:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Gets The List Of Evaluations For The Authenticated Subscription
      operationId: microsoftAzureGetevaluations
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/skipQueryParameter'
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedEvaluations'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all evaluations:
          $ref: ./examples/get_evaluations.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Creates A New Evaluation
      operationId: microsoftAzureCreateevaluation
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: evaluation
        description: The details of the new evaluation.
        required: true
        schema:
          $ref: '#/definitions/Evaluation'
      responses:
        '201':
          description: The response contains information about the entity as payload and its location as header.
          schema:
            $ref: '#/definitions/Evaluation'
          headers:
            Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Create a evaluation:
          $ref: ./examples/create_evaluation.json
      description: Needs a more full description created.
  /evaluations/{id}/files:
    get:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Gets The Files Of The Evaluation Identified By The Given Id
      operationId: microsoftAzureGetevaluationfiles
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the evaluation.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      - $ref: '#/parameters/skipQueryParameter'
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedFiles'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all files:
          $ref: ./examples/get_evaluation_files.json
      description: Needs a more full description created.
  /evaluations/{id}/files/{fileId}:
    get:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Gets One Specific File Identified With Fileid From An Evaluation Identified With Id
      operationId: microsoftAzureGetevaluationfile
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the evaluation.
        required: true
        type: string
        format: uuid
      - in: path
        name: fileId
        description: The identifier of the file.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/File'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get a file:
          $ref: ./examples/get_evaluation_file.json
      description: Needs a more full description created.
  /evaluations/{id}:
    get:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Gets The Evaluation Identified By The Given Id
      operationId: microsoftAzureGetevaluation
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the evaluation.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Evaluation'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get a evaluation:
          $ref: ./examples/get_evaluation.json
      description: Needs a more full description created.
    patch:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Updates The Mutable Details Of The Evaluation Identified By Its Id
      operationId: microsoftAzureUpdateevaluation
      consumes:
      - application/json
      - application/merge-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the evaluation.
        required: true
        type: string
        format: uuid
      - in: body
        name: evaluationUpdate
        description: The object containing the updated fields of the evaluation.
        required: true
        schema:
          $ref: '#/definitions/EvaluationUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Evaluation'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update a evaluation:
          $ref: ./examples/update_evaluation.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Model Evaluations:'
      summary: Microsoft Azure Deletes The Evaluation Identified By The Given Id
      operationId: microsoftAzureDeleteevaluation
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the evaluation.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The evaluation was successfully deleted or did not exist.
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete a evaluation:
          $ref: ./examples/delete_evaluation.json
      description: Needs a more full description created.
definitions:
  EvaluationProperties:
    title: EvaluationProperties
    type: object
