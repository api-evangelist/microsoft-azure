      - name: rejectOptions
        in: body
        description: RejectOptions
        required: true
        schema:
          $ref: '#/definitions/RejectOptions'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/RejectResult'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Reject Cloud Event:
          $ref: ./examples/reject.json
      summary: Microsoft Azure Post Topics Topicname Eventsubscriptions Eventsubscriptionname:reject
      tags:
      - Topics
  /topics/{topicName}/eventsubscriptions/{eventSubscriptionName}:renewLock:
    post:
      operationId: microsoftAzureRenewcloudeventlocks
      description: Renew lock for batch of Cloud Events. The server responds with an HTTP 200 status code if the request is successfully accepted. The response body will include the set of successfully renewed lockTokens, along with other failed lockTokens with their corresponding error information.
