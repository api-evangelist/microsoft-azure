          schema:
            $ref: '#/definitions/CloudError_3'
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Applications Applicationname
    patch:
