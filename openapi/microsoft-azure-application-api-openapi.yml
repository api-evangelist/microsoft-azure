      responses:
        '200':
          description: Successfully retrieved applications in application group.
          schema:
            $ref: '#/definitions/ApplicationList'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError_3'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Applications
  /{tenantID}/applications:
    post:
      tags:
      - Application
      operationId: microsoftAzureApplicationsCreate
      description: Create a new application.
      parameters:
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/ApplicationCreateParameters'
        description: The parameters for creating an application.
      - $ref: '#/parameters/ApiVersionParameter_2'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '201':
          description: The application was created successfully.
          schema:
            $ref: '#/definitions/Application_4'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      summary: Microsoft Azure Post Tenantid Applications
    get:
      tags:
      - Application
      operationId: microsoftAzureApplicationsList
      description: Lists applications by filter parameters.
      parameters:
      - name: $filter
        in: query
        required: false
        type: string
        description: The filters to apply to the operation.
      - $ref: '#/parameters/ApiVersionParameter_2'
      - $ref: '#/parameters/tenantIDInPath'
      responses:
        '200':
          description: OK. The operation was successful.
          schema:
            $ref: '#/definitions/ApplicationListResult'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/GraphError'
      x-ms-odata: '#/definitions/Application'
      x-ms-pageable:
        nextLinkName: odata.nextLink
        operationName: Applications_ListNext
      summary: Microsoft Azure Get Tenantid Applications
  /{tenantID}/deletedApplications/{applicationObjectId}:
    delete:
