      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/ResourceGroupNameParameter
      - $ref: '#/parameters/ApplicationGroupNameParameter'
      - $ref: '#/parameters/ApplicationNameParameter_2'
      - name: application
        description: Object containing Application definitions.
        in: body
        required: false
        schema:
          $ref: '#/definitions/ApplicationPatch'
      responses:
        '200':
          description: Successfully updated application.
          schema:
            $ref: '#/definitions/Application_3'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError_3'
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Applicationgroups Applicationgroupname Applications Applicationname
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.DesktopVirtualization/applicationGroups/{applicationGroupName}/applications
  : get:
      tags:
      - Application
      operationId: microsoftAzureApplicationsList
      description: List applications.
      x-ms-examples:
        Applications_List:
          $ref: ./examples/Application_List.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ApiVersionParameter
      - $ref: ../../../../../common-types/resource-management/v1/types.json#/parameters/SubscriptionIdParameter
