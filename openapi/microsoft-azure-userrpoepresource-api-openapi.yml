definitions:
  DataPartitionNames:
    type: object
    description: The list of Energy services resource's Data Partition Names.
    properties:
      name:
        type: string
  EnergyService:
    required:
    - location
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/Resource
    properties:
      properties:
        $ref: '#/definitions/EnergyServiceProperties'
      tags:
        description: Resource tags.
        type: object
        additionalProperties:
          type: string
      location:
        description: Geo-location where the resource lives.
        type: string
  EnergyServiceProperties:
    type: object
    properties:
      dnsName:
        type: string
        readOnly: true
      provisioningState:
        enum:
        - Unknown
        - Succeeded
        - Failed
        - Canceled
        - Creating
        - Deleting
        - Updating
        type: string
        readOnly: true
        x-ms-enum:
          name: ProvisioningState
          modelAsString: true
      authAppId:
        type: string
        readOnly: false
      dataPartitionNames:
        type: array
        items:
          $ref: '#/definitions/DataPartitionNames'
        x-ms-identifiers: []
  EnergyServiceList:
    description: The list of oep resources.
    type: object
    properties:
      nextLink:
        description: The link used to get the next page of oep resources list.
        type: string
      value:
        description: The list of oep resources.
        type: array
        items:
          $ref: '#/definitions/EnergyService'
