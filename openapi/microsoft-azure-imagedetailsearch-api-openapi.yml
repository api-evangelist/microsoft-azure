swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ImageDetailSearch API
schemes:
- https
tags:
- name: ImageDetailSearch
paths:
  /images/details:
    get:
      summary: 'Microsoft Azure The Image Detail Search Api Lets You Search On Bing And Get Back Insights About An Image, Such As Webpages That Include The Image This Section Provides Technical Details About The Query Parameters And Headers That You Use To Request Insights Of Images And The Json Response Objects That Contain Them For Examples That Show How To Make Requests, See [searching The Web For Images] Https: Docs Microsoft Com Azure Cognitive Services Bing Image Search Search The Web'
      operationId: microsoftAzureImagesDetails
      tags:
      - ImageDetailSearch
      parameters:
      - $ref: '#/parameters/x-bingapis-sdk'
      - name: Accept
        in: header
        description: The default media type is application/json. To specify that the response use [JSON-LD](http://json-ld.org/), set the Accept header to application/ld+json.
        required: false
        type: string
      - name: Accept-Language
        x-ms-client-name: AcceptLanguage
        in: header
        description: A comma-delimited list of one or more languages to use for user interface strings. The list is in decreasing order of preference. For additional information, including expected format, see [RFC2616](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html). This header and the [setLang](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#setlang) query parameter are mutually exclusive; do not specify both. If you set this header, you must also specify the [cc](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#cc) query parameter. To determine the market to return results for, Bing uses the first supported language it finds from the list and combines it with the cc parameter value. If the list does not include a supported language, Bing finds the closest language and market that supports the request or it uses an aggregated or default market for the results. To determine the market that Bing used, see the BingAPIs-Market header. Use this header and the cc query parameter only if you specify multiple languages. Otherwise, use the [mkt](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#mkt) and [setLang](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#setlang) query parameters. A user interface string is a string that's used as a label in a user interface. There are few user interface strings in the JSON response objects. Any links to Bing.com properties in the response objects apply the specified language.
        required: false
        type: string
      - name: Content-Type
        x-ms-client-name: ContentType
        in: header
        description: Optional request header. If you set the [modules](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#modulesrequested) query parameter to RecognizedEntities, you may specify the binary of an image in the body of a POST request. If you specify the image in the body of a POST request, you must specify this header and set its value to multipart/form-data. The maximum image size is 1 MB.
        required: false
        type: string
      - name: User-Agent
        x-ms-client-name: UserAgent
        in: header
        description: 'The user agent originating the request. Bing uses the user agent to provide mobile users with an optimized experience. Although optional, you are encouraged to always specify this header. The user-agent should be the same string that any commonly used browser sends. For information about user agents, see [RFC 2616](http://www.w3.org/Protocols/rfc2616/rfc2616-sec14.html). The following are examples of user-agent strings. Windows Phone: Mozilla/5.0 (compatible; MSIE 10.0; Windows Phone 8.0; Trident/6.0; IEMobile/10.0; ARM; Touch; NOKIA; Lumia 822). Android: Mozilla / 5.0 (Linux; U; Android 2.3.5; en - us; SCH - I500 Build / GINGERBREAD) AppleWebKit / 533.1 (KHTML; like Gecko) Version / 4.0 Mobile Safari / 533.1. iPhone: Mozilla / 5.0 (iPhone; CPU iPhone OS 6_1 like Mac OS X) AppleWebKit / 536.26 (KHTML; like Gecko) Mobile / 10B142 iPhone4; 1 BingWeb / 3.03.1428.20120423. PC: Mozilla / 5.0 (Windows NT 6.3; WOW64; Trident / 7.0; Touch; rv:11.0) like Gecko. iPad: Mozilla / 5.0 (iPad; CPU OS 7_0 like Mac OS X) AppleWebKit / 537.51.1 (KHTML, like Gecko) Version / 7.0 Mobile / 11A465 Safari / 9537.53'
        required: false
        type: string
      - name: X-MSEdge-ClientID
        x-ms-client-name: ClientId
        in: header
        description: 'Bing uses this header to provide users with consistent behavior across Bing API calls. Bing often flights new features and improvements, and it uses the client ID as a key for assigning traffic on different flights. If you do not use the same client ID for a user across multiple requests, then Bing may assign the user to multiple conflicting flights. Being assigned to multiple conflicting flights can lead to an inconsistent user experience. For example, if the second request has a different flight assignment than the first, the experience may be unexpected. Also, Bing can use the client ID to tailor web results to that client ID’s search history, providing a richer experience for the user. Bing also uses this header to help improve result rankings by analyzing the activity generated by a client ID. The relevance improvements help with better quality of results delivered by Bing APIs and in turn enables higher click-through rates for the API consumer. IMPORTANT: Although optional, you should consider this header required. Persisting the client ID across multiple requests for the same end user and device combination enables 1) the API consumer to receive a consistent user experience, and 2) higher click-through rates via better quality of results from the Bing APIs. Each user that uses your application on the device must have a unique, Bing generated client ID. If you do not include this header in the request, Bing generates an ID and returns it in the X-MSEdge-ClientID response header. The only time that you should NOT include this header in a request is the first time the user uses your app on that device. Use the client ID for each Bing API request that your app makes for this user on the device. Persist the client ID. To persist the ID in a browser app, use a persistent HTTP cookie to ensure the ID is used across all sessions. Do not use a session cookie. For other apps such as mobile apps, use the device''s persistent storage to persist the ID. The next time the user uses your app on that device, get the client ID that you persisted. Bing responses may or may not include this header. If the response includes this header, capture the client ID and use it for all subsequent Bing requests for the user on that device. If you include the X-MSEdge-ClientID, you must not include cookies in the request.'
        required: false
        type: string
      - name: X-MSEdge-ClientIP
        x-ms-client-name: ClientIp
        in: header
        description: The IPv4 or IPv6 address of the client device. The IP address is used to discover the user's location. Bing uses the location information to determine safe search behavior. Although optional, you are encouraged to always specify this header and the X-Search-Location header. Do not obfuscate the address (for example, by changing the last octet to 0). Obfuscating the address results in the location not being anywhere near the device's actual location, which may result in Bing serving erroneous results.
        required: false
        type: string
      - name: X-Search-Location
        x-ms-client-name: Location
        in: header
        description: 'A semicolon-delimited list of key/value pairs that describe the client''s geographical location. Bing uses the location information to determine safe search behavior and to return relevant local content. Specify the key/value pair as <key>:<value>. The following are the keys that you use to specify the user''s location. lat (required): The latitude of the client''s location, in degrees. The latitude must be greater than or equal to -90.0 and less than or equal to +90.0. Negative values indicate southern latitudes and positive values indicate northern latitudes. long (required): The longitude of the client''s location, in degrees. The longitude must be greater than or equal to -180.0 and less than or equal to +180.0. Negative values indicate western longitudes and positive values indicate eastern longitudes. re (required): The radius, in meters, which specifies the horizontal accuracy of the coordinates. Pass the value returned by the device''s location service. Typical values might be 22m for GPS/Wi-Fi, 380m for cell tower triangulation, and 18,000m for reverse IP lookup. ts (optional): The UTC UNIX timestamp of when the client was at the location. (The UNIX timestamp is the number of seconds since January 1, 1970.) head (optional): The client''s relative heading or direction of travel. Specify the direction of travel as degrees from 0 through 360, counting clockwise relative to true north. Specify this key only if the sp key is nonzero. sp (optional): The horizontal velocity (speed), in meters per second, that the client device is traveling. alt (optional): The altitude of the client device, in meters. are (optional): The radius, in meters, that specifies the vertical accuracy of the coordinates. Specify this key only if you specify the alt key. Although many of the keys are optional, the more information that you provide, the more accurate the location results are. Although optional, you are encouraged to always specify the user''s geographical location. Providing the location is especially important if the client''s IP address does not accurately reflect the user''s physical location (for example, if the client uses VPN). For optimal results, you should include this header and the X-MSEdge-ClientIP header, but at a minimum, you should include this header.'
        required: false
        type: string
      - name: cab
        x-ms-client-name: CropBottom
        in: query
        description: The bottom coordinate of the region to crop. The coordinate is a fractional value of the original image's height and is measured from the top, left corner of the image. Specify the coordinate as a value from 0.0 through 1.0. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: number
        format: float
      - name: cal
        x-ms-client-name: CropLeft
        in: query
        description: The left coordinate of the region to crop. The coordinate is a fractional value of the original image's height and is measured from the top, left corner of the image. Specify the coordinate as a value from 0.0 through 1.0. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: number
        format: float
      - name: car
        x-ms-client-name: CropRight
        in: query
        description: The right coordinate of the region to crop. The coordinate is a fractional value of the original image's height and is measured from the top, left corner of the image. Specify the coordinate as a value from 0.0 through 1.0. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: number
        format: float
      - name: cat
        x-ms-client-name: CropTop
        in: query
        description: The top coordinate of the region to crop. The coordinate is a fractional value of the original image's height and is measured from the top, left corner of the image. Specify the coordinate as a value from 0.0 through 1.0. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: number
        format: float
      - name: ct
        x-ms-client-name: CropType
        in: query
        description: 'The crop type to use when cropping the image based on the coordinates specified in the cal, cat, car, and cab parameters. The following are the possible values. 0: Rectangular (default). Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.'
        required: false
        type: string
        enum:
        - Rectangular
        x-ms-enum:
          name: ImageCropType
          modelAsString: true
      - name: cc
        x-ms-client-name: CountryCode
        in: query
        description: A 2-character country code of the country where the results come from. For a list of possible values, see [Market Codes](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#market-codes). If you set this parameter, you must also specify the [Accept-Language](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#acceptlanguage) header. Bing uses the first supported language it finds from the languages list, and combine that language with the country code that you specify to determine the market to return results for. If the languages list does not include a supported language, Bing finds the closest language and market that supports the request, or it may use an aggregated or default market for the results instead of a specified one. You should use this query parameter and the Accept-Language query parameter only if you specify multiple languages; otherwise, you should use the mkt and setLang query parameters. This parameter and the [mkt](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#mkt) query parameter are mutually exclusive—do not specify both.
        required: false
        type: string
      - name: id
        x-ms-client-name: Id
        in: query
        description: An ID that uniquely identifies an image. Use this parameter to ensure that the specified image is the first image in the list of images that Bing returns. The [Image](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#image) object's imageId field contains the ID that you set this parameter to.
        required: false
        type: string
      - name: imgUrl
        x-ms-client-name: ImageUrl
        in: query
        description: The URL of an image that you want to get insights of. Use this parameter as an alternative to using the insightsToken parameter to specify the image. You may also specify the image by placing the binary of the image in the body of a POST request. If you use the binary option, see the [Content-Type](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#contenttype) header. The maximum supported image size is 1 MB. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: string
      - name: insightsToken
        x-ms-client-name: InsightsToken
        in: query
        description: An image token. The [Image](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#image) object's [imageInsightsToken](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#image-imageinsightstoken) contains the token. Specify this parameter to get additional information about an image, such as a caption or shopping source. For a list of the additional information about an image that you can get, see the [modules](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#modulesrequested) query parameter. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.
        required: false
        type: string
      - name: modules
        x-ms-client-name: Modules
        in: query
        description: 'A comma-delimited list of insights to request. The following are the possible case-insensitive values. All: Return all insights, if available, except RecognizedEntities. BRQ: Best representative query. The query term that best describes the image. Caption: A caption that provides information about the image. If the caption contains entities, the response may include links to images of those entities. Collections: A list of related images. Recipes: A list of recipes for cooking the food shown in the images. PagesIncluding: A list of webpages that include the image. RecognizedEntities: A list of entities (people) that were recognized in the image. NOTE: You may not specify this module with any other module. If you specify it with other modules, the response doesn''t include recognized entities. RelatedSearches: A list of related searches made by others. ShoppingSources: A list of merchants where you can buy related offerings. SimilarImages: A list of images that are visually similar to the original image. SimilarProducts: A list of images that contain a product that is similar to a product found in the original image. Tags: Provides characteristics of the type of content found in the image. For example, if the image is of a person, the tags might indicate the person''s gender and type of clothes they''re wearing. If you specify a module and there is no data for the module, the response object doesn''t include the related field. For example, if you specify Caption and it does not exist, the response doesn''t include the imageCaption field. To include related searches, the request must include the original query string. Although the original query string is not required for similar images or products, you should always include it because it can help improve relevance and the results. Use this parameter only with the Insights API. Do not specify this parameter when calling the Images, Trending Images, or Web Search APIs.'
        required: false
        type: array
        items:
          type: string
          enum:
          - All
          - BRQ
          - Caption
          - Collections
          - Recipes
          - PagesIncluding
          - RecognizedEntities
          - RelatedSearches
          - ShoppingSources
          - SimilarImages
          - SimilarProducts
          - Tags
          x-ms-enum:
            name: ImageInsightModule
            modelAsString: true
        collectionFormat: csv
      - name: mkt
        x-ms-client-name: Market
        in: query
        description: 'The market where the results come from. Typically, mkt is the country where the user is making the request from. However, it could be a different country if the user is not located in a country where Bing delivers results. The market must be in the form <language code>-<country code>. For example, en-US. The string is case insensitive. For a list of possible market values, see [Market Codes](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#market-codes). NOTE: If known, you are encouraged to always specify the market. Specifying the market helps Bing route the request and return an appropriate and optimal response. If you specify a market that is not listed in [Market Codes](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#market-codes), Bing uses a best fit market code based on an internal mapping that is subject to change. This parameter and the [cc](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#cc) query parameter are mutually exclusive—do not specify both.'
        required: false
        type: string
      - name: q
        x-ms-client-name: Query
        in: query
        description: The user's search query term. The term cannot be empty. The term may contain [Bing Advanced Operators](http://msdn.microsoft.com/library/ff795620.aspx). For example, to limit images to a specific domain, use the [site:](http://msdn.microsoft.com/library/ff795613.aspx) operator. To help improve relevance of an insights query (see [insightsToken](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#insightstoken)), you should always include the user's query term. Use this parameter only with the Image Search API.Do not specify this parameter when calling the Trending Images API.
        required: true
        type: string
      - name: safeSearch
        x-ms-client-name: SafeSearch
        in: query
        description: 'Filter images for adult content. The following are the possible filter values. Off: May return images with adult content. If the request is through the Image Search API, the response includes thumbnail images that are clear (non-fuzzy). However, if the request is through the Web Search API, the response includes thumbnail images that are pixelated (fuzzy). Moderate: If the request is through the Image Search API, the response doesn''t include images with adult content. If the request is through the Web Search API, the response may include images with adult content (the thumbnail images are pixelated (fuzzy)). Strict: Do not return images with adult content. The default is Moderate. If the request comes from a market that Bing''s adult policy requires that safeSearch is set to Strict, Bing ignores the safeSearch value and uses Strict. If you use the site: query operator, there is the chance that the response may contain adult content regardless of what the safeSearch query parameter is set to. Use site: only if you are aware of the content on the site and your scenario supports the possibility of adult content.'
        required: false
        type: string
        enum:
        - 'Off'
        - Moderate
        - Strict
        x-ms-enum:
          name: SafeSearch
          modelAsString: true
      - name: setLang
        x-ms-client-name: SetLang
        in: query
        description: The language to use for user interface strings. Specify the language using the ISO 639-1 2-letter language code. For example, the language code for English is EN. The default is EN (English). Although optional, you should always specify the language. Typically, you set setLang to the same language specified by mkt unless the user wants the user interface strings displayed in a different language. This parameter and the [Accept-Language](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#acceptlanguage) header are mutually exclusive; do not specify both. A user interface string is a string that's used as a label in a user interface. There are few user interface strings in the JSON response objects. Also, any links to Bing.com properties in the response objects apply the specified language.
        required: false
        type: string
      responses:
        '200':
          description: Success.
          schema:
            $ref: '#/definitions/ImageInsights'
        default:
          description: An error has occurred. Check the response type and/or status code for more details.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Successful image detail:
          $ref: ./examples/SuccessfulImageDetailRequest.json
      description: Needs a more full description created.
definitions:
  ImageTagsModule:
    description: Defines the characteristics of content found in an image.
    type: object
    required:
    - value
    properties:
      value:
        description: A list of tags that describe the characteristics of the content found in the image. For example, if the image is of a musical artist, the list might include Female, Dress, and Music to indicate the person is female music artist that's wearing a dress.
        type: array
        items:
          $ref: '#/definitions/InsightsTag'
  Response:
    description: Defines a response. All schemas that could be returned at the root of a response should inherit from this
    allOf:
    - $ref: '#/definitions/Identifiable'
    type: object
    properties:
      readLink:
        description: The URL that returns this resource.
        readOnly: true
        type: string
      webSearchUrl:
        description: The URL To Bing's search result for this item.
        readOnly: true
        type: string
  StructuredValue:
    allOf:
    - $ref: '#/definitions/Intangible'
    type: object
  Intangible:
    description: A utility class that serves as the umbrella for a number of 'intangible' things such as quantities, structured values, etc.
    allOf:
    - $ref: '#/definitions/Thing'
    type: object
  CreativeWork:
    description: The most generic kind of creative work, including books, movies, photographs, software programs, etc.
    allOf:
    - $ref: '#/definitions/Thing'
    type: object
    properties:
      thumbnailUrl:
        description: The URL to a thumbnail of the item.
        readOnly: true
        type: string
      provider:
        description: The source of the creative work.
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/Thing'
      datePublished:
        description: The date on which the CreativeWork was published.
        readOnly: true
        type: string
      text:
        description: Text content of this creative work
        readOnly: true
        type: string
  Rating:
    description: Defines a rating.
    allOf:
    - $ref: '#/definitions/PropertiesItem'
    type: object
    required:
    - ratingValue
    properties:
      ratingValue:
        description: The mean (average) rating. The possible values are 1.0 through 5.0.
        type: number
        format: float
      bestRating:
        description: The highest rated review. The possible values are 1.0 through 5.0.
        readOnly: true
        type: number
        format: float
  NormalizedRectangle:
    description: Defines a region of an image. The region is defined by the coordinates of the top, left corner and bottom, right corner of the region. The coordinates are fractional values of the original image's width and height in the range 0.0 through 1.0.
    allOf:
    - $ref: '#/definitions/StructuredValue'
    type: object
    required:
    - left
    - top
    - right
    - bottom
    properties:
      left:
        description: The left coordinate.
        type: number
        format: float
      top:
        description: The top coordinate
        type: number
        format: float
      right:
        description: The right coordinate
        type: number
        format: float
      bottom:
        description: The bottom coordinate
        type: number
        format: float
  PropertiesItem:
    description: Defines an item.
    x-ms-discriminator-value: Properties/Item
    discriminator: _type
    type: object
    required:
    - _type
    properties:
      text:
        description: Text representation of an item.
        readOnly: true
        type: string
      _type:
        type: string
  RelatedCollectionsModule:
    description: Defines a list of webpages that contain related images.
    type: object
    properties:
      value:
        description: A list of webpages that contain related images.
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/ImageGallery'
  InsightsTag:
    description: Defines a characteristic of the content found in the image.
    type: object
    properties:
      name:
        description: The name of the characteristic. For example, cat, kitty, calico cat.
        readOnly: true
        type: string
  RecognizedEntity:
    description: Defines a recognized entity.
    allOf:
    - $ref: '#/definitions/Response'
    type: object
    properties:
      entity:
        description: 'The entity that was recognized. The following are the possible entity objects: Person'
        $ref: '#/definitions/Thing'
        readOnly: true
      matchConfidence:
        description: The confidence that Bing has that the entity in the image matches this entity. The confidence ranges from 0.0 through 1.0 with 1.0 being very confident.
        readOnly: true
        type: number
        format: float
  ImageInsightsImageCaption:
    description: Defines an image's caption.
    x-ms-discriminator-value: ImageInsights/ImageCaption
    type: object
    required:
    - caption
    - dataSourceUrl
    - relatedSearches
    properties:
      caption:
        description: A caption about the image.
        type: string
      dataSourceUrl:
        description: The URL to the website where the caption was found. You must attribute the caption to the source. For example, by displaying the domain name from the URL next to the caption and using the URL to link to the source website.
        type: string
      relatedSearches:
        description: A list of entities found in the caption. Use the contents of the Query object to find the entity in the caption and create a link. The link takes the user to images of the entity.
        type: array
        items:
          $ref: '#/definitions/Query'
  ImagesImageMetadata:
    description: Defines a count of the number of websites where you can shop or perform other actions related to the image.
    x-ms-discriminator-value: Images/ImageMetadata
    type: object
    properties:
      shoppingSourcesCount:
        description: The number of websites that offer goods of the products seen in the image.
        readOnly: true
        type: integer
        format: int32
      recipeSourcesCount:
        description: The number of websites that offer recipes of the food seen in the image.
        readOnly: true
        type: integer
        format: int32
      aggregateOffer:
        description: 'A summary of the online offers of products found in the image. For example, if the image is of a dress, the offer might identify the lowest price and the number of offers found. Only visually similar products insights include this field. The offer includes the following fields: Name, AggregateRating, OfferCount, and LowPrice.'
        $ref: '#/definitions/AggregateOffer'
        readOnly: true
  ResponseBase:
    description: Response base
    discriminator: _type
    type: object
    required:
    - _type
    properties:
      _type:
        type: string
  Thing:
    description: Defines a thing.
    allOf:
    - $ref: '#/definitions/Response'
    type: object
    properties:
      name:
        description: The name of the thing represented by this object.
        readOnly: true
        type: string
      url:
        description: The URL to get more information about the thing represented by this object.
        readOnly: true
        type: string
      image:
        description: An image of the item.
        $ref: '#/definitions/ImageObject'
        readOnly: true
      description:
        description: A short description of the item.
        readOnly: true
        type: string
      alternateName:
        description: An alias for the item
        readOnly: true
        type: string
      bingId:
        description: An ID that uniquely identifies this item.
        readOnly: true
        type: string
  RelatedSearchesModule:
    description: Defines a list of related searches.
    type: object
    properties:
      value:
        description: A list of related searches.
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/Query'
  ImageInsights:
    description: The top-level object that the response includes when an image insights request succeeds. For information about requesting image insights, see the [insightsToken](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#insightstoken) query parameter. The modules query parameter affects the fields that Bing includes in the response. If you set [modules](https://docs.microsoft.com/en-us/rest/api/cognitiveservices/bing-images-api-v7-reference#modulesrequested) to only Caption, then this object includes only the imageCaption field.
    allOf:
    - $ref: '#/definitions/Response'
    type: object
    properties:
      imageInsightsToken:
        description: A token that you use in a subsequent call to the Image Search API to get more information about the image. For information about using this token, see the insightsToken query parameter. This token has the same usage as the token in the Image object.
        readOnly: true
        type: string
      bestRepresentativeQuery:
        description: The query term that best represents the image. Clicking the link in the Query object, takes the user to a webpage with more pictures of the image.
        $ref: '#/definitions/Query'
        readOnly: true
      imageCaption:
        description: The caption to use for the image.
        $ref: '#/definitions/ImageInsightsImageCaption'
        readOnly: true
      relatedCollections:
        description: A list of links to webpages that contain related images.
        $ref: '#/definitions/RelatedCollectionsModule'
        readOnly: true
      pagesIncluding:
        description: A list of webpages that contain the image. To access the webpage, use the URL in the image's hostPageUrl field.
        $ref: '#/definitions/ImagesModule'
        readOnly: true
      shoppingSources:
        description: A list of merchants that offer items related to the image. For example, if the image is of an apple pie, the list contains merchants that are selling apple pies.
        $ref: '#/definitions/AggregateOffer'
        readOnly: true
      relatedSearches:
        description: A list of related queries made by others.
        $ref: '#/definitions/RelatedSearchesModule'
        readOnly: true
      recipes:
        description: A list of recipes related to the image. For example, if the image is of an apple pie, the list contains recipes for making an apple pie.
        $ref: '#/definitions/RecipesModule'
        readOnly: true
      visuallySimilarImages:
        description: A list of images that are visually similar to the original image. For example, if the specified image is of a sunset over a body of water, the list of similar images are of a sunset over a body of water. If the specified image is of a person, similar images might be of the same person or they might be of persons dressed similarly or in a similar setting. The criteria for similarity continues to evolve.
        $ref: '#/definitions/ImagesModule'
        readOnly: true
      visuallySimilarProducts:
        description: A list of images that contain products that are visually similar to products found in the original image. For example, if the specified image contains a dress, the list of similar images contain a dress. The image provides summary information about offers that Bing found online for the product.
        $ref: '#/definitions/ImagesModule'
        readOnly: true
      recognizedEntityGroups:
        description: A list of groups that contain images of entities that match the entity found in the specified image. For example, the response might include images from the general celebrity group if the entity was recognized in that group.
        $ref: '#/definitions/RecognizedEntitiesModule'
        readOnly: true
      imageTags:
        description: A list of characteristics of the content found in the image. For example, if the image is of a person, the tags might indicate the person's gender and the type of clothes they're wearing.
        $ref: '#/definitions/ImageTagsModule'
        readOnly: true
  WebPage:
    description: Defines a webpage that is relevant to the query.
    allOf:
    - $ref: '#/definitions/CreativeWork'
    type: object
    properties: {}
  MediaObject:
    description: Defines a media object.
    allOf:
    - $ref: '#/definitions/CreativeWork'
    type: object
    properties:
      contentUrl:
        description: Original URL to retrieve the source (file) for the media object (e.g the source URL for the image).
        readOnly: true
        type: string
      hostPageUrl:
        description: URL of the page that hosts the media object.
        readOnly: true
        type: string
      contentSize:
        description: Size of the media object content (use format "value unit" e.g "1024 B").
        readOnly: true
        type: string
      encodingFormat:
        description: Encoding format (e.g mp3, mp4, jpeg, etc).
        readOnly: true
        type: string
      hostPageDisplayUrl:
        description: Display URL of the page that hosts the media object.
        readOnly: true
        type: string
      width:
        description: The width of the source media object, in pixels.
        readOnly: true
        type: integer
        format: int32
      height:
        description: The height of the source media object, in pixels.
        readOnly: true
        type: integer
        format: int32
  Recipe:
    description: Defines a cooking recipe.
    allOf:
    - $ref: '#/definitions/CreativeWork'
    type: object
    properties:
      cookTime:
        description: The amount of time the food takes to cook. For example, PT25M. For information about the time format, see http://en.wikipedia.org/wiki/ISO_8601#Durations.
        readOnly: true
        type: string
      prepTime:
        description: The amount of time required to prepare the ingredients. For example, PT15M. For information about the time format, see http://en.wikipedia.org/wiki/ISO_8601#Durations.
        readOnly: true
        type: string
      totalTime:
        description: The total amount of time it takes to prepare and cook the recipe. For example, PT45M. For information about the time format, see http://en.wikipedia.org/wiki/ISO_8601#Durations.
        readOnly: true
        type: string
  Organization:
    description: Defines an organization.
    allOf:
    - $ref: '#/definitions/Thing'
    type: object
    properties: {}
  ImageGallery:
    description: Defines a link to a webpage that contains a collection of related images.
    allOf:
    - $ref: '#/definitions/CollectionPage'
    type: object
    properties:
      source:
        description: The publisher or social network where the images were found. You must attribute the publisher as the source where the collection was found.
        readOnly: true
        type: string
      imagesCount:
        description: The number of related images found in the collection.
        readOnly: true
        type: integer
        format: int64
      followersCount:
        description: The number of users on the social network that follow the creator.
        readOnly: true
        type: integer
        format: int64
  RecognizedEntityRegion:
    description: Defines a region of the image where an entity was found and a list of entities that might match it.
    allOf:
    - $ref: '#/definitions/Response'
    type: object
    properties:
      region:
        description: 'A region of the image that contains an entity. The values of the rectangle are relative to the width and height of the original image and are in the range 0.0 through 1.0. For example, if the image is 300x200 and the region''s top, left corner is at point (10, 20) and the bottom, right corner is at point (290, 150), then the normalized rectangle is: Left = 0.0333333333333333, Top = 0.1, Right = 0.9666666666666667, Bottom = 0.75. For people, the region represents the person''s face.'
        $ref: '#/definitions/NormalizedRectangle'
        readOnly: true
      matchingEntities:
        description: A list of entities that Bing believes match the entity found in the region. The entities are in descending order of confidence (see the matchConfidence field of RecognizedEntity).
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/RecognizedEntity'
