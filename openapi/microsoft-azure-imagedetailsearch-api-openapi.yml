    type: object
    properties:
      reviewCount:
        description: The number of times the recipe has been rated or reviewed.
        readOnly: true
        type: integer
        format: int32
  ImageObject:
    description: Defines an image
    allOf:
    - $ref: '#/definitions/MediaObject'
    type: object
    properties:
      thumbnail:
        description: The URL to a thumbnail of the image
        $ref: '#/definitions/ImageObject'
        readOnly: true
      imageInsightsToken:
        description: The token that you use in a subsequent call to the Image Search API to get additional information about the image. For information about using this token, see the insightsToken query parameter.
        readOnly: true
        type: string
      insightsMetadata:
        description: A count of the number of websites where you can shop or perform other actions related to the image. For example, if the image is of an apple pie, this object includes a count of the number of websites where you can buy an apple pie. To indicate the number of offers in your UX, include badging such as a shopping cart icon that contains the count. When the user clicks on the icon, use imageInsightsToken to get the list of websites.
        $ref: '#/definitions/ImagesImageMetadata'
        readOnly: true
      imageId:
        description: Unique Id for the image
        readOnly: true
        type: string
      accentColor:
        description: A three-byte hexadecimal number that represents the color that dominates the image. Use the color as the temporary background in your client until the image is loaded.
        readOnly: true
        type: string
      visualWords:
        description: Visual representation of the image. Used for getting more sizes
        readOnly: true
        type: string
  RecognizedEntitiesModule:
    description: Defines a list of previously recognized entities.
    type: object
    properties:
      value:
        description: A list of recognized entities.
        readOnly: true
        type: array
        items:
          $ref: '#/definitions/RecognizedEntityGroup'
  Query:
    description: Defines a search query.
    type: object
    required:
    - text
    properties:
      text:
        description: The query string. Use this string as the query term in a new search request.
        type: string
      displayText:
        description: The display version of the query term. This version of the query term may contain special characters that highlight the search term found in the query string. The string contains the highlighting characters only if the query enabled hit highlighting
        readOnly: true
        type: string
      webSearchUrl:
        description: The URL that takes the user to the Bing search results page for the query.Only related search results include this field.
        readOnly: true
        type: string
      searchLink:
        description: The URL that you use to get the results of the related search. Before using the URL, you must append query parameters as appropriate and include the Ocp-Apim-Subscription-Key header. Use this URL if you're displaying the results in your own user interface. Otherwise, use the webSearchUrl URL.
        readOnly: true
        type: string
      thumbnail:
        description: The URL to a thumbnail of a related image.
        $ref: '#/definitions/ImageObject'
        readOnly: true
  RecognizedEntityGroup:
    description: Defines a group of previously recognized entities.
    type: object
    required:
    - recognizedEntityRegions
    - name
    properties:
      recognizedEntityRegions:
        description: The regions of the image that contain entities.
        type: array
        items:
          $ref: '#/definitions/RecognizedEntityRegion'
      name:
        description: 'The name of the group where images of the entity were also found. The following are possible groups. CelebRecognitionAnnotations: Similar to CelebrityAnnotations but provides a higher probability of an accurate match. CelebrityAnnotations: Contains celebrities such as actors, politicians, athletes, and historical figures.'
        type: string
