definitions:
  ErrorDefinition:
    description: Error definition.
    properties:
      code:
        description: Service specific error code which serves as the substatus for the HTTP error code.
        type: string
        readOnly: true
      message:
        description: Description of the error.
        type: string
        readOnly: true
      details:
        description: Internal error details.
        type: array
        items:
          $ref: '#/definitions/ErrorDefinition'
        readOnly: true
  ErrorResponse:
    description: Error response.
    properties:
      error:
        $ref: '#/definitions/ErrorDefinition'
        description: The error details.
  MultipleActivationKey:
    description: MAK key details.
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/TrackedResource
    properties:
      properties:
        description: MAK key specific properties.
        type: object
        x-ms-client-flatten: true
        properties:
          multipleActivationKey:
            description: MAK 5x5 key.
            type: string
            readOnly: true
          expirationDate:
            description: End of support of security updates activated by the MAK key.
            format: date-time
            type: string
            readOnly: true
          osType:
            description: Type of OS for which the key is requested.
            type: string
            enum:
            - Windows7
            - WindowsServer2008
            - WindowsServer2008R2
            x-ms-enum:
              name: OsType
              modelAsString: true
            x-ms-mutability:
            - create
            - read
          supportType:
            description: Type of support
            type: string
            enum:
            - SupplementalServicing
            - PremiumAssurance
            default: SupplementalServicing
            x-ms-enum:
              name: SupportType
              modelAsString: true
            x-ms-mutability:
            - create
            - read
          installedServerNumber:
            description: Number of activations/servers using the MAK key.
            type: integer
            minimum: 1
            maximum: 5000
            x-ms-mutability:
            - create
            - read
          agreementNumber:
            description: Agreement number under which the key is requested.
            type: string
            x-ms-mutability:
            - create
            - read
          isEligible:
            description: <code> true </code> if user has eligible on-premises Windows physical or virtual machines, and that the requested key will only be used in their organization; <code> false </code> otherwise.
            type: boolean
            x-ms-mutability:
            - create
            - read
          provisioningState:
            type: string
            enum:
            - Succeeded
            - Failed
            - Canceled
            - Accepted
            - Provisioning
            x-ms-enum:
              name: ProvisioningState
              modelAsString: true
            readOnly: true
    x-ms-azure-resource: true
  MultipleActivationKeyList:
    description: List of MAK keys.
    type: object
    properties:
      value:
        description: List of MAK keys.
        type: array
        items:
          $ref: '#/definitions/MultipleActivationKey'
      nextLink:
        description: Link to the next page of resources.
        type: string
        readOnly: true
  MultipleActivationKeyUpdate:
    description: MAK key details.
    type: object
    properties:
      tags:
        description: Resource tags.
        type: object
        additionalProperties:
          type: string
parameters:
  MultipleActivationKeyNameParameter:
    name: multipleActivationKeyName
    in: path
    required: true
    type: string
    description: The name of the MAK key.
    x-ms-parameter-location: method
