      - name: runId
        in: path
        description: The identifier of the Run.
        required: true
        type: string
      - name: path
        in: query
        description: The Artifact Path.
        required: false
        type: string
      - name: continuationToken
        in: query
        description: The Continuation Token.
        required: false
        type: string
      responses:
        '200':
