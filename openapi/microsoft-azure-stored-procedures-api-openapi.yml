swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Stored Procedures API
  description: Operations for managing stored procedures
schemes:
- https
tags:
- name: Stored Procedures
  description: Operations for managing stored procedures
paths:
  /dbs/{databaseId}/colls/{containerId}/sprocs:
    get:
      operationId: StoredProcedures_List
      summary: Microsoft Azure List Stored Procedures
      description: Returns a list of stored procedures under the specified container.
      tags:
      - Stored Procedures
      parameters:
      - $ref: '#/components/parameters/DatabaseIdParameter'
      - $ref: '#/components/parameters/ContainerIdParameter'
      - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully returned the list of stored procedures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredProcedureListResult'
              examples:
                StoredproceduresList200Example:
                  summary: Default StoredProcedures_List 200 response
                  x-microcks-default: true
                  value:
                    _rid: '500123'
                    StoredProcedures:
                    - id: abc123
                      body: example_value
                      _rid: '500123'
                      _ts: 10
                      _self: example_value
                      _etag: example_value
                    _count: 10
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                StoredproceduresListdefaultExample:
                  summary: Default StoredProcedures_List default response
                  x-microcks-default: true
                  value:
                    code: example_value
                    message: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: StoredProcedures_Create
      summary: Microsoft Azure Create a Stored Procedure
      description: Creates a new stored procedure in the specified container.
      tags:
      - Stored Procedures
      parameters:
      - $ref: '#/components/parameters/DatabaseIdParameter'
      - $ref: '#/components/parameters/ContainerIdParameter'
      - $ref: '#/components/parameters/ApiVersionParameter'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoredProcedureCreateRequest'
            examples:
              StoredproceduresCreateRequestExample:
                summary: Default StoredProcedures_Create request
                x-microcks-default: true
                value:
                  id: abc123
                  body: example_value
      responses:
        '201':
          description: Successfully created the stored procedure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredProcedure'
              examples:
                StoredproceduresCreate201Example:
                  summary: Default StoredProcedures_Create 201 response
                  x-microcks-default: true
                  value:
                    id: abc123
                    body: example_value
                    _rid: '500123'
                    _ts: 10
                    _self: example_value
                    _etag: example_value
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                StoredproceduresCreatedefaultExample:
                  summary: Default StoredProcedures_Create default response
                  x-microcks-default: true
                  value:
                    code: example_value
                    message: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  parameters:
    ContainerIdParameter:
      name: containerId
      in: path
      required: true
      description: The ID of the container (collection).
      schema:
        type: string
    ApiVersionParameter:
      name: x-ms-version
      in: header
      required: true
      description: The version of the Cosmos DB REST API.
      schema:
        type: string
        default: '2018-12-31'
    DatabaseIdParameter:
      name: databaseId
      in: path
      required: true
      description: The ID of the database.
      schema:
        type: string
  schemas:
    StoredProcedureCreateRequest:
      type: object
      description: Request body for creating a stored procedure.
      properties:
        id:
          type: string
          description: The unique name of the stored procedure.
          example: abc123
        body:
          type: string
          description: The body of the stored procedure (JavaScript function).
          example: example_value
      required:
      - id
      - body
    ErrorResponse:
      type: object
      description: Error response from Cosmos DB.
      properties:
        code:
          type: string
          description: The error code.
          example: example_value
        message:
          type: string
          description: The error message.
          example: example_value
      required:
      - code
      - message
    StoredProcedureListResult:
      type: object
      description: List of Cosmos DB stored procedures.
      properties:
        _rid:
          type: string
          readOnly: true
          example: '500123'
        StoredProcedures:
          type: array
          items:
            $ref: '#/components/schemas/StoredProcedure'
          description: List of stored procedures.
          example: []
        _count:
          type: integer
          readOnly: true
          example: 10
    StoredProcedure:
      type: object
      description: A Cosmos DB stored procedure.
      properties:
        id:
          type: string
          description: The unique name of the stored procedure.
          example: abc123
        body:
          type: string
          description: The body of the stored procedure (JavaScript function).
          example: example_value
        _rid:
          type: string
          readOnly: true
          example: '500123'
        _ts:
          type: integer
          readOnly: true
          example: 10
        _self:
          type: string
          readOnly: true
          example: example_value
        _etag:
          type: string
          readOnly: true
          example: example_value
      required:
      - id
      - body
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
