  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.MachineLearningServices/workspaces/{workspaceName}/connections/{connectionName}/testconnection
  : post:
      tags:
      - V2WorkspaceConnectionResource
      summary: Microsoft Azure Test Machine Learning Workspaces Connections Under The Specified Workspace
      operationId: microsoftAzureWorkspaceconnectionsTestconnection
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v3/types.json#/parameters/ResourceGroupNameParameter
