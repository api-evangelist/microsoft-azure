      description: Needs a more full description created.
definitions:
  WorkspaceConnectionPropertiesV2BasicResourceArmPaginatedResult:
    type: object
    properties:
      nextLink:
        type: string
      value:
        type: array
        items:
          $ref: '#/definitions/WorkspaceConnectionPropertiesV2BasicResource'
  ConnectionGroup:
    description: Group based on connection category
    enum:
    - Azure
    - AzureAI
    - Database
    - NoSQL
    - File
    - GenericProtocol
    - ServicesAndApps
    type: string
    x-ms-enum:
      name: ConnectionGroup
      modelAsString: true
  WorkspaceConnectionPropertiesV2:
    required:
    - authType
    type: object
    properties:
      authType:
        description: Authentication type of the connection target
        $ref: '#/definitions/ConnectionAuthType'
      category:
        description: Category of the connection
        $ref: '#/definitions/ConnectionCategory'
      createdByWorkspaceArmId:
        type: string
        format: arm-id
        readOnly: true
      expiryTime:
        format: date-time
        type: string
      group:
        description: Group based on connection category
        $ref: '#/definitions/ConnectionGroup'
        readOnly: true
      isSharedToAll:
        type: boolean
      metadata:
        type: object
      sharedUserList:
        type: array
        items:
          type: string
      target:
        type: string
    discriminator: authType
  WorkspaceConnectionPropertiesV2BasicResource:
    required:
    - properties
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/Resource
    properties:
      properties:
        $ref: '#/definitions/WorkspaceConnectionPropertiesV2'
  WorkspaceConnectionUpdateParameter:
    description: The properties that the machine learning workspace connection will be updated with.
    type: object
    properties:
      properties:
        description: The properties that the machine learning workspace connection will be updated with.
        $ref: '#/definitions/WorkspaceConnectionPropertiesV2'
  ConnectionAuthType:
