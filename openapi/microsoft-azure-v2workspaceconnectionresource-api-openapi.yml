parameters:
  AOAIModelsToDeployParameter:
    in: query
    name: aoaiModelsToDeploy
    description: query parameter for which AOAI mode should be deployed
    type: string
    x-ms-parameter-location: method
  ConnectionName:
    in: path
    name: connectionName
    description: Friendly name of the workspace connection
    required: true
    type: string
    x-ms-parameter-location: method
    pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{2,32}$
  CategoryParameter:
    in: query
    name: category
    description: Category of the workspace connection.
    type: string
    x-ms-parameter-location: method
  TargetParameter:
    in: query
    name: target
    description: Target of the workspace connection.
    type: string
    x-ms-parameter-location: method
  WorkspaceNameParameter:
    in: path
    name: workspaceName
    description: Azure Machine Learning Workspace Name
    required: true
    type: string
    x-ms-parameter-location: method
    pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{2,32}$
