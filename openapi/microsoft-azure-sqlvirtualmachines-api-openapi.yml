  : get:
      tags:
      - SqlVirtualMachines
      description: Gets the list of sql virtual machines in a SQL virtual machine group.
      operationId: microsoftAzureSqlvirtualmachinesListbysqlvmgroup
      parameters:
      - $ref: '#/parameters/ResourceGroupParameter'
