definitions:
  AADAuthenticationSettings:
    description: Enable AAD authentication for SQL VM.
    type: object
    properties:
      clientId:
        description: The client Id of the Managed Identity to query Microsoft Graph API. An empty string must be used for the system assigned Managed Identity
        type: string
  StorageConfigurationSettings:
    description: Storage Configurations for SQL Data, Log and TempDb.
    type: object
    properties:
      sqlDataSettings:
        $ref: '#/definitions/SQLStorageSettings'
        description: SQL Server Data Storage Settings.
      sqlLogSettings:
        $ref: '#/definitions/SQLStorageSettings'
        description: SQL Server Log Storage Settings.
      sqlTempDbSettings:
        $ref: '#/definitions/SQLTempDbSettings'
        description: SQL Server TempDb Storage Settings.
      sqlSystemDbOnDataDisk:
        description: SQL Server SystemDb Storage on DataPool if true.
        type: boolean
      diskConfigurationType:
        description: Disk configuration to apply to SQL Server.
        enum:
        - NEW
        - EXTEND
        - ADD
        type: string
        x-ms-enum:
          name: DiskConfigurationType
          modelAsString: true
      storageWorkloadType:
        description: Storage workload type.
        enum:
        - GENERAL
        - OLTP
        - DW
        type: string
        x-ms-enum:
          name: StorageWorkloadType
          modelAsString: true
        x-ms-mutability:
        - read
        - create
  SqlWorkloadTypeUpdateSettings:
    description: Set workload type to optimize storage for SQL Server.
    type: object
    properties:
      sqlWorkloadType:
        description: SQL Server workload type.
        enum:
        - GENERAL
        - OLTP
        - DW
        type: string
        x-ms-enum:
          name: SqlWorkloadType
          modelAsString: true
        x-ms-mutability:
        - read
        - create
  UnhealthyReplicaInfo:
    description: SQL VM Troubleshoot UnhealthyReplica scenario information.
    type: object
    properties:
      availabilityGroupName:
        description: The name of the availability group
        type: string
  SqlVirtualMachine:
    description: A SQL virtual machine.
    required:
    - location
    type: object
    allOf:
    - $ref: '#/definitions/TrackedResource'
    properties:
      identity:
        $ref: '#/definitions/ResourceIdentity'
        description: Azure Active Directory identity of the server.
        x-ms-mutability:
        - read
        - create
      properties:
        $ref: '#/definitions/SqlVirtualMachineProperties'
        description: Resource properties.
        x-ms-client-flatten: true
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        readOnly: true
  AutoPatchingSettings:
    description: Set a patching window during which Windows and SQL patches will be applied.
    type: object
    properties:
      enable:
        description: Enable or disable autopatching on SQL virtual machine.
        type: boolean
      dayOfWeek:
        description: Day of week to apply the patch on.
        enum:
        - Everyday
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
        type: string
        x-ms-enum:
          name: DayOfWeek
          modelAsString: false
      maintenanceWindowStartingHour:
        format: int32
        description: Hour of the day when patching is initiated. Local VM time.
        type: integer
      maintenanceWindowDuration:
        format: int32
        description: Duration of patching.
        type: integer
  SqlConnectivityUpdateSettings:
    description: Set the access level and network port settings for SQL Server.
    type: object
    properties:
      connectivityType:
        description: SQL Server connectivity option.
        enum:
        - LOCAL
        - PRIVATE
        - PUBLIC
        type: string
        x-ms-enum:
          name: ConnectivityType
          modelAsString: true
      port:
        format: int32
        description: SQL Server port.
        type: integer
      sqlAuthUpdateUserName:
        description: SQL Server sysadmin login to create.
        type: string
        x-ms-mutability:
        - create
      sqlAuthUpdatePassword:
        description: SQL Server sysadmin login password.
        type: string
        x-ms-mutability:
        - create
  SqlStorageUpdateSettings:
    description: Set disk storage settings for SQL Server.
    type: object
    properties:
      diskCount:
        format: int32
        description: Virtual machine disk count.
        type: integer
      startingDeviceId:
        format: int32
        description: Device id of the first disk to be updated.
        type: integer
      diskConfigurationType:
        description: Disk configuration to apply to SQL Server.
        enum:
        - NEW
        - EXTEND
        - ADD
        type: string
        x-ms-enum:
          name: DiskConfigurationType
          modelAsString: true
  AutoBackupSettings:
    description: Configure backups for databases in your SQL virtual machine.
    type: object
    properties:
      enable:
        description: Enable or disable autobackup on SQL virtual machine.
        type: boolean
      enableEncryption:
        description: Enable or disable encryption for backup on SQL virtual machine.
        type: boolean
      retentionPeriod:
        format: int32
        description: 'Retention period of backup: 1-90 days.'
        type: integer
      storageAccountUrl:
        description: Storage account url where backup will be taken to.
        type: string
      storageContainerName:
        description: Storage container name where backup will be taken to.
        type: string
      storageAccessKey:
        description: Storage account key where backup will be taken to.
        type: string
        x-ms-mutability:
        - create
        - update
      password:
        description: Password for encryption on backup.
        type: string
        x-ms-mutability:
        - create
        - update
      backupSystemDbs:
        description: Include or exclude system databases from auto backup.
        type: boolean
      backupScheduleType:
        description: Backup schedule type.
        enum:
        - Manual
        - Automated
        type: string
        x-ms-enum:
          name: BackupScheduleType
          modelAsString: true
      fullBackupFrequency:
        description: Frequency of full backups. In both cases, full backups begin during the next scheduled time window.
        enum:
        - Daily
        - Weekly
        type: string
        x-ms-enum:
          name: FullBackupFrequencyType
          modelAsString: true
      daysOfWeek:
        description: Days of the week for the backups when FullBackupFrequency is set to Weekly.
        type: array
        items:
          enum:
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          - Sunday
          type: string
          x-ms-enum:
            name: AutoBackupDaysOfWeek
            modelAsString: true
      fullBackupStartTime:
        format: int32
        description: Start time of a given day during which full backups can take place. 0-23 hours.
        type: integer
      fullBackupWindowHours:
        format: int32
        description: Duration of the time window of a given day during which full backups can take place. 1-23 hours.
        type: integer
      logBackupFrequency:
        format: int32
        description: Frequency of log backups. 5-60 minutes.
        type: integer
  Resource:
    description: ARM resource.
    type: object
    properties:
      id:
        description: Resource ID.
        type: string
        readOnly: true
      name:
        description: Resource name.
        type: string
        readOnly: true
      type:
        description: Resource type.
        type: string
        readOnly: true
