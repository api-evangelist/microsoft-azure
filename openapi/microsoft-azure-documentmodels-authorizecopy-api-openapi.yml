  CopyAuthorization:
    type: object
    description: 'Authorization to copy a document model to the specified target resource and

      modelId.'
    properties:
      targetResourceId:
        type: string
        description: ID of the target Azure resource where the document model should be copied to.
        x-ms-azure-resource: true
      targetResourceRegion:
        type: string
        description: 'Location of the target Azure resource where the document model should be copied

          to.'
      targetModelId:
        type: string
        description: Identifier of the target document model.
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._~-]{1,63}$
      targetModelLocation:
        type: string
        format: uri
        description: URL of the copied document model in the target account.
      accessToken:
        type: string
        description: Token used to authorize the request.
      expirationDateTime:
        type: string
        format: date-time
        description: Date/time when the access token expires.
    required:
    - targetResourceId
    - targetResourceRegion
    - targetModelId
    - targetModelLocation
    - accessToken
    - expirationDateTime
  AuthorizeCopyRequest:
    type: object
    description: Request body to authorize document model copy.
    properties:
      modelId:
        type: string
        description: Unique document model name.
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._~-]{1,63}$
      description:
        type: string
        description: Document model description.
        maxLength: 4096
      tags:
        type: object
        description: List of key-value tag attributes associated with the document model.
        additionalProperties:
          type: string
