swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Files: API'
schemes:
- https
tags:
- name: 'Files:'
paths:
  /files:
    get:
      tags:
      - 'Files:'
      summary: "Microsoft Azure Gets A List Of All Files Owned By The Azure Openai Resource \r\nthese Include User Uploaded Content Like Files With Purpose \"fine Tune\" For Training Or Validation Of Fine Tunes Models\r\nas Well As Files That Are Generated By The Service Such As \"fine Tune Results\" Which Contains Various Metrics For The Corresponding Fine Tune Job"
      operationId: microsoftAzureFilesList
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/apiVersionQueryParameter'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/FileList'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Getting all files owned by this account.:
          $ref: ./examples/get_files.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Files:'
      summary: Microsoft Azure Creates A New File Entity By Uploading Data From A Local Machine Uploaded Files Can, For Example, Be Used For Training Or Evaluating Fine Tuned Models
      operationId: microsoftAzureFilesUpload
      consumes:
      - multipart/form-data
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/apiVersionQueryParameter'
      - in: formData
        name: purpose
        description: The intended purpose of the uploaded documents. Use "fine-tune" for fine-tuning. This allows us to validate the format of the uploaded file.
        required: true
        type: string
        enum:
        - fine-tune
        - fine-tune-results
        x-ms-enum:
          name: Purpose
          modelAsString: true
          values:
          - value: fine-tune
            description: This file contains training data for a fine tune job.
          - value: fine-tune-results
            description: This file contains the results of a fine tune job.
      - in: formData
        name: file
        description: Gets or sets the file to upload into Azure OpenAI.
        required: true
        type: file
      responses:
        '201':
          description: The file has been successfully created.
          schema:
            $ref: '#/definitions/File'
          headers:
            Location:
              description: The location of the newly created item.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Upload a file.:
          $ref: ./examples/upload_file.json
      description: Needs a more full description created.
  /files/{file_id}:
    get:
