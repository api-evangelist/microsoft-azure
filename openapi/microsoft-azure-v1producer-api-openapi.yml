swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector V1producer API
  description: Produce records
schemes:
- https
tags:
- name: V1producer
  description: Produce records
paths:
  /v1/producer/topics/{topic}:
    post:
      tags:
      - V1producer
      summary: Microsoft Azure Produce Records
      description: Produce records to a topic in Kafka. If producing records to a newly created topic, please wait a few seconds for the topic to show up.
      operationId: microsoftAzureProducerProducemessagetotopic
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: topic
        in: path
        description: Topic to produce the records to
        required: true
        type: string
      - in: body
        name: ProducerRecords
        description: List of producer records to produce in one request
        required: true
        schema:
          $ref: '#/definitions/ProducerRecords'
      responses:
        '200':
          description: successful operation
          schema:
            type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '405':
          description: Method Not Allowed
        '500':
          description: Internal Server Error
definitions:
  ProducerRecord:
    type: object
    required:
    - value
    properties:
      value:
        type: object
        description: Value for producer record
      key:
        type: object
        description: Key for producer record
      partition:
        type: integer
        format: int32
        description: Partition ID for producer record
    description: A producer record
  ProducerRecords:
    type: object
    properties:
      records:
        type: array
        description: List of producer records
        items:
          $ref: '#/definitions/ProducerRecord'
    description: List of producer records to produce in one request
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
