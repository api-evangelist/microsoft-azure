swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Models API
  description: Operations for listing available models
schemes:
- https
tags:
- name: Models
  description: Operations for listing available models
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.CognitiveServices/models:
    get:
      operationId: Models_List
      summary: Microsoft Azure List Available Models
      description: List available models for the subscription.
      tags:
      - Models
      parameters:
      - $ref: '#/components/parameters/SubscriptionIdParameter'
      - $ref: '#/components/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Successfully returned available models.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResult'
              examples:
                ModelsList200Example:
                  summary: Default Models_List 200 response
                  x-microcks-default: true
                  value:
                    value:
                    - format: example_value
                      name: Example Title
                      version: example_value
                      source: example_value
                      maxCapacity: 10
                      capabilities: example_value
                      deprecation: {}
                      lifecycleStatus: GenerallyAvailable
                      systemData: {}
                    nextLink: example_value
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ModelsListdefaultExample:
                  summary: Default Models_List default response
                  x-microcks-default: true
                  value:
                    error:
                      code: example_value
                      message: example_value
                      target: example_value
                      details:
                      - code: example_value
                        message: example_value
                        target: example_value
                      additionalInfo:
                      - type: example_value
                        info: example_value
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /models:
    parameters:
    - $ref: '#/parameters/traceparent'
    - $ref: '#/parameters/tracestate'
    post:
      tags:
      - Models
      description: Uploads one or more models. When any error occurs, no models are uploaded.<br>Status codes:<br>* 201 Created<br>* 400 Bad Request<br>  * DTDLParserError - The models provided are not valid DTDL.<br>  * InvalidArgument - The model id is invalid.<br>  * LimitExceeded - The maximum number of model ids allowed in 'dependenciesFor' has been reached.<br>  * ModelVersionNotSupported - The version of DTDL used is not supported.<br>* 409 Conflict<br>  * ModelAlreadyExists - The model provided already exists.
      operationId: microsoftAzureDigitaltwinmodelsAdd
      x-ms-examples:
        Add models:
          $ref: ./examples/ModelAdd.json
      parameters:
      - name: models
        in: body
        description: An array of models to add.
        required: true
        schema:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: object
      - $ref: '#/parameters/api-version'
      responses:
        '201':
          description: Success
          schema:
            $ref: '#/definitions/NonPagedDigitalTwinsModelDataCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Post Models
    get:
      tags:
      - Models
      description: Retrieves model metadata and, optionally, model definitions.<br>Status codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The model id is invalid.<br>  * LimitExceeded - The maximum number of model ids allowed in 'dependenciesFor' has been reached.<br>* 404 Not Found<br>  * ModelNotFound - The model was not found.
      x-ms-pageable:
        nextLinkName: nextLink
      operationId: microsoftAzureDigitaltwinmodelsList
      x-ms-examples:
        List models:
          $ref: ./examples/ModelsGet.json
        List models (include dependencies and definitions):
          $ref: ./examples/ModelsGetWithDependenciesAndIncludeModelDefinition.json
      parameters:
      - name: dependenciesFor
        in: query
        description: If specified, only return the set of the specified models along with their dependencies. If omitted, all models are retrieved.
        required: false
        type: array
        collectionFormat: multi
        items:
          type: string
      - $ref: '#/parameters/includeModelDefinition'
      - $ref: '#/parameters/max-items-per-page'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/PagedDigitalTwinsModelDataCollection'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Models
  /models/{id}:
    parameters:
    - $ref: '#/parameters/traceparent'
    - $ref: '#/parameters/tracestate'
    get:
      tags:
      - Models
      description: Retrieves model metadata and optionally the model definition.<br>Status codes:<br>* 200 OK<br>* 400 Bad Request<br>  * InvalidArgument - The model id is invalid.<br>  * MissingArgument - The model id was not provided.<br>* 404 Not Found<br>  * ModelNotFound - The model was not found.
      operationId: microsoftAzureDigitaltwinmodelsGetbyid
      x-ms-examples:
        Get a model by id:
          $ref: ./examples/ModelGetById.json
        Get a model by id (with definition):
          $ref: ./examples/ModelGetByIdWithIncludeModelDefinition.json
      parameters:
      - $ref: '#/parameters/modelId'
      - $ref: '#/parameters/includeModelDefinition'
      - $ref: '#/parameters/api-version'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/DigitalTwinsModelData'
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Models Id
    patch:
      tags:
      - Models
      description: Updates the metadata for a model.<br>Status codes:<br>* 204 No Content<br>* 400 Bad Request<br>  * InvalidArgument - The model id is invalid.<br>  * JsonPatchInvalid - The JSON Patch provided is invalid.<br>  * MissingArgument - The model id was not provided.<br>* 404 Not Found<br>  * ModelNotFound - The model was not found.<br>* 409 Conflict<br>  * ModelReferencesNotDecommissioned - The model refers to models that are not decommissioned.
      operationId: microsoftAzureDigitaltwinmodelsUpdate
      consumes:
      - application/json-patch+json
      x-ms-examples:
        Decommission a model:
          $ref: ./examples/ModelUpdateDecommissioned.json
      parameters:
      - $ref: '#/parameters/modelId'
      - name: updateModel
        description: An update specification described by JSON Patch. Only the decommissioned property can be replaced.
        in: body
        required: true
        schema:
          type: array
          items:
            type: object
      - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Patch Models Id
    delete:
      tags:
      - Models
      operationId: microsoftAzureDigitaltwinmodelsDelete
      description: Deletes a model. A model can only be deleted if no other models reference it.<br>Status codes:<br>* 204 No Content<br>* 400 Bad Request<br>  * InvalidArgument - The model id is invalid.<br>  * MissingArgument - The model id was not provided.<br>* 404 Not Found<br>  * ModelNotFound - The model was not found.<br>* 409 Conflict<br>  * ModelReferencesNotDeleted - The model refers to models that are not deleted.
      x-ms-examples:
        Delete a model:
          $ref: ./examples/DeleteModel.json
      parameters:
      - $ref: '#/parameters/modelId'
      - $ref: '#/parameters/api-version'
      responses:
        '204':
          description: Success
        default:
          description: Default response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Delete Models Id
  /models/{model_id}:
    get:
      tags:
      - Models
      summary: Microsoft Azure Gets Details For The Model Specified By The Given Modelid
      operationId: microsoftAzureModelsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: model_id
        description: The identifier of the model.
        required: true
        type: string
      - $ref: '#/parameters/apiVersionQueryParameter'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Model'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/ErrorResponse_2'
      x-ms-examples:
        Getting a base model.:
          $ref: ./examples/get_model_base.json
        Getting a fine-tuned model.:
          $ref: ./examples/get_model_finetune.json
      description: Needs a more full description created.
  /models/{model-id}:
    get:
      tags:
      - Models
      summary: Microsoft Azure Gets Details For The Model Specified By The Given Modelid
      operationId: microsoftAzureModelsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: model-id
        description: The identifier of the model.
        required: true
        type: string
      - $ref: '#/parameters/apiVersionQueryParameter_3'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Model_2'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/ErrorResponse_4'
      x-ms-examples:
        Getting a base model.:
          $ref: ./examples/get_model_base.json
        Getting a fine-tuned model.:
          $ref: ./examples/get_model_finetune.json
      description: Needs a more full description created.
  /models/{model}/analyze:
    post:
      description: 'This operation recognizes content within an image by applying a domain-specific model.  The list of domain-specific models that are supported by the Computer Vision API can be retrieved using the /models GET request.  Currently, the API only provides a single domain-specific model: celebrities. Two input methods are supported -- (1) Uploading an image or (2) specifying an image URL. A successful response will be returned in JSON.  If the request failed, the response will contain an error code and a message to help understand what went wrong.'
      operationId: microsoftAzureAnalyzeimagebydomain
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: model
        in: path
        description: The domain-specific content to recognize.
        required: true
        type: string
      - $ref: '#/parameters/ServiceLanguage'
      - $ref: ../../../Common/Parameters.json#/parameters/ImageUrl
      responses:
        '200':
          description: Analysis result based on the domain model
          schema:
            $ref: '#/definitions/DomainModelResults'
        default:
          description: Error response.
          schema:
            $ref: '#/definitions/ComputerVisionError'
      x-ms-examples:
        Successful Domain Model analysis request:
          $ref: ./examples/SuccessfulDomainModelWithUrl.json
      summary: Microsoft Azure Post Models Model Analyze
      tags:
      - Models
  /models/{name}:
    put:
      tags:
      - Models
      summary: "Microsoft Azure Start Training A Custom Model \r\n      \r\nstatus Codes Returned:\r\n 201: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 409: A Model With The Specified Name Already Exists"
      operationId: microsoftAzureModelsCreate
      consumes:
      - application/json-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: A name that can be used to uniquely identify the model after it has been created.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      - in: body
        name: body
        description: Properties for the model, such as the name of the dataset to use to train the model.
        required: true
        schema:
          $ref: '#/definitions/Model_14'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Model_14'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Models_Create:
          $ref: ./examples/Models_Create.json
      description: Needs a more full description created.
    get:
      tags:
      - Models
      summary: "Microsoft Azure Get Information About A Specific Model \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Model With The Specified Name Was Not Found"
      operationId: microsoftAzureModelsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to get.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Model_14'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Models_Get:
          $ref: ./examples/Models_Get.json
      description: Needs a more full description created.
    delete:
      tags:
      - Models
      summary: "Microsoft Azure Delete A Custom Model A Model Can Be Deleted If It Is In One Of The Succeeded , Failed , Or Canceled States \r\nif A Model Is In The Notstarted Or Training State, Cancel Training And Wait For Cancellation To Finish Before Deleting The Model \r\n      \r\nstatus Codes Returned:\r\n 204: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Model With The Specified Name Was Not Found"
      operationId: microsoftAzureModelsDelete
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to delete.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Models_Delete:
          $ref: ./examples/Models_Delete.json
      description: Needs a more full description created.
  /models/{name}:cancel:
    post:
      tags:
      - Models
      summary: "Microsoft Azure Cancel Model Training \r\n      \r\nstatus Codes Returned:\r\n 202: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Model With The Specified Name Was Not Found"
      operationId: microsoftAzureModelsCanceltraining
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to cancel training.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      responses:
        '202':
          description: Accepted
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Models_CancelTraining:
          $ref: ./examples/Models_CancelTraining.json
      description: Needs a more full description created.
  /models/{name}/evaluations/{evaluationName}:
    put:
      tags:
      - Models
      summary: "Microsoft Azure Evaluate An Existing Model \r\n      \r\nstatus Codes Returned:\r\n 201: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 409: An Evaluation With The Specified Name Already Exists"
      operationId: microsoftAzureModelevaluationsCreate
      consumes:
      - application/json-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to evaluate.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: path
        name: evaluationName
        description: A name that can be used to uniquely identify the evaluation after it has been created.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      - in: body
        name: body
        description: Properties for the evaluation, such as the name of the dataset to use to test the model.
        required: true
        schema:
          $ref: '#/definitions/ModelEvaluation'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/ModelEvaluation'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        ModelEvaluations_Create:
          $ref: ./examples/ModelEvaluations_Create.json
      description: Needs a more full description created.
    get:
      tags:
      - Models
      summary: "Microsoft Azure Get Information About A Specific Model Evaluation \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Model Evaluation With The Specified Name Was Not Found"
      operationId: microsoftAzureModelevaluationsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to get the evaluation for.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: path
        name: evaluationName
        description: The name of the model evaluation to get.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ModelEvaluation'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        ModelEvaluations_Get:
          $ref: ./examples/ModelEvaluations_Get.json
      description: Needs a more full description created.
    delete:
      tags:
      - Models
      summary: "Microsoft Azure Delete A Model Evaluation A Model Evaluation Can Be Deleted If It Is In The Succeeded Or Failed States \r\n      \r\nstatus Codes Returned:\r\n 204: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Model Evaluation With The Specified Name Was Not Found"
      operationId: microsoftAzureModelevaluationsDelete
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to delete the evaluation for.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: path
        name: evaluationName
        description: The name of the model evaluation to delete.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion'
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        ModelEvaluations_Delete:
          $ref: ./examples/ModelEvaluations_Delete.json
      description: Needs a more full description created.
  /models/{name}/evaluations:
    get:
      tags:
      - Models
      summary: "Microsoft Azure Get A List Of The Available Evaluations For A Model \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully \r\n 400: The Request Was Malformed"
      operationId: microsoftAzureModelevaluationsList
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the model to get evaluations for.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: query
        name: skip
        description: Number of evaluations to be skipped.
        type: integer
        format: int32
        default: 0
        maximum: 2147483647
        minimum: 0
      - in: query
        name: top
        description: Number of evaluations to be returned after skipping. The maximum allowed value is 30.
        type: integer
        format: int32
        default: 10
        maximum: 30
        minimum: 1
      - $ref: '#/parameters/ApiVersion'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ModelEvaluationApiModelCollectionApiModel'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_16'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        ModelEvaluations_List:
          $ref: ./examples/ModelEvaluations_List.json
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
components:
  schemas:
    ErrorResponse:
      type: object
      description: Error response.
      properties:
        error:
          type: object
          description: The error object.
          properties:
            code:
              type: string
            message:
              type: string
            target:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  target:
                    type: string
            additionalInfo:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  info:
                    type: object
          example: example_value
    AccountModel:
      type: object
      description: Cognitive Services account model.
      properties:
        format:
          type: string
          description: Model format.
          example: example_value
        name:
          type: string
          description: Model name.
          example: Example Title
        version:
          type: string
          description: Model version.
          example: example_value
        source:
          type: string
          description: Source of the model.
          example: example_value
        maxCapacity:
          type: integer
          description: The maximum capacity.
          example: 10
        capabilities:
          type: object
          additionalProperties:
            type: string
          description: Model capabilities.
          example: example_value
        deprecation:
          type: object
          description: Deprecation information.
          properties:
            fineTune:
              type: string
              format: date-time
            inference:
              type: string
              format: date-time
          example: example_value
        lifecycleStatus:
          type: string
          enum:
          - GenerallyAvailable
          - Preview
          description: Model lifecycle status.
          example: GenerallyAvailable
        systemData:
          type: object
          readOnly: true
          properties:
            createdBy:
              type: string
            createdByType:
              type: string
            createdAt:
              type: string
              format: date-time
            lastModifiedBy:
              type: string
            lastModifiedByType:
              type: string
            lastModifiedAt:
              type: string
              format: date-time
          example: example_value
    ModelListResult:
      type: object
      description: The list of cognitive services models.
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/AccountModel'
          description: An array of models.
          example: []
        nextLink:
          type: string
          description: The link used to get the next page of models.
          example: example_value
  parameters:
    ApiVersionParameter:
      name: api-version
      in: query
      required: true
      description: The API version to use for this operation.
      schema:
        type: string
        default: 2024-04-01-preview
    SubscriptionIdParameter:
      name: subscriptionId
      in: path
      required: true
      description: The ID of the target subscription.
      schema:
        type: string
        format: uuid
definitions:
  ModelPerformance:
    description: Performance metrics for a custom trained model.
    required:
    - tagPerformance
    type: object
    properties:
      accuracyTop1:
        format: double
        description: Read only. For multiclass classification models. The proportion of test samples where the ground truth class matches the predicted class.
        type: number
        readOnly: true
      accuracyTop5:
        format: double
        description: Read only. For multiclass classification models. The proportion of test samples where the ground truth class is in the top five predicted classes.
        type: number
        readOnly: true
      averagePrecision:
        format: double
        description: Read only. A measure of the model performance, it summarizes the precision and recall at different confidence thresholds.
        type: number
        readOnly: true
      calibrationECE:
        format: double
        description: Read only. For multiclass classification models. Expected calibration error.
        type: number
        readOnly: true
      meanAveragePrecision30:
        format: double
        description: Read only. For object detection models. Mean average precision at a threshold of 30%.
        type: number
        readOnly: true
      meanAveragePrecision50:
        format: double
        description: Read only. For object detection models. Mean average precision at a threshold of 50%.
        type: number
        readOnly: true
      meanAveragePrecision75:
        format: double
        description: Read only. For object detection models. Mean average precision at a threshold of 75%.
        type: number
        readOnly: true
      tagPerformance:
        description: Read only. Performance metrics for each tag recognized by the model.
        type: object
        additionalProperties:
          $ref: '#/definitions/ModelTagPerformance'
  ErrorResponse_16:
    description: Response returned when an error occurs.
    required:
    - error
    type: object
    properties:
      error:
        $ref: '#/definitions/ErrorResponseDetails'
  Model_14:
    description: Describes a training run for training a custom model.
    required:
    - trainingParameters
    type: object
    properties:
      trainingParameters:
        $ref: '#/definitions/TrainingParameters'
      name:
        description: Read only. The name that is used to uniquely identify the training run.
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
        type: string
      createdDateTime:
