definitions:
  MetricDefinition:
    description: Monitoring metric definition represents the metadata of the metrics.
    required:
    - name
    - unit
    - primaryAggregationType
    - resourceId
    - metricAvailabilities
    - dimensions
    - type
    type: object
    properties:
      name:
        $ref: '#/definitions/MetricName'
        description: The metric name
      unit:
        description: The metric unit
        enum:
        - Bytes
        - BytesPerSecond
        - Count
        - CountPerSecond
        - Percent
        - Seconds
        type: string
        x-ms-enum:
          name: MetricUnit
          modelAsString: false
      primaryAggregationType:
        description: The metric aggregation type
        enum:
        - Average
        - Last
        - Maximum
        - Minimum
        - None
        - Total
        type: string
        x-ms-enum:
          name: MetricAggregationType
          modelAsString: false
      resourceId:
        description: The metric source id
        type: string
      metricAvailabilities:
        description: The available metric granularities
        type: array
        items:
          $ref: '#/definitions/MetricAvailablity'
        x-ms-identifiers:
        - timeGrain
      dimensions:
        description: The supported dimensions
        type: array
        items:
          $ref: '#/definitions/MetricDimension'
        x-ms-identifiers:
        - name
      type:
        description: The metric definition type
        type: string
  MetricDefinitionList:
    description: List of metric definition
    required:
    - value
    type: object
    properties:
      value:
        description: The list of metric definition
        type: array
        items:
          $ref: '#/definitions/MetricDefinition'
        x-ms-identifiers:
        - name
  ISCSIServerProperties:
    description: The iSCSI server properties.
    required:
    - storageDomainId
    - backupScheduleGroupId
    type: object
    properties:
      storageDomainId:
        description: The storage domain id.
        type: string
      backupScheduleGroupId:
        description: The backup policy id.
        type: string
      description:
        description: The description.
        type: string
      chapId:
        description: The chap id.
        type: string
      reverseChapId:
        description: The reverse chap id.
        type: string
  MetricDimension:
    description: Metric dimension
    required:
    - name
    - value
    type: object
    properties:
      name:
        description: Metric dimension name
        type: string
      value:
        description: Metric dimension values
        type: string
  BaseModel:
    description: Base class for models
    type: object
    properties:
      id:
        description: The identifier.
        type: string
        readOnly: true
      name:
        description: The name.
        type: string
        readOnly: true
      type:
        description: The type.
        type: string
        readOnly: true
  Item:
    required:
    - key
    - value
    type: object
    properties:
      key:
        type: string
      value:
        type: string
  MetricData:
    description: The metric data.
    required:
    - timeStamp
    - sum
    - count
    - average
    - minimum
    - maximum
    type: object
    properties:
      timeStamp:
        format: date-time
        description: The time when the metric data is fetched
        type: string
      sum:
        format: double
        description: The sum of all the samples available in the given instance of time for the specific metric data
        type: number
      count:
        format: int32
        description: The count of samples of the metric data available for the given instance
        type: integer
      average:
        format: double
        description: The average of all sample for the given instance
        type: number
      minimum:
        format: double
        description: The minimum of all samples available
        type: number
      maximum:
        format: double
        description: The maximum of all samples available
        type: number
  Metrics:
    description: Monitoring metric
    required:
    - resourceId
    - startTime
    - endTime
    - timeGrain
    - primaryAggregation
    - name
    - dimensions
    - unit
    - type
    - values
    type: object
    properties:
      resourceId:
        description: The id of metric source
        type: string
      startTime:
        format: date-time
        description: The metric start time
        type: string
      endTime:
        format: date-time
        description: The metric end time
        type: string
      timeGrain:
        description: The time grain, time grain indicates frequency of the metric data
        type: string
      primaryAggregation:
        description: The metric aggregation type
        enum:
        - Average
        - Last
        - Maximum
        - Minimum
        - None
        - Total
        type: string
        x-ms-enum:
          name: MetricAggregationType
          modelAsString: false
      name:
        $ref: '#/definitions/MetricName'
        description: The name of the metrics
      dimensions:
        description: The Metric dimension which indicates the source of the metric
        type: array
        items:
          $ref: '#/definitions/MetricDimension'
        x-ms-identifiers:
        - name
      unit:
        description: The unit of the metric data
        enum:
        - Bytes
        - BytesPerSecond
        - Count
        - CountPerSecond
        - Percent
        - Seconds
        type: string
        x-ms-enum:
          name: MetricUnit
          modelAsString: false
      type:
        description: The Type of the metric data
        type: string
      values:
        description: The metric data
        type: array
        items:
          $ref: '#/definitions/MetricData'
        x-ms-identifiers:
        - timeStamp
  Message:
    type: object
    properties:
      language:
        type: string
      value:
        type: string
  MetricAvailablity:
    description: Metric availability specifies the time grain (aggregation interval or frequency) and the retention period for that time grain
    required:
    - timeGrain
    - retention
    type: object
    properties:
      timeGrain:
        description: The time grain, specifies the aggregation interval for the metric.
        type: string
      retention:
        description: The retention period for the metric at the specified timegrain
        type: string
  MetricList:
    description: Collection of metrics
    required:
    - value
    type: object
    properties:
      value:
        description: The value.
        type: array
        items:
          $ref: '#/definitions/Metrics'
        x-ms-identifiers: []
  Error:
    required:
    - errorCode
    - message
    type: object
    properties:
      errorCode:
        type: string
      message:
        $ref: '#/definitions/Message'
      values:
        type: array
        items:
          $ref: '#/definitions/Item'
        x-ms-identifiers:
        - key
  MetricName:
    description: The name of the metric
    required:
    - value
    - localizedValue
    type: object
    properties:
      value:
        description: Name of the metric
        type: string
      localizedValue:
        description: Localized name of the metric
        type: string
  ISCSIServerList:
    description: Collection of Iscsi servers
    required:
    - value
    type: object
    properties:
      value:
        description: The value.
        type: array
        items:
          $ref: '#/definitions/ISCSIServer'
  ISCSIServer:
    description: The iSCSI server.
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/BaseModel'
    properties:
      properties:
        $ref: '#/definitions/ISCSIServerProperties'
        description: The properties.
        x-ms-client-flatten: true
parameters:
  resourceGroupNameParameter:
    name: resourceGroupName
    in: path
    description: The resource group name
    required: true
