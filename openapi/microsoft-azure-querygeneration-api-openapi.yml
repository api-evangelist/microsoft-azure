swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector QueryGeneration API
schemes:
- https
tags:
- name: QueryGeneration
paths:
  /providers/Microsoft.ResourceGraph/generateQuery:
    post:
      operationId: microsoftAzureQueryGeneratequery
      tags:
      - QueryGeneration
      description: Generates ARG query for a given user prompt.
      parameters:
      - $ref: '#/parameters/ApiVersionParameter'
      - name: body
        in: body
        required: true
        schema:
          $ref: '#/definitions/QueryGenerationRequest'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/QueryGenerationResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Succeeded ARG Query Generation:
          $ref: ./examples/ResourcesGenerateQuery.json
        Failed ARG Query Generation:
          $ref: ./examples/ResourcesGenerateQueryNoGeneration.json
        ARG Query Generation with history:
          $ref: ./examples/ResourcesGenerateQueryWithHistory.json
      summary: Microsoft Azure Post Providers Microsoft Resourcegraph Generatequery
definitions:
  ErrorResponse:
    title: Error response.
    type: object
    description: An error response from the API.
    properties:
      error:
        $ref: '#/definitions/Error'
        description: Error information.
    required:
    - error
  Role:
    type: string
    description: The role which generates a specific message. Restricted to the user or assistant role.
    enum:
    - user
    - assistant
    - system
    x-ms-enum:
      name: Role
      modelAsString: true
      values:
      - name: user
        value: user
        description: If a message was generated by a human, the role should be assigned user
      - name: assistant
        value: assistant
        description: If a message was generated by ARG Query Generation service, then the role should be assistant
      - name: system
        value: system
        description: If a message provides high level instructions for the query generation, then the role should be system
  ErrorDetails:
    title: Error details.
    type: object
    properties:
      code:
        type: string
        description: Error code identifying the specific error.
      message:
        type: string
        description: A human readable error message.
    additionalProperties:
      type: object
    required:
    - code
    - message
  HistoryContext:
    type: object
    description: History content generated by a user, assistant or system role
    properties:
      content:
        type: string
        description: Content generated by a given role
      role:
        $ref: '#/definitions/Role'
        description: Role which generates the content e.g., user, assistant or system
    required:
    - content
    - role
  QueryGenerationResponse:
    type: object
    description: Query Generation Response
    properties:
      query:
        type: string
        description: Query generated for a given user prompt text
      status:
        $ref: '#/definitions/StatusResponse'
        description: Status for the query generation result
    required:
    - query
    - status
  StatusResponse:
    type: object
    description: Status
    properties:
      category:
        $ref: '#/definitions/StatusCategory'
        description: Status category for query generation result
      message:
        type: string
        description: Status message for query generation result
    required:
    - category
    - message
  QueryGenerationRequest:
    type: object
    description: Query Generation Request
    properties:
      history:
        type: array
        description: A collection of chat history to provide context in query generation
        items:
          $ref: '#/definitions/HistoryContext'
        x-ms-identifiers: []
      prompt:
        type: string
        description: Prompt text from user
    required:
    - prompt
  Error:
    title: Error info.
    type: object
    description: Error details.
    properties:
      code:
        type: string
        description: Error code identifying the specific error.
      message:
        type: string
        description: A human readable error message.
      details:
        type: array
        description: Error details
        items:
          $ref: '#/definitions/ErrorDetails'
    required:
    - code
    - message
  StatusCategory:
    type: string
    description: Status Category
    enum:
    - Succeeded
    - Failed
    x-ms-enum:
      name: StatusCategory
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Succeeded when query was generated successfully
      - name: Failed
        value: Failed
        description: Failed when query was not generated
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    required: true
    type: string
    description: Api Version.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
