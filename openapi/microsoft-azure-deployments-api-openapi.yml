definitions:
  AzureChatExtensionsMessageContext:
    type: object
    description: "  A representation of the additional context information available when Azure OpenAI chat extensions are involved\n  in the generation of a corresponding chat completions response. This context information is only populated when\n  using an Azure OpenAI request configured to use a matching extension."
    properties:
      citations:
        type: array
        description: "  The contextual information associated with the Azure chat extensions used for a chat completions request.\n  These messages describe the data source retrievals, plugin invocations, and other intermediate steps taken in the\n  course of generating a chat completions response that was augmented by capabilities from Azure OpenAI chat\n  extensions."
        items:
          $ref: '#/definitions/AzureChatExtensionDataSourceResponseCitation'
        x-ms-identifiers: []
      intent:
        type: string
        description: The detected intent from the chat history, used to pass to the next turn to carry over the context.
  WhatIfPropertyChange:
    required:
    - path
    - propertyChangeType
    properties:
      path:
        type: string
        description: The path of the property.
      propertyChangeType:
        type: string
        description: The type of property change.
        enum:
        - Create
        - Delete
        - Modify
        - Array
        - NoEffect
        x-ms-enum:
          name: PropertyChangeType
          modelAsString: false
          values:
          - value: Create
            description: The property does not exist in the current state but is present in the desired state. The property will be created when the deployment is executed.
          - value: Delete
            description: The property exists in the current state and is missing from the desired state. It will be deleted when the deployment is executed.
          - value: Modify
            description: The property exists in both current and desired state and is different. The value of the property will change when the deployment is executed.
          - value: Array
            description: The property is an array and contains nested changes.
          - value: NoEffect
            description: The property will not be set or updated.
      before:
        type: object
        description: The value of the property before the deployment is executed.
      after:
        type: object
        description: The value of the property after the deployment is executed.
      children:
        type: array
        items:
          $ref: '#/definitions/WhatIfPropertyChange'
        x-ms-identifiers:
        - path
        description: Nested property changes.
    description: The predicted change to the resource property.
  ImageGenerationContentFilterResults:
    type: object
    description: Describes the content filtering result for the image generation request.
    properties:
      sexual:
        $ref: '#/definitions/ContentFilterResult'
        description: "Describes language related to anatomical organs and genitals, romantic relationships,\n acts portrayed in erotic or affectionate terms, physical sexual acts, including\n those portrayed as an assault or a forced sexual violent act against one’s will,\n prostitution, pornography, and abuse."
      violence:
        $ref: '#/definitions/ContentFilterResult'
        description: 'Describes language related to physical actions intended to hurt, injure, damage, or

          kill someone or something; describes weapons, etc.'
      hate:
        $ref: '#/definitions/ContentFilterResult'
        description: 'Describes language attacks or uses that include pejorative or discriminatory language

          with reference to a person or identity group on the basis of certain differentiating

          attributes of these groups including but not limited to race, ethnicity, nationality,

          gender identity and expression, sexual orientation, religion, immigration status, ability

          status, personal appearance, and body size.'
      self_harm:
        $ref: '#/definitions/ContentFilterResult'
        description: 'Describes language related to physical actions intended to purposely hurt, injure,

          or damage one’s body, or kill oneself.'
        x-ms-client-name: selfHarm
  EmbeddingsUsage:
    type: object
    description: Measurement of the amount of tokens used in this request and response.
    properties:
      prompt_tokens:
        type: integer
        format: int32
        description: Number of tokens sent in the original request.
        x-ms-client-name: promptTokens
      total_tokens:
        type: integer
        format: int32
        description: Total number of tokens transacted in this request/response.
        x-ms-client-name: totalTokens
    required:
    - prompt_tokens
    - total_tokens
  Dependency:
    properties:
      dependsOn:
        type: array
        items:
          $ref: '#/definitions/BasicDependency'
        description: The list of dependencies.
      id:
        type: string
        description: The ID of the dependency.
      resourceType:
        type: string
        description: The dependency resource type.
      resourceName:
        type: string
        description: The dependency resource name.
    description: Deployment dependency information.
  ImageType:
    type: string
    description: Image type values.
    enum:
    - InvalidImageType
    - OneBl
    - PlutonRuntime
    - WifiFirmware
    - SecurityMonitor
    - NormalWorldLoader
    - NormalWorldDtb
    - NormalWorldKernel
    - RootFs
    - Services
    - Applications
    - FwConfig
    - BootManifest
    - Nwfs
    - TrustedKeystore
    - Policy
    - CustomerBoardConfig
    - UpdateCertStore
    - BaseSystemUpdateManifest
    - FirmwareUpdateManifest
    - CustomerUpdateManifest
    - RecoveryManifest
    - ManifestSet
    - Other
    x-ms-enum:
      name: ImageType
      modelAsString: true
      values:
      - name: InvalidImageType
        value: InvalidImageType
        description: Invalid image.
      - name: OneBl
        value: OneBl
        description: One Bl image type
      - name: PlutonRuntime
        value: PlutonRuntime
        description: Pluton image type
      - name: WifiFirmware
        value: WifiFirmware
        description: Wifi firmware image type
      - name: SecurityMonitor
        value: SecurityMonitor
        description: Security monitor image type
      - name: NormalWorldLoader
        value: NormalWorldLoader
        description: Normal world loader image type
      - name: NormalWorldDtb
        value: NormalWorldDtb
