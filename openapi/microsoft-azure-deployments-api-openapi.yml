  /deployments/{deployment-id}/completions:
    post:
      summary: Microsoft Azure Creates A Completion For The Provided Prompt, Parameters And Chosen Model
      operationId: microsoftAzureCompletionsCreate
      parameters:
      - in: path
        name: deployment-id
        required: true
        schema:
          type: string
          example: davinci
          description: Deployment id of the model which was deployed.
      - in: query
        name: api-version
        required: true
        schema:
          type: string
          example: 2023-12-01-preview
          description: api version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  description: 'The prompt(s) to generate completions for, encoded as a string or array of strings.

                    Note that <|endoftext|> is the document separator that the model sees during training, so if a prompt is not specified the model will generate as if from the beginning of a new document. Maximum allowed size of string list is 2048.'
                  oneOf:
                  - type: string
                    default: ''
                    example: This is a test.
                    nullable: true
                  - type: array
                    items:
                      type: string
                      default: ''
                      example: This is a test.
                      nullable: false
                    description: Array size minimum of 1 and maximum of 2048
                max_tokens:
                  description: The token count of your prompt plus max_tokens cannot exceed the model's context length. Most models have a context length of 2048 tokens (except for the newest models, which support 4096). Has minimum of 0.
                  type: integer
                  default: 16
                  example: 16
                  nullable: true
                temperature:
                  description: 'What sampling temperature to use. Higher values means the model will take more risks. Try 0.9 for more creative applications, and 0 (argmax sampling) for ones with a well-defined answer.

                    We generally recommend altering this or top_p but not both.'
                  type: number
                  default: 1
                  example: 1
                  nullable: true
                top_p:
                  description: 'An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered.

                    We generally recommend altering this or temperature but not both.'
                  type: number
                  default: 1
                  example: 1
                  nullable: true
                logit_bias:
                  description: Defaults to null. Modify the likelihood of specified tokens appearing in the completion. Accepts a json object that maps tokens (specified by their token ID in the GPT tokenizer) to an associated bias value from -100 to 100. You can use this tokenizer tool (which works for both GPT-2 and GPT-3) to convert text to token IDs. Mathematically, the bias is added to the logits generated by the model prior to sampling. The exact effect will vary per model, but values between -1 and 1 should decrease or increase likelihood of selection; values like -100 or 100 should result in a ban or exclusive selection of the relevant token. As an example, you can pass {"50256" &#58; -100} to prevent the <|endoftext|> token from being generated.
                  type: object
                  nullable: false
                user:
                  description: A unique identifier representing your end-user, which can help monitoring and detecting abuse
                  type: string
                  nullable: false
                n:
                  description: 'How many completions to generate for each prompt. Minimum of 1 and maximum of 128 allowed.

                    Note: Because this parameter generates many completions, it can quickly consume your token quota. Use carefully and ensure that you have reasonable settings for max_tokens and stop.'
                  type: integer
                  default: 1
                  example: 1
                  nullable: true
                stream:
                  description: 'Whether to stream back partial progress. If set, tokens will be sent as data-only server-sent events as they become available, with the stream terminated by a data: [DONE] message.'
                  type: boolean
                  nullable: true
                  default: false
                logprobs:
                  description: 'Include the log probabilities on the logprobs most likely tokens, as well the chosen tokens. For example, if logprobs is 5, the API will return a list of the 5 most likely tokens. The API will always return the logprob of the sampled token, so there may be up to logprobs+1 elements in the response.

                    Minimum of 0 and maximum of 5 allowed.'
                  type: integer
                  default: null
                  nullable: true
                suffix:
                  type: string
                  nullable: true
                  description: The suffix that comes after a completion of inserted text.
                echo:
                  description: Echo back the prompt in addition to the completion
                  type: boolean
                  default: false
                  nullable: true
                stop:
                  description: Up to 4 sequences where the API will stop generating further tokens. The returned text will not contain the stop sequence.
                  oneOf:
                  - type: string
                    default: <|endoftext|>
                    example: '

                      '
                    nullable: true
                  - type: array
                    items:
                      type: string
                      example: '

                        '
                      nullable: false
                    description: Array minimum size of 1 and maximum of 4
                completion_config:
                  type: string
                  nullable: true
                presence_penalty:
                  description: Number between -2.0 and 2.0. Positive values penalize new tokens based on whether they appear in the text so far, increasing the model's likelihood to talk about new topics.
                  type: number
                  default: 0
                frequency_penalty:
                  description: Number between -2.0 and 2.0. Positive values penalize new tokens based on their existing frequency in the text so far, decreasing the model's likelihood to repeat the same line verbatim.
                  type: number
                  default: 0
                best_of:
                  description: 'Generates best_of completions server-side and returns the "best" (the one with the highest log probability per token). Results cannot be streamed.

                    When used with n, best_of controls the number of candidate completions and n specifies how many to return - best_of must be greater than n.

                    Note: Because this parameter generates many completions, it can quickly consume your token quota. Use carefully and ensure that you have reasonable settings for max_tokens and stop. Has maximum value of 128.'
                  type: integer
            example:
              prompt: "Negate the following sentence.The price for bubblegum increased on thursday.\n\n Negated Sentence:"
              max_tokens: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  object:
                    type: string
                  created:
                    type: integer
                  model:
                    type: string
                  prompt_filter_results:
                    $ref: '#/components/schemas/promptFilterResults'
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        index:
                          type: integer
                        logprobs:
                          type: object
                          properties:
                            tokens:
                              type: array
                              items:
                                type: string
                            token_logprobs:
                              type: array
                              items:
                                type: number
                            top_logprobs:
                              type: array
                              items:
                                type: object
                                additionalProperties:
                                  type: number
                            text_offset:
                              type: array
                              items:
                                type: integer
                          nullable: true
                        finish_reason:
                          type: string
                        content_filter_results:
                          $ref: '#/components/schemas/contentFilterChoiceResults'
                  usage:
                    type: object
                    properties:
                      completion_tokens:
                        type: number
                        format: int32
                      prompt_tokens:
                        type: number
                        format: int32
                      total_tokens:
                        type: number
                        format: int32
                    required:
                    - prompt_tokens
                    - total_tokens
                    - completion_tokens
                required:
                - id
                - object
                - created
                - model
                - choices
              example:
                model: davinci
                object: text_completion
                id: cmpl-4509KAos68kxOqpE2uYGw81j6m7uo
                created: 1637097562
                choices:
                - index: 0
                  text: The price for bubblegum decreased on thursday.
                  logprobs: null
                  finish_reason: stop
          headers:
            apim-request-id:
              description: Request ID for troubleshooting purposes
              schema:
                type: string
        default:
