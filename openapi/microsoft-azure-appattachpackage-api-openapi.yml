          description: Successfully retrieved App Attach Package.
          schema:
            $ref: '#/definitions/AppAttachPackage'
        default:
          description: Automation error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/ErrorResponse
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Desktopvirtualization Appattachpackages Appattachpackagename
    put:
      tags:
      - AppAttachPackage
      operationId: microsoftAzureAppattachpackageCreateorupdate
