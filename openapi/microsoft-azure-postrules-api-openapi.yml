definitions:
  PostRulesResource:
    type: object
    properties:
      properties:
        $ref: '#/definitions/RuleEntry'
        description: The resource-specific properties for this resource.
        x-ms-mutability:
        - read
        - create
        x-ms-client-flatten: true
      systemData:
        $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/systemData
        description: System metadata for this resource.
        readOnly: true
    description: PostRulestack rule list
    required:
    - properties
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/ProxyResource
  Category:
    type: object
    properties:
      urlCustom:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: custom URL
      feeds:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: feed list
    description: URL/EDL to match
    required:
    - urlCustom
    - feeds
  RuleEntry:
    type: object
    properties:
      etag:
        type: string
        description: etag info
      ruleName:
        type: string
        description: rule name
      priority:
        type: integer
        format: int32
        readOnly: true
      description:
        type: string
        description: rule description
      ruleState:
        $ref: '#/definitions/StateEnum'
        description: state of this rule
      source:
        $ref: '#/definitions/SourceAddr'
        description: source address
      negateSource:
        $ref: '#/definitions/BooleanEnum'
        description: cidr should not be 'any'
      destination:
        $ref: '#/definitions/DestinationAddr'
        description: destination address
      negateDestination:
        $ref: '#/definitions/BooleanEnum'
        description: cidr should not be 'any'
      applications:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: array of rule applications
      category:
        $ref: '#/definitions/Category'
        description: rule category
      protocol:
        type: string
        description: any, application-default, TCP:number, UDP:number
        default: application-default
      protocolPortList:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: prot port list
      inboundInspectionCertificate:
        type: string
        description: inbound Inspection Certificate
      auditComment:
        type: string
        description: rule comment
      actionType:
        $ref: '#/definitions/ActionEnum'
        description: rule action
      enableLogging:
        $ref: '#/definitions/StateEnum'
        description: enable or disable logging
      decryptionRuleType:
        $ref: '#/definitions/DecryptionRuleTypeEnum'
        description: enable or disable decryption
      tags:
        type: array
        items:
          $ref: '#/definitions/TagInfo'
        x-ms-identifiers: []
        x-cadl-name: TagInfo[]
        description: tag for rule
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: Provisioning state of the resource.
        readOnly: true
    description: definition of rule
    required:
    - ruleName
  DestinationAddr:
    type: object
    properties:
      cidrs:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: special value 'any'
      countries:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: list of countries
      feeds:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: list of feeds
      prefixLists:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: prefix list
      fqdnLists:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: fqdn list
    description: destination address
  StateEnum:
    type: string
    description: Enabled or Disabled Enum
    enum:
    - DISABLED
    - ENABLED
    x-ms-enum:
      name: StateEnum
      modelAsString: true
  TagInfo:
    type: object
    properties:
      key:
        type: string
        description: tag name
      value:
        type: string
        description: tag value
    description: Tag
    required:
    - key
    - value
  ProvisioningState:
    type: string
    description: Provisioning state of the firewall resource.
    enum:
    - Accepted
    - Creating
    - Updating
    - Deleting
    - Succeeded
    - Failed
    - Canceled
    - Deleted
    - NotSpecified
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
  PostRulesResourceListResult:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/PostRulesResource'
        x-cadl-name: PostRulesResource[]
        description: The items on this page
      nextLink:
        type: string
        description: The link to the next page of items
    description: The response of a PostRulesResource list operation.
    required:
    - value
  DecryptionRuleTypeEnum:
    type: string
    enum:
    - SSLOutboundInspection
    - SSLInboundInspection
    - None
    x-ms-enum:
      name: DecryptionRuleTypeEnum
      modelAsString: true
  ActionEnum:
    type: string
    enum:
    - Allow
    - DenySilent
    - DenyResetServer
    - DenyResetBoth
    x-ms-enum:
      name: ActionEnum
      modelAsString: true
  BooleanEnum:
    type: string
    description: Boolean Enum
    enum:
    - 'TRUE'
    - 'FALSE'
    x-ms-enum:
      name: BooleanEnum
      modelAsString: true
  SourceAddr:
    type: object
    properties:
      cidrs:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: special value 'any'
      countries:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: list of countries
      feeds:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: list of feeds
      prefixLists:
        type: array
        items:
          type: string
        x-cadl-name: string[]
        description: prefix list
    description: Address properties
  RuleCounter:
    type: object
    properties:
      priority:
        type: string
        description: priority number
      ruleStackName:
        type: string
        description: rule Stack Name
      ruleListName:
        type: string
        description: rule list name
      firewallName:
        type: string
        description: firewall name
      ruleName:
        type: string
        description: rule name
      hitCount:
        type: integer
        format: int32
        description: hit count
      appSeen:
        $ref: '#/definitions/AppSeenData'
        description: apps seen
      timestamp:
        type: string
        format: date-time
        description: timestamp of response
      requestTimestamp:
        type: string
        format: date-time
        description: timestamp of request
      lastUpdatedTimestamp:
        type: string
        format: date-time
        description: last updated timestamp
    description: Rule counter
    required:
    - priority
    - ruleName
  AppSeenInfo:
    type: object
    properties:
      title:
        type: string
        description: title
      category:
        type: string
        description: category
      subCategory:
        type: string
        description: subCategory
      risk:
        type: string
        description: risk
      tag:
        type: string
        description: tag
      technology:
        type: string
        description: technology
      standardPorts:
        type: string
        description: standardPorts
    description: Definition for App Seen
    required:
    - title
    - category
    - subCategory
    - risk
    - tag
    - technology
    - standardPorts
  AppSeenData:
    type: object
    properties:
      count:
        type: integer
        format: int32
        description: number of rows
      appSeenList:
        type: array
        items:
          $ref: '#/definitions/AppSeenInfo'
        x-ms-identifiers: []
        x-cadl-name: AppSeenInfo[]
        description: array of appSeen
    description: Data Type for App Seen
    required:
    - count
    - appSeenList
  RuleCounterReset:
    type: object
    properties:
      priority:
        type: string
        description: priority number
        readOnly: true
      ruleStackName:
        type: string
        description: rule Stack Name
      ruleListName:
        type: string
        description: rule list name
      firewallName:
        type: string
        description: firewall name
      ruleName:
        type: string
        description: rule name
    description: Rule counter reset
