definitions:
  SkuResource:
    type: object
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ProxyResource
    properties:
      properties:
        allOf:
        - $ref: '#/definitions/ResourceTypeSku'
      systemData:
        $ref: ../../../../../common-types/resource-management/v1/types.json#/definitions/systemData
        readOnly: true
    x-ms-azure-resource: true
  SkuCapability:
    required:
    - name
    - value
    type: object
    properties:
      name:
        type: string
      value:
        type: string
  SkuZoneDetail:
    type: object
    properties:
      name:
        type: array
        items:
          type: string
      capabilities:
        type: array
        items:
          $ref: '#/definitions/SkuCapability'
  ResourceTypeSku:
    required:
    - skuSettings
    type: object
    properties:
      skuSettings:
        type: array
        items:
          $ref: '#/definitions/SkuSetting'
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The provisioned state of the resource.
  Error:
    description: Standard error object.
    type: object
    properties:
      code:
        description: Server-defined set of error codes.
        type: string
        readOnly: true
      message:
        description: Human-readable representation of the error.
        type: string
        readOnly: true
      target:
        description: Target of the error.
        type: string
        readOnly: true
      details:
        description: Array of details about specific errors that led to this reported error.
        type: array
        items:
          $ref: '#/definitions/Error'
        readOnly: true
      innerError:
        description: Object containing more specific information than  the current object about the error.
        allOf:
        - $ref: '#/definitions/InnerError'
        readOnly: true
  ErrorResponse:
    description: Standard error response.
    type: object
    properties:
      error:
        description: Standard error object.
        allOf:
        - $ref: '#/definitions/Error'
  SkuLocationInfo:
    required:
    - location
    type: object
    properties:
      location:
        type: string
      zones:
        type: array
        items:
          type: string
      zoneDetails:
        type: array
        items:
          $ref: '#/definitions/SkuZoneDetail'
      extendedLocations:
        type: array
        items:
          type: string
      type:
        enum:
        - NotSpecified
        - EdgeZone
        - ArcZone
        type: string
  SkuCost:
    required:
    - meterId
    type: object
    properties:
      meterId:
        type: string
      quantity:
        format: int32
        type: integer
      extendedUnit:
        type: string
  SkuSetting:
    required:
    - name
    type: object
    properties:
      name:
        type: string
      tier:
        type: string
      size:
        type: string
      family:
        type: string
      kind:
        type: string
      locations:
        type: array
        items:
          type: string
      locationInfo:
        type: array
        items:
          $ref: '#/definitions/SkuLocationInfo'
      requiredQuotaIds:
        type: array
        items:
          type: string
      requiredFeatures:
        type: array
        items:
          type: string
      capacity:
        allOf:
        - $ref: '#/definitions/SkuCapacity'
