definitions:
  AgReplica:
    description: Availability group replica configuration.
    type: object
    properties:
      sqlVirtualMachineInstanceId:
        description: Sql VirtualMachine Instance Id.
        type: string
      role:
        description: Replica Role in availability group.
        enum:
        - PRIMARY
        - SECONDARY
        type: string
        x-ms-enum:
          name: Role
          modelAsString: true
      commit:
        description: Replica commit mode in availability group.
        enum:
        - SYNCHRONOUS_COMMIT
        - ASYNCHRONOUS_COMMIT
        type: string
        x-ms-enum:
          name: Commit
          modelAsString: true
      failover:
        description: Replica failover mode in availability group.
        enum:
        - AUTOMATIC
        - MANUAL
        type: string
        x-ms-enum:
          name: Failover
          modelAsString: true
      readableSecondary:
        description: Replica readable secondary mode in availability group.
        enum:
        - 'NO'
        - ALL
        - READ_ONLY
        type: string
        x-ms-enum:
          name: ReadableSecondary
          modelAsString: true
  AvailabilityGroupListener:
    description: A SQL Server availability group listener.
    type: object
    allOf:
    - $ref: '#/definitions/ProxyResource'
    properties:
      properties:
        $ref: '#/definitions/AvailabilityGroupListenerProperties'
        description: Resource properties.
        x-ms-client-flatten: true
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        readOnly: true
  ProxyResource:
    description: ARM proxy resource.
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties: {}
  Resource:
    description: ARM resource.
    type: object
    properties:
      id:
        description: Resource ID.
        type: string
        readOnly: true
      name:
        description: Resource name.
        type: string
        readOnly: true
      type:
        description: Resource type.
        type: string
        readOnly: true
    x-ms-azure-resource: true
  AgConfiguration:
    description: Availability group configuration.
    type: object
    properties:
      replicas:
        description: Replica configurations.
        type: array
        items:
          $ref: '#/definitions/AgReplica'
        x-ms-identifiers: []
  MultiSubnetIpConfiguration:
    description: Multi subnet ip configuration for an availability group listener.
    required:
    - privateIpAddress
    - sqlVirtualMachineInstance
    type: object
    properties:
      privateIpAddress:
        $ref: '#/definitions/PrivateIPAddress'
        description: Private IP address.
      sqlVirtualMachineInstance:
        description: SQL virtual machine instance resource id that are enrolled into the availability group listener.
        type: string
  AvailabilityGroupListenerListResult:
    description: A list of availability group listeners.
    type: object
    properties:
      value:
        description: Array of results.
        type: array
        items:
          $ref: '#/definitions/AvailabilityGroupListener'
        readOnly: true
      nextLink:
        description: Link to retrieve next page of results.
        type: string
        readOnly: true
  PrivateIPAddress:
    description: A private IP address bound to the availability group listener.
    type: object
    properties:
      ipAddress:
        description: Private IP address bound to the availability group listener.
        type: string
      subnetResourceId:
        description: Subnet used to include private IP.
        type: string
  AvailabilityGroupListenerProperties:
    description: The properties of an availability group listener.
    type: object
    properties:
      provisioningState:
        description: Provisioning state to track the async operation status.
        type: string
        readOnly: true
      availabilityGroupName:
        description: Name of the availability group.
        type: string
      loadBalancerConfigurations:
        description: List of load balancer configurations for an availability group listener.
        type: array
        items:
          $ref: '#/definitions/LoadBalancerConfiguration'
        x-ms-identifiers: []
      multiSubnetIpConfigurations:
        description: List of multi subnet IP configurations for an AG listener.
        type: array
        items:
          $ref: '#/definitions/MultiSubnetIpConfiguration'
        x-ms-identifiers: []
      createDefaultAvailabilityGroupIfNotExist:
        description: Create a default availability group if it does not exist.
        type: boolean
      port:
        format: int32
        description: Listener port.
        type: integer
      availabilityGroupConfiguration:
        $ref: '#/definitions/AgConfiguration'
        description: Availability Group configuration.
  LoadBalancerConfiguration:
    description: A load balancer configuration for an availability group listener.
    type: object
    properties:
      privateIpAddress:
        $ref: '#/definitions/PrivateIPAddress'
        description: Private IP address.
      publicIpAddressResourceId:
        description: Resource id of the public IP.
        type: string
      loadBalancerResourceId:
        description: Resource id of the load balancer.
        type: string
      probePort:
        format: int32
        description: Probe port.
        type: integer
      sqlVirtualMachineInstances:
        description: List of the SQL virtual machine instance resource id's that are enrolled into the availability group listener.
        type: array
        items:
          type: string
parameters:
  ApiVersionParameter:
    name: api-version
    in: query
    description: API version to use for the request.
    required: true
    type: string
    x-ms-parameter-location: client
  ResourceGroupParameter:
    name: resourceGroupName
    in: path
    description: Name of the resource group that contains the resource. You can obtain this value from the Azure Resource Manager API or the portal.
    required: true
    type: string
    x-ms-parameter-location: method
  SubscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Subscription ID that identifies an Azure subscription.
    required: true
    type: string
    x-ms-parameter-location: client
