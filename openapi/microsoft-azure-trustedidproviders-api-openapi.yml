          description: Successfully added the trusted identity provider.
          schema:
            $ref: '#/definitions/TrustedIdProvider'
      x-ms-examples:
        Updates the specified trusted identity provider:
          $ref: ./examples/TrustedIdProviders_Update.json
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Datalakestore Accounts Accountname Trustedidproviders Trustedidprovidername
    delete:
      tags:
      - TrustedIdProviders
      operationId: microsoftAzureTrustedidprovidersDelete
      description: Deletes the specified trusted identity provider from the specified Data Lake Store account
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
