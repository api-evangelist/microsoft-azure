  /projects/{projectId}/iterations/{iterationId}/performance/images:
    get:
      tags:
        - ProjectApi
      summary: Get Image With Its Prediction For A Given Project Iteration
      description: >-
        This API supports batching and range selection. By default it will only
        return first 50 images matching images.<br>Use the {take} and {skip}
        parameters to control how many images to return in a given batch.<br>The
        filtering is on an and/or relationship. For example, if the provided tag
        ids are for the "Dog" and<br>"Cat" tags, then only images tagged with
        Dog and/or Cat will be returned
      operationId: microsoftAzureGetimageperformances
      consumes: []
      produces:
        - application/json
        - text/json
        - application/xml
        - text/xml
      parameters:
        - name: projectId
          in: path
          description: The project id
          required: true
          type: string
          format: uuid
          x-nullable: false
        - name: iterationId
          in: path
          description: The iteration id. Defaults to workspace
          required: true
          type: string
          format: uuid
          x-nullable: false
        - name: tagIds
          in: query
          description: >-
            A list of tags ids to filter the images. Defaults to all tagged
            images when null. Limited to 20
          required: false
          type: array
          items:
            type: string
            x-nullable: false
          collectionFormat: csv
          x-nullable: true
        - name: orderBy
          in: query
          description: The ordering. Defaults to newest
          required: false
          type: string
          enum:
            - Newest
            - Oldest
          x-nullable: false
        - name: take
          in: query
          description: Maximum number of images to return. Defaults to 50, limited to 256
          required: false
          type: integer
          format: int32
          default: 50
        - name: skip
          in: query
          description: >-
            Number of images to skip before beginning the image batch. Defaults
            to 0
          required: false
          type: integer
          format: int32
          default: 0
        - $ref: '#/parameters/ApiKey'
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
