swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Long Running Operations API
schemes:
- https
tags:
- name: Long Running Operations
paths:
  /phoneNumbers/operations/{operationId}:
    get:
      tags:
      - Long Running Operations
      summary: Microsoft Azure Gets An Operation By Its Id
      operationId: microsoftAzurePhonenumbersGetoperation
      produces:
      - application/json
      parameters:
      - in: path
        name: operationId
        description: The id of the operation
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: When the operation is completed, query the final result of the operation using the URL specified in the 'Location' attribute in the response header.
          schema:
            $ref: '#/definitions/PhoneNumberOperation'
          headers:
            Location:
              description: Url to retrieve the final result after operation completes.
              type: string
        default:
          description: Failure
          schema:
            $ref: ../../../Common/stable/2021-03-07/common.json#/definitions/CommunicationErrorResponse
      x-ms-examples:
        Get long running operation status by operation id:
          $ref: ./examples/GetOperation.json
      description: Needs a more full description created.
    delete:
      tags:
      - Long Running Operations
      summary: Microsoft Azure Cancels An Operation By Its Id
      operationId: microsoftAzurePhonenumbersCanceloperation
      parameters:
      - in: path
        name: operationId
        description: The id of the operation
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '204':
          description: Success
        default:
          description: Failure
          schema:
            $ref: ../../../Common/stable/2021-03-07/common.json#/definitions/CommunicationErrorResponse
      x-ms-examples:
        Delete long running operation with the given operation id:
          $ref: ./examples/DeleteOperation.json
      produces:
      - application/json
      description: Needs a more full description created.
definitions:
  PhoneNumberOperation:
    description: Long running operation.
    required:
    - createdDateTime
    - id
    - operationType
    - status
    type: object
    properties:
      status:
        description: Status of operation.
        enum:
        - notStarted
        - running
        - succeeded
        - failed
        type: string
        x-ms-enum:
          name: PhoneNumberOperationStatus
          modelAsString: true
      resourceLocation:
        description: URL for retrieving the result of the operation, if any.
        type: string
      createdDateTime:
        format: date-time
        description: The date that the operation was created.
        type: string
      error:
        $ref: ../../../Common/stable/2021-03-07/common.json#/definitions/CommunicationError
      id:
        description: Id of operation.
        type: string
      operationType:
        description: The type of operation, e.g. Search
        enum:
        - purchase
        - releasePhoneNumber
        - search
        - updatePhoneNumberCapabilities
        type: string
        x-ms-enum:
          name: PhoneNumberOperationType
          modelAsString: true
      lastActionDateTime:
        format: date-time
        description: The most recent date that the operation was changed.
        type: string
        readOnly: true
parameters:
  ApiVersionParameter:
    in: query
    name: api-version
    description: Version of API to invoke.
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
