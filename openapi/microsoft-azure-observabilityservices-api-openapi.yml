definitions:
  ComponentDeploymentSecrets:
    type: string
    description: Containerized Network Function (CNF) Component Secrets
  OperationalStatus:
    type: object
    description: Operational Status of the resource
    properties:
      workload:
        type: string
        description: Status of the deployed workload
        readOnly: true
      healthCheck:
        type: string
        description: Health check results
        readOnly: true
  ObservabilityServiceResourceListResult:
    type: object
    description: The response of a ObservabilityServiceResource list operation.
    properties:
      value:
        type: array
        description: The ObservabilityServiceResource items on this page
        items:
          $ref: '#/definitions/ObservabilityServiceResource'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  ReleaseVersion:
    type: string
    description: Azure for Operators 5G Core Release Version.
  QualifiedComponentDeploymentParameters:
    type: object
    description: Containerized Network Function (CNF) Qualified Deployment Parameters
    properties:
      type:
        $ref: '#/definitions/ComponentDeploymentType'
        description: Federation Type
      parameters:
        $ref: '#/definitions/ComponentDeploymentParameters'
        description: Deployment Parameters
      secrets:
        $ref: '#/definitions/ComponentDeploymentSecrets'
        format: password
        description: Deployment secrets
        x-ms-secret: true
    required:
    - type
  ClusterServiceIdProperty:
    type: string
    format: arm-id
    description: ARM resource ID of a cluster.
    x-ms-arm-id-details:
      allowedResources:
      - type: Microsoft.MobilePacketCore/clusterServices
  ComponentDeploymentType:
    type: string
    description: Containerized Network Function (CNF) Component Deployment Type
  ProvisioningState:
    type: string
    description: Provisioning state of the resource
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: Resource is getting provisioned
      - name: Updating
        value: Updating
        description: Resource is updating
      - name: Deleting
        value: Deleting
        description: Resource is getting deleted
      - name: Accepted
        value: Accepted
        description: Resource has been accepted
    readOnly: true
  ObservabilityServiceResourceTagsUpdate:
    type: object
    description: The type used for updating tags in ObservabilityServiceResource resources.
    properties:
      tags:
        type: object
        description: Resource tags.
        additionalProperties:
          type: string
  ComponentDeploymentParameters:
    type: string
    description: Containerized Network Function (CNF) Component Deployment Parameters
  ObservabilityServiceResource:
    type: object
    description: Azure for Operators 5G Core Observability Service Resource
    properties:
      properties:
        $ref: '#/definitions/ObservabilityServiceResourceProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v5/types.json#/definitions/TrackedResource
  ObservabilityServiceResourceProperties:
    type: object
    description: Observability Service Properties.
    properties:
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
        readOnly: true
      componentParameters:
        type: array
        description: Azure for Operators 5G Core Observability component parameters.  One set per component type
        items:
          $ref: '#/definitions/QualifiedComponentDeploymentParameters'
        x-ms-identifiers:
        - type
      clusterService:
        $ref: '#/definitions/ClusterServiceIdProperty'
        description: Reference to cluster where the observability components are deployed
        x-ms-mutability:
        - read
        - create
      releaseVersion:
        $ref: '#/definitions/ReleaseVersion'
        description: Release version. This is inherited from the cluster
        readOnly: true
      operationalStatus:
        $ref: '#/definitions/OperationalStatus'
        description: Operational status
        readOnly: true
    required:
    - componentParameters
    - clusterService
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
