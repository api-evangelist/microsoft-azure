swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Number API
schemes:
- https
tags:
- name: Number
paths:
  /account/{accountName}/numbers:
    get:
      operationId: microsoftAzureAccountListnumbers
      produces:
      - application/json
      parameters:
      - in: path
        name: accountName
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 100
        required: true
        type: string
        description: Name of the account. Can only contain letters, numbers, underscores and dashes, and is case-sensitive. Can be up to 100 characters in length.
      - $ref: '#/parameters/ApiVersionParameter'
      - format: int32
        in: query
        name: maxpagesize
        type: integer
        description: Maximum number of records to include in a single response. Defaults to 200, and must not exceed 500.
      - format: int32
        in: query
        name: skip
        type: integer
        description: An offset into the collection of the first record to be returned.
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/NumbersList'
        default:
          description: An error response object.
          headers:
            x-ms-error-code:
              type: string
              description: Error code for specific error that occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        Get account numbers.:
          $ref: ./examples/GetAccountNumbers.json
      tags:
      - Number
      description: Gets a list of the numbers assigned to the specified account. Response pagination can be controlled with a combination of the maxpagesize and skip parameters. Limit the number of records in a response with the maxpagesize parameter. Specify the starting record using the skip parameter.
      summary: Microsoft Azure Get Account Accountname Numbers
  /account/{accountName}/numbers/{phoneNumber}:
    delete:
      operationId: microsoftAzureNumberDelete
      produces:
      - application/json
      parameters:
      - in: path
        name: accountName
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 100
        required: true
        type: string
        description: Name of the account. Can only contain letters, numbers, underscores and dashes, and is case-sensitive. Can be up to 100 characters in length.
      - in: path
        name: phoneNumber
        pattern: ^\+[1-9]\d+$
        minLength: 3
        maxLength: 16
        required: true
        type: string
        description: Phone number in E.164 format.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '204':
          description: No Content
        default:
          description: An error response object.
          headers:
            x-ms-error-code:
              type: string
              description: Error code for specific error that occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Delete a number.:
          $ref: ./examples/DeleteNumber.json
      tags:
      - Number
      description: Removes the specified number from the specified account.
      summary: Microsoft Azure Delete Account Accountname Numbers Phonenumber
    get:
      operationId: microsoftAzureNumberGet
      produces:
      - application/json
      parameters:
      - in: path
        name: accountName
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 100
        required: true
        type: string
        description: Name of the account. Can only contain letters, numbers, underscores and dashes, and is case-sensitive. Can be up to 100 characters in length.
      - in: path
        name: phoneNumber
        pattern: ^\+[1-9]\d+$
        minLength: 3
        maxLength: 16
        required: true
        type: string
        description: Phone number in E.164 format.
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/NumberResponse'
        default:
          description: An error response object.
          headers:
            x-ms-error-code:
              type: string
              description: Error code for specific error that occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Get a number.:
          $ref: ./examples/GetNumber.json
      tags:
      - Number
      description: Gets the details of a number assigned to an account, including the services for which the number is enabled.
      summary: Microsoft Azure Get Account Accountname Numbers Phonenumber
    put:
      operationId: microsoftAzureNumberCreateorreplace
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: accountName
        pattern: ^([A-Za-z0-9_-]+)$
        minLength: 1
        maxLength: 100
        required: true
        type: string
        description: Name of the account. Can only contain letters, numbers, underscores and dashes, and is case-sensitive. Can be up to 100 characters in length.
      - in: path
        name: phoneNumber
        pattern: ^\+[1-9]\d+$
        minLength: 3
        maxLength: 16
        required: true
        type: string
        description: Phone number in E.164 format.
      - $ref: '#/parameters/ApiVersionParameter'
      - in: header
        name: If-Match
        type: string
        description: Makes a request conditional on a matching etag.
      - in: header
        name: If-None-Match
        type: string
        description: Makes a request conditional on a non-matching etag.
      - in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/NumberDetails'
        description: New details of the number to create or replace.
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/NumberResponse'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/NumberResponse'
        default:
          description: An error response object.
          headers:
            x-ms-error-code:
              type: string
              description: Error code for specific error that occurred.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        Put a number.:
          $ref: ./examples/PutNumber.json
      tags:
      - Number
      description: Creates or replaces the specified number in the specified account. In the body of the request, include the service for which this number is enabled. If the service is not specified, Operator Connect service is enabled by default. Optionally, include additional configuration for the number.
      summary: Microsoft Azure Put Account Accountname Numbers Phonenumber
  /accounts/{accountName}/numbers:
    get:
      operationId: microsoftAzureAccountsListnumbers
      tags:
      - Number
      summary: Microsoft Azure Get Numbers
      description: Get a list of Numbers on the specified account.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: accountName
        in: path
        description: Name of the account.
        required: true
        type: string
        minLength: 1
        maxLength: 100
        pattern: ^([A-Za-z0-9_-]+)$
      - $ref: '#/parameters/Azure.Core.TopQueryParameter'
      - $ref: '#/parameters/Azure.Core.SkipQueryParameter'
      - $ref: '#/parameters/Azure.Core.MaxPageSizeQueryParameter'
      - $ref: '#/parameters/FilterQueryParameter'
      - $ref: '#/parameters/RecordCountQueryParameter'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/PagedNumberResource'
          headers:
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
            x-ms-record-count:
              type: integer
              format: int32
              description: The total number of records available for this request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Get list of Numbers on an Account.:
          $ref: ./examples/ListAccountNumbers.json
      x-ms-pageable:
        nextLinkName: nextLink
  /accounts/{accountName}/numbers/{telephoneNumber}:
    get:
      operationId: microsoftAzureAccountsGetnumber
      tags:
      - Number
      summary: Microsoft Azure Get Number
      description: Get details of a specific Number using its telephone number.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: accountName
        in: path
        description: Name of the account.
        required: true
        type: string
        minLength: 1
        maxLength: 100
        pattern: ^([A-Za-z0-9_-]+)$
      - name: telephoneNumber
        in: path
        description: Telephone number in E.164 format.
        required: true
        type: string
        minLength: 1
        maxLength: 16
        pattern: ^\+[1-9]\d+$
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifMatch'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifNoneMatch'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifUnmodifiedSince'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifModifiedSince'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/NumberResource'
          headers:
            ETag:
              type: string
              description: The entity tag for the response.
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/Azure.Core.Foundations.ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
              description: String error code indicating what went wrong.
      x-ms-examples:
        Get a Number from an Account.:
          $ref: ./examples/GetAccountNumber.json
    put:
      operationId: microsoftAzureAccountsCreateorreplacenumber
      tags:
      - Number
      summary: Microsoft Azure Create Or Replace Number
      description: Create or replace the details of a Number.
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: accountName
        in: path
        description: Name of the account.
        required: true
        type: string
        minLength: 1
        maxLength: 100
        pattern: ^([A-Za-z0-9_-]+)$
      - name: telephoneNumber
        in: path
        description: Telephone number in E.164 format.
        required: true
        type: string
        minLength: 1
        maxLength: 16
        pattern: ^\+[1-9]\d+$
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityRequestId'
      - $ref: '#/parameters/Azure.Core.RepeatabilityRequestHeaders.repeatabilityFirstSent'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifMatch'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifNoneMatch'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifUnmodifiedSince'
      - $ref: '#/parameters/Azure.Core.ConditionalRequestHeaders.ifModifiedSince'
      - $ref: '#/parameters/Azure.Core.ClientRequestIdHeader'
      - name: resource
        in: body
        description: The resource instance.
        required: true
        schema:
          $ref: '#/definitions/NumberResource'
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/NumberResource'
          headers:
            ETag:
              type: string
              description: The entity tag for the response.
            Repeatability-Result:
              type: string
              description: Indicates whether the repeatable request was accepted or rejected.
              enum:
              - accepted
              - rejected
              x-ms-enum:
                name: RepeatabilityResult
                modelAsString: false
                values:
                - name: accepted
                  value: accepted
                  description: If the request was accepted and the server guarantees that the server state reflects a single execution of the operation.
                - name: rejected
                  value: rejected
                  description: 'If the request was rejected because the combination of Repeatability-First-Sent and Repeatability-Request-ID were invalid

                    or because the Repeatability-First-Sent value was outside the range of values held by the server.'
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          schema:
            $ref: '#/definitions/NumberResource'
          headers:
            ETag:
              type: string
              description: The entity tag for the response.
            Repeatability-Result:
              type: string
              description: Indicates whether the repeatable request was accepted or rejected.
              enum:
              - accepted
              - rejected
              x-ms-enum:
                name: RepeatabilityResult
                modelAsString: false
                values:
                - name: accepted
                  value: accepted
                  description: If the request was accepted and the server guarantees that the server state reflects a single execution of the operation.
                - name: rejected
                  value: rejected
                  description: 'If the request was rejected because the combination of Repeatability-First-Sent and Repeatability-Request-ID were invalid

                    or because the Repeatability-First-Sent value was outside the range of values held by the server.'
            x-ms-client-request-id:
              type: string
              format: uuid
              description: An opaque, globally-unique, client-generated string identifier for the request.
        default:
          description: An unexpected error response.
          schema:
