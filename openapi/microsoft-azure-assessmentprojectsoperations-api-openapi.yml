definitions:
  ProjectProperties:
    type: object
    description: Properties of a project.
    properties:
      createdTimestamp:
        type: string
        format: date-time
        description: Time when this project was created. Date-Time represented in ISO-8601 format.
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: 'Time when this project was last updated. Date-Time represented in ISO-8601

          format.'
        readOnly: true
      serviceEndpoint:
        type: string
        description: Endpoint at which the collector agent can call agent REST API.
        readOnly: true
      assessmentSolutionId:
        type: string
        description: Assessment solution ARM id tracked by Microsoft.Migrate/migrateProjects.
      projectStatus:
        $ref: '#/definitions/ProjectStatus'
        description: Assessment project status.
      customerWorkspaceId:
        type: string
        description: The ARM id of service map workspace created by customer.
      customerWorkspaceLocation:
        type: string
        description: Location of service map workspace created by customer.
      publicNetworkAccess:
        type: string
        description: 'This value can be set to ''enabled'' to avoid breaking changes on existing

          customer resources and templates. If set to ''disabled'', traffic over public

          interface is not allowed, and private endpoint connections would be the

          exclusive access method.'
      privateEndpointConnections:
        type: array
        description: The list of private endpoint connections to the project.
        items:
          $ref: '#/definitions/PrivateEndpointConnection'
        readOnly: true
      customerStorageAccountArmId:
        type: string
        description: 'The ARM id of the storage account used for interactions when public access is

          disabled.'
    allOf:
    - $ref: '#/definitions/AzureResourceProperties'
  AssessmentProjectUpdate:
    type: object
    description: The type used for update operations of the AssessmentProject.
    properties:
      tags:
        type: object
        description: Resource tags.
        additionalProperties:
          type: string
      properties:
        $ref: '#/definitions/AssessmentProjectUpdateProperties'
        x-ms-client-flatten: true
  AssessmentProjectListResult:
    type: object
    description: The response of a AssessmentProject list operation.
    properties:
      value:
        type: array
        description: The AssessmentProject items on this page
        items:
          $ref: '#/definitions/AssessmentProject'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  AssessmentProjectUpdateProperties:
    type: object
    description: The updatable properties of the AssessmentProject.
    properties:
      assessmentSolutionId:
        type: string
        description: Assessment solution ARM id tracked by Microsoft.Migrate/migrateProjects.
      projectStatus:
        $ref: '#/definitions/ProjectStatus'
        description: Assessment project status.
      customerWorkspaceId:
        type: string
        description: The ARM id of service map workspace created by customer.
      customerWorkspaceLocation:
        type: string
        description: Location of service map workspace created by customer.
      publicNetworkAccess:
        type: string
        description: 'This value can be set to ''enabled'' to avoid breaking changes on existing

          customer resources and templates. If set to ''disabled'', traffic over public

          interface is not allowed, and private endpoint connections would be the

          exclusive access method.'
      customerStorageAccountArmId:
        type: string
        description: 'The ARM id of the storage account used for interactions when public access is

          disabled.'
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  AssessmentProject:
    type: object
    description: An Assessment project site resource.
    properties:
      properties:
        $ref: '#/definitions/ProjectProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/TrackedResource
  AzureResourceProperties:
    type: object
    description: Common properties for all azure tracked and proxy resources.
    properties:
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  PrivateEndpointConnection:
    type: object
    description: Private endpoint connection resource.
    properties:
      properties:
        $ref: ../../../../../../common-types/resource-management/v5/privatelinks.json#/definitions/PrivateEndpointConnectionProperties
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: Resource is being Provisioned.
      - name: Updating
        value: Updating
        description: Resource is being Updated.
      - name: Deleting
        value: Deleting
        description: Resource is being Deleted.
      - name: Accepted
        value: Accepted
        description: Resource is being Accepted.
  ProjectStatus:
    type: string
    description: Project Status.
    enum:
    - Active
    - Inactive
    x-ms-enum:
      name: ProjectStatus
      modelAsString: true
      values:
      - name: Active
        value: Active
        description: Active Status.
      - name: Inactive
        value: Inactive
        description: Inactive Status.
