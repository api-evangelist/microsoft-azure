swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector File API
schemes:
- https
tags:
- name: File
paths:
  /file/{fileId}:validate:
    post:
      tags:
      - File
      summary: Microsoft Azure Validate Input File File Name Must Be A Valid Url Character ^[a Z0 9 ]*$ File Size Can T Be More Than 50 Mb
      operationId: microsoftAzureFileFilevalidate
      consumes:
      - multipart/form-data
      produces:
      - application/json
      parameters:
      - in: path
        name: fileId
        description: Unique identifier for test file, must be a valid URL character ^[a-z0-9_-]*$
        required: true
        type: string
        maxLength: 50
        minLength: 2
        pattern: ^[a-z0-9_-]*$
      - in: query
        name: api-version
        description: Api version
        required: true
        type: string
      - in: formData
        name: file
        description: Input test file
        required: true
        type: file
      responses:
        '200':
          description: 'The file is validated '
          schema:
            $ref: '#/definitions/FileValidateResponse'
        default:
          description: "*** Error Responses: ***\n\n * \"400\", \"InvalidHostOrResourceName\", \"Host name or domain is not valid\"\n\n * \"400\", RequiredFileId - fileId is required\n\n  * \"400\", \"InvalidFileId\", \"fileId field is not valid\"   \n\n * \"500\", \"InternalServerError\", \"Unable to process the request, please retry\""
          schema:
            $ref: '#/definitions/DefaultErrorResponseBody'
          headers:
            x-ms-error-code:
              description: The error code for specific error that occurred.
              type: string
      x-ms-examples:
        File_FileValidate_MaximumSet_Gen:
          $ref: ./examples/File_FileValidate_MaximumSet_Gen.json
      description: Needs a more full description created.
definitions:
  FileValidateResponse:
    description: File validation response
    type: object
    properties:
      valid:
        description: File is valid or not
        type: boolean
      error:
        description: In case file is not valid then error message
        type: string
  DefaultErrorResponseBody:
    description: The definition of an error object.
    type: object
    properties:
      error:
        $ref: '#/definitions/ErrorResponseBody'
  ErrorResponseBody:
    description: The error response object.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      message:
        description: The error message.
        type: string
      target:
        description: The error target.
        type: string
      details:
        description: Additional details and inner errors.
        type: array
        items:
          $ref: '#/definitions/ErrorResponseBody'
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
