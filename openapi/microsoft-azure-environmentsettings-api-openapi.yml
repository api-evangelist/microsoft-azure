definitions:
  VmStateDetails:
    description: Details about the state of the reference virtual machine.
    type: object
    properties:
      rdpAuthority:
        description: The RdpAuthority property is a server DNS host name or IP address followed by the service port number for RDP (Remote Desktop Protocol).
        type: string
        readOnly: true
      sshAuthority:
        description: The SshAuthority property is a server DNS host name or IP address followed by the service port number for SSH.
        type: string
        readOnly: true
      powerState:
        description: The power state of the reference virtual machine.
        type: string
        readOnly: true
      lastKnownPowerState:
        description: Last known compute power state captured in DTL
        type: string
        readOnly: true
  ReferenceVm:
    description: Details of a Reference Vm
    required:
    - userName
    type: object
    properties:
      userName:
        description: The username of the virtual machine
        type: string
      password:
        description: The password of the virtual machine. This will be set to null in GET resource API
        type: string
      vmStateDetails:
        $ref: '#/definitions/VmStateDetails'
        description: The state details for the reference virtual machine.
        readOnly: true
      vmResourceId:
        description: VM resource Id for the environment
        type: string
        readOnly: true
  Resource:
    description: An Azure resource.
    type: object
    properties:
      id:
        description: The identifier of the resource.
        type: string
        readOnly: true
      name:
        description: The name of the resource.
        type: string
        readOnly: true
      type:
        description: The type of the resource.
        type: string
        readOnly: true
      location:
        description: The location of the resource.
        type: string
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
    x-ms-azure-resource: true
  ResponseWithContinuation[EnvironmentSetting]:
    description: The response of a list operation.
    type: object
    properties:
      value:
        description: Results of the list operation.
        type: array
        items:
          $ref: '#/definitions/EnvironmentSetting'
      nextLink:
        description: Link for next set of results.
        type: string
  LatestOperationResult:
    description: Details of the status of an operation.
    type: object
    properties:
      status:
        description: The current status of the operation.
        type: string
        readOnly: true
      errorCode:
        description: Error code on failure.
        type: string
        readOnly: true
      errorMessage:
        description: The error message.
        type: string
        readOnly: true
      requestUri:
        description: Request URI of the operation.
        type: string
        readOnly: true
      httpMethod:
        description: The HttpMethod - PUT/POST/DELETE for the operation.
        type: string
        readOnly: true
      operationUrl:
        description: The URL to use to check long-running operation status
        type: string
        readOnly: true
  ResourceSettings:
    description: Represents resource specific settings
    required:
    - referenceVm
    type: object
    properties:
      id:
        description: The unique id of the resource setting
        type: string
        readOnly: true
      galleryImageResourceId:
        description: The resource id of the gallery image used for creating the virtual machine
        type: string
      imageName:
        description: The name of the image used to created the environment setting
        type: string
        readOnly: true
      size:
        description: The size of the virtual machine
        enum:
        - Basic
        - Standard
        - Performance
        type: string
        x-ms-enum:
          name: ManagedLabVmSize
          modelAsString: true
          values:
          - value: Basic
            description: The base VM size
          - value: Standard
            description: The standard or default VM size
          - value: Performance
            description: The most performant VM size
      cores:
        format: int32
        description: The translated compute cores of the virtual machine
        type: integer
        readOnly: true
      referenceVm:
        $ref: '#/definitions/ReferenceVm'
        description: Details specific to Reference Vm
  CloudError:
