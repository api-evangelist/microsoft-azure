    - next
    additionalProperties: {}
  CloudError:
    x-ms-external: true
    properties:
      error:
        description: Details of the error from the Pipelines Resource Provider.
        $ref: '#/definitions/CloudErrorBody'
    description: An error response from the Pipelines Resource Provider.
  ProvisioningState:
    type: string
    description: The provisioning status of the resource.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: The resource is being created.
      - name: Updating
        value: Updating
        description: The resource is being updated.
      - name: Deleting
        value: Deleting
        description: The resource is being deleted.
      - name: Accepted
        value: Accepted
        description: The resource was accepted by the server.
  PipelineProperties:
    type: object
    description: Custom properties of a Pipeline.
    discriminator: pipelineType
    properties:
      pipelineId:
        type: integer
        readOnly: true
        description: Unique identifier of the Pipeline
      pipelineType:
        type: string
        enum:
        - githubWorkflow
        - azurePipeline
        x-ms-enum:
          name: pipelineTypeEnum
          modelAsString: true
        description: Specifies which CI/CD provider to use. Valid options are 'azurePipeline', 'githubWorkflow'.
      bootstrapConfiguration:
        $ref: '#/definitions/BootstrapConfiguration'
        description: Configuration used to bootstrap the Pipeline.
    required:
    - pipelineType
    - bootstrapConfiguration
  CodeRepository:
    type: object
    description: Repository containing the source code for a pipeline.
    properties:
      repositoryType:
        description: Type of code repository.
        type: string
        enum:
        - gitHub
        - vstsGit
        x-ms-enum:
          name: CodeRepositoryType
          modelAsString: true
      id:
        description: Unique immutable identifier of the code repository.
        type: string
      defaultBranch:
        description: Default branch used to configure Continuous Integration (CI) in the pipeline.
        type: string
      authorization:
