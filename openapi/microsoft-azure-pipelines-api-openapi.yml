definitions:
  BootstrapConfiguration:
    type: object
    description: Configuration used to bootstrap a Pipeline.
    properties:
      sourceRepository:
        $ref: '#/definitions/CodeRepository'
        description: Repository containing the source code for the pipeline. Currently only 'azurePipeline' pipeline type supports this.
      template:
        $ref: '#/definitions/PipelineTemplate'
        description: Template used to bootstrap the pipeline.
    required:
    - template
  CloudErrorBody:
    x-ms-external: true
    properties:
      code:
        type: string
        description: An identifier for the error. Codes are invariant and are intended to be consumed programmatically.
      message:
        type: string
        description: A message describing the error, intended to be suitable for display in a user interface.
      target:
        type: string
        description: The target of the particular error. For example, the name of the property in error or the method where the error occurred.
      details:
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
        description: A list of additional details about the error.
    description: An error response from the Pipelines Resource Provider.
  ExtendedLocation:
    type: object
    description: Extended location is an extension of Azure locations. They provide a way to use their Azure ARC enabled Kubernetes clusters as target locations for deploying Azure services instances.
    properties:
      name:
        type: string
        description: The name of the extended location.
      type:
        type: string
        description: The type of the extended location.
    required:
    - name
    - type
  Authorization:
    description: Authorization info used to access a resource (like code repository).
    type: object
    properties:
      authorizationType:
        description: Type of authorization.
        type: string
        enum:
        - personalAccessToken
        x-ms-enum:
          name: AuthorizationType
          modelAsString: true
      parameters:
        description: Authorization parameters corresponding to the authorization type.
        type: object
        additionalProperties:
          type: string
    required:
    - authorizationType
  PipelineListResult_2:
    type: object
    description: The response of a Pipeline list operation.
    properties:
      value:
        type: array
        description: The Pipeline items on this page
        items:
          $ref: '#/definitions/Pipeline_2'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
  PipelineTemplate:
    type: object
    description: Template used to bootstrap the pipeline.
    properties:
      id:
        type: string
        description: Unique identifier of the pipeline template.
      parameters:
        type: object
        description: Dictionary of input parameters used in the pipeline template.
        additionalProperties:
          type: string
    required:
    - id
  PipelineUpdateParameters:
    type: object
    description: Request payload used to update an existing Azure Pipeline.
    properties:
      tags:
        type: object
        description: Dictionary of key-value pairs to be set as tags on the Azure Pipeline. This will overwrite any existing tags.
        additionalProperties:
          type: string
  Resource:
    type: object
    description: An Azure Resource Manager (ARM) resource.
    properties:
      id:
        type: string
        readOnly: true
        description: Resource Id
      type:
        type: string
        readOnly: true
        description: Resource Type
      tags:
        type: object
        additionalProperties:
          type: string
        description: Resource Tags
      location:
        type: string
        description: Resource Location
      name:
        type: string
        readOnly: true
        description: Resource Name
    x-ms-azure-resource: true
  PipelineTagsUpdate:
    type: object
    description: The type used for updating tags in Pipeline resources.
    properties:
      tags:
        type: object
        description: Resource tags.
        additionalProperties:
          type: string
  PipelineProperties_2:
    type: object
    description: The properties of a Pipeline resource.
    properties:
      description:
        type: string
        description: Detailed description of the Pipeline.
      enabled:
        type: boolean
        description: Flag indicating whether the pipeline should be running or not.
      input:
        $ref: '#/definitions/PipelineInput'
        description: Information about where to pull input data from.
      stages:
        type: object
        description: Map of stage ids to stage configurations for all pipeline processing and output stages.
        additionalProperties:
