        - Succeeded
        - Unknown
        - Updating
        readOnly: true
        type: string
        x-ms-enum:
          modelAsString: true
          name: ProvisioningState
      resourceMoveState:
        description: Resource move state for backup vault
        enum:
        - Unknown
        - InProgress
        - PrepareFailed
        - CommitFailed
        - Failed
        - PrepareTimedout
        - CommitTimedout
        - CriticalFailure
        - PartialSuccess
        - MoveSucceeded
