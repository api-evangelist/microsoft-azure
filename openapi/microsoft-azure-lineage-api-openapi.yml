swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Lineage API
schemes:
- https
tags:
- name: Lineage
paths:
  /lineage/{guid}/next:
    get:
      operationId: microsoftAzureLineageGetnextpage
      description: Return immediate next page lineage info about entity with pagination
      parameters:
      - $ref: '#/parameters/Azure.Core.Foundations.ApiVersionParameter'
      - name: guid
        in: path
        description: The globally unique identifier of the entity.
        required: true
        type: string
      - name: direction
        in: query
        description: The direction of the lineage, which could be INPUT, OUTPUT or BOTH.
        required: true
        type: string
        enum:
        - INPUT
        - OUTPUT
        - BOTH
        x-ms-enum:
          name: LineageDirection
          modelAsString: true
          values:
          - name: Input
            value: INPUT
            description: input
          - name: Output
            value: OUTPUT
            description: output
          - name: Both
            value: BOTH
            description: both
      - name: offset
        in: query
        description: The offset for pagination purpose.
        required: false
        type: integer
        format: int32
      - name: limit
        in: query
        description: The page size - by default there is no paging.
        required: false
        type: integer
        format: int32
      responses:
        '200':
          description: The request has succeeded.
          schema:
            $ref: '#/definitions/AtlasLineageInfo'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/AtlasErrorResponse'
      x-ms-examples:
        Lineage_GetNextPage:
          $ref: ./examples/Lineage_GetNextPage.json
      summary: Microsoft Azure Get Lineage Guid Next
      tags:
      - Lineage
  /atlas/v2/lineage/{guid}:
    get:
      tags:
      - Lineage
      description: Get lineage info of the entity specified by GUID.
      operationId: microsoftAzureLineageGetlineagegraph
      x-ms-examples:
        Lineage_GetLineageGraph:
          $ref: ./examples/Lineage_GetLineageGraph.json
      parameters:
      - $ref: '#/parameters/guid'
      - $ref: '#/parameters/depth'
      - $ref: '#/parameters/width'
      - $ref: '#/parameters/direction'
      - $ref: '#/parameters/includeParent'
      - $ref: '#/parameters/getDerivedLineage'
      responses:
        '200':
          description: OK. If the request is valid.
          schema:
            $ref: '#/definitions/AtlasLineageInfo_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Atlas Lineage Guid
  /lineage/{guid}/next/:
    get:
      tags:
      - Lineage
      description: Return immediate next page lineage info about entity with pagination
      operationId: microsoftAzureLineageNextpagelineage
      x-ms-examples:
