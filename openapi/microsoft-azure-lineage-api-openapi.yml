      parameters:
      - $ref: '#/parameters/guid'
      - $ref: '#/parameters/direction'
      - $ref: '#/parameters/getDerivedLineage'
      - $ref: '#/parameters/offset'
      - $ref: '#/parameters/limit'
      - $ref: '#/parameters/purviewAPIVersion'
      responses:
        '200':
          description: OK. If the input is valid.
          schema:
            $ref: '#/definitions/AtlasLineageInfo_2'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Microsoft Azure Get Lineage Guid Next
  /atlas/v2/lineage/uniqueAttribute/type/{typeName}:
    get:
      tags:
      - Lineage
      description: 'Returns lineage info about entity.<br><br>In addition to the typeName path parameter, attribute key-value pair(s) can be provided in the following format<br><br>attr:[attrName]=[attrValue]<br><br>NOTE: The attrName and attrValue should be unique across entities, eg. qualifiedName.<br>The REST request would look something like this:<br>GET /v2/lineage/uniqueAttribute/type/aType?attr:aTypeAttribute=someValue.'
      operationId: microsoftAzureLineageGetlineagebyuniqueattribute
      x-ms-examples:
        Lineage_GetLineageByUniqueAttribute:
          $ref: ./examples/Lineage_GetLineageByUniqueAttribute.json
      produces:
