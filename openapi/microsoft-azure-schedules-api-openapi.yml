definitions:
  ScheduleProperties:
    description: The Schedule properties defining when and what to execute.
    type: object
    allOf:
    - $ref: '#/definitions/ScheduleUpdateProperties'
    properties:
      provisioningState:
        description: The provisioning state of the resource.
        $ref: commonDefinitions.json#/definitions/ProvisioningState
        readOnly: true
    required:
    - type
    - frequency
    - timeZone
    - time
  WeekDetails:
    description: Properties of a weekly schedule.
    type: object
    properties:
      weekdays:
        description: The days of the week for which the schedule is set (e.g. Sunday, Monday, Tuesday, etc.).
        type: array
        items:
          type: string
      time:
        description: The time of the day the schedule will occur.
        type: string
  NotificationSettings:
    description: Notification settings for a schedule.
    type: object
    properties:
      status:
        description: If notifications are enabled for this schedule (i.e. Enabled, Disabled).
        default: Disabled
        enum:
        - Enabled
        - Disabled
        type: string
        x-ms-enum:
          name: EnableStatus
          modelAsString: true
      timeInMinutes:
        format: int32
        description: Time in minutes before event at which notification will be sent.
        type: integer
      webhookUrl:
        description: The webhook URL to which the notification will be sent.
        type: string
      emailRecipient:
        description: The email recipient to send notifications to (can be a list of semi-colon separated email addresses).
        type: string
      notificationLocale:
        description: The locale to use when sending a notification (fallback for unsupported languages is EN).
        type: string
  ScheduleProperties_2:
    description: Properties of a schedule.
    type: object
    properties:
      status:
        description: The status of the schedule (i.e. Enabled, Disabled)
        default: Disabled
        enum:
        - Enabled
        - Disabled
        type: string
        x-ms-enum:
          name: EnableStatus
          modelAsString: true
      taskType:
        description: The task type of the schedule (e.g. LabVmsShutdownTask, LabVmAutoStart).
        type: string
      weeklyRecurrence:
        $ref: '#/definitions/WeekDetails'
        description: If the schedule will occur only some days of the week, specify the weekly recurrence.
      dailyRecurrence:
        $ref: '#/definitions/DayDetails'
        description: If the schedule will occur once each day of the week, specify the daily recurrence.
      hourlyRecurrence:
        $ref: '#/definitions/HourDetails'
        description: If the schedule will occur multiple times a day, specify the hourly recurrence.
      timeZoneId:
        description: The time zone ID (e.g. China Standard Time, Greenland Standard Time, Pacific Standard time, etc.). The possible values for this property can be found in `IReadOnlyCollection<string> TimeZoneConverter.TZConvert.KnownWindowsTimeZoneIds` (https://github.com/mattjohnsonpint/TimeZoneConverter/blob/main/README.md)
        type: string
      notificationSettings:
        $ref: '#/definitions/NotificationSettings'
        description: Notification settings.
      createdDate:
        format: date-time
        description: The creation date of the schedule.
        type: string
        readOnly: true
      targetResourceId:
        description: The resource ID to which the schedule belongs
        type: string
      provisioningState:
        description: The provisioning status of the resource.
        type: string
        readOnly: true
      uniqueIdentifier:
        description: The unique immutable identifier of a resource (Guid).
        type: string
        readOnly: true
  CloudErrorBody:
    description: Body of an error from a REST request.
    type: object
    properties:
      code:
        description: The error code.
        type: string
      message:
        description: The error message.
        type: string
      target:
        description: The error target.
        type: string
      details:
        description: Inner errors.
        type: array
        items:
          $ref: '#/definitions/CloudErrorBody'
    x-ms-external: true
  DayDetails:
    description: Properties of a daily schedule.
    type: object
    properties:
      time:
        description: The time of day the schedule will occur.
        type: string
  HourDetails:
    description: Properties of an hourly schedule.
    type: object
    properties:
      minute:
        format: int32
        description: Minutes of the hour the schedule will run.
        type: integer
  Schedule_2:
    description: A schedule.
    required:
    - properties
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        $ref: '#/definitions/ScheduleProperties_2'
        description: The properties of the resource.
        x-ms-client-flatten: true
  Resource:
    description: An Azure resource.
    type: object
    properties:
      id:
        description: The identifier of the resource.
        type: string
        readOnly: true
      name:
        description: The name of the resource.
        type: string
        readOnly: true
      type:
        description: The type of the resource.
        type: string
        readOnly: true
      location:
        description: The location of the resource.
        type: string
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
    x-ms-azure-resource: true
  ScheduleListResult:
    description: Result of the schedule list operation.
    type: object
    properties:
      value:
        description: Current page of results.
        type: array
        items:
          $ref: '#/definitions/Schedule'
        readOnly: true
      nextLink:
        description: URL to get the next set of results if there are any.
        type: string
        readOnly: true
  ScheduledType:
    description: The supported types for a scheduled task.
    enum:
    - StopDevBox
    type: string
    x-ms-enum:
      name: ScheduledType
      modelAsString: true
  ScheduleUpdateProperties:
    description: Updatable properties of a Schedule.
    type: object
    properties:
      type:
        description: Supported type this scheduled task represents.
        $ref: '#/definitions/ScheduledType'
      frequency:
        description: The frequency of this scheduled task.
        $ref: '#/definitions/ScheduledFrequency'
      time:
        description: The target time to trigger the action. The format is HH:MM.
        type: string
      timeZone:
        description: The IANA timezone id at which the schedule should execute.
        type: string
      state:
        description: Indicates whether or not this scheduled task is enabled.
        $ref: devcenter.json#/definitions/EnableStatus
  ScheduledFrequency:
    description: The frequency of task execution.
    enum:
    - Daily
    type: string
    x-ms-enum:
      name: ScheduledFrequency
      modelAsString: true
  ScheduleFragment:
    description: A schedule.
    type: object
    allOf:
    - $ref: '#/definitions/UpdateResource'
    properties: {}
  CloudError:
    description: Error from a REST request.
    type: object
    properties:
      error:
        $ref: '#/definitions/CloudErrorBody'
        description: The cloud error that occurred
    x-ms-external: true
  ScheduleList:
    description: The response of a list operation.
    type: object
    properties:
      value:
        description: Results of the list operation.
        type: array
        items:
          $ref: '#/definitions/Schedule_2'
      nextLink:
        description: Link for next set of results.
        type: string
  ScheduleUpdate:
    description: The schedule properties for partial update. Properties not provided in the update request will not be changed.
    type: object
    allOf:
    - $ref: commonDefinitions.json#/definitions/TrackedResourceUpdate
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ScheduleUpdateProperties'
        description: Properties of a schedule resource to be updated.
  UpdateResource:
    description: Represents an update resource
    type: object
    properties:
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
  Schedule:
    type: object
    description: Represents a Schedule to execute a task.
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/Resource
    properties:
      properties:
        description: Properties of a Schedule resource
        x-ms-client-flatten: true
        $ref: '#/definitions/ScheduleProperties'
