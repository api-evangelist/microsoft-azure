        Get security user configurations:
          $ref: ./examples/NetworkManagerSecurityUserConfigurationGet.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Network Networkmanagers Networkmanagername Securityuserconfigurations Configurationname
