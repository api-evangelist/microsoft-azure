swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector ConfigurationProfiles API
schemes:
- https
tags:
- name: ConfigurationProfiles
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Automanage/configurationProfiles/{configurationProfileName}
  : put:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesCreateorupdate
      description: Creates a configuration profile
      x-ms-examples:
        Create or update configuration profile:
          $ref: ./examples/createOrUpdateConfigurationProfile.json
      parameters:
      - name: configurationProfileName
        in: path
        required: true
        type: string
        description: Name of the configuration profile.
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/ConfigurationProfile'
        description: Parameters supplied to create or update configuration profile.
      responses:
        '200':
          description: OK. The configuration profile was updated successfully.
          schema:
            $ref: '#/definitions/ConfigurationProfile'
        '201':
          description: Created. The configuration profile was created successfully.
          schema:
            $ref: '#/definitions/ConfigurationProfile'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: false
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Automanage Configurationprofiles Configurationprofilename
    get:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesGet
      description: Get information about a configuration profile
      x-ms-examples:
        Get a configuration profile:
          $ref: ./examples/getConfigurationProfile.json
      parameters:
      - name: configurationProfileName
        in: path
        required: true
        type: string
        description: The configuration profile name.
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK. The configuration profile was returned successfully.
          schema:
            $ref: '#/definitions/ConfigurationProfile'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Automanage Configurationprofiles Configurationprofilename
    delete:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesDelete
      description: Delete a configuration profile
      x-ms-examples:
        Delete a configuration profile:
          $ref: ./examples/deleteConfigurationProfile.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - name: configurationProfileName
        in: path
        required: true
        type: string
        description: Name of the configuration profile
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK
        '204':
          description: OK
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: false
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Automanage Configurationprofiles Configurationprofilename
    patch:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesUpdate
      description: Updates a configuration profile
      x-ms-examples:
        Update configuration profile:
          $ref: ./examples/updateConfigurationProfile.json
      parameters:
      - name: configurationProfileName
        in: path
        required: true
        type: string
        description: Name of the configuration profile.
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/ConfigurationProfileUpdate'
        description: Parameters supplied to update configuration profile.
      responses:
        '200':
          description: OK. The configuration profile was updated successfully.
          schema:
            $ref: '#/definitions/ConfigurationProfile'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-long-running-operation: false
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Patch Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Automanage Configurationprofiles Configurationprofilename
  /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Automanage/configurationProfiles:
    get:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesListbyresourcegroup
      description: Retrieve a list of configuration profile within a given resource group
      x-ms-examples:
        List configuration profiles by resource group:
          $ref: ./examples/listConfigurationProfilesByResourceGroup.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ResourceGroupNameParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK. List of configuration profiles.
          schema:
            $ref: '#/definitions/ConfigurationProfileList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: null
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Automanage Configurationprofiles
  /subscriptions/{subscriptionId}/providers/Microsoft.Automanage/configurationProfiles:
    get:
      tags:
      - ConfigurationProfiles
      operationId: microsoftAzureConfigurationprofilesListbysubscription
      description: Retrieve a list of configuration profile within a subscription
      x-ms-examples:
        List configuration profiles by subscription:
          $ref: ./examples/listConfigurationProfilesBySubscription.json
      parameters:
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/SubscriptionIdParameter
      - $ref: ../../../../../common-types/resource-management/v2/types.json#/parameters/ApiVersionParameter
      responses:
        '200':
          description: OK. List of configuration profiles.
          schema:
            $ref: '#/definitions/ConfigurationProfileList'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/ErrorResponse
      x-ms-pageable:
        nextLinkName: null
      produces:
      - application/json
      consumes:
      - application/json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Providers Microsoft Automanage Configurationprofiles
definitions:
  Overrides:
    description: The custom overrides for configuration profile
    type: array
    items:
      type: object
    x-ms-identifiers: []
  ConfigurationProfile:
    description: Definition of the configuration profile.
    type: object
    properties:
      properties:
        x-ms-client-flatten: false
        $ref: '#/definitions/ConfigurationProfileProperties'
        description: Properties of the configuration profile.
      systemData:
        $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/systemData
        readOnly: true
        description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
    allOf:
    - $ref: ../../../../../common-types/resource-management/v2/types.json#/definitions/TrackedResource
  ConfigurationProfileUpdate:
    description: Definition of the configuration profile.
    type: object
    properties:
      properties:
        x-ms-client-flatten: false
        $ref: '#/definitions/ConfigurationProfileProperties'
        description: Properties of the configuration profile.
    allOf:
    - $ref: '#/definitions/UpdateResource'
  UpdateResource:
    description: Represents an update resource
    type: object
    properties:
      tags:
        description: The tags of the resource.
        type: object
        additionalProperties:
          type: string
  ConfigurationDictionary:
    description: The custom configuration for configuration profile. Name and value pairs that define the configuration details of the configuration profile.
    type: object
    example:
      Antimalware/Enable: true
  ConfigurationProfileProperties:
    description: Automanage configuration profile properties.
    type: object
    properties:
      configuration:
        title: configuration
        $ref: '#/definitions/ConfigurationDictionary'
        description: configuration dictionary of the configuration profile.
      overrides:
        title: overrides
        $ref: '#/definitions/Overrides'
        description: overrides of the configuration profile.
  ConfigurationProfileList:
    description: The response of the list configuration profile operation.
    type: object
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/ConfigurationProfile'
        description: Result of the list ConfigurationProfile operation.
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
