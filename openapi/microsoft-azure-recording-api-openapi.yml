swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Recording API
schemes:
- https
tags:
- name: Recording
paths:
  /calling/serverCalls/{serverCallId}/recordings:
    post:
      tags:
      - Recording
      summary: Microsoft Azure Start Recording Of The Call
      operationId: microsoftAzureServercallsStartrecording
      parameters:
      - name: serverCallId
        in: path
        description: The server call id.
        required: true
        type: string
      - name: request
        in: body
        description: The request body of start call recording request.
        required: true
        schema:
          $ref: '#/definitions/StartCallRecordingRequest'
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Returns the start call recording response.
          schema:
            $ref: '#/definitions/StartCallRecordingResult'
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      x-ms-examples:
        Start recording of the call.:
          $ref: ./examples/ServerCalls_StartRecording.json
      description: Needs a more full description created.
  /calling/serverCalls/{serverCallId}/recordings/{recordingId}:
    get:
      tags:
      - Recording
      summary: Microsoft Azure Get Call Recording Properties
      operationId: microsoftAzureServercallsGetrecordingproperties
      parameters:
      - name: serverCallId
        in: path
        description: The server call id.
        required: true
        type: string
      - name: recordingId
        in: path
        description: The recording id.
        required: true
        type: string
      - $ref: '#/parameters/ApiVersionParameter'
      responses:
        '200':
          description: Returns the recording state.
          schema:
            $ref: '#/definitions/CallRecordingProperties'
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      x-ms-examples:
        Get call recording properties.:
          $ref: ./examples/ServerCalls_GetRecordingProperties.json
      description: Needs a more full description created.
    delete:
      tags:
      - Recording
      summary: Microsoft Azure Stop Recording The Call
      operationId: microsoftAzureServercallsStoprecording
      parameters:
      - name: serverCallId
        in: path
        description: The server call id.
        required: true
        type: string
      - name: recordingId
        in: path
        description: The recording id.
        required: true
