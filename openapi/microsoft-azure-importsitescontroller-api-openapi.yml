definitions:
  ImportSiteProperties:
    type: object
    description: The properties of ImportSiteResource
    properties:
      discoverySolutionId:
        type: string
        description: Gets or sets the ARM ID of migration hub solution for SDS.
      masterSiteId:
        type: string
        description: Gets the Master Site this site is linked to.
        readOnly: true
      serviceEndpoint:
        type: string
        description: Gets the service endpoint.
        readOnly: true
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  ImportSiteUpdate:
    type: object
    description: The type used for update operations of the ImportSite.
    properties:
      tags:
        type: object
        description: Resource tags.
        additionalProperties:
          type: string
      properties:
        $ref: '#/definitions/ImportSiteUpdateProperties'
        x-ms-client-flatten: true
  SasUriResponse:
    type: object
    description: Import URI response class.
    properties:
      jobArmId:
        type: string
        description: Gets or sets the job ARM ID.
      uri:
        type: string
        description: Gets or sets the SAS URI.
      importType:
        $ref: '#/definitions/ImportTypeValues'
        description: Gets or sets the import type.
        default: AzureMigrateCSV
  ImportSite:
    type: object
    description: A ImportSite
    properties:
      properties:
        $ref: '#/definitions/ImportSiteProperties'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../common-types/resource-management/v3/types.json#/definitions/TrackedResource
  ImportSiteUpdateProperties:
    type: object
    description: The updatable properties of the ImportSite.
    properties:
      discoverySolutionId:
        type: string
        description: Gets or sets the ARM ID of migration hub solution for SDS.
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Created
    - Updated
    - Running
    - Completed
    - Failed
    - Succeeded
    - Canceled
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Created
        value: Created
        description: Created value.
      - name: Updated
        value: Updated
        description: Updated value.
      - name: Running
        value: Running
        description: Running value.
      - name: Completed
        value: Completed
        description: Completed value.
      - name: Failed
        value: Failed
        description: Failed value.
      - name: Succeeded
        value: Succeeded
        description: Succeeded value.
      - name: Canceled
        value: Canceled
        description: Canceled value.
  ImportTypeValues:
    type: string
    description: ImportTypeValues enum.
    enum:
    - AzureMigrateCSV
    - RVToolsXlsx
    x-ms-enum:
      name: ImportTypeValues
      modelAsString: true
      values:
      - name: AzureMigrateCSV
        value: AzureMigrateCSV
        description: AzureMigrateCSV value.
      - name: RVToolsXlsx
        value: RVToolsXlsx
        description: RVToolsXlsx value.
  ImportSiteListResult:
    type: object
    description: The response of a ImportSite list operation.
    properties:
      value:
        type: array
        description: The ImportSite items on this page
        items:
          $ref: '#/definitions/ImportSite'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
