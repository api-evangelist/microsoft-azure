definitions:
  ErrorResponse:
    description: An error response from the Azure AgPlatform service. See https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#7102-error-condition-responses for ErrorResponse reference document.
    type: object
    properties:
      error:
        $ref: '#/definitions/Error'
      traceId:
        description: Unique trace Id.
        type: string
  Reference:
    description: Reference to a dataset record.
    type: object
    properties:
      datasetId:
        description: Dataset id.
        maxLength: 100
        minLength: 0
        type: string
      recordId:
        description: Record id.
        maxLength: 100
        minLength: 0
        type: string
  Company:
    description: Company/Manufacturer's details.
    type: object
    properties:
      name:
        description: Name of the manufacturing company.
        type: string
      description:
        description: Manufacturing Company description.
        type: string
      registrationNumber:
        description: Registration number of the company.
        type: string
  ChemicalProductListResponse:
    description: Paged response contains list of requested objects and a skipToken to get the next set of results.
    required:
    - value
    type: object
    properties:
      value:
        description: List of requested objects.
        type: array
        items:
          $ref: '#/definitions/ChemicalProduct'
      skipToken:
        description: Token used in retrieving the next page. If null, there are no additional pages.
        type: string
      nextLink:
        description: Continuation link (absolute URI) to the next page of results in the list.
        type: string
  InnerError:
    description: Inner error containing list of errors.See https://github.com/Microsoft/api-guidelines/blob/vNext/Guidelines.md#innererror--object for InnerError reference document.
    type: object
    properties:
      code:
        description: Specific error code than was provided by the containing error.
        type: string
      innererror:
        $ref: '#/definitions/InnerError'
  ChemicalProduct:
    description: Schema of ChemicalProduct resource.
    type: object
    properties:
      cropIds:
        description: "The Ids of the crops associated with the Chemical product.\r\nNote: A maximum of 25 crops can be associated with a cropProduct."
        uniqueItems: true
        type: array
        items:
          type: string
      reference:
        $ref: '#/definitions/Reference'
      brand:
        description: Commercial brand of the chemical product.
        type: string
      product:
        description: Commercial product name of the chemical product.
        type: string
      type:
        description: Herbicide, Additive, Insecticides, Fertilizers.
        type: string
      state:
        description: Liquid/non Liquid.
        type: string
      activeIngredients:
        description: Active chemicals in the formulation.
        type: array
        items:
          type: string
      specificGravity:
        description: Specific gravity details.
        type: string
      formulation:
        description: "Formulation description. Percentage or other unit of N, P, K, CA, MG, S, FE, MN, ZN, CU, B, MO, CL\r\n(based on the source, the available chemical elements can vary, but this is a typical list)."
        type: string
      company:
        $ref: '#/definitions/Company'
      location:
        description: Area where the chemical is used. This is important from a compliance perspective.
        type: string
      registrationNumber:
        description: Registration number of the chemical. This could vary by geography.
        type: string
      reEntryInterval:
        format: int32
        description: The number of days after which a person can visit the field after the chemical product is applied.
        type: integer
      id:
        description: Unique resource ID.
        type: string
        readOnly: true
      eTag:
        description: The ETag value to implement optimistic concurrency.
        type: string
        readOnly: true
      status:
        description: Status of the resource.
        maxLength: 100
        minLength: 0
        type: string
      createdDateTime:
        format: date-time
        description: 'Date-time when resource was created, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      modifiedDateTime:
        format: date-time
        description: 'Date-time when resource was last modified, sample format: yyyy-MM-ddTHH:mm:ssZ.'
        type: string
        readOnly: true
        example: '2020-12-31T11:10:21Z'
      source:
        description: Source of the resource.
        maxLength: 100
        minLength: 2
        type: string
      name:
        description: Name to identify resource.
        maxLength: 100
        minLength: 0
        type: string
      description:
        description: Textual description of the resource.
        maxLength: 500
        minLength: 0
        type: string
      createdBy:
        description: Created by user/tenant id.
        type: string
        readOnly: true
      modifiedBy:
        description: Modified by user/tenant id.
        type: string
        readOnly: true
      properties:
        description: "A collection of key value pairs that belongs to the resource.\r\nEach pair must not have a key greater than 50 characters\r\nand must not have a value greater than 150 characters.\r\nNote: A maximum of 25 key value pairs can be provided for a resource and only string,\r\nnumeral and datetime (yyyy-MM-ddTHH:mm:ssZ) values are supported."
        type: object
        additionalProperties: {}
        example:
          key1: value1
          key2: 123.45
  Error:
    description: An error from the Azure AgPlatform service.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: Server-defined set of error codes.
        minLength: 1
        type: string
      message:
        description: Human-readable representation of the error.
        minLength: 1
        type: string
      target:
        description: Target of the error.
        type: string
      details:
        description: Array of details about specific errors that led to this reported error.
        type: array
        items:
          $ref: '#/definitions/Error'
      innererror:
        $ref: '#/definitions/InnerError'
