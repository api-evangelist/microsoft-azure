swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector GalleryImageVersions API
schemes:
- https
tags:
- name: GalleryImageVersions
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/images/{galleryImageName}/versions/{galleryImageVersionName}
  : put:
      tags:
      - GalleryImageVersions
      operationId: microsoftAzureGalleryimageversionsCreateorupdate
      description: Create or update a gallery image version.
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - name: galleryName
        in: path
        required: true
        type: string
        description: The name of the Shared Image Gallery in which the Image Definition resides.
      - name: galleryImageName
        in: path
        required: true
        type: string
        description: The name of the gallery image definition in which the Image Version is to be created.
      - name: galleryImageVersionName
        in: path
        required: true
        type: string
        description: 'The name of the gallery image version to be created. Needs to follow semantic version name pattern: The allowed characters are digit and period. Digits must be within the range of a 32-bit integer. Format: <MajorVersion>.<MinorVersion>.<Patch>'
      - $ref: '#/parameters/ApiVersionParameter'
      - name: galleryImageVersion
        in: body
        required: true
        schema:
          $ref: '#/definitions/GalleryImageVersion'
        description: Parameters supplied to the create or update gallery image version operation.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/GalleryImageVersion'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/GalleryImageVersion'
        '202':
          description: Accepted
          schema:
            $ref: '#/definitions/GalleryImageVersion'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/CloudError'
      x-ms-long-running-operation: true
      x-ms-examples:
        Create or update a simple Gallery Image Version (Managed Image as source).:
          $ref: ./examples/CreateOrUpdateASimpleGalleryImageVersion.json
        Create or update a simple Gallery Image Version using snapshots as a source.:
          $ref: ./examples/CreateOrUpdateASimpleGalleryImageVersionWithSnapshotsAsSource.json
        Create or update a simple Gallery Image Version using vhd as a source.:
          $ref: ./examples/CreateOrUpdateASimpleGalleryImageVersionWithVHD.json
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Compute Galleries Galleryname Images Galleryimagename Versions Galleryimageversionname
    patch:
      tags:
      - GalleryImageVersions
      operationId: microsoftAzureGalleryimageversionsUpdate
      description: Update a gallery image version.
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupNameParameter'
      - name: galleryName
        in: path
        required: true
        type: string
        description: The name of the Shared Image Gallery in which the Image Definition resides.
      - name: galleryImageName
        in: path
        required: true
        type: string
        description: The name of the gallery image definition in which the Image Version is to be updated.
      - name: galleryImageVersionName
        in: path
        required: true
        type: string
        description: 'The name of the gallery image version to be updated. Needs to follow semantic version name pattern: The allowed characters are digit and period. Digits must be within the range of a 32-bit integer. Format: <MajorVersion>.<MinorVersion>.<Patch>'
      - $ref: '#/parameters/ApiVersionParameter'
      - name: galleryImageVersion
        in: body
        required: true
        schema:
          $ref: '#/definitions/GalleryImageVersionUpdate'
        description: Parameters supplied to the update gallery image version operation.
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/GalleryImageVersion'
        default:
          description: Error response describing why the operation failed.
          schema:
