definitions:
  JobMetadata:
    description: Represents the job metadata.
    properties:
      createdDateTime:
        format: date-time
        type: string
      expirationDateTime:
        format: date-time
        type: string
      jobId:
        type: string
      lastUpdatedDateTime:
        format: date-time
        type: string
      status:
        $ref: '#/definitions/JobStatus'
    required:
    - jobId
    - lastUpdatedDateTime
    - createdDateTime
    - status
    type: object
  ConversationalAnalysisAuthoringUtteranceEntityEvaluationResult:
    description: Represents the evaluation output of an entity label or prediction.
    required:
    - category
    - offset
    - length
    type: object
    properties:
      category:
        description: Represents the entity category.
        type: string
      offset:
        format: int32
        description: Represents the entity offset index relative to the original text.
        type: integer
      length:
        format: int32
        description: Represents the entity length.
        type: integer
    x-ms-client-name: UtteranceEntityEvaluationResult
  ConversationalAnalysisAuthoringCreateDeploymentOptions:
    description: Represents the options for creating or updating a project deployment.
    required:
    - trainedModelLabel
    type: object
    properties:
      trainedModelLabel:
        description: Represents the trained model label.
        type: string
      assignedResourceIds:
        description: "Represents the resource IDs to be assigned to the deployment.\n            If provided, the deployment will be rolled out to the resources provided here as well as the original resource in which the project is created."
        type: array
        items:
          type: string
    x-ms-client-name: CreateDeploymentOptions
  TextAnalysisAuthoringDeploymentResource:
    description: Represents an Azure resource assigned to a deployment.
    required:
    - resourceId
    - region
    type: object
    properties:
      resourceId:
        description: Represents the Azure resource Id.
        type: string
      region:
        description: Represents the resource region.
        type: string
    x-ms-client-name: DeploymentResource
  TextAnalysisAuthoringTrainingConfigVersion:
    description: Represents a training config version.
    required:
    - trainingConfigVersion
    - modelExpirationDate
    type: object
    properties:
      trainingConfigVersion:
        description: Represents the version of the config.
        type: string
      modelExpirationDate:
        format: date
        description: Represents the training config version expiration date.
        type: string
    x-ms-client-name: TrainingConfigVersion
  TextAnalysisAuthoringResourceMetadata:
    description: Represents metadata for the Azure resource..
    required:
    - azureResourceId
    - customDomain
    - region
    type: object
    properties:
      azureResourceId:
        description: Represents the Azure resource ID.
        type: string
      customDomain:
        description: Represents the Azure resource custom domain.
        type: string
      region:
        description: Represents the Azure resource region.
        type: string
    x-ms-client-name: ResourceMetadata
  ConversationalAnalysisAuthoringEvaluationKind:
    enum:
    - percentage
    - manual
    type: string
    x-ms-enum:
      name: EvaluationKind
      modelAsString: true
      values:
      - value: percentage
        description: Split the data into training and test sets according to user-defined percentages.
      - value: manual
        description: Split the data according to the chosen dataset for every example in the data.
    x-ms-client-name: EvaluationKind
  TextAnalysisAuthoringCopyProjectJobState:
    description: Represents the state of a copy job.
    type: object
    allOf:
    - $ref: '#/definitions/TextAnalysisAuthoringJobState'
    x-ms-client-name: CopyProjectJobState
  TextAnalysisAuthoringAssignDeploymentResourcesOptions:
    description: Represents the options for assigning Azure resources to a project.
    required:
    - resourcesMetadata
