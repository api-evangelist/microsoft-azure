    properties:
      resourcesMetadata:
        description: Represents the metadata for the resources to be assigned.
        type: array
        items:
          $ref: '#/definitions/TextAnalysisAuthoringResourceMetadata'
    x-ms-client-name: AssignDeploymentResourcesOptions
  TextAnalysisAuthoringUnassignDeploymentResourcesOptions:
    description: Represents the options to unassign Azure resources from a project.
    required:
    - assignedResourceIds
    type: object
    properties:
      assignedResourceIds:
        description: Represents the assigned resource IDs to be unassigned.
        type: array
        items:
          type: string
    x-ms-client-name: UnassignDeploymentResourcesOptions
  ConversationalAnalysisAuthoringStringIndexType:
    enum:
    - Utf16CodeUnit
    type: string
    x-ms-enum:
      name: StringIndexType
      modelAsString: true
      values:
      - value: Utf16CodeUnit
