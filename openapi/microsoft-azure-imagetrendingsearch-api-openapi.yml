        description: A query that returns a Bing search results page with more images of the subject. For example, if the category is Popular People Searches, then the thumbnail is of a popular person. The query would return a Bing search results page with more images of that person.
        $ref: '#/definitions/Query'
      image:
        description: The image's thumbnail.
