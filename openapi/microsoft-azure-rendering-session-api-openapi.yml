swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Rendering Session API
schemes:
- https
tags:
- name: Rendering Session
paths:
  /accounts/{account_id}/sessions/{session_id}:
    put:
      operationId: microsoftAzureRemoterenderingCreatesession
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/api_version'
      - $ref: '#/parameters/account_id'
      - $ref: '#/parameters/session_id'
      - description: Settings of the session to be created.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/create_session_settings'
      x-ms-examples:
        Create a rendering session:
          $ref: ./examples/CreateSession.json
      responses:
        '200':
          description: OK. Indicates that there was already a session with the same settings present. This is expected when session creation is retried.
          schema:
            $ref: '#/definitions/session_properties'
        '201':
          description: Created. The session was created successfully.
          schema:
            $ref: '#/definitions/session_properties'
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '400':
          description: Bad Request. Returned error object describes which issues occurred.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
          schema:
            $ref: '#/definitions/error_response'
        '401':
          description: Unauthorized. Missing or invalid authorization.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            WWW-Authenticate:
              description: Describes the error encountered while trying to authenticate the resource.
              type: string
        '403':
          description: Forbidden. Authorization insufficient for given resource.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '409':
          description: Conflict. A rendering session with the ID already exists for the remote rendering account.
          x-ms-error-response: true
          schema:
            $ref: '#/definitions/error_response'
        '429':
          description: Too Many Requests. The rate limit has been exceeded. Retry the request after the duration given in the Retry-After header.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            Retry-After:
              description: The minimum number of seconds to wait before not getting this response anymore.
              type: integer
        '500':
          description: Internal Error. Server has encountered an internal error. Retrying the request may produce successful results.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
          schema:
            $ref: '#/definitions/error_response'
      tags:
      - Rendering Session
      summary: Microsoft Azure Creates A New Rendering Session
      description: Needs a more full description created.
    get:
      operationId: microsoftAzureRemoterenderingGetsession
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/api_version'
      - $ref: '#/parameters/account_id'
      - $ref: '#/parameters/session_id'
      x-ms-examples:
        Get a previously created session by ID:
          $ref: ./examples/GetSession.json
      responses:
        '200':
          description: OK.
          schema:
            $ref: '#/definitions/session_properties'
        '401':
          description: Unauthorized. Missing or invalid authorization.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            WWW-Authenticate:
              description: Describes the error encountered while trying to authenticate the resource.
              type: string
        '403':
          description: Forbidden. Authorization insufficient for given resource.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '404':
          description: Not found. No session with the provided session ID exists.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '429':
          description: Too Many Requests. The rate limit has been exceeded. Retry the request after the duration given in the Retry-After header.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            Retry-After:
              description: The minimum number of seconds to wait before not getting this response anymore.
              type: integer
        '500':
          description: Internal Error. Server has encountered an internal error. Retrying the request may produce successful results.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
          schema:
            $ref: '#/definitions/error_response'
      tags:
      - Rendering Session
      summary: Microsoft Azure Gets The Properties Of A Particular Rendering Session
      description: Needs a more full description created.
    patch:
      operationId: microsoftAzureRemoterenderingUpdatesession
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/api_version'
      - $ref: '#/parameters/account_id'
      - $ref: '#/parameters/session_id'
      - description: Settings used to update the session.
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/update_session_settings'
      x-ms-examples:
        Update a session:
          $ref: ./examples/UpdateSession.json
      responses:
        '200':
          description: OK. Session has been updated.
          schema:
            $ref: '#/definitions/session_properties'
        '401':
          description: Unauthorized. Missing or invalid authorization.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            WWW-Authenticate:
              description: Describes the error encountered while trying to authenticate the resource.
              type: string
        '403':
          description: Forbidden. Authorization insufficient for given resource.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '404':
          description: Not found. No session with the provided session ID exists.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
        '422':
          description: Unprocessable Entity. The maxLeaseTimeMinutes value was invalid. It has to be bigger than the current value of maxLeaseTimeMinutes.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
          schema:
            $ref: '#/definitions/error_response'
        '429':
          description: Too Many Requests. The rate limit has been exceeded. Retry the request after the duration given in the Retry-After header.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
            Retry-After:
              description: The minimum number of seconds to wait before not getting this response anymore.
              type: integer
        '500':
          description: Internal Error. Server has encountered an internal error. Retrying the request may produce successful results.
          x-ms-error-response: true
          headers:
            MS-CV:
              description: Microsoft Correlation Vector. Include this value when reporting issues.
              type: string
          schema:
            $ref: '#/definitions/error_response'
      tags:
      - Rendering Session
      summary: Microsoft Azure Updates The Max Lease Time Of A Particular Rendering Session
      description: Needs a more full description created.
  /accounts/{account_id}/sessions/{session_id}/:stop:
    post:
      operationId: microsoftAzureRemoterenderingStopsession
      produces:
