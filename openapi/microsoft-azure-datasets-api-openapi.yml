swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Datasets API
schemes:
- https
tags:
- name: Datasets
paths:
  /datasets:
    post:
      x-publish: true
      description: '**Applies to:** see pricing [tiers](https://aka.ms/AzureMapsPricingTier).<br><br>Creator makes it possible to develop applications based on your private indoor map data using Azure Maps API and SDK. [This](https://docs.microsoft.com/azure/azure-maps/creator-indoor-maps) article introduces concepts and tools that apply to Azure Maps Creator.<br><br> This API allows the caller to create a dataset from data that was uploaded to the Azure Maps Data Service and converted using the Azure Maps Conversion Service.<br><br>You can use this API in a scenario like uploading a DWG zip package for a building, converting the zip package using the Azure Maps Conversion Service, and creating a dataset from the converted zip package. The created dataset can be used to create tilesets using the Azure Maps Tileset Service and can be queried via the Azure Maps WFS Service.<br><br>### Submit Create Request<br><br>To create your dataset, you will use a `POST` request where the `conversionId` query parameter is an ID that represents the converted DWG zip package, the `datasetId` parameter will be the ID of a previously created dataset to append with the current dataset and, optionally, the `description` query parameter will contain a description (if description is not provided a default description will be given).<br><br>The Create API is a [long-running operation](https://aka.ms/am-creator-lrt-v2).'
      operationId: microsoftAzureDatasetCreate
      x-ms-examples:
        Create dataset from a converted CAD file provided by conversionId:
          $ref: ./examples/Dataset_Create.json
      parameters:
      - $ref: '#/parameters/SubscriptionKey'
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/ConversionIdQuery'
      - $ref: '#/parameters/AppendDatasetId'
      - $ref: '#/parameters/DescriptionDataset'
      responses:
        '202':
          $ref: '#/responses/202Accepted'
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      summary: Microsoft Azure Post Datasets
      tags:
      - Datasets
    get:
      x-publish: true
      description: '**Applies to:** see pricing [tiers](https://aka.ms/AzureMapsPricingTier).<br><br>Creator makes it possible to develop applications based on your private indoor map data using Azure Maps API and SDK. [This](https://docs.microsoft.com/azure/azure-maps/creator-indoor-maps) article introduces concepts and tools that apply to Azure Maps Creator.<br><br>This API allows the caller to fetch a list of all previously successfully created datasets.<br><br>### Submit List Request<br><br>To list all your datasets, you will issue a `GET` request with no additional parameters.<br><br><br>### List Data Response<br><br>The List API returns the complete list of all datasets in `json` format. The response contains the following fields (if they are not null or empty):<br>> created - The timestamp the dataset was created.<br>> datasetId - The id for the dataset.<br>> description - The description for the dataset.<br>> datasetSources - The source data that was used when the create request was issued.<br>> ontology - The source [ontology](https://docs.microsoft.com/en-us/azure/azure-maps/creator-facility-ontology) that was used in the conversion service for the input data.<br><br>The `datasetSources` describes the source data that was used when the create request was issued and contains the following elements (if they are not null or empty):<br><br>> conversionIds - The list of `conversionId` (null if none were provided).<br>> appendDatasetId - The `datasetId` that was used for an append operation (null if none was used).<br>>featureCounts - The counts for each feature type in the dataset.<br><br>Here''s a sample response returning the `timestamp`, `datasetId`, `description`, `datasetSources`, and `ontology` of 3 dataset resources:<br><br><br>```json<br>{<br>  "datasets": [<br>    {<br>      "timestamp": "2020-01-01T22:50:48.123Z",<br>      "datasetId": "f6495f62-94f8-0ec2-c252-45626f82fcb2",<br>      "description": "Some description or comment for the dataset.",<br>      "datasetSources": {<br>        "conversionIds": [<br>          "15d21452-c9bb-27b6-5e79-743ca5c3205d"<br>        ],      },<br>      "ontology": "facility-2.0",<br>      "featureCounts": {<br>        "directoryInfo": 2,<br>        "category": 10,<br>        "facility": 1,<br>        "level": 3,<br>        "unit": 183,<br>        "zone": 3,<br>        "verticalPenetration": 6,<br>        "opening": 48,<br>        "areaElement": 108<br>      }<br>    },<br>    {<br>      "timestamp": "2020-01-01T22:57:53.123Z",<br>      "datasetId": "8b1288fa-1958-4a2b-b68e-13a7i5af7d7c",<br>      "description": "Create from upload ''0c1288fa-2058-4a1b-b68d-13a5f5af7d7c''.",<br>      "datasetSources": {<br>        "conversionIds": [<br>          "0c1288fa-2058-4a1b-b68d-13a5f5af7d7c"<br>        ],<br>        "appendDatasetId": "46d1edb6-d29e-4786-9589-dbd4efd7a977"<br>      },<br>      "ontology": "facility-2.0",<br>      "featureCounts": {<br>        "directoryInfo": 2,<br>        "category": 10,<br>        "facility": 1,<br>        "level": 3,<br>        "unit": 183,<br>        "zone": 3,<br>        "verticalPenetration": 6,<br>        "opening": 48,<br>        "areaElement": 108<br>      }<br>    }<br>  ]<br>}<br>```'
      operationId: microsoftAzureDatasetList
      x-ms-examples:
        List all the previously created datasets:
          $ref: ./examples/Dataset_List.json
      parameters:
      - $ref: '#/parameters/SubscriptionKey'
      - $ref: '#/parameters/ApiVersion'
      responses:
        '200':
          description: The dataset request completed successfully. The response body contains the previously created dataset.
          schema:
            $ref: '#/definitions/DatasetListResponse'
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      summary: Microsoft Azure Get Datasets
      tags:
      - Datasets
  /datasets/{datasetId}:
    get:
      x-publish: true
      description: '**Applies to:** see pricing [tiers](https://aka.ms/AzureMapsPricingTier).<br><br>Creator makes it possible to develop applications based on your private indoor map data using Azure Maps API and SDK. [This](https://docs.microsoft.com/azure/azure-maps/creator-indoor-maps) article introduces concepts and tools that apply to Azure Maps Creator.<br><br>This API allows the caller to fetch a previously successfully created dataset.<br><br>### Submit Get Details Request<br><br>To get the details for a previously created dataset, you will issue a `GET` request with the `datasetId` in the path.<br><br>### Get Details Response<br><br>The Get Details API returns the details for a dataset in `json` format. The response contains the following fields (if they are not null or empty):<br>> created - The timestamp the dataset was created.<br>> datasetId - The id for the dataset.<br>> description - The description for the dataset.<br>> datasetSources - The source data that was used when the create request was issued.<br>> ontology - The source [ontology](https://docs.microsoft.com/en-us/azure/azure-maps/creator-facility-ontology) that was used in the conversion service for the input data.<br><br>The `datasetSources` describes the source data that was used when the create request was issued and contains the following elements (if they are not null or empty):<br>> conversionIds - The list of `conversionId` (null if none were provided).<br>> appendDatasetId - The `datasetId` that was used for an append operation (null if none was used).<br>>featureCounts - The counts for each feature type in the dataset.<br><br>Here''s a sample response returning the `timestamp`, `datasetId`, `description`, `datasetSources`, and `ontology` of a dataset resource:<br><br>```json<br>{<br>   "timestamp": "2020-01-01T22:50:48.123Z",<br>   "datasetId": "f6495f62-94f8-0ec2-c252-45626f82fcb2",<br>   "description": "Some description or comment for the dataset.",<br>   "datasetSources": {<br>     "conversionIds": [<br>       "15d21452-c9bb-27b6-5e79-743ca5c3205d"<br>     ],<br>   },<br>   "ontology": "facility-2.0",<br>   "featureCounts": {<br>     "directoryInfo": 2,<br>     "category": 10,<br>     "facility": 1,<br>     "level": 3,<br>     "unit": 183,<br>     "zone": 3,<br>     "verticalPenetration": 6,<br>     "opening": 48,<br>     "areaElement": 108<br>   }<br> }<br>```'
      operationId: microsoftAzureDatasetGet
      x-ms-examples:
        Get details for a previously created dataset:
          $ref: ./examples/Dataset_GetDetails.json
      parameters:
      - $ref: '#/parameters/DatasetId'
      - $ref: '#/parameters/SubscriptionKey'
      - $ref: '#/parameters/ApiVersion'
      responses:
        '200':
          description: The get dataset request completed successfully.
          schema:
            $ref: '#/definitions/DatasetDetailInfo'
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      summary: Microsoft Azure Get Datasets Datasetid
      tags:
      - Datasets
    delete:
      x-publish: true
      description: '**Applies to:** see pricing [tiers](https://aka.ms/AzureMapsPricingTier).<br><br>Creator makes it possible to develop applications based on your private indoor map data using Azure Maps API and SDK. [This](https://docs.microsoft.com/azure/azure-maps/creator-indoor-maps) article introduces concepts and tools that apply to Azure Maps Creator.<br><br>You can also use this API to delete old/unused datasets to create space for new Creator content.<br><br>### Submit Delete Request<br><br>To delete your content you will issue a `DELETE` request where the path will contain the `datasetId` of the dataset to delete.'
      operationId: microsoftAzureDatasetDelete
      x-ms-examples:
        Delete previously created dataset:
          $ref: ./examples/Dataset_Delete.json
      parameters:
      - $ref: '#/parameters/SubscriptionKey'
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/DatasetId'
      responses:
        '204':
          description: The dataset delete request completed successfully. The resource referenced by the `datasetId` was deleted from the server.
        '400':
          $ref: '#/responses/400'
        '401':
          $ref: '#/responses/401'
        '403':
          $ref: '#/responses/403'
        '404':
          $ref: '#/responses/404'
        '500':
          $ref: '#/responses/500'
      summary: Microsoft Azure Delete Datasets Datasetid
      tags:
      - Datasets
    patch:
      tags:
      - Datasets
      description: Creates or updates a dataset.
      operationId: microsoftAzureDatasetsCreateorupdate
      consumes:
      - application/merge-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: datasetId
        description: Id of the dataset resource.
        required: true
        type: string
      - in: query
        name: api-version
        description: The requested API version
        required: true
        type: string
      - in: body
        name: dataset
        description: Dataset resource payload to create or update.
        required: true
        schema:
          $ref: '#/definitions/Dataset_2'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Dataset_2'
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Dataset_2'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse_2'
          headers:
            x-ms-error-code:
              type: string
              x-ms-client-name: ErrorCode
          x-ms-error-response: true
      x-ms-examples:
        Datasets_CreateOrUpdate:
          $ref: ./examples/Datasets_CreateOrUpdate.json
      summary: Microsoft Azure Patch Datasets Datasetid
  /datasets/operations/{operationId}:
    get:
      description: This API allows the caller to view the current progress of a dataset operation and the path is obtained from a call to the Create API.<br><br>### Submit Operations Request<br><br>To view the current progress of a dataset operation, you will use a `GET` request where the `operationId` given the path is the ID that represents the operation.<br><br>### Operation Response<br><br>While in progress, a `200-OK` http status code will be returned with no extra headers. If the operation succeeds, a `200-OK` http status code with Resource-Location header will be returned.
      operationId: microsoftAzureDatasetGetoperation
      x-ms-examples:
        Get the status of an operation which is still running:
          $ref: ./examples/GetOperationStillRunning.json
        Get the status of an operation which has finished successfully:
          $ref: ./examples/GetOperation.json
      parameters:
      - $ref: '#/parameters/SubscriptionKey'
      - $ref: '#/parameters/ApiVersion'
      - $ref: '#/parameters/DatasetOperationId'
      responses:
        '200':
          $ref: '#/responses/200Async'
        '400':
          $ref: '#/responses/400'
      summary: Microsoft Azure Get Datasets Operations Operationid
      tags:
      - Datasets
  /datasets/{name}:
    put:
      tags:
      - Datasets
      summary: "Microsoft Azure Register A New Dataset \r\n      \r\nstatus Codes Returned:\r\n 201: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 409: A Dataset With The Specified Name Already Exists"
      operationId: microsoftAzureDatasetsRegister
      consumes:
      - application/json-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: A name that can be used to uniquely identify the dataset after it has been registered.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion_2'
      - in: body
        name: body
        description: Properties for the dataset, such as the list of URIs to the annotation files.
        required: true
        schema:
          $ref: '#/definitions/Dataset'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Dataset'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        RegisterDataset_ImageClassification:
          $ref: ./examples/RegisterDataset_ImageClassification.json
      description: Needs a more full description created.
    get:
      tags:
      - Datasets
      summary: "Microsoft Azure Get Information About A Specific Dataset \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Dataset With The Specified Name Was Not Found"
      operationId: microsoftAzureDatasetsGet
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the dataset to get.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - $ref: '#/parameters/ApiVersion_2'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Dataset'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Datasets_Get:
          $ref: ./examples/Datasets_Get.json
      description: Needs a more full description created.
    patch:
      tags:
      - Datasets
      summary: "Microsoft Azure Update The Properties Of An Existing Dataset \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Dataset With The Specified Name Was Not Found \r\n 412: An If Match Header Was Provided, But The Given Etag Did Not Match The Current Etag Value"
      operationId: microsoftAzureDatasetsUpdate
      consumes:
      - application/json-patch+json
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the dataset to update.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: header
        name: If-Match
        description: "Optional ETag for the dataset to update.<br />\r\nIf an ETag is provided, then the dataset will be updated only if its current ETag value matches the given ETag.\r\nIf the ETag values don't match, then the update operation will fail with status code 412 (Precondition Failed).\r\nThis indicates that the dataset has been updated since the last time information for the dataset was obtained.<br />\r\nIf an ETag is not provided or its value is '*', then the dataset will always be updated regardless of the current ETag value."
        type: string
      - $ref: '#/parameters/ApiVersion_2'
      - in: body
        name: body
        description: Properties to update on the existing dataset.
        required: true
        schema:
          $ref: '#/definitions/Dataset'
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Dataset'
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Datasets_Update:
          $ref: ./examples/Datasets_Update.json
      description: Needs a more full description created.
    delete:
      tags:
      - Datasets
      summary: "Microsoft Azure Unregister A Dataset \r\n      \r\nstatus Codes Returned:\r\n 204: Operation Completed Successfully \r\n 400: The Request Was Malformed \r\n 404: A Dataset With The Specified Name Was Not Found \r\n 412: An If Match Header Was Provided, But The Given Etag Did Not Match The Current Etag Value"
      operationId: microsoftAzureDatasetsUnregister
      produces:
      - application/json
      parameters:
      - in: path
        name: name
        description: The name of the dataset to unregister.
        required: true
        type: string
        maxLength: 255
        pattern: ^[a-zA-Z0-9][a-zA-Z0-9._-]*$
      - in: header
        name: If-Match
        description: "Optional ETag for the dataset to unregister.<br />\r\nIf an ETag is provided, then the dataset will be unregistered only if its current ETag value matches the given ETag.\r\nIf the ETag values don't match, then the unregister operation will fail with status code 412 (Precondition Failed).\r\nThis indicates that the dataset has been updated since the last time information for the dataset was obtained.<br />\r\nIf an ETag is not provided or its value is '*', then the dataset will always be unregistered regardless of the current ETag value."
        type: string
      - $ref: '#/parameters/ApiVersion_2'
      responses:
        '204':
          description: No Content
        default:
          description: Error
          schema:
            $ref: '#/definitions/ErrorResponse'
          headers:
            x-ms-error-code:
              type: string
      x-ms-examples:
        Datasets_Unregister:
          $ref: ./examples/Datasets_Unregister.json
      description: Needs a more full description created.
