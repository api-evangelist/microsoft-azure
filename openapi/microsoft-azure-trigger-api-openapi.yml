definitions:
  ProxyDto:
    description: Base data transfer object implementation for proxy resources.
    type: object
    properties:
      id:
        description: The resource id of the azure resource
        type: string
        readOnly: true
      name:
        description: Name of the azure resource
        type: string
        readOnly: true
      type:
        description: Type of the azure resource
        type: string
        readOnly: true
    x-ms-azure-resource: true
  Trigger:
    description: A Trigger data transfer object.
    required:
    - kind
    type: object
    allOf:
    - $ref: '#/definitions/ProxyDto'
    properties:
      kind:
        description: Kind of synchronization on trigger.
        enum:
        - ScheduleBased
        type: string
        x-ms-enum:
          name: triggerKind
          modelAsString: true
    discriminator: kind
  TriggerList:
    description: List response for get triggers
    required:
    - value
    type: object
    properties:
      nextLink:
        description: The Url of next result page.
        type: string
      value:
        description: Collection of items of type DataTransferObjects.
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/Trigger'
  DataShareErrorInfo:
    description: The data share error body model.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: Code of the error
        type: string
      details:
        description: Nested details of the error model
        uniqueItems: false
        type: array
        items:
          $ref: '#/definitions/DataShareErrorInfo'
      message:
        description: Message of the error
        type: string
      target:
        description: Target of the error
        type: string
  DataShareError:
    description: The data share error model.
    required:
    - error
    type: object
    properties:
      error:
        $ref: '#/definitions/DataShareErrorInfo'
        description: The data share error body
  OperationResponse:
    description: Response for long running operation
    required:
    - status
    type: object
    properties:
      endTime:
        format: date-time
        description: start time
        type: string
      error:
        $ref: '#/definitions/DataShareErrorInfo'
        description: The error property when status is failed.
      startTime:
        format: date-time
        description: start time
        type: string
      status:
        description: Operation state of the long running operation.
        enum:
        - Accepted
        - InProgress
        - TransientFailure
        - Succeeded
        - Failed
        - Canceled
        type: string
        x-ms-enum:
          name: status
          modelAsString: true
