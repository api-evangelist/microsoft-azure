swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector V1topics API
  description: Manage Kafka topics
schemes:
- https
tags:
- name: V1topics
  description: Manage Kafka topics
paths:
  /v1/topics/{topic}:
    put:
      tags:
      - V1topics
      summary: Microsoft Azure Create A Topic
      description: Create a topic in Kafka with topic configuration
      operationId: microsoftAzureAdminCreatetopic
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - name: topic
        in: path
        description: Name of the topic to be created
        required: true
        type: string
      - in: body
        name: TopicCreationRecord
        description: A description for a topic to be created
        required: false
        schema:
          $ref: '#/definitions/TopicCreationRecord'
      responses:
        '200':
          description: successful operation
          schema:
            type: string
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '405':
          description: Method Not Allowed
        '500':
          description: Internal Server Error
definitions:
  TopicCreationRecord:
    type: object
    properties:
      partition_count:
        type: integer
        format: int32
        description: Partition count for the topic
      replication_factor:
        type: integer
        format: int32
        description: Replication factor for the topic
      topic_properties:
        type: object
        description: Topic level configuration override for the topic
        additionalProperties:
          type: object
    description: A description for a topic to be created
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
