        enum:
        - default
        x-ms-enum:
          name: defaultName
          modelAsString: true
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: Success.
        '204':
          description: Success.
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cache Redis Name Patchschedules Default
    get:
      tags:
      - PatchSchedules
      operationId: microsoftAzurePatchschedulesGet
      x-ms-examples:
        RedisCachePatchSchedulesGet:
          $ref: ./examples/RedisCachePatchSchedulesGet.json
      description: Gets the patching schedule of a redis cache (requires Premium SKU).
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: name
        in: path
        required: true
        type: string
        description: The name of the redis cache.
      - name: default
        in: path
        required: true
        type: string
        description: Default string modeled as parameter for auto generation to work correctly.
        enum:
        - default
        x-ms-enum:
          name: defaultName
          modelAsString: true
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: Response of get patch schedules.
          schema:
            $ref: '#/definitions/RedisPatchSchedule'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Cache Redis Name Patchschedules Default
definitions:
  ProxyResource:
    description: The resource model definition for a ARM proxy resource. It will have everything other than required location and tags
    allOf:
    - $ref: '#/definitions/Resource'
  Resource:
    description: The Resource definition.
    properties:
      id:
        readOnly: true
        type: string
        description: Resource ID.
      name:
        readOnly: true
        type: string
        description: Resource name.
      type:
        readOnly: true
        type: string
        description: Resource type.
    x-ms-azure-resource: true
  RedisPatchScheduleListResult:
    properties:
      value:
        type: array
        items:
          $ref: '#/definitions/RedisPatchSchedule'
        description: Results of the list patch schedules operation.
      nextLink:
        type: string
        readOnly: true
        description: Link for next page of results.
    description: The response of list patch schedules Redis operation.
  ScheduleEntry:
    properties:
      dayOfWeek:
        type: string
        description: Day of the week when a cache can be patched.
        enum:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
        - Everyday
        - Weekend
        x-ms-enum:
          name: DayOfWeek
          modelAsString: false
      startHourUtc:
        type: integer
        format: int32
        description: Start hour after which cache patching can start.
      maintenanceWindow:
        type: string
        format: duration
        description: 'ISO8601 timespan specifying how much time cache patching can take. '
    required:
    - dayOfWeek
    - startHourUtc
    description: Patch schedule entry for a Premium Redis Cache.
  ScheduleEntries:
    properties:
      scheduleEntries:
        x-ms-client-name: ScheduleEntries
        type: array
        items:
          $ref: '#/definitions/ScheduleEntry'
        description: List of patch schedules for a Redis cache.
    required:
    - scheduleEntries
    description: List of patch schedules for a Redis cache.
  RedisPatchSchedule:
    properties:
      properties:
        x-ms-client-flatten: true
        $ref: '#/definitions/ScheduleEntries'
        description: List of patch schedules for a Redis cache.
    required:
    - properties
    allOf:
    - $ref: '#/definitions/ProxyResource'
    description: Response to put/get patch schedules for Redis cache.
