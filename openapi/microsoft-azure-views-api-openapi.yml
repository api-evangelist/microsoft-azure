swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector Views API
schemes:
- https
tags:
- name: Views
paths:
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/views
  : get:
      tags:
      - Views
      operationId: microsoftAzureViewsListbyhub
      x-ms-examples:
        Views_ListByHub:
          $ref: ./examples/ViewsListByHub.json
      description: Gets all available views for given user in the specified hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - name: userId
        in: query
        required: true
        type: string
        description: The user ID. Use * to retrieve hub level views.
      responses:
        '200':
          description: OK. Successfully get all the views in the hub for the given user.
          schema:
            $ref: '#/definitions/ViewListResult'
      x-ms-pageable:
        nextLinkName: nextLink
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Views
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.CustomerInsights/hubs/{hubName}/views/{viewName}
  : put:
      tags:
      - Views
      operationId: microsoftAzureViewsCreateorupdate
      x-ms-examples:
        Views_CreateOrUpdate:
          $ref: ./examples/ViewsCreateOrUpdate.json
      description: Creates a view or updates an existing view in the hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: viewName
        in: path
        required: true
        type: string
        description: The name of the view.
        minLength: 1
        maxLength: 512
      - name: parameters
        in: body
        required: true
        schema:
          $ref: '#/definitions/ViewResourceFormat'
        description: Parameters supplied to the CreateOrUpdate View operation.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      responses:
        '200':
          description: OK. Successfully created the view.
          schema:
            $ref: '#/definitions/ViewResourceFormat'
      summary: Microsoft Azure Put Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Views Viewname
    get:
      tags:
      - Views
      operationId: microsoftAzureViewsGet
      x-ms-examples:
        Views_Get:
          $ref: ./examples/ViewsGet.json
      description: Gets a view in the hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: viewName
        in: path
        required: true
        type: string
        description: The name of the view.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - name: userId
        in: query
        required: true
        type: string
        description: The user ID. Use * to retrieve hub level view.
      responses:
        '200':
          description: OK. Successfully get the view.
          schema:
            $ref: '#/definitions/ViewResourceFormat'
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Views Viewname
    delete:
      tags:
      - Views
      operationId: microsoftAzureViewsDelete
      x-ms-examples:
        Views_Delete:
          $ref: ./examples/ViewsDelete.json
      description: Deletes a view in the specified hub.
      parameters:
      - name: resourceGroupName
        in: path
        required: true
        type: string
        description: The name of the resource group.
      - name: hubName
        in: path
        required: true
        type: string
        description: The name of the hub.
      - name: viewName
        in: path
        required: true
        type: string
        description: The name of the view.
      - $ref: '#/parameters/ApiVersionParameter'
      - $ref: '#/parameters/SubscriptionIdParameter'
      - name: userId
        in: query
        required: true
        type: string
        description: The user ID. Use * to retrieve hub level view.
      responses:
        '200':
          description: OK. The view is deleted.
      summary: Microsoft Azure Delete Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Customerinsights Hubs Hubname Views Viewname
definitions:
  ProxyResource:
    properties:
      id:
        readOnly: true
        type: string
