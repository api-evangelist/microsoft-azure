swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: Microsoft Azure AccessControlClient AccessConnector GlobalCertificateOrder API
schemes:
- https
tags:
- name: GlobalCertificateOrder
paths:
  /subscriptions/{subscriptionId}/providers/Microsoft.CertificateRegistration/certificateOrders:
    get:
      tags:
      - GlobalCertificateOrder
      summary: Microsoft Azure Lists All Domains In A Subscription
      operationId: microsoftAzureGlobalcertificateorderGetallcertificateorders
      consumes: []
      produces:
      - application/json
      - text/json
      parameters:
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/CertificateOrderCollection'
      deprecated: false
      x-ms-pageable:
        nextLinkName: nextLink
      description: Needs a more full description created.
  /subscriptions/{subscriptionId}/providers/Microsoft.CertificateRegistration/validateCertificateRegistrationInformation:
    post:
      tags:
      - GlobalCertificateOrder
      summary: Microsoft Azure Validate Certificate Purchase Information
      operationId: microsoftAzureGlobalcertificateorderValidatecertificatepurchaseinformation
      consumes:
      - application/json
      - text/json
      - application/xml
      - text/xml
      - application/x-www-form-urlencoded
      produces:
      - application/json
      - text/json
      - application/xml
      - text/xml
      parameters:
      - name: certificateOrder
        in: body
        description: Certificate order
        required: true
        schema:
          $ref: '#/definitions/CertificateOrder'
      - $ref: '#/parameters/subscriptionIdParameter'
      - $ref: '#/parameters/apiVersionParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Object'
      deprecated: false
      description: Needs a more full description created.
definitions:
  CertificateOrder:
    description: Certificate purchase order
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        properties:
          certificates:
            description: State of the Key Vault secret
            type: object
            additionalProperties:
              $ref: '#/definitions/CertificateOrderCertificate'
          distinguishedName:
            description: Certificate distinguished name
            type: string
          domainVerificationToken:
            description: Domain Verification Token
            type: string
          validityInYears:
            format: int32
            description: Duration in years (must be between 1 and 3)
            type: integer
          keySize:
            format: int32
            description: Certificate Key Size
            type: integer
          productType:
            description: Certificate product type
            enum:
            - StandardDomainValidatedSsl
            - StandardDomainValidatedWildCardSsl
            type: string
            x-ms-enum:
              name: CertificateProductType
              modelAsString: false
          autoRenew:
            description: Auto renew
            type: boolean
          provisioningState:
            description: Status of certificate order
            enum:
            - Succeeded
            - Failed
            - Canceled
            - InProgress
            - Deleting
            type: string
            x-ms-enum:
              name: ProvisioningState
              modelAsString: false
          status:
            description: Current order status
            enum:
            - Pendingissuance
            - Issued
            - Revoked
            - Canceled
            - Denied
            - Pendingrevocation
            - PendingRekey
            - Unused
            - Expired
            - NotSubmitted
            type: string
            x-ms-enum:
              name: CertificateOrderStatus
              modelAsString: false
          signedCertificate:
            $ref: '#/definitions/CertificateDetails'
            description: Signed certificate
          csr:
            description: Last CSR that was created for this order
            type: string
          intermediate:
            $ref: '#/definitions/CertificateDetails'
            description: Intermediate certificate
          root:
            $ref: '#/definitions/CertificateDetails'
            description: Root certificate
          serialNumber:
            description: Current serial number of the certificate
            type: string
          lastCertificateIssuanceTime:
            format: date-time
            description: Certificate last issuance time
            type: string
          expirationTime:
            format: date-time
            description: Certificate expiration time
            type: string
        x-ms-client-flatten: true
  Resource:
    required:
    - location
    properties:
      id:
        description: Resource Id
        type: string
      name:
        description: Resource Name
        type: string
      kind:
        description: Kind of resource
        type: string
      location:
        description: Resource Location
        type: string
      type:
        description: Resource type
        type: string
      tags:
        description: Resource tags
        type: object
        additionalProperties:
          type: string
    x-ms-azure-resource: true
  CertificateOrderCertificate:
    description: Class representing the Key Vault container for certificate purchased through Azure
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        properties:
          keyVaultId:
            description: Key Vault Csm resource Id
            type: string
          keyVaultSecretName:
            description: Key Vault secret name
            type: string
          provisioningState:
            description: Status of the Key Vault secret
            enum:
            - Initialized
            - WaitingOnCertificateOrder
            - Succeeded
            - CertificateOrderFailed
            - OperationNotPermittedOnKeyVault
            - AzureServiceUnauthorizedToAccessKeyVault
            - KeyVaultDoesNotExist
            - KeyVaultSecretDoesNotExist
            - UnknownError
            - Unknown
            type: string
            x-ms-enum:
              name: KeyVaultSecretStatus
              modelAsString: false
        x-ms-client-flatten: true
  CertificateDetails:
    description: Certificate Details
    type: object
    allOf:
    - $ref: '#/definitions/Resource'
    properties:
      properties:
        properties:
          version:
            format: int32
            description: Version
            type: integer
          serialNumber:
            description: Serial Number
            type: string
          thumbprint:
            description: Thumbprint
            type: string
          subject:
            description: Subject
            type: string
          notBefore:
            format: date-time
            description: Valid from
            type: string
          notAfter:
            format: date-time
            description: Valid to
            type: string
          signatureAlgorithm:
            description: Signature Algorithm
            type: string
          issuer:
            description: Issuer
            type: string
          rawData:
            description: Raw certificate data
            type: string
        x-ms-client-flatten: true
  Object:
    type: object
    properties: {}
  CertificateOrderCollection:
    description: Collection of certificate orders
    type: object
    properties:
      value:
        description: Collection of resources
        type: array
        items:
          $ref: '#/definitions/CertificateOrder'
      nextLink:
        description: Link to next page of resources
        type: string
parameters:
  subscriptionIdParameter:
    name: subscriptionId
    in: path
    description: Subscription Id
    required: true
    type: string
  apiVersionParameter:
    name: api-version
    in: query
    description: API Version
    required: true
    type: string
x-ms-parameterized-host:
  hostTemplate: '{endpoint}'
  useSchemePrefix: false
  parameters:
  - $ref: '#/parameters/Endpoint'
