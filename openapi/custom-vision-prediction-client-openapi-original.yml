        - multipart/form-data
        - application/octet-stream
      produces:
        - application/json
        - application/xml
        - text/xml
      parameters:
        - name: projectId
          in: path
          description: The project id.
          required: true
          type: string
          format: uuid
          x-nullable: false
        - name: publishedName
          in: path
          description: Specifies the name of the model to evaluate against.
          required: true
          type: string
        - name: application
          in: query
          description: Optional. Specifies the name of application using the endpoint.
          required: false
          type: string
          x-nullable: true
        - name: imageData
          in: formData
          description: >-
            Binary image data. Supported formats are JPEG, GIF, PNG, and BMP.
            Supports images up to 4MB.
          required: true
          type: file
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ImagePrediction'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
