swagger: '2.0'
info:
  version: '3.0'
  title: Microsoft Azure Custom Vision Prediction Client
host: southcentralus.api.cognitive.microsoft.com
basePath: /customvision/v3.0/prediction
schemes:
  - https
paths:
  /{projectId}/classify/iterations/{publishedName}/url:
    post:
      tags:
        - ImagePredictionApi
      summary: 'Microsoft Azure Classify An Image Url And Saves The Result'
      operationId: microsoftAzureClassifyimageurl
      consumes:
        - application/json
        - application/xml
        - text/xml
        - application/x-www-form-urlencoded
      produces:
        - application/json
        - application/xml
        - text/xml
      parameters:
        - name: projectId
          in: path
          description: The project id.
          required: true
          type: string
          format: uuid
          x-nullable: false
        - name: publishedName
          in: path
          description: Specifies the name of the model to evaluate against.
          required: true
          type: string
        - name: imageUrl
          in: body
          description: An ImageUrl that contains the url of the image to be evaluated.
          required: true
          schema:
            $ref: '#/definitions/ImageUrl'
        - name: application
          in: query
          description: Optional. Specifies the name of application using the endpoint.
          required: false
          type: string
          x-nullable: true
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ImagePrediction'
        default:
          description: Error response
          schema:
            $ref: '#/definitions/CustomVisionError'
      x-ms-examples:
        Successful ClassifyImageUrl request:
          $ref: ./examples/ClassifyImageUrl.json
      description: Needs a more full description created.
