definitions:
  CollectorPropertiesBaseWithAgent:
    type: object
    description: Collector properties class.
    properties:
      agentProperties:
        $ref: '#/definitions/CollectorAgentPropertiesBase'
        description: Gets or sets the collector agent properties.
      discoverySiteId:
        type: string
        description: Gets the discovery site id.
      createdTimestamp:
        type: string
        format: date-time
        description: Gets the Timestamp when collector was created.
        readOnly: true
      updatedTimestamp:
        type: string
        format: date-time
        description: Timestamp when collector was last updated.
        readOnly: true
    allOf:
    - $ref: '#/definitions/AzureResourceProperties'
  ServerCollector:
    type: object
    description: Physical server collector resource.
    properties:
      properties:
        $ref: '#/definitions/CollectorPropertiesBaseWithAgent'
        description: The resource-specific properties for this resource.
        x-ms-client-flatten: true
        x-ms-mutability:
        - read
        - create
    allOf:
    - $ref: ../../../../../../common-types/resource-management/v5/types.json#/definitions/ProxyResource
  CollectorAgentPropertiesBase:
    type: object
    description: Collector agent property class.
    properties:
      id:
        type: string
        description: Gets the collector agent id.
      version:
        type: string
        description: Gets the collector agent version.
      lastHeartbeatUtc:
        type: string
        format: date-time
        description: Gets the collector last heartbeat time.
      spnDetails:
        $ref: '#/definitions/CollectorAgentSpnPropertiesBase'
        description: Gets or sets the SPN details.
  AzureResourceProperties:
    type: object
    description: Common properties for all azure tracked and proxy resources.
    properties:
      provisioningState:
        $ref: '#/definitions/ProvisioningState'
        description: The status of the last operation.
  ProvisioningState:
    type: string
    description: The status of the current operation.
    enum:
    - Succeeded
    - Failed
    - Canceled
    - Provisioning
    - Updating
    - Deleting
    - Accepted
    x-ms-enum:
      name: ProvisioningState
      modelAsString: true
      values:
      - name: Succeeded
        value: Succeeded
        description: Resource has been created.
      - name: Failed
        value: Failed
        description: Resource creation failed.
      - name: Canceled
        value: Canceled
        description: Resource creation was canceled.
      - name: Provisioning
        value: Provisioning
        description: Resource is being Provisioned.
      - name: Updating
        value: Updating
        description: Resource is being Updated.
      - name: Deleting
        value: Deleting
        description: Resource is being Deleted.
      - name: Accepted
        value: Accepted
        description: Resource is being Accepted.
  CollectorAgentSpnPropertiesBase:
    type: object
    description: Collector agent SPN details class.
    properties:
      authority:
        type: string
        description: Gets the AAD authority endpoint.
      applicationId:
        type: string
        description: Gets the AAD application id.
      audience:
        type: string
        description: Gets the AAD audience url.
      objectId:
        type: string
        description: Gets the object id of the AAD application.
      tenantId:
        type: string
        description: Gets the tenant id of the AAD application.
  ServerCollectorListResult:
    type: object
    description: The response of a ServerCollector list operation.
    properties:
      value:
        type: array
        description: The ServerCollector items on this page
        items:
          $ref: '#/definitions/ServerCollector'
      nextLink:
        type: string
        format: uri
        description: The link to the next page of items
    required:
    - value
