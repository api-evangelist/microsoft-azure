  SoilMoistureModelSensorDefinition:
    description: Schema for storing sensor definition keywords.
    required:
    - maxProperty
    - minProperty
    - sensorMeasurement
    type: object
    properties:
      sensorMeasurement:
        description: The measurement name for sensor measure in sensorDataModel.
        minLength: 1
        type: string
      minProperty:
