swagger: '2.0'
info:
  version: 2020-08-01-preview
  title: 'Microsoft Azure AccessControlClient AccessConnector Custom Speech Transcriptions: API'
schemes:
- https
tags:
- name: 'Custom Speech Transcriptions:'
paths:
  /transcriptions/locales:
    get:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Gets A List Of Supported Locales For Offline Transcriptions
      operationId: microsoftAzureGetsupportedlocalesfortranscriptions
      produces:
      - application/json
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              type: string
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get the supported locales:
          $ref: ./examples/get_supported_transcription_locales.json
      description: Needs a more full description created.
  /transcriptions:
    get:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Gets A List Of Transcriptions For The Authenticated Subscription
      operationId: microsoftAzureGettranscriptions
      produces:
      - application/json
      parameters:
      - $ref: '#/parameters/skipQueryParameter'
      - $ref: '#/parameters/takeQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Transcription'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get all transcriptions:
          $ref: ./examples/get_transcriptions.json
      description: Needs a more full description created.
    post:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Creates A New Transcription
      operationId: microsoftAzureCreatetranscription
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: body
        name: transcription
        description: The details of the new transcription.
        required: true
        schema:
          $ref: '#/definitions/TranscriptionDefinition'
      responses:
        '202':
          description: The request was accepted and the response contains the location of the entity.
          headers:
            Retry-After:
              description: The minimum number of seconds to wait before accessing the resource created in this operation.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
            Location:
              description: The location of the created resource.
              type: string
              format: uri
            Operation-Location:
              description: The location of the created resource.
              type: string
              format: uri
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-long-running-operation: true
      x-ms-long-running-operation-options:
        final-state-via: location
      x-ms-examples:
        Create a transcription for URIs:
          $ref: ./examples/create_uri_transcription.json
      description: Needs a more full description created.
  /transcriptions/{id}:
    get:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Gets The Transcription Identified By The Given Id
      operationId: microsoftAzureGettranscription
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the transcription.
        required: true
        type: string
        format: uuid
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Transcription'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Get a transcription:
          $ref: ./examples/get_transcription.json
      description: Needs a more full description created.
    patch:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Updates The Mutable Details Of The Transcription Identified By Its Id
      operationId: microsoftAzureUpdatetranscription
      consumes:
      - application/json
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the transcription.
        required: true
        type: string
        format: uuid
      - in: body
        name: transcriptionUpdate
        description: The updated values for the transcription.
        required: true
        schema:
          $ref: '#/definitions/TranscriptionUpdate'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/Transcription'
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Update a transcription:
          $ref: ./examples/update_transcription.json
      description: Needs a more full description created.
    delete:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Deletes The Specified Transcription Task
      operationId: microsoftAzureDeletetranscription
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the transcription.
        required: true
        type: string
        format: uuid
      responses:
        '204':
          description: The transcription task was successfully deleted.
          headers:
            X-RateLimit-Limit:
              description: The limit of requests for the resource.
              type: integer
            X-RateLimit-Remaining:
              description: The remaining number of requests until the rate limit is reached.
              type: integer
            X-RateLimit-Reset:
              description: The timestamp when the rate limit will be reset formatted as ISO 8601 combined date and time in UTC.
              type: string
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error'
      x-ms-examples:
        Delete a transcription:
          $ref: ./examples/delete_transcription.json
      description: Needs a more full description created.
  /transcriptions/{id}/files:
    get:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Gets The Files Of The Transcription Identified By The Given Id
      operationId: microsoftAzureGettranscriptionfiles
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the transcription.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      - $ref: '#/parameters/skipQueryParameter_2'
      - $ref: '#/parameters/topQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/PaginatedFiles'
          headers:
            Retry-After:
              description: The minimum number of seconds to wait for a non terminal operation to complete.
              type: integer
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-pageable:
        itemName: values
        nextLinkName: '@nextLink'
      x-ms-examples:
        Get all files:
          $ref: ./examples/get_transcription_files.json
      description: Needs a more full description created.
  /transcriptions/{id}/files/{fileId}:
    get:
      tags:
      - 'Custom Speech Transcriptions:'
      summary: Microsoft Azure Gets One Specific File Identified With Fileid From A Transcription Identified With Id
      operationId: microsoftAzureGettranscriptionfile
      produces:
      - application/json
      parameters:
      - in: path
        name: id
        description: The identifier of the transcription.
        required: true
        type: string
        format: uuid
      - in: path
        name: fileId
        description: The identifier of the file.
        required: true
        type: string
        format: uuid
      - $ref: '#/parameters/sasValidityQueryParameter'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/File'
        default:
          description: An error occurred.
          schema:
            $ref: '#/definitions/Error_2'
      x-ms-examples:
        Get a file:
          $ref: ./examples/get_transcription_file.json
      description: Needs a more full description created.
definitions:
  TranscriptionUpdate:
    title: TranscriptionUpdate
    required:
    - name
    type: object
    properties:
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
  ErrorDetail:
    title: ErrorDetail
    description: An array of implementations of this interface can be used as details for an error.
    required:
    - code
    - message
    type: object
    properties:
      code:
        description: "A service-defined error code that should be human-readable.\r\nThis code serves as a more specific indicator of the error than\r\nthe HTTP error code specified in the response."
        type: string
      message:
        description: "A human-readable representation of the error. It is intended as\r\nan aid to developers and is not suitable for exposure to end users."
        type: string
      target:
        description: The target of the particular error (e.g., the name of the property in error).
        type: string
  ModelKind:
    title: ModelKind
    description: Type of speech model.
    enum:
    - Acoustic
    - Language
    - AcousticAndLanguage
    type: string
    x-ms-enum:
      name: ModelKind
      modelAsString: false
      values:
      - value: Acoustic
        description: An acoustic model.
      - value: Language
        description: A language model.
      - value: AcousticAndLanguage
        description: An acoustic and language model.
  Error_2:
    title: Error
    description: "New format which conforms to the new Cognitive Services API guidelines which is available at https://microsoft.sharepoint.com/%3Aw%3A/t/CognitiveServicesPMO/EUoytcrjuJdKpeOKIK_QRC8BPtUYQpKBi8JsWyeDMRsWlQ?e=CPq8ow.\r\nThis contains an outer error with error code, message, details, target and an inner error with more descriptive details."
    type: object
    properties:
      code:
        $ref: '#/definitions/ErrorCode'
      details:
        description: Additional supportive details regarding the error and/or expected policies.
        type: array
        items:
          $ref: '#/definitions/Error_2'
      message:
        description: High level error message.
        type: string
      target:
        description: "The source of the error.\r\nFor example it would be \"documents\" or \"document id\" in case of invalid document."
        type: string
      innerError:
        $ref: '#/definitions/InnerError'
  TranscriptionDefinition:
    title: TranscriptionDefinition
    required:
    - locale
    - name
    - recordingsUrl
    type: object
    properties:
      recordingsUrl:
        format: uri
        type: string
      models:
        description: The models used in this transcription.
        type: array
        items:
          $ref: '#/definitions/ModelIdentity'
      locale:
        description: The locale of the contained data.
        type: string
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
      properties:
        description: "The custom properties of this entity. The maximum allowed key length is 64 characters, the maximum\r\nallowed value length is 256 characters and the count of allowed entries is 10."
        type: object
        additionalProperties:
          type: string
  File:
    title: File
    type: object
    properties:
      kind:
        $ref: '#/definitions/FileKind'
      links:
        $ref: '#/definitions/FileLinks'
      createdDateTime:
        format: date-time
        description: "The creation time of this file.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      properties:
        $ref: '#/definitions/FileProperties'
      name:
        description: The name of this file.
        type: string
        readOnly: true
      self:
        format: uri
        description: The location of this entity.
        type: string
        readOnly: true
  PaginatedFiles:
    title: PaginatedFiles
    type: object
    properties:
      values:
        description: "A list of entities limited by either the passed query parameters 'skip' and 'top' or their default values.\r\n            \r\nWhen iterating through a list using pagination and deleting entities in parallel, some entities will be skipped in the results.\r\nIt's recommended to build a list on the client and delete after the fetching of the complete list."
        type: array
        items:
          $ref: '#/definitions/File'
        readOnly: true
      '@nextLink':
        format: uri
        description: A link to the next set of paginated results if there are more entities available; otherwise null.
        type: string
        readOnly: true
  Model:
    title: Model
    required:
    - id
    - locale
    - modelKind
    - name
    type: object
    properties:
      id:
        format: uuid
        description: The identifier of this entity.
        type: string
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
      modelKind:
        $ref: '#/definitions/ModelKind'
      text:
        description: The text used to adapt this language model.
        type: string
      baseModel:
        $ref: '#/definitions/Model'
      datasets:
        description: Datasets used for adaptation.
        type: array
        items:
          $ref: '#/definitions/Dataset'
      locale:
        description: The locale of the contained data.
        type: string
      properties:
        description: "The custom properties of this entity. The maximum allowed key length is 64 characters, the maximum\r\nallowed value length is 256 characters and the count of allowed entries is 10."
        type: object
        additionalProperties:
          type: string
      lastActionDateTime:
        format: date-time
        description: "The time-stamp when the current status was entered.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      status:
        $ref: '#/definitions/Status'
      createdDateTime:
        format: date-time
        description: "The time-stamp when the object was created.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
  FileKind:
    title: FileKind
    description: Type of data.
    enum:
    - DatasetReport
    - Audio
    - LanguageData
    - PronunciationData
    - AcousticDataArchive
    - AcousticDataTranscriptionV2
    - Transcription
    - TranscriptionReport
    - EvaluationDetails
    type: string
    readOnly: true
    x-ms-enum:
      name: FileKind
      modelAsString: true
      values:
      - value: DatasetReport
        description: Type of data is dataset report.
      - value: Audio
        description: Type of data is audio.
      - value: LanguageData
        description: Type of data is language data.
      - value: PronunciationData
        description: Type of data is pronunciation data.
      - value: AcousticDataArchive
        description: Type of data is acoustic data archive.
      - value: AcousticDataTranscriptionV2
        description: Type of data is acoustic data transcription v2.
      - value: Transcription
        description: Type of data is transcription.
      - value: TranscriptionReport
        description: Type of data is transcription report.
      - value: EvaluationDetails
        description: Type of data is evaluation details.
  FileLinks:
    title: FileLinks
    type: object
    properties:
      contentUrl:
        format: uri
        description: The url to retrieve the content of this file.
        type: string
        readOnly: true
  Status:
    title: Status
    description: Describe the current state of the API
    enum:
    - NotStarted
    - Running
    - Succeeded
    - Failed
    type: string
    readOnly: true
    x-ms-enum:
      name: Status
      modelAsString: false
      values:
      - value: NotStarted
        description: The long running operation has not yet started.
      - value: Running
        description: The long running operation is currently processing.
      - value: Succeeded
        description: The long running operation has successfully completed.
      - value: Failed
        description: The long running operation has failed.
  Transcription:
    title: Transcription
    required:
    - id
    - locale
    - name
    - recordingsUrl
    type: object
    properties:
      recordingsUrl:
        format: uri
        type: string
      reportFileUrl:
        format: uri
        type: string
        readOnly: true
      id:
        format: uuid
        description: The identifier of this entity.
        type: string
      models:
        description: The models used in this transcription.
        type: array
        items:
          $ref: '#/definitions/Model'
      locale:
        description: The locale of the contained data.
        type: string
      resultsUrls:
        description: The results Urls for the transcription.
        type: object
        additionalProperties:
          type: string
        readOnly: true
      statusMessage:
        description: The failure reason for the transcription.
        type: string
        readOnly: true
      lastActionDateTime:
        format: date-time
        description: "The time-stamp when the current status was entered.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      status:
        $ref: '#/definitions/Status'
      createdDateTime:
        format: date-time
        description: "The time-stamp when the object was created.\r\nThe time stamp is encoded as ISO 8601 date and time format\r\n(\"YYYY-MM-DDThh:mm:ssZ\", see https://en.wikipedia.org/wiki/ISO_8601#Combined_date_and_time_representations)."
        type: string
        readOnly: true
      name:
        description: The name of the object.
        type: string
      description:
        description: The description of the object.
        type: string
      properties:
        description: "The custom properties of this entity. The maximum allowed key length is 64 characters, the maximum\r\nallowed value length is 256 characters and the count of allowed entries is 10."
        type: object
        additionalProperties:
          type: string
  DatasetKind:
    title: DatasetKind
    description: Kind of data import.
    enum:
    - Language
    - Acoustic
    - Pronunciation
    type: string
    x-ms-enum:
      name: DatasetKind
      modelAsString: false
      values:
      - value: Language
        description: A language dataset.
      - value: Acoustic
        description: An acoustic dataset.
      - value: Pronunciation
        description: A pronunciation dataset.
  Error:
    title: Error
    description: The interface represents the content of an error response defined in the OneAPI v2.1 documentation.
    required:
    - code
    - message
    type: object
    properties:
      details:
        description: An array of details representing distinct related errors that occurred during the request.
        type: array
        items:
          $ref: '#/definitions/ErrorDetail'
      innererror:
        $ref: '#/definitions/InnerErrorV2'
      code:
        description: "A service-defined error code that should be human-readable.\r\nThis code serves as a more specific indicator of the error than\r\nthe HTTP error code specified in the response."
        type: string
      message:
        description: "A human-readable representation of the error. It is intended as\r\nan aid to developers and is not suitable for exposure to end users."
        type: string
      target:
        description: The target of the particular error (e.g., the name of the property in error).
        type: string
  FileProperties:
    title: FileProperties
    type: object
    properties:
      size:
        format: int64
        description: The size of the data in bytes.
        type: integer
        readOnly: true
      duration:
        description: "The duration in case this file is an audio file. The duration is encoded as ISO 8601\r\nduration (\"PnYnMnDTnHnMnS\", see https://en.wikipedia.org/wiki/ISO_8601#Durations)."
        type: string
        readOnly: true
  ErrorCode:
    title: ErrorCode
    description: High level error codes.
    enum:
