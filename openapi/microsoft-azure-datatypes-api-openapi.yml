        - create
      stateReason:
        type: string
        description: Reason for the state of data type.
        readOnly: true
      storageOutputRetention:
        type: integer
        format: int32
        description: Field for storage output retention in days.
        x-ms-mutability:
        - read
        - update
        - create
      databaseCacheRetention:
        type: integer
        format: int32
