  Acl:
    type: object
    description: Access Control List (ACL) for an iSCSI Target; defines LUN masking policy
    required:
    - initiatorIqn
    - mappedLuns
    properties:
      initiatorIqn:
        type: string
        description: 'iSCSI initiator IQN (iSCSI Qualified Name); example: "iqn.2005-03.org.iscsi:client".'
      mappedLuns:
        type: array
