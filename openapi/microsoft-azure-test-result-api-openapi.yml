      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
      - $ref: '#/parameters/ResourceGroupParameter'
      - $ref: '#/parameters/TestBaseAccountNameParameter'
      - $ref: '#/parameters/PackageNameParameter'
      - $ref: '#/parameters/TestResultNameParameter'
