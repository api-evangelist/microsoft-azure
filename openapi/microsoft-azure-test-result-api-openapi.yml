      x-ms-pageable:
        nextLinkName: nextLink
      x-ms-examples:
        OSUpdatesList:
          $ref: ./examples/OSUpdatesList.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Testbase Testbaseaccounts Testbaseaccountname Packages Packagename Osupdates
  ? /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.TestBase/testBaseAccounts/{testBaseAccountName}/packages/{packageName}/osUpdates/{osUpdateResourceName}
  : get:
      tags:
      - Test Result
      operationId: microsoftAzureOsupdatesGet
      description: Gets an OS Update by name in which the package was tested before.
      parameters:
      - $ref: '#/parameters/SubscriptionIdParameter'
