        '200':
          description: The operation is completed.
          schema:
            $ref: '#/definitions/TestSummaryResource'
        default:
          description: Error response describing why the operation failed.
          schema:
            $ref: '#/definitions/ErrorResponse'
      x-ms-examples:
        TestSummaryGet:
          $ref: ./examples/TestSummaryGet.json
      summary: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft Testbase Testbaseaccounts Testbaseaccountname Testsummaries Testsummaryname
