naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure RecoveryServicesBackupClient — JobDetails
  description: 'Microsoft Azure RecoveryServicesBackupClient — JobDetails. 1 operations. Lead operation: Microsoft Azure Get
