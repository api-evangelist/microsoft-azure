    namespace: recoveryservicesbackupclient-jobdetails
    baseUri: https://management.azure.com
    description: Microsoft Azure RecoveryServicesBackupClient — JobDetails business capability. Self-contained, no shared
      references.
    resources:
    - name: subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof
      path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.RecoveryServices/vaults/{vaultName}/backupJobs/{jobName}
      operations:
      - name: microsoftazurejobdetailsget
        method: GET
        description: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft
          Recoveryservices Vaults Vaultname Backupjobs Jobname
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobName
          in: path
          type: string
          description: Name of the job whose details are to be fetched.
          required: true
  exposes:
  - type: rest
    namespace: recoveryservicesbackupclient-jobdetails-rest
    port: 8080
    description: REST adapter for Microsoft Azure RecoveryServicesBackupClient — JobDetails. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions/{subscriptionid}/resourcegroups/{resourcegroupname}/providers/microsoft-recoveryservices/vaults/{vaultname}/backupjobs/{jobname}
      name: subscriptions-subscriptionid-resourcegroups-resourcegroupname-providers-microsof
      description: REST surface for subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof.
      operations:
      - method: GET
        name: microsoftazurejobdetailsget
        description: Microsoft Azure Get Subscriptions Subscriptionid Resourcegroups Resourcegroupname Providers Microsoft
          Recoveryservices Vaults Vaultname Backupjobs Jobname
        call: recoveryservicesbackupclient-jobdetails.microsoftazurejobdetailsget
        with:
          jobName: rest.jobName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: recoveryservicesbackupclient-jobdetails-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure RecoveryServicesBackupClient — JobDetails. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
