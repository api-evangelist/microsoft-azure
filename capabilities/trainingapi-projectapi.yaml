        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The id of the project to update
          required: true
        - name: updatedProject
          in: body
          type: string
          description: The updated project model
          required: true
    - name: projects-projectId-iterations
