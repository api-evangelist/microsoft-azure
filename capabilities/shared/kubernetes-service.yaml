naftiko: "1.0.0-alpha1"

info:
  label: "Azure Kubernetes Service"
  description: "Azure Kubernetes Service (AKS) API for managing managed Kubernetes clusters and agent pools."
  tags:
    - Azure
    - Kubernetes
    - AKS
    - Containers
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-aks
      baseUri: https://management.azure.com
      description: "Azure Kubernetes Service API"
      authentication:
        type: bearer
        token: "{{AZURE_MANAGEMENT_TOKEN}}"
      resources:
        - name: managed-clusters
          path: /subscriptions/{subscriptionId}/providers/Microsoft.ContainerService/managedClusters
          description: "Managed cluster operations"
          operations:
            - name: list-clusters
              method: GET
              description: "List all AKS clusters"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-cluster
              method: GET
              description: "Get an AKS cluster"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-or-update-cluster
              method: PUT
              description: "Create or update an AKS cluster"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-cluster
              method: DELETE
              description: "Delete an AKS cluster"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-admin-credentials
              method: POST
              description: "Get cluster admin credentials"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: agent-pools
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/managedClusters/{resourceName}/agentPools
          description: "Agent pool operations"
          operations:
            - name: list-agent-pools
              method: GET
              description: "List agent pools"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-agent-pool
              method: GET
              description: "Get an agent pool"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: resourceName
                  in: path
                  type: string
                  required: true
                  description: "Cluster name"
                - name: agentPoolName
                  in: path
                  type: string
                  required: true
                  description: "Agent pool name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9104
      namespace: azure-aks-mcp
      transport: http
      tools:
        - name: list-clusters
          description: "List AKS clusters"
          hints:
            readOnly: true
          call: "azure-aks.list-clusters"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cluster
          description: "Get AKS cluster details"
          hints:
            readOnly: true
          call: "azure-aks.get-cluster"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            resourceName: "tools.resourceName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-agent-pools
          description: "List cluster agent pools"
          hints:
            readOnly: true
          call: "azure-aks.list-agent-pools"
          with:
            subscriptionId: "tools.subscriptionId"
            resourceGroupName: "tools.resourceGroupName"
            resourceName: "tools.resourceName"
          outputParameters:
            - type: object
              mapping: "$."
