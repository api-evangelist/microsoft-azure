naftiko: "1.0.0-alpha1"

info:
  label: "Azure Cognitive Services"
  description: "Azure Cognitive Services Management API for managing AI service accounts, deployments, keys, and models."
  tags:
    - Azure
    - Cognitive Services
    - AI
    - Machine Learning
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-cognitive
      baseUri: https://management.azure.com
      description: "Azure Cognitive Services Management API"
      authentication:
        type: bearer
        token: "{{AZURE_MANAGEMENT_TOKEN}}"
      resources:
        - name: accounts
          path: /subscriptions/{subscriptionId}/providers/Microsoft.CognitiveServices/accounts
          description: "Cognitive Services account management"
          operations:
            - name: list-accounts
              method: GET
              description: "List Cognitive Services accounts"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account
              method: GET
              description: "Get a Cognitive Services account"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: accountName
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: PUT
              description: "Create a Cognitive Services account"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: accountName
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-account
              method: DELETE
              description: "Delete a Cognitive Services account"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: accountName
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-keys
              method: POST
              description: "List account keys"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
                - name: accountName
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-models
              method: GET
              description: "List available models"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9107
      namespace: azure-cognitive-mcp
      transport: http
      tools:
        - name: list-accounts
          description: "List Cognitive Services accounts"
          hints:
            readOnly: true
          call: "azure-cognitive.list-accounts"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-models
          description: "List available AI models"
          hints:
            readOnly: true
          call: "azure-cognitive.list-models"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
