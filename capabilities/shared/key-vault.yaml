naftiko: "1.0.0-alpha1"

info:
  label: "Azure Key Vault"
  description: "Azure Key Vault API for managing cryptographic keys, secrets, and certificates."
  tags:
    - Azure
    - Key Vault
    - Security
    - Secrets
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_KEY_VAULT_TOKEN: AZURE_KEY_VAULT_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-keyvault
      baseUri: https://{vaultName}.vault.azure.net
      description: "Azure Key Vault API"
      authentication:
        type: bearer
        token: "{{AZURE_KEY_VAULT_TOKEN}}"
      resources:
        - name: keys
          path: /keys
          description: "Cryptographic key management"
          operations:
            - name: list-keys
              method: GET
              description: "List keys in the vault"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-key
              method: POST
              description: "Create a cryptographic key"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-key
              method: GET
              description: "Get a key by name"
              inputParameters:
                - name: keyName
                  in: path
                  type: string
                  required: true
                  description: "Key name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-key
              method: PATCH
              description: "Update key attributes"
              inputParameters:
                - name: keyName
                  in: path
                  type: string
                  required: true
                  description: "Key name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-key
              method: DELETE
              description: "Delete a key"
              inputParameters:
                - name: keyName
                  in: path
                  type: string
                  required: true
                  description: "Key name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: secrets
          path: /secrets
          description: "Secret management"
          operations:
            - name: list-secrets
              method: GET
              description: "List secrets in the vault"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: set-secret
              method: PUT
              description: "Set a secret"
              inputParameters:
                - name: secretName
                  in: path
                  type: string
                  required: true
                  description: "Secret name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-secret
              method: GET
              description: "Get a secret value"
              inputParameters:
                - name: secretName
                  in: path
                  type: string
                  required: true
                  description: "Secret name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-secret
              method: DELETE
              description: "Delete a secret"
              inputParameters:
                - name: secretName
                  in: path
                  type: string
                  required: true
                  description: "Secret name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: certificates
          path: /certificates
          description: "Certificate management"
          operations:
            - name: list-certificates
              method: GET
              description: "List certificates"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-certificate
              method: POST
              description: "Create a certificate"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9102
      namespace: azure-keyvault-mcp
      transport: http
      tools:
        - name: list-keys
          description: "List cryptographic keys"
          hints:
            readOnly: true
          call: "azure-keyvault.list-keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-secrets
          description: "List secrets"
          hints:
            readOnly: true
          call: "azure-keyvault.list-secrets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-certificates
          description: "List certificates"
          hints:
            readOnly: true
          call: "azure-keyvault.list-certificates"
          outputParameters:
            - type: object
              mapping: "$."
