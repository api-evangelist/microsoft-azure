naftiko: "1.0.0-alpha1"

info:
  label: "Azure OpenAI Service"
  description: "Azure OpenAI Service API for chat completions, text completions, embeddings, image generation, audio transcription, and model management."
  tags:
    - Azure
    - OpenAI
    - AI
    - Large Language Models
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_OPENAI_API_KEY: AZURE_OPENAI_API_KEY

capability:
  consumes:
    - type: http
      namespace: azure-openai
      baseUri: https://{endpoint}/openai
      description: "Azure OpenAI Service API"
      authentication:
        type: apikey
        key: api-key
        value: "{{AZURE_OPENAI_API_KEY}}"
        placement: header
      resources:
        - name: chat-completions
          path: /deployments/{deployment-id}/chat/completions
          description: "Chat completion operations"
          operations:
            - name: create-chat-completion
              method: POST
              description: "Create a chat completion"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: completions
          path: /deployments/{deployment-id}/completions
          description: "Text completion operations"
          operations:
            - name: create-completion
              method: POST
              description: "Create a text completion"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: embeddings
          path: /deployments/{deployment-id}/embeddings
          description: "Embedding operations"
          operations:
            - name: create-embedding
              method: POST
              description: "Create text embeddings"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: images
          path: /deployments/{deployment-id}/images/generations
          description: "Image generation operations"
          operations:
            - name: create-image
              method: POST
              description: "Generate images from text"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: audio
          path: /deployments/{deployment-id}/audio
          description: "Audio operations"
          operations:
            - name: create-transcription
              method: POST
              description: "Transcribe audio to text"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-translation
              method: POST
              description: "Translate audio to English text"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-speech
              method: POST
              description: "Generate speech from text"
              inputParameters:
                - name: deployment-id
                  in: path
                  type: string
                  required: true
                  description: "Deployment ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: models
          path: /models
          description: "Model operations"
          operations:
            - name: list-models
              method: GET
              description: "List available models"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployments
          path: /deployments
          description: "Deployment operations"
          operations:
            - name: list-deployments
              method: GET
              description: "List model deployments"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9101
      namespace: azure-openai-mcp
      transport: http
      tools:
        - name: create-chat-completion
          description: "Create a chat completion"
          hints:
            readOnly: false
          call: "azure-openai.create-chat-completion"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-embedding
          description: "Create text embeddings"
          hints:
            readOnly: true
          call: "azure-openai.create-embedding"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-models
          description: "List available models"
          hints:
            readOnly: true
          call: "azure-openai.list-models"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-deployments
          description: "List model deployments"
          hints:
            readOnly: true
          call: "azure-openai.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."
