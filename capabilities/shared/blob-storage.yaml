naftiko: "1.0.0-alpha1"

info:
  label: "Azure Blob Storage"
  description: "Azure Blob Storage REST API for managing containers and blobs including upload, download, delete, and property management."
  tags:
    - Azure
    - Blob Storage
    - Object Storage
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_STORAGE_KEY: AZURE_STORAGE_KEY

capability:
  consumes:
    - type: http
      namespace: azure-blob
      baseUri: https://{accountName}.blob.core.windows.net
      description: "Azure Blob Storage API"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AZURE_STORAGE_KEY}}"
        placement: header
      resources:
        - name: service
          path: /
          description: "Service-level operations"
          operations:
            - name: get-service-properties
              method: GET
              description: "Get blob service properties"
              inputParameters:
                - name: restype
                  in: query
                  type: string
                  required: true
                  description: "Resource type (service)"
                - name: comp
                  in: query
                  type: string
                  required: true
                  description: "Component (properties)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: containers
          path: /{containerName}
          description: "Container operations"
          operations:
            - name: create-container
              method: PUT
              description: "Create a blob container"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-blobs
              method: GET
              description: "List blobs in a container"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-container
              method: DELETE
              description: "Delete a blob container"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: blobs
          path: /{containerName}/{blobName}
          description: "Blob operations"
          operations:
            - name: download-blob
              method: GET
              description: "Download a blob"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
                - name: blobName
                  in: path
                  type: string
                  required: true
                  description: "Blob name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: upload-blob
              method: PUT
              description: "Upload a blob"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
                - name: blobName
                  in: path
                  type: string
                  required: true
                  description: "Blob name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-blob
              method: DELETE
              description: "Delete a blob"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
                - name: blobName
                  in: path
                  type: string
                  required: true
                  description: "Blob name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-blob-properties
              method: HEAD
              description: "Get blob properties"
              inputParameters:
                - name: containerName
                  in: path
                  type: string
                  required: true
                  description: "Container name"
                - name: blobName
                  in: path
                  type: string
                  required: true
                  description: "Blob name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9100
      namespace: azure-blob-mcp
      transport: http
      tools:
        - name: list-blobs
          description: "List blobs in a container"
          hints:
            readOnly: true
          call: "azure-blob.list-blobs"
          with:
            containerName: "tools.containerName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: download-blob
          description: "Download a blob"
          hints:
            readOnly: true
          call: "azure-blob.download-blob"
          with:
            containerName: "tools.containerName"
            blobName: "tools.blobName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-blob-properties
          description: "Get blob properties"
          hints:
            readOnly: true
          call: "azure-blob.get-blob-properties"
          with:
            containerName: "tools.containerName"
            blobName: "tools.blobName"
          outputParameters:
            - type: object
              mapping: "$."
