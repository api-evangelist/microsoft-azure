naftiko: "1.0.0-alpha1"

info:
  label: "Azure Cosmos DB"
  description: "Azure Cosmos DB REST API for managing databases, containers, items, and stored procedures."
  tags:
    - Azure
    - Cosmos DB
    - NoSQL
    - Database
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_COSMOS_KEY: AZURE_COSMOS_KEY

capability:
  consumes:
    - type: http
      namespace: azure-cosmos
      baseUri: https://{accountName}.documents.azure.com
      description: "Azure Cosmos DB REST API"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AZURE_COSMOS_KEY}}"
        placement: header
      resources:
        - name: databases
          path: /dbs
          description: "Database operations"
          operations:
            - name: list-databases
              method: GET
              description: "List databases"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-database
              method: POST
              description: "Create a database"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-database
              method: GET
              description: "Get a database"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-database
              method: DELETE
              description: "Delete a database"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: containers
          path: /dbs/{databaseId}/colls
          description: "Container operations"
          operations:
            - name: list-containers
              method: GET
              description: "List containers in a database"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-container
              method: POST
              description: "Create a container"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: items
          path: /dbs/{databaseId}/colls/{containerId}/docs
          description: "Item (document) operations"
          operations:
            - name: list-items
              method: GET
              description: "List items in a container"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
                - name: containerId
                  in: path
                  type: string
                  required: true
                  description: "Container ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-item
              method: POST
              description: "Create an item"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
                - name: containerId
                  in: path
                  type: string
                  required: true
                  description: "Container ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stored-procedures
          path: /dbs/{databaseId}/colls/{containerId}/sprocs
          description: "Stored procedure operations"
          operations:
            - name: list-stored-procedures
              method: GET
              description: "List stored procedures"
              inputParameters:
                - name: databaseId
                  in: path
                  type: string
                  required: true
                  description: "Database ID"
                - name: containerId
                  in: path
                  type: string
                  required: true
                  description: "Container ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9105
      namespace: azure-cosmos-mcp
      transport: http
      tools:
        - name: list-databases
          description: "List Cosmos DB databases"
          hints:
            readOnly: true
          call: "azure-cosmos.list-databases"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-containers
          description: "List containers in a database"
          hints:
            readOnly: true
          call: "azure-cosmos.list-containers"
          with:
            databaseId: "tools.databaseId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-items
          description: "List items in a container"
          hints:
            readOnly: true
          call: "azure-cosmos.list-items"
          with:
            databaseId: "tools.databaseId"
            containerId: "tools.containerId"
          outputParameters:
            - type: object
              mapping: "$."
