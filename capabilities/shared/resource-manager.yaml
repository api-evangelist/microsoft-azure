naftiko: "1.0.0-alpha1"

info:
  label: "Azure Resource Manager"
  description: "Azure Resource Manager API for managing subscriptions, resource groups, resources, deployments, providers, and tags."
  tags:
    - Azure
    - Resource Manager
    - ARM
    - Infrastructure
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN

capability:
  consumes:
    - type: http
      namespace: azure-arm
      baseUri: https://management.azure.com
      description: "Azure Resource Manager API"
      authentication:
        type: bearer
        token: "{{AZURE_MANAGEMENT_TOKEN}}"
      resources:
        - name: subscriptions
          path: /subscriptions
          description: "Subscription management"
          operations:
            - name: list-subscriptions
              method: GET
              description: "List subscriptions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-subscription
              method: GET
              description: "Get a subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: resource-groups
          path: /subscriptions/{subscriptionId}/resourcegroups
          description: "Resource group management"
          operations:
            - name: list-resource-groups
              method: GET
              description: "List resource groups"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-resource-group
              method: GET
              description: "Get a resource group"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-resource-group
              method: PUT
              description: "Create or update a resource group"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-resource-group
              method: DELETE
              description: "Delete a resource group"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: resources
          path: /subscriptions/{subscriptionId}/resources
          description: "Resource management"
          operations:
            - name: list-resources
              method: GET
              description: "List resources in a subscription"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: deployments
          path: /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.Resources/deployments
          description: "Deployment management"
          operations:
            - name: create-deployment
              method: PUT
              description: "Create or update a deployment"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-deployment
              method: GET
              description: "Get a deployment"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
                - name: resourceGroupName
                  in: path
                  type: string
                  required: true
                  description: "Resource group name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: providers
          path: /subscriptions/{subscriptionId}/providers
          description: "Provider management"
          operations:
            - name: list-providers
              method: GET
              description: "List resource providers"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tags
          path: /subscriptions/{subscriptionId}/tagNames
          description: "Tag management"
          operations:
            - name: list-tags
              method: GET
              description: "List subscription tags"
              inputParameters:
                - name: subscriptionId
                  in: path
                  type: string
                  required: true
                  description: "Subscription ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9103
      namespace: azure-arm-mcp
      transport: http
      tools:
        - name: list-subscriptions
          description: "List Azure subscriptions"
          hints:
            readOnly: true
          call: "azure-arm.list-subscriptions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-resource-groups
          description: "List resource groups"
          hints:
            readOnly: true
          call: "azure-arm.list-resource-groups"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-resources
          description: "List resources in a subscription"
          hints:
            readOnly: true
          call: "azure-arm.list-resources"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
