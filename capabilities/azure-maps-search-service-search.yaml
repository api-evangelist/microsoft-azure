        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: searchAddressBatchRequestBody
          in: body
          type: string
          description: The list of address geocoding queries/requests to process. The list can contain  a max of 10,000 queries
            and must contain at least 1 query.
          required: true
    - name: search-address-reverse-batch-format
