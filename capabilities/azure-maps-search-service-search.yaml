naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure Maps Search Service — Search
  description: 'Microsoft Azure Azure Maps Search Service — Search. 15 operations. Lead operation: Microsoft Azure Post Search
    Address Batch Format. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
