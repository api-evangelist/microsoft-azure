naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Computer Vision API — Ocr
  description: 'Microsoft Azure Computer Vision API — Ocr. 1 operations. Lead operation: Microsoft Azure Post Ocr. Self-contained
    Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Ocr
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: computer-vision-ocr
    baseUri: ''
    description: Microsoft Azure Computer Vision API — Ocr business capability. Self-contained, no shared references.
    resources:
    - name: ocr
      path: /ocr
      operations:
      - name: microsoftazurerecognizeprintedtext
        method: POST
        description: Microsoft Azure Post Ocr
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: computer-vision-ocr-rest
    port: 8080
    description: REST adapter for Microsoft Azure Computer Vision API — Ocr. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/ocr
      name: ocr
      description: REST surface for ocr.
      operations:
      - method: POST
        name: microsoftazurerecognizeprintedtext
        description: Microsoft Azure Post Ocr
        call: computer-vision-ocr.microsoftazurerecognizeprintedtext
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: computer-vision-ocr-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Computer Vision API — Ocr. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-post-ocr
      description: Microsoft Azure Post Ocr
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: computer-vision-ocr.microsoftazurerecognizeprintedtext
      outputParameters:
      - type: object
        mapping: $.
