    resources:
    - name: scenes
      path: /scenes
      operations:
      - name: microsoftazuresceneslist
        method: GET
        description: Microsoft Azure Get Scenes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: provider
          in: query
          type: string
          description: Provider name of scene data.
          required: true
        - name: partyId
          in: query
          type: string
          description: PartyId.
          required: true
        - name: boundaryId
          in: query
          type: string
          description: BoundaryId.
          required: true
        - name: source
          in: query
          type: string
          description: 'Source name of scene data, Available Values: Sentinel_2_L2A, Sentinel_2_L1C.'
