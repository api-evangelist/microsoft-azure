naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Microsoft NetApp — Pool Change
  description: 'Microsoft Azure Microsoft NetApp — Pool Change. 1 operations. Lead operation: Microsoft Azure Change Pool
    For Volume. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Pool Change
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: microsoft-netapp-pool-change
    baseUri: https://management.azure.com
    description: Microsoft Azure Microsoft NetApp — Pool Change business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof
      path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.NetApp/netAppAccounts/{accountName}/capacityPools/{poolName}/volumes/{volumeName}/poolChange
      operations:
      - name: microsoftazurevolumespoolchange
        method: POST
        description: Microsoft Azure Change Pool For Volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          description: Move volume to the pool supplied in the body of the operation.
          required: true
  exposes:
  - type: rest
    namespace: microsoft-netapp-pool-change-rest
    port: 8080
    description: REST adapter for Microsoft Azure Microsoft NetApp — Pool Change. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions/{subscriptionid}/resourcegroups/{resourcegroupname}/providers/microsoft-netapp/netappaccounts/{accountname}/capacitypools/{poolname}/volumes/{volumename}/poolchange
      name: subscriptions-subscriptionid-resourcegroups-resourcegroupname-providers-microsof
      description: REST surface for subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof.
      operations:
      - method: POST
        name: microsoftazurevolumespoolchange
        description: Microsoft Azure Change Pool For Volume
        call: microsoft-netapp-pool-change.microsoftazurevolumespoolchange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: microsoft-netapp-pool-change-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Microsoft NetApp — Pool Change. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-change-pool-volume
      description: Microsoft Azure Change Pool For Volume
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: microsoft-netapp-pool-change.microsoftazurevolumespoolchange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
