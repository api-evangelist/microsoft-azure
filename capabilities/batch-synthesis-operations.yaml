    resources:
    - name: operations-id
      path: /operations/{id}
      operations:
      - name: microsoftazureoperationsget
        method: GET
        description: Microsoft Azure Get Operations Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
