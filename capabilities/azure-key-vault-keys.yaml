naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure Key Vault API — Keys
  description: 'Microsoft Azure Azure Key Vault API — Keys. 5 operations. Lead operation: Microsoft Azure List Keys. Self-contained
    Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-key-vault-keys
    baseUri: https://{vaultName}.vault.azure.net
    description: Microsoft Azure Azure Key Vault API — Keys business capability. Self-contained, no shared references.
    resources:
    - name: keys
      path: /keys
      operations:
      - name: keyslist
        method: GET
        description: Microsoft Azure List Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxresults
          in: query
          type: integer
          description: Maximum number of results to return in a page (1-25).
    - name: keys-key-name
      path: /keys/{key-name}
      operations:
      - name: keysdelete
        method: DELETE
        description: Microsoft Azure Delete a Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key-name
          in: path
          type: string
          description: The name of the key to delete.
          required: true
    - name: keys-key-name-create
      path: /keys/{key-name}/create
      operations:
      - name: keyscreate
        method: POST
        description: Microsoft Azure Create a Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key-name
          in: path
          type: string
          description: The name for the new key.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: keys-key-name-key-version
      path: /keys/{key-name}/{key-version}
      operations:
      - name: keysget
        method: GET
        description: Microsoft Azure Get a Key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key-name
          in: path
          type: string
          description: The name of the key.
          required: true
        - name: key-version
          in: path
          type: string
          description: The version of the key. Use an empty string to get the latest version.
          required: true
      - name: keysupdate
        method: PATCH
        description: Microsoft Azure Update Key Attributes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key-name
          in: path
          type: string
          description: The name of the key.
          required: true
        - name: key-version
          in: path
          type: string
          description: The version of the key.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-key-vault-keys-rest
    port: 8080
    description: REST adapter for Microsoft Azure Azure Key Vault API — Keys. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/keys
      name: keys
      description: REST surface for keys.
      operations:
      - method: GET
        name: keyslist
        description: Microsoft Azure List Keys
        call: azure-key-vault-keys.keyslist
        with:
          maxresults: rest.maxresults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/keys/{key-name}
      name: keys-key-name
      description: REST surface for keys-key-name.
      operations:
      - method: DELETE
        name: keysdelete
        description: Microsoft Azure Delete a Key
        call: azure-key-vault-keys.keysdelete
        with:
          key-name: rest.key-name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/keys/{key-name}/create
      name: keys-key-name-create
      description: REST surface for keys-key-name-create.
      operations:
      - method: POST
        name: keyscreate
        description: Microsoft Azure Create a Key
        call: azure-key-vault-keys.keyscreate
        with:
          key-name: rest.key-name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/keys/{key-name}/{key-version}
      name: keys-key-name-key-version
      description: REST surface for keys-key-name-key-version.
      operations:
      - method: GET
        name: keysget
        description: Microsoft Azure Get a Key
        call: azure-key-vault-keys.keysget
        with:
          key-name: rest.key-name
          key-version: rest.key-version
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: keysupdate
        description: Microsoft Azure Update Key Attributes
        call: azure-key-vault-keys.keysupdate
        with:
          key-name: rest.key-name
          key-version: rest.key-version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-key-vault-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Azure Key Vault API — Keys. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-list-keys
      description: Microsoft Azure List Keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-key-vault-keys.keyslist
      with:
        maxresults: tools.maxresults
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-delete-key
      description: Microsoft Azure Delete a Key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: azure-key-vault-keys.keysdelete
      with:
        key-name: tools.key-name
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-create-key
      description: Microsoft Azure Create a Key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: azure-key-vault-keys.keyscreate
      with:
        key-name: tools.key-name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-key
      description: Microsoft Azure Get a Key
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-key-vault-keys.keysget
      with:
        key-name: tools.key-name
        key-version: tools.key-version
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-update-key-attributes
      description: Microsoft Azure Update Key Attributes
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: azure-key-vault-keys.keysupdate
      with:
        key-name: tools.key-name
        key-version: tools.key-version
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
