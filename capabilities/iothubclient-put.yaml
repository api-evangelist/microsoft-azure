          required: true
        - name: name
          in: path
          type: string
          description: The name of the consumer group to add.
          required: true
        - name: consumerGroupBody
          in: body
          type: string
          description: The consumer group to add.
          required: true
    - name: subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof
