      description: Microsoft Azure Issue A New Token For An Identity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: communicationidentityclient-token.microsoftazurecommunicationidentityissueaccesstoken
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
