naftiko: "1.0.0-alpha1"

info:
  label: "Azure AI and Cognitive Services"
  description: "Unified workflow for Azure AI capabilities combining OpenAI Service for generative AI and Cognitive Services for account and model management. Used by AI engineers, ML ops teams, and application developers building intelligent applications."
  tags:
    - Azure
    - AI
    - OpenAI
    - Cognitive Services
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AZURE_OPENAI_API_KEY: AZURE_OPENAI_API_KEY
      AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN

capability:
  consumes:
    - import: azure-openai
      location: ./shared/openai-service.yaml
    - import: azure-cognitive
      location: ./shared/cognitive-services.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: azure-ai-api
      description: "Unified REST API for Azure AI services."
      resources:
        - path: /v1/chat/completions
          name: chat-completions
          description: "Chat completion operations"
          operations:
            - method: POST
              name: create-chat-completion
              description: "Create a chat completion"
              call: "azure-openai.create-chat-completion"
              with:
                deployment-id: "rest.deploymentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/embeddings
          name: embeddings
          description: "Embedding operations"
          operations:
            - method: POST
              name: create-embedding
              description: "Create text embeddings"
              call: "azure-openai.create-embedding"
              with:
                deployment-id: "rest.deploymentId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/models
          name: models
          description: "Model listing"
          operations:
            - method: GET
              name: list-openai-models
              description: "List OpenAI models"
              call: "azure-openai.list-models"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts
          name: accounts
          description: "Cognitive Services accounts"
          operations:
            - method: GET
              name: list-cognitive-accounts
              description: "List Cognitive Services accounts"
              call: "azure-cognitive.list-accounts"
              with:
                subscriptionId: "rest.subscriptionId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: azure-ai-mcp
      transport: http
      description: "MCP server for AI-assisted Azure AI operations."
      tools:
        - name: openai-create-chat-completion
          description: "Create a chat completion using Azure OpenAI"
          hints:
            readOnly: false
          call: "azure-openai.create-chat-completion"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-completion
          description: "Create a text completion"
          hints:
            readOnly: false
          call: "azure-openai.create-completion"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-embedding
          description: "Create text embeddings"
          hints:
            readOnly: true
          call: "azure-openai.create-embedding"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-image
          description: "Generate images from text"
          hints:
            readOnly: false
          call: "azure-openai.create-image"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-transcription
          description: "Transcribe audio to text"
          hints:
            readOnly: true
          call: "azure-openai.create-transcription"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-translation
          description: "Translate audio to English"
          hints:
            readOnly: true
          call: "azure-openai.create-translation"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-create-speech
          description: "Generate speech from text"
          hints:
            readOnly: false
          call: "azure-openai.create-speech"
          with:
            deployment-id: "tools.deploymentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-list-models
          description: "List available OpenAI models"
          hints:
            readOnly: true
          call: "azure-openai.list-models"
          outputParameters:
            - type: object
              mapping: "$."
        - name: openai-list-deployments
          description: "List model deployments"
          hints:
            readOnly: true
          call: "azure-openai.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cognitive-list-accounts
          description: "List Cognitive Services accounts"
          hints:
            readOnly: true
          call: "azure-cognitive.list-accounts"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cognitive-list-models
          description: "List available AI models"
          hints:
            readOnly: true
          call: "azure-cognitive.list-models"
          with:
            subscriptionId: "tools.subscriptionId"
          outputParameters:
            - type: object
              mapping: "$."
