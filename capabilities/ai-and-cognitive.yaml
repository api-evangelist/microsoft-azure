naftiko: 1.0.0-alpha2
info:
  label: Azure AI and Cognitive Services
  description: Unified workflow for Azure AI capabilities combining OpenAI Service for generative AI and Cognitive Services
    for account and model management. Used by AI engineers, ML ops teams, and application developers building intelligent
    applications.
  tags:
  - Azure
  - AI
  - OpenAI
  - Cognitive Services
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AZURE_OPENAI_API_KEY: AZURE_OPENAI_API_KEY
    AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN
capability:
  consumes:
  - type: http
    namespace: azure-openai
    baseUri: https://{endpoint}/openai
    description: Azure OpenAI Service API
    authentication:
      type: apikey
      key: api-key
      value: '{{AZURE_OPENAI_API_KEY}}'
      placement: header
    resources:
    - name: chat-completions
      path: /deployments/{deployment-id}/chat/completions
      description: Chat completion operations
      operations:
      - name: create-chat-completion
        method: POST
        description: Create a chat completion
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: completions
      path: /deployments/{deployment-id}/completions
      description: Text completion operations
      operations:
      - name: create-completion
        method: POST
        description: Create a text completion
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: embeddings
      path: /deployments/{deployment-id}/embeddings
      description: Embedding operations
      operations:
      - name: create-embedding
        method: POST
        description: Create text embeddings
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: images
      path: /deployments/{deployment-id}/images/generations
      description: Image generation operations
      operations:
      - name: create-image
        method: POST
        description: Generate images from text
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: audio
      path: /deployments/{deployment-id}/audio
      description: Audio operations
      operations:
      - name: create-transcription
        method: POST
        description: Transcribe audio to text
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-translation
        method: POST
        description: Translate audio to English text
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-speech
        method: POST
        description: Generate speech from text
        inputParameters:
        - name: deployment-id
          in: path
          type: string
          required: true
          description: Deployment ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: models
      path: /models
      description: Model operations
      operations:
      - name: list-models
        method: GET
        description: List available models
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments
      path: /deployments
      description: Deployment operations
      operations:
      - name: list-deployments
        method: GET
        description: List model deployments
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: azure-cognitive
    baseUri: https://management.azure.com
    description: Azure Cognitive Services Management API
    authentication:
      type: bearer
      token: '{{AZURE_MANAGEMENT_TOKEN}}'
    resources:
    - name: accounts
      path: /subscriptions/{subscriptionId}/providers/Microsoft.CognitiveServices/accounts
      description: Cognitive Services account management
      operations:
      - name: list-accounts
        method: GET
        description: List Cognitive Services accounts
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-account
        method: GET
        description: Get a Cognitive Services account
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: accountName
          in: path
          type: string
          required: true
          description: Account name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-account
        method: PUT
        description: Create a Cognitive Services account
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: accountName
          in: path
          type: string
          required: true
          description: Account name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-account
        method: DELETE
        description: Delete a Cognitive Services account
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: accountName
          in: path
          type: string
          required: true
          description: Account name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-keys
        method: POST
        description: List account keys
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: accountName
          in: path
          type: string
          required: true
          description: Account name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-models
        method: GET
        description: List available models
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: azure-ai-api
    description: Unified REST API for Azure AI services.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: Chat completion operations
      operations:
      - method: POST
        name: create-chat-completion
        description: Create a chat completion
        call: azure-openai.create-chat-completion
        with:
          deployment-id: rest.deploymentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/embeddings
      name: embeddings
      description: Embedding operations
      operations:
      - method: POST
        name: create-embedding
        description: Create text embeddings
        call: azure-openai.create-embedding
        with:
          deployment-id: rest.deploymentId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models
      name: models
      description: Model listing
      operations:
      - method: GET
        name: list-openai-models
        description: List OpenAI models
        call: azure-openai.list-models
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accounts
      name: accounts
      description: Cognitive Services accounts
      operations:
      - method: GET
        name: list-cognitive-accounts
        description: List Cognitive Services accounts
        call: azure-cognitive.list-accounts
        with:
          subscriptionId: rest.subscriptionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: azure-ai-mcp
    transport: http
    description: MCP server for AI-assisted Azure AI operations.
    tools:
    - name: openai-create-chat-completion
      description: Create a chat completion using Azure OpenAI
      hints:
        readOnly: false
      call: azure-openai.create-chat-completion
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-completion
      description: Create a text completion
      hints:
        readOnly: false
      call: azure-openai.create-completion
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-embedding
      description: Create text embeddings
      hints:
        readOnly: true
      call: azure-openai.create-embedding
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-image
      description: Generate images from text
      hints:
        readOnly: false
      call: azure-openai.create-image
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-transcription
      description: Transcribe audio to text
      hints:
        readOnly: true
      call: azure-openai.create-transcription
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-translation
      description: Translate audio to English
      hints:
        readOnly: true
      call: azure-openai.create-translation
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-create-speech
      description: Generate speech from text
      hints:
        readOnly: false
      call: azure-openai.create-speech
      with:
        deployment-id: tools.deploymentId
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-list-models
      description: List available OpenAI models
      hints:
        readOnly: true
      call: azure-openai.list-models
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-list-deployments
      description: List model deployments
      hints:
        readOnly: true
      call: azure-openai.list-deployments
      outputParameters:
      - type: object
        mapping: $.
    - name: cognitive-list-accounts
      description: List Cognitive Services accounts
      hints:
        readOnly: true
      call: azure-cognitive.list-accounts
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: cognitive-list-models
      description: List available AI models
      hints:
        readOnly: true
      call: azure-cognitive.list-models
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
