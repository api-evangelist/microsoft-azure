      path: /credentials/{credentialId}
      operations:
      - name: microsoftazureupdatecredential
        method: PATCH
        description: Microsoft Azure Update A Data Source Credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: credentialId
          in: path
          type: string
          description: Data source credential unique ID
          required: true
        - name: body
          in: body
          type: string
          description: Update data source credential request
          required: true
      - name: microsoftazuredeletecredential
        method: DELETE
        description: Microsoft Azure Delete A Data Source Credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: credentialId
          in: path
          type: string
          description: Data source credential unique ID
          required: true
      - name: microsoftazuregetcredential
        method: GET
        description: Microsoft Azure Get A Data Source Credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: credentialId
          in: path
          type: string
          description: Data source credential unique ID
          required: true
  exposes:
