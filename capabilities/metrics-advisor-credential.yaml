        destructive: true
        idempotent: true
      call: metrics-advisor-credential.microsoftazuredeletecredential
      with:
        credentialId: tools.credentialId
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-data-source
      description: Microsoft Azure Get A Data Source Credential
      hints:
