naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure OpenAI — Files
  description: 'Microsoft Azure Azure OpenAI — Files. 4 operations. Lead operation: Microsoft Azure Get Files. Self-contained
    Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-openai-files
    baseUri: ''
    description: Microsoft Azure Azure OpenAI — Files business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: microsoftazurelistfiles
        method: GET
        description: Microsoft Azure Get Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: purpose
          in: query
          type: string
          description: A value that, when provided, limits list results to files matching the corresponding purpose.
      - name: microsoftazurecreatefile
        method: POST
        description: Microsoft Azure Post Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: file
          in: formData
          type: file
          description: The file data (not filename) to upload.
          required: true
        - name: purpose
          in: formData
          type: string
          description: The intended purpose of the file.
          required: true
        - name: filename
          in: formData
          type: string
          description: A filename to associate with the uploaded data.
    - name: files-fileId
      path: /files/{fileId}
      operations:
      - name: microsoftazureretrievefile
        method: GET
        description: Microsoft Azure Get Files Fileid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          description: The ID of the file to retrieve.
          required: true
      - name: microsoftazuredeletefile
        method: DELETE
        description: Microsoft Azure Delete Files Fileid
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          description: The ID of the file to delete.
          required: true
  exposes:
  - type: rest
    namespace: azure-openai-files-rest
    port: 8080
    description: REST adapter for Microsoft Azure Azure OpenAI — Files. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: microsoftazurelistfiles
        description: Microsoft Azure Get Files
        call: azure-openai-files.microsoftazurelistfiles
        with:
          purpose: rest.purpose
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: microsoftazurecreatefile
        description: Microsoft Azure Post Files
        call: azure-openai-files.microsoftazurecreatefile
        with:
          file: rest.file
          purpose: rest.purpose
          filename: rest.filename
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{fileid}
      name: files-fileid
      description: REST surface for files-fileId.
      operations:
      - method: GET
        name: microsoftazureretrievefile
        description: Microsoft Azure Get Files Fileid
        call: azure-openai-files.microsoftazureretrievefile
        with:
          fileId: rest.fileId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: microsoftazuredeletefile
        description: Microsoft Azure Delete Files Fileid
        call: azure-openai-files.microsoftazuredeletefile
        with:
          fileId: rest.fileId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-openai-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Azure OpenAI — Files. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: microsoft-azure-get-files
      description: Microsoft Azure Get Files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-openai-files.microsoftazurelistfiles
      with:
        purpose: tools.purpose
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-post-files
      description: Microsoft Azure Post Files
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: azure-openai-files.microsoftazurecreatefile
      with:
        file: tools.file
        purpose: tools.purpose
        filename: tools.filename
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-files-fileid
      description: Microsoft Azure Get Files Fileid
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-openai-files.microsoftazureretrievefile
      with:
        fileId: tools.fileId
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-delete-files-fileid
      description: Microsoft Azure Delete Files Fileid
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: azure-openai-files.microsoftazuredeletefile
      with:
        fileId: tools.fileId
      outputParameters:
      - type: object
        mapping: $.
