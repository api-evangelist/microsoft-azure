naftiko: 1.0.0-alpha2
info:
  label: Azure Data and Security
  description: Unified workflow for Azure data infrastructure and security combining Cosmos DB for NoSQL data, Blob Storage
    for object storage, Key Vault for secrets management, and Resource Manager for infrastructure governance. Used by cloud
    architects, data engineers, and security teams.
  tags:
  - Azure
  - Cosmos DB
  - Blob Storage
  - Key Vault
  - Resource Manager
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN
    AZURE_COSMOS_KEY: AZURE_COSMOS_KEY
    AZURE_STORAGE_KEY: AZURE_STORAGE_KEY
    AZURE_KEY_VAULT_TOKEN: AZURE_KEY_VAULT_TOKEN
capability:
  consumes:
  - type: http
    namespace: azure-cosmos
    baseUri: https://{accountName}.documents.azure.com
    description: Azure Cosmos DB REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AZURE_COSMOS_KEY}}'
      placement: header
    resources:
    - name: databases
      path: /dbs
      description: Database operations
      operations:
      - name: list-databases
        method: GET
        description: List databases
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-database
        method: POST
        description: Create a database
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-database
        method: GET
        description: Get a database
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-database
        method: DELETE
        description: Delete a database
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: containers
      path: /dbs/{databaseId}/colls
      description: Container operations
      operations:
      - name: list-containers
        method: GET
        description: List containers in a database
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-container
        method: POST
        description: Create a container
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: items
      path: /dbs/{databaseId}/colls/{containerId}/docs
      description: Item (document) operations
      operations:
      - name: list-items
        method: GET
        description: List items in a container
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        - name: containerId
          in: path
          type: string
          required: true
          description: Container ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-item
        method: POST
        description: Create an item
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        - name: containerId
          in: path
          type: string
          required: true
          description: Container ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stored-procedures
      path: /dbs/{databaseId}/colls/{containerId}/sprocs
      description: Stored procedure operations
      operations:
      - name: list-stored-procedures
        method: GET
        description: List stored procedures
        inputParameters:
        - name: databaseId
          in: path
          type: string
          required: true
          description: Database ID
        - name: containerId
          in: path
          type: string
          required: true
          description: Container ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: azure-blob
    baseUri: https://{accountName}.blob.core.windows.net
    description: Azure Blob Storage API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AZURE_STORAGE_KEY}}'
      placement: header
    resources:
    - name: service
      path: /
      description: Service-level operations
      operations:
      - name: get-service-properties
        method: GET
        description: Get blob service properties
        inputParameters:
        - name: restype
          in: query
          type: string
          required: true
          description: Resource type (service)
        - name: comp
          in: query
          type: string
          required: true
          description: Component (properties)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: containers
      path: /{containerName}
      description: Container operations
      operations:
      - name: create-container
        method: PUT
        description: Create a blob container
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-blobs
        method: GET
        description: List blobs in a container
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-container
        method: DELETE
        description: Delete a blob container
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: blobs
      path: /{containerName}/{blobName}
      description: Blob operations
      operations:
      - name: download-blob
        method: GET
        description: Download a blob
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        - name: blobName
          in: path
          type: string
          required: true
          description: Blob name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upload-blob
        method: PUT
        description: Upload a blob
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        - name: blobName
          in: path
          type: string
          required: true
          description: Blob name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-blob
        method: DELETE
        description: Delete a blob
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        - name: blobName
          in: path
          type: string
          required: true
          description: Blob name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-blob-properties
        method: HEAD
        description: Get blob properties
        inputParameters:
        - name: containerName
          in: path
          type: string
          required: true
          description: Container name
        - name: blobName
          in: path
          type: string
          required: true
          description: Blob name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: azure-keyvault
    baseUri: https://{vaultName}.vault.azure.net
    description: Azure Key Vault API
    authentication:
      type: bearer
      token: '{{AZURE_KEY_VAULT_TOKEN}}'
    resources:
    - name: keys
      path: /keys
      description: Cryptographic key management
      operations:
      - name: list-keys
        method: GET
        description: List keys in the vault
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-key
        method: POST
        description: Create a cryptographic key
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-key
        method: GET
        description: Get a key by name
        inputParameters:
        - name: keyName
          in: path
          type: string
          required: true
          description: Key name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-key
        method: PATCH
        description: Update key attributes
        inputParameters:
        - name: keyName
          in: path
          type: string
          required: true
          description: Key name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-key
        method: DELETE
        description: Delete a key
        inputParameters:
        - name: keyName
          in: path
          type: string
          required: true
          description: Key name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: secrets
      path: /secrets
      description: Secret management
      operations:
      - name: list-secrets
        method: GET
        description: List secrets in the vault
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: set-secret
        method: PUT
        description: Set a secret
        inputParameters:
        - name: secretName
          in: path
          type: string
          required: true
          description: Secret name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-secret
        method: GET
        description: Get a secret value
        inputParameters:
        - name: secretName
          in: path
          type: string
          required: true
          description: Secret name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-secret
        method: DELETE
        description: Delete a secret
        inputParameters:
        - name: secretName
          in: path
          type: string
          required: true
          description: Secret name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: certificates
      path: /certificates
      description: Certificate management
      operations:
      - name: list-certificates
        method: GET
        description: List certificates
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-certificate
        method: POST
        description: Create a certificate
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: azure-arm
    baseUri: https://management.azure.com
    description: Azure Resource Manager API
    authentication:
      type: bearer
      token: '{{AZURE_MANAGEMENT_TOKEN}}'
    resources:
    - name: subscriptions
      path: /subscriptions
      description: Subscription management
      operations:
      - name: list-subscriptions
        method: GET
        description: List subscriptions
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-subscription
        method: GET
        description: Get a subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resource-groups
      path: /subscriptions/{subscriptionId}/resourcegroups
      description: Resource group management
      operations:
      - name: list-resource-groups
        method: GET
        description: List resource groups
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-resource-group
        method: GET
        description: Get a resource group
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-resource-group
        method: PUT
        description: Create or update a resource group
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-resource-group
        method: DELETE
        description: Delete a resource group
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resources
      path: /subscriptions/{subscriptionId}/resources
      description: Resource management
      operations:
      - name: list-resources
        method: GET
        description: List resources in a subscription
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: deployments
      path: /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/Microsoft.Resources/deployments
      description: Deployment management
      operations:
      - name: create-deployment
        method: PUT
        description: Create or update a deployment
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-deployment
        method: GET
        description: Get a deployment
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: providers
      path: /subscriptions/{subscriptionId}/providers
      description: Provider management
      operations:
      - name: list-providers
        method: GET
        description: List resource providers
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags
      path: /subscriptions/{subscriptionId}/tagNames
      description: Tag management
      operations:
      - name: list-tags
        method: GET
        description: List subscription tags
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: azure-data-security-api
    description: Unified REST API for Azure data and security operations.
    resources:
    - path: /v1/databases
      name: databases
      description: Cosmos DB database management
      operations:
      - method: GET
        name: list-databases
        description: List Cosmos DB databases
        call: azure-cosmos.list-databases
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/blobs
      name: blobs
      description: Blob storage operations
      operations:
      - method: GET
        name: list-blobs
        description: List blobs in a container
        call: azure-blob.list-blobs
        with:
          containerName: rest.containerName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets
      name: secrets
      description: Key Vault secret management
      operations:
      - method: GET
        name: list-secrets
        description: List secrets
        call: azure-keyvault.list-secrets
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions
      name: subscriptions
      description: Subscription management
      operations:
      - method: GET
        name: list-subscriptions
        description: List subscriptions
        call: azure-arm.list-subscriptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: azure-data-security-mcp
    transport: http
    description: MCP server for AI-assisted Azure data and security operations.
    tools:
    - name: cosmos-list-databases
      description: List Cosmos DB databases
      hints:
        readOnly: true
        openWorld: true
      call: azure-cosmos.list-databases
      outputParameters:
      - type: object
        mapping: $.
    - name: cosmos-list-containers
      description: List containers in a database
      hints:
        readOnly: true
      call: azure-cosmos.list-containers
      with:
        databaseId: tools.databaseId
      outputParameters:
      - type: object
        mapping: $.
    - name: cosmos-list-items
      description: List items in a container
      hints:
        readOnly: true
      call: azure-cosmos.list-items
      with:
        databaseId: tools.databaseId
        containerId: tools.containerId
      outputParameters:
      - type: object
        mapping: $.
    - name: blob-list-blobs
      description: List blobs in a container
      hints:
        readOnly: true
      call: azure-blob.list-blobs
      with:
        containerName: tools.containerName
      outputParameters:
      - type: object
        mapping: $.
    - name: blob-download
      description: Download a blob
      hints:
        readOnly: true
      call: azure-blob.download-blob
      with:
        containerName: tools.containerName
        blobName: tools.blobName
      outputParameters:
      - type: object
        mapping: $.
    - name: blob-get-properties
      description: Get blob properties
      hints:
        readOnly: true
      call: azure-blob.get-blob-properties
      with:
        containerName: tools.containerName
        blobName: tools.blobName
      outputParameters:
      - type: object
        mapping: $.
    - name: keyvault-list-keys
      description: List cryptographic keys
      hints:
        readOnly: true
      call: azure-keyvault.list-keys
      outputParameters:
      - type: object
        mapping: $.
    - name: keyvault-list-secrets
      description: List secrets
      hints:
        readOnly: true
      call: azure-keyvault.list-secrets
      outputParameters:
      - type: object
        mapping: $.
    - name: keyvault-get-secret
      description: Get a secret value
      hints:
        readOnly: true
      call: azure-keyvault.get-secret
      with:
        secretName: tools.secretName
      outputParameters:
      - type: object
        mapping: $.
    - name: keyvault-list-certificates
      description: List certificates
      hints:
        readOnly: true
      call: azure-keyvault.list-certificates
      outputParameters:
      - type: object
        mapping: $.
    - name: arm-list-subscriptions
      description: List Azure subscriptions
      hints:
        readOnly: true
        openWorld: true
      call: azure-arm.list-subscriptions
      outputParameters:
      - type: object
        mapping: $.
    - name: arm-list-resource-groups
      description: List resource groups
      hints:
        readOnly: true
      call: azure-arm.list-resource-groups
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: arm-list-resources
      description: List resources in a subscription
      hints:
        readOnly: true
      call: azure-arm.list-resources
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: arm-list-providers
      description: List resource providers
      hints:
        readOnly: true
      call: azure-arm.list-providers
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: arm-list-tags
      description: List subscription tags
      hints:
        readOnly: true
      call: azure-arm.list-tags
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
