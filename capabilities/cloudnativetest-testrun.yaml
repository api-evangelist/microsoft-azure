        call: cloudnativetest-testrun.microsoftazuretestruncreateandupdatetest
        with:
          testRunId: rest.testRunId
          oldTestRunId: rest.oldTestRunId
          api-version: rest.api-version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: microsoftazuretestrungettestrun
        description: Microsoft Azure Get Test Run Of Given Name
        call: cloudnativetest-testrun.microsoftazuretestrungettestrun
        with:
          testRunId: rest.testRunId
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testruns/{testrunid}/clientmetrics
      name: testruns-testrunid-clientmetrics
      description: REST surface for testruns-testRunId-clientMetrics.
      operations:
      - method: GET
        name: microsoftazuretestrungettestrunclientmetrics
        description: Microsoft Azure Get All Client Metrics For A Given Load Test Run
        call: cloudnativetest-testrun.microsoftazuretestrungettestrunclientmetrics
        with:
          testRunId: rest.testRunId
          filter: rest.filter
          groupByInterval: rest.groupByInterval
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testruns/{testrunid}/clientmetricsfilters
      name: testruns-testrunid-clientmetricsfilters
      description: REST surface for testruns-testRunId-clientMetricsFilters.
      operations:
      - method: GET
        name: microsoftazuretestrungettestrunclientmetricsfilters
        description: Microsoft Azure Get All Client Metrics Supported Filters List For A Given Load Test Run
        call: cloudnativetest-testrun.microsoftazuretestrungettestrunclientmetricsfilters
        with:
          testRunId: rest.testRunId
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testruns/{testrunid}/files/{fileid}
      name: testruns-testrunid-files-fileid
      description: REST surface for testruns-testRunId-files-fileId.
      operations:
      - method: GET
        name: microsoftazuretestrungettestrunfile
        description: Microsoft Azure Get Testrun File With Given File Name
        call: cloudnativetest-testrun.microsoftazuretestrungettestrunfile
        with:
          testRunId: rest.testRunId
          fileId: rest.fileId
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testruns/testrunid-stop
      name: testruns-testrunid-stop
      description: REST surface for testruns-testRunId}:stop.
      operations:
      - method: POST
        name: microsoftazuretestrunstoptestrun
        description: Microsoft Azure Stop Test Run Of Given Name
        call: cloudnativetest-testrun.microsoftazuretestrunstoptestrun
        with:
          testRunId: rest.testRunId
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudnativetest-testrun-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure CloudNativeTest — TestRun. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-get-all-test
      description: Microsoft Azure Get All Test Runs With Given Filters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloudnativetest-testrun.microsoftazuretestrungetapptestrunssearch
