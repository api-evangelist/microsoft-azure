        executionTo: tools.executionTo
        status: tools.status
        maxPageSize: tools.maxPageSize
        api-version: tools.api-version
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-delete-test-run
      description: Microsoft Azure Delete A Test Run With Given Name Test Run Name Must Be A Valid Url Character ^[a Z0 9
