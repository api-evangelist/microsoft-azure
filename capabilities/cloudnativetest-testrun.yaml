naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure CloudNativeTest — TestRun
  description: 'Microsoft Azure CloudNativeTest — TestRun. 8 operations. Lead operation: Microsoft Azure Get All Test Runs
    With Given Filters. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - TestRun
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudnativetest-testrun
    baseUri: ''
    description: Microsoft Azure CloudNativeTest — TestRun business capability. Self-contained, no shared references.
    resources:
    - name: testruns-sortAndFilter
      path: /testruns/sortAndFilter
      operations:
      - name: microsoftazuretestrungetapptestrunssearch
        method: GET
        description: Microsoft Azure Get All Test Runs With Given Filters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderBy
          in: query
          type: string
          description: 'Sort on one of the field - status, displayName, executedDateTime in (field asc/desc) format. eg: displayName
            asc'
        - name: nextLink
          in: query
          type: string
          description: NextLink Token to get next page of response
        - name: search
          in: query
          type: string
          description: Filter search based on searchable fields - description, executedUser.
        - name: testId
          in: query
          type: string
          description: Unique identifier for load test name, must be a valid URL character ^[a-z0-9_-]*$
        - name: executionFrom
          in: query
          type: string
          description: The end DateTime(Iso8601Literal format) of test-run execution time filter range.
        - name: executionTo
          in: query
          type: string
          description: The start DateTime(Iso8601Literal format) of test-run execution time filter range.
        - name: status
          in: query
          type: string
          description: Comma separated list of test run status, value can be -  "ACCEPTED", "NOTSTARTED","PROVISIONING","PROVISIONED","CONFIGURING",
        - name: maxPageSize
          in: query
          type: integer
          description: No of results in response
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
    - name: testruns-testRunId
      path: /testruns/{testRunId}
      operations:
      - name: microsoftazuretestrundeletetestrun
        method: DELETE
        description: Microsoft Azure Delete A Test Run With Given Name Test Run Name Must Be A Valid Url Character ^[a Z0
          9 ]*$
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
      - name: microsoftazuretestruncreateandupdatetest
        method: PATCH
        description: Microsoft Azure Create And Start New Test Run Of The Given Name, Test Run Name Must Be A Valid Url Character
          ^[a Z0 9 ]*$
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: oldTestRunId
          in: query
          type: string
          description: Existing testRunId to re run new test
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
        - name: body
          in: body
          type: string
          description: Load test run model
          required: true
      - name: microsoftazuretestrungettestrun
        method: GET
        description: Microsoft Azure Get Test Run Of Given Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
    - name: testruns-testRunId-clientMetrics
      path: /testruns/{testRunId}/clientMetrics
      operations:
      - name: microsoftazuretestrungettestrunclientmetrics
        method: GET
        description: Microsoft Azure Get All Client Metrics For A Given Load Test Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: filter
          in: query
          type: string
          description: 'Filter to be used in metrics queries, filters can be applied on following fields : request, error,
            percentile( possible values : 90, 99, 95) or time (can be bet'
        - name: groupByInterval
          in: query
          type: string
          description: Group by time interval, in which interval metrics needs to be retrieved, values can be 10s,20s,30s,1m,2m,5m,1h
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
    - name: testruns-testRunId-clientMetricsFilters
      path: /testruns/{testRunId}/clientMetricsFilters
      operations:
      - name: microsoftazuretestrungettestrunclientmetricsfilters
        method: GET
        description: Microsoft Azure Get All Client Metrics Supported Filters List For A Given Load Test Run
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
    - name: testruns-testRunId-files-fileId
      path: /testruns/{testRunId}/files/{fileId}
      operations:
      - name: microsoftazuretestrungettestrunfile
        method: GET
        description: Microsoft Azure Get Testrun File With Given File Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: fileId
          in: path
          type: string
          description: Unique identifier for test run file, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
    - name: testruns-testRunId}:stop
      path: /testruns/{testRunId}:stop
      operations:
      - name: microsoftazuretestrunstoptestrun
        method: POST
        description: Microsoft Azure Stop Test Run Of Given Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: testRunId
          in: path
          type: string
          description: Unique identifier for load test run name, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
  exposes:
  - type: rest
    namespace: cloudnativetest-testrun-rest
    port: 8080
    description: REST adapter for Microsoft Azure CloudNativeTest — TestRun. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/testruns/sortandfilter
      name: testruns-sortandfilter
      description: REST surface for testruns-sortAndFilter.
      operations:
      - method: GET
        name: microsoftazuretestrungetapptestrunssearch
        description: Microsoft Azure Get All Test Runs With Given Filters
        call: cloudnativetest-testrun.microsoftazuretestrungetapptestrunssearch
        with:
          orderBy: rest.orderBy
          nextLink: rest.nextLink
          search: rest.search
          testId: rest.testId
          executionFrom: rest.executionFrom
          executionTo: rest.executionTo
          status: rest.status
          maxPageSize: rest.maxPageSize
          api-version: rest.api-version
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/testruns/{testrunid}
      name: testruns-testrunid
