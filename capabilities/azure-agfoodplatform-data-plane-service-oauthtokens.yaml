        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api-version
          in: query
          type: string
          description: The requested API version
          required: true
        - name: oauthConnectRequest
          in: body
          type: string
          description: OAuth Connect Request.
          required: true
