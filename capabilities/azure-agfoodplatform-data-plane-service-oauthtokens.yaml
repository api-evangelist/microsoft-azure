        description: Microsoft Azure Get Oauth Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: authProviderIds
          in: query
          type: array
          description: Name of AuthProvider.
        - name: partyIds
          in: query
          type: array
          description: List of parties.
        - name: isValid
