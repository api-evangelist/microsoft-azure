naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Personalizer Client — Events
  description: 'Microsoft Azure Personalizer Client — Events. 2 operations. Lead operation: Microsoft Azure Report That The
    Specified Event Was Actually Displayed To The User And A Reward Should Be Expected For It. Self-contained Naftiko capability
    covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: personalizer-client-events
    baseUri: ''
    description: Microsoft Azure Personalizer Client — Events business capability. Self-contained, no shared references.
    resources:
    - name: events-eventId-activate
      path: /events/{eventId}/activate
      operations:
      - name: microsoftazureeventsactivate
        method: POST
        description: Microsoft Azure Report That The Specified Event Was Actually Displayed To The User And A Reward Should
          Be Expected For It
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          description: The event ID this activation applies to.
          required: true
    - name: events-eventId-reward
      path: /events/{eventId}/reward
      operations:
      - name: microsoftazureeventsreward
        method: POST
        description: Microsoft Azure Report Reward To Allocate To The Top Ranked Action For The Specified Event
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: eventId
          in: path
          type: string
          description: The event id this reward applies to.
          required: true
        - name: reward
          in: body
          type: string
          description: The reward should be a floating point number.
          required: true
  exposes:
  - type: rest
    namespace: personalizer-client-events-rest
    port: 8080
    description: REST adapter for Microsoft Azure Personalizer Client — Events. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/events/{eventid}/activate
      name: events-eventid-activate
      description: REST surface for events-eventId-activate.
      operations:
      - method: POST
        name: microsoftazureeventsactivate
        description: Microsoft Azure Report That The Specified Event Was Actually Displayed To The User And A Reward Should
          Be Expected For It
        call: personalizer-client-events.microsoftazureeventsactivate
        with:
          eventId: rest.eventId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{eventid}/reward
      name: events-eventid-reward
      description: REST surface for events-eventId-reward.
      operations:
      - method: POST
        name: microsoftazureeventsreward
        description: Microsoft Azure Report Reward To Allocate To The Top Ranked Action For The Specified Event
        call: personalizer-client-events.microsoftazureeventsreward
        with:
          eventId: rest.eventId
          reward: rest.reward
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: personalizer-client-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Personalizer Client — Events. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-report-that-specified
      description: Microsoft Azure Report That The Specified Event Was Actually Displayed To The User And A Reward Should
        Be Expected For It
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalizer-client-events.microsoftazureeventsactivate
      with:
        eventId: tools.eventId
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-report-reward-allocate
      description: Microsoft Azure Report Reward To Allocate To The Top Ranked Action For The Specified Event
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: personalizer-client-events.microsoftazureeventsreward
      with:
        eventId: tools.eventId
        reward: tools.reward
      outputParameters:
      - type: object
        mapping: $.
