naftiko: 1.0.0-alpha2
info:
  label: Azure Container Platform
  description: Unified workflow for Azure container infrastructure combining AKS cluster management and Container Registry
    operations. Used by platform engineers, DevOps teams, and SREs managing containerized workloads.
  tags:
  - Azure
  - Kubernetes
  - Containers
  - Container Registry
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AZURE_MANAGEMENT_TOKEN: AZURE_MANAGEMENT_TOKEN
    AZURE_ACR_TOKEN: AZURE_ACR_TOKEN
capability:
  consumes:
  - type: http
    namespace: azure-aks
    baseUri: https://management.azure.com
    description: Azure Kubernetes Service API
    authentication:
      type: bearer
      token: '{{AZURE_MANAGEMENT_TOKEN}}'
    resources:
    - name: managed-clusters
      path: /subscriptions/{subscriptionId}/providers/Microsoft.ContainerService/managedClusters
      description: Managed cluster operations
      operations:
      - name: list-clusters
        method: GET
        description: List all AKS clusters
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-cluster
        method: GET
        description: Get an AKS cluster
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-or-update-cluster
        method: PUT
        description: Create or update an AKS cluster
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-cluster
        method: DELETE
        description: Delete an AKS cluster
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-admin-credentials
        method: POST
        description: Get cluster admin credentials
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: agent-pools
      path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ContainerService/managedClusters/{resourceName}/agentPools
      description: Agent pool operations
      operations:
      - name: list-agent-pools
        method: GET
        description: List agent pools
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-agent-pool
        method: GET
        description: Get an agent pool
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
          description: Subscription ID
        - name: resourceGroupName
          in: path
          type: string
          required: true
          description: Resource group name
        - name: resourceName
          in: path
          type: string
          required: true
          description: Cluster name
        - name: agentPoolName
          in: path
          type: string
          required: true
          description: Agent pool name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: azure-acr
    baseUri: https://{registryName}.azurecr.io
    description: Azure Container Registry API
    authentication:
      type: bearer
      token: '{{AZURE_ACR_TOKEN}}'
    resources:
    - name: catalog
      path: /acr/v1/_catalog
      description: Registry catalog
      operations:
      - name: list-repositories
        method: GET
        description: List repositories in the registry
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repositories
      path: /acr/v1/{repositoryName}
      description: Repository operations
      operations:
      - name: get-repository
        method: GET
        description: Get repository attributes
        inputParameters:
        - name: repositoryName
          in: path
          type: string
          required: true
          description: Repository name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-repository
        method: DELETE
        description: Delete a repository
        inputParameters:
        - name: repositoryName
          in: path
          type: string
          required: true
          description: Repository name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags
      path: /acr/v1/{repositoryName}/_tags
      description: Tag operations
      operations:
      - name: list-tags
        method: GET
        description: List tags for a repository
        inputParameters:
        - name: repositoryName
          in: path
          type: string
          required: true
          description: Repository name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: manifests
      path: /acr/v1/{repositoryName}/_manifests
      description: Manifest operations
      operations:
      - name: list-manifests
        method: GET
        description: List manifests for a repository
        inputParameters:
        - name: repositoryName
          in: path
          type: string
          required: true
          description: Repository name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: azure-container-api
    description: Unified REST API for Azure container platform.
    resources:
    - path: /v1/clusters
      name: clusters
      description: AKS cluster management
      operations:
      - method: GET
        name: list-clusters
        description: List AKS clusters
        call: azure-aks.list-clusters
        with:
          subscriptionId: rest.subscriptionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories
      name: repositories
      description: Container repositories
      operations:
      - method: GET
        name: list-repositories
        description: List container repositories
        call: azure-acr.list-repositories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: azure-container-mcp
    transport: http
    description: MCP server for AI-assisted Azure container platform management.
    tools:
    - name: aks-list-clusters
      description: List AKS managed clusters
      hints:
        readOnly: true
        openWorld: true
      call: azure-aks.list-clusters
      with:
        subscriptionId: tools.subscriptionId
      outputParameters:
      - type: object
        mapping: $.
    - name: aks-get-cluster
      description: Get AKS cluster details
      hints:
        readOnly: true
      call: azure-aks.get-cluster
      with:
        subscriptionId: tools.subscriptionId
        resourceGroupName: tools.resourceGroupName
        resourceName: tools.resourceName
      outputParameters:
      - type: object
        mapping: $.
    - name: aks-list-agent-pools
      description: List cluster agent pools
      hints:
        readOnly: true
      call: azure-aks.list-agent-pools
      with:
        subscriptionId: tools.subscriptionId
        resourceGroupName: tools.resourceGroupName
        resourceName: tools.resourceName
      outputParameters:
      - type: object
        mapping: $.
    - name: aks-get-agent-pool
      description: Get agent pool details
      hints:
        readOnly: true
      call: azure-aks.get-agent-pool
      with:
        subscriptionId: tools.subscriptionId
        resourceGroupName: tools.resourceGroupName
        resourceName: tools.resourceName
        agentPoolName: tools.agentPoolName
      outputParameters:
      - type: object
        mapping: $.
    - name: aks-get-admin-credentials
      description: Get cluster admin credentials
      hints:
        readOnly: true
      call: azure-aks.get-admin-credentials
      with:
        subscriptionId: tools.subscriptionId
        resourceGroupName: tools.resourceGroupName
        resourceName: tools.resourceName
      outputParameters:
      - type: object
        mapping: $.
    - name: acr-list-repositories
      description: List container repositories
      hints:
        readOnly: true
        openWorld: true
      call: azure-acr.list-repositories
      outputParameters:
      - type: object
        mapping: $.
    - name: acr-get-repository
      description: Get repository attributes
      hints:
        readOnly: true
      call: azure-acr.get-repository
      with:
        repositoryName: tools.repositoryName
      outputParameters:
      - type: object
        mapping: $.
    - name: acr-list-tags
      description: List tags for a repository
      hints:
        readOnly: true
      call: azure-acr.list-tags
      with:
        repositoryName: tools.repositoryName
      outputParameters:
      - type: object
        mapping: $.
    - name: acr-list-manifests
      description: List manifests for a repository
      hints:
        readOnly: true
      call: azure-acr.list-manifests
      with:
        repositoryName: tools.repositoryName
      outputParameters:
      - type: object
        mapping: $.
