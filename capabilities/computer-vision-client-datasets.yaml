naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Computer Vision Client — Datasets
  description: "Microsoft Azure Computer Vision Client — Datasets. 5 operations. Lead operation: Microsoft Azure Get A List\
    \ Of Datasets That Have Been Registered \r\n      \r\nstatus Codes Returned:\r\n 200: Operation Completed Successfully\
    \ \r\n 400: The Request Was Malformed. Self-contained Naftiko capability covering one Microsoft Azure business surface."
  tags:
  - Microsoft Azure
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: computer-vision-client-datasets
    baseUri: ''
    description: Microsoft Azure Computer Vision Client — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: datasets
      path: /datasets
      operations:
      - name: microsoftazuredatasetslist
        method: GET
        description: "Microsoft Azure Get A List Of Datasets That Have Been Registered \r"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of datasets to be skipped.
        - name: top
          in: query
          type: integer
          description: Number of datasets to be returned after skipping. The maximum allowed value is 30.
    - name: datasets-name
      path: /datasets/{name}
      operations:
      - name: microsoftazuredatasetsregister
        method: PUT
        description: "Microsoft Azure Register A New Dataset \r"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: A name that can be used to uniquely identify the dataset after it has been registered.
          required: true
        - name: body
          in: body
          type: string
          description: Properties for the dataset, such as the list of URIs to the annotation files.
          required: true
      - name: microsoftazuredatasetsget
        method: GET
        description: "Microsoft Azure Get Information About A Specific Dataset \r"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the dataset to get.
          required: true
      - name: microsoftazuredatasetsupdate
        method: PATCH
        description: "Microsoft Azure Update The Properties Of An Existing Dataset \r"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the dataset to update.
          required: true
        - name: If-Match
          in: header
          type: string
          description: "Optional ETag for the dataset to update.<br />\r"
        - name: body
          in: body
          type: string
          description: Properties to update on the existing dataset.
          required: true
      - name: microsoftazuredatasetsunregister
        method: DELETE
        description: "Microsoft Azure Unregister A Dataset \r"
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: The name of the dataset to unregister.
          required: true
        - name: If-Match
          in: header
          type: string
          description: "Optional ETag for the dataset to unregister.<br />\r"
  exposes:
  - type: rest
    namespace: computer-vision-client-datasets-rest
    port: 8080
    description: REST adapter for Microsoft Azure Computer Vision Client — Datasets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/datasets
      name: datasets
      description: REST surface for datasets.
      operations:
      - method: GET
        name: microsoftazuredatasetslist
        description: "Microsoft Azure Get A List Of Datasets That Have Been Registered \r"
        call: computer-vision-client-datasets.microsoftazuredatasetslist
        with:
          skip: rest.skip
          top: rest.top
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{name}
      name: datasets-name
      description: REST surface for datasets-name.
      operations:
      - method: PUT
        name: microsoftazuredatasetsregister
        description: "Microsoft Azure Register A New Dataset \r"
        call: computer-vision-client-datasets.microsoftazuredatasetsregister
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: microsoftazuredatasetsget
        description: "Microsoft Azure Get Information About A Specific Dataset \r"
        call: computer-vision-client-datasets.microsoftazuredatasetsget
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: microsoftazuredatasetsupdate
        description: "Microsoft Azure Update The Properties Of An Existing Dataset \r"
        call: computer-vision-client-datasets.microsoftazuredatasetsupdate
        with:
          name: rest.name
          If-Match: rest.If-Match
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: microsoftazuredatasetsunregister
        description: "Microsoft Azure Unregister A Dataset \r"
        call: computer-vision-client-datasets.microsoftazuredatasetsunregister
        with:
          name: rest.name
          If-Match: rest.If-Match
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: computer-vision-client-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Computer Vision Client — Datasets. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-azure-get-list-datasets
      description: "Microsoft Azure Get A List Of Datasets That Have Been Registered \r"
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: computer-vision-client-datasets.microsoftazuredatasetslist
      with:
        skip: tools.skip
        top: tools.top
      outputParameters:
      - type: object
