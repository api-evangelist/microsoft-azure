      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: computer-vision-client-datasets.microsoftazuredatasetsregister
      with:
        name: tools.name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-information-about
      description: "Microsoft Azure Get Information About A Specific Dataset \r"
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: computer-vision-client-datasets.microsoftazuredatasetsget
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-update-properties-existing
      description: "Microsoft Azure Update The Properties Of An Existing Dataset \r"
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: computer-vision-client-datasets.microsoftazuredatasetsupdate
      with:
        name: tools.name
        If-Match: tools.If-Match
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-unregister-dataset
      description: "Microsoft Azure Unregister A Dataset \r"
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: computer-vision-client-datasets.microsoftazuredatasetsunregister
      with:
        name: tools.name
        If-Match: tools.If-Match
      outputParameters:
      - type: object
        mapping: $.
