        - name: properties
          in: formData
          type: string
          description: Optional properties of this dataset (json serialized object with key/values, where all values must
            be strings)
        - name: audiodata
          in: formData
          type: file
          description: A zip file containing the audio data (this and the audio archive file for acoustic datasets).
        - name: transcriptions
          in: formData
          type: file
          description: A text file containing the transcriptions for the audio data (this and the transcriptions file for
            acoustic datasets).
        - name: languagedata
          in: formData
          type: file
          description: A text file containing the language or pronunciation data (only this file for language datasets).
