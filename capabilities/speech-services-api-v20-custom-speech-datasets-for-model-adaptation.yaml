        - name: description
          in: formData
          type: string
          description: Optional description of this dataset.
        - name: locale
          in: formData
          type: string
          description: The locale of this dataset (always add this string for any dataset).
        - name: dataImportKind
          in: formData
          type: string
          description: The kind of the dataset (always add this string for any dataset). Possible values are "Language", "Acoustic",
