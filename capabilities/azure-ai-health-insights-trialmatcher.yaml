  - type: http
    namespace: azure-ai-health-insights-trialmatcher
    baseUri: ''
    description: Microsoft Azure Azure AI Health Insights — TrialMatcher business capability. Self-contained, no shared references.
    resources:
    - name: trial-matcher-jobs
      path: /trial-matcher/jobs
      operations:
      - name: microsoftazuretrialmatchercreatejob
        method: POST
        description: Microsoft Azure Create Trial Matcher Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
    - name: trial-matcher-jobs-id
      path: /trial-matcher/jobs/{id}
      operations:
      - name: microsoftazuretrialmatchergetjob
        method: GET
        description: Microsoft Azure Get Trial Matcher Job Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: A processing job identifier.
          required: true
  exposes:
  - type: rest
    namespace: azure-ai-health-insights-trialmatcher-rest
    port: 8080
    description: REST adapter for Microsoft Azure Azure AI Health Insights — TrialMatcher. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/trial-matcher/jobs
      name: trial-matcher-jobs
      description: REST surface for trial-matcher-jobs.
      operations:
      - method: POST
        name: microsoftazuretrialmatchercreatejob
        description: Microsoft Azure Create Trial Matcher Job
        call: azure-ai-health-insights-trialmatcher.microsoftazuretrialmatchercreatejob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trial-matcher/jobs/{id}
      name: trial-matcher-jobs-id
      description: REST surface for trial-matcher-jobs-id.
      operations:
      - method: GET
        name: microsoftazuretrialmatchergetjob
        description: Microsoft Azure Get Trial Matcher Job Details
        call: azure-ai-health-insights-trialmatcher.microsoftazuretrialmatchergetjob
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
