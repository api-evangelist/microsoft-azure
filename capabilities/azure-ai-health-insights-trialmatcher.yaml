naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure AI Health Insights — TrialMatcher
  description: 'Microsoft Azure Azure AI Health Insights — TrialMatcher. 2 operations. Lead operation: Microsoft Azure Create
    Trial Matcher Job. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - TrialMatcher
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
