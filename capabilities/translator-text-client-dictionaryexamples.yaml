naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Translator Text Client — DictionaryExamples
  description: 'Microsoft Azure Translator Text Client — DictionaryExamples. 1 operations. Lead operation: Microsoft Azure
    Post Dictionary Examples. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - DictionaryExamples
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: translator-text-client-dictionaryexamples
    baseUri: https://api.cognitive.microsofttranslator.com
    description: Microsoft Azure Translator Text Client — DictionaryExamples business capability. Self-contained, no shared
      references.
    resources:
    - name: Dictionary-Examples
      path: /Dictionary/Examples
      operations:
      - name: microsoftazuretranslatordictionaryexamples
        method: POST
        description: Microsoft Azure Post Dictionary Examples
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: from
          in: query
          type: string
          description: Specifies the language of the input text. The source language must be one of the supported languages
            included in the `dictionary` scope.
          required: true
        - name: to
          in: query
          type: string
          description: Specifies the language of the output text. The target language must be one of the supported languages
            included in the `dictionary` scope.
          required: true
        - name: X-ClientTraceId
          in: header
          type: string
          description: A client-generated GUID to uniquely identify the request. Note that you can omit this header if you
            include the trace ID in the query string using a query param
        - name: text
          in: body
          type: array
          description: '# Request body'
          required: true
  exposes:
  - type: rest
    namespace: translator-text-client-dictionaryexamples-rest
    port: 8080
    description: REST adapter for Microsoft Azure Translator Text Client — DictionaryExamples. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/dictionary/examples
      name: dictionary-examples
      description: REST surface for Dictionary-Examples.
      operations:
      - method: POST
        name: microsoftazuretranslatordictionaryexamples
        description: Microsoft Azure Post Dictionary Examples
        call: translator-text-client-dictionaryexamples.microsoftazuretranslatordictionaryexamples
        with:
          from: rest.from
          to: rest.to
          X-ClientTraceId: rest.X-ClientTraceId
          text: rest.text
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: translator-text-client-dictionaryexamples-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Translator Text Client — DictionaryExamples. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: microsoft-azure-post-dictionary-examples
      description: Microsoft Azure Post Dictionary Examples
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: translator-text-client-dictionaryexamples.microsoftazuretranslatordictionaryexamples
      with:
        from: tools.from
        to: tools.to
        X-ClientTraceId: tools.X-ClientTraceId
        text: tools.text
      outputParameters:
      - type: object
        mapping: $.
