naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure TrainingApi — ImageApi
  description: 'Microsoft Azure TrainingApi — ImageApi. 14 operations. Lead operation: Microsoft Azure Add The Provided Images
    To The Set Of Training Images. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - ImageApi
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: trainingapi-imageapi
    baseUri: https://southcentralus.api.cognitive.microsoft.com/customvision/v2.1/Training
    description: Microsoft Azure TrainingApi — ImageApi business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-images
      path: /projects/{projectId}/images
      operations:
      - name: microsoftazurecreateimagesfromdata
        method: POST
        description: Microsoft Azure Add The Provided Images To The Set Of Training Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: tagIds
          in: query
          type: array
          description: The tags ids with which to tag each image. Limited to 20
        - name: imageData
          in: formData
          type: file
          required: true
      - name: microsoftazuredeleteimages
        method: DELETE
        description: Microsoft Azure Delete Images From The Set Of Training Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: imageIds
          in: query
          type: array
          description: Ids of the images to be deleted. Limited to 256 images per batch
          required: true
    - name: projects-projectId-images-files
      path: /projects/{projectId}/images/files
      operations:
      - name: microsoftazurecreateimagesfromfiles
        method: POST
        description: Microsoft Azure Add The Provided Batch Of Images To The Set Of Training Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: batch
          in: body
          type: string
          description: The batch of image files to add. Limited to 64 images and 20 tags per batch
          required: true
    - name: projects-projectId-images-id
      path: /projects/{projectId}/images/id
      operations:
      - name: microsoftazuregetimagesbyids
        method: GET
        description: Microsoft Azure Get Images By Id For A Given Project Iteration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: imageIds
          in: query
          type: array
          description: The list of image ids to retrieve. Limited to 256
        - name: iterationId
          in: query
          type: string
          description: The iteration id. Defaults to workspace
    - name: projects-projectId-images-predictions
      path: /projects/{projectId}/images/predictions
      operations:
      - name: microsoftazurecreateimagesfrompredictions
        method: POST
        description: Microsoft Azure Add The Specified Predicted Images To The Set Of Training Images
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: batch
          in: body
          type: string
          description: Image and tag ids. Limited to 64 images and 20 tags per batch
          required: true
    - name: projects-projectId-images-regions
      path: /projects/{projectId}/images/regions
      operations:
      - name: microsoftazurecreateimageregions
        method: POST
        description: Microsoft Azure Create A Set Of Image Regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: batch
          in: body
          type: string
          description: Batch of image regions which include a tag and bounding box. Limited to 64
          required: true
      - name: microsoftazuredeleteimageregions
        method: DELETE
        description: Microsoft Azure Delete A Set Of Image Regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: regionIds
          in: query
          type: array
          description: Regions to delete. Limited to 64
          required: true
    - name: projects-projectId-images-tagged
      path: /projects/{projectId}/images/tagged
      operations:
      - name: microsoftazuregettaggedimages
        method: GET
        description: Microsoft Azure Get Tagged Images For A Given Project Iteration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The project id
          required: true
        - name: iterationId
          in: query
          type: string
          description: The iteration id. Defaults to workspace
        - name: tagIds
          in: query
          type: array
          description: A list of tags ids to filter the images. Defaults to all tagged images when null. Limited to 20
        - name: orderBy
          in: query
          type: string
          description: The ordering. Defaults to newest
        - name: take
          in: query
          type: integer
          description: Maximum number of images to return. Defaults to 50, limited to 256
        - name: skip
          in: query
          type: integer
          description: Number of images to skip before beginning the image batch. Defaults to 0
