    - name: microsoft-azure-create-new-hook
      description: Microsoft Azure Create A New Hook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metrics-advisor-hook.microsoftazurecreatehook
      with:
        body: tools.body
      outputParameters:
      - type: object
