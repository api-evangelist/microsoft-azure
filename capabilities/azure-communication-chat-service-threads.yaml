naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure Communication Chat Service — Threads
  description: 'Microsoft Azure Azure Communication Chat Service — Threads. 7 operations. Lead operation: Microsoft Azure
    Creates A Chat Thread. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Threads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-communication-chat-service-threads
    baseUri: ''
    description: Microsoft Azure Azure Communication Chat Service — Threads business capability. Self-contained, no shared
      references.
    resources:
    - name: chat-threads
      path: /chat/threads
      operations:
      - name: microsoftazurechatcreatechatthread
        method: POST
        description: Microsoft Azure Creates A Chat Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repeatability-request-id
          in: header
          type: string
          description: If specified, the client directs that the request is repeatable; that is, that the client can make
            the request multiple times with the same Repeatability-Reques
        - name: createChatThreadRequest
          in: body
          type: string
          description: Request payload for creating a chat thread.
          required: true
      - name: microsoftazurechatlistchatthreads
        method: GET
        description: Microsoft Azure Gets The List Of Chat Threads Of A User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxPageSize
          in: query
          type: integer
          description: The maximum number of chat threads returned per page.
        - name: startTime
          in: query
          type: string
          description: 'The earliest point in time to get chat threads up to. The timestamp should be in RFC3339 format: `yyyy-MM-ddTHH:mm:ssZ`.'
    - name: chat-threads-chatThreadId
      path: /chat/threads/{chatThreadId}
      operations:
      - name: microsoftazurechatthreadupdatechatthreadproperties
        method: PATCH
        description: Microsoft Azure Updates A Thread S Properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatThreadId
          in: path
          type: string
          description: The id of the thread to update.
          required: true
        - name: updateChatThreadRequest
          in: body
          type: string
          description: Request payload for updating a chat thread.
          required: true
      - name: microsoftazurechatthreadgetchatthreadproperties
        method: GET
        description: Microsoft Azure Gets A Chat Thread S Properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatThreadId
          in: path
          type: string
          description: Id of the thread.
          required: true
      - name: microsoftazurechatdeletechatthread
        method: DELETE
        description: Microsoft Azure Deletes A Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatThreadId
          in: path
          type: string
          description: Id of the thread to be deleted.
          required: true
    - name: chat-threads-chatThreadId-readReceipts
      path: /chat/threads/{chatThreadId}/readReceipts
      operations:
      - name: microsoftazurechatthreadlistchatreadreceipts
        method: GET
        description: Microsoft Azure Gets Chat Message Read Receipts For A Thread
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatThreadId
          in: path
          type: string
          description: Thread id to get the chat message read receipts for.
          required: true
        - name: maxPageSize
          in: query
          type: integer
          description: The maximum number of chat message read receipts to be returned per page.
        - name: skip
          in: query
          type: integer
          description: Skips chat message read receipts up to a specified position in response.
      - name: microsoftazurechatthreadsendchatreadreceipt
        method: POST
        description: Microsoft Azure Sends A Read Receipt Event To A Thread, On Behalf Of A User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: chatThreadId
          in: path
          type: string
          description: Thread id to send the read receipt event to.
          required: true
        - name: sendReadReceiptRequest
          in: body
          type: string
          description: Read receipt details.
          required: true
