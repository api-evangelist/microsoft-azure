naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Text Analytics Client — Analyze
  description: 'Microsoft Azure Text Analytics Client — Analyze. 2 operations. Lead operation: Microsoft Azure Submit Analysis
    Job. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Analyze
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: text-analytics-client-analyze
    baseUri: ''
    description: Microsoft Azure Text Analytics Client — Analyze business capability. Self-contained, no shared references.
    resources:
    - name: analyze
      path: /analyze
      operations:
      - name: microsoftazureanalyze
        method: POST
        description: Microsoft Azure Submit Analysis Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          description: Collection of documents to analyze and tasks to execute.
    - name: analyze-jobs-jobId
      path: /analyze/jobs/{jobId}
      operations:
      - name: microsoftazureanalyzestatus
        method: GET
        description: Microsoft Azure Get Analysis Status And Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $top
          in: query
          type: integer
          description: (Optional) Set the maximum number of results per task. When both $top and $skip are specified, $skip
            is applied first.
        - name: $skip
          in: query
          type: integer
          description: (Optional) Set the number of elements to offset in the response. When both $top and $skip are specified,
            $skip is applied first.
  exposes:
  - type: rest
    namespace: text-analytics-client-analyze-rest
    port: 8080
    description: REST adapter for Microsoft Azure Text Analytics Client — Analyze. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/analyze
      name: analyze
      description: REST surface for analyze.
      operations:
      - method: POST
        name: microsoftazureanalyze
        description: Microsoft Azure Submit Analysis Job
        call: text-analytics-client-analyze.microsoftazureanalyze
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/analyze/jobs/{jobid}
      name: analyze-jobs-jobid
      description: REST surface for analyze-jobs-jobId.
      operations:
      - method: GET
        name: microsoftazureanalyzestatus
        description: Microsoft Azure Get Analysis Status And Results
        call: text-analytics-client-analyze.microsoftazureanalyzestatus
        with:
          $top: rest.$top
          $skip: rest.$skip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: text-analytics-client-analyze-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Text Analytics Client — Analyze. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: microsoft-azure-submit-analysis-job
      description: Microsoft Azure Submit Analysis Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: text-analytics-client-analyze.microsoftazureanalyze
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-analysis-status
      description: Microsoft Azure Get Analysis Status And Results
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: text-analytics-client-analyze.microsoftazureanalyzestatus
      with:
        $top: tools.$top
        $skip: tools.$skip
      outputParameters:
      - type: object
        mapping: $.
