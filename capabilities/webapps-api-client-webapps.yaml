    - name: subscriptions-subscriptionId-providers-Microsoft.Web-sites
      path: /subscriptions/{subscriptionId}/providers/Microsoft.Web/sites
      operations:
      - name: microsoftazurewebappslist
        method: GET
        description: Microsoft Azure Get All Apps For A Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof
      path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites
      operations:
      - name: microsoftazurewebappslistbyresourcegroup
        method: GET
        description: Microsoft Azure Gets All Web, Mobile, And Api Apps In The Specified Resource Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: includeSlots
          in: query
          type: boolean
          description: Specify <strong>true</strong> to include deployment slots in results. The default is false, which only
            gives you the production slot of all apps.
    - name: subscriptions-subscriptionId-resourceGroups-resourceGroupName-providers-Microsof
      path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites/{name}
      operations:
      - name: microsoftazurewebappsget
        method: GET
        description: Microsoft Azure Gets The Details Of A Web, Mobile, Or Api App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the app.
          required: true
      - name: microsoftazurewebappscreateorupdate
        method: PUT
        description: Microsoft Azure Creates A New Web, Mobile, Or Api App In An Existing Resource Group, Or Updates An Existing
          App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Unique name of the app to create or update. To create or update a deployment slot, use the {slot} parameter.
          required: true
        - name: siteEnvelope
          in: body
          type: string
          description: A JSON representation of the app properties. See example.
          required: true
      - name: microsoftazurewebappsdelete
        method: DELETE
        description: Microsoft Azure Deletes A Web, Mobile, Or Api App, Or One Of The Deployment Slots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Name of the app to delete.
          required: true
        - name: deleteMetrics
          in: query
          type: boolean
          description: If true, web app metrics are also deleted.
        - name: deleteEmptyServerFarm
          in: query
          type: boolean
          description: Specify false if you want to keep empty App Service plan. By default, empty App Service plan is deleted.
      - name: microsoftazurewebappsupdate
        method: PATCH
        description: Microsoft Azure Creates A New Web, Mobile, Or Api App In An Existing Resource Group, Or Updates An Existing
          App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          description: Unique name of the app to create or update. To create or update a deployment slot, use the {slot} parameter.
          required: true
