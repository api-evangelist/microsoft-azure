naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure WebApps API Client — WebApps
  description: 'Microsoft Azure WebApps API Client — WebApps. 407 operations. Lead operation: Microsoft Azure Get All Apps
    For A Subscription. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - WebApps
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: webapps-api-client-webapps
    baseUri: https://management.azure.com
    description: Microsoft Azure WebApps API Client — WebApps business capability. Self-contained, no shared references.
