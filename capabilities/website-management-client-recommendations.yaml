          description: Resource group name
          required: true
        - name: siteName
          in: path
          type: string
          description: Site name
          required: true
        - name: startTime
          in: query
          type: string
          description: The start time of a time range to query, e.g. $filter=startTime eq '2015-01-01T00:00:00Z' and endTime
