          type: object
          value: $.
        inputParameters:
        - name: featured
          in: query
          type: boolean
          description: If set, this API returns only the most critical recommendation among the others. Otherwise this API
            returns all recommendations available
        - name: $filter
          in: query
          type: string
          description: 'Return only channels specified in the filter. Filter is specified by using OData syntax. Example:
            $filter=channels eq ''Api'' or channel eq ''Notification'''
