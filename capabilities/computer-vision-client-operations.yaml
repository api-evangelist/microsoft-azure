        method: POST
        description: Microsoft Azure Analyze The Input Image The Request Either Contains Image Stream With Any Content Type
          [ Image * , Application Octet Stream ], Or A Json Payload Which Includes An Url Property To Be Used To Retrieve
          The Image Stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: features
