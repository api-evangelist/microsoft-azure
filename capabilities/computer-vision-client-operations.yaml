          type: array
          description: 'The visual features requested: tags, objects, caption, denseCaptions, read, smartCrops, people. This
            parameter needs to be specified if the parameter "model-nam'
        - name: model-name
          in: query
          type: string
          description: The name of the custom trained model. This parameter needs to be specified if the parameter "features"
            is not specified.
        - name: language
          in: query
          type: string
          description: The desired language for output generation. If this parameter is not specified, the default value is
            "en". See https://aka.ms/cv-languages for a list of support
        - name: smartcrops-aspect-ratios
          in: query
          type: string
          description: A list of aspect ratios to use for smartCrops feature. Aspect ratios are calculated by dividing the
            target crop width by the height. Supported values are betwee
        - name: gender-neutral-caption
          in: query
          type: boolean
          description: Boolean flag for enabling gender-neutral captioning for caption and denseCaptions features. If this
            parameter is not specified, the default value is "false".
        - name: body
          in: body
          type: string
          description: A JSON document with a URL pointing to the image that is to be analyzed.
          required: true
