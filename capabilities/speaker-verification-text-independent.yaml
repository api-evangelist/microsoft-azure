naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Speaker Verification API — Text-Independent
  description: 'Microsoft Azure Speaker Verification API — Text-Independent. 7 operations. Lead operation: Microsoft Azure
    Create Profile. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Text-Independent
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: speaker-verification-text-independent
    baseUri: ''
    description: Microsoft Azure Speaker Verification API — Text-Independent business capability. Self-contained, no shared
      references.
    resources:
    - name: text-independent-profiles
      path: /text-independent/profiles
      operations:
      - name: microsoftazuretextindependentcreateprofile
        method: POST
        description: Microsoft Azure Create Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: profileInfo
          in: body
          type: string
          description: Provide following detail info when creating a new profile.
      - name: microsoftazuretextindependentlistprofiles
        method: GET
        description: Microsoft Azure List Profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: $top
          in: query
          type: integer
          description: The number of profiles to return. Default is 100 and the maximum is 500
    - name: text-independent-profiles-profileId
      path: /text-independent/profiles/{profileId}
      operations:
      - name: microsoftazuretextindependentgetprofile
        method: GET
        description: Microsoft Azure Retrieve Single Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: microsoftazuretextindependentdeleteprofile
        method: DELETE
        description: Microsoft Azure Delete Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: text-independent-profiles-profileId-enrollments
      path: /text-independent/profiles/{profileId}/enrollments
      operations:
      - name: microsoftazuretextindependentcreateenrollment
        method: POST
        description: Microsoft Azure Enroll Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ignoreMinLength
          in: query
          type: boolean
          description: If true, a voice print will be created immediately for this profile regardless of how much speech is
            supplied or stored. Default is false.
        - name: audioData
          in: body
          type: object
          description: Binary audio file. Supported formats are audio/wav; codecs=audio/pcm. Supports audio up to 5MB.
          required: true
    - name: text-independent-profiles-profileId-reset
      path: /text-independent/profiles/{profileId}/reset
      operations:
      - name: microsoftazuretextindependentresetprofile
        method: POST
        description: Microsoft Azure Reset Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: text-independent-profiles-profileId-verify
      path: /text-independent/profiles/{profileId}/verify
      operations:
      - name: microsoftazuretextindependentverifyprofile
        method: POST
        description: Microsoft Azure Verify Profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ignoreMinLength
          in: query
          type: boolean
          description: If true, a voice print will be created immediately for this profile regardless of how much speech is
            supplied or stored. Default is false.
        - name: audioData
          in: body
          type: object
          description: Binary audio file. Supported formats are audio/wav; codecs=audio/pcm. Supports audio up to 5MB.
          required: true
