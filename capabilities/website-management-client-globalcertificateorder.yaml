naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure WebSite Management Client — GlobalCertificateOrder
  description: 'Microsoft Azure WebSite Management Client — GlobalCertificateOrder. 2 operations. Lead operation: Microsoft
    Azure Lists All Domains In A Subscription. Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - GlobalCertificateOrder
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: website-management-client-globalcertificateorder
    baseUri: https://management.azure.com
    description: Microsoft Azure WebSite Management Client — GlobalCertificateOrder business capability. Self-contained, no
      shared references.
    resources:
    - name: subscriptions-subscriptionId-providers-Microsoft.CertificateRegistration-certifi
      path: /subscriptions/{subscriptionId}/providers/Microsoft.CertificateRegistration/certificateOrders
      operations:
      - name: microsoftazureglobalcertificateordergetallcertificateorders
        method: GET
        description: Microsoft Azure Lists All Domains In A Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: subscriptions-subscriptionId-providers-Microsoft.CertificateRegistration-validat
      path: /subscriptions/{subscriptionId}/providers/Microsoft.CertificateRegistration/validateCertificateRegistrationInformation
      operations:
      - name: microsoftazureglobalcertificateordervalidatecertificatepurchaseinformation
        method: POST
        description: Microsoft Azure Validate Certificate Purchase Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: certificateOrder
          in: body
          type: string
          description: Certificate order
          required: true
  exposes:
  - type: rest
    namespace: website-management-client-globalcertificateorder-rest
    port: 8080
    description: REST adapter for Microsoft Azure WebSite Management Client — GlobalCertificateOrder. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions/{subscriptionid}/providers/microsoft-certificateregistration/certificateorders
      name: subscriptions-subscriptionid-providers-microsoft-certificateregistration-certifi
      description: REST surface for subscriptions-subscriptionId-providers-Microsoft.CertificateRegistration-certifi.
      operations:
      - method: GET
        name: microsoftazureglobalcertificateordergetallcertificateorders
        description: Microsoft Azure Lists All Domains In A Subscription
        call: website-management-client-globalcertificateorder.microsoftazureglobalcertificateordergetallcertificateorders
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscriptionid}/providers/microsoft-certificateregistration/validatecertificateregistrationinformation
      name: subscriptions-subscriptionid-providers-microsoft-certificateregistration-validat
      description: REST surface for subscriptions-subscriptionId-providers-Microsoft.CertificateRegistration-validat.
      operations:
      - method: POST
        name: microsoftazureglobalcertificateordervalidatecertificatepurchaseinformation
        description: Microsoft Azure Validate Certificate Purchase Information
        call: website-management-client-globalcertificateorder.microsoftazureglobalcertificateordervalidatecertificatepurchaseinformation
        with:
          certificateOrder: rest.certificateOrder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: website-management-client-globalcertificateorder-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure WebSite Management Client — GlobalCertificateOrder. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: microsoft-azure-lists-all-domains
      description: Microsoft Azure Lists All Domains In A Subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: website-management-client-globalcertificateorder.microsoftazureglobalcertificateordergetallcertificateorders
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-validate-certificate-purchase
      description: Microsoft Azure Validate Certificate Purchase Information
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: website-management-client-globalcertificateorder.microsoftazureglobalcertificateordervalidatecertificatepurchaseinformation
      with:
        certificateOrder: tools.certificateOrder
      outputParameters:
      - type: object
        mapping: $.
