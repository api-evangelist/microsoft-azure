naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure Azure Key Vault API — Secrets
  description: 'Microsoft Azure Azure Key Vault API — Secrets. 4 operations. Lead operation: Microsoft Azure List Secrets.
    Self-contained Naftiko capability covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - Secrets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: azure-key-vault-secrets
    baseUri: https://{vaultName}.vault.azure.net
    description: Microsoft Azure Azure Key Vault API — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: secrets
      path: /secrets
      operations:
      - name: secretslist
        method: GET
        description: Microsoft Azure List Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxresults
          in: query
          type: integer
          description: Maximum number of results to return in a page (1-25).
    - name: secrets-secret-name
      path: /secrets/{secret-name}
      operations:
      - name: secretsset
        method: PUT
        description: Microsoft Azure Set a Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret-name
          in: path
          type: string
          description: The name of the secret.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: secretsdelete
        method: DELETE
        description: Microsoft Azure Delete a Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret-name
          in: path
          type: string
          description: The name of the secret to delete.
          required: true
    - name: secrets-secret-name-secret-version
      path: /secrets/{secret-name}/{secret-version}
      operations:
      - name: secretsget
        method: GET
        description: Microsoft Azure Get a Secret
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: secret-name
          in: path
          type: string
          description: The name of the secret.
          required: true
        - name: secret-version
          in: path
          type: string
          description: The version of the secret. Use empty string for the latest version.
          required: true
    authentication:
      type: bearer
      token: '{{env.MICROSOFT_AZURE_API_KEY}}'
  exposes:
  - type: rest
    namespace: azure-key-vault-secrets-rest
    port: 8080
    description: REST adapter for Microsoft Azure Azure Key Vault API — Secrets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/secrets
      name: secrets
      description: REST surface for secrets.
      operations:
      - method: GET
        name: secretslist
        description: Microsoft Azure List Secrets
        call: azure-key-vault-secrets.secretslist
        with:
          maxresults: rest.maxresults
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets/{secret-name}
      name: secrets-secret-name
      description: REST surface for secrets-secret-name.
      operations:
      - method: PUT
        name: secretsset
        description: Microsoft Azure Set a Secret
        call: azure-key-vault-secrets.secretsset
        with:
          secret-name: rest.secret-name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: secretsdelete
        description: Microsoft Azure Delete a Secret
        call: azure-key-vault-secrets.secretsdelete
        with:
          secret-name: rest.secret-name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/secrets/{secret-name}/{secret-version}
      name: secrets-secret-name-secret-version
      description: REST surface for secrets-secret-name-secret-version.
      operations:
      - method: GET
        name: secretsget
        description: Microsoft Azure Get a Secret
        call: azure-key-vault-secrets.secretsget
        with:
          secret-name: rest.secret-name
          secret-version: rest.secret-version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: azure-key-vault-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure Azure Key Vault API — Secrets. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: microsoft-azure-list-secrets
      description: Microsoft Azure List Secrets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-key-vault-secrets.secretslist
      with:
        maxresults: tools.maxresults
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-set-secret
      description: Microsoft Azure Set a Secret
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: azure-key-vault-secrets.secretsset
      with:
        secret-name: tools.secret-name
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-delete-secret
      description: Microsoft Azure Delete a Secret
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: azure-key-vault-secrets.secretsdelete
      with:
        secret-name: tools.secret-name
      outputParameters:
      - type: object
        mapping: $.
    - name: microsoft-azure-get-secret
      description: Microsoft Azure Get a Secret
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-key-vault-secrets.secretsget
      with:
        secret-name: tools.secret-name
        secret-version: tools.secret-version
      outputParameters:
      - type: object
        mapping: $.
