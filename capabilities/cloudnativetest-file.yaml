naftiko: 1.0.0-alpha2
info:
  label: Microsoft Azure CloudNativeTest — File
  description: 'Microsoft Azure CloudNativeTest — File. 1 operations. Lead operation: Microsoft Azure Validate Input File
    File Name Must Be A Valid Url Character ^[a Z0 9 ]*$ File Size Can T Be More Than 50 Mb. Self-contained Naftiko capability
    covering one Microsoft Azure business surface.'
  tags:
  - Microsoft Azure
  - File
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MICROSOFT_AZURE_API_KEY: MICROSOFT_AZURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloudnativetest-file
    baseUri: ''
    description: Microsoft Azure CloudNativeTest — File business capability. Self-contained, no shared references.
    resources:
    - name: file-fileId}:validate
      path: /file/{fileId}:validate
      operations:
      - name: microsoftazurefilefilevalidate
        method: POST
        description: Microsoft Azure Validate Input File File Name Must Be A Valid Url Character ^[a Z0 9 ]*$ File Size Can
          T Be More Than 50 Mb
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          description: Unique identifier for test file, must be a valid URL character ^[a-z0-9_-]*$
          required: true
        - name: api-version
          in: query
          type: string
          description: Api version
          required: true
        - name: file
          in: formData
          type: file
          description: Input test file
          required: true
  exposes:
  - type: rest
    namespace: cloudnativetest-file-rest
    port: 8080
    description: REST adapter for Microsoft Azure CloudNativeTest — File. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/file/fileid-validate
      name: file-fileid-validate
      description: REST surface for file-fileId}:validate.
      operations:
      - method: POST
        name: microsoftazurefilefilevalidate
        description: Microsoft Azure Validate Input File File Name Must Be A Valid Url Character ^[a Z0 9 ]*$ File Size Can
          T Be More Than 50 Mb
        call: cloudnativetest-file.microsoftazurefilefilevalidate
        with:
          fileId: rest.fileId
          api-version: rest.api-version
          file: rest.file
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloudnativetest-file-mcp
    port: 9090
    transport: http
    description: MCP adapter for Microsoft Azure CloudNativeTest — File. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: microsoft-azure-validate-input-file
      description: Microsoft Azure Validate Input File File Name Must Be A Valid Url Character ^[a Z0 9 ]*$ File Size Can
        T Be More Than 50 Mb
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: cloudnativetest-file.microsoftazurefilefilevalidate
      with:
        fileId: tools.fileId
        api-version: tools.api-version
        file: tools.file
      outputParameters:
      - type: object
        mapping: $.
