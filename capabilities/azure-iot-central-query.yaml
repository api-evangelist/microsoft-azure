      name: query
      description: REST surface for query.
      operations:
      - method: POST
        name: microsoftazurequeryrun
        description: Microsoft Azure Run A Query And Obtain The Result
        call: azure-iot-central-query.microsoftazurequeryrun
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
