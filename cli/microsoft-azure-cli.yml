generated: '2026-06-20'
method: searched
source: https://learn.microsoft.com/en-us/cli/azure/
notes: >-
  Azure ships multiple first-party command-line tools. The Azure CLI (az) is the
  primary cross-platform management CLI; Azure PowerShell (Az module) is the
  PowerShell-native equivalent; the Azure Developer CLI (azd) is a higher-level
  app-provisioning/deployment CLI. Binaries are catalogued in packages/ context;
  this artifact captures the command surface.
clis:
  - name: az
    title: Azure CLI
    docs: https://learn.microsoft.com/en-us/cli/azure/
    repo: https://github.com/Azure/azure-cli
    install:
      - "macOS: brew install azure-cli"
      - "Windows: winget install Microsoft.AzureCLI"
      - "Linux: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash"
    auth: az login (Entra ID interactive / device code / service principal / managed identity)
    command_groups:
      - group: account
        purpose: Manage subscriptions and set active context.
      - group: group
        purpose: Manage resource groups.
      - group: resource
        purpose: Generic ARM resource CRUD.
      - group: vm
        purpose: Manage virtual machines.
      - group: storage
        purpose: Manage storage accounts, blobs, queues, tables, files.
      - group: aks
        purpose: Manage Azure Kubernetes Service clusters.
      - group: webapp / functionapp
        purpose: Manage App Service and Functions.
      - group: cosmosdb / sql / postgres
        purpose: Manage database services.
      - group: keyvault
        purpose: Manage Key Vault secrets, keys, certificates.
      - group: role
        purpose: Manage RBAC role assignments and definitions.
      - group: deployment
        purpose: Deploy and manage ARM/Bicep templates.
  - name: azd
    title: Azure Developer CLI
    docs: https://learn.microsoft.com/en-us/azure/developer/azure-developer-cli/
    repo: https://github.com/Azure/azure-dev
    purpose: Template-driven provision + deploy of full application environments (azd init / provision / deploy / up).
  - name: Az (PowerShell)
    title: Azure PowerShell
    docs: https://learn.microsoft.com/en-us/powershell/azure/
    install: "Install-Module -Name Az -Repository PSGallery"
    auth: Connect-AzAccount
