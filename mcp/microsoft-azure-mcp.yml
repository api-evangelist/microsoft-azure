generated: '2026-06-20'
method: searched
status: published
source: https://learn.microsoft.com/en-us/azure/developer/azure-mcp-server/
notes: >-
  Microsoft ships an official Azure MCP Server that exposes Azure management and
  data-plane operations to AI agents and coding assistants (Copilot, VS Code,
  Cursor, Claude). Distributed as the npm package @azure/mcp and documented on
  Microsoft Learn. It authenticates via Azure Identity (DefaultAzureCredential /
  az login). This provider also surfaces MCP through the Microsoft Learn MCP
  Server (docs access) and the API Center partner-MCP registry.
servers:
  - name: azure-mcp
    description: Official Azure MCP Server — Azure capabilities for AI agents.
    transport: stdio
    package: "@azure/mcp"
    registry: npm
    package_url: https://www.npmjs.com/package/@azure/mcp
    install: npx -y @azure/mcp@latest server start
    repo: https://github.com/Azure/azure-mcp
    docs: https://learn.microsoft.com/en-us/azure/developer/azure-mcp-server/
    auth: azure-identity (DefaultAzureCredential / az login)
  - name: microsoft-learn-mcp
    description: Microsoft Learn MCP Server — direct agent access to official Microsoft/Azure documentation.
    transport: http
    url: https://learn.microsoft.com/api/mcp
    repo: https://github.com/MicrosoftDocs/mcp
    docs: https://learn.microsoft.com/en-us/training/support/mcp
