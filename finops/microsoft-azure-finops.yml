specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Microsoft Azure
providerId: microsoft-azure
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cloud Infrastructure
description: FOCUS-aligned FinOps for Microsoft Azure.
sources:
  - https://azure.microsoft.com/en-us/pricing/
  - https://focus.finops.org/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Azure
serviceCategory: Cloud Infrastructure
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: Microsoft Azure
  ServiceCategory: Cloud Infrastructure
  ProviderName: Microsoft Azure
  PublisherName: Microsoft Azure
  BillingCurrency: USD
meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - instance_type
      - tenant
  - name: storage
    unit: GB-month
    aggregation: max
    dimensions:
      - service
      - tier
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - egress_type
      - region_pair
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - service
      - operation
  - name: managed_services
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Track Microsoft Azure consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers for chargeback.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
  - name: Reserved Instances + Savings Plans
    description: 1-yr or 3-yr RIs (up to 72% off) and Savings Plans (compute) for Azure VMs/SQL/etc.
  - name: Azure Hybrid Benefit
    description: Bring-your-own Windows Server / SQL Server licenses to save up to 85%.
